<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1"/>
<title>Centro de Mando — Grupo Consolidado</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#0F172A;--navyL:#1E293B;--navyG:linear-gradient(135deg,#0F172A,#1E293B);
  --green:#22C55E;--greenL:#F0FDF4;--greenD:#15803D;
  --amber:#F59E0B;--amberL:#FFFBEB;--amberD:#92400E;
  --red:#EF4444;--redL:#FEF2F2;--redD:#991B1B;
  --blue:#3B82F6;--blueL:#EFF6FF;
  --purple:#8B5CF6;--purpleL:#F5F3FF;
  --teal:#0EA5E9;--tealL:#F0F9FF;
  --bg:#F1F5F9;--white:#fff;--border:#E2E8F0;
  --muted:#94A3B8;--text:#0F172A;--textL:#64748B;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --mono:'Courier New',monospace;
  --shadow:0 1px 3px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.06);
  --r:16px;
}
html{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}
body{min-height:100vh;padding-bottom:80px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}

/* Header */
.header{background:var(--navyG);padding:16px 16px 14px;position:sticky;top:0;z-index:50}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.header h1{font-size:17px;font-weight:800;color:#fff;letter-spacing:-.02em}
.header-sub{font-size:11px;color:rgba(255,255,255,.5)}
.header-filters{display:flex;gap:6px}
.header-filters select{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 10px;border-radius:9px;font-size:11px;font-family:var(--font);cursor:pointer;-webkit-appearance:none}
.header-filters select option{color:#000;background:#fff}

/* Tabs */
.tabs{display:flex;overflow-x:auto;gap:3px;padding:0 16px 12px;background:var(--navyG);-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:7px 14px;border-radius:99px;border:none;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:var(--font);transition:all .15s;background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);position:relative;display:flex;align-items:center;gap:5px}
.tab:hover{background:rgba(255,255,255,.15);color:#fff}
.tab.act{background:#fff;color:var(--navy);font-weight:800}
.tab .tb{font-size:9px;font-weight:800;padding:1px 5px;border-radius:99px;min-width:16px;text-align:center}

/* Content */
.page{padding:14px 16px}

/* Cards */
.card{background:var(--white);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}
.card-h{padding:14px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.card-h h3{font-size:13px;font-weight:800;color:var(--text);flex:1;display:flex;align-items:center;gap:8px}
.card-h .cb{font-size:10px;font-weight:800;padding:2px 8px;border-radius:99px}
.card-h .chv{color:var(--muted);font-size:14px;transition:transform .2s}
.card-h .chv.open{transform:rotate(180deg)}
.card-body{border-top:1px solid var(--border)}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.kpi{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.kpi-icon{font-size:18px;margin-bottom:6px}
.kpi-v{font-size:22px;font-weight:900;letter-spacing:-.03em}
.kpi-l{font-size:10px;font-weight:600;color:var(--muted);margin-top:2px}

/* Table */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:8px 12px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;background:#F8FAFC;border-bottom:1px solid var(--border);white-space:nowrap}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:12px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tbl tr:last-child td{border-bottom:none}
.tbl tr{cursor:pointer;transition:background .1s}
.tbl tr:active{background:#F8FAFC}
.age{font-size:10px;font-weight:800;padding:3px 8px;border-radius:7px;display:inline-block}
.rec{font-size:10px;color:var(--amberD);font-style:italic;margin-top:2px;display:block;white-space:normal}

/* Rows */
.item-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.item-row:last-child{border-bottom:none}
.item-row:active{background:#F8FAFC}
.item-ic{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-sub{font-size:11px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-right{text-align:right;flex-shrink:0}

/* Aging pills */
.aging{display:flex;gap:5px;padding:0 16px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.aging::-webkit-scrollbar{display:none}
.ag{padding:6px 12px;border-radius:99px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:var(--white);transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.ag.sel{border-color:var(--navy);background:var(--navy);color:#fff}

/* AI */
.ai-card{background:linear-gradient(135deg,#EFF6FF,#F0F9FF);border:1.5px solid #BFDBFE;border-radius:var(--r);padding:18px;margin-bottom:14px}
.ai-card h3{font-size:14px;font-weight:800;color:var(--navy);margin-bottom:6px}
.ai-card p{font-size:11px;color:var(--textL);margin-bottom:14px}
.ai-btn{background:var(--navyG);border:none;color:#fff;padding:11px 20px;border-radius:12px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);display:inline-flex;align-items:center;gap:8px;transition:opacity .15s}
.ai-btn:active{opacity:.85}
.ai-btn:disabled{opacity:.5}
.ai-result{background:var(--white);border-radius:12px;padding:16px;margin-top:14px;font-size:12px;line-height:1.75;color:var(--text);white-space:pre-wrap;border:1px solid var(--border);max-height:60vh;overflow-y:auto}
.ai-key{display:flex;gap:6px;margin-top:10px}
.ai-key input{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:9px;font-size:11px;font-family:var(--mono);background:var(--white)}
.ai-key button{padding:8px 14px;border:none;border-radius:9px;background:var(--navy);color:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font)}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .15s}
.modal{background:var(--white);border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;animation:slideUp .25s}
.modal-h{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--white);z-index:1;border-radius:20px 20px 0 0}
.modal-h h3{font-size:15px;font-weight:800}
.modal-x{background:#F1F5F9;border:none;color:var(--muted);width:32px;height:32px;border-radius:10px;cursor:pointer;font-size:16px}
.modal-b{padding:16px 18px 32px}
.dr{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;gap:12px}
.dr:last-child{border-bottom:none}
.dr-l{color:var(--muted);flex-shrink:0}
.dr-v{font-weight:600;text-align:right;word-break:break-word}

/* Empty */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:8px}

/* Spinner */
.spin{display:inline-block;border:2.5px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

@media(min-width:600px){.kpis{grid-template-columns:repeat(4,1fr)}.page{padding:20px 24px;max-width:900px;margin:0 auto}}
@media(min-width:900px){.modal{border-radius:20px;max-height:80vh}.modal-bg{align-items:center}}
</style>
</head>
<body>
<div id="app"><div style="display:flex;align-items:center;justify-content:center;height:100vh;gap:12px;color:#94A3B8"><div class="spin" style="width:28px;height:28px"></div><span>Iniciando...</span></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useMemo}=React;

// ═══ FIREBASE ═══
const FB="https://firestore.googleapis.com/v1/projects/grupo-consolidado-crm/databases/(default)/documents";
function pv(v){if(!v)return;if("stringValue"in v)return v.stringValue;if("integerValue"in v)return+v.integerValue;if("doubleValue"in v)return+v.doubleValue;if("booleanValue"in v)return v.booleanValue;if("nullValue"in v)return null;if("timestampValue"in v)return v.timestampValue;if("arrayValue"in v)return(v.arrayValue.values||[]).map(pv);if("mapValue"in v){const o={};Object.entries(v.mapValue.fields||{}).forEach(([k,val])=>{o[k]=pv(val)});return o}}
function fromFS(doc){if(!doc?.fields)return{id:(doc?.name||"").split("/").pop()};const o={id:(doc.name||"").split("/").pop()};Object.entries(doc.fields).forEach(([k,v])=>{const val=pv(v);if(val!==undefined)o[k]=val});return o}
async function fbL(col){try{let docs=[],next=null,n=0;do{const r=await Promise.race([fetch(`${FB}/${col}?pageSize=300${next?"&pageToken="+next:""}`,{cache:"no-store"}),new Promise((_,rej)=>setTimeout(()=>rej("timeout"),10000))]);if(!r.ok)break;const d=await r.json();if(d.documents)docs=[...docs,...d.documents.map(fromFS)];next=d.nextPageToken||null;n++}while(next&&n<30);return docs}catch(e){return[]}}

// ═══ AI ═══
async function askAI(prompt,key,max=2000){
  if(!key?.startsWith("sk-ant"))return"⚠️ Configura tu API Key pulsando ⚙️";
  try{const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:max,messages:[{role:"user",content:prompt}]})});if(!r.ok){const t=await r.text();return"Error ("+r.status+"): "+t}const d=await r.json();return d.content?.[0]?.text||"Sin respuesta"}catch(e){return"Error: "+e.message}}

// ═══ HELPERS ═══
const USR=[
  {id:"wk1",n:"David Mag",eq:"WIKUK",c:"#22C55E",ga:"DAVIDMAG"},
  {id:"wk2",n:"Verónica",eq:"WIKUK",c:"#10B981",ga:"VERONICA"},
  {id:"wk3",n:"Silvia",eq:"WIKUK",c:"#059669",ga:"SILVIA"},
  {id:"rpiedra",n:"Ramon",eq:"WIKUK",c:"#E11D48",ga:"RPIEDRA"},
  {id:"jl",n:"Jose Luis",eq:"WIKUK",c:"#6366F1",ga:"JLGARCIA"},
  {id:"ik1",n:"Carlos G.",eq:"INTERKEY",c:"#F59E0B",ga:"CARLOSG"},
  {id:"ik2",n:"Ricardo",eq:"INTERKEY",c:"#D97706",ga:"RICARDO"},
  {id:"ik4",n:"Azarco",eq:"INTERKEY",c:"#78350F",ga:"AZARCO"},
];
const nom=id=>{if(!id)return"—";const up=id.toUpperCase();const u=USR.find(x=>[x.id,x.ga,x.n].some(y=>y&&y.toUpperCase()===up));return u?u.n:id};
const eqAg=id=>{const up=(id||"").toUpperCase();const u=USR.find(x=>[x.id,x.ga].some(y=>y&&y.toUpperCase()===up));return u?u.eq:""};
const fmt=n=>new Intl.NumberFormat("es-ES").format(n);
const getSem=()=>{const d=new Date(),s=new Date(d.getFullYear(),0,1);return Math.ceil(((d-s)/864e5+s.getDay()+1)/7)};
function parseD(d){if(!d)return null;if(typeof d==="string"){if(d.match(/^\d{4}-/)||d.includes("T"))return new Date(d);const p=d.split("/");if(p.length>=2){let yr=p[2]?+p[2]:2026;if(yr<100)yr+=2000;return new Date(yr,+p[1]-1,+p[0])}}if(typeof d==="number"&&d>1e9)return new Date(d>1e10?d:d*1e3);return null}
function diasD(f){const d=parseD(f);if(!d||isNaN(d))return-1;return Math.floor((new Date()-d)/864e5)}
function sem2f(s){if(!s)return null;const d=new Date(2026,0,1);d.setDate(d.getDate()+(s-1)*7);return d}
const ageCol=d=>d>=14?"var(--red)":d>=7?"var(--amber)":d>=3?"var(--blue)":"var(--green)";
const ageBg=d=>d>=14?"var(--redL)":d>=7?"var(--amberL)":d>=3?"var(--blueL)":"var(--greenL)";
function reco(t,d,e){
  if(t==="inc")return d>7?"⚡ Escalar — cliente en riesgo":"📞 Contactar y actualizar";
  if(t==="ofe")return d>10?"📞 Cerrar ya":d>5?"📧 Recordatorio":"⏳ Dentro de plazo";
  if(t==="ops")return d>21?"🚨 Llamar hoy — se pierde":d>7?"📞 Seguimiento urgente":"📧 Avanzar etapa";
  if(t==="mue")return d>14?"📞 Feedback urgente":d>7?"📧 Seguimiento":"⏳ Esperar prueba";
  if(t==="est")return e==="pendiente_aprobacion"?"✅ Aprobar ya":"👀 Revisar avance";
  return"📋 Revisar";}

// ═══ COMPONENTS ═══
function Card({icon,title,count,color,children,open:defOpen=true}){
  const [open,setOpen]=useState(defOpen);
  return <div className="card">
    <div className="card-h" onClick={()=>setOpen(!open)}>
      <h3>{icon} {title}</h3>
      {count!==undefined&&<span className="cb" style={{background:(color||"var(--navy)")+"15",color:color||"var(--navy)"}}>{count}</span>}
      <span className={"chv"+(open?" open":"")}>▾</span>
    </div>
    {open&&<div className="card-body">{children}</div>}
  </div>;
}

function ItemRow({icon,iconBg,title,sub,age,rec,onClick}){
  return <div className="item-row" onClick={onClick}>
    <div className="item-ic" style={{background:iconBg}}>{icon}</div>
    <div className="item-info">
      <div className="item-title">{title}</div>
      <div className="item-sub">{sub}</div>
      {rec&&<div className="rec">{rec}</div>}
    </div>
    <div className="item-right">
      {age>=0&&<span className="age" style={{background:ageBg(age),color:ageCol(age)}}>{age}d</span>}
    </div>
  </div>;
}

function Modal({item,onClose}){
  if(!item)return null;
  const rows=[["Cliente",item.cliente||item.clienteNombre],["Producto",item.prod||item.prodNombre||item.producto],["Tipo",item.tipo],["Estado",item.etapa||item.estado],["Prioridad",item.prioridad],["Agente",nom(item._ag)],["Equipo",eqAg(item._ag)],["Valor",item.valor?fmt(item.valor)+"€":null],["Días",item._d>=0?item._d+" días":null],["Notas",item.descripcion||item.notas||item.notaInicial],["Estrategia",item.estrategia],["Resultado",item.resultado]].filter(r=>r[1]);
  return <div className="modal-bg" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}>
    <div className="modal-h"><h3>{item.cliente||item.clienteNombre||item.prod||"Detalle"}</h3><button className="modal-x" onClick={onClose}>✕</button></div>
    <div className="modal-b">
      {item._rec&&<div style={{background:"var(--amberL)",borderRadius:12,padding:"10px 14px",marginBottom:14,fontSize:12,color:"var(--amberD)"}}>{item._rec}</div>}
      {rows.map(([l,v],i)=><div key={i} className="dr"><span className="dr-l">{l}</span><span className="dr-v">{String(v)}</span></div>)}
    </div>
  </div></div>;
}

// ═══ APP ═══
function App(){
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [prog,setProg]=useState("");
  const [view,setView]=useState("hoy");
  const [eqF,setEqF]=useState("todos");
  const [agF,setAgF]=useState("todos");
  const [det,setDet]=useState(null);
  const [ageF,setAgeF]=useState("all");
  const [aiRes,setAiRes]=useState(null);
  const [aiLoad,setAiLoad]=useState(false);
  const [aiVis,setAiVis]=useState(null);
  const [aiVisL,setAiVisL]=useState(false);
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem("cm_key")||"");
  const [showKey,setShowKey]=useState(false);
  const saveKey=k=>{setApiKey(k);localStorage.setItem("cm_key",k);setShowKey(false)};

  useEffect(()=>{
    const cols=["oportunidades","muestras","estrategias","incidencias","ofertas","visitas","potenciales"];
    const keys=["ops","mue","est","inc","ofe","vis","pot"];
    const res={};let i=0;
    (function next(){
      if(i>=cols.length){setData(res);setLoading(false);return}
      setProg(cols[i]+" ("+(i+1)+"/"+cols.length+")");
      fbL(cols[i]).then(d=>{res[keys[i]]=d;i++;next()});
    })();
  },[]);

  if(loading)return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:12,color:"var(--muted)"}}>
    <div className="spin" style={{width:32,height:32}}/>
    <span style={{fontSize:13}}>Cargando {prog}</span>
  </div>;

  const sem=getSem();
  const fil=arr=>(arr||[]).filter(it=>{
    if(it.eliminada||it.eliminado)return false;
    const ag=it.agente||it.autor||it.agenteId||"";
    if(eqF!=="todos"&&eqAg(ag)!==eqF)return false;
    if(agF!=="todos"){const u=USR.find(x=>x.id===agF);if(!u||![u.id,u.ga].some(x=>x&&x.toUpperCase()===(ag||"").toUpperCase()))return false}
    return true;
  });

  const D=data;
  const incA=fil(D.inc).filter(i=>i.estado==="abierta"||i.estado==="en_gestion").map(i=>({...i,_d:Math.max(diasD(i.fecha),0),_ag:i.autor||i.agente,_rec:reco("inc",Math.max(diasD(i.fecha),0))})).sort((a,b)=>b._d-a._d);
  const ofeP=fil(D.ofe).filter(o=>o.estado==="pendiente"||!o.estado).map(o=>{const d=Math.max(diasD(o.fechaCreacion||o.fechaCreacionStr),0);return{...o,_d:d,_ag:o.agente,_rec:reco("ofe",d)}}).sort((a,b)=>b._d-a._d);
  const opsA=fil(D.ops).filter(o=>!["ganada","perdida","cerrada_ganada","cerrada_perdida"].includes(o.etapa||o.estado)).map(o=>{const acts=o.actividad||[];const ua=acts.length?(acts[acts.length-1]||{}).fecha:null;const d=Math.max(diasD(ua||o.fecha||o.creadaEn),0);return{...o,_d:d,_ag:o.agente||o.agenteId,_rec:reco("ops",d)}}).sort((a,b)=>b._d-a._d);
  const mueP=fil(D.mue).filter(m=>m.estado==="pendiente").map(m=>{const d=Math.max(diasD(m.fecha||sem2f(m.semana)),0);return{...m,_d:d,_ag:m.agente,_rec:reco("mue",d)}}).sort((a,b)=>b._d-a._d);
  const estA=fil(D.est).filter(e=>e.estado==="en_curso"||e.estado==="pendiente_aprobacion").map(e=>{const d=Math.max(diasD(e.fecha||sem2f(e.semana)),0);return{...e,_d:d,_ag:e.agente,_rec:reco("est",d,e.estado)}}).sort((a,b)=>b._d-a._d);
  const potA=fil(D.pot).filter(p=>(p.lineas||[]).length>0).map(p=>({...p,_d:Math.max(diasD(p.fechaCreacion||p.fechaActualizacion),0),_ag:p.agente,_kg:(p.lineas||[]).reduce((s,l)=>s+(+l.kgAnual||0),0),_lin:(p.lineas||[]).length})).sort((a,b)=>b._kg-a._kg);
  const visSem=fil(D.vis).filter(v=>+v.semana===sem);
  const visPrev=fil(D.vis).filter(v=>+v.semana===sem-1);
  const valPipe=opsA.reduce((s,o)=>s+(+o.valor||0),0);
  const totalKg=potA.reduce((s,p)=>s+p._kg,0);
  const allPend=[...incA.map(i=>({...i,_mod:"🚨",_modN:"Inc",_modC:"var(--red)"})),...ofeP.map(i=>({...i,_mod:"📄",_modN:"Ofe",_modC:"var(--amber)"})),...opsA.map(i=>({...i,_mod:"💼",_modN:"Op",_modC:"var(--blue)"})),...mueP.map(i=>({...i,_mod:"📦",_modN:"Mue",_modC:"var(--purple)"})),...estA.map(i=>({...i,_mod:"🎯",_modN:"Est",_modC:"var(--teal)"}))].sort((a,b)=>b._d-a._d);
  const crit14=allPend.filter(i=>i._d>=14).length;
  const filtEdad=items=>ageF==="all"?items:ageF==="c"?items.filter(i=>i._d>=14):ageF==="u"?items.filter(i=>i._d>=7&&i._d<14):ageF==="a"?items.filter(i=>i._d>=3&&i._d<7):items.filter(i=>i._d<3);

  // AI Briefing
  async function genBriefing(){
    setAiLoad(true);setAiRes(null);
    const s=`CRM Grupo Consolidado (alimentación), semana ${sem}:
- ${incA.length} incidencias abiertas (${incA.filter(i=>i._d>=7).length} >7d). Top: ${incA.slice(0,4).map(i=>`${i.clienteNombre||i.cliente} ${i.tipo} ${i._d}d ${nom(i._ag)}`).join("; ")}
- ${ofeP.length} ofertas pendientes (${ofeP.filter(o=>o._d>=7).length} >7d sin respuesta)
- ${opsA.length} oportunidades, pipeline ${fmt(valPipe)}€. Estancadas >14d: ${opsA.filter(o=>o._d>=14).length}. Top: ${opsA.slice(0,4).map(o=>`${o.cliente} ${o.prod||""} ${fmt(+o.valor||0)}€ ${o._d}d ${nom(o._ag)}`).join("; ")}
- ${mueP.length} muestras pendientes feedback. Top: ${mueP.slice(0,4).map(m=>`${m.cliente||m.clienteNombre} ${m.prod||m.prodNombre} ${m._d}d ${nom(m._ag)}`).join("; ")}
- ${estA.length} estrategias (${estA.filter(e=>e.estado==="pendiente_aprobacion").length} pend. aprobar)
- ${potA.length} clientes con potencial: ${fmt(Math.round(totalKg))} kg/año
- ${visSem.length} visitas sem.${sem} (anterior: ${visPrev.length})
- Equipo: ${USR.map(u=>{const ids=new Set([u.id,u.ga].filter(Boolean).map(x=>x.toUpperCase()));const m=i=>ids.has((i.agente||i.autor||i.agenteId||"").toUpperCase());return`${u.n}(${u.eq}): ${D.inc.filter(i=>m(i)&&(i.estado==="abierta"||i.estado==="en_gestion")).length}inc ${D.ofe.filter(o=>!o.eliminada&&(o.estado==="pendiente"||!o.estado)&&m(o)).length}ofe ${D.ops.filter(o=>!o.eliminada&&m(o)&&!["ganada","perdida","cerrada_ganada","cerrada_perdida"].includes(o.etapa||o.estado)).length}ops ${D.vis.filter(v=>m(v)&&+v.semana===sem).length}vis`}).join("; ")}`;
    const r=await askAI(`Eres el mejor director comercial del mundo. Analiza estos datos del CRM y genera un BRIEFING para el responsable.\n\n${s}\n\nEstructura:\n1. RESUMEN (3 líneas, panorama)\n2. 🔴 FUEGOS (qué apagar hoy, 3 acciones con cliente+agente)\n3. 🟡 ESTA SEMANA (4 acciones prioritarias)\n4. 📊 EQUIPO (quién va bien, quién necesita apoyo)\n5. 💡 OPORTUNIDADES (dónde hay dinero escapándose)\n6. 🎯 TOP 3 HOY (las 3 acciones de más impacto)\n\nSé directo con nombres. Habla como un jefe que conoce a su gente.`,apiKey,2500);
    setAiRes(r);setAiLoad(false);
  }
  // AI Visitas
  async function genVisitas(){
    setAiVisL(true);setAiVis(null);
    const vd=visSem.slice(0,30).map(v=>`${v.clienteNombre||"?"} | ${v.resultado||"?"} | ${nom(v.agente||"")} | ${(v.notas||"sin notas").slice(0,150)}`).join("\n");
    const r=await askAI(`Analiza visitas comerciales semana ${sem} (empresa alimentaria):\n\n${vd||"Sin visitas"}\n\nGenera:\n1. RESUMEN ACTIVIDAD\n2. CALIDAD (señales compra, quejas, interés real)\n3. PATRONES (repeticiones, concentración, cobertura)\n4. SEÑALES (compromisos, objeciones, competencia, productos)\n5. 3 RECOMENDACIONES concretas\n\nSé concreto con nombres.`,apiKey,2000);
    setAiVis(r);setAiVisL(false);
  }

  // ═══ VIEWS ═══
  function VHoy(){
    return <>
      <div className="kpis">
        <div className="kpi" onClick={()=>setView("inc")}><div className="kpi-icon">🚨</div><div className="kpi-v" style={{color:incA.length?"var(--red)":"var(--green)"}}>{incA.length}</div><div className="kpi-l">Incidencias</div></div>
        <div className="kpi" onClick={()=>setView("ofe")}><div className="kpi-icon">📄</div><div className="kpi-v" style={{color:"var(--amber)"}}>{ofeP.length}</div><div className="kpi-l">Ofertas</div></div>
        <div className="kpi" onClick={()=>setView("ops")}><div className="kpi-icon">💼</div><div className="kpi-v" style={{color:"var(--blue)"}}>{fmt(valPipe)}€</div><div className="kpi-l">Pipeline</div></div>
        <div className="kpi" onClick={()=>setView("mue")}><div className="kpi-icon">📦</div><div className="kpi-v" style={{color:"var(--purple)"}}>{mueP.length}</div><div className="kpi-l">Muestras</div></div>
        <div className="kpi" onClick={()=>setView("est")}><div className="kpi-icon">🎯</div><div className="kpi-v" style={{color:"var(--teal)"}}>{estA.length}</div><div className="kpi-l">Estrategias</div></div>
        <div className="kpi" onClick={()=>setView("pot")}><div className="kpi-icon">🏭</div><div className="kpi-v">{fmt(Math.round(totalKg))}</div><div className="kpi-l">Kg/año potencial</div></div>
        <div className="kpi" onClick={()=>setView("vis")}><div className="kpi-icon">👥</div><div className="kpi-v" style={{color:"var(--green)"}}>{visSem.length}</div><div className="kpi-l">Visitas sem.{sem}</div></div>
        <div className="kpi"><div className="kpi-icon">🔴</div><div className="kpi-v" style={{color:crit14?"var(--red)":"var(--green)"}}>{crit14}</div><div className="kpi-l">Críticos +14d</div></div>
      </div>
      <div className="ai-card">
        <h3>🧠 Briefing IA del día</h3>
        <p>Claude analiza todo el CRM y te dice qué hacer hoy, con nombres y prioridades.</p>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <button className="ai-btn" onClick={genBriefing} disabled={aiLoad}>{aiLoad?<><div className="spin" style={{width:14,height:14,borderWidth:2,borderColor:"rgba(255,255,255,.3)",borderTopColor:"#fff"}}/>Analizando...</>:"✨ Generar briefing"}</button>
          <button onClick={()=>setShowKey(!showKey)} style={{background:"none",border:"1px solid var(--border)",color:"var(--muted)",padding:"8px 12px",borderRadius:9,cursor:"pointer",fontSize:11}}>⚙️ API Key</button>
        </div>
        {showKey&&<div className="ai-key"><input type="password" defaultValue={apiKey} placeholder="sk-ant-..." id="kIn" onKeyDown={e=>e.key==="Enter"&&saveKey(e.target.value)}/><button onClick={()=>saveKey(document.getElementById("kIn").value)}>Guardar</button></div>}
        {aiRes&&<div className="ai-result">{aiRes}</div>}
      </div>
      <Card icon="🔥" title="Más urgentes" count={allPend.length} color="var(--red)" open={true}>
        {allPend.slice(0,10).map((it,i)=><ItemRow key={it.id||i} icon={it._mod} iconBg={it._modC+"12"} title={it.prod||it.cliente||it.clienteNombre||it.tipo||it.estrategia||"—"} sub={[it.cliente||it.clienteNombre,it.etapa||it.estado,nom(it._ag)].filter(Boolean).join(" · ")} age={it._d} rec={it._rec} onClick={()=>setDet(it)}/>)}
      </Card>
    </>;
  }

  function VModule({items,tipo,renderItem}){
    const b={c:0,u:0,a:0,n:0};items.forEach(i=>{if(i._d>=14)b.c++;else if(i._d>=7)b.u++;else if(i._d>=3)b.a++;else b.n++});
    const filtered=filtEdad(items);
    return <>
      <div className="aging">
        <div className={"ag"+(ageF==="all"?" sel":"")} onClick={()=>setAgeF("all")}>{items.length} Todos</div>
        {b.c>0&&<div className={"ag"+(ageF==="c"?" sel":"")} onClick={()=>setAgeF("c")} style={ageF!=="c"?{color:"var(--red)"}:{}}>{b.c} Crítico</div>}
        {b.u>0&&<div className={"ag"+(ageF==="u"?" sel":"")} onClick={()=>setAgeF("u")} style={ageF!=="u"?{color:"var(--amber)"}:{}}>{b.u} Urgente</div>}
        {b.a>0&&<div className={"ag"+(ageF==="a"?" sel":"")} onClick={()=>setAgeF("a")} style={ageF!=="a"?{color:"var(--blue)"}:{}}>{b.a} Atención</div>}
        <div className={"ag"+(ageF==="n"?" sel":"")} onClick={()=>setAgeF("n")} style={ageF!=="n"?{color:"var(--green)"}:{}}>{b.n} Normal</div>
      </div>
      {filtered.length?<div className="card"><div className="card-body">{filtered.slice(0,40).map(renderItem)}</div></div>:<div className="empty"><div className="empty-icon">✅</div>Todo al día</div>}
    </>;
  }

  function VInc(){return <VModule items={incA} renderItem={(i,idx)=><ItemRow key={i.id||idx} icon="🚨" iconBg="var(--redL)" title={i.clienteNombre||i.cliente||"—"} sub={[i.tipo,i.prioridad,nom(i._ag)].filter(Boolean).join(" · ")} age={i._d} rec={i._rec} onClick={()=>setDet(i)}/>}/>}
  function VOfe(){return <><div className="kpis"><div className="kpi"><div className="kpi-v" style={{color:"var(--amber)"}}>{ofeP.length}</div><div className="kpi-l">Pendientes</div></div><div className="kpi"><div className="kpi-v" style={{color:"var(--red)"}}>{ofeP.filter(o=>o._d>=7).length}</div><div className="kpi-l">{">"}7d sin respuesta</div></div></div><VModule items={ofeP} renderItem={(i,idx)=><ItemRow key={i.id||idx} icon="📄" iconBg="var(--amberL)" title={i.clienteNombre||"—"} sub={[(i.lineas||[]).length+" productos",nom(i._ag)].join(" · ")} age={i._d} rec={i._rec} onClick={()=>setDet(i)}/>}/></>}
  function VOps(){return <><div className="kpis"><div className="kpi"><div className="kpi-v" style={{color:"var(--blue)"}}>{fmt(valPipe)}€</div><div className="kpi-l">Pipeline</div></div><div className="kpi"><div className="kpi-v" style={{color:"var(--red)"}}>{opsA.filter(o=>o._d>=14).length}</div><div className="kpi-l">Estancadas +14d</div></div></div><VModule items={opsA} renderItem={(i,idx)=><ItemRow key={i.id||idx} icon="💼" iconBg="var(--blueL)" title={i.prod||i.cliente||"—"} sub={[i.cliente,i.etapa||i.estado,i.valor?fmt(i.valor)+"€":"",nom(i._ag)].filter(Boolean).join(" · ")} age={i._d} rec={i._rec} onClick={()=>setDet(i)}/>}/></>}
  function VMue(){return <VModule items={mueP} renderItem={(i,idx)=><ItemRow key={i.id||idx} icon="📦" iconBg="var(--purpleL)" title={i.prod||i.prodNombre||"—"} sub={[i.cliente||i.clienteNombre,nom(i._ag)].filter(Boolean).join(" · ")} age={i._d} rec={i._rec} onClick={()=>setDet(i)}/>}/>}
  function VEst(){return <><div className="kpis"><div className="kpi"><div className="kpi-v" style={{color:"var(--teal)"}}>{estA.filter(e=>e.estado==="en_curso").length}</div><div className="kpi-l">En curso</div></div><div className="kpi"><div className="kpi-v" style={{color:"var(--amber)"}}>{estA.filter(e=>e.estado==="pendiente_aprobacion").length}</div><div className="kpi-l">Pend. aprobar</div></div></div><VModule items={estA} renderItem={(i,idx)=><ItemRow key={i.id||idx} icon="🎯" iconBg="var(--tealL)" title={i.clienteNombre||i.cliente||"—"} sub={[(i.estrategia||"").slice(0,40),i.estado==="pendiente_aprobacion"?"⏳ Pend.":"▶ En curso",nom(i._ag)].filter(Boolean).join(" · ")} age={i._d} rec={i._rec} onClick={()=>setDet(i)}/>}/></>}
  function VPot(){return <><div className="kpis"><div className="kpi"><div className="kpi-v">{potA.length}</div><div className="kpi-l">Clientes</div></div><div className="kpi"><div className="kpi-v" style={{color:"var(--green)"}}>{fmt(Math.round(totalKg))}</div><div className="kpi-l">Kg/año total</div></div></div><div className="card"><div className="card-body">{potA.slice(0,40).map((p,i)=><ItemRow key={p.id||i} icon="🏭" iconBg="var(--greenL)" title={p.clienteNombre||"—"} sub={p._lin+" líneas · "+fmt(Math.round(p._kg))+" kg/año · "+nom(p._ag)} age={-1} onClick={()=>setDet(p)}/>)}</div></div></>}
  function VVis(){
    return <>
      <div className="ai-card">
        <h3>🧠 Análisis IA de visitas</h3>
        <p>Claude lee las notas de las visitas y detecta señales de compra, quejas y oportunidades.</p>
        <button className="ai-btn" onClick={genVisitas} disabled={aiVisL}>{aiVisL?<><div className="spin" style={{width:14,height:14,borderWidth:2,borderColor:"rgba(255,255,255,.3)",borderTopColor:"#fff"}}/>Analizando...</>:"🔍 Analizar visitas"}</button>
        {aiVis&&<div className="ai-result">{aiVis}</div>}
      </div>
      <div className="kpis">
        <div className="kpi"><div className="kpi-v" style={{color:"var(--green)"}}>{visSem.length}</div><div className="kpi-l">Sem. {sem}</div></div>
        <div className="kpi"><div className="kpi-v">{visPrev.length}</div><div className="kpi-l">Sem. {sem-1}</div></div>
      </div>
      <Card icon="👥" title="Por agente" open={true}><div className="card-body" style={{padding:0}}>
        {USR.map(u=>{const mis=visSem.filter(v=>{const a=(v.agente||"").toUpperCase();return[u.id,u.ga].some(x=>x&&x.toUpperCase()===a)});const ped=mis.filter(v=>v.resultado==="pedido").length;
          return <div key={u.id} className="item-row" style={{cursor:"default"}}>
            <div style={{width:8,height:8,borderRadius:4,background:u.c,flexShrink:0}}/>
            <div style={{flex:1,fontWeight:700,fontSize:13}}>{u.n}</div>
            <div style={{fontWeight:800,fontSize:15,minWidth:30,textAlign:"center"}}>{mis.length}</div>
            {ped>0&&<span style={{background:"var(--greenL)",color:"var(--greenD)",fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:99}}>{ped} ped</span>}
            {mis.length===0&&<span style={{color:"var(--red)",fontSize:10,fontWeight:600}}>Sin visitas</span>}
          </div>})}
      </div></Card>
      {visSem.length>0&&<Card icon="📋" title="Detalle" count={visSem.length} color="var(--green)" open={false}>
        {visSem.map((v,i)=><ItemRow key={i} icon={v.resultado==="pedido"?"✅":v.resultado==="seguimiento"?"🔄":"📝"} iconBg={v.resultado==="pedido"?"var(--greenL)":"var(--amberL)"} title={v.clienteNombre||"—"} sub={[v.resultado,nom(v.agente),(v.notas||"").slice(0,80)].filter(Boolean).join(" · ")} age={-1} onClick={()=>setDet(v)}/>)}
      </Card>}
    </>;
  }
  function VEq(){
    return <div className="card"><div className="card-body" style={{overflowX:"auto"}}>
      <table className="tbl"><thead><tr><th>Agente</th><th>Eq</th><th style={{color:"var(--red)"}}>Inc</th><th style={{color:"var(--amber)"}}>Ofe</th><th style={{color:"var(--blue)"}}>Ops</th><th style={{color:"var(--purple)"}}>Mue</th><th style={{color:"var(--teal)"}}>Est</th><th style={{color:"var(--green)"}}>Vis</th><th>Pipe</th><th>🔴</th></tr></thead>
      <tbody>{USR.map(u=>{const ids=new Set([u.id,u.ga].filter(Boolean).map(x=>x.toUpperCase()));const m=i=>ids.has((i.agente||i.autor||i.agenteId||"").toUpperCase());
        const mI=D.inc.filter(i=>m(i)&&(i.estado==="abierta"||i.estado==="en_gestion")).length;
        const mO=D.ofe.filter(i=>!i.eliminada&&(i.estado==="pendiente"||!i.estado)&&m(i)).length;
        const mOps=D.ops.filter(o=>!o.eliminada&&m(o)&&!["ganada","perdida","cerrada_ganada","cerrada_perdida"].includes(o.etapa||o.estado));
        const mM=D.mue.filter(i=>!i.eliminada&&i.estado==="pendiente"&&m(i)).length;
        const mE=D.est.filter(i=>!i.eliminada&&(i.estado==="en_curso"||i.estado==="pendiente_aprobacion")&&m(i)).length;
        const mV=D.vis.filter(v=>m(v)&&+v.semana===sem).length;
        const pipe=mOps.reduce((s,o)=>s+(+o.valor||0),0);
        const cr=[...D.inc.filter(i=>m(i)&&(i.estado==="abierta"||i.estado==="en_gestion")),...mOps,...D.mue.filter(i=>!i.eliminada&&i.estado==="pendiente"&&m(i))].filter(x=>diasD(x.fecha||x.creadaEn||x.fechaCreacion)>=14).length;
        return <tr key={u.id}><td style={{fontWeight:700,color:u.c}}>{u.n}</td><td>{u.eq}</td>
          <td style={{fontWeight:700,color:mI?"var(--red)":"var(--muted)"}}>{mI||"—"}</td>
          <td style={{fontWeight:700,color:mO?"var(--amber)":"var(--muted)"}}>{mO||"—"}</td>
          <td style={{fontWeight:700,color:mOps.length?"var(--blue)":"var(--muted)"}}>{mOps.length||"—"}</td>
          <td style={{fontWeight:700,color:mM?"var(--purple)":"var(--muted)"}}>{mM||"—"}</td>
          <td style={{fontWeight:700,color:mE?"var(--teal)":"var(--muted)"}}>{mE||"—"}</td>
          <td style={{fontWeight:700,color:mV?"var(--green)":"var(--muted)"}}>{mV||"—"}</td>
          <td style={{fontSize:11}}>{pipe?fmt(pipe)+"€":"—"}</td>
          <td>{cr>0?<span style={{color:"var(--red)",fontWeight:800}}>{cr}</span>:<span style={{color:"var(--green)"}}>✓</span>}</td></tr>})}</tbody></table>
    </div></div>;
  }

  const tabs=[
    {id:"hoy",l:"📊 Hoy",b:crit14,bc:"var(--redL)",bt:"var(--red)"},
    {id:"inc",l:"🚨 Inc",b:incA.length,bc:"var(--redL)",bt:"var(--red)"},
    {id:"ofe",l:"📄 Ofertas",b:ofeP.length,bc:"var(--amberL)",bt:"var(--amber)"},
    {id:"ops",l:"💼 Ops",b:opsA.length,bc:"var(--blueL)",bt:"var(--blue)"},
    {id:"mue",l:"📦 Muestras",b:mueP.length,bc:"var(--purpleL)",bt:"var(--purple)"},
    {id:"est",l:"🎯 Estr",b:estA.length,bc:"var(--tealL)",bt:"var(--teal)"},
    {id:"pot",l:"🏭 Potencial"},
    {id:"vis",l:"👥 Visitas",b:visSem.length,bc:"var(--greenL)",bt:"var(--greenD)"},
    {id:"eq",l:"📋 Equipo"},
  ];
  const views={hoy:VHoy,inc:VInc,ofe:VOfe,ops:VOps,mue:VMue,est:VEst,pot:VPot,vis:VVis,eq:VEq};
  const V=views[view];

  return <>
    <div className="header">
      <div className="header-top">
        <div><h1>🎯 Centro de Mando</h1><div className="header-sub">Sem. {sem} · {new Date().toLocaleDateString("es-ES")}</div></div>
        <div className="header-filters">
          <select value={eqF} onChange={e=>{setEqF(e.target.value);setAgF("todos")}}><option value="todos">Todos</option><option value="WIKUK">WIKUK</option><option value="INTERKEY">INTERKEY</option></select>
          <select value={agF} onChange={e=>setAgF(e.target.value)}><option value="todos">Agentes</option>{(eqF==="todos"?USR:USR.filter(a=>a.eq===eqF)).map(a=><option key={a.id} value={a.id}>{a.n}</option>)}</select>
        </div>
      </div>
    </div>
    <div className="tabs">
      {tabs.map(t=><button key={t.id} className={"tab"+(view===t.id?" act":"")} onClick={()=>{setView(t.id);setAgeF("all")}}>
        {t.l}{t.b>0&&<span className="tb" style={{background:view===t.id?"var(--navy)":t.bc,color:view===t.id?"#fff":t.bt}}>{t.b}</span>}
      </button>)}
    </div>
    <div className="page">{V&&<V/>}</div>
    <Modal item={det} onClose={()=>setDet(null)}/>
  </>;
}
ReactDOM.render(<App/>,document.getElementById("app"));
</script>
</body>
</html>
