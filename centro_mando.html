<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Centro de Mando — Grupo Consolidado</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0B0F1A;--bg2:#111827;--bg3:#1F2937;--bg4:#374151;--border:#2D3748;--text:#F9FAFB;--text2:#D1D5DB;--text3:#9CA3AF;--text4:#6B7280;--green:#10B981;--greenBg:rgba(16,185,129,.12);--amber:#F59E0B;--amberBg:rgba(245,158,11,.12);--red:#EF4444;--redBg:rgba(239,68,68,.12);--blue:#3B82F6;--blueBg:rgba(59,130,246,.12);--purple:#8B5CF6;--purpleBg:rgba(139,92,246,.12);--teal:#06B6D4;--tealBg:rgba(6,182,212,.12);--font:'DM Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace}
html{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;-webkit-font-smoothing:antialiased}
body{min-height:100vh}

.app{display:flex;height:100vh;overflow:hidden}
.side{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.side-logo{padding:18px 16px;border-bottom:1px solid var(--border)}
.side-logo h1{font-size:14px;font-weight:800}
.side-logo p{font-size:10px;color:var(--text4);margin-top:2px}
.side-nav{flex:1;padding:8px;overflow-y:auto}
.side-section{font-size:9px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.12em;padding:14px 10px 6px}
.ni{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:9px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text3);transition:all .12s}
.ni:hover{background:var(--bg3);color:var(--text)}
.ni.act{background:rgba(59,130,246,.15);color:var(--blue);font-weight:700}
.ni .bdg{margin-left:auto;font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px;font-family:var(--mono)}
.ni-icon{font-size:15px;width:20px;text-align:center}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.top{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;background:var(--bg2);flex-wrap:wrap}
.top h2{font-size:15px;font-weight:800;flex:1;min-width:180px}
.top select{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:5px 9px;border-radius:7px;font-size:11px;font-family:var(--font);cursor:pointer}
.cnt{flex:1;overflow-y:auto;padding:16px 20px 40px}

/* Aging bar */
.aging{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.aging-pill{padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:var(--bg2);transition:all .12s;display:flex;align-items:center;gap:6px}
.aging-pill:hover{border-color:var(--text4)}
.aging-pill.sel{border-color:var(--blue);background:var(--blueBg);color:var(--blue)}
.aging-pill .n{font-family:var(--mono);font-size:13px}
.aging-pill .l{color:var(--text4)}

/* KPI row */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
.kpi-l{font-size:10px;font-weight:600;color:var(--text4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.kpi-v{font-size:22px;font-weight:800;font-family:var(--mono)}
.kpi-s{font-size:10px;color:var(--text4);margin-top:2px}

/* Table */
.tbl{width:100%;border-collapse:collapse;background:var(--bg2);border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.tbl th{text-align:left;padding:10px 14px;font-size:10px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.06em;background:var(--bg3);border-bottom:1px solid var(--border);white-space:nowrap}
.tbl td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--bg3)}
.tbl tr{cursor:pointer}
.edad-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;font-family:var(--mono);white-space:nowrap}
.rec{font-size:11px;color:var(--amber);font-style:italic;display:block;margin-top:2px;white-space:normal}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;width:92%;max-width:580px;max-height:80vh;overflow-y:auto}
.modal-h{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-h h3{font-size:14px;font-weight:800}
.modal-x{background:var(--bg3);border:none;color:var(--text3);width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.modal-x:hover{background:var(--bg4)}
.modal-b{padding:14px 18px}
.dr{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.dr:last-child{border-bottom:none}
.dr-l{color:var(--text4)}
.dr-v{font-weight:600;text-align:right;max-width:60%;word-break:break-word}

@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:900px){.side{display:none}.kpis{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.kpis{grid-template-columns:1fr}.cnt{padding:12px}}
</style>
</head>
