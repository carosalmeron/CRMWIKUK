<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Centro de Mando — Grupo Consolidado</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;0,800;1,400&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0B0F1A;--bg2:#111827;--bg3:#1F2937;--bg4:#374151;
  --border:#2D3748;--border2:#4A5568;
  --text:#F9FAFB;--text2:#D1D5DB;--text3:#9CA3AF;--text4:#6B7280;
  --green:#10B981;--greenBg:rgba(16,185,129,.12);
  --amber:#F59E0B;--amberBg:rgba(245,158,11,.12);
  --red:#EF4444;--redBg:rgba(239,68,68,.12);
  --blue:#3B82F6;--blueBg:rgba(59,130,246,.12);
  --purple:#8B5CF6;--purpleBg:rgba(139,92,246,.12);
  --teal:#06B6D4;--tealBg:rgba(6,182,212,.12);
  --radius:12px;--radius2:16px;
  --font:'DM Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
html{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}
body{min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{padding:20px 18px;border-bottom:1px solid var(--border)}
.sidebar-logo h1{font-size:15px;font-weight:800;letter-spacing:-.02em}
.sidebar-logo p{font-size:11px;color:var(--text4);margin-top:2px}
.sidebar-nav{flex:1;padding:12px 10px;overflow-y:auto}
.nav-section{font-size:10px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.1em;padding:12px 10px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text3);transition:all .15s}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(59,130,246,.15);color:var(--blue);font-weight:700}
.nav-item .badge{margin-left:auto;background:var(--redBg);color:var(--red);font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;font-family:var(--mono)}
.nav-icon{font-size:16px;width:22px;text-align:center}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;background:var(--bg2);flex-wrap:wrap}
.topbar h2{font-size:16px;font-weight:800;flex:1;min-width:200px}
.topbar-filter{display:flex;gap:8px;align-items:center}
.topbar-filter select{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:6px 10px;border-radius:8px;font-size:12px;font-family:var(--font);cursor:pointer}
.content{flex:1;overflow-y:auto;padding:20px 24px 40px}
.grid{display:grid;gap:14px}
.grid-4{grid-template-columns:repeat(4,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-2{grid-template-columns:repeat(2,1fr)}
.kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:18px 20px}
.kpi-label{font-size:11px;font-weight:600;color:var(--text4);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.kpi-val{font-size:26px;font-weight:800;letter-spacing:-.03em;font-family:var(--mono)}
.kpi-sub{font-size:11px;color:var(--text4);margin-top:4px}
.kpi-bar{height:4px;border-radius:2px;background:var(--bg4);margin-top:10px;overflow:hidden}
.kpi-bar-fill{height:100%;border-radius:2px;transition:width .6s ease}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);overflow:hidden}
.card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-header h3{font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px}
.card-body{padding:0}
.action-row{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.action-row:last-child{border-bottom:none}
.action-row:hover{background:var(--bg3)}
.action-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.action-info{flex:1;min-width:0}
.action-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.action-sub{font-size:11px;color:var(--text4);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.action-badge{font-size:10px;font-weight:700;padding:4px 10px;border-radius:99px;white-space:nowrap;font-family:var(--mono)}
.action-arrow{color:var(--text4);font-size:14px;flex-shrink:0}
.action-rec{font-size:11px;color:var(--amber);font-style:italic;margin-top:2px}
.pipe-stage{display:flex;align-items:center;gap:12px;padding:10px 18px;border-bottom:1px solid var(--border)}
.pipe-stage:last-child{border-bottom:none}
.pipe-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.pipe-label{font-size:12px;font-weight:600;min-width:90px}
.pipe-count{font-size:13px;font-weight:800;font-family:var(--mono);min-width:30px;text-align:right}
.pipe-val{font-size:11px;color:var(--text4);min-width:80px;text-align:right;font-family:var(--mono)}
.pipe-bar-bg{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.pipe-bar-fill{height:100%;border-radius:3px}
.team-row{display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid var(--border)}
.team-row:last-child{border-bottom:none}
.team-avatar{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0}
.team-name{font-size:13px;font-weight:600;min-width:80px}
.team-stat{text-align:center;min-width:44px}
.team-stat-val{font-size:14px;font-weight:800;font-family:var(--mono)}
.team-stat-label{font-size:9px;color:var(--text4);text-transform:uppercase}
.heat-row{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.heat-row:hover{background:var(--bg3)}
.heat-row:last-child{border-bottom:none}
.heat-score{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;font-family:var(--mono);flex-shrink:0}
.heat-pills{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px}
.heat-pill{font-size:9px;padding:2px 6px;border-radius:6px;font-weight:600}
.tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.tab-btn{padding:8px 14px;border-radius:8px;border:none;background:transparent;color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .15s}
.tab-btn:hover{background:var(--bg3);color:var(--text)}
.tab-btn.active{background:var(--blue);color:#fff}
.section-title{font-size:11px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.1em;margin:24px 0 12px;display:flex;align-items:center;gap:8px}
.section-title:first-child{margin-top:0}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);width:90%;max-width:600px;max-height:80vh;overflow-y:auto}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:15px;font-weight:800}
.modal-close{background:var(--bg3);border:none;color:var(--text3);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--bg4);color:var(--text)}
.modal-body{padding:16px 20px}
.detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.detail-row:last-child{border-bottom:none}
.detail-label{color:var(--text4)}
.detail-val{font-weight:600;text-align:right;max-width:60%;word-break:break-word}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:1100px){.grid-4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){.sidebar{display:none}.grid-4,.grid-3,.grid-2{grid-template-columns:1fr}.topbar{padding:12px 16px}.content{padding:16px}}
</style>
</head>
<body>
<div id="app"><div style="display:flex;align-items:center;justify-content:center;height:100vh;gap:12px;color:#6B7280"><div style="width:28px;height:28px;border:3px solid #374151;border-top-color:#3B82F6;border-radius:50%;animation:spin .8s linear infinite"></div>Cargando Centro de Mando...</div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<script>
"use strict";

// Firebase
var FB="https://firestore.googleapis.com/v1/projects/grupo-consolidado-crm/databases/(default)/documents";
function pv(v){if(!v)return undefined;if("stringValue"in v)return v.stringValue;if("integerValue"in v)return+v.integerValue;if("doubleValue"in v)return+v.doubleValue;if("booleanValue"in v)return v.booleanValue;if("nullValue"in v)return null;if("timestampValue"in v)return v.timestampValue;if("arrayValue"in v)return(v.arrayValue.values||[]).map(pv);if("mapValue"in v){var o={};Object.entries(v.mapValue.fields||{}).forEach(function(e){o[e[0]]=pv(e[1])});return o}return undefined}

function fbLeer(col){return fetch(FB+"/"+col+"?pageSize=300",{cache:"no-store"}).then(function(r){return r.json()}).then(function(d){var docs=d.documents?d.documents.map(fromFS):[];function paginar(token,acc,n){if(!token||n>20)return Promise.resolve(acc);return fetch(FB+"/"+col+"?pageSize=300&pageToken="+token,{cache:"no-store"}).then(function(r2){return r2.json()}).then(function(d2){var more=d2.documents?d2.documents.map(fromFS):[];return paginar(d2.nextPageToken,acc.concat(more),n+1)})}return paginar(d.nextPageToken,docs,0)}).catch(function(){return[]})}

// Usuarios
var USUARIOS=[
  {id:"wk1",nombre:"David Mag",equipo:"WIKUK",color:"#22C55E",grupoAgente:"DAVIDMAG"},
  {id:"wk2",nombre:"Verónica",equipo:"WIKUK",color:"#10B981",grupoAgente:"VERONICA"},
  {id:"wk3",nombre:"Silvia",equipo:"WIKUK",color:"#059669",grupoAgente:"SILVIA"},
  {id:"rpiedra",nombre:"Ramon",equipo:"WIKUK",color:"#E11D48",grupoAgente:"RPIEDRA"},
  {id:"jl",nombre:"Jose Luis",equipo:"WIKUK",color:"#6366F1",grupoAgente:"JLGARCIA"},
  {id:"ik1",nombre:"Carlos G.",equipo:"INTERKEY",color:"#F59E0B",grupoAgente:"CARLOSG"},
  {id:"ik2",nombre:"Ricardo",equipo:"INTERKEY",color:"#D97706",grupoAgente:"RICARDO"},
  {id:"ik4",nombre:"Azarco",equipo:"INTERKEY",color:"#78350F",grupoAgente:"AZARCO"},
];
function nomAg(id){if(!id)return"—";var up=id.toUpperCase();var u=USUARIOS.find(function(x){return[x.id,x.grupoAgente,x.nombre].some(function(y){return y&&y.toUpperCase()===up})});return u?u.nombre:id}
function eqAg(id){if(!id)return"";var up=id.toUpperCase();var u=USUARIOS.find(function(x){return[x.id,x.grupoAgente].some(function(y){return y&&y.toUpperCase()===up})});return u?u.equipo:""}
function colAg(id){var up=(id||"").toUpperCase();var u=USUARIOS.find(function(x){return[x.id,x.grupoAgente].some(function(y){return y&&y.toUpperCase()===up})});return u?u.color:"#6B7280"}
var fmt=function(n){return new Intl.NumberFormat("es-ES").format(n)};
function getSem(){var d=new Date(),s=new Date(d.getFullYear(),0,1);return Math.ceil(((d-s)/864e5+s.getDay()+1)/7)}
function parseD(d){if(!d)return null;if(d instanceof Date)return d;if(typeof d==="string"){if(d.match(/^\d{4}-\d{2}/)||d.includes("T"))return new Date(d);var p=d.split("/");if(p.length>=2){var day=+p[0],mo=+p[1]-1,yr=p[2]?+p[2]:2026;if(yr<100)yr+=2000;return new Date(yr,mo,day)}}if(typeof d==="number"&&d>1e9)return new Date(d>1e10?d:d*1e3);return null}
function diasD(f){var d=parseD(f);if(!d||isNaN(d))return-1;return Math.floor((new Date()-d)/864e5)}
function sem2f(s){if(!s)return null;var d=new Date(2026,0,1);d.setDate(d.getDate()+(s-1)*7);return d}

// Scoring
function calcScore(item){var s=0,d=item._dias||0;if(d>30)s+=50;else if(d>14)s+=35;else if(d>7)s+=20;else if(d>3)s+=10;var p={incidencia:30,oportunidad:25,oferta:20,muestra:15,estrategia:10};s+=(p[item._tipo]||5);if(item.valor>50000)s+=20;else if(item.valor>10000)s+=12;else if(item.valor>0)s+=5;if(item.prioridad==="urgente")s+=25;else if(item.prioridad==="alta")s+=15;s+=(item._cp||0)*5;return Math.min(s,100)}
function reco(item){var t=item._tipo,d=item._dias;if(t==="incidencia"){if(d>7)return"⚡ Escalar al responsable inmediatamente";if(d>3)return"📞 Llamar al cliente para actualizar";return"👀 Revisar y asignar solución"}if(t==="oportunidad"){if(d>21)return"🚨 Riesgo de perder — contactar hoy";if(d>7)return"📞 Seguimiento urgente";return"📧 Enviar propuesta actualizada"}if(t==="oferta"){if(d>10)return"📞 Llamar para cerrar — se enfría";if(d>5)return"📧 Recordatorio al cliente";return"⏳ Dentro de plazo"}if(t==="muestra"){if(d>14)return"📞 Pedir feedback urgente";if(d>7)return"📧 Email seguimiento muestra";return"⏳ Esperar unos días más"}if(t==="estrategia")return"✅ Aprobar o redirigir";return"📋 Revisar"}
function sCol(s){return s>=60?"var(--red)":s>=35?"var(--amber)":s>=15?"var(--blue)":"var(--green)"}
function sBg(s){return s>=60?"var(--redBg)":s>=35?"var(--amberBg)":s>=15?"var(--blueBg)":"var(--greenBg)"}
function tIcon(t){return{oportunidad:"💼",muestra:"📦",estrategia:"🎯",incidencia:"🚨",oferta:"📄"}[t]||"📋"}
function tBg(t){return{oportunidad:"var(--blueBg)",muestra:"var(--purpleBg)",estrategia:"var(--tealBg)",incidencia:"var(--redBg)",oferta:"var(--amberBg)"}[t]||"var(--bg3)"}

function App(){
  var _s=React.useState,_e=React.useEffect;
  var s1=_s(null),data=s1[0],setData=s1[1];
  var s2=_s(true),loading=s2[0],setLoading=s2[1];
  var s3=_s("resumen"),view=s3[0],setView=s3[1];
  var s4=_s("todos"),eqF=s4[0],setEqF=s4[1];
  var s5=_s("todos"),agF=s5[0],setAgF=s5[1];
  var s6=_s(null),detail=s6[0],setDetail=s6[1];
  var s7=_s("todos"),filtroT=s7[0],setFiltroT=s7[1];

  _e(function(){
    Promise.all([fbLeer("oportunidades"),fbLeer("muestras"),fbLeer("estrategias"),fbLeer("incidencias"),fbLeer("ofertas"),fbLeer("visitas"),fbLeer("clientes")]).then(function(r){
      setData({ops:r[0],mue:r[1],est:r[2],inc:r[3],ofe:r[4],vis:r[5],cli:r[6]});setLoading(false);
    });
  },[]);

  if(loading)return h("div",{className:"app"},h("div",{style:{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:12,color:"#6B7280"}},h("div",{style:{width:28,height:28,border:"3px solid #374151",borderTopColor:"#3B82F6",borderRadius:"50%",animation:"spin .8s linear infinite"}}),h("span",null,"Cargando datos de Firebase...")));

  var ops=data.ops,mue=data.mue,est=data.est,inc=data.inc,ofe=data.ofe,vis=data.vis;

  function fil(arr){return(arr||[]).filter(function(item){if(item.eliminada||item.eliminado)return false;var ag=item.agente||item.autor||item.agenteId||"";if(eqF!=="todos"&&eqAg(ag)!==eqF)return false;if(agF!=="todos"){var up=(ag||"").toUpperCase();var uA=USUARIOS.find(function(u){return u.id===agF});if(!uA)return false;if(![uA.id,uA.grupoAgente].some(function(x){return x&&x.toUpperCase()===up}))return false}return true})}

  // Items activos
  var opsA=fil(ops).filter(function(o){return!["ganada","perdida","cerrada_ganada","cerrada_perdida"].includes(o.etapa||o.estado)}).map(function(o){var acts=o.actividad||[];var ua=acts.length>0?(acts[acts.length-1]||{}).fecha:null;var f=ua||o.fecha||o.creadaEn;var d=diasD(f);return Object.assign({},o,{_tipo:"oportunidad",_dias:d>=0?d:0,_f:f,_ag:o.agente||o.agenteId})});
  var mueP=fil(mue).filter(function(m){return m.estado==="pendiente"}).map(function(m){var f=m.fecha||sem2f(m.semana);var d=diasD(f);return Object.assign({},m,{_tipo:"muestra",_dias:d>=0?d:0,_f:f,_ag:m.agente})});
  var estA=fil(est).filter(function(e){return e.estado==="en_curso"||e.estado==="pendiente_aprobacion"}).map(function(e){var f=e.fecha||sem2f(e.semana);var d=diasD(f);return Object.assign({},e,{_tipo:"estrategia",_dias:d>=0?d:0,_f:f,_ag:e.agente})});
  var incA=fil(inc).filter(function(i){return i.estado==="abierta"||i.estado==="en_gestion"}).map(function(i){var d=diasD(i.fecha);return Object.assign({},i,{_tipo:"incidencia",_dias:d>=0?d:0,_f:i.fecha,_ag:i.autor||i.agente})});
  var ofeP=fil(ofe).filter(function(o){return o.estado==="pendiente"||!o.estado}).map(function(o){var f=o.fechaCreacion||o.fechaCreacionStr;var d=diasD(f);return Object.assign({},o,{_tipo:"oferta",_dias:d>=0?d:0,_f:f,_ag:o.agente})});

  // Cross-pressure
  var cp={};[].concat(opsA,mueP,incA,ofeP).forEach(function(i){var cn=(i.cliente||i.clienteNombre||"").toUpperCase();if(cn)cp[cn]=(cp[cn]||0)+1});

  var todos=[].concat(opsA,mueP,estA,incA,ofeP).map(function(i){var cn=(i.cliente||i.clienteNombre||"").toUpperCase();i._cp=cp[cn]||0;i._score=calcScore(i);i._rec=reco(i);return i}).sort(function(a,b){return b._score-a._score});

  var criticos=todos.filter(function(i){return i._score>=60});
  var urgentes=todos.filter(function(i){return i._score>=35&&i._score<60});
  var valPipe=opsA.reduce(function(s,o){return s+(+o.valor||0)},0);
  var opsGan=fil(ops).filter(function(o){return["ganada","cerrada_ganada"].includes(o.etapa||o.estado)});
  var valGan=opsGan.reduce(function(s,o){return s+(+o.valor||0)},0);
  var visSem=fil(vis).filter(function(v){return+v.semana===getSem()});

  // Pipeline
  var etapas=[{id:"prospecto",l:"🌱 Prospecto",c:"#6B7280"},{id:"propuesta",l:"📋 Propuesta",c:"#3B82F6"},{id:"negociacion",l:"🤝 Negociación",c:"#F59E0B"},{id:"_otro",l:"⚪ Sin estado",c:"#9CA3AF"}];
  var pipeD=etapas.map(function(et){var items=opsA.filter(function(o){var e=o.etapa||o.estado||"_otro";if(et.id==="_otro")return!["prospecto","propuesta","negociacion"].includes(e);return e===et.id});return{id:et.id,l:et.l,c:et.c,n:items.length,v:items.reduce(function(s,o){return s+(+o.valor||0)},0),items:items}});
  var maxP=Math.max.apply(null,pipeD.map(function(p){return p.n}).concat([1]));

  // Heat map
  var cMap={};todos.forEach(function(i){var cn=(i.cliente||i.clienteNombre||"").toUpperCase();if(!cn||cn.length<2)return;if(!cMap[cn])cMap[cn]={n:cn,items:[],sc:0,ops:0,mue:0,inc:0,ofe:0,est:0};cMap[cn].items.push(i);cMap[cn][i._tipo==="oportunidad"?"ops":i._tipo==="muestra"?"mue":i._tipo==="incidencia"?"inc":i._tipo==="oferta"?"ofe":"est"]++;cMap[cn].sc=Math.max(cMap[cn].sc,i._score)});
