<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Centro de Mando IA — Grupo Consolidado</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#04060C;--bg2:#0C1222;--bg3:#151D33;--bg4:#1E2A48;--bg5:#283660;
  --border:#1C2844;--border2:#2A3E6B;
  --text:#E8ECF4;--text2:#B8C5DA;--text3:#7B8EAF;--text4:#4F6489;
  --acc:#4F8CFF;--accL:#1A3A7A;--accBg:rgba(79,140,255,.1);
  --green:#34D399;--greenBg:rgba(52,211,153,.1);
  --amber:#FBBF24;--amberBg:rgba(251,191,36,.1);
  --red:#F87171;--redBg:rgba(248,113,113,.1);
  --purple:#A78BFA;--purpleBg:rgba(167,139,250,.1);
  --teal:#22D3EE;--tealBg:rgba(34,211,238,.1);
  --orange:#FB923C;--orangeBg:rgba(251,146,60,.1);
  --font:'Outfit',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
html{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;-webkit-font-smoothing:antialiased}
body{min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:3px}

/* Layout */
.app{display:flex;height:100vh;overflow:hidden}
.side{width:230px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:10}
.side-head{padding:20px 16px;border-bottom:1px solid var(--border)}
.side-head h1{font-size:15px;font-weight:800;background:linear-gradient(135deg,var(--acc),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.side-head p{font-size:10px;color:var(--text4);margin-top:3px;font-weight:500}
.side-nav{flex:1;padding:8px;overflow-y:auto}
.side-sec{font-size:9px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.14em;padding:14px 10px 6px}
.ni{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:10px;cursor:pointer;font-size:12.5px;font-weight:500;color:var(--text3);transition:all .15s;margin-bottom:1px}
.ni:hover{background:var(--bg3);color:var(--text)}
.ni.act{background:var(--accBg);color:var(--acc);font-weight:700;border:1px solid rgba(79,140,255,.2)}
.ni .ic{font-size:15px;width:22px;text-align:center}
.ni .bdg{margin-left:auto;font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;font-family:var(--mono)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.top{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;background:var(--bg2);flex-wrap:wrap}
.top h2{font-size:16px;font-weight:800;flex:1;min-width:180px;letter-spacing:-.02em}
.top select{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:6px 10px;border-radius:8px;font-size:11px;font-family:var(--font);cursor:pointer;font-weight:500}
.cnt{flex:1;overflow-y:auto;padding:20px 24px 60px}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px;transition:border-color .2s}
.card:hover{border-color:var(--border2)}
.card-h{padding:14px 18px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.card-h h3{font-size:13px;font-weight:700;flex:1;display:flex;align-items:center;gap:8px}
.card-h .cnt-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;font-family:var(--mono)}
.card-h .chevron{color:var(--text4);font-size:18px;transition:transform .2s}
.card-h .chevron.open{transform:rotate(180deg)}
.card-body{border-top:1px solid var(--border)}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:16px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 18px;transition:border-color .2s,transform .15s}
.kpi:hover{border-color:var(--border2);transform:translateY(-1px)}
.kpi-l{font-size:10px;font-weight:600;color:var(--text4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.kpi-v{font-size:24px;font-weight:800;font-family:var(--mono);letter-spacing:-.03em}
.kpi-s{font-size:10px;color:var(--text4);margin-top:3px;font-weight:500}

/* Table */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:9px 14px;font-size:10px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.06em;background:var(--bg3);border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:1}
.tbl td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(79,140,255,.03)}
.tbl tr{cursor:pointer;transition:background .1s}
.age{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;font-family:var(--mono);white-space:nowrap;display:inline-block}
.rec{font-size:11px;color:var(--amber);font-style:italic;display:block;margin-top:2px;white-space:normal;max-width:250px}

/* AI Panel */
.ai-box{background:linear-gradient(135deg,rgba(79,140,255,.06),rgba(34,211,238,.04));border:1px solid rgba(79,140,255,.2);border-radius:14px;padding:20px;margin-bottom:16px}
.ai-box h3{font-size:14px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.ai-btn{background:linear-gradient(135deg,#4F8CFF,#22D3EE);border:none;color:#fff;padding:10px 20px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);transition:opacity .15s,transform .1s;display:inline-flex;align-items:center;gap:8px}
.ai-btn:hover{opacity:.9;transform:translateY(-1px)}
.ai-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.ai-result{background:var(--bg3);border-radius:10px;padding:16px 18px;margin-top:14px;font-size:12.5px;line-height:1.7;color:var(--text2);white-space:pre-wrap;max-height:500px;overflow-y:auto}
.ai-result strong{color:var(--acc);font-weight:700}
.ai-typing{display:inline-block;width:8px;height:8px;background:var(--acc);border-radius:50%;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

/* Aging filter */
.aging{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.ag-pill{padding:7px 14px;border-radius:9px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--bg2);transition:all .15s;display:flex;align-items:center;gap:6px}
.ag-pill:hover{border-color:var(--text4)}
.ag-pill.sel{border-color:var(--acc);background:var(--accBg);color:var(--acc)}

/* Detail modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);animation:fadeIn .15s}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:92%;max-width:600px;max-height:82vh;overflow-y:auto;animation:slideUp .2s}
.modal-h{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:1;border-radius:16px 16px 0 0}
.modal-h h3{font-size:15px;font-weight:800}
.modal-x{background:var(--bg4);border:none;color:var(--text3);width:30px;height:30px;border-radius:9px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.modal-x:hover{background:var(--bg5)}
.modal-b{padding:16px 20px}
.dr{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:12.5px;gap:12px}
.dr:last-child{border-bottom:none}
.dr-l{color:var(--text4);flex-shrink:0}
.dr-v{font-weight:600;text-align:right;word-break:break-word}

/* Animations */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.spinner{width:20px;height:20px;border:2.5px solid var(--bg4);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}

/* Responsive */
@media(max-width:900px){.side{display:none}.kpis{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.kpis{grid-template-columns:1fr}.cnt{padding:14px 12px}.top{padding:10px 14px}}
</style>
</head>
<body>
<div id="app"><div style="display:flex;align-items:center;justify-content:center;height:100vh;gap:12px;color:#4F6489"><div class="spinner" style="width:28px;height:28px"></div><span style="font-family:Outfit,sans-serif">Iniciando Centro de Mando...</span></div></div>

<script type="text/babel" data-presets="react">
const {useState,useEffect,useCallback,useMemo,useRef}=React;

// ═══════════════════════════════════════════════════════════
// FIREBASE
// ═══════════════════════════════════════════════════════════
const FB="https://firestore.googleapis.com/v1/projects/grupo-consolidado-crm/databases/(default)/documents";
const ANTHROPIC_KEY="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";

function pv(v){
  if(!v)return;
  if("stringValue" in v)return v.stringValue;
  if("integerValue" in v)return+v.integerValue;
  if("doubleValue" in v)return+v.doubleValue;
  if("booleanValue" in v)return v.booleanValue;
  if("nullValue" in v)return null;
  if("timestampValue" in v)return v.timestampValue;
  if("arrayValue" in v)return(v.arrayValue.values||[]).map(pv);
  if("mapValue" in v){const o={};Object.entries(v.mapValue.fields||{}).forEach(([k,val])=>{o[k]=pv(val)});return o}
}
function fromFS(doc){
  if(!doc?.fields)return{id:(doc?.name||"").split("/").pop()};
  const o={id:(doc.name||"").split("/").pop()};
  Object.entries(doc.fields).forEach(([k,v])=>{const val=pv(v);if(val!==undefined)o[k]=val});
  return o;
}
async function fbL(col){
  try{
    let docs=[],next=null,n=0;
    do{
      const r=await Promise.race([
        fetch(`${FB}/${col}?pageSize=300${next?"&pageToken="+next:""}`,{cache:"no-store"}),
        new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")),10000))
      ]);
      if(!r.ok)break;
      const d=await r.json();
      if(d.documents)docs=[...docs,...d.documents.map(fromFS)];
      next=d.nextPageToken||null;n++;
    }while(next&&n<30);
    return docs;
  }catch(e){console.warn("FB "+col+":",e.message);return[];}
}

// ═══════════════════════════════════════════════════════════
// CLAUDE AI
// ═══════════════════════════════════════════════════════════
async function askClaude(prompt,maxTokens=2000,key=""){
  if(!key||!key.startsWith("sk-ant"))return "⚠️ Necesitas configurar una API key válida de Anthropic. Pulsa el icono ⚙️ junto al botón.";
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTokens,
        messages:[{role:"user",content:prompt}]
      })
    });
    if(!r.ok){
      const errText=await r.text();
      console.error("API Error:",r.status,errText);
      return "Error API ("+r.status+"): "+(errText||"Sin detalle. Verifica la API key.");
    }
    const data=await r.json();
    if(data.error)return "Error: "+(data.error.message||JSON.stringify(data.error));
    return data.content?.[0]?.text||"Respuesta vacía de la API";
  }catch(e){
    console.error("askClaude error:",e);
    return "Error de conexión: "+e.message;
  }
}

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
const USR=[
  {id:"wk1",n:"David Mag",eq:"WIKUK",c:"#34D399",ga:"DAVIDMAG"},
  {id:"wk2",n:"Verónica",eq:"WIKUK",c:"#10B981",ga:"VERONICA"},
  {id:"wk3",n:"Silvia",eq:"WIKUK",c:"#059669",ga:"SILVIA"},
  {id:"rpiedra",n:"Ramon",eq:"WIKUK",c:"#F472B6",ga:"RPIEDRA"},
  {id:"jl",n:"Jose Luis",eq:"WIKUK",c:"#818CF8",ga:"JLGARCIA"},
  {id:"ik1",n:"Carlos G.",eq:"INTERKEY",c:"#FBBF24",ga:"CARLOSG"},
  {id:"ik2",n:"Ricardo",eq:"INTERKEY",c:"#FB923C",ga:"RICARDO"},
  {id:"ik4",n:"Azarco",eq:"INTERKEY",c:"#A78BFA",ga:"AZARCO"},
];
const nom=id=>{if(!id)return"—";const up=id.toUpperCase();const u=USR.find(x=>[x.id,x.ga,x.n].some(y=>y&&y.toUpperCase()===up));return u?u.n:id};
const eqAg=id=>{if(!id)return"";const up=id.toUpperCase();const u=USR.find(x=>[x.id,x.ga].some(y=>y&&y.toUpperCase()===up));return u?u.eq:""};
const fmt=n=>new Intl.NumberFormat("es-ES").format(n);
const getSem=()=>{const d=new Date(),s=new Date(d.getFullYear(),0,1);return Math.ceil(((d-s)/864e5+s.getDay()+1)/7)};
function parseD(d){if(!d)return null;if(typeof d==="string"){if(d.match(/^\d{4}-/)||d.includes("T"))return new Date(d);const p=d.split("/");if(p.length>=2){let yr=p[2]?+p[2]:2026;if(yr<100)yr+=2000;return new Date(yr,+p[1]-1,+p[0])}}if(typeof d==="number"&&d>1e9)return new Date(d>1e10?d:d*1e3);return null}
function diasD(f){const d=parseD(f);if(!d||isNaN(d))return-1;return Math.floor((new Date()-d)/864e5)}
function sem2f(s){if(!s)return null;const d=new Date(2026,0,1);d.setDate(d.getDate()+(s-1)*7);return d}
const ageCol=d=>d>=14?"var(--red)":d>=7?"var(--amber)":d>=3?"var(--acc)":"var(--green)";
const ageBg=d=>d>=14?"var(--redBg)":d>=7?"var(--amberBg)":d>=3?"var(--accBg)":"var(--greenBg)";
function reco(tipo,d,estado){
  if(tipo==="incidencia"){return d>7?"⚡ Escalar inmediatamente":"📞 Contactar cliente"}
  if(tipo==="oferta"){return d>10?"📞 Cerrar ya — se enfría":d>5?"📧 Recordatorio":"⏳ Dentro de plazo"}
  if(tipo==="oportunidad"){return d>21?"🚨 Riesgo alto — llamar hoy":d>7?"📞 Seguimiento urgente":"📧 Mover a siguiente etapa"}
  if(tipo==="muestra"){return d>14?"📞 Pedir feedback urgente":d>7?"📧 Seguimiento":"⏳ Esperar"}
  if(tipo==="estrategia"){return estado==="pendiente_aprobacion"?"✅ Aprobar o redirigir":"👀 Revisar avance"}
  return"📋 Revisar";
}

// ═══════════════════════════════════════════════════════════
// COLLAPSIBLE CARD
// ═══════════════════════════════════════════════════════════
function Card({icon,title,count,countColor,children,defaultOpen=true}){
  const [open,setOpen]=useState(defaultOpen);
  return(
    <div className="card">
      <div className="card-h" onClick={()=>setOpen(!open)}>
        <h3>{icon} {title}</h3>
        {count!==undefined&&<span className="cnt-badge" style={{background:countColor+"15",color:countColor}}>{count}</span>}
        <span className={"chevron"+(open?" open":"")}>▾</span>
      </div>
      {open&&<div className="card-body">{children}</div>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// DETAIL MODAL
// ═══════════════════════════════════════════════════════════
function DetailModal({item,onClose}){
  if(!item)return null;
  const rows=[
    ["Cliente",item.cliente||item.clienteNombre],
    ["Producto",item.prod||item.prodNombre||item.producto],
    ["Tipo",item.tipo],
    ["Estado",item.etapa||item.estado],
    ["Prioridad",item.prioridad],
    ["Agente",nom(item._ag)],
    ["Equipo",eqAg(item._ag)],
    ["Valor",item.valor?fmt(item.valor)+"€":null],
    ["Días sin actividad",item._d>=0?item._d+" días":null],
    ["Descripción",item.descripcion||item.notas||item.notaInicial],
    ["Estrategia",item.estrategia],
    ["Resultado",item.resultado],
  ].filter(r=>r[1]);
  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-h">
          <h3>{item.cliente||item.clienteNombre||item.prod||"Detalle"}</h3>
          <button className="modal-x" onClick={onClose}>✕</button>
        </div>
        <div className="modal-b">
          {item._rec&&<div style={{background:"var(--amberBg)",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:12,color:"var(--amber)",fontStyle:"italic"}}>{item._rec}</div>}
          {rows.map(([l,v],i)=><div key={i} className="dr"><span className="dr-l">{l}</span><span className="dr-v">{String(v)}</span></div>)}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// AGING FILTER BAR
// ═══════════════════════════════════════════════════════════
function AgingBar({items,filter,setFilter}){
  const b={c:0,u:0,a:0,n:0};
  items.forEach(i=>{if(i._d>=14)b.c++;else if(i._d>=7)b.u++;else if(i._d>=3)b.a++;else b.n++});
  return(
    <div className="aging">
      <div className={"ag-pill"+(filter==="all"?" sel":"")} onClick={()=>setFilter("all")}>
        <span style={{fontFamily:"var(--mono)",fontWeight:700}}>{items.length}</span> Todos
      </div>
      {b.c>0&&<div className={"ag-pill"+(filter==="c"?" sel":"")} onClick={()=>setFilter("c")} style={filter==="c"?{borderColor:"var(--red)",color:"var(--red)"}:{}}>
        <span style={{fontFamily:"var(--mono)",fontWeight:700,color:"var(--red)"}}>{b.c}</span> Crítico +14d
      </div>}
      {b.u>0&&<div className={"ag-pill"+(filter==="u"?" sel":"")} onClick={()=>setFilter("u")} style={filter==="u"?{borderColor:"var(--amber)",color:"var(--amber)"}:{}}>
        <span style={{fontFamily:"var(--mono)",fontWeight:700,color:"var(--amber)"}}>{b.u}</span> Urgente 7-14d
      </div>}
      {b.a>0&&<div className={"ag-pill"+(filter==="a"?" sel":"")} onClick={()=>setFilter("a")} style={filter==="a"?{borderColor:"var(--acc)",color:"var(--acc)"}:{}}>
        <span style={{fontFamily:"var(--mono)",fontWeight:700,color:"var(--acc)"}}>{b.a}</span> Atención 3-7d
      </div>}
      <div className={"ag-pill"+(filter==="n"?" sel":"")} onClick={()=>setFilter("n")}>
        <span style={{fontFamily:"var(--mono)",fontWeight:700,color:"var(--green)"}}>{b.n}</span> Normal
      </div>
    </div>
  );
}
function applyAgeFilter(items,f){
  if(f==="all")return items;
  if(f==="c")return items.filter(i=>i._d>=14);
  if(f==="u")return items.filter(i=>i._d>=7&&i._d<14);
  if(f==="a")return items.filter(i=>i._d>=3&&i._d<7);
  return items.filter(i=>i._d<3);
}

// ═══════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════
function App(){
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [prog,setProg]=useState("");
  const [view,setView]=useState("briefing");
  const [eqF,setEqF]=useState("todos");
  const [agF,setAgF]=useState("todos");
  const [detail,setDetail]=useState(null);
  const [ageF,setAgeF]=useState("all");
  const [aiResult,setAiResult]=useState(null);
  const [aiLoading,setAiLoading]=useState(false);
  const [aiVisitas,setAiVisitas]=useState(null);
  const [aiVisLoading,setAiVisLoading]=useState(false);
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem("cm_apikey")||ANTHROPIC_KEY||"");
  const [showKeyInput,setShowKeyInput]=useState(false);
  function saveKey(k){setApiKey(k);localStorage.setItem("cm_apikey",k);setShowKeyInput(false)}

  // Load data sequentially
  useEffect(()=>{
    const cols=[
      {k:"ops",c:"oportunidades"},{k:"mue",c:"muestras"},{k:"est",c:"estrategias"},
      {k:"inc",c:"incidencias"},{k:"ofe",c:"ofertas"},{k:"vis",c:"visitas"},{k:"pot",c:"potenciales"}
    ];
    const result={};
    let i=0;
    function next(){
      if(i>=cols.length){setData(result);setLoading(false);return}
      const item=cols[i];
      setProg(`Cargando ${item.c}... (${i+1}/${cols.length})`);

      </div>
      <div className="kpis" style={{marginBottom:14}}>
        <div className="kpi"><div className="kpi-l">Visitas sem.{semAct}</div><div className="kpi-v" style={{color:"var(--green)"}}>{visSem.length}</div></div>
        <div className="kpi"><div className="kpi-l">Sem. anterior</div><div className="kpi-v">{visPrev.length}</div></div>
        <div className="kpi"><div className="kpi-l">Agentes activos</div><div className="kpi-v">{Object.keys(porAg).length}/{USR.length}</div></div>
      </div>
      <Card icon="👥" title="Actividad por agente" defaultOpen={true}>
        <table className="tbl">
          <thead><tr><th>Agente</th><th>Equipo</th><th>Visitas</th><th>Pedidos</th><th>Seguimientos</th></tr></thead>
          <tbody>{USR.map(u=>{
            const mis=porAg[u.id]||porAg[u.ga]||[];
            const ped=mis.filter(v=>v.resultado==="pedido").length;
            const seg=mis.filter(v=>v.resultado==="seguimiento").length;
            return <tr key={u.id}>
              <td style={{fontWeight:600,color:u.c}}>{u.n}</td><td>{u.eq}</td>
              <td style={{fontFamily:"var(--mono)",fontWeight:700,fontSize:14}}>{mis.length}</td>
              <td>{ped>0?<span style={{color:"var(--green)",fontWeight:700}}>{ped}</span>:"—"}</td>
              <td>{seg>0?<span style={{color:"var(--amber)"}}>{seg}</span>:"—"}</td>
            </tr>;
          })}</tbody>
        </table>
      </Card>
      {visSem.length>0&&<Card icon="📋" title={"Detalle visitas semana "+semAct} count={visSem.length} countColor="var(--green)" defaultOpen={false}>
        <table className="tbl">
          <thead><tr><th>Cliente</th><th>Resultado</th><th>Agente</th><th>Notas</th></tr></thead>
          <tbody>{visSem.map((v,i)=>{
            const rc=v.resultado==="pedido"?"var(--green)":v.resultado==="seguimiento"?"var(--amber)":"var(--text3)";
            return <tr key={i} onClick={()=>setDetail(v)}>
              <td style={{fontWeight:600}}>{v.clienteNombre||"—"}</td>
              <td><span style={{color:rc,fontWeight:700}}>{v.resultado||"—"}</span></td>
              <td>{nom(v._ag)}</td>
              <td style={{color:"var(--text3)",maxWidth:300,whiteSpace:"normal",fontSize:11}}>{(v.notas||"").slice(0,150)}</td>
            </tr>;
          })}</tbody>
        </table>
      </Card>}
    </>);
  }

  // EQUIPO
  function VEquipo(){
    return(
      <div style={{overflowX:"auto"}}>
        <table className="tbl">
          <thead><tr><th>Agente</th><th>Equipo</th><th style={{color:"var(--red)"}}>🚨 Inc</th><th style={{color:"var(--amber)"}}>📄 Ofe</th><th style={{color:"var(--acc)"}}>💼 Ops</th><th style={{color:"var(--purple)"}}>📦 Mue</th><th style={{color:"var(--teal)"}}>🎯 Estr</th><th style={{color:"var(--green)"}}>👥 Vis</th><th>Pipeline</th><th style={{color:"var(--red)"}}>Críticos</th></tr></thead>
          <tbody>{USR.map(u=>{
            const ids=new Set([u.id,u.ga].filter(Boolean).map(x=>x.toUpperCase()));
            const m=i=>ids.has((i.agente||i.autor||i.agenteId||"").toUpperCase());
            const mI=D.inc.filter(i=>m(i)&&(i.estado==="abierta"||i.estado==="en_gestion")).length;
            const mO=D.ofe.filter(i=>!i.eliminada&&(i.estado==="pendiente"||!i.estado)&&m(i)).length;
            const mOps=D.ops.filter(o=>!o.eliminada&&m(o)&&!["ganada","perdida","cerrada_ganada","cerrada_perdida"].includes(o.etapa||o.estado));
            const mM=D.mue.filter(i=>!i.eliminada&&i.estado==="pendiente"&&m(i)).length;
            const mE=D.est.filter(i=>!i.eliminada&&(i.estado==="en_curso"||i.estado==="pendiente_aprobacion")&&m(i)).length;
            const mV=D.vis.filter(v=>m(v)&&+v.semana===semAct).length;
            const pipe=mOps.reduce((s,o)=>s+(+o.valor||0),0);
            const crit=[...D.inc.filter(i=>m(i)&&(i.estado==="abierta"||i.estado==="en_gestion")),...mOps,...D.mue.filter(i=>!i.eliminada&&i.estado==="pendiente"&&m(i))].filter(x=>{const f=x.fecha||x.creadaEn||x.fechaCreacion;return diasD(f)>=14}).length;
            return <tr key={u.id}>
              <td style={{fontWeight:700,color:u.c}}>{u.n}</td><td>{u.eq}</td>
              <td style={{fontFamily:"var(--mono)",fontWeight:700,color:mI?"var(--red)":"var(--text4)"}}>{mI}</td>
              <td style={{fontFamily:"var(--mono)",fontWeight:700,color:mO?"var(--amber)":"var(--text4)"}}>{mO}</td>
              <td style={{fontFamily:"var(--mono)",fontWeight:700,color:mOps.length?"var(--acc)":"var(--text4)"}}>{mOps.length}</td>
              <td style={{fontFamily:"var(--mono)",fontWeight:700,color:mM?"var(--purple)":"var(--text4)"}}>{mM}</td>
              <td style={{fontFamily:"var(--mono)",fontWeight:700,color:mE?"var(--teal)":"var(--text4)"}}>{mE}</td>
              <td style={{fontFamily:"var(--mono)",fontWeight:700,color:mV?"var(--green)":"var(--text4)"}}>{mV}</td>
              <td style={{fontFamily:"var(--mono)"}}>{pipe?fmt(pipe)+"€":"—"}</td>
              <td>{crit>0?<span style={{color:"var(--red)",fontWeight:800,fontFamily:"var(--mono)"}}>{crit}</span>:<span style={{color:"var(--green)"}}>✓</span>}</td>
            </tr>;
          })}</tbody>
        </table>
      </div>
    );
  }

  // ═══ NAVIGATION ═══
  const navItems=[
    {id:"briefing",ic:"🧠",l:"Briefing IA",sec:"inteligencia"},
    {id:"inc",ic:"🚨",l:"Incidencias",b:incA.length,bc:"var(--redBg)",bt:"var(--red)",sec:"módulos"},
    {id:"ofe",ic:"📄",l:"Ofertas",b:ofeP.length,bc:"var(--amberBg)",bt:"var(--amber)",sec:"módulos"},
    {id:"ops",ic:"💼",l:"Oportunidades",b:opsA.length,bc:"var(--accBg)",bt:"var(--acc)",sec:"módulos"},
    {id:"mue",ic:"📦",l:"Muestras",b:mueP.length,bc:"var(--purpleBg)",bt:"var(--purple)",sec:"módulos"},
    {id:"est",ic:"🎯",l:"Estrategias",b:estA.length,bc:"var(--tealBg)",bt:"var(--teal)",sec:"módulos"},
    {id:"pot",ic:"🏭",l:"Potencial",sec:"módulos"},
    {id:"vis",ic:"👥",l:"Visitas",b:visSem.length,bc:"var(--greenBg)",bt:"var(--green)",sec:"actividad"},
    {id:"equipo",ic:"📋",l:"Equipo",sec:"actividad"},
  ];
  const views={briefing:VBriefing,inc:VIncidencias,ofe:VOfertas,ops:VOps,mue:VMuestras,est:VEstrategias,pot:VPotencial,vis:VVisitas,equipo:VEquipo};
  const titles={briefing:"🧠 Briefing Inteligente",inc:"🚨 Incidencias abiertas",ofe:"📄 Ofertas pendientes",ops:"💼 Oportunidades activas",mue:"📦 Muestras sin feedback",est:"🎯 Estrategias de recuperación",pot:"🏭 Potencial identificado",vis:"👥 Visitas comerciales",equipo:"📋 Vista de equipo"};

  // Group nav items by section
  const sections=[
    {key:"inteligencia",label:"Inteligencia"},
    {key:"módulos",label:"Módulos"},
    {key:"actividad",label:"Actividad"},
  ];

  const ViewComponent=views[view];

  return(
    <div className="app">
      <div className="side">
        <div className="side-head">
          <h1>🎯 Centro de Mando</h1>
          <p>Grupo Consolidado · IA</p>
        </div>
        <nav className="side-nav">
          {sections.map(sec=><React.Fragment key={sec.key}>
            <div className="side-sec">{sec.label}</div>
            {navItems.filter(n=>n.sec===sec.key).map(n=>
              <div key={n.id} className={"ni"+(view===n.id?" act":"")} onClick={()=>{setView(n.id);setAgeF("all")}}>
                <span className="ic">{n.ic}</span>{n.l}
                {n.b>0&&<span className="bdg" style={{background:n.bc,color:n.bt}}>{n.b}</span>}
              </div>
            )}
          </React.Fragment>)}
        </nav>
        <div style={{padding:"10px 14px",borderTop:"1px solid var(--border)",fontSize:10,color:"var(--text4)",fontWeight:500}}>
          Firebase live · Sem.{semAct} · {new Date().toLocaleDateString("es-ES")}
        </div>
      </div>
      <div className="main">
        <div className="top">
          <h2>{titles[view]}</h2>
          <div style={{display:"flex",gap:8}}>
            <select value={eqF} onChange={e=>{setEqF(e.target.value);setAgF("todos")}}>
              <option value="todos">Todos</option><option value="WIKUK">WIKUK</option><option value="INTERKEY">INTERKEY</option>
            </select>
            <select value={agF} onChange={e=>setAgF(e.target.value)}>
              <option value="todos">Todos los agentes</option>
              {(eqF==="todos"?USR:USR.filter(a=>a.eq===eqF)).map(a=><option key={a.id} value={a.id}>{a.n}</option>)}
            </select>
          </div>
        </div>
        <div className="cnt">{ViewComponent&&<ViewComponent/>}</div>
      </div>
      <DetailModal item={detail} onClose={()=>setDetail(null)}/>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("app"));
</script>
</body>
</html>
