<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Grupo Consolidado · Portal</title>
<meta name="theme-color" content="#1A1816"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<!-- Eruda: consola debug para móvil. Se activa con ?debug=1 o ?eruda=1 -->
<script>
(function(){
  try{
    var url=(window.location.search||"")+(window.location.hash||"");
    var on=url.indexOf("debug=1")>=0||url.indexOf("eruda=1")>=0||localStorage.getItem("eruda")==="1";
    if(!on) return;
    var s=document.createElement("script");
    s.src="https://cdn.jsdelivr.net/npm/eruda";
    s.onload=function(){try{eruda.init();localStorage.setItem("eruda","1");console.log("🛠 Eruda activo en portal.");}catch(e){}};
    document.head.appendChild(s);
  }catch(e){}
})();
</script>
<style>
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;font-family:'Inter',sans-serif;background:#F7F5F2;color:#1A1816;height:100%;overflow:hidden;}
:root{--bg:#F7F5F2;--white:#fff;--text:#1A1816;--muted:#8A8078;--border:#E8E3DC;--accent:#C4501A;--accent-bg:#FDF1EC;}
input,button,select{font-family:inherit;}
#app{height:100%;display:flex;flex-direction:column;}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;}
.screen.active{display:flex;}

/* ── ENTRY ── */
#entry{align-items:center;justify-content:center;}
.entry-logo{font-size:2.2rem;font-weight:800;letter-spacing:.06em;margin-bottom:6px;text-align:center;}
.entry-logo span{color:var(--accent);}
.entry-tag{font-size:.82rem;color:var(--muted);margin-bottom:36px;letter-spacing:.05em;text-align:center;}
.entry-cards{display:flex;flex-direction:column;gap:12px;width:100%;max-width:340px;padding:0 24px;}
.entry-card{background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:20px 22px;cursor:pointer;display:flex;align-items:center;gap:16px;transition:border-color .15s;}
.entry-card:active,.entry-card:hover{border-color:var(--accent);}
.entry-card-icon{font-size:1.5rem;width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.entry-card-title{font-size:.98rem;font-weight:700;margin-bottom:2px;}
.entry-card-sub{font-size:.76rem;color:var(--muted);}
.entry-admin{margin-top:20px;background:none;border:none;color:var(--muted);font-size:.75rem;cursor:pointer;font-family:inherit;letter-spacing:.04em;}
.entry-admin:hover{color:var(--accent);}

/* ── LOGIN ── */
#login-screen{flex-direction:column;}
.login-header{padding:16px 20px 10px;border-bottom:1px solid var(--border);background:var(--white);display:flex;align-items:center;gap:12;flex-shrink:0;}
.login-back{background:none;border:none;color:var(--accent);font-size:.9rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit;}
.login-title{font-size:1rem;font-weight:700;}
.login-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:14px;}
.login-inp{width:100%;max-width:300px;padding:13px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:.95rem;font-family:inherit;outline:none;background:var(--white);color:var(--text);}
.login-inp:focus{border-color:var(--accent);}
.login-btn{width:100%;max-width:300px;padding:13px;background:var(--accent);color:white;border:none;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit;}
.login-btn:disabled{background:#D5CEC5;cursor:default;}
.login-err{color:#DC2626;font-size:.82rem;display:none;}

/* ── HUB ── */
#hub{flex-direction:column;}
.hub-header{background:var(--white);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hub-logo{font-size:1rem;font-weight:700;}
.hub-logo span{color:var(--accent);}
.hub-user{font-size:.82rem;color:var(--muted);}
.hub-logout{background:none;border:1px solid var(--border);border-radius:7px;padding:5px 12px;color:var(--muted);font-size:.75rem;cursor:pointer;font-family:inherit;}
.hub-logout:hover{border-color:var(--accent);color:var(--accent);}
.hub-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.hub-label{font-size:.65rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:18px;}
.hub-list{display:flex;flex-direction:column;gap:10px;width:100%;max-width:340px;}
.hub-item{background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:18px 20px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:border-color .15s;}
.hub-item:hover{border-color:var(--item-color,var(--accent));}
.hub-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;}
.hub-item-title{font-size:.96rem;font-weight:700;margin-bottom:2px;}
.hub-item-sub{font-size:.75rem;color:var(--muted);}
.hub-chevron{color:var(--muted);flex-shrink:0;}

/* ── MODULE FRAME ── */
#module-frame{background:#fff;}
.frame-bar{background:#1A1816;padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.frame-back{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:9px;padding:8px 14px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.frame-title{color:#fff;font-size:14px;font-weight:800;flex:1;}
.frame-sub{color:rgba(255,255,255,.4);font-size:10px;}
#module-iframe{flex:1;border:none;width:100%;height:0;min-height:0;display:block;}

/* ── ADMIN ── */
#admin-screen{flex-direction:column;}
.admin-topbar{background:#1A1816;color:white;padding:14px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.admin-back{background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:.85rem;display:flex;align-items:center;gap:5px;font-family:inherit;}
.admin-title{flex:1;font-size:1rem;font-weight:700;}
.admin-fb{font-size:.72rem;}
.admin-tabs{display:flex;background:#1A1816;border-bottom:2px solid #333;flex-shrink:0;}
.admin-tab{flex:1;padding:10px 4px;text-align:center;font-size:.72rem;font-weight:600;background:none;border:none;cursor:pointer;font-family:inherit;color:rgba(255,255,255,.5);border-bottom:2px solid transparent;margin-bottom:-2px;}
.admin-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.admin-body{flex:1;overflow-y:auto;padding:14px;}
.user-card{background:var(--white);border:1.5px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.user-card-head{padding:13px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;}
.user-avatar{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;color:white;}
.user-name{font-size:.9rem;font-weight:700;}
.user-role{font-size:.72rem;color:var(--muted);margin-top:2px;}
.user-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
.badge-sm{font-size:.6rem;font-weight:700;padding:1px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.04em;}
.user-body{border-top:1px solid var(--border);padding:14px;display:none;flex-direction:column;gap:14px;}
.user-body.open{display:flex;}
.field-label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;font-weight:700;}
.field-val{display:flex;gap:8px;align-items:center;}
.field-code{flex:1;padding:9px 12px;background:var(--white);border:1px solid var(--border);border-radius:7px;font-size:.88rem;font-family:monospace;color:var(--text);font-weight:700;}
.field-dots{flex:1;padding:9px 12px;background:var(--white);border:1px solid var(--border);border-radius:7px;font-size:.88rem;color:var(--muted);letter-spacing:.2em;}
.edit-btn{padding:8px 12px;background:none;border:1px solid var(--border);border-radius:7px;font-size:.78rem;cursor:pointer;color:var(--muted);font-family:inherit;flex-shrink:0;}
.edit-btn:hover{border-color:var(--accent);color:var(--accent);}
.edit-row{display:flex;gap:6px;}
.edit-inp{flex:1;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:.88rem;background:var(--white);color:var(--text);outline:none;}
.edit-inp:focus{border-color:var(--accent);}
.ok-btn{padding:9px 14px;background:#1A1816;color:white;border:none;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0;}
.cancel-btn{padding:9px 10px;background:none;border:1px solid var(--border);border-radius:8px;font-size:.82rem;cursor:pointer;color:var(--muted);font-family:inherit;flex-shrink:0;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--bg);border-radius:8px;cursor:pointer;}
.toggle-label{font-size:.83rem;}
.toggle-sw{width:44px;height:24px;border-radius:12px;position:relative;flex-shrink:0;transition:background .2s;cursor:pointer;}
.toggle-sw::after{content:'';position:absolute;width:18px;height:18px;background:white;border-radius:50%;top:3px;left:3px;transition:left .2s;}
.toggle-sw.on{background:#2E6B42;}
.toggle-sw.on::after{left:23px;}
.toggle-sw.off{background:#ddd;}
.agent-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;border:1.5px solid var(--border);transition:all .15s;margin-bottom:5px;}
.agent-row.on{background:#EDF4F0;border-color:#2E6B42;}
.section-check{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;cursor:pointer;border:1px solid var(--border);margin-bottom:4px;transition:all .12s;}
.section-check.on{background:#EDF4F0;border-color:#2E6B42;}
.check-box{width:15px;height:15px;border-radius:3px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.7rem;}
.check-box.on{background:#2E6B42;border-color:#2E6B42;color:white;}
.del-btn{width:100%;padding:9px;background:none;border:1.5px solid #DC2626;border-radius:8px;color:#DC2626;font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit;}
.new-user-form{background:var(--white);border:1.5px solid var(--accent);border-radius:12px;padding:16px;margin-bottom:14px;}
.new-btn{padding:7px 14px;background:#1A1816;color:white;border:1px solid #1A1816;border-radius:8px;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit;}
.new-btn.open{background:var(--bg);color:var(--muted);border-color:var(--border);}
.form-inp{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:.85rem;background:#fff;color:var(--text);outline:none;box-sizing:border-box;margin-bottom:10px;}
.form-inp:focus{border-color:var(--accent);}
.mod-toggle{padding:6px 12px;border-radius:7px;cursor:pointer;font-size:.78rem;font-weight:700;font-family:inherit;border:1.5px solid var(--border);background:var(--bg);color:var(--muted);margin:3px;}
.mod-toggle.on{border-color:#2E6B42;background:#EDF4F0;color:#2E6B42;}
.create-btn{width:100%;padding:12px;background:#1A1816;color:white;border:none;border-radius:9px;font-size:.88rem;font-weight:700;cursor:pointer;font-family:inherit;margin-top:6px;}
.err-msg{color:#DC2626;font-size:.78rem;margin:4px 0;}
.section-divider{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:5px 0;border-bottom:1px solid var(--border);margin-bottom:5px;margin-top:10px;}
.fb-status{font-size:.72rem;}
</style>
</head>
<body>
<div id="app">

<!-- ENTRY -->
<div id="entry" class="screen active">
  <div class="entry-logo">GRUPO <span>CONSOLIDADO</span></div>
  <div class="entry-tag">PORTAL DE GESTIÓN · v3.4.1</div>
  <div class="entry-cards">
    <div class="entry-card" onclick="showLogin()">
      <div class="entry-card-icon" style="background:#EDF4F0">🔐</div>
      <div>
        <div class="entry-card-title">Acceso empleados</div>
        <div class="entry-card-sub">CRM · Catálogo · Zona Empleado</div>
      </div>
    </div>
  </div>
  <button class="entry-admin" onclick="showLogin()">⚙️ Zona Administrador</button>
</div>

<!-- LOGIN -->
<div id="login-screen" class="screen">
  <div class="login-header">
    <button class="login-back" onclick="showEntry()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Volver
    </button>
    <span class="login-title" style="margin-left:8px">Acceso Portal</span>
  </div>
  <div class="login-body">
    <div style="font-size:2.4rem">🔐</div>
    <div style="font-size:1rem;font-weight:700">Introduce tus credenciales</div>
    <input id="inp-user" class="login-inp" placeholder="Usuario" autocomplete="username"
      onkeydown="if(event.key==='Enter')document.getElementById('inp-pass').focus()"/>
    <input id="inp-pass" class="login-inp" type="password" placeholder="Clave" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')doLogin()"/>
    <div id="login-err" class="login-err">Usuario o clave incorrectos.</div>
    <button id="login-btn" class="login-btn" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- HUB -->
<div id="hub" class="screen">
  <div class="hub-header">
    <div class="hub-logo">GRUPO <span>CONSOLIDADO</span> <span style="font-size:0.65rem;color:#8A8078;font-weight:400;margin-left:8px;letter-spacing:.04em">v3.4.1</span></div>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="hub-user" id="hub-user-name"></span>
      <button class="hub-logout" onclick="doLogout()">Salir</button>
    </div>
  </div>
  <div class="hub-body">
    <div class="hub-label">Selecciona un módulo</div>
    <div class="hub-list" id="hub-list"></div>
  </div>
</div>

<!-- MODULE FRAME -->
<div id="module-frame" class="screen">
  <div class="frame-bar">
    <button class="frame-back" onclick="backToHub()">← Hub</button>
    <div>
      <div class="frame-title" id="frame-title">Módulo</div>
      <div class="frame-sub" id="frame-sub"></div>
    </div>
  </div>
  <iframe id="module-iframe" src="about:blank"></iframe>
</div>

<!-- ADMIN -->
<div id="admin-screen" class="screen">
  <div class="admin-topbar">
    <button class="admin-back" onclick="backToHub()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Volver
    </button>
    <span class="admin-title">Zona Administrador</span>
    <span class="admin-fb fb-status" id="admin-fb-status"></span>
  </div>
  <div class="admin-tabs">
    <button class="admin-tab active" onclick="setAdminTab('usuarios',this)">Usuarios</button>
    <button class="admin-tab" onclick="setAdminTab('accesos',this)">Accesos</button>
    <button class="admin-tab" onclick="setAdminTab('descuentos',this)">Descuentos</button>
    <button class="admin-tab" onclick="setAdminTab('config',this)">Config</button>
  </div>
  <div class="admin-body" id="admin-body"></div>
</div>

</div><!-- /app -->

// ── Persistencia ─────────────────────────────────────────────────
function loadUsers(){
  try{
    var s=localStorage.getItem("gc_users");
    if(s){
      var p=JSON.parse(s);
      var ids=new Set(p.map(function(u){return u.id;}));
      return p.concat(USERS_DEFAULT.filter(function(u){return !ids.has(u.id);}));
    }
  }catch(e){}
  return USERS_DEFAULT.slice();
}
function saveUsersLocal(users){
  try{localStorage.setItem("gc_users",JSON.stringify(users));}catch(e){}
}
function _sv(v){
  if(v===null||v===undefined)return{nullValue:null};
  if(typeof v==="boolean")return{booleanValue:v};
  if(typeof v==="number")return{doubleValue:v};
  if(typeof v==="string")return{stringValue:v};
  if(Array.isArray(v))return{arrayValue:{values:v.map(_sv)}};
  return{stringValue:JSON.stringify(v)};
}
function _dv(v){
  if(v.stringValue!==undefined)return v.stringValue;
  if(v.integerValue!==undefined)return parseInt(v.integerValue);
  if(v.doubleValue!==undefined)return v.doubleValue;
  if(v.booleanValue!==undefined)return v.booleanValue;
  if(v.nullValue!==undefined)return null;
  if(v.arrayValue)return(v.arrayValue.values||[]).map(_dv);
  return null;
}
function _fromFB(doc){
  if(!doc.fields)return null;
  var o={id:doc.name.split("/").pop()};
  Object.keys(doc.fields).forEach(function(k){o[k]=_dv(doc.fields[k]);});
  return o;
}
function _toFB(u){
  var f={};
  Object.keys(u).forEach(function(k){f[k]=_sv(u[k]);});
  return{fields:f};
}
function saveUserFB(u){
  fetch(PORTAL_FB+"/portal_users/"+u.id,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(_toFB(u))}).catch(function(){});
}
function deleteUserFB(id){
  fetch(PORTAL_FB+"/portal_users/"+id,{method:"DELETE"}).catch(function(){});
}
async function loadUsersFB(){
  try{
    var r=await fetch(PORTAL_FB+"/portal_users?pageSize=100");
    if(r.ok){
      var d=await r.json();
      if(d.documents&&d.documents.length>0){
        var fb=d.documents.map(_fromFB).filter(Boolean);
        var ids=new Set(fb.map(function(u){return u.id;}));
        var merged=fb.concat(USERS_DEFAULT.filter(function(u){return !ids.has(u.id);}));
        saveUsersLocal(merged);
        return merged;
      }
    }
  }catch(e){}
  return loadUsers();
}

function doLogin(){
  var u=document.getElementById('inp-user').value.trim().toLowerCase();
  var p=document.getElementById('inp-pass').value.trim();
  var btn=document.getElementById('login-btn');
  var err=document.getElementById('login-err');
  btn.textContent='Accediendo...';btn.disabled=true;err.style.display='none';
  setTimeout(function(){
    var users=loadUsers();
    var found=null;
    for(var i=0;i<users.length;i++){
      var uu=users[i];
      if((uu.id===u||(uu.username||'').toLowerCase()===u||uu.nombre.toLowerCase()===u)&&uu.pass===p){
        found=uu;break;
      }
    }
    btn.textContent='Entrar';btn.disabled=false;
    if(found){
      currentUser=found;
      document.getElementById('inp-user').value='';
      document.getElementById('inp-pass').value='';
      if(found.accesos.length===1&&found.accesos[0]==='rrhh'){
        openModule('rrhh');
      } else {
        showHub();
      }
    } else {
      err.style.display='block';
    }
  },400);
}

              html+='<div class="section-check'+(on?' on':'')+'" onclick="toggleSeccion(\''+u.id+'\',\''+s.k+'\')">'

// ── DESCUENTOS — límites de aprobación por rol ───────────────────────
// Reglas: cada rol crea/aprueba estrategias hasta su límite. Si excede,
// la estrategia escala automáticamente: vendedor → responsable → jefe ventas → CEO.
var LIMITES_DTO_DEFAULT_PORTAL={agente:4,jefe:10,director:15};
var _configDtoPortal=null; // cargado de Firebase al abrir el tab

async function loadConfigDtoPortal(){
  try{
    var r=await fetch(PORTAL_FB+"/configuracion/general");
    if(r.ok){
      var d=await r.json();
      var f=(d&&d.fields)||{};
      var lim=f.limites_dto&&f.limites_dto.mapValue&&f.limites_dto.mapValue.fields;
      if(lim){
        _configDtoPortal={
          agente:_dv(lim.agente||{doubleValue:LIMITES_DTO_DEFAULT_PORTAL.agente}),
          jefe:_dv(lim.jefe||{doubleValue:LIMITES_DTO_DEFAULT_PORTAL.jefe}),
          director:_dv(lim.director||{doubleValue:LIMITES_DTO_DEFAULT_PORTAL.director})
        };
        return _configDtoPortal;
      }
    }
  }catch(e){console.warn("[CONFIG_DTO] error cargando",e);}
  _configDtoPortal=Object.assign({},LIMITES_DTO_DEFAULT_PORTAL);
  return _configDtoPortal;
}

async function saveConfigDtoPortal(ag,jf,dr){
  // PATCH con updateMask: solo actualiza limites_dto sin tocar otros campos
  var datos={
    limites_dto:{agente:ag,jefe:jf,director:dr},
    actualizadoEn:new Date().toISOString(),
    actualizadoPor:"portal_admin"
  };
  var fields={};
  Object.keys(datos).forEach(function(k){fields[k]=_sv(datos[k]);});
  var qs="?"+Object.keys(datos).map(function(k){return "updateMask.fieldPaths="+encodeURIComponent(k);}).join("&");
  try{
    var r=await fetch(PORTAL_FB+"/configuracion/general"+qs,{
      method:"PATCH",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({fields:fields})
    });
    if(r.ok){
      _configDtoPortal={agente:ag,jefe:jf,director:dr};
      return true;
    }
    console.warn("[CONFIG_DTO] save error",r.status);
    return false;
  }catch(e){console.warn("[CONFIG_DTO] save exception",e);return false;}
}

function renderDescuentos(){
  var lim=_configDtoPortal||LIMITES_DTO_DEFAULT_PORTAL;
  // Si nunca cargamos de FB, dispara la carga y re-renderiza
  if(!_configDtoPortal){
    loadConfigDtoPortal().then(function(){renderAdminBody();});
  }
  var card=function(icon,iconBg,titulo,desc,id,val){
    return '<div style="background:white;border:1.5px solid #E8E3DC;border-radius:12px;padding:14px;margin-bottom:10px">'
      +'<div style="display:flex;gap:10px;align-items:center;margin-bottom:10px">'
        +'<div style="width:36px;height:36px;border-radius:10px;background:'+iconBg+';display:flex;align-items:center;justify-content:center;font-size:1.1rem">'+icon+'</div>'
        +'<div style="flex:1">'
          +'<div style="font-size:.86rem;font-weight:700;color:#3A2F26">'+titulo+'</div>'
          +'<div style="font-size:.72rem;color:#8A8078;margin-top:2px">'+desc+'</div>'
        +'</div>'
      +'</div>'
      +'<div style="display:flex;gap:8px;align-items:center">'
        +'<input type="number" inputmode="decimal" step="0.5" min="0" max="100" id="'+id+'" value="'+val+'" '
          +'style="flex:1;padding:11px 13px;border-radius:10px;border:1.5px solid #E8E3DC;font-size:.95rem;font-weight:700;outline:none;-webkit-appearance:none">'
        +'<span style="font-size:.95rem;font-weight:700;color:#8A8078">%</span>'
      +'</div>'
    +'</div>';
  };
  return ''
    +'<div style="font-size:.78rem;color:#5C4D40;margin-bottom:12px;line-height:1.5">'
      +'Cada rol puede crear o aprobar estrategias hasta su límite de descuento. Si excede, escala automáticamente al siguiente: '
      +'<b>Vendedor → Responsable → Jefe de Ventas → CEO</b>.'
    +'</div>'
    +card('🧑‍💼','#EEEAE3','Vendedor (Comercial)','Hasta este % la estrategia es directa. Si excede → Responsable.','dto-ag',lim.agente)
    +card('🏆','#E5F2EA','Responsable de Equipo','Aprueba hasta este %. Si excede → Jefe de Ventas.','dto-jf',lim.jefe)
    +card('📊','#E5EDF7','Jefe de Ventas (Director)','Aprueba hasta este %. Si excede → CEO.','dto-dr',lim.director)
    +'<div style="background:#F2EEF8;border:1px dashed #5C3E8A55;border-radius:12px;padding:12px;margin-bottom:14px;display:flex;gap:10px;align-items:center">'
      +'<div style="width:36px;height:36px;border-radius:10px;background:#5C3E8A22;display:flex;align-items:center;justify-content:center;font-size:1.1rem">👑</div>'
      +'<div><div style="font-size:.86rem;font-weight:700;color:#3A2F26">CEO</div>'
      +'<div style="font-size:.72rem;color:#8A8078">Sin límite. Aprueba todo lo que llega.</div></div>'
    +'</div>'
    +'<div id="dto-msg" style="font-size:.78rem;font-weight:700;margin-bottom:10px"></div>'
    +'<button id="dto-save" style="width:100%;padding:13px;border-radius:10px;border:none;background:#1E2A38;color:#fff;font-size:.92rem;font-weight:700;cursor:pointer">💾 Guardar límites</button>';
}

    .map(function(r,i,a){

// ── Eventos admin ─────────────────────────────────────────────────
function attachAdminEvents(){
  // Guardar límites de descuento
  var btn=document.getElementById('dto-save');
  if(btn){
    btn.onclick=async function(){
      var msg=document.getElementById('dto-msg');
      var ag=parseFloat((document.getElementById('dto-ag')||{}).value);
      var jf=parseFloat((document.getElementById('dto-jf')||{}).value);
      var dr=parseFloat((document.getElementById('dto-dr')||{}).value);
      if(isNaN(ag)||isNaN(jf)||isNaN(dr)||ag<0||jf<0||dr<0){
        msg.style.color='#B45309';msg.textContent='⚠️ Valores no válidos. Deben ser números ≥ 0.';return;
      }
      if(!(ag<=jf&&jf<=dr)){
        msg.style.color='#B45309';msg.textContent='⚠️ Los límites deben ser crecientes: vendedor ≤ responsable ≤ jefe ventas.';return;
      }
      btn.disabled=true;btn.textContent='Guardando…';msg.textContent='';
      var ok=await saveConfigDtoPortal(ag,jf,dr);
      btn.disabled=false;btn.textContent='💾 Guardar límites';
      if(ok){msg.style.color='#2E6B42';msg.textContent='✅ Guardado. Los nuevos límites se aplican a futuras estrategias.';}
      else{msg.style.color='#A23B3B';msg.textContent='❌ Error guardando en Firebase. Reintenta.';}
    };
  }
}

function toggleCard(id){
  openCards[id]=!openCards[id];
  renderAdminBody();
}
function startEdit(uid,field){
  editingField={};editingField[uid]=field;renderAdminBody();
  setTimeout(function(){var el=document.getElementById('ef-'+uid+'-'+field);if(el)el.focus();},50);
}
function cancelEdit(uid){delete editingField[uid];renderAdminBody();}
function saveField(uid,field){
  var el=document.getElementById('ef-'+uid+'-'+field);
  if(!el||!el.value.trim()) return;
  var val=el.value.trim();
  if(field==='username') val=val.toLowerCase().split(' ').join('');
  updateUser(uid,function(u){u[field]=val;});
  delete editingField[uid];
  renderAdminBody();
}
function toggleAgente(uid,aid){
  updateUser(uid,function(u){
    var eq=u.equipoCrm||[];
    u.equipoCrm=eq.includes(aid)?eq.filter(function(x){return x!==aid;}):[...eq,aid];
  });renderAdminBody();
}
function updateCatVendedor(uid,val){
  updateUser(uid,function(u){u.catalogoVendedor=val||null;});
}
function toggleSeccion(uid,sk){
  updateUser(uid,function(u){
    var all=SECCIONES_CAT.map(function(s){return s.k;});
    var cur=u.catalogoSecciones||all;
    u.catalogoSecciones=cur.includes(sk)?cur.filter(function(x){return x!==sk;}):[...cur,sk];
  });renderAdminBody();
}
function setAllSecciones(uid,on){
  updateUser(uid,function(u){u.catalogoSecciones=on?SECCIONES_CAT.map(function(s){return s.k;}):[];});
  renderAdminBody();
}
function toggleAcceso(uid,mod){
  updateUser(uid,function(u){
    u.accesos=u.accesos.includes(mod)?u.accesos.filter(function(a){return a!==mod;}):[...u.accesos,mod];
  });renderAdminBody();
}
function deleteUser(uid){
  if(!window.confirm('Eliminar este usuario?')) return;
  adminUsers=adminUsers.filter(function(u){return u.id!==uid;});
  saveUsersLocal(adminUsers);deleteUserFB(uid);renderAdminBody();
}
function updateUser(uid,fn){
  adminUsers=adminUsers.map(function(u){if(u.id===uid){fn(u);}return u;});
  var u=adminUsers.find(function(u){return u.id===uid;});
  saveUsersLocal(adminUsers);if(u) saveUserFB(u);
}

function toggleNewForm(){showNewForm=!showNewForm;newForm={accesos:['crm']};renderAdminBody();}
function toggleNewMod(mod){
  newForm.accesos=newForm.accesos||['crm'];
  if(newForm.accesos.includes(mod)) newForm.accesos=newForm.accesos.filter(function(a){return a!==mod;});
  else newForm.accesos.push(mod);
  renderAdminBody();
  // Re-read form values
  var n=document.getElementById('nf-nombre');var u=document.getElementById('nf-username');
  if(n) newForm.nombre=n.value;if(u) newForm.username=u.value;
}
function onVendorChange(val){
  newForm.catalogoVendedor=val;
}

function selectEquipo(eq){
  // Save current form values before re-render
  var n=document.getElementById('nf-nombre');
  var u=document.getElementById('nf-username');
  var v=document.getElementById('nf-vendor');
  if(n) newForm.nombre=n.value;
  if(u) newForm.username=u.value;
  if(v) newForm.catalogoVendedor=v.value;
  newForm.equipo=eq;
  renderAdminBody();
}

function createUser(){
  var vendor=(document.getElementById('nf-vendor')||{}).value||'';
  var nombre=(document.getElementById('nf-nombre')||{}).value||'';
  var username=(document.getElementById('nf-username')||{}).value||'';
  var pass=(document.getElementById('nf-pass')||{}).value||'';
  var rol=(document.getElementById('nf-rol')||{}).value||'crm_agente';
  var equipo=newForm.equipo||'';
  var err=document.getElementById('nf-err');
  if(!vendor){if(err)err.textContent='Selecciona un vendedor del catálogo';return;}
  if(!nombre.trim()){if(err)err.textContent='Nombre obligatorio';return;}
  if(!username.trim()){if(err)err.textContent='Usuario obligatorio';return;}
  if(pass.length<4){if(err)err.textContent='Clave min. 4 caracteres';return;}
  if(!equipo){if(err)err.textContent='Selecciona el grupo de trabajo (WIKUK o INTERKEY)';return;}
  var un=username.trim().toLowerCase().split(' ').join('');
  if(adminUsers.some(function(u){return u.id===un||u.username===un;})){if(err)err.textContent='Usuario ya existe';return;}
  var nuevo={id:'u_'+Date.now(),nombre:nombre.trim(),username:un,pass:pass,rol:rol,
    icon:'👤',color:equipo==='WIKUK'?'#1E5A8A':'#2E6B42',
    equipo:equipo,accesos:newForm.accesos||['crm'],
    crmId:null,catalogoVendedor:vendor,equipoCrm:[],catalogoSecciones:null};
  adminUsers.push(nuevo);saveUsersLocal(adminUsers);saveUserFB(nuevo);
  showNewForm=false;newForm={accesos:['crm']};renderAdminBody();
}

function toggleVerTodo(uid){
  updateUser(uid,function(u){
    if(u.catalogoSecciones){
      u.catalogoSecciones=null;
    } else {
      u.catalogoSecciones=SECCIONES_CAT.map(function(s){return s.k;});
    }
  });
  renderAdminBody();
}
