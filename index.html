<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Grupo Consolidado · Portal</title>
<meta name="theme-color" content="#1A1816"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;font-family:'Inter',sans-serif;background:#F7F5F2;color:#1A1816;height:100%;overflow:hidden;}
:root{--bg:#F7F5F2;--white:#fff;--text:#1A1816;--muted:#8A8078;--border:#E8E3DC;--accent:#C4501A;--accent-bg:#FDF1EC;}
input,button,select{font-family:inherit;}
#app{height:100%;display:flex;flex-direction:column;}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;}
.screen.active{display:flex;}

/* ── ENTRY ── */
#entry{align-items:center;justify-content:center;}
.entry-logo{font-size:2.2rem;font-weight:800;letter-spacing:.06em;margin-bottom:6px;text-align:center;}
.entry-logo span{color:var(--accent);}
.entry-tag{font-size:.82rem;color:var(--muted);margin-bottom:36px;letter-spacing:.05em;text-align:center;}
.entry-cards{display:flex;flex-direction:column;gap:12px;width:100%;max-width:340px;padding:0 24px;}
.entry-card{background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:20px 22px;cursor:pointer;display:flex;align-items:center;gap:16px;transition:border-color .15s;}
.entry-card:active,.entry-card:hover{border-color:var(--accent);}
.entry-card-icon{font-size:1.5rem;width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.entry-card-title{font-size:.98rem;font-weight:700;margin-bottom:2px;}
.entry-card-sub{font-size:.76rem;color:var(--muted);}
.entry-admin{margin-top:20px;background:none;border:none;color:var(--muted);font-size:.75rem;cursor:pointer;font-family:inherit;letter-spacing:.04em;}
.entry-admin:hover{color:var(--accent);}

/* ── LOGIN ── */
#login-screen{flex-direction:column;}
.login-header{padding:16px 20px 10px;border-bottom:1px solid var(--border);background:var(--white);display:flex;align-items:center;gap:12;flex-shrink:0;}
.login-back{background:none;border:none;color:var(--accent);font-size:.9rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit;}
.login-title{font-size:1rem;font-weight:700;}
.login-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:14px;}
.login-inp{width:100%;max-width:300px;padding:13px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:.95rem;font-family:inherit;outline:none;background:var(--white);color:var(--text);}
.login-inp:focus{border-color:var(--accent);}
.login-btn{width:100%;max-width:300px;padding:13px;background:var(--accent);color:white;border:none;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit;}
.login-btn:disabled{background:#D5CEC5;cursor:default;}
.login-err{color:#DC2626;font-size:.82rem;display:none;}

/* ── HUB ── */
#hub{flex-direction:column;}
.hub-header{background:var(--white);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hub-logo{font-size:1rem;font-weight:700;}
.hub-logo span{color:var(--accent);}
.hub-user{font-size:.82rem;color:var(--muted);}
.hub-logout{background:none;border:1px solid var(--border);border-radius:7px;padding:5px 12px;color:var(--muted);font-size:.75rem;cursor:pointer;font-family:inherit;}
.hub-logout:hover{border-color:var(--accent);color:var(--accent);}
.hub-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.hub-label{font-size:.65rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:18px;}
.hub-list{display:flex;flex-direction:column;gap:10px;width:100%;max-width:340px;}
.hub-item{background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:18px 20px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:border-color .15s;}
.hub-item:hover{border-color:var(--item-color,var(--accent));}
.hub-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;}
.hub-item-title{font-size:.96rem;font-weight:700;margin-bottom:2px;}
.hub-item-sub{font-size:.75rem;color:var(--muted);}
.hub-chevron{color:var(--muted);flex-shrink:0;}

/* ── MODULE FRAME ── */
#module-frame{background:#fff;}
.frame-bar{background:#1A1816;padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.frame-back{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:9px;padding:8px 14px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.frame-title{color:#fff;font-size:14px;font-weight:800;flex:1;}
.frame-sub{color:rgba(255,255,255,.4);font-size:10px;}
#module-iframe{flex:1;border:none;width:100%;height:0;min-height:0;display:block;}

/* ── ADMIN ── */
#admin-screen{flex-direction:column;}
.admin-topbar{background:#1A1816;color:white;padding:14px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.admin-back{background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:.85rem;display:flex;align-items:center;gap:5px;font-family:inherit;}
.admin-title{flex:1;font-size:1rem;font-weight:700;}
.admin-fb{font-size:.72rem;}
.admin-tabs{display:flex;background:#1A1816;border-bottom:2px solid #333;flex-shrink:0;}
.admin-tab{flex:1;padding:10px 4px;text-align:center;font-size:.72rem;font-weight:600;background:none;border:none;cursor:pointer;font-family:inherit;color:rgba(255,255,255,.5);border-bottom:2px solid transparent;margin-bottom:-2px;}
.admin-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.admin-body{flex:1;overflow-y:auto;padding:14px;}
.user-card{background:var(--white);border:1.5px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.user-card-head{padding:13px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;}
.user-avatar{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;color:white;}
.user-name{font-size:.9rem;font-weight:700;}
.user-role{font-size:.72rem;color:var(--muted);margin-top:2px;}
.user-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
.badge-sm{font-size:.6rem;font-weight:700;padding:1px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.04em;}
.user-body{border-top:1px solid var(--border);padding:14px;display:none;flex-direction:column;gap:14px;}
.user-body.open{display:flex;}
.field-label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;font-weight:700;}
.field-val{display:flex;gap:8px;align-items:center;}
.field-code{flex:1;padding:9px 12px;background:var(--white);border:1px solid var(--border);border-radius:7px;font-size:.88rem;font-family:monospace;color:var(--text);font-weight:700;}
.field-dots{flex:1;padding:9px 12px;background:var(--white);border:1px solid var(--border);border-radius:7px;font-size:.88rem;color:var(--muted);letter-spacing:.2em;}
.edit-btn{padding:8px 12px;background:none;border:1px solid var(--border);border-radius:7px;font-size:.78rem;cursor:pointer;color:var(--muted);font-family:inherit;flex-shrink:0;}
.edit-btn:hover{border-color:var(--accent);color:var(--accent);}
.edit-row{display:flex;gap:6px;}
.edit-inp{flex:1;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:.88rem;background:var(--white);color:var(--text);outline:none;}
.edit-inp:focus{border-color:var(--accent);}
.ok-btn{padding:9px 14px;background:#1A1816;color:white;border:none;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0;}
.cancel-btn{padding:9px 10px;background:none;border:1px solid var(--border);border-radius:8px;font-size:.82rem;cursor:pointer;color:var(--muted);font-family:inherit;flex-shrink:0;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--bg);border-radius:8px;cursor:pointer;}
.toggle-label{font-size:.83rem;}
.toggle-sw{width:44px;height:24px;border-radius:12px;position:relative;flex-shrink:0;transition:background .2s;cursor:pointer;}
.toggle-sw::after{content:'';position:absolute;width:18px;height:18px;background:white;border-radius:50%;top:3px;left:3px;transition:left .2s;}
.toggle-sw.on{background:#2E6B42;}
.toggle-sw.on::after{left:23px;}
.toggle-sw.off{background:#ddd;}
.agent-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;border:1.5px solid var(--border);transition:all .15s;margin-bottom:5px;}
.agent-row.on{background:#EDF4F0;border-color:#2E6B42;}
.section-check{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;cursor:pointer;border:1px solid var(--border);margin-bottom:4px;transition:all .12s;}
.section-check.on{background:#EDF4F0;border-color:#2E6B42;}
.check-box{width:15px;height:15px;border-radius:3px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.7rem;}
.check-box.on{background:#2E6B42;border-color:#2E6B42;color:white;}
.del-btn{width:100%;padding:9px;background:none;border:1.5px solid #DC2626;border-radius:8px;color:#DC2626;font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit;}
.new-user-form{background:var(--white);border:1.5px solid var(--accent);border-radius:12px;padding:16px;margin-bottom:14px;}
.new-btn{padding:7px 14px;background:#1A1816;color:white;border:1px solid #1A1816;border-radius:8px;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit;}
.new-btn.open{background:var(--bg);color:var(--muted);border-color:var(--border);}
.form-inp{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:.85rem;background:#fff;color:var(--text);outline:none;box-sizing:border-box;margin-bottom:10px;}
.form-inp:focus{border-color:var(--accent);}
.mod-toggle{padding:6px 12px;border-radius:7px;cursor:pointer;font-size:.78rem;font-weight:700;font-family:inherit;border:1.5px solid var(--border);background:var(--bg);color:var(--muted);margin:3px;}
.mod-toggle.on{border-color:#2E6B42;background:#EDF4F0;color:#2E6B42;}
.create-btn{width:100%;padding:12px;background:#1A1816;color:white;border:none;border-radius:9px;font-size:.88rem;font-weight:700;cursor:pointer;font-family:inherit;margin-top:6px;}
.err-msg{color:#DC2626;font-size:.78rem;margin:4px 0;}
.section-divider{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:5px 0;border-bottom:1px solid var(--border);margin-bottom:5px;margin-top:10px;}
.fb-status{font-size:.72rem;}
</style>
</head>

<div id="app">

<!-- ENTRY -->
<div id="entry" class="screen active">
  <div class="entry-logo">GRUPO <span>CONSOLIDADO</span></div>

  <div class="entry-cards">
    <div class="entry-card" onclick="showLogin()">
      <div class="entry-card-icon" style="background:#EDF4F0">🔐</div>

        <div class="entry-card-title">Acceso empleados</div>
        <div class="entry-card-sub">CRM · Catálogo · Zona Empleado</div>
      </div>
    </div>
  </div>
  <button class="entry-admin" onclick="showLogin()">⚙️ Zona Administrador</button>
</div>

<!-- LOGIN -->
<div id="login-screen" class="screen">
  <div class="login-header">
    <button class="login-back" onclick="showEntry()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Volver
    </button>
    <span class="login-title" style="margin-left:8px">Acceso Portal</span>
  </div>
  <div class="login-body">
    <div style="font-size:2.4rem">🔐</div>
    <div style="font-size:1rem;font-weight:700">Introduce tus credenciales</div>
    <input id="inp-user" class="login-inp" placeholder="Usuario" autocomplete="username"
      onkeydown="if(event.key==='Enter')document.getElementById('inp-pass').focus()"/>
    <input id="inp-pass" class="login-inp" type="password" placeholder="Clave" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')doLogin()"/>
    <div id="login-err" class="login-err">Usuario o clave incorrectos.</div>
    <button id="login-btn" class="login-btn" onclick="doLogin()">Entrar</button>
    <p id="portal-ver" style="margin-top:14px;font-size:.7rem;color:#A8A199;font-weight:600"></p>
  </div>
</div>

<!-- HUB -->
<div id="hub" class="screen">
  <div class="hub-header">
    <div class="hub-logo">GRUPO <span>CONSOLIDADO</span> <span style="font-size:0.4em;color:#8A8078;font-weight:400;margin-left:8px">v2.8.2</span></div>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="hub-user" id="hub-user-name"></span>
      <button class="hub-logout" onclick="doLogout()">Salir</button>
    </div>
  </div>
  <div class="hub-body">
    <div class="hub-label">Selecciona un módulo</div>
    <div class="hub-list" id="hub-list"></div>
  </div>
</div>

<!-- MODULE FRAME -->
<div id="module-frame" class="screen">
  <div class="frame-bar">
    <button class="frame-back" onclick="backToHub()">← Hub</button>
    <div>
      <div class="frame-title" id="frame-title">Módulo</div>
      <div class="frame-sub" id="frame-sub"></div>
    </div>
  </div>
  <iframe id="module-iframe" src="about:blank"></iframe>
</div>

<!-- ADMIN -->
<div id="admin-screen" class="screen">
  <div class="admin-topbar">
    <button class="admin-back" onclick="backToHub()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Volver
    </button>
    <span class="admin-title">Zona Administrador</span>
    <span class="admin-fb" style="opacity:.5">v3.48.10</span>
    <span class="admin-fb fb-status" id="admin-fb-status"></span>
  </div>
  <div class="admin-tabs">
    <button class="admin-tab active" onclick="setAdminTab('usuarios',this)">Usuarios</button>
    <button class="admin-tab" onclick="setAdminTab('accesos',this)">Accesos</button>
    <button class="admin-tab" onclick="setAdminTab('descuentos',this)">Descuentos</button>
    <button class="admin-tab" onclick="setAdminTab('datos',this)">Datos</button>
    <button class="admin-tab" onclick="setAdminTab('config',this)">Config</button>
    <button class="admin-tab" onclick="setAdminTab('tarifas',this)">💰 Tarifas</button>
    <button class="admin-tab" onclick="setAdminTab('backup',this)">💾 Backup</button>
  </div>
  <div class="admin-body" id="admin-body"></div>
</div>

</div><!-- /app -->

// ── 🔐 Hash SHA-256 para contraseñas (nunca guardar claves en claro) ──
async function sha256Hex(str){
  try{
    if(!window.crypto||!crypto.subtle) return null; // requiere HTTPS
    var buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(str));
    return Array.prototype.map.call(new Uint8Array(buf),function(b){return ("0"+b.toString(16)).slice(-2);}).join("");
  }catch(e){return null;}
}
// Comprueba credenciales: primero hash, luego clave legada en claro (Firestore antiguo)
function matchCredencial(uu,p,pHash){
  if(uu.passHash&&pHash) return uu.passHash===pHash;
  if(uu.pass) return uu.pass===p;
  return false;
}
// Migración automática: si el usuario aún tiene clave en claro, convertirla a hash
function migrarUsuarioHash(found,pHash){
  try{
    if(found&&found.pass&&pHash){
      delete found.pass;
      found.passHash=pHash;
      var users=loadUsers().map(function(x){return x.id===found.id?found:x;});
      saveUsersLocal(users);
      saveUserFB(found); // PATCH completo → elimina el campo "pass" de Firestore
    }
  }catch(e){}
}

function loadUsers(){
  try{
    var s=localStorage.getItem("gc_users");
    if(s){
      var p=JSON.parse(s);
      var ids=new Set(p.map(function(u){return u.id;}));
      return p.concat(USERS_DEFAULT.filter(function(u){return !ids.has(u.id);}));
    }
  }catch(e){}
  return USERS_DEFAULT.slice();
}
function saveUsersLocal(users){
  try{localStorage.setItem("gc_users",JSON.stringify(users));}catch(e){}
}
function _sv(v){
  if(v===null||v===undefined)return{nullValue:null};
  if(typeof v==="boolean")return{booleanValue:v};
  if(typeof v==="number")return{doubleValue:v};
  if(typeof v==="string")return{stringValue:v};
  if(Array.isArray(v))return{arrayValue:{values:v.map(_sv)}};
  return{stringValue:JSON.stringify(v)};
}
function _dv(v){
  if(v.stringValue!==undefined)return v.stringValue;
  if(v.integerValue!==undefined)return parseInt(v.integerValue);
  if(v.doubleValue!==undefined)return v.doubleValue;
  if(v.booleanValue!==undefined)return v.booleanValue;
  if(v.nullValue!==undefined)return null;
  if(v.arrayValue)return(v.arrayValue.values||[]).map(_dv);
  return null;
}
function _fromFB(doc){
  if(!doc.fields)return null;
  var o={id:doc.name.split("/").pop()};
  Object.keys(doc.fields).forEach(function(k){o[k]=_dv(doc.fields[k]);});
  return o;
}
function _toFB(u){
  var f={};
  Object.keys(u).forEach(function(k){f[k]=_sv(u[k]);});
  return{fields:f};
}
function saveUserFB(u){
  fetch(PORTAL_FB+"/portal_users/"+u.id,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(_toFB(u))}).catch(function(){});
}
function deleteUserFB(id){
  fetch(PORTAL_FB+"/portal_users/"+id,{method:"DELETE"}).catch(function(){});
}
async function loadUsersFB(){
  try{
    var r=await fetch(PORTAL_FB+"/portal_users?pageSize=100");
    if(r.ok){
      var d=await r.json();
      if(d.documents&&d.documents.length>0){
        var fb=d.documents.map(_fromFB).filter(Boolean);
        var ids=new Set(fb.map(function(u){return u.id;}));
        var merged=fb.concat(USERS_DEFAULT.filter(function(u){return !ids.has(u.id);}));
        saveUsersLocal(merged);
        return merged;
      }
    }
  }catch(e){}
  return loadUsers();
}

function doLogin(){
  var u=document.getElementById('inp-user').value.trim().toLowerCase();
  var p=document.getElementById('inp-pass').value.trim();
  var btn=document.getElementById('login-btn');
  var err=document.getElementById('login-err');
  btn.textContent='Verificando...';btn.disabled=true;err.style.display='none';
  function buscar(users,pHash){
    for(var i=0;i<users.length;i++){
      var uu=users[i];
      if((uu.id===u||(uu.username||'').toLowerCase()===u||uu.nombre.toLowerCase()===u)&&matchCredencial(uu,p,pHash)){
        if(uu.bloqueado){showLoginError('Usuario bloqueado. Contacta con el administrador.');return;}
        return uu;
      }
    }
    return null;
  }
  function finalizar(found,pHash){
    btn.textContent='Entrar';btn.disabled=false;
    if(found){
      migrarUsuarioHash(found,pHash);
      currentUser=found;
      document.getElementById('inp-user').value='';
      document.getElementById('inp-pass').value='';
      if(found.accesos.length===1&&found.accesos[0]==='rrhh'){
        openModule('rrhh');
      } else {
        showHub();
      }
    } else {
      err.style.display='block';
    }
  }
  sha256Hex(p).then(function(pHash){
    // (v3.39.98) Siempre verificar contra Firebase (no cache local)
    loadUsersFB().then(function(users){
      finalizar(buscar(users,pHash),pHash);
    }).catch(function(){
      // Si Firebase falla, usar cache local como fallback
      finalizar(buscar(loadUsers(),pHash),pHash);
    });
  });
}

var LIMITES_DTO_DEFAULT_PORTAL = { agente: 4, jefe: 10, director: 15 };
var _configDtoPortal = null;

function _dvPortal(v){
  if(!v) return null;
  if(v.doubleValue !== undefined) return parseFloat(v.doubleValue);
  if(v.integerValue !== undefined) return parseInt(v.integerValue);
  return null;
}
function _svPortal(val){
  if(typeof val === "number") return Number.isInteger(val) ? {integerValue: val} : {doubleValue: val};
  if(typeof val === "string") return {stringValue: val};
  if(val === null) return {nullValue: null};
  if(typeof val === "object" && !Array.isArray(val)){
    var fields = {};
    Object.keys(val).forEach(function(k){ fields[k] = _svPortal(val[k]); });
    return {mapValue: {fields: fields}};
  }
  return {stringValue: String(val)};
}

function cargarDescuentosPortal(){
  fetch(PORTAL_FB + "/configuracion/general").then(function(r){
    if(!r.ok) throw new Error("not_found");
    return r.json();
  }).then(function(d){
    var f = (d && d.fields) || {};
    var lim = f.limites_dto && f.limites_dto.mapValue && f.limites_dto.mapValue.fields;
    if(lim){
      _configDtoPortal = {
        agente:   _dvPortal(lim.agente)   || LIMITES_DTO_DEFAULT_PORTAL.agente,
        jefe:     _dvPortal(lim.jefe)     || LIMITES_DTO_DEFAULT_PORTAL.jefe,
        director: _dvPortal(lim.director) || LIMITES_DTO_DEFAULT_PORTAL.director,
      };
    } else {
      _configDtoPortal = Object.assign({}, LIMITES_DTO_DEFAULT_PORTAL);
    }
    rellenarInputsDto();
  }).catch(function(){
    _configDtoPortal = Object.assign({}, LIMITES_DTO_DEFAULT_PORTAL);
    rellenarInputsDto();
  });
}

function rellenarInputsDto(){
  if(!_configDtoPortal) return;
  var iAg = document.getElementById('dto-agente');
  var iJf = document.getElementById('dto-jefe');
  var iDr = document.getElementById('dto-director');
  if(iAg) iAg.value = _configDtoPortal.agente;
  if(iJf) iJf.value = _configDtoPortal.jefe;
  if(iDr) iDr.value = _configDtoPortal.director;
}

function guardarDescuentosPortal(){
  var ag = parseFloat(document.getElementById('dto-agente').value);
  var jf = parseFloat(document.getElementById('dto-jefe').value);
  var dr = parseFloat(document.getElementById('dto-director').value);
  if(isNaN(ag) || isNaN(jf) || isNaN(dr) || ag < 0 || jf < 0 || dr < 0){
    alert("Indica valores numéricos válidos (no negativos)");
    return;
  }
  if(!(ag <= jf && jf <= dr)){
    alert("Los límites deben ser crecientes:\nVendedor (" + ag + ") ≤ Responsable (" + jf + ") ≤ Jefe Ventas (" + dr + ")");
    return;
  }
  var btn = document.getElementById('btn-guardar-dto');
  if(btn){ btn.disabled = true; btn.textContent = "Guardando..."; }
  var datos = {
    limites_dto: { agente: ag, jefe: jf, director: dr },
    actualizadoEn: new Date().toISOString(),
    actualizadoPor: "portal_admin"
  };
  var fields = {};
  Object.keys(datos).forEach(function(k){ fields[k] = _svPortal(datos[k]); });
  var qs = "?updateMask.fieldPaths=limites_dto&updateMask.fieldPaths=actualizadoEn&updateMask.fieldPaths=actualizadoPor";
  fetch(PORTAL_FB + "/configuracion/general" + qs, {
    method: "PATCH",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({fields: fields})
  }).then(function(r){
    if(!r.ok) throw new Error("HTTP " + r.status);
    _configDtoPortal = { agente: ag, jefe: jf, director: dr };
    if(btn){ btn.disabled = false; btn.textContent = "💾 Guardar límites"; }
    var msg = document.getElementById('dto-msg');
    if(msg){ msg.textContent = "✅ Guardado correctamente"; msg.style.color = "#16A34A"; setTimeout(function(){msg.textContent="";}, 3000); }
  }).catch(function(e){
    if(btn){ btn.disabled = false; btn.textContent = "💾 Guardar límites"; }
    var msg = document.getElementById('dto-msg');
    if(msg){ msg.textContent = "❌ Error: " + e.message; msg.style.color = "#DC2626"; }
  });
}

function setAdminTab(tab,btn){
  adminTab=tab;
  document.querySelectorAll('.admin-tab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  renderAdminBody();
}
function renderAdmin(){
  document.querySelectorAll('.admin-tab').forEach(function(b,i){
    b.classList.toggle('active',['usuarios','accesos','descuentos','datos','config'][i]===adminTab);
  });
  renderAdminBody();
}
function renderAdminBody(){
  var body=document.getElementById('admin-body');
  if(adminTab==='usuarios') body.innerHTML=renderUsuarios();
  else if(adminTab==='accesos') body.innerHTML=renderAccesos();
  else if(adminTab==='descuentos') { body.innerHTML=renderDescuentos(); cargarDescuentosPortal(); }
  else if(adminTab==='datos') body.innerHTML=renderDatos();
  else if(adminTab==='backup') { body.innerHTML=renderBackup(); initBackup(); }
  else if(adminTab==='tarifas') { body.innerHTML=renderTarifas(); }
  else { body.innerHTML=renderConfig(); cargarNotifConfigAdmin(); }
  attachAdminEvents();
}

function sortedUsers(){
  return ORDEN_USERS.map(function(id){return adminUsers.find(function(u){return u.id===id;});}).filter(Boolean)
    .concat(adminUsers.filter(function(u){return !ORDEN_USERS.includes(u.id);}));
}

function rolLabel(u){
  if(u.id==='ceo'||u.rol==='admin') return 'CEO · Acceso total';
  if(u.id==='dir') return 'Jefe de Ventas';
  if(u.rol==='crm_jefe'&&!u.id.startsWith('resp_')) return 'Jefe de Equipo';
  if(u.rol==='crm_agente') return 'Comercial / Vendedor';
  if(u.id.startsWith('resp_')) return 'Responsable de area';
  if(u.rol==='rrhh') return 'Recursos Humanos';
  return u.rol;
}

function cargarNotifConfigAdmin(){
  fetch(PORTAL_FB+"/configuracion/notificaciones").then(function(r){return r.json();}).then(function(d){
    if(d&&d.fields&&d.fields.config&&d.fields.config.stringValue){
      _notifCfg=JSON.parse(d.fields.config.stringValue);
    } else {
      _notifCfg=buildDefaultNotifCfg();
    }
    renderNotifConfigBody();
  }).catch(function(){_notifCfg=buildDefaultNotifCfg();renderNotifConfigBody();});
}

function buildDefaultNotifCfg(){
  var c={};
  NOTIF_CATS.forEach(function(cat){c[cat.id]={};cat.fases.forEach(function(f){
    c[cat.id][f.id]={jefe_equipo:true,director:true,ceo:false,autor:true,resp_tipologia:cat.id==="incidencias"};
  });});
  return c;
}

function renderNotifConfigBody(){
  var el=document.getElementById("notif-config-body");
  if(!el||!_notifCfg) return;
  var html='<div style="overflow-x:auto;-webkit-overflow-scrolling:touch">';
  NOTIF_CATS.forEach(function(cat){
    html+='<p style="margin:12px 0 6px;font-size:.82rem;font-weight:800;color:#5C3E8A">'+cat.label+'</p>';
    html+='<table style="width:100%;border-collapse:collapse;background:#fff;border-radius:8px;border:1px solid #E8E3DC">';
    html+='<tr style="background:#F8F6F3"><td style="padding:8px;font-size:.72rem;color:#8A8078;font-weight:700"></td>';
    NOTIF_ROLES.forEach(function(r){
      html+='<td style="padding:6px 4px;text-align:center;width:56px;vertical-align:bottom">'
        +'<div style="font-size:18px;line-height:1">'+r.l.split(' ')[0]+'</div>'
        +'<div style="font-size:.6rem;color:#8A8078;font-weight:700;margin-top:2px">'+r.l.split(' ').slice(1).join(' ')+'</div>'
        +'</td>';
    });
    html+='</tr>';
    cat.fases.forEach(function(f,fi){
      html+='<tr style="border-top:1px solid #F1F0EE">';
      html+='<td style="padding:8px;font-size:.75rem;font-weight:600;white-space:nowrap">'+f.l+'</td>';
      NOTIF_ROLES.forEach(function(r){
        var on=_notifCfg[cat.id]&&_notifCfg[cat.id][f.id]&&_notifCfg[cat.id][f.id][r.id];
        html+='<td style="text-align:center;padding:6px 2px">'
          +'<div onclick="toggleNotifCfg(\''+cat.id+'\',\''+f.id+'\',\''+r.id+'\');setTimeout(renderNotifConfigBody,30)" '
          +'style="display:inline-block;width:38px;height:22px;border-radius:11px;cursor:pointer;position:relative;'
          +'background:'+(on?'#5C3E8A':'#D1CCC6')+';transition:background .2s">'
          +'<div style="position:absolute;top:2px;'+(on?'right:2px':'left:2px')+';width:18px;height:18px;border-radius:9px;background:#fff;'
          +'box-shadow:0 1px 2px rgba(0,0,0,.2);transition:all .2s"></div>'
          +'</div></td>';
      });
      html+='</tr>';
    });
    html+='</table>';
  });
  html+='</div>';
  el.innerHTML=html;
}

function toggleNotifCfg(cat,fase,rol){
  if(!_notifCfg[cat])_notifCfg[cat]={};
  if(!_notifCfg[cat][fase])_notifCfg[cat][fase]={};
  _notifCfg[cat][fase][rol]=!_notifCfg[cat][fase][rol];
  document.getElementById("btn-save-notif").textContent="💾 Guardar configuración";
  document.getElementById("btn-save-notif").style.background="#5C3E8A";
}

function guardarNotifConfig(){
  var btn=document.getElementById("btn-save-notif");
  btn.textContent="Guardando...";btn.disabled=true;
  var data={fields:{config:{stringValue:JSON.stringify(_notifCfg)},actualizadoPor:{stringValue:currentUser?currentUser.nombre:"admin"},fecha:{stringValue:new Date().toISOString()}}};
  fetch(PORTAL_FB+"/configuracion/notificaciones",{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)})
    .then(function(){btn.textContent="✅ Guardado";btn.style.background="#2E6B42";btn.disabled=false;})
    .catch(function(){btn.textContent="❌ Error";btn.style.background="#DC2626";btn.disabled=false;});
}

function saveField(uid,field){
  var el=document.getElementById('ef-'+uid+'-'+field);
  if(!el||!el.value.trim()) return;
  var val=el.value.trim();
  if(field==='username') val=val.toLowerCase().split(' ').join('');

    // 🔐 Nunca guardar la clave en claro: hashear y eliminar el campo antiguo
    sha256Hex(val).then(function(h){
      updateUser(uid,function(u){
        if(h){u.passHash=h;delete u.pass;}
        else{u.pass=val;} // fallback si no hay crypto (HTTP sin TLS)
      });
      delete editingField[uid];
      renderAdminBody();
    });
    return;
  }
  updateUser(uid,function(u){u[field]=val;});
  delete editingField[uid];
  renderAdminBody();
}

function deleteUser(uid){
  // Verificar si tiene datos antes de eliminar
  var colecciones=["visitas","muestras","ofertas","estrategias","incidencias"];
  var checking=Promise.all(colecciones.map(function(col){
    return fetch(PORTAL_FB+"/"+col+"?pageSize=5").then(function(r){return r.json();}).then(function(d){
      if(!d.documents) return 0;
      var count=0;
      d.documents.forEach(function(doc){
        var fields=doc.fields||{};
        var agente=(fields.agente||{}).stringValue||"";
        var autor=(fields.autor||{}).stringValue||"";
        var creadoPor=(fields.creadoPor||{}).stringValue||"";
        if(agente===uid||autor===uid||creadoPor===uid) count++;
      });
      return count;
    }).catch(function(){return 0;});
  }));
  checking.then(function(results){
    var total=results.reduce(function(s,n){return s+n;},0);
    if(total>0){
      alert("⚠️ Este usuario tiene datos asociados (visitas, muestras, ofertas...).\n\nNo se puede eliminar. Usa 'Bloquear' para desactivarlo sin perder sus datos.");
      return;
    }
    if(!window.confirm("¿Eliminar este usuario?\n\nSolo se permite porque NO tiene datos asociados.")) return;
    adminUsers=adminUsers.filter(function(u){return u.id!==uid;});
    saveUsersLocal(adminUsers);deleteUserFB(uid);renderAdminBody();
  });
}
function bloquearUser(uid){
  var u=adminUsers.find(function(u){return u.id===uid;});
  if(!u) return;
  var nuevo=!u.bloqueado;
  if(nuevo&&!window.confirm("¿Bloquear a "+u.nombre+"?\n\nNo podrá acceder al CRM pero sus datos se conservan.")) return;
  updateUser(uid,function(u){u.bloqueado=nuevo;});
  renderAdminBody();
}
function updateUser(uid,fn){
  adminUsers=adminUsers.map(function(u){if(u.id===uid){fn(u);}return u;});
  var u=adminUsers.find(function(u){return u.id===uid;});
  saveUsersLocal(adminUsers);if(u) saveUserFB(u);
}

function createUser(){
  var vendor=(document.getElementById('nf-vendor')||{}).value||'';
  var nombre=(document.getElementById('nf-nombre')||{}).value||'';
  var username=(document.getElementById('nf-username')||{}).value||'';
  var pass=(document.getElementById('nf-pass')||{}).value||'';
  var email=(document.getElementById('nf-email')||{}).value||'';
  var equipo=newForm.equipo||'';
  var tipo=newForm.tipoUsuario||'comercial';
  var err=document.getElementById('nf-err');

  if(!nombre.trim()){if(err)err.textContent='Nombre obligatorio';return;}
  if(!username.trim()){if(err)err.textContent='Usuario obligatorio';return;}
  if(pass.length<4){if(err)err.textContent='Clave min. 4 caracteres';return;}

  var rol='crm_agente';
  var tipologia='';
  var crmId=null;
  var color='#8A8078';
  var icon='👤';

  if(tipo==='comercial'){
    if(!vendor){if(err)err.textContent='Selecciona un vendedor del catálogo';return;}
    if(!equipo){if(err)err.textContent='Selecciona el equipo (WIKUK o INTERKEY)';return;}
    rol='crm_agente';
    color=equipo==='WIKUK'?'#1E5A8A':'#2E6B42';
  } else if(tipo==='jefe'){
    if(!equipo){if(err)err.textContent='Selecciona el equipo';return;}
    rol='crm_jefe';
    color=equipo==='WIKUK'?'#1E5A8A':'#2E6B42';
  } else if(tipo==='responsable'){
    if(!newForm.tipologia){if(err)err.textContent='Selecciona el departamento';return;}
    rol='crm_jefe';
    tipologia=newForm.tipologia;
    crmId=newForm.crmIdResp;
    var deptIcons={logistica:'🚚',calidad:'⚠️',stock:'📦',administracion:'📄',produccion:'🏭',id:'🔬',coordinacion:'🧭',it:'💻'};
    icon=deptIcons[tipologia]||'🏢';
    color='#991B1B';
  } else if(tipo==='director'){
    var rolDir=(document.getElementById('nf-rol-dir')||{}).value||'crm_director';
    rol=rolDir;
    icon=rolDir==='ceo'?'👑':'📊';
    color='#7C3AED';
  }

  var un=username.trim().toLowerCase().split(' ').join('');
  if(adminUsers.some(function(u){return u.id===un||u.username===un;})){if(err)err.textContent='Usuario ya existe';return;}

  var nuevo={id:crmId||('u_'+Date.now()),nombre:nombre.trim(),username:un,rol:rol,
    icon:icon,color:color,email:email,
    equipo:equipo,accesos:newForm.accesos||['crm'],
    crmId:crmId,perfilCRM:crmId,tipologia:tipologia,
    catalogoVendedor:vendor||null,equipoCrm:[],catalogoSecciones:null};
  // 🔐 Guardar la clave hasheada, nunca en claro
  sha256Hex(pass).then(function(h){
    if(h){nuevo.passHash=h;} else {nuevo.pass=pass;} // fallback sin crypto
    adminUsers.push(nuevo);saveUsersLocal(adminUsers);saveUserFB(nuevo);
    showNewForm=false;newForm={accesos:['crm'],tipoUsuario:'comercial',tipologia:'',crmIdResp:''};renderAdminBody();
  });
}

async function bkFbRead(col){
  var all=[];var nextPage="";
  while(true){
    var url="https://firestore.googleapis.com/v1/projects/grupo-consolidado-crm/databases/(default)/documents/"+col+"?pageSize=300"+(nextPage?"&pageToken="+nextPage:"");
    var r=await fetch(url);var j=await r.json();
    if(!j.documents)break;
    j.documents.forEach(function(doc){
      var id=doc.name.split("/").pop();var o={id:id};
      if(doc.fields)Object.keys(doc.fields).forEach(function(k){var f=doc.fields[k];
        if(f.stringValue!==undefined)o[k]=f.stringValue;
        else if(f.integerValue!==undefined)o[k]=parseInt(f.integerValue);
        else if(f.doubleValue!==undefined)o[k]=f.doubleValue;
        else if(f.booleanValue!==undefined)o[k]=f.booleanValue;
        else if(f.nullValue!==undefined)o[k]=null;
        else if(f.mapValue)o[k]=bkParseMap(f.mapValue);
        else if(f.arrayValue)o[k]=bkParseArr(f.arrayValue);
        else o[k]=JSON.stringify(f);
      });
      all.push(o);
    });
    if(!j.nextPageToken)break;nextPage=j.nextPageToken;
  }
  return all;
}
function bkParseMap(mv){var o={};if(mv.fields)Object.keys(mv.fields).forEach(function(k){var f=mv.fields[k];if(f.stringValue!==undefined)o[k]=f.stringValue;else if(f.integerValue!==undefined)o[k]=parseInt(f.integerValue);else if(f.doubleValue!==undefined)o[k]=f.doubleValue;else if(f.booleanValue!==undefined)o[k]=f.booleanValue;else if(f.nullValue!==undefined)o[k]=null;else if(f.mapValue)o[k]=bkParseMap(f.mapValue);else if(f.arrayValue)o[k]=bkParseArr(f.arrayValue);else o[k]=JSON.stringify(f);});return o;}
function bkParseArr(av){if(!av.values)return[];return av.values.map(function(f){if(f.stringValue!==undefined)return f.stringValue;if(f.integerValue!==undefined)return parseInt(f.integerValue);if(f.doubleValue!==undefined)return f.doubleValue;if(f.booleanValue!==undefined)return f.booleanValue;if(f.nullValue!==undefined)return null;if(f.mapValue)return bkParseMap(f.mapValue);if(f.arrayValue)return bkParseArr(f.arrayValue);return JSON.stringify(f);});}
function bkToFV(v){if(v===null||v===undefined)return{nullValue:null};if(typeof v==="string")return{stringValue:v};if(typeof v==="boolean")return{booleanValue:v};if(typeof v==="number")return Number.isInteger(v)?{integerValue:String(v)}:{doubleValue:v};if(Array.isArray(v))return{arrayValue:{values:v.map(bkToFV)}};if(typeof v==="object"){var fields={};Object.keys(v).forEach(function(k){fields[k]=bkToFV(v[k]);});return{mapValue:{fields:fields}};} return{stringValue:String(v)};}
async function bkFbWrite(col,id,data){var fields={};Object.keys(data).forEach(function(k){if(k==="id")return;fields[k]=bkToFV(data[k]);});await fetch("https://firestore.googleapis.com/v1/projects/grupo-consolidado-crm/databases/(default)/documents/"+col+"/"+id+"?updateMask.fieldPaths="+Object.keys(fields).join("&updateMask.fieldPaths="),{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({fields:fields})});}

async function bkScan(){
  var stats=document.getElementById("bk-stats");var list=document.getElementById("bk-collections");var sel=document.getElementById("bk-single-col");
  if(!stats)return;
  var totalDocs=0;var colCount=0;var tags="";
  if(sel)sel.innerHTML='<option value="">— Selecciona colección —</option>';
  for(var i=0;i<BK_COLLECTIONS.length;i++){
    try{
      var docs=await bkFbRead(BK_COLLECTIONS[i]);
      if(docs.length>0){colCount++;totalDocs+=docs.length;
        tags+='<span style="background:#fff;border:1px solid #E8E3DC;border-radius:6px;padding:3px 8px;font-size:10px;font-weight:600;color:#8A8078">'+BK_COLLECTIONS[i]+' <strong style="color:#1A1816">'+docs.length+'</strong></span>';
        if(sel)sel.innerHTML+='<option value="'+BK_COLLECTIONS[i]+'">'+BK_COLLECTIONS[i]+' ('+docs.length+')</option>';
      }
    }catch(e){}
  }
  var lastBk=localStorage.getItem("lastBackup")||"Nunca";
  stats.innerHTML='<div style="background:#fff;border:1px solid #E8E3DC;border-radius:10px;padding:10px;text-align:center"><div style="font-size:18px;font-weight:900;color:#1A1816">'+colCount+'</div><div style="font-size:9px;font-weight:700;color:#8A8078;text-transform:uppercase">Colecciones</div></div>'
    +'<div style="background:#fff;border:1px solid #E8E3DC;border-radius:10px;padding:10px;text-align:center"><div style="font-size:18px;font-weight:900;color:#1A1816">'+totalDocs+'</div><div style="font-size:9px;font-weight:700;color:#8A8078;text-transform:uppercase">Documentos</div></div>'
    +'<div style="background:#fff;border:1px solid #E8E3DC;border-radius:10px;padding:10px;text-align:center"><div style="font-size:12px;font-weight:900;color:#2E6B42">'+lastBk+'</div><div style="font-size:9px;font-weight:700;color:#8A8078;text-transform:uppercase">Último backup</div></div>';
  if(list)list.innerHTML=tags;
}

async function bkExport(){
  var btn=document.getElementById("bk-export-btn");var bar=document.getElementById("bk-export-bar");
  var prog=document.getElementById("bk-export-progress");var status=document.getElementById("bk-export-status");
  var log=document.getElementById("bk-export-log");
  btn.disabled=true;btn.textContent="⏳ Exportando...";prog.style.display="block";log.style.display="block";log.innerHTML="";
  var backup={_meta:{version:PORTAL_VERSION,fecha:new Date().toISOString(),fechaStr:new Date().toLocaleDateString("es-ES")+" "+new Date().toLocaleTimeString("es-ES")},collections:{}};
  var totalDocs=0;
  for(var i=0;i<BK_COLLECTIONS.length;i++){
    var col=BK_COLLECTIONS[i];status.textContent="Leyendo "+col+"...";bar.style.width=Math.round((i/BK_COLLECTIONS.length)*100)+"%";
    try{var docs=await bkFbRead(col);if(docs.length>0){backup.collections[col]=docs;totalDocs+=docs.length;log.innerHTML+='<span style="color:#2E6B42">✅ '+col+': '+docs.length+'</span>\n';}else{log.innerHTML+='<span style="color:#8A8078">⬜ '+col+': vacía</span>\n';}}
    catch(e){log.innerHTML+='<span style="color:#991B1B">❌ '+col+': '+e.message+'</span>\n';}
  }
  backup._meta.totalDocumentos=totalDocs;backup._meta.totalColecciones=Object.keys(backup.collections).length;
  bar.style.width="100%";status.textContent="✅ "+totalDocs+" docs de "+Object.keys(backup.collections).length+" colecciones";
  var blob=new Blob([JSON.stringify(backup,null,2)],{type:"application/json"});
  var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="backup_crm_"+new Date().toISOString().split("T")[0].replace(/-/g,"")+".json";a.click();
  localStorage.setItem("lastBackup",new Date().toLocaleDateString("es-ES"));
  log.innerHTML+='<span style="color:#2E6B42">\n💾 Descargado ('+Math.round(blob.size/1024)+' KB)</span>\n';
  btn.disabled=false;btn.textContent="💾 Descargar backup completo";
}

function bkHandleFile(file){
  if(!file)return;var reader=new FileReader();
  reader.onload=function(e){
    try{bkImportData=JSON.parse(e.target.result);
      if(!bkImportData.collections){alert("Archivo no válido");bkImportData=null;return;}
      var cols=Object.keys(bkImportData.collections);var td=cols.reduce(function(s,c){return s+(bkImportData.collections[c]||[]).length;},0);
      var meta=bkImportData._meta||{};
      var prev=document.getElementById("bk-import-preview");var btn=document.getElementById("bk-import-btn");
      prev.style.display="block";
      prev.innerHTML='<div style="background:#fff;border:1px solid #F0DDB4;border-radius:10px;padding:12px;margin-bottom:10px">'
        +'<p style="margin:0 0 4px;font-size:12px;font-weight:700;color:#92400E">📋 Contenido del backup</p>'
        +'<p style="margin:0;font-size:11px;color:#8A8078">Fecha: <strong>'+(meta.fechaStr||"?")+'</strong> · '+cols.length+' colecciones · '+td+' documentos</p>'
        +'<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:8px">'+cols.map(function(c){return '<span style="background:#FEF9EE;border:1px solid #F0DDB4;border-radius:6px;padding:2px 8px;font-size:10px;font-weight:600;color:#92400E">'+c+' <strong>'+(bkImportData.collections[c]||[]).length+'</strong></span>';}).join("")+'</div></div>';
      btn.style.display="block";
    }catch(err){alert("Error: "+err.message);}
  };reader.readAsText(file);
}

async function bkImport(){
  if(!bkImportData||!bkImportData.collections)return;
  if(!confirm("⚠️ ¿Seguro? Sobreescribirá documentos existentes."))return;
  var btn=document.getElementById("bk-import-btn");var bar=document.getElementById("bk-import-bar");
  var prog=document.getElementById("bk-import-progress");var status=document.getElementById("bk-import-status");
  var log=document.getElementById("bk-import-log");
  btn.disabled=true;btn.textContent="⏳ Restaurando...";prog.style.display="block";log.style.display="block";log.innerHTML="";
  var cols=Object.keys(bkImportData.collections);var totalDocs=cols.reduce(function(s,c){return s+(bkImportData.collections[c]||[]).length;},0);
  var written=0;var errors=0;
  for(var ci=0;ci<cols.length;ci++){
    var col=cols[ci];var docs=bkImportData.collections[col]||[];
    status.textContent=col+" ("+docs.length+")...";log.innerHTML+='<span style="color:#3B82F6">📝 '+col+'...</span>\n';
    for(var di=0;di<docs.length;di++){
      try{await bkFbWrite(col,docs[di].id||col+"_"+di,docs[di]);written++;}catch(e){errors++;}
      if((written+errors)%20===0)bar.style.width=Math.round(((written+errors)/totalDocs)*100)+"%";
    }
    log.innerHTML+='<span style="color:#2E6B42">  ✅ '+col+': '+docs.length+'</span>\n';
  }
  bar.style.width="100%";status.textContent="✅ "+written+" escritos, "+errors+" errores";
  btn.disabled=false;btn.textContent="⚡ Restaurar datos";
}

async function bkExportSingle(){
  var col=document.getElementById("bk-single-col").value;if(!col){alert("Selecciona colección");return;}
  var docs=await bkFbRead(col);
  var blob=new Blob([JSON.stringify({_meta:{collection:col,fecha:new Date().toISOString(),total:docs.length},documents:docs},null,2)],{type:"application/json"});
  var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="backup_"+col+"_"+new Date().toISOString().split("T")[0]+".json";a.click();
}

async function bkDeleteSingle(){
  var col=document.getElementById("bk-single-col").value;if(!col){alert("Selecciona colección");return;}
  if(!confirm("⚠️ PELIGRO: Eliminar TODOS los documentos de '"+col+"'?"))return;
  if(!confirm("⚠️ ÚLTIMA OPORTUNIDAD: No se puede deshacer."))return;
  var docs=await bkFbRead(col);for(var i=0;i<docs.length;i++){await fetch("https://firestore.googleapis.com/v1/projects/grupo-consolidado-crm/databases/(default)/documents/"+col+"/"+docs[i].id,{method:"DELETE"});}
  alert("✅ "+docs.length+" docs eliminados de "+col);bkScan();
}
