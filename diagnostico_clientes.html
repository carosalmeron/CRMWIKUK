<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Limpieza Clientes</title>
<style>
*{box-sizing:border-box;}body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;max-width:700px;margin:20px auto;padding:12px;background:#F8FAFC;}
h1{font-size:1.2rem;margin:0 0 4px;}p.sub{color:#64748B;font-size:.82rem;margin:0 0 14px;}
.card{background:#fff;border-radius:12px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:10px;border:1px solid #E2E8F0;}
.btn{padding:12px 16px;font-size:.9rem;font-weight:700;border:none;border-radius:10px;cursor:pointer;font-family:inherit;width:100%;}
.btn-main{background:#6366F1;color:#fff;}.btn-main:disabled{background:#CBD5E1;}
.btn-fix{background:#22C55E;color:#fff;font-size:.85rem;padding:10px 16px;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-family:inherit;width:100%;margin-top:6px;}
.log{background:#1E293B;color:#4ADE80;font-family:monospace;font-size:.7rem;padding:10px;border-radius:8px;max-height:100px;overflow-y:auto;white-space:pre-wrap;margin-top:6px;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:10px 0;}
.stat{text-align:center;background:#F1F5F9;border-radius:10px;padding:10px 4px;}.stat b{display:block;font-size:1.5rem;}.stat small{font-size:.65rem;color:#64748B;text-transform:uppercase;font-weight:700;}
.vendedor{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid #E2E8F0;}
.v-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.v-name{font-size:1rem;font-weight:800;}.v-eq{font-size:.75rem;font-weight:700;padding:2px 8px;border-radius:6px;}
.v-codes{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;}
.code{padding:3px 8px;border-radius:6px;font-size:.75rem;font-weight:600;font-family:monospace;}
.code-ok{background:#DCFCE7;color:#166534;}.code-warn{background:#FEF3C7;color:#92400E;}.code-bad{background:#FEE2E2;color:#991B1B;}
.v-detail{font-size:.8rem;color:#64748B;margin-bottom:8px;}
.cli-mini{font-size:.72rem;color:#94A3B8;padding:1px 0;}
.hidden{display:none;}
.bar-wrap{background:#E2E8F0;border-radius:99px;height:8px;overflow:hidden;margin-top:4px;}.bar{height:100%;background:#6366F1;border-radius:99px;transition:width .3s;}
select{width:100%;padding:10px;border-radius:8px;border:1.5px solid #E2E8F0;font-size:.85rem;font-family:inherit;background:#fff;}
.sep{border:none;border-top:2px solid #E0E7FF;margin:16px 0;}
</style>
</head>
<body>
<h1>🧹 Limpieza de Clientes</h1>
<p class="sub">Unifica códigos de vendedor, corrige equipos y asigna huérfanos</p>

<div class="card">
  <button class="btn btn-main" onclick="analizar()" id="btnLoad">📥 Analizar</button>
  <div id="logBox" class="hidden"><div class="log" id="log"></div></div>
</div>

<div id="main" class="hidden"></div>

<script>
const FB="https://firestore.googleapis.com/v1/projects/grupo-consolidado-crm/databases/(default)/documents";

// Vendedores oficiales — CÓDIGO ESTÁNDAR es grupoAgente (MAYÚSCULAS)
const VENDEDORES=[
  {id:"wk1",nombre:"David Mag",codigo:"DAVIDMAG",equipo:"WIKUK"},
  {id:"wk2",nombre:"Verónica",codigo:"VERONICA",equipo:"WIKUK"},
  {id:"wk3",nombre:"Silvia",codigo:"SILVIA",equipo:"WIKUK"},
  {id:"ik1",nombre:"Carlos G.",codigo:"CARLOSG",equipo:"INTERKEY"},
  {id:"ik2",nombre:"Ricardo",codigo:"RICARDO",equipo:"INTERKEY"},
  {id:"ik4",nombre:"Azarco",codigo:"AZARCO",equipo:"INTERKEY"},
  {id:"rpiedra",nombre:"Ramon",codigo:"RPIEDRA",equipo:"WIKUK"},
  {id:"jl",nombre:"Jose Luis",codigo:"JLGARCIA",equipo:"INTERKEY"},
  {id:"esther",nombre:"Esther",codigo:"ESTHER",equipo:"WIKUK"},
  {id:"dvega",nombre:"D. Vega",codigo:"DVEGA",equipo:"WIKUK"},
  {id:"barbela",nombre:"Barbela",codigo:"BARBELA",equipo:"WIKUK"},
  {id:"acruz",nombre:"A. Cruz",codigo:"ACRUZ",equipo:"WIKUK"},
  {id:"rjesus",nombre:"R. Jesús",codigo:"RJESUS",equipo:"WIKUK"},
  {id:"rpepe",nombre:"R. Pepe",codigo:"RPEPE",equipo:"WIKUK"},
  {id:"miguel",nombre:"Miguel",codigo:"MIGUEL",equipo:"INTERKEY"},
  {id:"julia",nombre:"Julia J.",codigo:"JULIA",equipo:"INTERKEY"},
  {id:"zafra",nombre:"Zafra JM",codigo:"ZAFRA",equipo:"WIKUK"},
  {id:"agustin",nombre:"Agustín",codigo:"AGUSTIN",equipo:"WIKUK"},
  {id:"pacoveses",nombre:"Paco Veses",codigo:"PACOVESES",equipo:"WIKUK"},
];

// Mapa: cualquier variante → vendedor oficial
const RESOLVE={};
VENDEDORES.forEach(v=>{
  [v.id, v.codigo, v.nombre].forEach(k=>{
    if(k) RESOLVE[k.toUpperCase().replace(/[\.\s]/g,"")]=v;
  });
});

function resolve(raw){
  if(!raw)return null;
  return RESOLVE[raw.toUpperCase().replace(/[\.\s]/g,"")]||null;
}

function log(m){document.getElementById("log").textContent+=m+"\n";document.getElementById("log").scrollTop=9e9;document.getElementById("logBox").classList.remove("hidden");}

async function fbRead(col){
  let all=[],pt=null;
  for(let p=0;p<50;p++){
    let url=`${FB}/${col}?pageSize=300`;if(pt)url+=`&pageToken=${pt}`;
    const r=await fetch(url),d=await r.json();if(!d.documents)break;
    d.documents.forEach(doc=>{
      const o={id:doc.name.split("/").pop()};
      if(doc.fields)Object.entries(doc.fields).forEach(([k,v])=>{o[k]=v.stringValue||v.integerValue||v.doubleValue||v.booleanValue||"";});
      all.push(o);
    });
    pt=d.nextPageToken;if(!pt)break;
  }
  log(`  ${col}: ${all.length}`);return all;
}

async function analizar(){
  document.getElementById("btnLoad").disabled=true;
  document.getElementById("btnLoad").textContent="Analizando...";
  log("📥 Cargando...");

  // Cargar portal_users y añadir al mapa
  try{
    const pu=await fbRead("portal_users");
    pu.forEach(u=>{
      if(u.id&&!RESOLVE[u.id.toUpperCase().replace(/[\.\s]/g,"")]){
        const v={id:u.id,nombre:u.nombre||u.id,codigo:u.grupoAgente||u.id.toUpperCase(),equipo:u.equipo||""};
        VENDEDORES.push(v);
        [v.id,v.codigo,v.nombre].forEach(k=>{if(k)RESOLVE[k.toUpperCase().replace(/[\.\s]/g,"")]=v;});
      }
    });
  }catch(e){}

  const clientes=await fbRead("clientes");
  log(`✅ ${clientes.length} clientes`);

  // Agrupar por vendedor resuelto
  const porVendedor={};// codigo → {vendedor, clientes, codigosUsados:{code→count}, equiposMal:[]}
  const huerfanos={};// codigo crudo → [clientes]

  clientes.forEach(c=>{
    const ga=(c.GRUPOAGENTE||c.agente||"").trim();
    if(!ga){huerfanos["(VACÍO)"]=(huerfanos["(VACÍO)"]||[]);huerfanos["(VACÍO)"].push(c);return;}
    const v=resolve(ga);
    if(!v){huerfanos[ga]=(huerfanos[ga]||[]);huerfanos[ga].push(c);return;}
    const key=v.codigo;
    if(!porVendedor[key])porVendedor[key]={v,clientes:[],codigos:{},equiposMal:[]};
    porVendedor[key].clientes.push(c);
    porVendedor[key].codigos[ga]=(porVendedor[key].codigos[ga]||0)+1;
    if(v.equipo&&c.equipo&&c.equipo!=="0"&&c.equipo!==v.equipo) porVendedor[key].equiposMal.push(c);
  });

  // Contar problemas
  let totalArreglar=0;
  const vendedoresProblema=[];
  Object.values(porVendedor).forEach(pv=>{
    const codes=Object.keys(pv.codigos);
    const noStd=codes.filter(c=>c!==pv.v.codigo);
    const nFix=noStd.reduce((s,c)=>s+pv.codigos[c],0)+pv.equiposMal.length;
    if(nFix>0){totalArreglar+=nFix;vendedoresProblema.push(pv);}
  });
  const totalHuerfanos=Object.values(huerfanos).reduce((s,a)=>s+a.length,0);

  // Render
  let html=`<div class="stats">
    <div class="stat"><b style="color:#22C55E">${Object.keys(porVendedor).length}</b><small>Vendedores</small></div>
    <div class="stat"><b style="color:#F59E0B">${totalArreglar}</b><small>A normalizar</small></div>
    <div class="stat"><b style="color:#DC2626">${totalHuerfanos}</b><small>Huérfanos</small></div>
  </div>`;

  // SECCIÓN 1: Vendedores con códigos a normalizar
  if(vendedoresProblema.length>0){
    html+=`<h2 style="font-size:1rem;color:#F59E0B;margin:14px 0 8px">⚠️ Vendedores con códigos a normalizar</h2>
    <p style="font-size:.8rem;color:#64748B;margin:0 0 10px">Estos vendedores tienen clientes con códigos diferentes. Pulsa "Normalizar" para unificar todo al código estándar.</p>`;
    
    vendedoresProblema.forEach(pv=>{
      const codes=Object.entries(pv.codigos).sort((a,b)=>b[1]-a[1]);
      const noStd=codes.filter(([c])=>c!==pv.v.codigo);
      const nFix=noStd.reduce((s,[,n])=>s+n,0);
      const eqColor=pv.v.equipo==="WIKUK"?"#22C55E":"#F59E0B";
      
      html+=`<div class="vendedor" style="border-left:4px solid ${eqColor}">
        <div class="v-head">
          <span class="v-name">${pv.v.nombre}</span>
          <span class="v-eq" style="background:${eqColor}20;color:${eqColor}">${pv.v.equipo}</span>
        </div>
        <div style="margin-bottom:6px;font-size:.82rem">
          Código estándar: <b style="color:#22C55E">${pv.v.codigo}</b> (${pv.codigos[pv.v.codigo]||0} clientes)
        </div>
        <div class="v-codes">`;
      
      noStd.forEach(([c,n])=>{
        html+=`<span class="code code-warn">${c} → ${pv.v.codigo} (${n} cli)</span>`;
      });
      if(pv.equiposMal.length>0){
        html+=`<span class="code code-bad">${pv.equiposMal.length} equipo mal → ${pv.v.equipo}</span>`;
      }
      
      html+=`</div>
        <button class="btn-fix" onclick="normalizar('${pv.v.codigo}')">✅ Normalizar ${nFix} clientes + ${pv.equiposMal.length} equipos → ${pv.v.codigo} / ${pv.v.equipo}</button>
      </div>`;
    });
    
    html+=`<button class="btn-fix" style="background:#6366F1;margin:10px 0" onclick="normalizarTodos()">🚀 Normalizar TODOS (${totalArreglar} clientes)</button>`;
  }

  // SECCIÓN 2: Huérfanos
  if(totalHuerfanos>0){
    html+=`<hr class="sep"><h2 style="font-size:1rem;color:#DC2626;margin:14px 0 8px">🔴 Clientes huérfanos (${totalHuerfanos})</h2>
    <p style="font-size:.8rem;color:#64748B;margin:0 0 10px">Estos clientes tienen un código de vendedor que no existe en el CRM. Selecciona a quién reasignarlos.</p>`;
    
    Object.keys(huerfanos).sort((a,b)=>huerfanos[b].length-huerfanos[a].length).forEach(ga=>{
      const items=huerfanos[ga];
      const safe=ga.replace(/[^a-zA-Z0-9]/g,"_");
      html+=`<div class="vendedor" style="border-left:4px solid #DC2626">
        <div class="v-head">
          <span class="v-name" style="color:#DC2626">${ga}</span>
          <span style="font-size:.8rem;color:#64748B">${items.length} clientes</span>
        </div>
        <select id="h_${safe}">
          <option value="">— Reasignar a... —</option>
          <optgroup label="WIKUK">${VENDEDORES.filter(v=>v.equipo==="WIKUK").map(v=>`<option value="${v.codigo}|${v.id}|${v.equipo}">${v.nombre} (${v.codigo})</option>`).join("")}</optgroup>
          <optgroup label="INTERKEY">${VENDEDORES.filter(v=>v.equipo==="INTERKEY").map(v=>`<option value="${v.codigo}|${v.id}|${v.equipo}">${v.nombre} (${v.codigo})</option>`).join("")}</optgroup>
        </select>
        <button class="btn-fix" onclick="reasignar('${ga}','h_${safe}')">✅ Reasignar ${items.length} clientes</button>
        <div style="margin-top:6px;max-height:100px;overflow-y:auto">
          ${items.slice(0,10).map(c=>`<div class="cli-mini">${c.NOMBRE||c.nombre||"?"} · ${c.CODIGO||""}</div>`).join("")}
          ${items.length>10?`<div class="cli-mini">...y ${items.length-10} más</div>`:""}
        </div>
      </div>`;
    });
  }

  if(totalArreglar===0&&totalHuerfanos===0){
    html+=`<div class="card" style="text-align:center;padding:30px"><p style="font-size:2rem">✅</p><p style="font-weight:800;color:#22C55E;font-size:1.1rem">Todo limpio</p><p style="color:#64748B">Todos los clientes tienen vendedor y equipo correctos</p></div>`;
  }

  html+=`<div id="prog" class="hidden" style="margin-top:10px"><p id="progTxt" style="font-size:.82rem;margin:2px 0"></p><div class="bar-wrap"><div class="bar" id="bar"></div></div></div>`;

  document.getElementById("main").innerHTML=html;
  document.getElementById("main").classList.remove("hidden");
  
  // Store data for actions
  window._porVendedor=porVendedor;
  window._huerfanos=huerfanos;

  document.getElementById("btnLoad").disabled=false;
  document.getElementById("btnLoad").textContent="🔄 Re-analizar";
}

async function patch(items,fields,label){
  document.getElementById("prog").classList.remove("hidden");
  let done=0;
  for(const c of items){
    try{
      const masks=Object.keys(fields).map(k=>`updateMask.fieldPaths=${k}`).join("&");
      const fb={};Object.entries(fields).forEach(([k,v])=>{fb[k]={stringValue:v};});
      await fetch(`${FB}/clientes/${c.id}?${masks}`,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({fields:fb})});
      done++;
    }catch(e){}
    document.getElementById("bar").style.width=Math.round(done/items.length*100)+"%";
    document.getElementById("progTxt").textContent=`${label}: ${done}/${items.length}`;
  }
  document.getElementById("prog").classList.add("hidden");
  document.getElementById("bar").style.width="0%";
  return done;
}

async function normalizar(codigo){
  const pv=window._porVendedor[codigo];if(!pv)return;
  const v=pv.v;
  // Clientes con código diferente al estándar
  const aFix=pv.clientes.filter(c=>{const ga=(c.GRUPOAGENTE||c.agente||"").trim();return ga!==v.codigo;});
  // Clientes con equipo malo
  const eqFix=pv.equiposMal;
  const total=new Set([...aFix.map(c=>c.id),...eqFix.map(c=>c.id)]);
  const all=pv.clientes.filter(c=>total.has(c.id));
  if(!confirm(`Normalizar ${all.length} clientes de ${v.nombre}:\n• GRUPOAGENTE → ${v.codigo}\n• agente → ${v.id}\n• equipo → ${v.equipo}`))return;
  const n=await patch(all,{GRUPOAGENTE:v.codigo,agente:v.id,equipo:v.equipo},v.nombre);
  alert(`✅ ${n} clientes normalizados`);
  analizar();
}

async function normalizarTodos(){
  if(!confirm("¿Normalizar TODOS los vendedores con problemas?"))return;
  for(const pv of Object.values(window._porVendedor)){
    const codes=Object.keys(pv.codigos);
    const noStd=codes.filter(c=>c!==pv.v.codigo);
    if(noStd.length===0&&pv.equiposMal.length===0)continue;
    const aFix=pv.clientes.filter(c=>{const ga=(c.GRUPOAGENTE||c.agente||"").trim();return ga!==pv.v.codigo||(pv.v.equipo&&c.equipo&&c.equipo!=="0"&&c.equipo!==pv.v.equipo);});
    if(aFix.length>0) await patch(aFix,{GRUPOAGENTE:pv.v.codigo,agente:pv.v.id,equipo:pv.v.equipo},pv.v.nombre);
  }
  alert("✅ Normalización completa");
  analizar();
}

async function reasignar(ga,selId){
  const val=document.getElementById(selId).value;
  if(!val)return alert("Selecciona el vendedor destino");
  const [codigo,id,equipo]=val.split("|");
  const items=window._huerfanos[ga]||[];
  if(!confirm(`Reasignar ${items.length} clientes de "${ga}" a ${codigo} (${equipo})`))return;
  const n=await patch(items,{GRUPOAGENTE:codigo,agente:id,equipo:equipo},"Reasignando");
  alert(`✅ ${n} clientes reasignados`);
  analizar();
}
</script>
</body>
</html>
