<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Diagnóstico de Clientes</title>
<style>
*{box-sizing:border-box;} body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;max-width:750px;margin:30px auto;padding:16px;background:#F8FAFC;}
h1{color:#1E293B;font-size:1.3rem;margin-bottom:4px;} .sub{color:#64748B;font-size:.85rem;margin-bottom:16px;}
.card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:12px;border:1px solid #E2E8F0;}
.btn{padding:12px 20px;font-size:.95rem;font-weight:700;border:none;border-radius:10px;cursor:pointer;font-family:inherit;width:100%;}
.btn-main{background:#6366F1;color:#fff;} .btn-main:disabled{background:#CBD5E1;cursor:not-allowed;}
.btn-fix{background:#22C55E;color:#fff;font-size:.85rem;padding:8px 14px;width:auto;border-radius:8px;}
.btn-sm{background:#1E293B;color:#fff;font-size:.8rem;padding:6px 12px;border-radius:6px;width:auto;}
.log{background:#1E293B;color:#4ADE80;font-family:monospace;font-size:.72rem;padding:12px;border-radius:8px;max-height:180px;overflow-y:auto;margin-top:8px;white-space:pre-wrap;}
.stats{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap;}
.stat{flex:1;min-width:70px;text-align:center;background:#F1F5F9;border-radius:10px;padding:10px 6px;border:1px solid #E2E8F0;}
.stat-n{font-size:1.4rem;font-weight:900;} .stat-l{font-size:.6rem;color:#64748B;text-transform:uppercase;font-weight:700;}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:8px;margin-bottom:3px;border:1px solid #E2E8F0;font-size:.85rem;flex-wrap:wrap;gap:4px;}
.tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:.7rem;font-weight:700;}
.tag-red{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA;}
.tag-green{background:#F0FDF4;color:#059669;border:1px solid #BBF7D0;}
.tag-yellow{background:#FFFBEB;color:#D97706;border:1px solid #FDE68A;}
.group{margin-bottom:16px;} .group-h{font-size:.95rem;font-weight:800;color:#6366F1;border-bottom:2px solid #E0E7FF;padding-bottom:4px;margin-bottom:8px;}
select{padding:6px 8px;border-radius:6px;border:1px solid #E2E8F0;font-size:.8rem;}
.progress{margin-top:8px;} .bar-wrap{background:#E2E8F0;border-radius:99px;height:8px;overflow:hidden;} .bar{height:100%;background:#6366F1;border-radius:99px;width:0%;transition:width .3s;}
.hidden{display:none;}
</style>
</head>
<body>
<h1>🔍 Diagnóstico de Clientes</h1>
<p class="sub">Detecta clientes sin vendedor asignado o con vendedor incorrecto y corrígelos</p>

<div class="card">
  <button class="btn btn-main" onclick="cargar()" id="btnCargar">📥 Analizar clientes en Firebase</button>
  <div id="logDiv" class="hidden"><div class="log" id="log"></div></div>
</div>

<div id="resultados" class="hidden">
  <div class="stats" id="stats"></div>
  <div id="contenido"></div>
  <div id="progressDiv" class="hidden">
    <div class="progress"><p id="progressText" style="font-size:.85rem;"></p><div class="bar-wrap"><div class="bar" id="bar"></div></div></div>
  </div>
</div>

<script>
const FB="https://firestore.googleapis.com/v1/projects/grupo-consolidado-crm/databases/(default)/documents";

// Agentes conocidos del CRM con TODOS sus identificadores
const AGENTES=[
  {id:"wk1",nombre:"David Mag",grupoAgente:"DAVIDMAG",equipo:"WIKUK"},
  {id:"wk2",nombre:"Verónica",grupoAgente:"VERONICA",equipo:"WIKUK"},
  {id:"wk3",nombre:"Silvia",grupoAgente:"SILVIA",equipo:"WIKUK"},
  {id:"ik1",nombre:"Carlos G.",grupoAgente:"CARLOSG",equipo:"INTERKEY"},
  {id:"ik2",nombre:"Ricardo",grupoAgente:"RICARDO",equipo:"INTERKEY"},
  {id:"ik4",nombre:"Azarco",grupoAgente:"AZARCO",equipo:"INTERKEY"},
  {id:"rpiedra",nombre:"Ramon",grupoAgente:"RPIEDRA",equipo:"WIKUK"},
  {id:"jl",nombre:"Jose Luis",grupoAgente:"JLGARCIA",equipo:"INTERKEY"},
  {id:"esther",nombre:"Esther",grupoAgente:"ESTHER",equipo:"WIKUK"},
  {id:"dvega",nombre:"D. Vega",grupoAgente:"DVEGA",equipo:"WIKUK"},
  {id:"barbela",nombre:"Barbela",grupoAgente:"BARBELA",equipo:"WIKUK"},
  {id:"acruz",nombre:"A. Cruz",grupoAgente:"ACRUZ",equipo:"WIKUK"},
  {id:"rjesus",nombre:"R. Jesús",grupoAgente:"RJESUS",equipo:"WIKUK"},
  {id:"rpepe",nombre:"R. Pepe",grupoAgente:"RPEPE",equipo:"WIKUK"},
  {id:"miguel",nombre:"Miguel",grupoAgente:"MIGUEL",equipo:"INTERKEY"},
  {id:"julia",nombre:"Julia J.",grupoAgente:"JULIA",equipo:"INTERKEY"},
  {id:"zafra",nombre:"Zafra JM",grupoAgente:"ZAFRA",equipo:"WIKUK"},
  {id:"agustin",nombre:"Agustín",grupoAgente:"AGUSTIN",equipo:"WIKUK"},
  {id:"pacoveses",nombre:"Paco Veses",grupoAgente:"PACOVESES",equipo:"WIKUK"},
];

// Todos los IDs/alias conocidos
const ALIAS_MAP={};
AGENTES.forEach(a=>{
  [a.id, a.grupoAgente, a.nombre].forEach(k=>{
    if(k) ALIAS_MAP[k.toUpperCase().replace(/\./g,"").replace(/\s+/g,"")]=a;
  });
});

function resolveAgent(raw){
  if(!raw) return null;
  var k=raw.toUpperCase().replace(/\./g,"").replace(/\s+/g,"");
  return ALIAS_MAP[k]||null;
}

let todosClientes=[];

function log(msg){
  document.getElementById("log").textContent+=msg+"\n";
  document.getElementById("logDiv").classList.remove("hidden");
}

async function fbLeerPaginado(col){
  let all=[],pt=null;
  for(let p=0;p<50;p++){
    let url=`${FB}/${col}?pageSize=300`;
    if(pt) url+=`&pageToken=${pt}`;
    const r=await fetch(url);const d=await r.json();
    if(!d.documents) break;
    d.documents.forEach(doc=>{
      const o={id:doc.name.split("/").pop()};
      if(doc.fields) Object.entries(doc.fields).forEach(([k,v])=>{
        o[k]=v.stringValue||v.integerValue||v.doubleValue||v.booleanValue||v.nullValue||"";
      });
      all.push(o);
    });
    log(`  ${col} pág ${p+1}: ${d.documents.length} (total: ${all.length})`);
    pt=d.nextPageToken;if(!pt) break;
  }
  return all;
}

async function cargar(){
  document.getElementById("btnCargar").disabled=true;
  document.getElementById("btnCargar").textContent="Analizando...";
  log("📥 Cargando clientes...");
  
  try{
    todosClientes=await fbLeerPaginado("clientes");
    log(`✅ ${todosClientes.length} clientes cargados`);
    
    // Cargar también portal_users para tener más agentes
    let portalUsers=[];
    try{portalUsers=await fbLeerPaginado("portal_users");log(`✅ ${portalUsers.length} portal_users`);}catch(e){}
    portalUsers.forEach(pu=>{
      if(pu.id&&pu.nombre&&!ALIAS_MAP[pu.id.toUpperCase()]){
        var a={id:pu.id,nombre:pu.nombre,grupoAgente:pu.grupoAgente||pu.id.toUpperCase(),equipo:pu.equipo||""};
        AGENTES.push(a);
        [a.id,a.grupoAgente,a.nombre].forEach(k=>{if(k)ALIAS_MAP[k.toUpperCase().replace(/\./g,"").replace(/\s+/g,"")]=a;});
      }
    });
    
    // Analizar
    let ok=0,sinAgente=0,agenteDesconocido=0,equipoMal=0;
    let problemas=[];
    let agenteStats={};
    
    todosClientes.forEach(c=>{
      const ga=c.GRUPOAGENTE||c.agente||c.grupoAgente||"";
      const resolved=resolveAgent(ga);
      
      if(!ga||!ga.trim()){
        sinAgente++;
        problemas.push({cli:c,tipo:"sin_agente",ga:ga,resolved:null});
        return;
      }
      
      if(!resolved){
        agenteDesconocido++;
        if(!agenteStats[ga]) agenteStats[ga]={nombre:ga,count:0,tipo:"desconocido"};
        agenteStats[ga].count++;
        problemas.push({cli:c,tipo:"desconocido",ga:ga,resolved:null});
        return;
      }
      
      // Verificar equipo
      const cliEquipo=c.equipo||"";
      if(resolved.equipo&&cliEquipo&&cliEquipo!=="0"&&cliEquipo!==resolved.equipo){
        equipoMal++;
        problemas.push({cli:c,tipo:"equipo_mal",ga:ga,resolved:resolved,equipoActual:cliEquipo,equipoCorrecto:resolved.equipo});
      }
      
      ok++;
    });
    
    // Stats
    document.getElementById("stats").innerHTML=`
      <div class="stat"><div class="stat-n" style="color:#22C55E">${ok}</div><div class="stat-l">✅ OK</div></div>
      <div class="stat"><div class="stat-n" style="color:#DC2626">${sinAgente}</div><div class="stat-l">🔴 Sin agente</div></div>
      <div class="stat"><div class="stat-n" style="color:#F59E0B">${agenteDesconocido}</div><div class="stat-l">⚠️ Desconocido</div></div>
      <div class="stat"><div class="stat-n" style="color:#6366F1">${equipoMal}</div><div class="stat-l">🔄 Equipo mal</div></div>
    `;
    
    // Render problemas
    let html="";
    
    // Agentes desconocidos agrupados
    const descGrupos={};
    problemas.filter(p=>p.tipo==="desconocido").forEach(p=>{
      if(!descGrupos[p.ga]) descGrupos[p.ga]=[];
      descGrupos[p.ga].push(p);
    });
    
    if(Object.keys(descGrupos).length>0){
      html+=`<div class="group"><div class="group-h">⚠️ Agentes desconocidos (${agenteDesconocido} clientes)</div>`;
      Object.keys(descGrupos).sort((a,b)=>descGrupos[b].length-descGrupos[a].length).forEach(ga=>{
        const items=descGrupos[ga];
        html+=`<div class="card" style="border-left:4px solid #F59E0B">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <div><b>${ga}</b> <span class="tag tag-yellow">${items.length} clientes</span></div>
            <div style="display:flex;gap:4px;align-items:center">
              <select id="fix_${ga.replace(/[^a-zA-Z0-9]/g,"_")}">
                <option value="">Reasignar a...</option>
                ${AGENTES.filter(a=>a.equipo).map(a=>`<option value="${a.id}|${a.grupoAgente}|${a.equipo}">${a.nombre} (${a.equipo})</option>`).join("")}
              </select>
              <button class="btn-fix" onclick="fixGrupo('${ga}')">Arreglar</button>
            </div>
          </div>
          <div style="max-height:150px;overflow-y:auto">
          ${items.slice(0,20).map(p=>`<div style="font-size:.75rem;color:#64748B;padding:2px 0">${p.cli.NOMBRE||p.cli.nombre||"?"} (${p.cli.CODIGO||p.cli.codigo||""})</div>`).join("")}
          ${items.length>20?`<div style="font-size:.75rem;color:#94A3B8">...y ${items.length-20} más</div>`:""}
          </div>
        </div>`;
      });
      html+=`</div>`;
    }
    
    // Sin agente
    const sinAg=problemas.filter(p=>p.tipo==="sin_agente");
    if(sinAg.length>0){
      html+=`<div class="group"><div class="group-h">🔴 Sin agente asignado (${sinAg.length})</div>`;
      sinAg.slice(0,30).forEach(p=>{
        html+=`<div class="row">
          <span>${p.cli.NOMBRE||p.cli.nombre||"?"} <span style="color:#94A3B8;font-size:.7rem">${p.cli.CODIGO||""}</span></span>
          <span class="tag tag-red">sin agente</span>
        </div>`;
      });
      html+=`</div>`;
    }
    
    // Equipo mal
    const eqMal=problemas.filter(p=>p.tipo==="equipo_mal");
    if(eqMal.length>0){
      html+=`<div class="group"><div class="group-h">🔄 Equipo incorrecto (${eqMal.length})</div>
        <button class="btn-fix" onclick="fixEquipos()" style="margin-bottom:10px">✅ Corregir todos los equipos</button>`;
      eqMal.slice(0,30).forEach(p=>{
        html+=`<div class="row">
          <span>${p.cli.NOMBRE||p.cli.nombre||"?"} <span style="color:#94A3B8;font-size:.7rem">${p.ga}</span></span>
          <span><span class="tag tag-red">${p.equipoActual}</span> → <span class="tag tag-green">${p.equipoCorrecto}</span></span>
        </div>`;
      });
      html+=`</div>`;
    }
    
    if(problemas.length===0){
      html=`<div class="card" style="text-align:center;padding:30px"><p style="font-size:28px">✅</p><p style="font-weight:800;color:#22C55E">Todos los clientes tienen agente asignado correctamente</p></div>`;
    }
    
    // Guardar para fix
    window._problemas=problemas;
    window._descGrupos=descGrupos;
    window._eqMal=eqMal;
    
    document.getElementById("contenido").innerHTML=html;
    document.getElementById("resultados").classList.remove("hidden");
    
  }catch(e){
    log("❌ Error: "+e.message);
  }
  document.getElementById("btnCargar").disabled=false;
  document.getElementById("btnCargar").textContent="🔄 Re-analizar";
}

async function fixGrupo(ga){
  const selId="fix_"+ga.replace(/[^a-zA-Z0-9]/g,"_");
  const val=document.getElementById(selId).value;
  if(!val) return alert("Selecciona un agente destino");
  const [newId,newGrupo,newEquipo]=val.split("|");
  const items=window._descGrupos[ga]||[];
  if(!confirm(`¿Reasignar ${items.length} clientes de "${ga}" a "${newGrupo}" (${newEquipo})?`)) return;
  
  document.getElementById("progressDiv").classList.remove("hidden");
  let done=0;
  for(const p of items){
    try{
      await fetch(`${FB}/clientes/${p.cli.id}?updateMask.fieldPaths=GRUPOAGENTE&updateMask.fieldPaths=agente&updateMask.fieldPaths=equipo`,{
        method:"PATCH",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({fields:{
          GRUPOAGENTE:{stringValue:newGrupo},
          agente:{stringValue:newId},
          equipo:{stringValue:newEquipo}
        }})
      });
      done++;
    }catch(e){}
    document.getElementById("bar").style.width=Math.round(done/items.length*100)+"%";
    document.getElementById("progressText").textContent=`${done}/${items.length}...`;
  }
  alert(`✅ ${done} clientes reasignados`);
  cargar(); // Re-analizar
}

async function fixEquipos(){
  const items=window._eqMal||[];
  if(!confirm(`¿Corregir equipo de ${items.length} clientes?`)) return;
  
  document.getElementById("progressDiv").classList.remove("hidden");
  let done=0;
  for(const p of items){
    try{
      await fetch(`${FB}/clientes/${p.cli.id}?updateMask.fieldPaths=equipo`,{
        method:"PATCH",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({fields:{equipo:{stringValue:p.equipoCorrecto}}})
      });
      done++;
    }catch(e){}
    document.getElementById("bar").style.width=Math.round(done/items.length*100)+"%";
    document.getElementById("progressText").textContent=`Equipos: ${done}/${items.length}...`;
  }
  alert(`✅ ${done} equipos corregidos`);
  cargar();
}
</script>
</body>
</html>
