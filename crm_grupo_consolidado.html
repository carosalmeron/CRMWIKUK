// ESTRATEGIAS — vista clara por rol
// ═══════════════════════════════════════════════════════════════════
function MisEstrategias({usuario}){
  const esJefe  = usuario?.rol==="jefe"||usuario?.rol==="director"||usuario?.rol==="ceo";
  const esRolJefe = usuario?.rol==="jefe";
  const esRolDir  = usuario?.rol==="director";
  const esRolCeo  = usuario?.rol==="ceo";
  const esAgente  = usuario?.rol==="agente";
  const miEquipo  = usuario?.equipo;

  const [estrategias,setEstrategiasLocal]=useState(()=>GlobalStore.getEstrategias());
  const [cargando,setCargando]=useState(false);
  const [sel,setSel]=useState(null);
  const [filtroSec,setFiltroSec]=useState("todas");
  const [showNuevaEst,setShowNuevaEst]=useState(false);
  const [formEst,setFormEst]=useState({cliente:"",objetivo:"",texto:""});

  useEffect(()=>{
    const unsub=GlobalStore.subscribe(data=>setEstrategiasLocal([...data]));
    return unsub;
  },[]);

  const setEstrategias=(updater)=>{
    const next=typeof updater==="function"?updater(GlobalStore.getEstrategias()):updater;
    GlobalStore.setEstrategias(next);
    setEstrategiasLocal([...next]);
  };

  const recargar=()=>{
    setCargando(true);
    fbLeer("estrategias").then(data=>{
      if(data.length>0){
        const fbIds=new Set(data.map(d=>d.id));
        const merged=[...data.filter(d=>!d.eliminada),...ESTRATEGIAS_SEED.filter(s=>!fbIds.has(s.id))];
        GlobalStore.setEstrategias(merged);
        setEstrategiasLocal([...merged]);
      }
    }).finally(()=>setCargando(false));
  };

  const confirmarEstrategia=(e,ofertasAct,nota)=>{
    const elevadas=ofertasAct.filter(o=>o.elevadaA);
    const hayElevadas=elevadas.length>0;
    const destElevacion=elevadas.find(o=>o.elevadaA==="ceo")?.elevadaA||elevadas[0]?.elevadaA||null;
    const aprobadas=ofertasAct.filter(o=>o.aprobada===true);
    const rechazadas=ofertasAct.filter(o=>o.aprobada===false);
    const tipoRes=rechazadas.length===ofertasAct.length&&ofertasAct.length>0?"rechazada":
      aprobadas.length===ofertasAct.length&&ofertasAct.length>0?"aprobada":"aprobada_parcial";
    const entrada={
      accion:hayElevadas?`⚡ Parcial — ${elevadas.length} elevado${elevadas.length>1?"s":""}`:`✅ Resuelto por ${usuario.nombre}`,
      por:usuario.nombre,fecha:new Date().toLocaleDateString("es-ES"),nota};
    const updated=estrategias.map(x=>x.id===e.id?{
      ...x,
      estado:hayElevadas?"pendiente_aprobacion":"en_curso",
      escaladoA:hayElevadas?destElevacion:null,
      resolucion:hayElevadas?null:{tipo:tipoRes,por:usuario.nombre,rol:usuario.rol,
        fecha:new Date().toLocaleDateString("es-ES"),nota},
      aprobadoPor:usuario.nombre,ofertas:ofertasAct,
      seguimientos:[...(x.seguimientos||[]),{semana:14,resultado:hayElevadas?"elevada":tipoRes,nota}],
      historialEscalado:[...(x.historialEscalado||[]),entrada],
    }:x);
    setEstrategias(updated);
    fbEscribir("estrategias",e.id,updated.find(x=>x.id===e.id));
  };

  const escalarEstrategia=(e,destId,nota)=>{
    const dest=USUARIOS.find(u=>u.id===destId);
    const entrada={accion:`↑ Elevada a ${dest?.nombre}`,por:usuario.nombre,
      fecha:new Date().toLocaleDateString("es-ES"),nota};
    const updated=estrategias.map(x=>x.id===e.id?{
      ...x,estado:"pendiente_aprobacion",escaladoA:destId,
      historialEscalado:[...(x.historialEscalado||[]),entrada],
    }:x);
    setEstrategias(updated);
    fbEscribir("estrategias",e.id,updated.find(x=>x.id===e.id));
  };

  const rechazar=(e,motivo)=>{
    const entrada={accion:`❌ Rechazada por ${usuario.nombre}`,por:usuario.nombre,
      fecha:new Date().toLocaleDateString("es-ES"),nota:motivo};
    const updated=estrategias.map(x=>x.id===e.id?{...x,estado:"sin_exito",
      resolucion:{tipo:"rechazada",por:usuario.nombre,rol:usuario.rol,
        fecha:new Date().toLocaleDateString("es-ES"),nota:motivo},
      seguimientos:[...(x.seguimientos||[]),{semana:14,resultado:"rechazada",nota:motivo}],
      historialEscalado:[...(x.historialEscalado||[]),entrada]}:x);
    setEstrategias(updated);
    fbEscribir("estrategias",e.id,updated.find(x=>x.id===e.id));
  };

  // Clasificación
  const deEquipo=(e)=>{
    if(esRolJefe){const ag=USUARIOS.find(u=>u.id===e.agente);return ag?.equipo===miEquipo||e.equipo===miEquipo;}
    return true;
  };

  const pendAprobMia=esRolJefe
    ? estrategias.filter(e=>e.estado==="pendiente_aprobacion"&&!e.escaladoA&&deEquipo(e))
    : estrategias.filter(e=>e.estado==="pendiente_aprobacion"&&e.escaladoA===usuario.id);

  const elevadasPorMi=esJefe&&!esRolCeo
    ? estrategias.filter(e=>e.estado==="pendiente_aprobacion"&&e.escaladoA&&e.escaladoA!==usuario.id&&deEquipo(e))
    : [];

  // Para agente: separadas por resolución
  const aprobadas=esAgente
    ? estrategias.filter(e=>e.agente===usuario.id&&e.resolucion&&
        (e.resolucion.tipo==="aprobada"||e.resolucion.tipo==="aprobada_parcial"))
    : esRolJefe
    ? estrategias.filter(e=>deEquipo(e)&&e.resolucion&&e.resolucion.por!==usuario.nombre&&
        (e.resolucion.tipo==="aprobada"||e.resolucion.tipo==="aprobada_parcial"))
    : estrategias.filter(e=>e.resolucion&&(e.resolucion.tipo==="aprobada"||e.resolucion.tipo==="aprobada_parcial")&&
        ((e.historialEscalado||[]).some(h=>h.por===usuario.nombre)||e.agente===usuario.id));

  const rechazadas=esAgente
    ? estrategias.filter(e=>e.agente===usuario.id&&e.resolucion?.tipo==="rechazada")
    : esRolJefe
    ? estrategias.filter(e=>deEquipo(e)&&e.resolucion?.tipo==="rechazada"&&e.resolucion.por!==usuario.nombre)
    : [];

  const enRevisionAgente=esAgente?estrategias.filter(e=>e.agente===usuario.id&&e.estado==="pendiente_aprobacion"):[];
  const activasAgente=esAgente?estrategias.filter(e=>e.agente===usuario.id&&e.estado==="en_curso"&&!e.resolucion):[];
  const misMostrar=esJefe?estrategias.filter(e=>deEquipo(e)&&e.estado==="en_curso"&&!e.resolucion):[];

  // ── DETALLE ─────────────────────────────────────────────────────
  if(sel){
    const esSuya=sel.agente===usuario.id;
    const res=sel.resolucion;
    const escaladoAMi=sel.escaladoA===usuario.id;
    return(
      <div style={{paddingBottom:100}}>
        <BackBar label="Estrategias" onBack={()=>setSel(null)}/>
        <div style={{padding:"16px"}}>
          {/* Estado visual grande */}
          {res&&(
            <div style={{borderRadius:16,padding:"16px",marginBottom:16,
              background:res.tipo==="aprobada"?T.greenL:res.tipo==="rechazada"?"#FEF2F2":T.amberL,
              border:`2px solid ${res.tipo==="aprobada"?T.green:res.tipo==="rechazada"?T.red:T.amber}`}}>
              <p style={{margin:"0 0 4px",fontSize:20,fontWeight:900,
                color:res.tipo==="aprobada"?T.green:res.tipo==="rechazada"?T.red:T.amber}}>
                {res.tipo==="aprobada"?"✅ Aprobada":res.tipo==="rechazada"?"❌ Rechazada":"⚡ Aprobada parcialmente"}
              </p>
              <p style={{margin:"0 0 8px",fontSize:13,color:T.text}}>
                Por <strong>{res.por}</strong> · {res.fecha}
                {res.nota&&<span> — "{res.nota}"</span>}
              </p>
              {/* Resolución por producto */}
              {(sel.ofertas||[]).length>0&&(
                <div style={{borderTop:`1px solid ${res.tipo==="aprobada"?T.green+"44":T.amber+"44"}`,paddingTop:10,marginTop:8}}>
                  {sel.ofertas.map((o,i)=>(
                    <div key={i} style={{display:"flex",gap:10,alignItems:"center",
                      padding:"8px 0",borderBottom:i<sel.ofertas.length-1?`1px solid ${T.border}`:"none"}}>
                      <span style={{fontSize:18,flexShrink:0}}>
                        {o.aprobada===true?"✅":o.aprobada===false?"❌":o.elevadaA?"⏳":"—"}
                      </span>
                      <div style={{flex:1,minWidth:0}}>
                        <p style={{margin:0,fontSize:13,fontWeight:600,
                          overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{o.nombre}</p>
                        {o.aprobada===true&&(
                          <p style={{margin:0,fontSize:12,color:T.green,fontWeight:700}}>
                            {o.modificada?"Precio modificado: ":"Precio aprobado: "}
                            <strong>{o.precioFinal}€/kg</strong>
                            {o.modificada&&o.precioOriginal&&
                              <span style={{color:T.muted,textDecoration:"line-through",marginLeft:6}}>{o.precioOriginal}€</span>}
                          </p>
                        )}
                        {o.aprobada===false&&<p style={{margin:0,fontSize:12,color:T.red}}>No autorizado</p>}
                        {o.elevadaA&&<p style={{margin:0,fontSize:12,color:T.purple}}>Pendiente decisión superior</p>}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* Tarjeta de aprobación si me toca decidir */}
          {esJefe&&escaladoAMi&&sel.estado==="pendiente_aprobacion"&&(
            <EstrategiaAprobacionCard e={sel} usuario={usuario}
              onConfirmar={(e,of,n)=>{confirmarEstrategia(e,of,n);setSel(null);}}
              onRechazar={(e,m)=>{rechazar(e,m);setSel(null);}}
              onEscalar={(e,d,n)=>{escalarEstrategia(e,d,n);setSel(null);}}/>
          )}

          {/* Info básica */}
          {!res&&!(esJefe&&escaladoAMi&&sel.estado==="pendiente_aprobacion")&&(
            <Card style={{marginBottom:12}}>
              <p style={{margin:"0 0 6px",fontSize:17,fontWeight:800}}>{sel.cliente||sel.clienteNombre}</p>
              <p style={{margin:"0 0 6px",fontSize:13,color:T.muted}}>{sel.texto||sel.estrategia}</p>
              {sel.objetivo&&<p style={{margin:0,fontSize:12,color:T.text}}>🎯 {sel.objetivo}</p>}
              {(sel.ofertas||[]).length>0&&(
                <div style={{marginTop:10,borderTop:`1px solid ${T.border}`,paddingTop:10}}>
                  <p style={{margin:"0 0 6px",fontSize:10,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Productos solicitados</p>
                  {sel.ofertas.map((o,i)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",
                      borderBottom:i<sel.ofertas.length-1?`1px solid ${T.border}`:"none"}}>
                      <span style={{fontSize:12}}>{o.nombre}</span>
                      <span style={{fontSize:12,fontWeight:700,color:T.green}}>
                        {o.precioFinal}€/kg <span style={{color:T.red,fontWeight:600}}>-{o.dto}%</span>
                      </span>
                    </div>
                  ))}
                </div>
              )}
            </Card>
          )}

          {/* Historial de escalado */}
          {(sel.historialEscalado||[]).length>0&&(
            <Card>
              <p style={{margin:"0 0 10px",fontSize:12,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>🕐 Historial</p>
              {[...(sel.historialEscalado||[])].reverse().map((h,i)=>(
                <div key={i} style={{display:"flex",gap:10,paddingBottom:8,marginBottom:8,
                  borderBottom:i<sel.historialEscalado.length-1?`1px solid ${T.border}`:"none"}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:T.navy,flexShrink:0,marginTop:4}}/>
                  <div>
                    <p style={{margin:"0 0 1px",fontSize:12,fontWeight:700}}>{h.accion}</p>
                    {h.nota&&<p style={{margin:"0 0 2px",fontSize:11,color:T.text}}>{h.nota}</p>}
                    <p style={{margin:0,fontSize:10,color:T.muted}}>{h.por} · {h.fecha}</p>
                  </div>
                </div>
              ))}
            </Card>
          )}
        </div>
      </div>
    );
  }

  // ── LISTA PRINCIPAL ───────────────────────────────────────────────
  const Bloque=({titulo,items,colorTitulo=T.muted,renderItem})=>(
    items.length===0?null:(
      <div style={{marginBottom:24}}>
        <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:colorTitulo,textTransform:"uppercase",letterSpacing:".06em"}}>
          {titulo} ({items.length})
        </p>
        {items.map(renderItem)}
      </div>
    )
  );

  const CardEst=({e,onClick,children})=>{
    const ag=USUARIOS.find(u=>u.id===e.agente);
    return(
      <div onClick={onClick} style={{background:"#fff",borderRadius:14,padding:"14px 16px",
        marginBottom:8,cursor:"pointer",border:`1px solid ${T.border}`,
        boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}>
        <div style={{display:"flex",gap:8,marginBottom:6,flexWrap:"wrap"}}>
          {esJefe&&ag&&<Badge label={ag.nombre} color={ag.color}/>}
          {children}
        </div>
        <p style={{margin:"0 0 2px",fontSize:14,fontWeight:800}}>{e.cliente||e.clienteNombre}</p>
        <p style={{margin:0,fontSize:12,color:T.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
          {e.texto||e.estrategia}
        </p>
      </div>
    );
  };

  return(
    <div style={{padding:"16px 16px 100px"}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div>
          <p style={{margin:0,fontSize:22,fontWeight:900,color:T.text}}>🎯 Estrategias</p>
          <p style={{margin:"2px 0 0",fontSize:12,color:T.muted}}>
            {esAgente?"Mis recuperaciones":esRolJefe?`Equipo ${miEquipo}`:esRolDir?"Dirección":"CEO"}
          </p>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setShowNuevaEst(v=>!v)}
            style={{background:showNuevaEst?"#E2E8F0":T.navy,color:showNuevaEst?T.muted:"#fff",
              border:"none",borderRadius:9,padding:"9px 14px",fontSize:13,fontWeight:700,cursor:"pointer"}}>
            {showNuevaEst?"× Cancelar":"+ Nueva"}
          </button>
          <button onClick={recargar} disabled={cargando}
            style={{background:"#fff",border:`1px solid ${T.border}`,borderRadius:9,
              padding:"9px 14px",cursor:cargando?"default":"pointer",color:T.muted,fontSize:13}}>
            {cargando?"⏳":"🔄"}
          </button>
        </div>
      </div>

      {/* Formulario nueva estrategia */}
      {showNuevaEst&&(
        <div style={{background:"#fff",borderRadius:14,padding:16,marginBottom:16,border:"1.5px solid "+T.amber}}>
          <p style={{margin:"0 0 12px",fontSize:16,fontWeight:800,color:T.text}}>🎯 Nueva estrategia</p>

          <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Cliente *</p>
          <SearchInput value={formEst.cliente}
            onChange={v=>setFormEst(f=>({...f,cliente:v}))}
            placeholder="🔍 Buscar cliente..."
            suggestions={(window._clientesFB||[])
              .filter(c=>(c.nombre||c.NOMBRE||"").toLowerCase().includes(formEst.cliente.toLowerCase())&&formEst.cliente.length>=2)
              .slice(0,8).map(c=>({label:c.nombre||c.NOMBRE,sub:c.id,tipo:"cliente"}))}
            onSelect={s=>setFormEst(f=>({...f,cliente:s.label}))}
            style={{marginBottom:10}}/>

          <p style={{margin:"0 0 6px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Tipo</p>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            {[{k:"recuperacion",icon:"🔄",label:"Recuperar cliente"},{k:"nuevo",icon:"🌱",label:"Cliente nuevo"}].map(t=>(
              <button key={t.k} onClick={()=>setFormEst(f=>({...f,tipo:t.k}))}
                style={{flex:1,padding:"10px",borderRadius:10,cursor:"pointer",fontSize:12,
                  border:`2px solid ${(formEst.tipo||"recuperacion")===t.k?T.amber:T.border}`,
                  background:(formEst.tipo||"recuperacion")===t.k?T.amberL:"#fff",
                  color:(formEst.tipo||"recuperacion")===t.k?T.amber:T.muted,
                  fontWeight:(formEst.tipo||"recuperacion")===t.k?700:400}}>
                {t.icon} {t.label}
              </button>
            ))}
          </div>

          <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Acción propuesta *</p>
          <textarea value={formEst.texto} onChange={e=>setFormEst(f=>({...f,texto:e.target.value}))} rows={2}
            placeholder="Muestra + visita personalizada, descuento especial…"
            style={{width:"100%",border:`1.5px solid ${T.border}`,borderRadius:9,padding:"10px 12px",
              fontSize:13,outline:"none",boxSizing:"border-box",resize:"none",fontFamily:"inherit",marginBottom:10}}/>

          <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Objetivo</p>
          <input value={formEst.objetivo||""} onChange={e=>setFormEst(f=>({...f,objetivo:e.target.value}))}
            placeholder="Recuperar pedido mensual, reactivar cuenta…"
            style={{width:"100%",border:`1.5px solid ${T.border}`,borderRadius:9,padding:"10px 12px",
              fontSize:13,outline:"none",boxSizing:"border-box",fontFamily:"inherit",marginBottom:14}}/>

          <p style={{margin:"0 0 8px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>🏷️ Productos con precio oferta</p>
          {(formEst.ofertas||[]).map((o,i)=>(
            <div key={i} style={{background:"#FFFBEB",borderRadius:10,padding:"10px 12px",marginBottom:6,
              border:`1px solid ${T.border}`,borderLeft:`3px solid ${T.amber}`,display:"flex",gap:10,alignItems:"center"}}>
              <div style={{flex:1,minWidth:0}}>
                {o.codigo&&<p style={{margin:0,fontSize:10,fontFamily:"monospace",color:T.amber,fontWeight:700}}>{o.codigo}</p>}
                <p style={{margin:0,fontSize:13,fontWeight:700}}>{o.nombre}</p>
                <div style={{display:"flex",gap:6,marginTop:2}}>
                  {o.precioBase&&<span style={{fontSize:11,color:T.muted,textDecoration:o.dto?"line-through":"none"}}>{o.precioBase}€/kg</span>}
                  {o.dto&&<span style={{fontSize:11,fontWeight:700,color:T.red}}>-{o.dto}%</span>}
                  {o.precioFinal&&<span style={{fontSize:12,fontWeight:800,color:T.green}}>{o.precioFinal}€/kg</span>}
                </div>
              </div>
              <button onClick={()=>setFormEst(f=>({...f,ofertas:(f.ofertas||[]).filter((_,j)=>j!==i)}))}
                style={{background:"none",border:"none",cursor:"pointer",color:T.red,fontSize:18}}>🗑</button>
            </div>
          ))}

          {(()=>{
            const of=formEst.ofActual||{nombre:"",codigo:"",precioBase:"",dto:""};
            const base=parseFloat((of.precioBase||"").replace(",","."));
            const dto=parseFloat(of.dto||"0");
            const pFinal=(!isNaN(base)&&base>0)?(base*(1-dto/100)).toFixed(2):"";
            return(
            <div style={{background:T.bg,borderRadius:10,padding:12,border:`1.5px dashed ${T.amber}66`,marginBottom:14}}>
              <SearchInput value={of.nombre}
                onChange={v=>setFormEst(f=>({...f,ofActual:{...(f.ofActual||{}),nombre:v,codigo:"",precioBase:""}}))}
                placeholder="🔍 Buscar producto..."
                suggestions={PRODUCTOS_LOCAL
                  .filter(p=>of.nombre.length>=2&&((p.nombre||"").toLowerCase().includes(of.nombre.toLowerCase())||(p.codigo||"").toLowerCase().includes(of.nombre.toLowerCase())))
                  .slice(0,8).map(p=>({label:p.nombre,sub:p.codigo+" · "+p.precio+"€/kg",tipo:"producto",obj:p}))}
                onSelect={s=>setFormEst(f=>({...f,ofActual:{...(f.ofActual||{}),nombre:s.label,codigo:s.obj.codigo,precioBase:s.obj.precio}}))}
                style={{marginBottom:8}}/>
              {of.codigo&&<p style={{margin:"0 0 6px",fontSize:10,color:T.amber,fontWeight:700,fontFamily:"monospace"}}>{of.codigo}</p>}
              <div style={{display:"flex",gap:8,marginBottom:8}}>
                <div style={{flex:1}}>
                  <p style={{margin:"0 0 3px",fontSize:10,fontWeight:700,color:T.muted}}>Precio tarifa €/kg</p>
                  <input value={of.precioBase||""} onChange={e=>setFormEst(f=>({...f,ofActual:{...(f.ofActual||{}),precioBase:e.target.value}}))}
                    placeholder="0,00" style={{width:"100%",border:`1.5px solid ${T.border}`,borderRadius:8,padding:"8px 10px",fontSize:13,outline:"none",boxSizing:"border-box"}}/>
                </div>
                <div style={{flex:1}}>
                  <p style={{margin:"0 0 3px",fontSize:10,fontWeight:700,color:T.muted}}>Dto. %</p>
                  <input type="number" value={of.dto||""} onChange={e=>setFormEst(f=>({...f,ofActual:{...(f.ofActual||{}),dto:e.target.value}}))}
                    placeholder="0" style={{width:"100%",border:`1.5px solid ${T.border}`,borderRadius:8,padding:"8px 10px",fontSize:13,outline:"none",boxSizing:"border-box"}}/>
                </div>
              </div>
              {pFinal&&<div style={{background:T.greenL,borderRadius:8,padding:"8px 12px",marginBottom:8}}>
                <p style={{margin:0,fontSize:13,fontWeight:800,color:T.green}}>Precio oferta: {pFinal}€/kg</p>
              </div>}
              <button onClick={()=>{
                if(!of.nombre.trim()) return;
                setFormEst(f=>({...f,
                  ofertas:[...(f.ofertas||[]),{...of,precioFinal:pFinal,id:"of"+Date.now()}],
                  ofActual:{nombre:"",codigo:"",precioBase:"",dto:""}}));
              }}
                style={{width:"100%",padding:"9px",borderRadius:8,border:"none",
                  background:of.nombre.trim()?T.amber:"#CBD5E1",color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"}}>
                + Añadir producto con oferta
              </button>
            </div>);
          })()}

          <button onClick={()=>{
            if(!formEst.cliente.trim()||!formEst.texto.trim()) return;
            const hoy=new Date().toLocaleDateString("es-ES");
            const d=new Date();const s=new Date(d.getFullYear(),0,1);
            const sem=Math.ceil(((d-s)/86400000+s.getDay()+1)/7);
            const est={id:"est_"+Date.now(),
              cliente:formEst.cliente,clienteNombre:formEst.cliente,
              objetivo:formEst.objetivo,estrategia:formEst.texto,texto:formEst.texto,
              tipo:formEst.tipo||"recuperacion",ofertas:formEst.ofertas||[],
              estado:"en_curso",agente:usuario.id,equipo:usuario.equipo||"",
              semana:sem,fecha:hoy,seguimientos:[],
              historialEscalado:[{accion:"Estrategia creada",por:usuario.nombre,fecha:hoy,nota:formEst.texto}],
            };
            setEstrategias([...estrategias,est]);
            fbEscribir("estrategias",est.id,est);
            setShowNuevaEst(false);
            setFormEst({cliente:"",objetivo:"",texto:"",tipo:"recuperacion",ofertas:[],ofActual:{nombre:"",codigo:"",precioBase:"",dto:""}});
          }}
            disabled={!formEst.cliente.trim()||!formEst.texto.trim()}
            style={{width:"100%",padding:"13px",
              background:formEst.cliente.trim()&&formEst.texto.trim()?T.amber:"#CBD5E1",
              color:"#fff",border:"none",borderRadius:10,fontSize:14,fontWeight:700,cursor:"pointer"}}>
            ✅ Crear estrategia
          </button>
        </div>
      )}

      {/* Filtros rápidos */}
      {(()=>{
        const tabs=[
          ...(esJefe&&pendAprobMia.length>0?[{k:"aprobar",l:`🔔 Aprobar`,n:pendAprobMia.length,c:T.amber}]:[]),
          ...(enRevisionAgente.length>0?[{k:"revision",l:"⏳ En revisión",n:enRevisionAgente.length,c:T.amber}]:[]),
          ...(elevadasPorMi.length>0?[{k:"elevadas",l:"📤 Elevadas",n:elevadasPorMi.length,c:T.purple}]:[]),
          ...(aprobadas.length>0?[{k:"aprobadas",l:"✅ Aprobadas",n:aprobadas.length,c:T.green}]:[]),
          ...(rechazadas.length>0?[{k:"rechazadas",l:"❌ Rechazadas",n:rechazadas.length,c:T.red}]:[]),
          ...([...activasAgente,...misMostrar].length>0?[{k:"curso",l:"🔵 En curso",n:[...activasAgente,...misMostrar].filter((e,i,a)=>a.findIndex(x=>x.id===e.id)===i).length,c:T.blue}]:[]),
          {k:"todas",l:"Todas",n:null,c:T.navy},
        ];
        if(tabs.length<=2) return null;
        return(
          <div style={{display:"flex",gap:6,marginBottom:20,overflowX:"auto",paddingBottom:4}}>
            {tabs.map(t=>(
              <button key={t.k} onClick={()=>setFiltroSec(f=>f===t.k?"todas":t.k)}
                style={{display:"flex",gap:5,alignItems:"center",padding:"8px 13px",
                  borderRadius:99,flexShrink:0,cursor:"pointer",
                  border:`1.5px solid ${filtroSec===t.k?t.c:T.border}`,
                  background:filtroSec===t.k?t.c+"18":"#fff",
                  color:filtroSec===t.k?t.c:T.muted,
                  fontWeight:filtroSec===t.k?700:400,fontSize:12}}>
                {t.l}
                {t.n!==null&&<span style={{background:filtroSec===t.k?t.c:"#E2E8F0",color:filtroSec===t.k?"#fff":T.muted,
                  borderRadius:99,fontSize:10,fontWeight:800,padding:"1px 7px"}}>{t.n}</span>}
              </button>
            ))}
          </div>
        );
      })()}

      {/* 1. PARA APROBAR — lo más urgente */}
      {(filtroSec==="todas"||filtroSec==="aprobar")&&esJefe&&pendAprobMia.length>0&&(
        <div style={{marginBottom:24}}>
          <p style={{margin:"0 0 10px",fontSize:13,fontWeight:800,color:T.amber}}>
            🔔 Para aprobar ({pendAprobMia.length})
          </p>
          {pendAprobMia.map(e=>(
            <EstrategiaAprobacionCard key={e.id} e={e} usuario={usuario}
              onConfirmar={confirmarEstrategia}
              onRechazar={rechazar}
              onEscalar={escalarEstrategia}/>
          ))}
        </div>
      )}

      {/* 2. AGENTE: en revisión */}
      {(filtroSec==="todas"||filtroSec==="revision")&&Bloque({
        titulo:"⏳ En revisión",colorTitulo:T.amber,
        items:enRevisionAgente,
        renderItem:e=>(
          <CardEst key={e.id} e={e} onClick={()=>setSel(e)}>
            <Badge label={`📬 En manos de ${USUARIOS.find(u=>u.id===e.escaladoA)?.nombre||"Responsable"}`} color={T.amber}/>
            <span style={{fontSize:10,color:T.muted,marginLeft:"auto"}}>S{e.semana}</span>
          </CardEst>
        )
      })}

      {/* 3. APROBADAS — con precios definitivos */}
      {(filtroSec==="todas"||filtroSec==="aprobadas")&&Bloque({
        titulo:"✅ Aprobadas",colorTitulo:T.green,
        items:aprobadas,
        renderItem:e=>{
          const res=e.resolucion;
          const aP=(e.ofertas||[]).filter(o=>o.aprobada===true).length;
          const rP=(e.ofertas||[]).filter(o=>o.aprobada===false).length;
          return(
            <div key={e.id} onClick={()=>setSel(e)}
              style={{background:"#fff",borderRadius:14,padding:"14px 16px",marginBottom:8,
                cursor:"pointer",border:`2px solid ${T.green}44`,borderLeft:`4px solid ${T.green}`}}>
              <div style={{display:"flex",gap:8,marginBottom:6,flexWrap:"wrap",alignItems:"center"}}>
                <Badge label={res?.tipo==="aprobada_parcial"?"⚡ Aprobada parcialmente":"✅ Aprobada"} color={T.green}/>
                <span style={{fontSize:11,color:T.muted}}>por {res?.por} · {res?.fecha}</span>
              </div>
              <p style={{margin:"0 0 4px",fontSize:14,fontWeight:800}}>{e.cliente||e.clienteNombre}</p>
              <p style={{margin:"0 0 6px",fontSize:12,color:T.muted}}>{e.texto||e.estrategia}</p>
              {(e.ofertas||[]).length>0&&(
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {aP>0&&<span style={{fontSize:10,color:T.green,fontWeight:700,background:T.greenL,borderRadius:99,padding:"2px 8px"}}>✅ {aP} producto{aP>1?"s":""} aprobado{aP>1?"s":""}</span>}
                  {rP>0&&<span style={{fontSize:10,color:T.red,fontWeight:700,background:T.redL,borderRadius:99,padding:"2px 8px"}}>❌ {rP} rechazado{rP>1?"s":""}</span>}
                </div>
              )}
              <p style={{margin:"6px 0 0",fontSize:11,color:T.green,fontWeight:600}}>Ver precios aprobados →</p>
            </div>
          );
        }
      })}

      {/* 4. RECHAZADAS */}
      {(filtroSec==="todas"||filtroSec==="rechazadas")&&Bloque({
        titulo:"❌ Rechazadas",colorTitulo:T.red,
        items:rechazadas,
        renderItem:e=>{
          const res=e.resolucion;
          return(
            <div key={e.id} onClick={()=>setSel(e)}
              style={{background:"#fff",borderRadius:14,padding:"14px 16px",marginBottom:8,
                cursor:"pointer",border:`1px solid ${T.border}`,borderLeft:`4px solid ${T.red}`,opacity:.8}}>
              <div style={{display:"flex",gap:8,marginBottom:6,alignItems:"center"}}>
                <Badge label="❌ Rechazada" color={T.red}/>
                <span style={{fontSize:11,color:T.muted}}>por {res?.por} · {res?.fecha}</span>
              </div>
              <p style={{margin:"0 0 2px",fontSize:14,fontWeight:800}}>{e.cliente||e.clienteNombre}</p>
              {res?.nota&&<p style={{margin:0,fontSize:12,color:T.muted}}>Motivo: {res.nota}</p>}
            </div>
          );
        }
      })}

      {/* 4. ELEVADAS — esperando respuesta del superior */}
      {(filtroSec==="todas"||filtroSec==="elevadas")&&Bloque({
        titulo:"📤 Elevadas — esperando respuesta",colorTitulo:T.purple,
        items:elevadasPorMi,
        renderItem:e=>(
          <CardEst key={e.id} e={e} onClick={()=>setSel(e)}>
            <Badge label={`↑ En manos de ${USUARIOS.find(u=>u.id===e.escaladoA)?.nombre||"Superior"}`} color={T.purple}/>
          </CardEst>
        )
      })}

      {/* 5. EN CURSO — activas sin resolución */}
      {(filtroSec==="todas"||filtroSec==="curso")&&Bloque({
        titulo:"🔵 En curso",colorTitulo:T.blue,
        items:[...activasAgente,...misMostrar].filter((e,i,a)=>a.findIndex(x=>x.id===e.id)===i),
        renderItem:e=>(
          <CardEst key={e.id} e={e} onClick={()=>setSel(e)}>
            <Badge label="🔵 En curso" color={T.blue}/>
            <span style={{fontSize:10,color:T.muted}}>S{e.semana}</span>
          </CardEst>
        )
      })}

      {/* Estado vacío */}
      {pendAprobMia.length===0&&enRevisionAgente.length===0&&aprobadas.length===0&&rechazadas.length===0&&elevadasPorMi.length===0&&activasAgente.length===0&&misMostrar.length===0&&(
        <div style={{textAlign:"center",padding:"48px 16px",color:T.muted}}>
          <p style={{fontSize:36,margin:"0 0 8px"}}>🎯</p>
          <p style={{margin:0,fontSize:14,fontWeight:600}}>Sin estrategias activas</p>
        </div>
      )}
    </div>
  );
}



// ─── INCIDENCIAS ──────────────────────────────────────────────────
// Fallback de incidencias_seed — VACÍO. Los datos vienen de Firebase.
const INCIDENCIAS_SEED = [];

// ═══════════════════════════════════════════════════════════════════
// INCIDENCIAS — gestión clara con escalado visual
// ═══════════════════════════════════════════════════════════════════
function Incidencias({usuario, clientesFB}){
  const esAgente=usuario.rol==="agente";
  const esJefe=["jefe","director","ceo"].includes(usuario.rol);
  const esRolJefe=usuario.rol==="jefe";
  const miEquipo=usuario.equipo;
  // Clientes disponibles: del equipo para jefe, propios para agente
  const clientesDisp=clientesFB||(window._clientesFB)||[];

  const [incidencias,setIncidencias]=useState(INCIDENCIAS_SEED.map(i=>({
    ...i,historialEscalado:i.historialEscalado||[],
    escaladoA:i.escaladoA||null,informadoA:i.informadoA||[],
  })));
  const [sel,setSel]=useState(null);
  const [filtroTipo,setFiltroTipo]=useState("todas");
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({tipo:"",prioridad:"media",clienteNombre:"",clienteId:"",productoNombre:"",productoCodigo:"",descripcion:"",fotos:[]});
  const fotoRef=React.useRef();

  const director=USUARIOS.find(u=>u.rol==="director");
  const ceo=USUARIOS.find(u=>u.rol==="ceo");

  const crearIncidencia=()=>{
    if(!form.tipo||!form.descripcion.trim()) return;
    const nueva={
      id:`inc${Date.now()}`,
      ...form,
      autor:usuario.id,
      equipo:usuario.equipo||"",
      agente:usuario.id,
      fecha:new Date().toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit",year:"2-digit"}),
      estado:"abierta",
      historialEscalado:[],escaladoA:null,informadoA:[],
    };
    setIncidencias(p=>[nueva,...p]);
    fbEscribir("incidencias",nueva.id,nueva);
    setForm({tipo:"",prioridad:"media",clienteNombre:"",clienteId:"",productoNombre:"",productoCodigo:"",descripcion:"",fotos:[]});
    setShowForm(false);
  };

  const addFoto=(e)=>{
    [...e.target.files].forEach(file=>{
      const r=new FileReader();
      r.onload=ev=>setForm(f=>({...f,fotos:[...(f.fotos||[]),ev.target.result]}));
      r.readAsDataURL(file);
    });
    e.target.value="";
  };

  // Actualizar incidencia y guardar en Firebase
  const upd=(id,changes)=>{
    setIncidencias(p=>p.map(i=>i.id===id?{...i,...changes}:i));
    const updated={...incidencias.find(i=>i.id===id),...changes};
    fbEscribir("incidencias",id,updated);
    if(sel?.id===id) setSel(updated);
  };

  const addHistorial=(inc,accion,nota="",fotos=[])=>{
    const h={accion,por:usuario.nombre,fecha:new Date().toLocaleDateString("es-ES"),nota,fotos};
    upd(inc.id,{historialEscalado:[...(inc.historialEscalado||[]),h]});
  };

  const escalar=(inc,destId,nota)=>{
    const dest=USUARIOS.find(u=>u.id===destId);
    const h={accion:`↑ Escalada a ${dest?.nombre}`,por:usuario.nombre,
      fecha:new Date().toLocaleDateString("es-ES"),nota,fotos:[]};
    upd(inc.id,{estado:"escalada",escaladoA:destId,
      historialEscalado:[...(inc.historialEscalado||[]),h]});
  };

  const informar=(inc,destId)=>{
    if((inc.informadoA||[]).includes(destId)) return;
    const dest=USUARIOS.find(u=>u.id===destId);
    const h={accion:`ℹ️ Informado a ${dest?.nombre}`,por:usuario.nombre,
      fecha:new Date().toLocaleDateString("es-ES"),nota:"",fotos:[]};
    upd(inc.id,{informadoA:[...(inc.informadoA||[]),destId],
      historialEscalado:[...(inc.historialEscalado||[]),h]});
  };

  const cerrar=(inc,nota)=>{
    const h={accion:"✅ Cerrada",por:usuario.nombre,
      fecha:new Date().toLocaleDateString("es-ES"),nota,fotos:[]};
    upd(inc.id,{estado:"cerrada",historialEscalado:[...(inc.historialEscalado||[]),h]});
    setSel(null);
  };

  // Filtrar por rol
  const misMostrar=incidencias.filter(i=>{
    if(esAgente) return i.autor===usuario.id;
    if(esRolJefe) return i.equipo===miEquipo;
    return true;
  }).filter(i=>filtroTipo==="todas"||i.tipo===filtroTipo);

  const abiertas=misMostrar.filter(i=>i.estado!=="cerrada");
  const cerradas=misMostrar.filter(i=>i.estado==="cerrada");

  // ── DETALLE ────────────────────────────────────────────────────────
function DetIncidencia({sel,usuario,director,ceo,esJefe,esRolJefe,onBack,onEscalar,onInformar,onNota,onCerrar}){
  const tipo=INC_TIPOS[sel.tipo]||{label:sel.tipo,color:T.muted};
  const priColors={urgente:"#7F1D1D",alta:T.red,media:T.amber,baja:T.green};
  const priColor=priColors[sel.prioridad]||T.muted;
  const autorU=USUARIOS.find(u=>u.id===sel.autor);
  const puedoEscalar=esJefe&&sel.estado!=="cerrada";
  const respTipo=USUARIOS.find(u=>u.tipologia===sel.tipo);
  const yaEscaladoRespTipo=sel.escaladoA===respTipo?.id;
  const yaInfDir=(sel.informadoA||[]).includes(director?.id);
  const yaInfCeo=(sel.informadoA||[]).includes(ceo?.id);
  const [nota,setNota]=useState("");
  const [notaCierre,setNotaCierre]=useState("");
  const [showCierre,setShowCierre]=useState(false);

  return(
      <div style={{paddingBottom:100}}>
        <BackBar label="Incidencias" onBack={()=>setSel(null)}/>
        <div style={{padding:"16px"}}>

          {/* Ficha */}
          <div style={{background:"#fff",borderRadius:16,marginBottom:16,overflow:"hidden",
            border:`1px solid ${T.border}`,borderTop:`4px solid ${tipo.color}`}}>
            <div style={{padding:"16px"}}>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
                <span style={{fontSize:12,fontWeight:700,color:tipo.color,
                  background:tipo.color+"15",borderRadius:99,padding:"3px 10px"}}>{tipo.label}</span>
                <span style={{fontSize:12,fontWeight:700,color:priColor,
                  background:priColor+"15",borderRadius:99,padding:"3px 10px"}}>
                  {sel.prioridad==="urgente"?"🔴 Urgente":sel.prioridad.charAt(0).toUpperCase()+sel.prioridad.slice(1)}
                </span>
                <span style={{fontSize:12,fontWeight:700,
                  color:sel.estado==="cerrada"?T.green:sel.estado==="escalada"?T.purple:T.amber,
                  background:(sel.estado==="cerrada"?T.green:sel.estado==="escalada"?T.purple:T.amber)+"15",
                  borderRadius:99,padding:"3px 10px"}}>
                  {sel.estado==="cerrada"?"✅ Cerrada":sel.estado==="escalada"?"↑ Escalada":"🔴 Abierta"}
                </span>
              </div>
              <p style={{margin:"0 0 8px",fontSize:16,fontWeight:800}}>{sel.clienteNombre||sel.cliente||"—"}</p>
              <p style={{margin:"0 0 10px",fontSize:13,color:T.text,lineHeight:1.6}}>{sel.descripcion||sel.desc}</p>
              <p style={{margin:0,fontSize:11,color:T.muted}}>
                {autorU?.nombre||sel.autor} · {sel.fecha}
              </p>
              {sel.escaladoA&&(
                <div style={{marginTop:8,padding:"7px 10px",background:T.purpleL,borderRadius:8}}>
                  <p style={{margin:0,fontSize:11,color:T.purple,fontWeight:700}}>
                    ↑ Escalada a: {USUARIOS.find(u=>u.id===sel.escaladoA)?.nombre}
                  </p>
                </div>
              )}
              {(sel.informadoA||[]).length>0&&(
                <div style={{marginTop:6,padding:"7px 10px",background:T.blueL,borderRadius:8}}>
                  <p style={{margin:0,fontSize:11,color:T.blue,fontWeight:700}}>
                    ℹ️ Informado a: {(sel.informadoA||[]).map(id=>USUARIOS.find(u=>u.id===id)?.nombre||id).join(", ")}
                  </p>
                </div>
              )}
            </div>
          </div>

          {/* Acciones de escalado — solo para jefes */}
          {puedoEscalar&&(
            <div style={{background:"#fff",borderRadius:16,padding:"16px",marginBottom:16,
              border:`1px solid ${T.border}`}}>
              <p style={{margin:"0 0 12px",fontSize:12,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
                Acciones de escalado
              </p>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {/* Escalar al responsable de tipología */}
                {esRolJefe&&respTipo&&!yaEscaladoRespTipo&&(
                  <button onClick={()=>escalar(sel,respTipo.id,"")}
                    style={{display:"flex",gap:12,alignItems:"center",padding:"13px 16px",
                      borderRadius:12,border:`1.5px solid ${tipo.color}`,background:tipo.color+"10",
                      cursor:"pointer",textAlign:"left"}}>
                    <span style={{fontSize:24}}>{respTipo.icon}</span>
                    <div style={{flex:1}}>
                      <p style={{margin:0,fontSize:13,fontWeight:700}}>Escalar a {respTipo.nombre}</p>
                      <p style={{margin:"2px 0 0",fontSize:11,color:T.muted}}>Responsable de {tipo.label}</p>
                    </div>
                    <span style={{color:tipo.color,fontWeight:700,fontSize:16}}>↑</span>
                  </button>
                )}
                {yaEscaladoRespTipo&&(
                  <div style={{padding:"10px 14px",background:T.greenL,borderRadius:10}}>
                    <p style={{margin:0,fontSize:12,fontWeight:700,color:T.green}}>
                      ✅ Ya escalada a {respTipo?.nombre}
                    </p>
                  </div>
                )}
                {/* Informar al director */}
                {director&&!yaInfDir&&(
                  <button onClick={()=>informar(sel,director.id)}
                    style={{display:"flex",gap:12,alignItems:"center",padding:"13px 16px",
                      borderRadius:12,border:`1.5px solid ${T.blue}`,background:T.blueL,
                      cursor:"pointer",textAlign:"left"}}>
                    <span style={{fontSize:24}}>{director.icon}</span>
                    <div style={{flex:1}}>
                      <p style={{margin:0,fontSize:13,fontWeight:700}}>Informar a {director.nombre}</p>
                      <p style={{margin:"2px 0 0",fontSize:11,color:T.muted}}>Para su conocimiento y seguimiento</p>
                    </div>
                    <span style={{color:T.blue,fontSize:16}}>ℹ️</span>
                  </button>
                )}
                {yaInfDir&&<div style={{padding:"8px 14px",background:T.blueL,borderRadius:9}}>
                  <p style={{margin:0,fontSize:11,fontWeight:700,color:T.blue}}>ℹ️ {director.nombre} ya informado</p>
                </div>}
                {/* Elevar al CEO */}
                {(esRolJefe===false&&usuario.rol==="director")&&ceo&&!yaInfCeo&&(
                  <button onClick={()=>informar(sel,ceo.id)}
                    style={{display:"flex",gap:12,alignItems:"center",padding:"13px 16px",
                      borderRadius:12,border:`1.5px solid ${T.purple}`,background:T.purpleL,
                      cursor:"pointer",textAlign:"left"}}>
                    <span style={{fontSize:24}}>{ceo.icon}</span>
                    <div style={{flex:1}}>
                      <p style={{margin:0,fontSize:13,fontWeight:700}}>Elevar al {ceo.nombre}</p>
                      <p style={{margin:"2px 0 0",fontSize:11,color:T.muted}}>Máxima prioridad</p>
                    </div>
                    <span style={{color:T.purple,fontSize:16}}>👑</span>
                  </button>
                )}
              </div>
            </div>
          )}

          {/* Añadir nota */}
          {sel.estado!=="cerrada"&&(
            <div style={{background:"#fff",borderRadius:16,padding:"16px",marginBottom:12,
              border:`1px solid ${T.border}`}}>
              <p style={{margin:"0 0 8px",fontSize:12,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
                💬 Añadir actualización
              </p>
              <textarea value={nota} onChange={e=>setNota(e.target.value)} rows={3}
                placeholder="Gestión realizada, estado actual…"
                style={{width:"100%",border:`1.5px solid ${nota?T.blue:T.border}`,borderRadius:10,
                  padding:"10px 12px",fontSize:13,resize:"none",outline:"none",
                  boxSizing:"border-box",fontFamily:"inherit",lineHeight:1.5,marginBottom:8}}/>
              <Btn full onClick={()=>{if(nota.trim()){addHistorial(sel,"💬 Nota",nota);setNota("");}}}
                color={T.navy} disabled={!nota.trim()}>
                Guardar nota
              </Btn>
            </div>
          )}

          {/* Cerrar */}
          {sel.estado!=="cerrada"&&(
            showCierre?(
              <div style={{background:"#fff",borderRadius:16,padding:"16px",marginBottom:12,
                border:`1.5px solid ${T.green}`}}>
                <p style={{margin:"0 0 8px",fontSize:13,fontWeight:700,color:T.green}}>✅ Resolución</p>
                <textarea value={notaCierre} onChange={e=>setNotaCierre(e.target.value)} rows={3}
                  placeholder="Cómo se resolvió…"
                  style={{width:"100%",border:`1.5px solid ${T.border}`,borderRadius:10,
                    padding:"10px 12px",fontSize:13,resize:"none",outline:"none",
                    boxSizing:"border-box",fontFamily:"inherit",marginBottom:8}}/>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setShowCierre(false)}
                    style={{flex:1,padding:"11px",borderRadius:10,border:`1px solid ${T.border}`,
                      background:"#fff",color:T.muted,fontWeight:600,fontSize:13,cursor:"pointer"}}>Cancelar</button>
                  <button onClick={()=>cerrar(sel,notaCierre)}
                    style={{flex:2,padding:"11px",borderRadius:10,border:"none",
                      background:T.green,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                    ✅ Confirmar cierre
                  </button>
                </div>
              </div>
            ):(
              <button onClick={()=>setShowCierre(true)}
                style={{width:"100%",padding:"13px",borderRadius:12,marginBottom:12,
                  border:`2px solid ${T.green}`,background:T.greenL,
                  color:T.green,fontWeight:700,fontSize:13,cursor:"pointer"}}>
                ✅ Marcar como resuelta
              </button>
            )
          )}

          {/* Historial */}
          {(sel.historialEscalado||[]).length>0&&(
            <div style={{background:"#fff",borderRadius:16,padding:"16px",border:`1px solid ${T.border}`}}>
              <p style={{margin:"0 0 12px",fontSize:12,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
                🕐 Historial de gestión
              </p>
              {[...(sel.historialEscalado||[])].reverse().map((h,i,arr)=>(
                <div key={i} style={{display:"flex",gap:10,paddingBottom:10,marginBottom:10,
                  borderBottom:i<arr.length-1?`1px solid ${T.border}`:"none"}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:T.navy,flexShrink:0,marginTop:4}}/>
                  <div style={{flex:1}}>
                    <p style={{margin:"0 0 2px",fontSize:12,fontWeight:700}}>{h.accion}</p>
                    {h.nota&&<p style={{margin:"0 0 3px",fontSize:12,color:T.text}}>{h.nota}</p>}
                    {(h.fotos||[]).length>0&&(
                      <div style={{display:"flex",gap:6,margin:"4px 0"}}>
                        {h.fotos.map((f,j)=>(
                          <img key={j} src={f} alt="" style={{width:60,height:60,objectFit:"cover",
                            borderRadius:8,border:`1px solid ${T.border}`,cursor:"pointer"}}
                            onClick={()=>window.open(f)}/>
                        ))}
                      </div>
                    )}
                    <p style={{margin:0,fontSize:10,color:T.muted}}>{h.por} · {h.fecha}</p>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
  );
}

  if(sel) return <DetIncidencia sel={sel} usuario={usuario} director={director} ceo={ceo} esJefe={esJefe} esRolJefe={esRolJefe} onBack={()=>setSel(null)} onEscalar={(destId,nota)=>{escalar(sel,destId,nota);setSel({...sel,escaladoA:destId,estado:"escalada"});}} onInformar={(destId)=>informar(sel,destId)} onNota={(nota)=>addHistorial(sel,"💬 Nota",nota)} onCerrar={(nota)=>cerrar(sel,nota)}/>;

  // ── LISTA ─────────────────────────────────────────────────────────
  return(
    <div style={{padding:"16px 16px 100px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div>
          <p style={{margin:0,fontSize:22,fontWeight:900,color:T.text}}>🚨 Incidencias</p>
          <p style={{margin:"2px 0 0",fontSize:12,color:T.muted}}>
            {esAgente?"Mis incidencias":esRolJefe?`Equipo ${miEquipo}`:"Todas"}
          </p>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {abiertas.length>0&&(
            <div style={{background:T.red,color:"#fff",borderRadius:99,
              padding:"4px 14px",fontSize:13,fontWeight:800}}>
              {abiertas.length} abierta{abiertas.length>1?"s":""}
            </div>
          )}
          <button onClick={()=>setShowForm(s=>!s)}
            style={{background:T.red,border:"none",borderRadius:10,
              padding:"10px 16px",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>
            + Nueva
          </button>
        </div>
      </div>

      {/* Formulario nueva incidencia */}
      {showForm&&(
        <div style={{background:"#fff",borderRadius:16,padding:"16px",marginBottom:16,
          border:`2px solid ${T.red}`}}>
          <p style={{margin:"0 0 14px",fontSize:15,fontWeight:800,color:T.text}}>🚨 Nueva incidencia</p>

          {/* Cliente */}
          <div style={{marginBottom:12}}>
            <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Cliente *</p>
<SearchInput
              value={form.clienteNombre}
              onChange={v=>setForm(f=>({...f,clienteNombre:v,clienteId:""}))}
              placeholder="🔍 Buscar cliente..."
              suggestions={clientesDisp
                .filter(c=>{const n=(c.nombre||c.NOMBRE||"").toLowerCase();return form.clienteNombre.length>=2&&n.includes(form.clienteNombre.toLowerCase());})
                .slice(0,8).map(c=>({label:c.nombre||c.NOMBRE,sub:c.id,tipo:"cliente"}))}
              onSelect={s=>setForm(f=>({...f,clienteNombre:s.label,clienteId:s.sub||""}))}
            />
          </div>

          {/* Producto afectado */}
          <div style={{marginBottom:12}}>
            <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Producto afectado (opcional)</p>
            <SearchInput
              value={form.productoNombre}
              onChange={v=>setForm(f=>({...f,productoNombre:v,productoCodigo:""}))}
              placeholder="🔍 Buscar producto o código..."
              suggestions={PRODUCTOS_LOCAL
                .filter(p=>form.productoNombre.length>=2&&((p.nombre||"").toLowerCase().includes(form.productoNombre.toLowerCase())||(p.codigo||"").toLowerCase().includes(form.productoNombre.toLowerCase())))
                .slice(0,8).map(p=>({label:p.nombre,sub:p.codigo+" · "+p.formato,tipo:"producto",obj:p}))}
              onSelect={s=>setForm(f=>({...f,productoNombre:s.label,productoCodigo:s.obj.codigo}))}
            />
            {form.productoCodigo&&<p style={{margin:"4px 0 0",fontSize:10,color:T.blue,fontWeight:700,fontFamily:"monospace"}}>{form.productoCodigo}</p>}
          </div>

          {/* Tipo */}
          <div style={{marginBottom:12}}>
            <p style={{margin:"0 0 8px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Tipo *</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {Object.entries(INC_TIPOS).map(([k,t])=>(
                <button key={k} onClick={()=>setForm(f=>({...f,tipo:k}))}
                  style={{padding:"9px 12px",borderRadius:9,cursor:"pointer",fontSize:12,
                    border:`2px solid ${form.tipo===k?t.color:T.border}`,
                    background:form.tipo===k?t.color+"15":"#fff",
                    color:form.tipo===k?t.color:T.muted,
                    fontWeight:form.tipo===k?700:400}}>
                  {t.label}
                </button>
              ))}
            </div>
          </div>

          {/* Prioridad */}
          <div style={{marginBottom:12}}>
            <p style={{margin:"0 0 8px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Prioridad</p>
            <div style={{display:"flex",gap:6}}>
              {[{k:"baja",l:"🟢 Baja",c:T.green},{k:"media",l:"🟡 Media",c:T.amber},
                {k:"alta",l:"🔴 Alta",c:T.red},{k:"urgente",l:"🚨 Urgente",c:"#7F1D1D"}].map(p=>(
                <button key={p.k} onClick={()=>setForm(f=>({...f,prioridad:p.k}))}
                  style={{flex:1,padding:"9px",borderRadius:9,cursor:"pointer",fontSize:11,

      {/* Filtro por tipo */}

          style={{padding:"7px 14px",borderRadius:99,flexShrink:0,fontSize:11,fontWeight:filtroTipo==="todas"?700:400,
            border:`1.5px solid ${filtroTipo==="todas"?T.navy:T.border}`,

        </button>

          <button key={k} onClick={()=>setFiltroTipo(k)}
            style={{padding:"7px 14px",borderRadius:99,flexShrink:0,fontSize:11,fontWeight:filtroTipo===k?700:400,

            {t.label}
          </button>
        ))}
      </div>

      {/* Abiertas */}
      {abiertas.length>0&&(
        <div style={{marginBottom:20}}>
          {abiertas.map(i=>{
            const tipo=INC_TIPOS[i.tipo]||{label:i.tipo,color:T.muted};
            const priColors={urgente:"#7F1D1D",alta:T.red,media:T.amber,baja:T.green};
            const pColor=priColors[i.prioridad]||T.muted;
            return(
              <div key={i.id} onClick={()=>setSel(i)}
                style={{background:"#fff",borderRadius:14,padding:"14px 16px",marginBottom:8,

                  boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}>
                <div style={{display:"flex",gap:8,marginBottom:6,flexWrap:"wrap"}}>
                  <span style={{fontSize:11,fontWeight:700,color:tipo.color,
                    background:tipo.color+"15",borderRadius:99,padding:"2px 8px"}}>{tipo.label}</span>
                  <span style={{fontSize:11,fontWeight:700,color:pColor,
                    background:pColor+"15",borderRadius:99,padding:"2px 8px"}}>
                    {i.prioridad==="urgente"?"🔴 Urgente":i.prioridad.charAt(0).toUpperCase()+i.prioridad.slice(1)}
                  </span>
                  {i.escaladoA&&<span style={{fontSize:11,fontWeight:700,color:T.purple,
                    background:T.purpleL,borderRadius:99,padding:"2px 8px"}}>
                    ↑ {USUARIOS.find(u=>u.id===i.escaladoA)?.nombre}
                  </span>}
                  <span style={{fontSize:10,color:T.muted,marginLeft:"auto"}}>{i.fecha}</span>
                </div>
                <p style={{margin:"0 0 3px",fontSize:14,fontWeight:700}}>{i.clienteNombre||i.cliente}</p>
                <p style={{margin:0,fontSize:12,color:T.muted,overflow:"hidden",
                  textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{i.descripcion||i.desc}</p>
                {(i.informadoA||[]).length>0&&(
                  <p style={{margin:"4px 0 0",fontSize:10,color:T.blue,fontWeight:600}}>
                    ℹ️ Informado a: {(i.informadoA||[]).map(id=>USUARIOS.find(u=>u.id===id)?.nombre||id).join(", ")}
                  </p>
                )}
              </div>
            );
          })}
        </div>
      )}

      {abiertas.length===0&&(
        <div style={{textAlign:"center",padding:"40px 16px",color:T.muted,marginBottom:20}}>
          <p style={{fontSize:32,margin:"0 0 8px"}}>✅</p>
          <p style={{margin:0,fontSize:14}}>Sin incidencias abiertas</p>
        </div>
      )}

      {/* Cerradas */}
      {cerradas.length>0&&(
        <div>
          <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
            ✅ Resueltas ({cerradas.length})
          </p>
          {cerradas.map(i=>{
            const tipo=INC_TIPOS[i.tipo]||{label:i.tipo,color:T.muted};
            return(
              <div key={i.id} onClick={()=>setSel(i)}
                style={{background:"#F9FAFB",borderRadius:12,padding:"12px 14px",marginBottom:6,
                  cursor:"pointer",border:`1px solid ${T.border}`,opacity:.75}}>
                <div style={{display:"flex",gap:8,marginBottom:4}}>
                  <Badge label={tipo.label} color={T.muted}/>
                  <span style={{fontSize:10,color:T.muted,marginLeft:"auto"}}>{i.fecha}</span>

                <p style={{margin:0,fontSize:11,color:T.muted,overflow:"hidden",
                  textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{i.descripcion||i.desc}</p>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

    </div>

            )) ||
            // Match por rol director
            (usuario.rol==="director" && h.responsable==="dir")
          )){
            result.push({...h,proyectoId:p.id,proyectoNombre:p.nombre,hitoIdx:i});
          }
        });
      });
      setHitosAsig(result);
    }).catch(()=>{});
  },[usuario.id]);

  if(hitosAsig.length===0) return null;

  return(
    <div style={{marginBottom:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <p style={{margin:0,fontSize:13,fontWeight:800,color:"#0F172A"}}>
          📍 Mis hitos de proyecto
          <span style={{marginLeft:8,background:"#7C3AED",color:"#fff",
            fontSize:10,fontWeight:800,borderRadius:99,padding:"2px 8px"}}>
            {hitosAsig.length}
          </span>
        </p>
        <button onClick={()=>onNav("proyectos")}
          style={{background:"none",border:"none",fontSize:12,color:"#7C3AED",
            fontWeight:600,cursor:"pointer"}}>Ver proyectos →</button>
      </div>
      {hitosAsig.map((h,i)=>{
        const vence=h.fecha?new Date(h.fecha.split("/").reverse().join("-")):null;
        const hoy=new Date();
        const diasRestantes=vence?Math.ceil((vence-hoy)/(1000*60*60*24)):null;
        const urgente=diasRestantes!==null&&diasRestantes<=3;
        return(
          <div key={i}
            style={{background:"#fff",borderRadius:12,padding:"12px 14px",marginBottom:8,
              border:`1.5px solid ${urgente?"#EF4444":"#E9D5FF"}`,
              borderLeft:`4px solid ${urgente?"#EF4444":"#7C3AED"}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
              <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={()=>onNav("proyectos")}>
                <p style={{margin:"0 0 2px",fontSize:13,fontWeight:700,color:"#0F172A",
                  overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                  {urgente?"🔴 ":""}{h.nombre}
                </p>
                <p style={{margin:0,fontSize:11,color:"#64748B"}}>
                  📁 {h.proyectoNombre}
                </p>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:5,flexShrink:0}}>
                {h.fecha&&(
                  <span style={{fontSize:11,fontWeight:700,
                    color:urgente?"#EF4444":"#7C3AED",
                    background:urgente?"#FEF2F2":"#F5F3FF",
                    borderRadius:6,padding:"2px 8px"}}>
                    {diasRestantes!==null
                      ?diasRestantes<0?"Vencido":diasRestantes===0?"Hoy":diasRestantes===1?"Mañana":`${diasRestantes}d`
                      :h.fecha}
                  </span>
                )}
                <button onClick={()=>{
                  const hoy2=new Date().toLocaleDateString("es-ES");
                  fbLeer("proyectos").then(proyectos=>{
                    const proy=proyectos.find(p=>p.id===h.proyectoId);
                    if(!proy) return;
                    const hitos=(proy.hitos||[]).map((x,idx)=>
                      idx===h.hitoIdx?{...x,hecho:true,fechaHecho:hoy2}:x
                    );
                    const hechos2=hitos.filter(x=>x.hecho).length;
                    const progreso=Math.round(hechos2/hitos.length*100);
                    const updated={...proy,hitos,progreso};
                    fbEscribir("proyectos",proy.id,updated).then(()=>{
                      setHitosAsig(prev=>prev.filter((_,j)=>j!==i));
                    });
                  });
                }}
                  style={{padding:"4px 10px",borderRadius:7,border:"none",
                    background:"#22C55E",color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer"}}>
                  ✅ Completar
                </button>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function TareasWidget({ onNav, usuario }) {
  const [tareas, setTareas] = useState([]);
  const [cargando, setCargando] = useState(true);

  const esCeo      = usuario?.rol === "ceo";
  const esDir      = usuario?.rol === "director";
  const esJefe     = usuario?.rol === "jefe";
  const esAgente   = usuario?.rol === "agente";
  const esJefeOmas = esCeo || esDir || esJefe;

  const agentesEquipo = USUARIOS.filter(u =>
    u.rol === "agente" && (esJefe ? u.equipo === usuario?.equipo : true)
  );

  const misIds = new Set([
    (usuario?.id||"").toUpperCase(),
    (usuario?.user||"").toUpperCase(),
    (usuario?.grupoAgente||"").toUpperCase(),
  ].filter(Boolean));
  if(usuario?.grupoAgente){
    const match=USUARIOS.find(u=>u.grupoAgente&&u.grupoAgente.toUpperCase()===(usuario.grupoAgente||"").toUpperCase());
    if(match) misIds.add(match.id.toUpperCase());
  }

  const filtrar = (lista) => {
    if (esCeo || esDir) return lista;
    if (esJefe) {
      return lista.filter(t => {
        if (!t.agente) return true; // sin asignar → jefe las ve
        return agentesEquipo.some(a =>
          a.id.toUpperCase() === (t.agente||"").toUpperCase() ||
          (a.grupoAgente||"").toUpperCase() === (t.agente||"").toUpperCase()
        );
      });
    }
    // Agente: solo las suyas, nunca sin_asignar
    if (!esAgente) return lista;
    return lista.filter(t => t.agente && misIds.has(t.agente.toUpperCase()));
  };

  useEffect(() => {
    fbLeer("tareas").then(data => {
      const src = data.length > 0 ? data : TAREAS_SEED;
      const pendientes = src.filter(t => t.estado==="pendiente" && !t.eliminada);
      const filtradas  = filtrar(pendientes);
      // Urgentes y sin_asignar primero
      filtradas.sort((a,b) => {
        const sinA = !a.agente ? -1 : 0;
        const sinB = !b.agente ? -1 : 0;
        if (sinA !== sinB) return sinA - sinB;
        const ord = { urgente:0, alta:1, normal:2 };
        return (ord[a.prioridad]||2) - (ord[b.prioridad]||2);
      });
      setTareas(filtradas);
      if (data.length === 0) TAREAS_SEED.forEach(t => fbEscribir("tareas", t.id, t));
    }).catch(()=>{}).finally(()=>setCargando(false));
  }, [usuario?.id]);

  if (cargando || tareas.length === 0) return null;

  const urgentes    = tareas.filter(t => t.prioridad==="urgente").length;
  const sinAsignar  = tareas.filter(t => !t.agente).length;

  return (
    <div style={{marginBottom:22}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <p style={{margin:0,fontSize:10,fontWeight:700,color:"#64748B",
          textTransform:"uppercase",letterSpacing:".12em"}}>
          {esJefeOmas ? "Tareas del equipo" : "Mis acciones"}
        </p>
        <div style={{display:"flex",gap:5}}>
          {esJefeOmas && sinAsignar > 0 && (
            <span style={{fontSize:11,fontWeight:700,color:"#D97706",background:"#FFFBEB",
              borderRadius:99,padding:"2px 8px"}}>
              ⚠️ {sinAsignar} sin asignar
            </span>
          )}
          {urgentes > 0 && (
            <span style={{fontSize:11,fontWeight:700,color:"#EF4444",background:"#FEF2F2",
              borderRadius:99,padding:"2px 8px"}}>
              🔴 {urgentes} urgente{urgentes>1?"s":""}
            </span>
          )}
        </div>
      </div>
      <div style={{background:"#fff",borderRadius:16,overflow:"hidden",border:"1px solid #E2E8F0",
        boxShadow:"0 1px 3px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.06)"}}>
        {tareas.slice(0,5).map((t,i) => {
          const cfg    = PRIORIDAD_CFG[t.prioridad] || PRIORIDAD_CFG.normal;
          const agObj  = esJefeOmas ? USUARIOS.find(u =>
            u.id.toUpperCase()===(t.agente||"").toUpperCase() ||
            (u.grupoAgente||"").toUpperCase()===(t.agente||"").toUpperCase()
          ) : null;
          const sinAg  = !t.agente;
          return (
            <div key={t.id} onClick={()=>onNav("tareas")}
              style={{display:"flex",alignItems:"center",gap:10,padding:"11px 16px",
                borderBottom:i<Math.min(tareas.length,5)-1?"1px solid #F1F5F9":"none",
                cursor:"pointer",
                background:sinAg?"#FFFBEB":"#fff"}}>
              <span style={{fontSize:13,flexShrink:0}}>{sinAg?"⚠️":cfg.icon}</span>
              <div style={{flex:1,minWidth:0}}>
                <p style={{margin:0,fontSize:13,fontWeight:600,color:"#0F172A",
                  overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                  {t.titulo}
                </p>
                <div style={{display:"flex",gap:5,alignItems:"center",marginTop:1}}>
                  {t.cliente&&<p style={{margin:0,fontSize:11,color:"#94A3B8",
                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{t.cliente}</p>}
                  {esJefeOmas && (
                    agObj
                      ? <span style={{fontSize:10,fontWeight:700,color:agObj.color,
                          background:agObj.color+"18",borderRadius:99,padding:"1px 6px",
                          whiteSpace:"nowrap",flexShrink:0}}>
                          {agObj.icon} {agObj.nombre}
                        </span>
                      : <span style={{fontSize:10,fontWeight:700,color:"#D97706",
                          background:"#FEF3C7",borderRadius:99,padding:"1px 6px",
                          whiteSpace:"nowrap",flexShrink:0}}>
                          Sin asignar →
                        </span>
                  )}
                </div>
              </div>
              {t.vence && !t.esHito && (
                <span style={{fontSize:10,fontWeight:700,color:sinAg?"#D97706":cfg.color,
                  background:sinAg?"#FEF3C7":cfg.bg,borderRadius:6,
                  padding:"2px 6px",flexShrink:0,whiteSpace:"nowrap"}}>
                  {t.vence}
                </span>
              )}
              {t.esHito&&(
                <button onClick={(e)=>{
                  e.stopPropagation();
                  const hoy=new Date().toLocaleDateString("es-ES");
                  const u={...t,estado:"hecha",hechaEn:hoy};
                  fbEscribir("tareas",t.id,u);
                  setTareas(prev=>prev.filter(x=>x.id!==t.id));
                  if(t.proyectoId){
                    fbLeer("proyectos").then(proyectos=>{
                      const proy=proyectos.find(p=>p.id===t.proyectoId);
                      if(!proy) return;
                      const nombreHito=(t.titulo||"").replace("📍 Hito: ","").trim();
                      const hitos=(proy.hitos||[]).map(h=>
                        !h.hecho&&(h.nombre===nombreHito||t.titulo?.includes(h.nombre))
                          ?{...h,hecho:true,fechaHecho:hoy}:h
                      );
                      const progreso=hitos.length>0?Math.round(hitos.filter(h=>h.hecho).length/hitos.length*100):0;
                      fbEscribir("proyectos",proy.id,{...proy,hitos,progreso});
                    }).catch(()=>{});
                  }
                }}
                  style={{padding:"4px 10px",borderRadius:7,border:"none",
                    background:"#7C3AED",color:"#fff",fontSize:11,
                    fontWeight:700,cursor:"pointer",flexShrink:0}}>
                  ✅ Completar
                </button>
              )}
            </div>
          );
        })}
        <div onClick={()=>onNav("tareas")} style={{padding:"9px 16px",textAlign:"center",
          fontSize:12,color:"#3B82F6",fontWeight:600,cursor:"pointer",background:"#F8FAFC",
          display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
          {esJefeOmas && sinAsignar>0
            ? <><span style={{color:"#D97706"}}>⚠️ {sinAsignar} sin asignar</span> · <span>Ver todas ({tareas.length}) →</span></>
            : <span>Ver todas ({tareas.length}) →</span>
          }
        </div>
      </div>
    </div>
  );
}

// Sección completa de gestión de tareas
function GestorTareas({ usuario, clientesFB }) {
  const esCeo      = usuario?.rol === "ceo";
  const esDir      = usuario?.rol === "director";
  const esJefe     = usuario?.rol === "jefe";
  const esAgente   = usuario?.rol === "agente";
  const esJefeOmas = esCeo || esDir || esJefe;

  const misIds = new Set([
    (usuario.id||"").toUpperCase(),
    (usuario.user||"").toUpperCase(),
    (usuario.grupoAgente||"").toUpperCase(),
  ].filter(Boolean));
  if(usuario.grupoAgente){
    const match=USUARIOS.find(u=>u.grupoAgente&&u.grupoAgente.toUpperCase()===(usuario.grupoAgente||"").toUpperCase());
    if(match) misIds.add(match.id.toUpperCase());
  }

  // Agentes disponibles para asignación
  const agentesAsig = USUARIOS.filter(u =>
    u.rol === "agente" && (esJefe ? u.equipo === usuario.equipo : true)
  );

  const [tareas,     setTareas]     = useState([]);
  const [filtro,     setFiltro]     = useState("pendiente");
  const [agFiltro,   setAgFiltro]   = useState("todos"); // filtro por agente (managers)
  const [showForm,   setShowForm]   = useState(false);
  const [editTarea,  setEditTarea]  = useState(null);
  const [treeOpen,   setTreeOpen]   = useState(null); // null | "equipos" | "WIKUK" | "INTERKEY"
  const [asignando,  setAsignando]  = useState(null); // tarea a reasignar
  const [form, setForm] = useState({
    titulo:"", descripcion:"", cliente:"", prioridad:"normal",
    vence:"", tipo:"contacto", agenteId:"",
  });

  // ── Filtro jerárquico ──────────────────────────────────────────
  const esMia = (t) => {
    if (esCeo || esDir) return true;
    if (esJefe) {
      const agT = (t.agente||"").toUpperCase();
      const esMiEquipo = agentesAsig.some(a =>
        a.id.toUpperCase()===agT || (a.grupoAgente||"").toUpperCase()===agT
      );
      const sinAsignar = !t.agente;
      return esMiEquipo || sinAsignar;
    }
    // Agente: NUNCA ve sin_asignar
    if (!t.agente) return false;
    return misIds.has(t.agente.toUpperCase());
  };

  const cargar = () => {
    fbLeer("tareas").then(data => {
      const todas = (data.length > 0 ? data : TAREAS_SEED).filter(t => !t.eliminada);
      setTareas(todas.filter(esMia));
      if (data.length === 0) TAREAS_SEED.forEach(t => fbEscribir("tareas", t.id, t));
    }).catch(() => setTareas(TAREAS_SEED.filter(esMia)));
  };

  useEffect(() => { cargar(); }, [usuario.id]);

  const upd = (k,v) => setForm(f => ({...f,[k]:v}));

  const guardar = () => {
    if (!form.titulo.trim()) return;
    const hoy = new Date().toLocaleDateString("es-ES");
    const miId = usuario.grupoAgente || usuario.user || usuario.id;
    const agenteDestino = esJefeOmas ? (form.agenteId || "") : miId;
    const t = editTarea
      ? {...editTarea, ...form, agente: agenteDestino}
      : { id:`tsk${Date.now()}`, ...form, agente:agenteDestino,
          creadaPor:usuario.id, creadaPorNombre:usuario.nombre,
          estado:"pendiente", creadaEn:hoy };
    fbEscribir("tareas", t.id, t).then(() => {
      setTareas(prev => editTarea ? prev.map(x=>x.id===t.id?t:x) : [t,...prev]);
      setShowForm(false); setEditTarea(null);
      setForm({titulo:"",descripcion:"",cliente:"",prioridad:"normal",vence:"",tipo:"contacto",agenteId:""});
    });
  };

  const asignar = (tarea, agenteId) => {
    const updated = {...tarea, agente:agenteId,
      asignadoEn:new Date().toLocaleDateString("es-ES"),
      asignadoPor:usuario.nombre};
    fbEscribir("tareas", tarea.id, updated).then(() => {
      setTareas(prev => prev.map(t => t.id===tarea.id ? updated : t));
      setAsignando(null);
    });
  };

  const marcarHecha = (tarea) => {
    const hoy = new Date().toLocaleDateString("es-ES");
    const u = {...tarea, estado:"hecha", hechaEn:hoy};
    fbEscribir("tareas", tarea.id, u).then(() =>
      setTareas(prev => prev.map(t => t.id===tarea.id ? u : t))
    );
    // Si la tarea viene de un hito, actualizar el hito en el proyecto
    if(tarea.esHito && tarea.proyectoId){
      fbLeer("proyectos").then(proyectos=>{
        const proy=proyectos.find(p=>p.id===tarea.proyectoId);
        if(!proy) return;
        // Buscar el hito por nombre (ya que guardamos el nombre en el título de la tarea)
        const nombreHito=(tarea.titulo||"").replace("📍 Hito: ","").trim();
        const hitos=(proy.hitos||[]).map(h=>{
          if(!h.hecho && (h.nombre===nombreHito||tarea.titulo?.includes(h.nombre))){
            return{...h,hecho:true,fechaHecho:hoy};
          }
          return h;
        });
        const hechos=hitos.filter(h=>h.hecho).length;
        const progreso=hitos.length>0?Math.round(hechos/hitos.length*100):0;
        fbEscribir("proyectos",proy.id,{...proy,hitos,progreso});
      }).catch(()=>{});
    }
  };

  const eliminar = (id) => {
    fbEscribir("tareas", id, {id, eliminada:true}).then(() =>
      setTareas(prev => prev.filter(t => t.id !== id))
    );
  };

  const abrirEditar = (t) => {
    setEditTarea(t);
    setForm({titulo:t.titulo,descripcion:t.descripcion||"",cliente:t.cliente||"",
      prioridad:t.prioridad||"normal",vence:t.vence||"",tipo:t.tipo||"contacto",
      agenteId:t.agente||""});
    setShowForm(true);
  };

  // ── Datos derivados ────────────────────────────────────────────
  const sinAsignar = tareas.filter(t=>!t.agente&&!t.eliminada&&t.estado==="pendiente");
  // Filtrar por selección actual del árbol
  const tareasFiltroActual = tareas.filter(t=>{
    if(t.eliminada) return false;
    if(!esJefeOmas) return true;
    if(!agFiltro||agFiltro==="todos") return true;
    if(agFiltro==="sin_asignar") return !t.agente;
    if(agFiltro.startsWith("eq_")){
      const eq=agFiltro.replace("eq_","");
      const ag=USUARIOS.find(u=>u.id===(t.agente||""));
      return ag?.equipo===eq;
    }
    return (t.agente||"").toUpperCase()===agFiltro.toUpperCase()||
      USUARIOS.find(u=>u.id===agFiltro)?.grupoAgente===(t.agente||"");
  });
  const pendCount  = tareasFiltroActual.filter(t=>t.estado==="pendiente").length;
  const urgCount   = tareasFiltroActual.filter(t=>t.estado==="pendiente"&&t.prioridad==="urgente").length;
  const hechasCount= tareasFiltroActual.filter(t=>t.estado==="hecha").length;

  const filtradas = tareas
    .filter(t => !t.eliminada)
    .filter(t => filtro==="todas" ? true : t.estado===filtro)
    .filter(t => agFiltro==="todos" ? true
      : agFiltro==="sin_asignar" ? !t.agente
      : agFiltro.startsWith("eq_") ? USUARIOS.find(u=>u.id===(t.agente||""))?.equipo===agFiltro.replace("eq_","")
      : (t.agente||"").toUpperCase()===(agFiltro||"").toUpperCase()
        || USUARIOS.find(u=>u.id===agFiltro)?.grupoAgente===(t.agente||""))
    .sort((a,b) => ({urgente:0,alta:1,normal:2}[a.prioridad]||2) - ({urgente:0,alta:1,normal:2}[b.prioridad]||2));

  const inp = {width:"100%",border:`1.5px solid ${T.border}`,borderRadius:9,padding:"10px 12px",
    fontSize:13,outline:"none",boxSizing:"border-box",fontFamily:"inherit"};
  const TIPO_ICON = {muestra:"📦",precio:"💶",contacto:"📞",coordinacion:"🔄",otro:"📌"};

  return (
    <div style={{padding:"16px",paddingBottom:100}}>

      {/* ── KPI cards ── */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:14}}>
        {[
          {n:pendCount, l:"Pendientes", c:T.amber},
          {n:urgCount,  l:"Urgentes",   c:T.red},
          {n:hechasCount,l:"Hechas",    c:T.green},
        ].map(s=>(
          <div key={s.l} style={{background:"#fff",border:`1px solid ${T.border}`,borderRadius:12,padding:"12px 10px",textAlign:"center"}}>
            <p style={{margin:"0 0 2px",fontSize:22,fontWeight:800,color:s.c}}>{s.n}</p>
            <p style={{margin:0,fontSize:10,color:T.muted}}>{s.l}</p>
          </div>
        ))}
      </div>

      {/* ── Sin asignar — alerta managers ── */}
      {esJefeOmas && sinAsignar.length > 0 && (
        <div style={{background:"#FFFBEB",border:`1.5px solid ${T.amber}`,borderRadius:12,
          padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:20}}>⚠️</span>
          <div style={{flex:1}}>
            <p style={{margin:0,fontSize:13,fontWeight:700,color:"#92400E"}}>
              {sinAsignar.length} tarea{sinAsignar.length>1?"s":""} sin asignar
            </p>
            <p style={{margin:0,fontSize:11,color:"#B45309"}}>Requieren agente responsable</p>
          </div>
          <button onClick={()=>setAgFiltro(agFiltro==="sin_asignar"?"todos":"sin_asignar")}
            style={{padding:"5px 12px",borderRadius:7,border:`1px solid ${T.amber}`,
              background:agFiltro==="sin_asignar"?T.amber:"#fff",
              color:agFiltro==="sin_asignar"?"#fff":"#92400E",fontSize:11,fontWeight:700,cursor:"pointer"}}>
            {agFiltro==="sin_asignar"?"Ver todas":"Ver →"}
          </button>
        </div>
      )}

      {/* ── Árbol desplegable: Equipos → Vendedores ── */}
      {esJefeOmas && (
        <div style={{marginBottom:12}}>

          {/* Nodo raíz: Todos los equipos */}
          <div onClick={()=>setTreeOpen(treeOpen?"":  "equipos")}
            style={{background:T.navy,borderRadius:12,padding:"12px 16px",marginBottom:6,
              cursor:"pointer",display:"flex",alignItems:"center",gap:10,userSelect:"none"}}>
            <span style={{fontSize:20}}>🌐</span>
            <div style={{flex:1}}>
              <p style={{margin:0,fontSize:13,fontWeight:700,color:"#fff"}}>
                {esCeo||esDir?"Todos los equipos":`Equipo ${usuario.equipo}`}
