// ── Comprimir imagen para OCR (max 1024px, JPEG 80%) ──
function comprimirImagen(dataUrl, maxSize=1024){
  return new Promise((resolve)=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement("canvas");
      let w=img.width, h=img.height;
      if(w>maxSize||h>maxSize){
        if(w>h){h=Math.round(h*maxSize/w);w=maxSize;}
        else{w=Math.round(w*maxSize/h);h=maxSize;}
      }
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext("2d");
      ctx.drawImage(img,0,0,w,h);
      resolve(canvas.toDataURL("image/jpeg",0.8));
    };
    img.onerror=()=>resolve(dataUrl);
    img.src=dataUrl;
  });
}

// ── 1. Confirmación de lectura ──
// Marca un elemento como "visto" por el usuario actual en Firebase
async function marcarComoVisto(coleccion, id, usuarioId) {
  const visto = {
    vistoPor: usuarioId,
    fechaVisto: new Date().toISOString(),
  };
  try {
    await fbEscribir(coleccion, id, { [`lecturas_${usuarioId}`]: visto });
    console.log(`[LECTURA] ${coleccion}/${id} marcado como visto por ${usuarioId}`);
    return true;
  } catch (e) {
    console.log("[LECTURA] Error:", e);
    return false;
  }
}

// Comprueba si un elemento ha sido visto por un usuario
function fueVistoPor(elemento, usuarioId) {
  if (!elemento || !usuarioId) return false;
  const lectura = elemento[`lecturas_${usuarioId}`];
  if (lectura && lectura.vistoPor === usuarioId) return true;
  // Fallback: check vistoPor array
  if (Array.isArray(elemento.vistoPor)) return elemento.vistoPor.includes(usuarioId);
  return false;
}

// ── 2. Generador de archivos .ics (calendario) ──
function generarICS({ titulo, descripcion, fechaInicio, fechaFin, ubicacion, url, recordatorioMin = 30 }) {
  const fmtDate = (d) => {
    const dt = d instanceof Date ? d : new Date(d);
    return dt.toISOString().replace(/[-:]/g, "").replace(/\.\d{3}/, "");
  };
  const inicio = fmtDate(fechaInicio);
  const fin = fmtDate(fechaFin || new Date(new Date(fechaInicio).getTime() + 3600000)); // +1h si no hay fin
  const uid = `crm-${Date.now()}-${Math.random().toString(36).slice(2)}@grupoconsolidado`;

  const ics = [
    "BEGIN:VCALENDAR",
    "VERSION:2.0",
    "PRODID:-//CRM Grupo Consolidado//ES",
    "CALSCALE:GREGORIAN",
    "METHOD:PUBLISH",
    "BEGIN:VEVENT",
    `UID:${uid}`,
    `DTSTART:${inicio}`,
    `DTEND:${fin}`,
    `SUMMARY:${(titulo || "").replace(/\n/g, "\\n")}`,
    `DESCRIPTION:${(descripcion || "").replace(/\n/g, "\\n")}`,
    ubicacion ? `LOCATION:${ubicacion}` : "",
    url ? `URL:${url}` : "",
    `BEGIN:VALARM`,
    `TRIGGER:-PT${recordatorioMin}M`,
    `ACTION:DISPLAY`,
    `DESCRIPTION:Recordatorio: ${titulo}`,
    `END:VALARM`,
    "END:VEVENT",
    "END:VCALENDAR",
  ].filter(Boolean).join("\r\n");

  return ics;
}

function descargarICS(icsContent, filename) {
  const blob = new Blob([icsContent], { type: "text/calendar;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename || "evento.ics";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// Crea una notificación en Firebase y opcionalmente envía email
async function despacharNotificacion({ tipo, titulo, mensaje, destinatarioId, destinatarioEmail, enlace, prioridad = "normal", creadoPor, datos = {}, fechaVencimiento }) {
  const notif = {
    id: `notif_${Date.now()}_${Math.random().toString(36).slice(2,6)}`,
    tipo, titulo, mensaje, destinatarioId,
    destinatarioEmail: destinatarioEmail || USUARIOS.find(u => u.id === destinatarioId)?.email || "",
    enlace: enlace || "https://crmwikuk.vercel.app",
    prioridad,
    creadoPor,
    creadoPorNombre: USUARIOS.find(u => u.id === creadoPor)?.nombre || creadoPor,
    fecha: new Date().toISOString(),
    leido: false, emailEnviado: false,
    ...datos,
  };

  console.log(`[NOTIF] Destinatario: ${destinatarioId}, email encontrado: "${notif.destinatarioEmail}"`);
  if(!notif.destinatarioEmail) console.log("[NOTIF] ⚠️ Sin email — revisa que el usuario tenga email en Firebase/Portal");

  // Guardar en Firebase
  try {
    await fbEscribir("notificaciones_email", notif.id, notif);
    console.log(`[NOTIF] Creada: ${tipo} → ${destinatarioId}: ${titulo}`);
  } catch (e) { console.log("[NOTIF] Error guardando:", e); }

  // Generar .ics para adjuntar al email
  const fechaEvento = fechaVencimiento ? new Date(fechaVencimiento) : new Date(Date.now() + 86400000);
  const icsContent = generarICS({
    titulo: `CRM: ${titulo}`,
    descripcion: mensaje,
    fechaInicio: fechaEvento,
    recordatorioMin: tipo === "incidencia" ? 15 : 60,
    url: notif.enlace,
  });

  // Enviar email con .ics adjunto
  if (notif.destinatarioEmail) {
    try {
      const resp = await fetch("/api/send-email", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          to: notif.destinatarioEmail,
          subject: `[CRM] ${prioridad === "urgente" ? "🚨 URGENTE: " : ""}${titulo}`,
          html: `
            <div style="font-family:sans-serif;max-width:500px;margin:0 auto;padding:20px">
              <div style="background:#1E3A5F;color:#fff;padding:16px 20px;border-radius:12px 12px 0 0">
                <h2 style="margin:0;font-size:16px">🏢 CRM Grupo Consolidado</h2>
              </div>
              <div style="padding:20px;border:1px solid #E2E8F0;border-top:none;border-radius:0 0 12px 12px">
                <p style="margin:0 0 4px;font-size:11px;color:#64748B;text-transform:uppercase;font-weight:700">${tipo.toUpperCase()}</p>
                <h3 style="margin:0 0 12px;font-size:18px;color:#1E293B">${titulo}</h3>
                <p style="margin:0 0 16px;font-size:14px;color:#475569;line-height:1.5">${mensaje}</p>
                <p style="margin:0 0 4px;font-size:11px;color:#94A3B8">📅 Fecha: ${fechaEvento.toLocaleDateString("es-ES",{weekday:"long",day:"numeric",month:"long"})}</p>
                <p style="margin:0 0 16px;font-size:11px;color:#94A3B8">De: ${notif.creadoPorNombre} · ${new Date().toLocaleDateString("es-ES")}</p>
                <p style="margin:0 0 8px;font-size:12px;color:#1E3A5F;font-weight:700">📅 El evento de calendario se ha adjuntado a este email — ábrelo para añadirlo a tu calendario</p>
                <a href="${notif.enlace}" style="display:inline-block;padding:12px 24px;background:#1E3A5F;color:#fff;text-decoration:none;border-radius:8px;font-weight:700;font-size:14px">Abrir en CRM →</a>
              </div>
            </div>`,
          icsAttachment: icsContent,
          icsFilename: `crm_${tipo}_${Date.now()}.ics`,
        }),
      });
      if (resp.ok) {
        notif.emailEnviado = true;
        await fbEscribir("notificaciones_email", notif.id, { emailEnviado: true, fechaEmailEnviado: new Date().toISOString() });
        console.log(`[NOTIF] ✅ Email+ICS enviado a ${notif.destinatarioEmail}`);
      } else {
        const errBody = await resp.text();
        console.log(`[NOTIF] ❌ Email falló (${resp.status}): ${errBody}`);
      }
    } catch (e) {
      console.log(`[NOTIF] ❌ Email no enviado: ${e.message}. ¿SMTP configurado en Vercel?`);
    }
  }

  return notif;
}

// ── Helper: resolver todos los IDs CRM de un usuario ────────────
// El portal puede asignar IDs distintos (ej: "U_xxx") al CRM (ej: "ik4").
// Esta función devuelve un Set con todos los posibles IDs para comparar.
function resolverMisIds(usuario){
  if(!usuario) return new Set();
  const ids=new Set([
    (usuario.id||"").toUpperCase(),
    (usuario.user||"").toUpperCase(),
    (usuario.username||"").toUpperCase(),
    (usuario.grupoAgente||"").toUpperCase(),
  ].filter(Boolean));
  if(usuario.grupoAgente){
    const match=USUARIOS.find(u=>u.grupoAgente&&u.grupoAgente.toUpperCase()===(usuario.grupoAgente||"").toUpperCase());
    if(match) ids.add(match.id.toUpperCase());
  }
  return ids;
}

// ── Carga dinámica de USUARIOS desde Firebase ───────────────────
// Si existen docs en la colección "usuarios", se fusionan con el seed:
// - Firebase tiene prioridad (actualiza nombre, color, equipo, etc.)
// - Usuarios nuevos en Firebase se añaden automáticamente
// - El seed actúa como fallback si Firebase falla
async function cargarUsuariosFB(){
  try{
    // Leer usuarios CRM + portal_users (mismo proyecto Firebase)
    const [fbUsers, portalUsers] = await Promise.all([
      fbLeer("usuarios"),
      fbLeer("portal_users"),
    ]);
    console.log(`[USUARIOS] CRM: ${(fbUsers||[]).length}, Portal: ${(portalUsers||[]).length}`);

    // Mapa de emails del Portal por catalogoVendedor
    const portalEmails={};
    (portalUsers||[]).forEach(pu=>{
      if(pu.email){
        if(pu.catalogoVendedor) portalEmails[pu.catalogoVendedor.toUpperCase()]=pu.email;
        if(pu.username) portalEmails[pu.username.toUpperCase()]=pu.email;
        if(pu.nombre) portalEmails[pu.nombre.toUpperCase()]=pu.email;
      }
    });
    console.log("[USUARIOS] Emails Portal:",Object.entries(portalEmails).map(([k,v])=>k+":"+v).join(", ")||"ninguno");

    const merged=[...USUARIOS];
    // Merge usuarios CRM
    (fbUsers||[]).forEach(fb=>{
      if(!fb.id||!fb.rol) return;
      let idx=merged.findIndex(u=>u.id===fb.id);
      if(idx<0 && fb.catalogoVendedor) idx=merged.findIndex(u=>u.grupoAgente && u.grupoAgente.toUpperCase()===fb.catalogoVendedor.toUpperCase());
      if(idx<0 && fb.username) idx=merged.findIndex(u=>u.id===fb.username || (u.grupoAgente && u.grupoAgente.toUpperCase()===fb.username.toUpperCase()));
      const defIcon=fb.rol==="agente"||fb.rol==="crm_agente"?"🧑‍💼":fb.rol==="jefe"||fb.rol==="crm_jefe"?"🏆":fb.rol==="director"||fb.rol==="crm_director"?"📊":fb.rol==="ceo"?"👑":"👤";
      // Email: primero de CRM, luego del Portal
      let email=fb.email||"";
      if(!email && fb.grupoAgente) email=portalEmails[fb.grupoAgente.toUpperCase()]||"";
      if(!email && fb.catalogoVendedor) email=portalEmails[fb.catalogoVendedor.toUpperCase()]||"";
      if(!email && fb.nombre) email=portalEmails[fb.nombre.toUpperCase()]||"";
      if(idx>=0){
        merged[idx]={...merged[idx],...fb,id:merged[idx].id,icon:fb.icon||merged[idx].icon||defIcon,email:email||merged[idx].email||""};
      }else{
        merged.push({...fb,icon:fb.icon||defIcon,email});
      }
    });

    // Merge emails del Portal para usuarios que aún no tienen
    merged.forEach((u,i)=>{
      if(!u.email){
        const ga=(u.grupoAgente||"").toUpperCase();
        const nm=(u.nombre||"").toUpperCase();
        if(ga && portalEmails[ga]) merged[i].email=portalEmails[ga];
        else if(nm && portalEmails[nm]) merged[i].email=portalEmails[nm];
      }
    });

    USUARIOS=merged;
    const conEmail=USUARIOS.filter(u=>u.email);
    console.log(`✅ USUARIOS: ${USUARIOS.length} total, ${conEmail.length} con email`);
    if(conEmail.length>0) console.log(`[USUARIOS] Emails:`,conEmail.map(u=>`${u.nombre}:${u.email}`).join(", "));
    return true;
  }catch(e){
    console.warn("⚠️ USUARIOS: usando seed local:",e.message);
    return false;
  }
}

// ── Normalizar cliente desde Firebase (distintos esquemas de campo) ──
// Soporta campos en MAYÚSCULAS, minúsculas o camelCase
function normCliente(c){
  if(!c) return c;
  var n=c.NOMBRE||c.nombre||c.name||c.razonSocial||c.RAZON_SOCIAL||c.cliente||'';
  var id=c.id||c.ID||c.CODIGO||c.codigo||c.code||c.COD_CLIENTE||n;
  var tel=c.TEL||c.tel||c.TELEFONO||c.telefono||c.phone||c.PHONE||'';
  var dir=c.DIR||c.dir||c.DIRECCION||c.direccion||c.address||c.ADDRESS||c.LOCALIDAD||c.localidad||'';
  // Firebase usa "semanas" (array) o "semana" (número) como campo de ruta
  var semanaRaw=c.semana||c.SEMANA||(Array.isArray(c.semanas)&&c.semanas.length>0?c.semanas[0]:null)||c.ruta||c.RUTA||0;
  var ruta=Number(semanaRaw)||0;
  var agente=c.AGENTE||c.agente||c.VENDEDOR||c.vendedor||c.agenteId||'';
  return Object.assign({},c,{
    id:String(id), nombre:n, tel:tel, dir:dir,
    ruta:Number(ruta)||0, agente:agente,
    _raw:c
  });
}

// Todos los componentes leen/escriben aquí → los cambios de CEO llegan al jefe
// sin necesidad de Firebase
let _estrategiasGlobal = [...ESTRATEGIAS_SEED];
let _listeners = [];

const GlobalStore = {
  getEstrategias: () => _estrategiasGlobal,
  setEstrategias: (data) => {
    _estrategiasGlobal = data;
    _listeners.forEach(fn => fn(data));
  },
  updateEstrategia: (id, updater) => {
    _estrategiasGlobal = _estrategiasGlobal.map(e => e.id === id ? updater(e) : e);
    _listeners.forEach(fn => fn(_estrategiasGlobal));
  },
  subscribe: (fn) => {
    _listeners.push(fn);
    return () => { _listeners = _listeners.filter(f => f !== fn); };
  },
};

// ── Filtro por equipo con desplegable de agentes ──
function FiltroEquipo({value,onChange,agenteSel,onAgenteSel,items,getAgente,style}){
  const [openEq,setOpenEq]=React.useState(null);
  const equipos=[
    {k:"WIKUK",l:"WIKUK",c:T.green,icon:"🟢"},
    {k:"INTERKEY",l:"INTERKEY",c:T.amber,icon:"🟠"},
  ];
  // Contar items por agente
  const conteo=React.useMemo(()=>{
    const map={};
    (items||[]).forEach(item=>{
      const ag=getAgente?getAgente(item):(item.agente||item.agenteId||item.autor||"");
      if(!ag) return;
      // Buscar usuario por id o grupoAgente
      const usr=USUARIOS.find(u=>u.id===ag||u.grupoAgente===(ag||"").toUpperCase());
      const uid=usr?usr.id:ag;
      map[uid]=(map[uid]||0)+1;
    });
    return map;
  },[items]);

  const isTodos=value==="todos"&&!agenteSel;
  return React.createElement("div",{style:{marginBottom:14,...style}},
    React.createElement("div",{style:{display:"flex",gap:6,marginBottom:openEq?8:0}},
      React.createElement("button",{onClick:()=>{onChange("todos");onAgenteSel&&onAgenteSel(null);setOpenEq(null);},
        style:{padding:"7px 14px",borderRadius:99,cursor:"pointer",fontSize:11,fontWeight:isTodos?700:400,
          border:`1.5px solid ${isTodos?T.navy:T.border}`,
          background:isTodos?T.navy:"#fff",color:isTodos?"#fff":T.muted}},"Todos"),
      ...equipos.map(eq=>{
        const isSel=value===eq.k&&!agenteSel;
        const isOpen=openEq===eq.k;
        // Contar items de este equipo
        const agEq=USUARIOS.filter(u=>u.rol==="agente"&&u.equipo===eq.k);
        const countEq=agEq.reduce((s,u)=>s+(conteo[u.id]||0),0);
        return React.createElement("button",{key:eq.k,onClick:()=>{
            if(isSel){setOpenEq(isOpen?null:eq.k);}
            else{onChange(eq.k);onAgenteSel&&onAgenteSel(null);setOpenEq(eq.k);}
          },
          style:{padding:"7px 14px",borderRadius:99,cursor:"pointer",fontSize:11,fontWeight:isSel?700:400,
            border:`1.5px solid ${isSel?eq.c:T.border}`,
            background:isSel?eq.c+"15":"#fff",color:isSel?eq.c:T.muted,
            display:"flex",gap:4,alignItems:"center"}},
          eq.icon+" "+eq.l+(countEq>0?" ("+countEq+")":""),
          isOpen&&React.createElement("span",{style:{fontSize:8,marginLeft:2}},"▼"));
      })
    ),
    openEq&&React.createElement("div",{style:{display:"flex",gap:5,flexWrap:"wrap",paddingLeft:4}},
      USUARIOS.filter(u=>u.rol==="agente"&&u.equipo===openEq&&(conteo[u.id]||0)>0).map(u=>{
        const isSel=agenteSel===u.id;
        const eqColor=openEq==="WIKUK"?T.green:T.amber;
        const cnt=conteo[u.id]||0;
        return React.createElement("button",{key:u.id,onClick:()=>{
            onChange(openEq);
            onAgenteSel&&onAgenteSel(isSel?null:u.id);
          },
          style:{padding:"5px 10px",borderRadius:8,cursor:"pointer",fontSize:10,fontWeight:isSel?700:400,
            border:`1.5px solid ${isSel?eqColor:T.border}`,
            background:isSel?eqColor+"20":"#fff",color:isSel?eqColor:T.muted}},
          u.icon+" "+u.nombre+" ("+cnt+")");
      })
    )
  );
}

// ══ Componente reutilizable: búsqueda con lupa y sugerencias ══════
function SearchInput({value, onChange, placeholder, suggestions=[], onSelect, style={}, disabled=false}){
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);

  React.useEffect(()=>{
    const handler=(e)=>{ if(ref.current&&!ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", handler);
    return ()=>document.removeEventListener("mousedown", handler);
  },[]);

  return(
    <div ref={ref} style={{position:"relative",...style}}>
      <div style={{position:"relative",display:"flex",alignItems:"center"}}>
        <span style={{position:"absolute",left:12,color:"#94A3B8",fontSize:14,pointerEvents:"none"}}>🔍</span>
        <input
          value={value}
          onChange={e=>{onChange(e.target.value);setOpen(true);}}
          onFocus={()=>setOpen(true)}
          placeholder={placeholder}
          disabled={disabled}
          style={{width:"100%",padding:"10px 12px 10px 36px",borderRadius:9,
            border:"1.5px solid #E2E8F0",fontSize:13,outline:"none",
            boxSizing:"border-box",fontFamily:"inherit",background:"#fff"}}
        />
        {value&&(
          <button onClick={()=>{onChange("");setOpen(false);}}
            style={{position:"absolute",right:10,background:"none",border:"none",
              cursor:"pointer",color:"#94A3B8",fontSize:16,padding:0}}>×</button>
        )}
      </div>
      {open&&suggestions.length>0&&(
        <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,
          background:"#fff",borderRadius:10,border:"1px solid #E2E8F0",
          boxShadow:"0 8px 24px rgba(0,0,0,.12)",zIndex:200,
          maxHeight:220,overflowY:"auto"}}>
          {suggestions.slice(0,8).map((s,i)=>(
            <div key={i} onClick={()=>{onSelect(s);setOpen(false);}}
              style={{padding:"10px 14px",cursor:"pointer",fontSize:13,
                borderBottom:i<Math.min(suggestions.length,8)-1?"1px solid #F1F5F9":"none",
                display:"flex",alignItems:"center",gap:10}}
              onMouseEnter={e=>e.currentTarget.style.background="#F8FAFC"}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <span style={{fontSize:14,flexShrink:0}}>
                {s.tipo==="cliente"?"🏢":s.tipo==="producto"?"📦":"📋"}
              </span>
              <div style={{flex:1,minWidth:0}}>
                <p style={{margin:0,fontSize:13,fontWeight:600,color:"#0F172A",
                  overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.label}</p>
                {s.sub&&<p style={{margin:0,fontSize:11,color:"#94A3B8"}}>{s.sub}</p>}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// AVISO PLAN SEMANAL (se muestra en el dashboard)
// ═══════════════════════════════════════════════════════════════
function AvisoPlanSemanal({usuario,semana,onNav}){
  var _s=React.useState(null);var plan=_s[0],setPlan=_s[1];
  var _l=React.useState(true);var loading=_l[0],setLoading=_l[1];
  React.useEffect(function(){
    fbLeer("planes_semanales").then(function(planes){
      var found=(planes||[]).find(function(p){return p.agente===usuario.id&&p.semana===semana&&p.anio===new Date().getFullYear();});
      setPlan(found||null);
      setLoading(false);
    });
  },[semana]);
  if(loading) return null;
  if(!plan||plan.estado==="borrador"){
    return(
      <div onClick={function(){onNav("plan_semanal");}}
        style={{background:"#FFFBEB",borderRadius:12,padding:"12px 14px",marginBottom:14,
          border:"1.5px solid #F59E0B",cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:22}}>📅</span>
        <div>
          <p style={{margin:0,fontSize:13,fontWeight:700,color:"#92400E"}}>
            {!plan?"No tienes plan para la semana "+semana:"Tu plan de semana "+semana+" esta en borrador"}
          </p>
          <p style={{margin:"2px 0 0",fontSize:11,color:"#B45309"}}>Toca aqui para planificar tus visitas y objetivos</p>
        </div>
      </div>
    );
  }
  if(plan.estado==="activo"){
    var total=0,hecho=0;
    ["lunes","martes","miercoles","jueves","viernes"].forEach(function(d){(plan.dias[d]||[]).forEach(function(v){total++;if(v.hecho)hecho++;});});
    return(
      <div onClick={function(){onNav("plan_semanal");}}
        style={{background:"#EFF6FF",borderRadius:12,padding:"12px 14px",marginBottom:14,
          border:"1.5px solid #3B82F6",cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:22}}>🟢</span>
        <div style={{flex:1}}>
          <p style={{margin:0,fontSize:13,fontWeight:700,color:"#1E40AF"}}>Semana {semana} en curso</p>
          <p style={{margin:"2px 0 0",fontSize:11,color:"#3B82F6"}}>{hecho}/{total} visitas completadas</p>
        </div>
        <div style={{background:"#DBEAFE",borderRadius:99,padding:"4px 10px"}}>
          <span style={{fontSize:13,fontWeight:800,color:"#1E40AF"}}>{total>0?Math.round(hecho/total*100):0}%</span>
        </div>
      </div>
    );
  }
  return null;
}

// MI SEMANA — 360° + Acceso a clientes
// ═══════════════════════════════════════════════════════════════
function MiSemana({usuario,clientesFB,onBack,onNav,estrategiasDB,oportunidadesDB,incidenciasDB,muestrasDB}){
  var semActual=getSemanaISO();
  var _s1=React.useState(semActual);var semana=_s1[0],setSemana=_s1[1];
  var _s2=React.useState(null);var plan=_s2[0],setPlan=_s2[1];
  var _s3=React.useState(true);var cargando=_s3[0],setCargando=_s3[1];
  var _s4=React.useState("360");var tab=_s4[0],setTab=_s4[1];
  var appMisIds=resolverMisIds(usuario);

  React.useEffect(function(){
    setCargando(true);
    fbLeer("planes_semanales").then(function(planes){
      var found=(planes||[]).find(function(p){return p.agente===usuario.id&&p.semana===semana&&p.anio===new Date().getFullYear();});
      setPlan(found||null);
      setCargando(false);
    });
  },[semana]);

  var guardar=function(p){setPlan(p);fbEscribir("planes_semanales",p.id,p);};

  var getR=function(c){return parseInt(c.SEMANAVISITA||c.semanaVisita||c.ruta||c.semana||0)||0;};
  var rutas=[];var rutaMap={};
  (clientesFB||[]).forEach(function(c){var r=getR(c);if(r>0){if(!rutaMap[r])rutaMap[r]=[];rutaMap[r].push(c);if(rutas.indexOf(r)<0)rutas.push(r);}});
  rutas.sort(function(a,b){return a-b;});

  // 360 data
  var misEst=(estrategiasDB||[]).filter(function(e){return !e.eliminada&&(e.estado==="en_curso"||e.estado==="pendiente_aprobacion")&&appMisIds.has((e.agente||"").toUpperCase());});
  var misOps=(oportunidadesDB||[]).filter(function(o){return !o.eliminada&&!["ganada","perdida","cerrada_ganada","cerrada_perdida"].includes(o.estado||o.etapa)&&appMisIds.has((o.agenteId||o.agente||"").toUpperCase());});
  var misInc=(incidenciasDB||[]).filter(function(i){return !i.eliminada&&i.estado!=="cerrada"&&i.estado!=="resuelta"&&appMisIds.has((i.agente||i.autor||"").toUpperCase());});
  var misMue=(muestrasDB||[]).filter(function(m){return !m.eliminada&&m.estado==="pendiente"&&appMisIds.has((m.agente||"").toUpperCase());});
  var _s5=React.useState([]);var tareasDB=_s5[0],setTareasDB=_s5[1];
  var _s6=React.useState([]);var proyectosDB=_s6[0],setProyectosDB=_s6[1];
  React.useEffect(function(){fbLeer("tareas").then(function(d){setTareasDB(d||[]);});fbLeer("proyectos").then(function(d){setProyectosDB(d||[]);});},[]);
  var misTareas=tareasDB.filter(function(t){return !t.eliminada&&t.estado!=="hecha"&&appMisIds.has((t.agente||t.agenteId||"").toUpperCase());});
  var misHitos=[];
  proyectosDB.filter(function(p){return !p.eliminada&&p.estado==="activo";}).forEach(function(p){
    (p.hitos||[]).forEach(function(h){
      if(!h.hecho){var resp=h.responsable||"";if(appMisIds.has(resp.toUpperCase())||!resp) misHitos.push({proyNombre:p.nombre||"",hitoNombre:h.nombre||"",fecha:h.fecha||"",responsable:resp});}
    });
  });
  var pipeVal=misOps.reduce(function(s,o){return s+(parseInt(o.valor)||0);},0);

  // Clientes de la ruta
  var clientesSemana=plan&&plan.rutaNum&&rutaMap[plan.rutaNum]?rutaMap[plan.rutaNum]:[];
  // Visitados tracking (stored in plan.visitados = ["cli_id1","cli_id2"])
  var visitados=plan&&plan.visitados?plan.visitados:[];
  var cliVisitados=clientesSemana.filter(function(c){return visitados.indexOf(c.id||c.nombre||c.NOMBRE)>=0;});
  var cliPendientes=clientesSemana.filter(function(c){return visitados.indexOf(c.id||c.nombre||c.NOMBRE)<0;});
  var conAlerta=cliPendientes.filter(function(c){var n=(c.nombre||c.NOMBRE||"").toUpperCase();return misInc.some(function(i){return (i.clienteNombre||"").toUpperCase()===n;});});

  // Info contextual por cliente
  var getCliInfo=function(c){
    var n=(c.nombre||c.NOMBRE||"").toUpperCase();
    var info=[];
    var op=misOps.find(function(o){return (o.nombre||o.cliente||"").toUpperCase()===n;});
    if(op) info.push({text:(op.valor?parseInt(op.valor).toLocaleString("es-ES")+"E ":"")+(ESTADOS[op.etapa||op.estado]?ESTADOS[op.etapa||op.estado].label:""),color:"#22C55E"});
    var inc=misInc.find(function(i){return (i.clienteNombre||"").toUpperCase()===n;});
    if(inc) info.push({text:"Incidencia "+inc.tipo,color:"#D97706"});
    var est=misEst.find(function(e){return (e.cliente||e.clienteNombre||"").toUpperCase()===n;});
    if(est) info.push({text:"Estrategia"+(est.maxDescuento?" "+est.maxDescuento+"%":"")+(est.estado==="pendiente_aprobacion"?" pend.":""),color:"#7C3AED"});
    var mue=misMue.find(function(m){return (m.cliente||"").toUpperCase()===n;});
    if(mue) info.push({text:"Muestra pendiente feedback",color:"#F59E0B"});
    var pry=proyectosDB.find(function(p){return !p.eliminada&&p.estado==="activo"&&(p.cliente||"").toUpperCase()===n;});
    if(pry) info.push({text:"Proyecto "+(pry.progreso||0)+"%",color:"#3B82F6"});
    return info;
  };

  var marcarVisitado=function(cliId){
    if(!plan) return;
    var u=JSON.parse(JSON.stringify(plan));

    if(idx>=0) u.visitados.splice(idx,1); else u.visitados.push(cliId);
    guardar(u);
  };

  if(cargando) return React.createElement("div",{style:{padding:40,textAlign:"center",color:T.muted}},"Cargando...");

  return(
    <div style={{maxWidth:600,margin:"0 auto",padding:"16px 14px",paddingBottom:100}}>

        <button onClick={function(){setSemana(semana-1);}} style={{background:"none",border:"none",fontSize:24,cursor:"pointer",color:T.navy}}>{"<"}</button>
        <div style={{textAlign:"center"}}>
          <p style={{margin:0,fontSize:24,fontWeight:800,color:T.navy}}>Semana {semana}</p>
          <p style={{margin:0,fontSize:12,color:T.muted}}>
            {semana===semActual?"Esta semana":semana===semActual+1?"Proxima semana":"Sem. "+semana}
            {plan&&plan.modo==="ruta"?<span style={{color:T.blue,fontWeight:700}}>{" \u00B7 Ruta "+plan.rutaNum}</span>:null}
            {plan&&plan.modo==="libre"?<span style={{color:T.purple,fontWeight:700}}>{" \u00B7 Libre"}</span>:null}
            {plan?<span onClick={function(){setPlan(null);}} style={{color:T.muted,fontSize:10,cursor:"pointer",marginLeft:6}}>{"(cambiar)"}</span>:null}

      </div>

      {!plan?(
        <div style={{padding:"20px 0"}}>
          <p style={{margin:"0 0 4px",fontSize:18,fontWeight:800,color:T.navy,textAlign:"center"}}>Programa tu semana</p>
          <p style={{margin:"0 0 24px",fontSize:12,color:T.muted,textAlign:"center"}}>Se queda fijada hasta que la cambies</p>
          {rutas.length>0&&<div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
            {rutas.map(function(r){var clis=rutaMap[r]||[];return <button key={r} onClick={function(){
              guardar({id:"plan_"+usuario.id+"_"+new Date().getFullYear()+"_s"+semana,agente:usuario.id,semana:semana,anio:new Date().getFullYear(),modo:"ruta",rutaNum:r,estado:"activo",visitados:[]});
            }} style={{display:"flex",alignItems:"center",gap:14,padding:18,borderRadius:16,border:"2px solid "+T.blue,background:"#EFF6FF",cursor:"pointer",textAlign:"left"}}>
              <div style={{width:48,height:48,borderRadius:14,background:T.blue,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:18,fontWeight:800,flexShrink:0}}>{r}</div>
              <div style={{flex:1}}>
                <p style={{margin:0,fontSize:15,fontWeight:700,color:T.navy}}>Ruta {r}</p>
                <p style={{margin:"3px 0 0",fontSize:11,color:T.muted}}>{clis.length} clientes{clis.length>0?" \u00B7 "+clis.slice(0,2).map(function(c){return c.nombre||c.NOMBRE||"";}).join(", ")+(clis.length>2?"...":""):""}</p>

            </button>;})}
          </div>}
          <button onClick={function(){guardar({id:"plan_"+usuario.id+"_"+new Date().getFullYear()+"_s"+semana,agente:usuario.id,semana:semana,anio:new Date().getFullYear(),modo:"libre",rutaNum:null,estado:"activo",visitados:[]});}} style={{width:"100%",padding:18,borderRadius:16,border:"2px solid "+T.purple,background:"#F5F3FF",cursor:"pointer",textAlign:"center"}}>

                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}><div style={{width:40,height:40,borderRadius:12,background:"#F5F3FF",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:800,color:T.purple}}>{"🎯"}</div><div><p style={{margin:0,fontSize:15,fontWeight:800}}>Estrategias</p><p style={{margin:0,fontSize:11,color:T.muted}}>{misEst.length} activas</p></div></div>
                {misEst.map(function(e){return <div key={e.id} onClick={function(){onNav("estrategias");}} style={{padding:"10px 12px",marginBottom:8,background:"#FAFAFE",borderRadius:12,border:"1px solid #E2E8F0",cursor:"pointer"}}>
                  <div style={{display:"flex",justifyContent:"space-between"}}><p style={{margin:0,fontSize:13,fontWeight:700}}>{e.cliente||e.clienteNombre}</p>{e.maxDescuento>0&&<span style={{fontSize:12,fontWeight:800,color:e.maxDescuento>15?"#DC2626":"#166534"}}>{e.maxDescuento}%</span>}</div>
                  <p style={{margin:"3px 0 0",fontSize:11,color:T.muted}}>{(e.texto||"").substring(0,60)}</p>
                  {e.estado==="pendiente_aprobacion"&&<span style={{fontSize:10,padding:"3px 10px",borderRadius:99,background:"#FEF3C7",color:"#92400E",fontWeight:600,display:"inline-block",marginTop:4}}>{"Pend. "+(e.pendienteDeNombre||"")}</span>}
                </div>;})}
                <button onClick={function(){onNav("estrategias");}} style={{width:"100%",padding:10,borderRadius:10,border:"2px dashed #E2E8F0",background:"#fff",color:T.purple,fontSize:12,fontWeight:700,cursor:"pointer"}}>+ Nueva estrategia</button>
              </div>)}

              {misOps.length>0&&(<div style={{background:"#fff",borderRadius:16,padding:18,marginBottom:14,borderLeft:"4px solid #1E3A5F",boxShadow:"0 1px 4px rgba(0,0,0,.04)"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}><div style={{width:40,height:40,borderRadius:12,background:"#EFF6FF",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:800,color:T.navy}}>{"💼"}</div><div><p style={{margin:0,fontSize:15,fontWeight:800}}>Oportunidades</p><p style={{margin:0,fontSize:11,color:T.muted}}>{pipeVal>0?pipeVal.toLocaleString("es-ES")+"E pipeline":misOps.length+" abiertas"}</p></div></div>
                {misOps.slice(0,5).map(function(o){return <div key={o.id} onClick={function(){onNav("oportunidades");}} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderTop:"1px solid #F1F5F9",cursor:"pointer"}}>
                  <div><p style={{margin:0,fontSize:13,fontWeight:600}}>{o.nombre||o.cliente}</p><p style={{margin:"2px 0 0",fontSize:11,color:T.muted}}>{ESTADOS[o.etapa||o.estado]?ESTADOS[o.etapa||o.estado].label:""}</p></div>
                  <span style={{fontSize:15,fontWeight:800,color:T.green}}>{o.valor?parseInt(o.valor).toLocaleString("es-ES")+"E":""}</span>
                </div>;})}
              </div>)}

              {(misInc.length>0||misMue.length>0)&&(<div style={{display:"flex",gap:10,marginBottom:14}}>
                {misInc.length>0&&<div onClick={function(){onNav("incidencias");}} style={{flex:1,background:"#fff",borderRadius:16,padding:14,borderLeft:"4px solid #EF4444",cursor:"pointer",textAlign:"center",boxShadow:"0 1px 4px rgba(0,0,0,.04)"}}><p style={{margin:0,fontSize:28,fontWeight:800,color:"#EF4444"}}>{misInc.length}</p><p style={{margin:"2px 0 0",fontSize:11,color:T.muted}}>Incidencias</p></div>}
                {misMue.length>0&&<div onClick={function(){onNav("muestras");}} style={{flex:1,background:"#fff",borderRadius:16,padding:14,borderLeft:"4px solid #7C3AED",cursor:"pointer",textAlign:"center",boxShadow:"0 1px 4px rgba(0,0,0,.04)"}}><p style={{margin:0,fontSize:28,fontWeight:800,color:T.purple}}>{misMue.length}</p><p style={{margin:"2px 0 0",fontSize:11,color:T.muted}}>Muestras pend.</p></div>}
              </div>)}

              {misTareas.length+misHitos.length+misEst.length+misOps.length+misInc.length+misMue.length===0&&(
                <div style={{textAlign:"center",padding:"30px 20px",background:"#F0FDF4",borderRadius:16,border:"2px solid #22C55E"}}>
                  <p style={{margin:"0 0 4px",fontSize:28}}>OK</p><p style={{margin:0,fontSize:16,fontWeight:800,color:"#166534"}}>Todo al dia</p>
                </div>
              )}
            </div>
          )}

          {/* TAB RUTA */}
          {tab==="ruta"&&(
            <div>
              <p style={{margin:"0 0 14px",fontSize:16,fontWeight:800,color:T.navy}}>{plan.modo==="ruta"?"Ruta "+plan.rutaNum+" \u2014 "+clientesSemana.length+" clientes":"Clientes"}</p>

              {cliVisitados.length>0&&(<div>
                <p style={{margin:"0 0 8px",fontSize:11,fontWeight:700,color:"#22C55E",textTransform:"uppercase"}}>Visitados ({cliVisitados.length})</p>
                <div style={{background:"#fff",borderRadius:16,overflow:"hidden",marginBottom:16,opacity:.7,boxShadow:"0 1px 4px rgba(0,0,0,.04)"}}>
                  {cliVisitados.map(function(c,i){var n=c.nombre||c.NOMBRE||"";return <div key={i} onClick={function(){marcarVisitado(c.id||n);}} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 18px",borderBottom:i<cliVisitados.length-1?"1px solid #F1F5F9":"none",cursor:"pointer",background:"#F0FDF4"}}>
                    <div style={{width:38,height:38,borderRadius:10,background:"#D1FAE5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{"✅"}</div>
                    <div style={{flex:1}}><p style={{margin:0,fontSize:14,fontWeight:700,textDecoration:"line-through",color:"#94A3B8"}}>{n}</p></div>
                  </div>;})}
                </div>
              </div>)}

              {cliPendientes.length>0&&(<div>
                <p style={{margin:"0 0 8px",fontSize:11,fontWeight:700,color:T.blue,textTransform:"uppercase"}}>Pendientes ({cliPendientes.length})</p>
                <div style={{background:"#fff",borderRadius:16,overflow:"hidden",marginBottom:14,boxShadow:"0 1px 4px rgba(0,0,0,.04)"}}>
                  {cliPendientes.map(function(c,i){
                    var n=c.nombre||c.NOMBRE||"";
                    var poblacion=c.poblacion||c.POBLACION||c.localidad||"";
                    var info=getCliInfo(c);
                    var hasInc=misInc.some(function(inc){return (inc.clienteNombre||"").toUpperCase()===n.toUpperCase();});
                    var isNew=!c.SEMANAVISITA&&!c.semanaVisita;
                    return <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 18px",borderBottom:i<cliPendientes.length-1?"1px solid #F1F5F9":"none",cursor:"pointer"}} onClick={function(){onNav("clientes");}}>
                      <div style={{width:38,height:38,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:isNew?12:16,fontWeight:isNew?800:400,flexShrink:0,
                        background:hasInc?"#FEF3C7":isNew?"#F5F3FF":"#EFF6FF",
                        color:isNew?T.purple:"inherit"}}>{hasInc?"⚠️":isNew?"N":"🏢"}</div>
                      <div style={{flex:1}}>
                        <p style={{margin:0,fontSize:14,fontWeight:700,color:isNew?T.purple:T.text}}>{n}</p>
                        {poblacion&&!hasInc&&<p style={{margin:"2px 0 0",fontSize:11,color:T.muted}}>{poblacion}</p>}
                        {info.map(function(inf,j){return <p key={j} style={{margin:"2px 0 0",fontSize:10,color:inf.color,fontWeight:600}}>{inf.text}</p>;})}
                      </div>
                      <button onClick={function(ev){ev.stopPropagation();marcarVisitado(c.id||n);}} style={{background:"none",border:"1.5px solid #D1FAE5",borderRadius:8,padding:"4px 8px",fontSize:10,color:"#22C55E",fontWeight:700,cursor:"pointer",flexShrink:0}}>Hecho</button>
                    </div>;
                  })}
                </div>
              </div>)}

              {clientesSemana.length===0&&plan.modo==="libre"&&<p style={{textAlign:"center",color:T.muted,padding:20}}>Modo libre. Usa el Informe para trabajar con clientes.</p>}

              <button onClick={function(){onNav("clientes");}} style={{width:"100%",padding:14,borderRadius:14,border:"2px dashed #E2E8F0",background:"#fff",color:T.blue,fontWeight:700,fontSize:13,cursor:"pointer",marginBottom:8}}>+ Agregar cliente</button>
              <button onClick={function(){onNav("clientes");}} style={{width:"100%",padding:14,borderRadius:14,border:"2px dashed "+T.purple,background:"#F5F3FF",color:T.purple,fontWeight:700,fontSize:13,cursor:"pointer"}}>Crear cliente nuevo</button>
            </div>
          )}

          <div style={{marginTop:20}}>
            <button onClick={function(){onNav("informe");}} style={{width:"100%",padding:16,borderRadius:14,border:"none",background:T.navy,color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",textAlign:"center"}}>Cerrar semana / Ir al Informe</button>
          </div>
        </div>
      )}
    </div>
  );
}


function DashAgente({usuario, onNav, oportunidadesDB, clientesFB, muestrasDB, estrategiasDB, incidenciasDB, calendarioDB, actividad, _ver}){
  const {id,equipo,color}=usuario;
  const opsBD=oportunidadesDB||OPORTUNIDADES_SEED;
  const misClientes=clientesFB&&clientesFB.length>0 ? clientesFB : (CLIENTES_POR_AGENTE[id]||[]);
  const appMisIds=resolverMisIds(usuario);

  // Datos reales de Firebase filtrados por usuario
  const misMuestras=(muestrasDB||MUESTRAS_SEED).filter(m=>appMisIds.has((m.agente||"").toUpperCase()));
  const mPend=misMuestras.filter(m=>m.estado==="pendiente").length;
  const mPos=misMuestras.filter(m=>m.estado==="positivo"||m.estado==="pedido").length;
  const mTotal=misMuestras.length;

  const misEstrat=(estrategiasDB||ESTRATEGIAS_SEED).filter(e=>
    !e.eliminada&&(e.estado==="en_curso"||e.estado==="pendiente_aprobacion")&&
    (appMisIds.has((e.agente||"").toUpperCase())||appMisIds.has((e.agenteId||"").toUpperCase())||
     e.equipo===usuario.equipo||!e.equipo));
  const ePend=misEstrat.length;

  const misOps=opsBD.filter(o=>(esDelUsuario(o.agente,appMisIds)||esDelUsuario(o.agenteId,appMisIds))&&
    !["ganada","perdida","cerrada_ganada","cerrada_perdida"].some(e=>o.etapa===e||o.estado===e));

  const misInc=(incidenciasDB||INCIDENCIAS_SEED).filter(i=>
    (i.estado==="abierta")&&(appMisIds.has((i.autor||"").toUpperCase())||appMisIds.has((i.agente||"").toUpperCase())));

  const semana=getSemanaISO();

  // Calendario — eventos de hoy
  const hoyISO=new Date().toISOString().split("T")[0];
  const DIAS_NOMBRE=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
  const hoyNombre=DIAS_NOMBRE[new Date().getDay()];
  const eventosHoy=(calendarioDB||[]).filter(e=>e.fecha===hoyISO&&appMisIds.has((e.agente||"").toUpperCase()))
    .sort((a,b)=>(a.hora||"").localeCompare(b.hora||""));

  const totalSem=misClientes.length;
  const act=actividad||{};
  const visitados=misClientes.filter(c=>{const a=act[c.id];return a&&a.visitas&&a.visitas.length>0;}).length;
  const pendVisita=totalSem-visitados;

  // Leer datos del agente desde AGENTES_DATA (poblado desde Firebase al arrancar)
  // Match flexible: por id, por grupoAgente (del portal), o por nombre
  const _ag=AGENTES_DATA.find(a=>a.id===usuario.id)
    || AGENTES_DATA.find(a=>usuario.grupoAgente && a.id===usuario.grupoAgente.toLowerCase())
    || AGENTES_DATA.find(a=>usuario.catalogoVendedor && a.id===usuario.catalogoVendedor.toLowerCase())
    || AGENTES_DATA.find(a=>usuario.nombre && a.nombre.toLowerCase()===usuario.nombre.toLowerCase())
    || {};
  const vMes   =_ag.vMes   ||0, vMesObj   =_ag.oMes   ||0;
  const mbMes  =_ag.mb     ||0, mbMesObj  =_ag.oMb    ||0;
  const vAnual =_ag.vAnual ||0, vAnualObj =_ag.oAnual ||0;
  const mbAnual=_ag.mb     ||0, mbAnualObj=_ag.oMb    ||0;
  // Guard: si objetivo=0 devuelve 0% en vez de NaN% (evita 0/0)
  const pctVM=vMesObj>0?Math.round(vMes/vMesObj*100):0;
  const pctVA=vAnualObj>0?Math.round(vAnual/vAnualObj*100):0;
  const pctMM=mbMesObj>0?Math.round(mbMes/mbMesObj*100):0;
  const pctMA=mbAnualObj>0?Math.round(mbAnual/mbAnualObj*100):0;

  // Anillo SVG de progreso
  const Ring=({pct,size=56,stroke=5})=>{
    const r=size/2-stroke;
    const circ=2*Math.PI*r;
    const fill=circ*(1-Math.min(pct,100)/100);
    const c=pct>=100?"#22C55E":pct>=80?"#F59E0B":"#EF4444";
    return(
      <svg width={size} height={size} style={{flexShrink:0,transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#E2E8F0" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={c} strokeWidth={stroke}
          strokeDasharray={circ} strokeDashoffset={fill}
          strokeLinecap="round" style={{transition:"stroke-dashoffset .8s ease"}}/>
      </svg>
    );
  };

  // Tarjeta métrica con anillo
  const MetricCard=({label,value,obj,pct,suffix="",note})=>{
    const c=pct>=100?"#22C55E":pct>=80?"#F59E0B":"#EF4444";
    return(
      <div style={{flex:1,background:"#fff",borderRadius:16,padding:"18px 16px",
        border:"1px solid #E2E8F0",
        boxShadow:"0 1px 3px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.06)"}}>
        <p style={{margin:"0 0 12px",fontSize:10,fontWeight:700,color:"#94A3B8",
          textTransform:"uppercase",letterSpacing:".1em"}}>{label}</p>
        <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:14}}>
          <div style={{position:"relative",flexShrink:0}}>
            <Ring pct={pct}/>
            <span style={{position:"absolute",top:"50%",left:"50%",
              transform:"translate(-50%,-50%) rotate(0deg)",
              fontSize:11,fontWeight:800,color:c}}>{pct}%</span>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <p style={{margin:0,fontSize:24,fontWeight:800,color:"#0F172A",
              letterSpacing:"-0.03em",lineHeight:1}}>
              {typeof value==="number"&&value>999?fmt(value):value}{suffix}
            </p>
            <p style={{margin:"3px 0 0",fontSize:11,color:"#94A3B8"}}>
              obj. {typeof obj==="number"&&obj>999?fmt(obj):obj}{suffix}
            </p>
          </div>
        </div>
        <div style={{height:2,borderRadius:99,background:"#F1F5F9",overflow:"hidden"}}>
          <div style={{height:"100%",width:`${Math.min(pct,100)}%`,borderRadius:99,
            background:c,transition:"width .8s ease"}}/>
        </div>
        {note&&<p style={{margin:"8px 0 0",fontSize:10,color:"#94A3B8"}}>{note}</p>}
      </div>
    );
  };

  // Extra KPI fields from _ag
  const vSem=_ag.vSem||0, vSemObj=_ag.oSem||0;
  const promoSem=_ag.promoSem||0, promoSemObj=_ag.oPromoSem||0;
  const promoMesR=_ag.promoMes||0, promoMesObj=_ag.oPromoMes||0;
  const promoAnual=_ag.promoAnual||0, promoAnualObj=_ag.oPromoAnual||0;
  const liqSem=_ag.liqSem||0, liqSemObj=_ag.oLiqSem||0;
  const liqMesR=_ag.liqMes||0, liqMesObj=_ag.oLiqMes||0;
  const liqAnual=_ag.liqAnual||0, liqAnualObj=_ag.oLiqAnual||0;

  const [periodo,setPeriodo]=useState("semana");

  // Valores dinámicos según período
  const vR=periodo==="semana"?vSem:periodo==="mes"?vMes:vAnual;
  const vO=periodo==="semana"?vSemObj:periodo==="mes"?vMesObj:vAnualObj;
  const pctV=vO>0?Math.round(vR/vO*100):0;
  const mbR=mbMes, mbO=mbMesObj;
  const promoR=periodo==="semana"?promoSem:periodo==="mes"?promoMesR:promoAnual;
  const promoO=periodo==="semana"?promoSemObj:periodo==="mes"?promoMesObj:promoAnualObj;
  const liqR=periodo==="semana"?liqSem:periodo==="mes"?liqMesR:liqAnual;
  const liqO=periodo==="semana"?liqSemObj:periodo==="mes"?liqMesObj:liqAnualObj;
  const totalPL=promoR+liqR, totalPLObj=promoO+liqO;
  const cV=pctV>=100?T.green:pctV>=80?T.amber:T.red;

  // Config módulos pendientes
  const MODS=[
    {icon:"📦",label:"Muestras pendientes",sub:`${mPos} positivas · ${mTotal} total`,count:mPend,nav:"muestras",bg:"#F5F3FF",ic:"#7C3AED"},
    {icon:"🎯",label:"Estrategias activas",sub:"Registra avance semanal",count:ePend,nav:"estrategias",bg:"#EFF6FF",ic:"#3B82F6"},
    {icon:"💼",label:"Oportunidades abiertas",sub:`${fmt(misOps.reduce((s,o)=>s+(o.valor||0),0))}€ en pipeline`,count:misOps.length,nav:"oportunidades",bg:"#F0F9FF",ic:"#0EA5E9"},
    {icon:"🚨",label:"Incidencias abiertas",sub:"Pendientes de resolución",count:misInc.length,nav:"incidencias",bg:"#FFF1F2",ic:"#F43F5E",urgent:true},
  ].filter(m=>m.count>0);

  const hayPend=MODS.length>0||totalSem>0;

  return(
    <div style={{background:"#F1F5F9",minHeight:"100vh",paddingBottom:100}}>
      <style>{`
        @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .pend-row:hover{background:#F8FAFC!important}
      `}</style>

      {/* ══ CONTENIDO ══ */}
      <div style={{padding:"16px 16px 0"}}>

        {/* Badges equipo + semana */}
        <div style={{display:"flex",gap:6,marginBottom:14}}>
          <span style={{background:T.navy,color:"#fff",fontSize:10,fontWeight:700,
            padding:"4px 12px",borderRadius:99,letterSpacing:".08em",textTransform:"uppercase"}}>{equipo}</span>
          <span style={{background:"#EEF2FF",color:"#6366F1",fontSize:10,fontWeight:700,
            padding:"4px 12px",borderRadius:99}}>Sem. {semana}</span>
        </div>

        {/* ── Aviso plan semanal (temporalmente desactivado para debug) ── */}
        {false&&React.createElement(AvisoPlanSemanal,{usuario:usuario,semana:semana,onNav:onNav})}

        {/* ── Selector período ── */}
        <div style={{display:"flex",gap:6,marginBottom:14}}>
          {["semana","mes","año"].map(p=>(
            <button key={p} onClick={()=>setPeriodo(p)}
              style={{flex:1,padding:"9px",borderRadius:9,fontSize:12,fontWeight:700,
                border:`2px solid ${periodo===p?T.navy:T.border}`,
                background:periodo===p?T.navy:"#fff",
                color:periodo===p?"#fff":T.muted,cursor:"pointer"}}>
              {p.charAt(0).toUpperCase()+p.slice(1)}
            </button>
          ))}
        </div>

        {/* ── Tarjeta consolidada dinámica ── */}
        <div style={{background:"#fff",borderRadius:16,padding:"16px 18px",marginBottom:14,
          border:`2px solid ${cV}30`,boxShadow:`0 2px 12px ${cV}15`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
            <div>
              <p style={{margin:"0 0 2px",fontSize:10,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
                Ventas {periodo}
              </p>
              <p style={{margin:0,fontSize:28,fontWeight:900,color:T.text}}>{fmt(vR)}€</p>
              <p style={{margin:"2px 0 0",fontSize:11,color:T.muted}}>obj. {fmt(vO)}€</p>
            </div>
            <div style={{textAlign:"center"}}>
              <p style={{margin:"0 0 2px",fontSize:9,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Cumplimiento</p>
              <p style={{margin:0,fontSize:28,fontWeight:900,color:cV}}>{pctV}%</p>
            </div>
          </div>
          <div style={{height:5,borderRadius:99,background:"#E2E8F0",overflow:"hidden",marginBottom:12}}>
            <div style={{height:"100%",width:`${Math.min(pctV,100)}%`,borderRadius:99,background:cV,transition:"width .5s"}}/>
          </div>

          {/* Sub-KPIs */}
          <div style={{display:"flex",gap:8}}>
            {[
              {l:"MB Medio",v:`${mbR}%`,sub:`obj. ${mbO}%`,c:mbR>=mbO?T.green:mbR>=mbO*.8?T.amber:T.red},
              {l:"🏷️ Promoción",v:`${fmt(promoR)}€`,sub:`obj. ${fmt(promoO)}€`,c:promoO>0&&promoR>=promoO?T.green:promoR>0?T.amber:T.muted},
              {l:"💧 Liquidación",v:`${fmt(liqR)}€`,sub:`obj. ${fmt(liqO)}€`,c:liqO>0&&liqR>=liqO?T.green:liqR>0?T.amber:T.muted},
              {l:"Σ Total",v:`${fmt(totalPL)}€`,sub:`obj. ${fmt(totalPLObj)}€`,c:totalPLObj>0&&totalPL>=totalPLObj?T.green:totalPL>0?T.amber:T.muted},
            ].map(k=>(
              <div key={k.l} style={{flex:1,background:"#F8FAFC",borderRadius:10,padding:"8px 6px",
                border:"1px solid #E2E8F0",textAlign:"center"}}>
                <p style={{margin:"0 0 2px",fontSize:8,color:"#94A3B8",textTransform:"uppercase",fontWeight:700}}>{k.l}</p>
                <p style={{margin:0,fontSize:13,fontWeight:800,color:k.c}}>{k.v}</p>
                <p style={{margin:0,fontSize:8,color:"#94A3B8"}}>{k.sub}</p>
              </div>
            ))}
          </div>
        </div>

        {/* ── Agenda de hoy ── */}
        {eventosHoy.length>0&&(
          <div style={{marginBottom:16}}>
            <p style={{margin:"0 0 8px",fontSize:10,fontWeight:700,color:"#64748B",
              textTransform:"uppercase",letterSpacing:".12em"}}>📅 Hoy · {hoyNombre} {new Date().toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit"})}</p>
            <div style={{background:"#fff",borderRadius:14,overflow:"hidden",border:`1px solid ${T.border}`,
              boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}>

          <div onClick={()=>onNav("calendario")}

        <TareasWidget onNav={onNav} usuario={usuario}/>

    </div>
  );
}

    setForm({prodCodigo:"",prodNombre:"",tipo:"Deshidratada",cantidad:"",clienteNombre:"",obs:""});
    setQProd(""); setQCli(""); setShowProd(false); setShowCli(false);
    setShow(true);
  };

  const openEditar=(m)=>{
    setEditId(m.id);
    setForm({prodCodigo:m.prodCodigo||"",prodNombre:m.prodNombre,tipo:m.tipo,cantidad:m.cantidad,clienteNombre:m.clienteNombre,obs:m.obs||""});
    setQProd(""); setQCli(""); setShowProd(false); setShowCli(false);
    setShow(true);
  };

  const guardar=()=>{
    if(!form.prodNombre||!form.clienteNombre) return;
    // Si es cliente nuevo, guardar en Firebase
    if(showNewCli&&form.clienteNombre.trim()){
      const cliId="CLI_"+Date.now();
      const cli={
        id:cliId,nombre:form.clienteNombre.trim(),NOMBRE:form.clienteNombre.trim().toUpperCase(),
        contacto:newCli.contacto,tel:newCli.tel,email:newCli.email,
        poblacion:newCli.poblacion,pais:newCli.pais||"España",notas:newCli.notas,
        activo:true,creadoEn:new Date().toLocaleDateString("es-ES"),origen:"crm_informe",
      };
      fbEscribir("clientes",cliId,cli);
    }
    if(editId){
      onEdit({id:editId,prodCodigo:form.prodCodigo,prodNombre:form.prodNombre,tipo:form.tipo,cantidad:form.cantidad||"1",clienteNombre:form.clienteNombre,obs:form.obs});
    } else {
      onAdd({id:`m${Date.now()}`,prodCodigo:form.prodCodigo,prodNombre:form.prodNombre,tipo:form.tipo,cantidad:form.cantidad||"1",clienteNombre:form.clienteNombre,obs:form.obs});
    }
    setForm({prodCodigo:"",prodNombre:"",tipo:"Deshidratada",cantidad:"",clienteNombre:"",obs:""});
    setShow(false); setEditId(null); setQProd(""); setQCli("");
    setShowNewCli(false); setNewCli({nombre:"",contacto:"",tel:"",email:"",poblacion:"",pais:"España",notas:""});
  };

  const ISt={width:"100%",border:`1.5px solid ${T.border}`,borderRadius:10,padding:"11px 12px",fontSize:13,outline:"none",boxSizing:"border-box"};

  return(
    <div>
      <p style={{margin:"0 0 4px",fontSize:17,fontWeight:800,color:T.text}}>📦 Muestras entregadas</p>
      <p style={{margin:"0 0 16px",fontSize:12,color:T.muted}}>Registra las muestras que has dejado esta semana</p>

      {muestras.map(m=>(
        <div key={m.id} style={{display:"flex",gap:12,alignItems:"center",padding:"12px 16px",
          background:"#FFF",borderRadius:12,border:`1px solid ${T.border}`,marginBottom:8,
          borderLeft:editId===m.id?`3px solid ${T.blue}`:undefined}}>
          <div style={{flex:1,minWidth:0}}>
            {m.prodCodigo&&<p style={{margin:0,fontSize:10,fontFamily:"monospace",color:T.blue,fontWeight:700}}>{m.prodCodigo}</p>}
            <p style={{margin:0,fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.prodNombre}</p>
            <p style={{margin:"2px 0 0",fontSize:11,color:T.muted}}>{m.tipo} · {m.cantidad} uds · {m.clienteNombre}</p>
            {m.obs&&<p style={{margin:"2px 0 0",fontSize:11,color:T.muted,fontStyle:"italic"}}>{m.obs}</p>}
          </div>
          <div style={{display:"flex",gap:6,flexShrink:0}}>
            <button onClick={()=>openEditar(m)}
              style={{background:T.blueL,border:"none",borderRadius:8,padding:"6px 10px",
                color:T.blue,fontSize:12,fontWeight:700,cursor:"pointer"}}>✏️</button>
            <button onClick={()=>onDel(m.id)}
              style={{background:T.redL,border:"none",borderRadius:8,padding:"6px 10px",
                color:T.red,fontSize:12,cursor:"pointer"}}>🗑</button>
          </div>
        </div>
      ))}

      {show&&(
        <div style={{background:T.bg,borderRadius:14,padding:"16px",border:`2px solid ${T.blue}`,marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <p style={{margin:0,fontSize:13,fontWeight:800,color:T.text}}>
              {editId?"✏️ Editar muestra":"📦 Nueva muestra"}
            </p>
            {editId&&<span style={{fontSize:11,color:T.blue,background:T.blueL,padding:"2px 10px",borderRadius:99,fontWeight:700}}>Editando</span>}
          </div>

          {/* Producto */}
          <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Producto *</p>
          <div style={{display:"flex",gap:6,marginBottom:4}}>
            <SearchInput
              value={form.prodNombre}
              onChange={v=>setForm(f=>({...f,prodNombre:v,prodCodigo:""}))}
              placeholder="🔍 Buscar producto o código..."
              suggestions={PRODUCTOS_LOCAL
                .filter(p=>form.prodNombre.length>=2&&((p.nombre||"").toLowerCase().includes(form.prodNombre.toLowerCase())||(p.codigo||"").toLowerCase().includes(form.prodNombre.toLowerCase())))
                .slice(0,8).map(p=>({label:p.nombre,sub:p.codigo+" · "+p.formato,tipo:"producto",obj:p}))}
              onSelect={s=>setForm(f=>({...f,prodNombre:s.label,prodCodigo:s.obj.codigo}))}
              style={{flex:1}}
            />
          </div>
          {form.prodCodigo&&<p style={{margin:"0 0 6px",fontSize:10,color:T.blue,fontWeight:700,fontFamily:"monospace"}}>{form.prodCodigo}</p>}
          {false&&(
            <div style={{marginBottom:10,border:`1.5px solid ${T.blue}`,borderRadius:10,background:"#fff",overflow:"hidden"}}>
              <div style={{display:"flex",gap:6,padding:"8px 10px",borderBottom:`1px solid ${T.border}`}}>
                <div style={{display:"flex",alignItems:"center",gap:8,flex:1}}>
                  <span style={{fontSize:14,color:"#94A3B8"}}>🔍</span>
                  <input value={qProd} onChange={e=>setQProd(e.target.value)} autoFocus
                    placeholder="Buscar por nombre o código…" style={{...ISt,padding:"8px 10px",flex:1,border:"none",outline:"none"}}/>
                </div>
                <button onClick={()=>{setShowProd(false);setQProd("");}} style={{background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:16}}>✕</button>
              </div>
              <div style={{maxHeight:200,overflowY:"auto"}}>
                {qProd.length<2&&<p style={{padding:"12px",fontSize:12,color:T.muted,margin:0}}>Escribe 2 letras para buscar…</p>}
                {qProd.length>=2&&prodResults.length===0&&<p style={{padding:"12px",fontSize:12,color:T.muted,margin:0}}>Sin resultados</p>}
                {prodResults.map(p=>(
                  <button key={p.codigo} onClick={()=>{setForm(f=>({...f,prodCodigo:p.codigo,prodNombre:p.nombre}));setShowProd(false);setQProd("");}}
                    style={{width:"100%",padding:"10px 14px",border:"none",borderBottom:`1px solid ${T.border}`,background:"transparent",cursor:"pointer",textAlign:"left",display:"flex",gap:10,alignItems:"center"}}>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{margin:0,fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.nombre}</p>
                      <p style={{margin:0,fontSize:10,color:T.muted}}>{p.codigo} · {p.cat}</p>
                    </div>
                    {p.precio&&<span style={{fontSize:11,fontWeight:700,color:T.green,flexShrink:0}}>{p.precio}€</span>}
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* Tipo y cantidad */}
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <div style={{flex:2}}>
              <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Tipo</p>
              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                {["Deshidratada","Ingredientes","Otros"].map(t=>(
                  <button key={t} onClick={()=>setForm(f=>({...f,tipo:t}))}
                    style={{padding:"7px 10px",borderRadius:8,border:`2px solid ${form.tipo===t?T.blue:T.border}`,
                      background:form.tipo===t?T.blueL:"transparent",color:form.tipo===t?T.blue:T.muted,
                      fontSize:11,fontWeight:form.tipo===t?700:400,cursor:"pointer"}}>{t}</button>
                ))}
              </div>
            </div>
            <div style={{flex:1}}>
              <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Uds.</p>
              <input type="number" value={form.cantidad} onChange={e=>setForm(f=>({...f,cantidad:e.target.value}))} placeholder="1" style={ISt}/>
            </div>
          </div>

          {/* Cliente */}
          <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Cliente *</p>
          <div style={{position:"relative",marginBottom:4}}>
            <SearchInput
              value={form.clienteNombre}
              onChange={v=>setForm(f=>({...f,clienteNombre:v,clienteId:""}))}
              placeholder="🔍 Buscar cliente..."
              suggestions={clientes
                .filter(c=>{const n=(c.nombre||c.NOMBRE||"").toLowerCase();return form.clienteNombre.length>=2&&n.includes(form.clienteNombre.toLowerCase());})
                .slice(0,8).map(c=>({label:c.nombre||c.NOMBRE,sub:c.id,tipo:"cliente"}))}
              onSelect={s=>setForm(f=>({...f,clienteNombre:s.label,clienteId:s.sub||""}))}
            />
            <p style={{margin:"4px 0 6px",fontSize:10,color:T.muted,fontStyle:"italic"}}>Si no aparece, escribe el nombre directamente</p>
            {!showNewCli?(
              <button onClick={()=>{setShowNewCli(true);setNewCli(f=>({...f,nombre:form.clienteNombre}));}}
                style={{background:T.green+"15",border:`1px solid ${T.green}44`,borderRadius:8,
                  padding:"5px 10px",fontSize:11,fontWeight:700,color:T.green,cursor:"pointer",marginBottom:6}}>
                ➕ Crear cliente nuevo
              </button>
            ):(
              <div style={{background:"#F0FDF4",borderRadius:10,padding:12,border:`1.5px solid ${T.green}55`,marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <p style={{margin:0,fontSize:12,fontWeight:800,color:T.green}}>➕ Nuevo cliente</p>
                  <button onClick={()=>setShowNewCli(false)} style={{background:"none",border:"none",fontSize:14,color:T.muted,cursor:"pointer"}}>×</button>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  <input value={newCli.contacto} onChange={e=>setNewCli(f=>({...f,contacto:e.target.value}))}
                    placeholder="Persona de contacto" style={{...ISt,padding:"8px 10px"}}/>
                  <div style={{display:"flex",gap:6}}>
                    <input value={newCli.tel} onChange={e=>setNewCli(f=>({...f,tel:e.target.value}))}
                      placeholder="Teléfono" type="tel" style={{...ISt,padding:"8px 10px",flex:1}}/>
                    <input value={newCli.email} onChange={e=>setNewCli(f=>({...f,email:e.target.value}))}
                      placeholder="Email" type="email" style={{...ISt,padding:"8px 10px",flex:1}}/>
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <input value={newCli.poblacion} onChange={e=>setNewCli(f=>({...f,poblacion:e.target.value}))}
                      placeholder="Población" style={{...ISt,padding:"8px 10px",flex:1}}/>
                    <input value={newCli.pais} onChange={e=>setNewCli(f=>({...f,pais:e.target.value}))}
                      placeholder="País" style={{...ISt,padding:"8px 10px",flex:1}}/>
                  </div>
                  <textarea value={newCli.notas} onChange={e=>setNewCli(f=>({...f,notas:e.target.value}))}
                    placeholder="Notas (texto libre)" rows={2} style={{...ISt,padding:"8px 10px",resize:"none"}}/>
                  <button onClick={()=>{
                    if(!form.clienteNombre.trim()) return;
                    const cliId="CLI_"+Date.now();
                    const cli={
                      id:cliId,nombre:form.clienteNombre.trim(),NOMBRE:form.clienteNombre.trim().toUpperCase(),
                      contacto:newCli.contacto,tel:newCli.tel,email:newCli.email,
                      poblacion:newCli.poblacion,pais:newCli.pais||"España",notas:newCli.notas,
                      activo:true,creadoEn:new Date().toLocaleDateString("es-ES"),origen:"crm_informe",
                    };
                    fbEscribir("clientes",cliId,cli);
                    setShowNewCli(false);
                    setNewCli({nombre:"",contacto:"",tel:"",email:"",poblacion:"",pais:"España",notas:""});
                  }}
                    style={{width:"100%",padding:"10px",borderRadius:8,border:"none",
                      background:T.green,color:"#fff",fontSize:12,fontWeight:800,cursor:"pointer",marginTop:4}}>
                    ✅ Guardar cliente
                  </button>
                </div>
              </div>
            )}
            {showCli&&qCli.length>=2&&cliResults.length>0&&(
              <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,zIndex:50,
                background:"#fff",border:`1.5px solid ${T.blue}`,borderRadius:10,
                boxShadow:"0 4px 16px rgba(0,0,0,.1)",maxHeight:180,overflowY:"auto"}}>
                {cliResults.map(c=>(
                  <button key={c.id} onClick={()=>{setForm(f=>({...f,clienteNombre:c.nombre}));setQCli("");setShowCli(false);}}
                    style={{width:"100%",padding:"10px 14px",border:"none",borderBottom:`1px solid ${T.border}`,background:"transparent",cursor:"pointer",textAlign:"left"}}>
                    <p style={{margin:0,fontSize:13,fontWeight:600}}>{c.nombre}</p>
                    {c.dir&&<p style={{margin:0,fontSize:10,color:T.muted}}>📍 {c.dir}</p>}
                  </button>
                ))}
              </div>
            )}
          </div>

          {/* Observaciones */}
          <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Observaciones</p>
          <textarea value={form.obs} onChange={e=>setForm(f=>({...f,obs:e.target.value}))} rows={2}
            placeholder="Reacción del cliente, condiciones, próximos pasos…"
            style={{...ISt,resize:"none",lineHeight:1.5,marginBottom:12,fontFamily:"inherit"}}/>

          <div style={{display:"flex",gap:8}}>
            <Btn small outline color={T.muted} onClick={()=>{setShow(false);setEditId(null);setShowProd(false);setShowCli(false);}}>Cancelar</Btn>
            <Btn small full color={T.blue} onClick={guardar} disabled={!form.prodNombre||!form.clienteNombre}>
              {editId?"✓ Guardar cambios":"✓ Añadir"}
            </Btn>
          </div>
        </div>
      )}

      <button onClick={openNueva}
        style={{width:"100%",padding:"13px",borderRadius:12,border:`2px dashed ${T.blue}`,
          background:T.blueL,color:T.blue,fontWeight:700,fontSize:13,cursor:"pointer",marginBottom:16}}>
        + Añadir muestra entregada
      </button>
      <div style={{display:"flex",gap:8}}>
        <Btn onClick={onBack} outline color={T.muted}>← Atrás</Btn>
        <Btn full onClick={onNext} color={color}>Ver resumen →</Btn>
      </div>
    </div>
  );
}

// ─── PASO RECUPERACIÓN DE CLIENTES ──────────────────────────────
function RecuperacionStep({estrategias,onBack,onNext,color,uid,todosClientes}){
  const [tipo,setTipo]=useState(null);
  const [acciones,setAcciones]=useState([]);
  const [editId,setEditId]=useState(null);
  const [clienteNombre,setClienteNombre]=useState("");
  const [qCli,setQCli]=useState("");
  const [showCli,setShowCli]=useState(false);
  const [resultado,setResultado]=useState("");
  const [nota,setNota]=useState("");
  const [ofertas,setOfertas]=useState([]);
  const [qProd,setQProd]=useState("");
  const [showProd,setShowProd]=useState(false);
  const [formOf,setFormOf]=useState({codigo:"",nombre:"",precioBase:"",dto:"",nota:""});

  const cliResults=useMemo(()=>{
    if(qCli.length<2) return [];
    const q=qCli.toLowerCase();
    return (todosClientes||[]).filter(c=>c.nombre.toLowerCase().includes(q)).slice(0,12);
  },[qCli,todosClientes]);

  const prodResults=useMemo(()=>{
    if(qProd.length<2) return [];
    const q=qProd.toLowerCase();
    return PRODUCTOS_LOCAL.filter(p=>(p.codigo||"").toLowerCase().includes(q)||(p.nombre||"").toLowerCase().includes(q)).slice(0,20);
  },[qProd]);

  const precioFinal=useMemo(()=>{
    if(!formOf.precioBase) return "";
    const base=parseFloat(formOf.precioBase.replace(",","."));
    if(isNaN(base)) return "";
    if(formOf.dto){const dto=parseFloat(formOf.dto);return isNaN(dto)?base.toFixed(2):(base*(1-dto/100)).toFixed(2);}
    return base.toFixed(2);
  },[formOf.precioBase,formOf.dto]);

  const RESULTADO_OPS=[
    {k:"contactado", label:"📞 Contactado",      color:T.blue},
    {k:"visita",     label:"👋 Visita realizada", color:T.amber},
    {k:"pedido",     label:"✅ ¡Ha pedido!",      color:T.green},
    {k:"sin_avance", label:"⏸ Sin avance",       color:T.muted},
  ];

  const resetForm=()=>{
    setTipo(null);setEditId(null);setClienteNombre("");setQCli("");setShowCli(false);
    setResultado("");setNota("");setOfertas([]);
    setFormOf({codigo:"",nombre:"",precioBase:"",dto:"",nota:""});setQProd("");setShowProd(false);
  };

  const addOferta=()=>{
    if(!formOf.nombre.trim()) return;
    setOfertas(p=>[...p,{...formOf,precioFinal,id:`of${Date.now()}`}]);
    setFormOf({codigo:"",nombre:"",precioBase:"",dto:"",nota:""});
    setQProd(""); setShowProd(false);
  };

  const guardar=()=>{
    if(!clienteNombre.trim()) return;
    const acc={
      id:editId||`acc${Date.now()}`,
      tipo,clienteNombre:clienteNombre.trim(),
      resultado,nota,ofertas,semana:14,agente:uid,
    };
    if(editId) setAcciones(a=>a.map(x=>x.id===editId?acc:x));
    else setAcciones(a=>[...a,acc]);
    resetForm();
  };

  const ISt={width:"100%",border:`1.5px solid ${T.border}`,borderRadius:10,
    padding:"11px 12px",fontSize:13,outline:"none",boxSizing:"border-box"};

  // ── Formulario ────────────────────────────────────────────────────
  if(tipo){
    const ac=tipo==="nuevo"?T.green:T.blue;
    const ai=tipo==="nuevo"?"🌱":"🔄";
    return(
      <div>
        <BackBar label="Recuperación" onBack={resetForm}/>
        <p style={{margin:"0 0 20px",fontSize:16,fontWeight:800,color:T.text}}>
          {ai} {editId?"Editar":"Nueva"} — {tipo==="nuevo"?"Cliente nuevo":"Recuperar cliente"}
        </p>

        {/* Cliente con autocomplete */}
        <div style={{marginBottom:14,position:"relative"}}>
          <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Cliente *</p>
          <input value={clienteNombre}
            onChange={e=>{setClienteNombre(e.target.value);setQCli(e.target.value);setShowCli(true);}}
            onFocus={()=>setShowCli(true)}
            placeholder="Busca o escribe el nombre del cliente…" style={ISt}/>
          {showCli&&qCli.length>=2&&cliResults.length>0&&(
            <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,zIndex:50,
              background:"#fff",border:`1.5px solid ${ac}`,borderRadius:10,
              boxShadow:"0 4px 16px rgba(0,0,0,.1)",maxHeight:180,overflowY:"auto"}}>
              {cliResults.map(c=>(
                <button key={c.id} onClick={()=>{setClienteNombre(c.nombre);setQCli("");setShowCli(false);}}
                  style={{width:"100%",padding:"10px 14px",border:"none",
                    borderBottom:`1px solid ${T.border}`,background:"transparent",
                    cursor:"pointer",textAlign:"left"}}>
                  <p style={{margin:0,fontSize:13,fontWeight:600,color:T.text}}>{c.nombre}</p>
                  {c.dir&&<p style={{margin:0,fontSize:10,color:T.muted}}>📍 {c.dir}</p>}
                </button>
              ))}
            </div>
          )}
        </div>

        {/* Resultado — solo al editar una acción existente */}
        {editId&&(<>
          <p style={{margin:"0 0 8px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Resultado final</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
            {RESULTADO_OPS.map(r=>(
              <button key={r.k} onClick={()=>setResultado(r.k)}
                style={{padding:"8px 12px",borderRadius:9,cursor:"pointer",fontSize:12,
                  border:`2px solid ${resultado===r.k?r.color:T.border}`,
                  background:resultado===r.k?r.color+"15":"transparent",
                  color:resultado===r.k?r.color:T.muted,
                  fontWeight:resultado===r.k?700:400}}>
                {r.label}
              </button>
            ))}
          </div>
        </>)}

        {/* Nota */}
        <div style={{marginBottom:18}}>
          <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Nota / comentario</p>
          <textarea value={nota} onChange={e=>setNota(e.target.value)} rows={2}
            placeholder="Qué se habló, interés del cliente, próximos pasos…"
            style={{...ISt,resize:"none",lineHeight:1.5,fontFamily:"inherit"}}/>
        </div>

        {/* ── OFERTAS DE PRODUCTO ── */}
        <div style={{marginBottom:20}}>
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:10}}>
            <p style={{margin:0,fontSize:12,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>🏷️ Ofertas de precio</p>
            {ofertas.length>0&&<span style={{background:ac,color:"#fff",borderRadius:99,
              fontSize:10,fontWeight:800,padding:"2px 8px"}}>{ofertas.length}</span>}
          </div>

          {/* Ofertas añadidas */}
          {ofertas.map(o=>(
            <div key={o.id} style={{background:"#FFF",border:`1px solid ${T.border}`,
              borderLeft:`3px solid ${ac}`,
              borderRadius:11,padding:"11px 14px",marginBottom:8,display:"flex",gap:10,alignItems:"center"}}>
              <div style={{flex:1}}>
                {o.codigo&&<p style={{margin:0,fontSize:10,fontFamily:"monospace",color:ac,fontWeight:700}}>{o.codigo}</p>}
                <p style={{margin:0,fontSize:13,fontWeight:700}}>{o.nombre}</p>
                <div style={{display:"flex",gap:8,marginTop:3,alignItems:"center",flexWrap:"wrap"}}>
                  {o.precioBase&&<span style={{fontSize:12,color:T.muted,
                    textDecoration:o.dto?"line-through":"none"}}>{o.precioBase}€/kg</span>}

            </div>
          ))}

                          overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.nombre}</p>

                      </div>
                      {p.precio&&<span style={{fontSize:12,fontWeight:700,color:T.green,flexShrink:0}}>{p.precio}€/kg</span>}
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* Precio base + descuento */}
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <div style={{flex:1}}>
                <p style={{margin:"0 0 4px",fontSize:10,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Precio tarifa €/kg</p>

            {/* Precio final calculado */}
            {precioFinal&&(

                  <p style={{margin:0,fontSize:14,fontWeight:800,color:T.green}}>
                    Precio oferta: {precioFinal}€/kg

  // ── Pantalla principal ──────────────────────────────────────────

              · {visita.nota}

        </div>
        <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
          {hist.length>0&&(
            <span style={{fontSize:10,fontWeight:700,color:T.blue,
              background:T.blueL,borderRadius:99,padding:"2px 7px"}}>{hist.length}</span>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:14}}>
            {ops.map(o=>(
              <button key={o.k} onClick={()=>setResultado(o.k)}
                style={{padding:"10px",borderRadius:10,
                  border:`2px solid ${resultado===o.k?o.color:T.border}`,
                  background:resultado===o.k?o.color+"15":"#fff",
                  color:resultado===o.k?o.color:T.text,
                  fontSize:12,fontWeight:resultado===o.k?700:400,cursor:"pointer",textAlign:"center"}}>
                {o.label}

            ))}
          </div>

          {/* Nota */}
          <p style={{margin:"0 0 6px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
            Nota / comentario
          </p>
          <textarea value={nota} onChange={e=>setNota(e.target.value)} rows={2}
            placeholder="¿Qué ha pasado? ¿Próximos pasos? ¿Interés en productos?…"
            style={{width:"100%",border:`1.5px solid ${nota?T.blue:T.border}`,borderRadius:10,
              padding:"10px 12px",fontSize:13,resize:"none",outline:"none",
              boxSizing:"border-box",lineHeight:1.5,fontFamily:"inherit",
              marginBottom:10}}/>

          <button onClick={guardar} disabled={!resultado}

              background:resultado?T.navy:"#CBD5E1",color:"#fff",
              fontWeight:700,fontSize:13,cursor:resultado?"pointer":"default"}}>
            {resultado?"✓ Guardar visita":"Selecciona el resultado primero"}
          </button>

          {/* Histórico de visitas anteriores */}
          {hist.length>0&&(
            <div style={{marginTop:14,paddingTop:14,borderTop:`1px solid ${T.border}`}}>
              <p style={{margin:"0 0 8px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
                🕐 Historial ({hist.length} visita{hist.length!==1?"s":""})
              </p>
              {hist.map((h,i)=>{
                const hop=ops.find(o=>o.k===h.resultado);
                return(
                  <div key={i} style={{display:"flex",gap:10,marginBottom:8,alignItems:"flex-start"}}>
                    <div style={{width:28,height:28,borderRadius:8,background:hop?hop.color+"15":T.bg,
