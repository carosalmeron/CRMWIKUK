                      {o.precioBase&&<span> · Tarifa: {o.precioBase}€</span>}
                      {o.dto&&<span style={{color:T.red}}> · -{o.dto}%</span>}
                      {o.precioFinal&&<span style={{color:T.green,fontWeight:700}}> → {o.precioFinal}€</span>}
                    </div>
                  ))}
                </div>
              )}

              {/* Cadena de aprobación visual */}
              {(sel.cadenaAprobacion||[]).length>0&&(
                <div style={{marginBottom:10,padding:"8px 10px",background:"#F8FAFC",borderRadius:8}}>
                  <p style={{margin:"0 0 4px",fontSize:10,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Cadena de aprobación</p>
                  <p style={{margin:0,fontSize:11,color:T.text}}>
                    {(sel.cadenaAprobacion||[]).map(c=>
                      c.estado==="aprobado"?"✅ "+c.nombre
                      :c.estado==="escalado"?"📤 "+c.nombre
                      :c.estado==="pendiente_final"?"🔄 "+c.nombre+" (OK final)"
                      :c.id===usuario.id?"👉 "+c.nombre
                      :"⏳ "+c.nombre
                    ).join(" → ")} → 🧑‍💼 {sel.agenteNombre}
                  </p>
                </div>
              )}

              {(()=>{
                const dto=sel.maxDescuento||0;
                const miLimite=usuario.rol==="ceo"?100:usuario.rol==="director"?15:usuario.rol==="jefe"?10:10;
                // Si es pendiente_final (vuelve del superior), siempre puede aprobar
                const esFinalOK=(sel.cadenaAprobacion||[]).some(c=>c.id===usuario.id&&c.estado==="pendiente_final");
                const puedeAprobar=esFinalOK||dto<=miLimite;
                const jefeVentas=USUARIOS.find(u=>u.rol==="director");
                const ceoUser=USUARIOS.find(u=>u.rol==="ceo");
                const superiorId=miLimite<=10?jefeVentas?.id:ceoUser?.id;
                const superiorNombre=miLimite<=10?"Jefe de Ventas ("+jefeVentas?.nombre+")":"CEO ("+ceoUser?.nombre+")";

                return(
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {/* Aprobar (si tiene nivel suficiente) */}
                  {puedeAprobar&&(
                    <button onClick={()=>{
                      const cadena=[...(sel.cadenaAprobacion||[])];
                      const idx=cadena.findIndex(c=>c.id===usuario.id&&(c.estado==="pendiente"||c.estado==="pendiente_final"||c.estado==="escalado"));
                      if(idx>=0) cadena[idx]={...cadena[idx],estado:"aprobado",fecha:new Date().toLocaleDateString("es-ES")};
                      
                      // Si soy superior (CEO/Jefe Ventas) y el Responsable había escalado,
                      // el Responsable necesita dar último OK antes de que llegue al comercial
                      const responsableEnCadena=cadena.find(c=>c.rol==="responsable");
                      let siguiente;
                      if(responsableEnCadena && responsableEnCadena.estado==="escalado" && usuario.rol!=="jefe"){
                        // Volver al Responsable para último OK
                        responsableEnCadena.estado="pendiente_final";
                        siguiente=responsableEnCadena;
                      } else {
                        siguiente=cadena.find(c=>c.estado==="pendiente"||c.estado==="pendiente_final");
                      }
                      
                      let nuevoEstado,nuevoPendienteDe,nuevoPendienteDeNombre;
                      if(siguiente){
                        nuevoEstado="pendiente_aprobacion";nuevoPendienteDe=siguiente.id;nuevoPendienteDeNombre=siguiente.nombre;
                      } else {
                        nuevoEstado="en_curso";nuevoPendienteDe=null;nuevoPendienteDeNombre=null;
                      }
                      const updated={...sel,estado:nuevoEstado,pendienteDe:nuevoPendienteDe,pendienteDeNombre:nuevoPendienteDeNombre,
                        cadenaAprobacion:cadena,
                        historialEscalado:[...(sel.historialEscalado||[]),{
                          accion:`✅ Aprobado por ${usuario.nombre} (${usuario.rol}) — dto. ${dto}%`,
                          por:usuario.nombre,fecha:new Date().toLocaleDateString("es-ES"),nota:`Descuento ${dto}% aprobado`
                        }]};
                      setEstrategias(prev=>prev.map(e=>e.id===sel.id?updated:e));
                      fbEscribir("estrategias",sel.id,updated);
                      setSel(updated);
                      if(siguiente){
                        despacharNotificacion({tipo:"estrategia",
                          titulo:siguiente.estado==="pendiente_final"
                            ?`✅ Dto. aprobado por ${usuario.nombre} — tu OK final: ${sel.cliente}`
                            :`🔐 Tu aprobación: ${sel.cliente} (dto. ${dto}%)`,
                          mensaje:siguiente.estado==="pendiente_final"
                            ?`El descuento de ${dto}% ha sido aprobado por ${usuario.nombre}. Da tu OK final para que llegue al comercial.`
                            :`${usuario.nombre} ha aprobado. Falta tu OK.\nCliente: ${sel.cliente}\nDescuento: ${dto}%`,
                          destinatarioId:siguiente.id,prioridad:"alta",creadoPor:usuario.id});
                      } else {
                        if(sel.agente!==usuario.id) despacharNotificacion({tipo:"estrategia",titulo:`✅ Estrategia aprobada: ${sel.cliente}`,
                          mensaje:`Aprobada. Dto: ${dto}%. Ya puedes ejecutarla.`,
                          destinatarioId:sel.agente,prioridad:"alta",creadoPor:usuario.id});
                        if(sel.creadoPor!==usuario.id && sel.creadoPor!==sel.agente) despacharNotificacion({tipo:"estrategia",titulo:`✅ Tu estrategia aprobada: ${sel.cliente}`,
                          mensaje:`Cadena completada. ${sel.agenteNombre} puede ejecutar.`,
                          destinatarioId:sel.creadoPor,prioridad:"normal",creadoPor:usuario.id});
                      }
                    }}
                      style={{padding:"12px",borderRadius:10,border:"none",
                        background:T.green,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                      ✅ {esFinalOK?"Dar OK final":"Aprobar descuento"} ({dto}%)
                    </button>
                  )}

                  {/* Escalar (si el descuento excede su nivel) */}
                  {!puedeAprobar&&superiorId&&(
                    <button onClick={()=>{
                      const cadena=[...(sel.cadenaAprobacion||[])];
                      // Marcar este nivel como "escalado"
                      const idx=cadena.findIndex(c=>c.id===usuario.id&&c.estado==="pendiente");
                      if(idx>=0) cadena[idx]={...cadena[idx],estado:"escalado",fecha:new Date().toLocaleDateString("es-ES")};
                      const updated={...sel,pendienteDe:superiorId,pendienteDeNombre:superiorNombre,
                        cadenaAprobacion:cadena,
                        historialEscalado:[...(sel.historialEscalado||[]),{
                          accion:`📤 Escalada a ${superiorNombre} por ${usuario.nombre} (dto. ${dto}% excede mi límite de ${miLimite}%)`,
                          por:usuario.nombre,fecha:new Date().toLocaleDateString("es-ES"),nota:`Descuento ${dto}% requiere aprobación superior`
                        }]};
                      setEstrategias(prev=>prev.map(e=>e.id===sel.id?updated:e));
                      fbEscribir("estrategias",sel.id,updated);

                      despacharNotificacion({tipo:"estrategia",
                        titulo:`📤 Estrategia escalada: ${sel.cliente} (dto. ${dto}%)`,
                        mensaje:`${usuario.nombre} te escala esta estrategia. Dto: ${dto}% (su límite: ${miLimite}%).\nCliente: ${sel.cliente}\nAcción: ${sel.texto}`,
                        destinatarioId:superiorId,prioridad:"alta",creadoPor:usuario.id});
                    }}
                      style={{padding:"12px",borderRadius:10,border:`2px solid ${T.blue}`,
                        background:"#EFF6FF",color:T.blue,fontWeight:700,fontSize:13,cursor:"pointer"}}>
                      📤 Escalar a {superiorNombre} (dto. {dto}% excede mi límite {miLimite}%)
                    </button>
                  )}

                  {/* Rechazar */}
                  <button onClick={()=>{
                    const motivo=prompt("Motivo del rechazo:");
                    if(!motivo) return;
                    const updated={...sel,estado:"rechazada",pendienteDe:null,
                      resolucion:{tipo:"rechazada",por:usuario.nombre,rol:usuario.rol,
                        fecha:new Date().toLocaleDateString("es-ES"),nota:motivo},
                      historialEscalado:[...(sel.historialEscalado||[]),{
                        accion:`❌ Rechazado por ${usuario.nombre}`,
                        por:usuario.nombre,fecha:new Date().toLocaleDateString("es-ES"),nota:motivo
                      }]};
                    setEstrategias(prev=>prev.map(e=>e.id===sel.id?updated:e));
                    fbEscribir("estrategias",sel.id,updated);
                    setSel(updated);
                    if(sel.creadoPor!==usuario.id) despacharNotificacion({tipo:"estrategia",
                      titulo:`❌ Estrategia rechazada: ${sel.cliente}`,
                      mensaje:`${usuario.nombre} ha rechazado. Motivo: ${motivo}`,
                      destinatarioId:sel.creadoPor,prioridad:"normal",creadoPor:usuario.id});
                  }}
                    style={{padding:"12px",borderRadius:10,border:`2px solid ${T.red}`,
                      background:"#FEF2F2",color:T.red,fontWeight:700,fontSize:13,cursor:"pointer"}}>
                    ❌ Rechazar
                  </button>
                </div>);
              })()}
            </div>
          )}

          {/* Estado pendiente (para otros que no son el aprobador) */}
          {sel.estado==="pendiente_aprobacion"&&sel.pendienteDe!==usuario.id&&(
            <div style={{background:"#FEF3C7",borderRadius:14,padding:14,marginBottom:16,
              border:`1.5px solid ${T.amber}`}}>
              <p style={{margin:0,fontSize:13,fontWeight:700,color:T.amber}}>
                ⏳ Pendiente de aprobación: {sel.pendienteDeNombre||"—"}
              </p>
              <p style={{margin:"4px 0 0",fontSize:11,color:T.muted}}>
                Dto. máx: {sel.maxDescuento||0}% · Cadena: {(sel.cadenaAprobacion||[]).map(c=>
                  c.estado==="aprobado"?"✅ "+c.nombre
                  :c.estado==="escalado"?"📤 "+c.nombre
                  :c.estado==="pendiente_final"?"🔄 "+c.nombre
                  :c.estado==="pendiente"?"⏳ "+c.nombre
                  :c.nombre
                ).join(" → ")}
              </p>
            </div>
          )}

          {/* Botones editar / eliminar / calendario */}
          <div style={{display:"flex",gap:8,marginBottom:16}}>
            <button onClick={()=>setEditEst(sel)}
              style={{flex:1,padding:"10px 16px",borderRadius:10,border:`1.5px solid ${T.navy}`,background:"#F1F5F9",
                fontSize:13,fontWeight:700,color:T.navy,cursor:"pointer",display:"flex",gap:6,alignItems:"center",justifyContent:"center"}}>
              ✏️ Editar
            </button>
            <button onClick={()=>{
              const ics=generarICS({
                titulo:`CRM: ${sel.cliente||sel.clienteNombre} — ${sel.objetivo||sel.texto||"Estrategia"}`,
                descripcion:`Estrategia: ${sel.texto||sel.estrategia||""}\nCliente: ${sel.cliente||""}\nObjetivo: ${sel.objetivo||""}`,
                fechaInicio:new Date(Date.now()+86400000), // mañana
                recordatorioMin:60,
                url:"https://crmwikuk.vercel.app"
              });
              descargarICS(ics,`estrategia_${(sel.cliente||"").replace(/\s/g,"_")}.ics`);
            }}
              style={{padding:"10px 16px",borderRadius:10,border:`1.5px solid ${T.blue}`,background:"#EFF6FF",
                color:T.blue,fontSize:13,fontWeight:700,cursor:"pointer"}}>
              📅 Calendario
            </button>
            <button onClick={()=>{
              if(!confirm("¿Eliminar esta estrategia?")) return;
              setEstrategias(prev=>prev.filter(e=>e.id!==sel.id));
              fbEscribir("estrategias",sel.id,{...sel,eliminada:true,eliminadoPor:usuario.id,fechaEliminacion:new Date().toISOString()});
              setSel(null);
            }}
              style={{padding:"10px 16px",borderRadius:10,border:`1.5px solid ${T.red}`,background:"#FEF2F2",
                color:T.red,fontSize:13,fontWeight:700,cursor:"pointer"}}>
              🗑️
            </button>
          </div>
          {/* Estado visual grande */}
          {res&&(
            <div style={{borderRadius:16,padding:"16px",marginBottom:16,
              background:res.tipo==="aprobada"?T.greenL:res.tipo==="rechazada"?"#FEF2F2":T.amberL,
              border:`2px solid ${res.tipo==="aprobada"?T.green:res.tipo==="rechazada"?T.red:T.amber}`}}>
              <p style={{margin:"0 0 4px",fontSize:20,fontWeight:900,
                color:res.tipo==="aprobada"?T.green:res.tipo==="rechazada"?T.red:T.amber}}>
                {res.tipo==="aprobada"?"✅ Aprobada":res.tipo==="rechazada"?"❌ Rechazada":"⚡ Aprobada parcialmente"}
              </p>
              <p style={{margin:"0 0 8px",fontSize:13,color:T.text}}>
                Por <strong>{res.por}</strong> · {res.fecha}
                {res.nota&&<span> — "{res.nota}"</span>}
              </p>
              {/* Resolución por producto */}
              {(sel.ofertas||[]).length>0&&(
                <div style={{borderTop:`1px solid ${res.tipo==="aprobada"?T.green+"44":T.amber+"44"}`,paddingTop:10,marginTop:8}}>
                  {sel.ofertas.map((o,i)=>(
                    <div key={i} style={{display:"flex",gap:10,alignItems:"center",
                      padding:"8px 0",borderBottom:i<sel.ofertas.length-1?`1px solid ${T.border}`:"none"}}>
                      <span style={{fontSize:18,flexShrink:0}}>
                        {o.aprobada===true?"✅":o.aprobada===false?"❌":o.elevadaA?"⏳":"—"}
                      </span>
                      <div style={{flex:1,minWidth:0}}>
                        <p style={{margin:0,fontSize:13,fontWeight:600,
                          overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{o.nombre}</p>
                        {o.aprobada===true&&(
                          <p style={{margin:0,fontSize:12,color:T.green,fontWeight:700}}>
                            {o.modificada?"Precio modificado: ":"Precio aprobado: "}
                            <strong>{o.precioFinal}€/kg</strong>
                            {o.modificada&&o.precioOriginal&&
                              <span style={{color:T.muted,textDecoration:"line-through",marginLeft:6}}>{o.precioOriginal}€</span>}
                          </p>
                        )}
                        {o.aprobada===false&&<p style={{margin:0,fontSize:12,color:T.red}}>No autorizado</p>}
                        {o.elevadaA&&<p style={{margin:0,fontSize:12,color:T.purple}}>Pendiente decisión superior</p>}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* Tarjeta de aprobación si me toca decidir */}
          {esJefe&&escaladoAMi&&sel.estado==="pendiente_aprobacion"&&(
            <EstrategiaAprobacionCard e={sel} usuario={usuario}
              onConfirmar={(e,of,n)=>{confirmarEstrategia(e,of,n);setSel(null);}}
              onRechazar={(e,m)=>{rechazar(e,m);setSel(null);}}
              onEscalar={(e,d,n)=>{escalarEstrategia(e,d,n);setSel(null);}}/>
          )}

          {/* Info básica */}
          {!res&&!(esJefe&&escaladoAMi&&sel.estado==="pendiente_aprobacion")&&(
            <Card style={{marginBottom:12}}>
              <p style={{margin:"0 0 6px",fontSize:17,fontWeight:800}}>{sel.cliente||sel.clienteNombre}</p>
              <p style={{margin:"0 0 6px",fontSize:13,color:T.muted}}>{sel.texto||sel.estrategia}</p>
              {sel.objetivo&&<p style={{margin:0,fontSize:12,color:T.text}}>🎯 {sel.objetivo}</p>}
              {(sel.ofertas||[]).length>0&&(
                <div style={{marginTop:10,borderTop:`1px solid ${T.border}`,paddingTop:10}}>
                  <p style={{margin:"0 0 6px",fontSize:10,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Productos solicitados</p>
                  {sel.ofertas.map((o,i)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",
                      borderBottom:i<sel.ofertas.length-1?`1px solid ${T.border}`:"none"}}>
                      <span style={{fontSize:12}}>{o.nombre}</span>
                      <span style={{fontSize:12,fontWeight:700,color:T.green}}>
                        {o.precioFinal}€/kg <span style={{color:T.red,fontWeight:600}}>-{o.dto}%</span>
                      </span>
                    </div>
                  ))}
                </div>
              )}
            </Card>
          )}

          {/* Historial de escalado */}
          {(sel.historialEscalado||[]).length>0&&(
            <Card>
              <p style={{margin:"0 0 10px",fontSize:12,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>🕐 Historial</p>
              {[...(sel.historialEscalado||[])].reverse().map((h,i)=>(
                <div key={i} style={{display:"flex",gap:10,paddingBottom:8,marginBottom:8,
                  borderBottom:i<sel.historialEscalado.length-1?`1px solid ${T.border}`:"none"}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:T.navy,flexShrink:0,marginTop:4}}/>
                  <div>
                    <p style={{margin:"0 0 1px",fontSize:12,fontWeight:700}}>{h.accion}</p>
                    {h.nota&&<p style={{margin:"0 0 2px",fontSize:11,color:T.text}}>{h.nota}</p>}
                    <p style={{margin:0,fontSize:10,color:T.muted}}>{h.por} · {h.fecha}</p>
                  </div>
                </div>
              ))}
            </Card>
          )}
        </div>
      </div>
    );
  }

  // ── LISTA PRINCIPAL ───────────────────────────────────────────────
  const Bloque=({titulo,items,colorTitulo=T.muted,renderItem})=>(
    items.length===0?null:(
      <div style={{marginBottom:24}}>
        <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:colorTitulo,textTransform:"uppercase",letterSpacing:".06em"}}>
          {titulo} ({items.length})
        </p>
        {items.map(renderItem)}
      </div>
    )
  );

  const CardEst=({e,onClick,children})=>{
    const ag=USUARIOS.find(u=>u.id===e.agente);
    return(
      <div onClick={onClick} style={{background:"#fff",borderRadius:14,padding:"14px 16px",
        marginBottom:8,cursor:"pointer",border:`1px solid ${T.border}`,
        boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}>
        <div style={{display:"flex",gap:8,marginBottom:6,flexWrap:"wrap"}}>
          {esJefe&&ag&&<Badge label={ag.nombre} color={ag.color}/>}
          {children}
        </div>
        <p style={{margin:"0 0 2px",fontSize:14,fontWeight:800}}>{e.cliente||e.clienteNombre}</p>
        <p style={{margin:0,fontSize:12,color:T.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
          {e.texto||e.estrategia}
        </p>
      </div>
    );
  };

  return(
    <div style={{padding:"16px 16px 100px"}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div>
          <p style={{margin:0,fontSize:22,fontWeight:900,color:T.text}}>🎯 Estrategias</p>
          <p style={{margin:"2px 0 0",fontSize:12,color:T.muted}}>
            {esAgente?"Mis recuperaciones":esRolJefe?`Equipo ${miEquipo}`:esRolDir?"Dirección":"CEO"}
            <span style={{marginLeft:6,fontSize:10,color:T.blue}}>· {estrategias.length} total · {activasAgente.length+misMostrar.length} activas</span>
          </p>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setShowNuevaEst(v=>!v)}
            style={{background:showNuevaEst?"#E2E8F0":T.navy,color:showNuevaEst?T.muted:"#fff",
              border:"none",borderRadius:9,padding:"9px 14px",fontSize:13,fontWeight:700,cursor:"pointer"}}>
            {showNuevaEst?"× Cancelar":"+ Nueva"}
          </button>
          <button onClick={recargar} disabled={cargando}
            style={{background:"#fff",border:`1px solid ${T.border}`,borderRadius:9,
              padding:"9px 14px",cursor:cargando?"default":"pointer",color:T.muted,fontSize:13}}>
            {cargando?"⏳":"🔄"}
          </button>
        </div>
      </div>

      {/* Formulario nueva estrategia */}
      {showNuevaEst&&(
        <div style={{background:"#fff",borderRadius:14,padding:16,marginBottom:16,border:"1.5px solid "+T.amber}}>
          <p style={{margin:"0 0 12px",fontSize:16,fontWeight:800,color:T.text}}>🎯 Nueva estrategia</p>

          <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Cliente *</p>
          <SearchInput value={formEst.cliente}
            onChange={v=>setFormEst(f=>({...f,cliente:v}))}
            placeholder="🔍 Buscar cliente..."
            suggestions={(window._clientesFB||[])
              .filter(c=>(c.nombre||c.NOMBRE||"").toLowerCase().includes(formEst.cliente.toLowerCase())&&formEst.cliente.length>=2)
              .slice(0,8).map(c=>({label:c.nombre||c.NOMBRE,sub:c.id,tipo:"cliente"}))}
            onSelect={s=>setFormEst(f=>({...f,cliente:s.label}))}
            style={{marginBottom:10}}/>

          <p style={{margin:"0 0 6px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Tipo</p>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            {[{k:"recuperacion",icon:"🔄",label:"Recuperar cliente"},{k:"nuevo",icon:"🌱",label:"Cliente nuevo"}].map(t=>(
              <button key={t.k} onClick={()=>setFormEst(f=>({...f,tipo:t.k}))}
                style={{flex:1,padding:"10px",borderRadius:10,cursor:"pointer",fontSize:12,
                  border:`2px solid ${(formEst.tipo||"recuperacion")===t.k?T.amber:T.border}`,
                  background:(formEst.tipo||"recuperacion")===t.k?T.amberL:"#fff",
                  color:(formEst.tipo||"recuperacion")===t.k?T.amber:T.muted,
                  fontWeight:(formEst.tipo||"recuperacion")===t.k?700:400}}>
                {t.icon} {t.label}
              </button>
            ))}
          </div>

          <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Acción propuesta *</p>
          <textarea value={formEst.texto} onChange={e=>setFormEst(f=>({...f,texto:e.target.value}))} rows={2}
            placeholder="Muestra + visita personalizada, descuento especial…"
            style={{width:"100%",border:`1.5px solid ${T.border}`,borderRadius:9,padding:"10px 12px",
              fontSize:13,outline:"none",boxSizing:"border-box",resize:"none",fontFamily:"inherit",marginBottom:10}}/>

          <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Objetivo</p>
          <input value={formEst.objetivo||""} onChange={e=>setFormEst(f=>({...f,objetivo:e.target.value}))}
            placeholder="Recuperar pedido mensual, reactivar cuenta…"
            style={{width:"100%",border:`1.5px solid ${T.border}`,borderRadius:9,padding:"10px 12px",
              fontSize:13,outline:"none",boxSizing:"border-box",fontFamily:"inherit",marginBottom:14}}/>

          <p style={{margin:"0 0 8px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>🏷️ Productos con precio oferta</p>
          {(formEst.ofertas||[]).map((o,i)=>(
            <div key={i} style={{background:"#FFFBEB",borderRadius:10,padding:"10px 12px",marginBottom:6,
              border:`1px solid ${T.border}`,borderLeft:`3px solid ${T.amber}`,display:"flex",gap:10,alignItems:"center"}}>
              <div style={{flex:1,minWidth:0}}>
                {o.codigo&&<p style={{margin:0,fontSize:10,fontFamily:"monospace",color:T.amber,fontWeight:700}}>{o.codigo}</p>}
                <p style={{margin:0,fontSize:13,fontWeight:700}}>{o.nombre}</p>
                <div style={{display:"flex",gap:6,marginTop:2}}>
                  {o.precioBase&&<span style={{fontSize:11,color:T.muted,textDecoration:o.dto?"line-through":"none"}}>{o.precioBase}€/kg</span>}
                  {o.dto&&<span style={{fontSize:11,fontWeight:700,color:T.red}}>-{o.dto}%</span>}
                  {o.precioFinal&&<span style={{fontSize:12,fontWeight:800,color:T.green}}>{o.precioFinal}€/kg</span>}
                </div>
              </div>
              <button onClick={()=>setFormEst(f=>({...f,ofertas:(f.ofertas||[]).filter((_,j)=>j!==i)}))}
                style={{background:"none",border:"none",cursor:"pointer",color:T.red,fontSize:18}}>🗑</button>
            </div>
          ))}

          {(()=>{
            const of=formEst.ofActual||{nombre:"",codigo:"",precioBase:"",dto:""};
            const base=parseFloat((of.precioBase||"").replace(",","."));
            const dto=parseFloat(of.dto||"0");
            const pFinal=(!isNaN(base)&&base>0)?(base*(1-dto/100)).toFixed(2):"";
            return(
            <div style={{background:T.bg,borderRadius:10,padding:12,border:`1.5px dashed ${T.amber}66`,marginBottom:14}}>
              <SearchInput value={of.nombre}
                onChange={v=>setFormEst(f=>({...f,ofActual:{...(f.ofActual||{}),nombre:v,codigo:"",precioBase:""}}))}
                placeholder="🔍 Buscar producto..."
                suggestions={PRODUCTOS_LOCAL
                  .filter(p=>of.nombre.length>=2&&((p.nombre||"").toLowerCase().includes(of.nombre.toLowerCase())||(p.codigo||"").toLowerCase().includes(of.nombre.toLowerCase())))
                  .slice(0,8).map(p=>({label:p.nombre,sub:p.codigo+" · "+p.precio+"€/kg",tipo:"producto",obj:p}))}
                onSelect={s=>setFormEst(f=>({...f,ofActual:{...(f.ofActual||{}),nombre:s.label,codigo:s.obj.codigo,precioBase:s.obj.precio}}))}
                style={{marginBottom:8}}/>
              {of.codigo&&<p style={{margin:"0 0 6px",fontSize:10,color:T.amber,fontWeight:700,fontFamily:"monospace"}}>{of.codigo}</p>}
              <div style={{display:"flex",gap:8,marginBottom:8}}>
                <div style={{flex:1}}>
                  <p style={{margin:"0 0 3px",fontSize:10,fontWeight:700,color:T.muted}}>Precio tarifa €/kg</p>
                  <input value={of.precioBase||""} onChange={e=>setFormEst(f=>({...f,ofActual:{...(f.ofActual||{}),precioBase:e.target.value}}))}
                    placeholder="0,00" style={{width:"100%",border:`1.5px solid ${T.border}`,borderRadius:8,padding:"8px 10px",fontSize:13,outline:"none",boxSizing:"border-box"}}/>
                </div>
                <div style={{flex:1}}>
                  <p style={{margin:"0 0 3px",fontSize:10,fontWeight:700,color:T.muted}}>Dto. %</p>
                  <input type="number" value={of.dto||""} onChange={e=>setFormEst(f=>({...f,ofActual:{...(f.ofActual||{}),dto:e.target.value}}))}
                    placeholder="0" style={{width:"100%",border:`1.5px solid ${T.border}`,borderRadius:8,padding:"8px 10px",fontSize:13,outline:"none",boxSizing:"border-box"}}/>
                </div>
              </div>
              {pFinal&&<div style={{background:T.greenL,borderRadius:8,padding:"8px 12px",marginBottom:8}}>
                <p style={{margin:0,fontSize:13,fontWeight:800,color:T.green}}>Precio oferta: {pFinal}€/kg</p>
              </div>}
              <button onClick={()=>{
                if(!of.nombre.trim()) return;
                setFormEst(f=>({...f,
                  ofertas:[...(f.ofertas||[]),{...of,precioFinal:pFinal,id:"of"+Date.now()}],
                  ofActual:{nombre:"",codigo:"",precioBase:"",dto:""}}));
              }}
                style={{width:"100%",padding:"9px",borderRadius:8,border:"none",
                  background:of.nombre.trim()?T.amber:"#CBD5E1",color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"}}>
                + Añadir producto con oferta
              </button>
            </div>);
          })()}

          {/* Indicador de nivel de aprobación por descuento */}
          {(()=>{
            const maxDto=(formEst.ofertas||[]).reduce((m,o)=>Math.max(m,parseFloat(o.dto)||0),0);
            if(maxDto<=0) return null;
            const nivel=maxDto>15?"CEO":maxDto>10?"Jefe de Ventas":"Responsable";
            const color=maxDto>15?T.red:maxDto>10?T.amber:T.green;
            return(
              <div style={{background:color+"12",borderRadius:10,padding:"10px 14px",marginBottom:14,
                border:`1.5px solid ${color}`,display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:18}}>{maxDto>15?"🔴":maxDto>10?"🟡":"🟢"}</span>
                <div>
                  <p style={{margin:0,fontSize:12,fontWeight:700,color}}>Dto. máx: {maxDto}% → Aprobación: {nivel}</p>
                  <p style={{margin:"2px 0 0",fontSize:10,color:T.muted}}>
                    {maxDto>15?"CEO → Jefe Ventas → Responsable → Comercial"
                      :maxDto>10?"Jefe Ventas → Responsable → Comercial"
                      :"Responsable → Comercial"}
                  </p>
                </div>
              </div>
            );
          })()}

          {/* Selector de agente (para jefe/director) */}
          {(esJefe||esRolDir||esRolCeo)&&(
            <div style={{marginBottom:12}}>
              <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Asignar a comercial</p>
              <select value={formEst.agenteAsignado||""} onChange={e=>setFormEst(f=>({...f,agenteAsignado:e.target.value}))}
                style={{width:"100%",padding:"10px 12px",borderRadius:9,border:`1.5px solid ${T.border}`,fontSize:13,outline:"none",background:"#fff"}}>
                <option value="">— Yo mismo —</option>
                {USUARIOS.filter(u=>u.rol==="agente"&&(esRolDir||esRolCeo||u.equipo===miEquipo)).map(u=>(
                  <option key={u.id} value={u.id}>{u.nombre} · {u.equipo}</option>
                ))}
              </select>
            </div>
          )}

          <button onClick={()=>{
            if(!formEst.cliente.trim()||!formEst.texto.trim()) return;
            const hoy=new Date().toLocaleDateString("es-ES");
            const d=new Date();const s=new Date(d.getFullYear(),0,1);
            const sem=Math.ceil(((d-s)/86400000+s.getDay()+1)/7);

            // Calcular descuento máximo de las ofertas
            const maxDto=(formEst.ofertas||[]).reduce((m,o)=>Math.max(m,parseFloat(o.dto)||0),0);

            // Determinar quién debe aprobar según descuento
            // ≤10% → Responsable | 11-15% → Jefe Ventas | >15% → CEO
            const agenteDestino=formEst.agenteAsignado||usuario.id;
            const agenteUser=USUARIOS.find(u=>u.id===agenteDestino);
            const equipoAgente=agenteUser?.equipo||usuario.equipo||"";
            const responsable=USUARIOS.find(u=>u.rol==="jefe"&&u.equipo===equipoAgente);
            const jefeVentas=USUARIOS.find(u=>u.rol==="director");
            const ceoUser=USUARIOS.find(u=>u.rol==="ceo");

            let estadoInicial, pendienteDeId, pendienteDeNombre, cadenaAprobacion=[];

            if(usuario.rol==="ceo"||usuario.rol==="director"){
              // CEO/Director crea → va al Responsable para último OK antes de llegar al comercial
              estadoInicial="pendiente_aprobacion";
              pendienteDeId=responsable?.id||agenteDestino;
              pendienteDeNombre=responsable?.nombre||"Responsable";
              cadenaAprobacion=[{rol:"responsable",id:responsable?.id,nombre:responsable?.nombre,estado:"pendiente"}];
            } else if(usuario.rol==="jefe"){
              // Jefe crea → va al Responsable del equipo del agente para OK
              if(responsable&&responsable.id!==usuario.id){
                estadoInicial="pendiente_aprobacion";
                pendienteDeId=responsable.id;
                pendienteDeNombre=responsable.nombre;
                cadenaAprobacion=[{rol:"responsable",id:responsable.id,nombre:responsable.nombre,estado:"pendiente"}];
              } else {
                // El jefe ES el responsable → va directo al comercial
                estadoInicial="en_curso";
                pendienteDeId=null;
                pendienteDeNombre=null;
              }
            } else {
              // Comercial crea → SIEMPRE va al Responsable primero
              // El Responsable decidirá si aprueba (≤10%) o escala a superior
              estadoInicial="pendiente_aprobacion";
              pendienteDeId=responsable?.id||jefeVentas?.id;
              pendienteDeNombre=responsable?.nombre||jefeVentas?.nombre||"Superior";
              cadenaAprobacion=[
                {rol:"responsable",id:responsable?.id,nombre:responsable?.nombre,estado:"pendiente",limiteDto:10},
              ];
              if(maxDto>10){
                cadenaAprobacion.push({rol:"jefe_ventas",id:jefeVentas?.id,nombre:jefeVentas?.nombre,estado:"pendiente",limiteDto:15});
              }
              if(maxDto>15){
                cadenaAprobacion.push({rol:"ceo",id:ceoUser?.id,nombre:ceoUser?.nombre,estado:"pendiente",limiteDto:100});
              }
            }

            const est={id:"est_"+Date.now(),
              cliente:formEst.cliente,clienteNombre:formEst.cliente,
              objetivo:formEst.objetivo,estrategia:formEst.texto,texto:formEst.texto,
              tipo:formEst.tipo||"recuperacion",ofertas:formEst.ofertas||[],
              maxDescuento:maxDto,
              estado:estadoInicial,
              pendienteDe:pendienteDeId,pendienteDeNombre:pendienteDeNombre,
              cadenaAprobacion:cadenaAprobacion,
              agente:agenteDestino,
              agenteNombre:(USUARIOS.find(u=>u.id===agenteDestino)||{}).nombre||usuario.nombre,
              equipo:equipoAgente,
              creadoPor:usuario.id,creadoPorNombre:usuario.nombre,rolCreador:usuario.rol,
              semana:sem,fecha:hoy,seguimientos:[],
              historialEscalado:[{
                accion:"Estrategia creada"+(maxDto>0?" (dto. máx: "+maxDto+"%)":""),
                por:usuario.nombre,fecha:hoy,nota:formEst.texto
              }],
            };
            setEstrategias([...estrategias,est]);
            fbEscribir("estrategias",est.id,est);

            // Notificar
            if(estadoInicial==="pendiente_aprobacion"&&pendienteDeId){
              // Notificar al aprobador
              despacharNotificacion({tipo:"estrategia",
                titulo:`🔐 Aprobación requerida: ${est.cliente} (dto. ${maxDto}%)`,
                mensaje:`${usuario.nombre} ha creado una estrategia que requiere tu aprobación.\nCliente: ${est.cliente}\nDescuento máx: ${maxDto}%\nAcción: ${est.texto}`,
                destinatarioId:pendienteDeId,prioridad:maxDto>15?"alta":"normal",creadoPor:usuario.id});
              console.log(`[EST] Pendiente aprobación de ${pendienteDeNombre} (dto: ${maxDto}%)`);
            } else if(est.agente!==usuario.id){
              // Sin aprobación necesaria → notificar al comercial directo
              notificarAsignacion("estrategia", est, usuario.id);
            }

            setShowNuevaEst(false);
            setFormEst({cliente:"",objetivo:"",texto:"",tipo:"recuperacion",ofertas:[],ofActual:{nombre:"",codigo:"",precioBase:"",dto:""},agenteAsignado:""});
          }}
            disabled={!formEst.cliente.trim()||!formEst.texto.trim()}
            style={{width:"100%",padding:"13px",
              background:formEst.cliente.trim()&&formEst.texto.trim()?T.amber:"#CBD5E1",
              color:"#fff",border:"none",borderRadius:10,fontSize:14,fontWeight:700,cursor:"pointer"}}>
            ✅ Crear estrategia
          </button>
        </div>
      )}

      {/* Filtro de equipo */}
      {esJefe&&<FiltroEquipo value={filtroEquipoEst} onChange={setFiltroEquipoEst} agenteSel={agenteSelEst} onAgenteSel={setAgenteSelEst} items={estrategias.filter(e=>!e.eliminada)} getAgente={e=>e.agente}/>}

      {/* Filtros rápidos */}
      {(()=>{
        const tabs=[
          ...(fEqEst(pendAprobMia).length>0?[{k:"aprobar",l:`🔐 Para aprobar`,n:fEqEst(pendAprobMia).length,c:T.amber}]:[]),
          ...(fEqEst(enRevisionAgente).length>0?[{k:"revision",l:"⏳ En revisión",n:fEqEst(enRevisionAgente).length,c:T.amber}]:[]),
          ...([...fEqEst(activasAgente),...fEqEst(misMostrar)].length>0?[{k:"curso",l:"🔵 En curso",n:[...fEqEst(activasAgente),...fEqEst(misMostrar)].filter((e,i,a)=>a.findIndex(x=>x.id===e.id)===i).length,c:T.blue}]:[]),
          ...(fEqEst(misPendAprobDir).length>0?[{k:"pend_dir",l:"⏳ Pend. aprobación",n:fEqEst(misPendAprobDir).length,c:T.amber}]:[]),
          ...(fEqEst(elevadasPorMi).length>0?[{k:"elevadas",l:"📤 Escaladas",n:fEqEst(elevadasPorMi).length,c:T.purple}]:[]),
          ...(fEqEst(aprobadas).length>0?[{k:"aprobadas",l:"✅ Aprobadas",n:fEqEst(aprobadas).length,c:T.green}]:[]),
          ...(fEqEst(rechazadas).length>0?[{k:"rechazadas",l:"❌ Rechazadas",n:fEqEst(rechazadas).length,c:T.red}]:[]),
          ...(fEqEst(misResueltasDir).length>0?[{k:"resueltas_dir",l:"📋 Resueltas",n:fEqEst(misResueltasDir).length,c:T.green}]:[]),
          {k:"todas",l:"Todas",n:fEqEst(estrategias.filter(e=>!e.eliminada)).length,c:T.navy},
        ];
        if(tabs.length<=1) return null;
        return(
          <div style={{display:"flex",gap:6,marginBottom:20,overflowX:"auto",paddingBottom:4}}>
            {tabs.map(t=>(
              <button key={t.k} onClick={()=>setFiltroSec(f=>f===t.k?"todas":t.k)}
                style={{display:"flex",gap:5,alignItems:"center",padding:"8px 13px",
                  borderRadius:99,flexShrink:0,cursor:"pointer",
                  border:`1.5px solid ${filtroSec===t.k?t.c:T.border}`,
                  background:filtroSec===t.k?t.c+"18":"#fff",
                  color:filtroSec===t.k?t.c:T.muted,
                  fontWeight:filtroSec===t.k?700:400,fontSize:12}}>
                {t.l}
                {t.n!==null&&<span style={{background:filtroSec===t.k?t.c:"#E2E8F0",color:filtroSec===t.k?"#fff":T.muted,
                  borderRadius:99,fontSize:10,fontWeight:800,padding:"1px 7px"}}>{t.n}</span>}
              </button>
            ))}
          </div>
        );
      })()}

      {/* 1. PARA APROBAR — lo más urgente */}
      {(filtroSec==="todas"||filtroSec==="aprobar")&&fEqEst(pendAprobMia).length>0&&(
        <div style={{marginBottom:24}}>
          <p style={{margin:"0 0 10px",fontSize:13,fontWeight:800,color:T.amber}}>
            🔔 Para aprobar ({pendAprobMia.length})
          </p>
          {fEqEst(pendAprobMia).map(e=>(
            <EstrategiaAprobacionCard key={e.id} e={e} usuario={usuario}
              onConfirmar={confirmarEstrategia}
              onRechazar={rechazar}
              onEscalar={escalarEstrategia}/>
          ))}
        </div>
      )}

      {/* 2. AGENTE: en revisión */}
      {(filtroSec==="todas"||filtroSec==="revision")&&Bloque({
        titulo:"⏳ En revisión",colorTitulo:T.amber,
        items:fEqEst(enRevisionAgente),
        renderItem:e=>(
          <CardEst key={e.id} e={e} onClick={()=>setSel(e)}>
            <Badge label={`⏳ Pendiente de ${e.pendienteDeNombre||USUARIOS.find(u=>u.id===e.pendienteDe)?.nombre||"Responsable"}`} color={T.amber}/>
            <span style={{fontSize:10,color:T.muted,marginLeft:"auto"}}>S{e.semana}</span>
          </CardEst>
        )
      })}

      {/* 3. APROBADAS — con precios definitivos */}
      {(filtroSec==="todas"||filtroSec==="aprobadas")&&Bloque({
        titulo:"✅ Aprobadas",colorTitulo:T.green,
        items:fEqEst(aprobadas),
        renderItem:e=>{
          const res=e.resolucion;
          const aP=(e.ofertas||[]).filter(o=>o.aprobada===true).length;
          const rP=(e.ofertas||[]).filter(o=>o.aprobada===false).length;
          return(
            <div key={e.id} onClick={()=>setSel(e)}
              style={{background:"#fff",borderRadius:14,padding:"14px 16px",marginBottom:8,
                cursor:"pointer",border:`2px solid ${T.green}44`,borderLeft:`4px solid ${T.green}`}}>
              <div style={{display:"flex",gap:8,marginBottom:6,flexWrap:"wrap",alignItems:"center"}}>
                <Badge label={res?.tipo==="aprobada_parcial"?"⚡ Aprobada parcialmente":"✅ Aprobada"} color={T.green}/>
                <span style={{fontSize:11,color:T.muted}}>por {res?.por} · {res?.fecha}</span>
              </div>
              <p style={{margin:"0 0 4px",fontSize:14,fontWeight:800}}>{e.cliente||e.clienteNombre}</p>
              <p style={{margin:"0 0 6px",fontSize:12,color:T.muted}}>{e.texto||e.estrategia}</p>
              {(e.ofertas||[]).length>0&&(
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {aP>0&&<span style={{fontSize:10,color:T.green,fontWeight:700,background:T.greenL,borderRadius:99,padding:"2px 8px"}}>✅ {aP} producto{aP>1?"s":""} aprobado{aP>1?"s":""}</span>}
                  {rP>0&&<span style={{fontSize:10,color:T.red,fontWeight:700,background:T.redL,borderRadius:99,padding:"2px 8px"}}>❌ {rP} rechazado{rP>1?"s":""}</span>}
                </div>
              )}
              <p style={{margin:"6px 0 0",fontSize:11,color:T.green,fontWeight:600}}>Ver precios aprobados →</p>
            </div>
          );
        }
      })}

      {/* 4. RECHAZADAS */}
      {(filtroSec==="todas"||filtroSec==="rechazadas")&&Bloque({
        titulo:"❌ Rechazadas",colorTitulo:T.red,
        items:fEqEst(rechazadas),
        renderItem:e=>{
          const res=e.resolucion;
          return(
            <div key={e.id} onClick={()=>setSel(e)}
              style={{background:"#fff",borderRadius:14,padding:"14px 16px",marginBottom:8,
                cursor:"pointer",border:`1px solid ${T.border}`,borderLeft:`4px solid ${T.red}`,opacity:.8}}>
              <div style={{display:"flex",gap:8,marginBottom:6,alignItems:"center"}}>
                <Badge label="❌ Rechazada" color={T.red}/>
                <span style={{fontSize:11,color:T.muted}}>por {res?.por} · {res?.fecha}</span>
              </div>
              <p style={{margin:"0 0 2px",fontSize:14,fontWeight:800}}>{e.cliente||e.clienteNombre}</p>
              {res?.nota&&<p style={{margin:0,fontSize:12,color:T.muted}}>Motivo: {res.nota}</p>}
            </div>
          );
        }
      })}

      {/* 4. ELEVADAS — esperando respuesta del superior */}
      {(filtroSec==="todas"||filtroSec==="elevadas")&&Bloque({
        titulo:"📤 Elevadas — esperando respuesta",colorTitulo:T.purple,
        items:fEqEst(elevadasPorMi),
        renderItem:e=>(
          <CardEst key={e.id} e={e} onClick={()=>setSel(e)}>
            <Badge label={`📤 Escalada a ${e.pendienteDeNombre||USUARIOS.find(u=>u.id===e.pendienteDe)?.nombre||"Superior"}`} color={T.purple}/>
          </CardEst>
        )
      })}

      {/* 5. EN CURSO / ACTIVAS */}
      {(filtroSec==="todas"||filtroSec==="curso")&&Bloque({
        titulo:"🔵 En curso",colorTitulo:T.blue,
        items:[...fEqEst(activasAgente),...fEqEst(misMostrar)].filter((e,i,a)=>a.findIndex(x=>x.id===e.id)===i),
        renderItem:e=>(
          <CardEst key={e.id} e={e} onClick={()=>setSel(e)}>
            <Badge label="🔵 En curso" color={T.blue}/>
            <span style={{fontSize:10,color:T.muted}}>S{e.semana}</span>
          </CardEst>
        )
      })}

      {/* 6. PENDIENTES APROBACIÓN (director) */}
      {(filtroSec==="todas"||filtroSec==="pend_dir")&&fEqEst(misPendAprobDir).length>0&&Bloque({
        titulo:"⏳ Pendientes de aprobación",colorTitulo:T.amber,
        items:fEqEst(misPendAprobDir),
        renderItem:e=>(
          <CardEst key={e.id} e={e} onClick={()=>setSel(e)}>
            <Badge label="⏳ Pendiente" color={T.amber}/>
            {e.agenteNombre&&<span style={{fontSize:10,color:T.muted}}>👤 {e.agenteNombre}</span>}
          </CardEst>
        )
      })}

      {/* 7. RESUELTAS (director) */}
      {(filtroSec==="todas"||filtroSec==="resueltas_dir")&&fEqEst(misResueltasDir).length>0&&Bloque({
        titulo:"📋 Resueltas",colorTitulo:T.green,
        items:fEqEst(misResueltasDir),
        renderItem:e=>(
          <CardEst key={e.id} e={e} onClick={()=>setSel(e)}>
            <Badge label={e.resolucion?.tipo==="aprobada"?"✅ Aprobada":e.resolucion?.tipo==="rechazada"?"❌ Rechazada":"📋 Resuelta"} 
              color={e.resolucion?.tipo==="aprobada"?T.green:e.resolucion?.tipo==="rechazada"?T.red:T.muted}/>
          </CardEst>
        )
      })}

      {/* Estado vacío */}
      {pendAprobMia.length===0&&enRevisionAgente.length===0&&aprobadas.length===0&&rechazadas.length===0&&elevadasPorMi.length===0&&activasAgente.length===0&&misMostrar.length===0&&misPendAprobDir.length===0&&misResueltasDir.length===0&&(
        <div style={{textAlign:"center",padding:"48px 16px",color:T.muted}}>
          <p style={{fontSize:36,margin:"0 0 8px"}}>🎯</p>
          <p style={{margin:0,fontSize:14,fontWeight:600}}>Sin estrategias activas</p>
        </div>
      )}

      {/* Modal editar estrategia */}
      {editEst&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div style={{background:"#fff",borderRadius:16,width:"min(500px,100%)",padding:"24px",boxShadow:"0 16px 48px rgba(0,0,0,.25)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <p style={{margin:0,fontSize:16,fontWeight:800}}>✏️ Editar estrategia</p>
              <button onClick={()=>setEditEst(null)} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:T.muted}}>✕</button>
            </div>
            <div style={{marginBottom:12}}>
              <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Cliente</p>
              <input value={editEst.cliente||editEst.clienteNombre||""} onChange={e=>setEditEst(p=>({...p,cliente:e.target.value,clienteNombre:e.target.value}))}
                style={{width:"100%",padding:"10px 12px",borderRadius:9,border:`1.5px solid ${T.border}`,fontSize:13,outline:"none",boxSizing:"border-box"}}/>
            </div>
            <div style={{marginBottom:12}}>
              <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Objetivo</p>
              <input value={editEst.objetivo||""} onChange={e=>setEditEst(p=>({...p,objetivo:e.target.value}))}
                style={{width:"100%",padding:"10px 12px",borderRadius:9,border:`1.5px solid ${T.border}`,fontSize:13,outline:"none",boxSizing:"border-box"}}/>
            </div>
            <div style={{marginBottom:12}}>
              <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Descripción</p>
              <textarea value={editEst.texto||editEst.estrategia||""} onChange={e=>setEditEst(p=>({...p,texto:e.target.value,estrategia:e.target.value}))} rows={4}
                style={{width:"100%",padding:"10px 12px",borderRadius:9,border:`1.5px solid ${T.border}`,fontSize:13,outline:"none",boxSizing:"border-box",resize:"vertical",fontFamily:"inherit"}}/>
            </div>
            {(editEst.ofertas||[]).length>0&&(
              <div style={{marginBottom:12}}>
                <p style={{margin:"0 0 8px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Productos / Precios</p>
                {editEst.ofertas.map((o,i)=>(
                  <div key={i} style={{display:"flex",gap:8,alignItems:"center",marginBottom:6}}>
                    <input value={o.nombre||""} onChange={e=>{
                      const newOfertas=[...editEst.ofertas];newOfertas[i]={...o,nombre:e.target.value};
                      setEditEst(p=>({...p,ofertas:newOfertas}));
                    }} placeholder="Producto"
                      style={{flex:2,padding:"8px 10px",borderRadius:8,border:`1px solid ${T.border}`,fontSize:12,outline:"none"}}/>
                    <input type="number" value={o.precioFinal||o.precio||""} onChange={e=>{
                      const newOfertas=[...editEst.ofertas];newOfertas[i]={...o,precioFinal:e.target.value};
                      setEditEst(p=>({...p,ofertas:newOfertas}));
                    }} placeholder="€/kg"
                      style={{flex:1,padding:"8px 10px",borderRadius:8,border:`1px solid ${T.border}`,fontSize:12,outline:"none"}}/>
                    <input type="number" value={o.dto||""} onChange={e=>{
                      const newOfertas=[...editEst.ofertas];newOfertas[i]={...o,dto:e.target.value};
                      setEditEst(p=>({...p,ofertas:newOfertas}));
                    }} placeholder="Dto %"
                      style={{width:60,padding:"8px 10px",borderRadius:8,border:`1px solid ${T.border}`,fontSize:12,outline:"none"}}/>
                  </div>
                ))}
              </div>
            )}
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setEditEst(null)}
                style={{flex:1,padding:"12px",borderRadius:10,border:`1px solid ${T.border}`,background:"#fff",fontSize:13,cursor:"pointer",color:T.muted}}>Cancelar</button>
              <button onClick={()=>{
                const updated={...editEst,
                  historialEscalado:[...(editEst.historialEscalado||[]),{accion:"✏️ Editada",por:usuario.nombre,fecha:new Date().toLocaleDateString("es-ES"),nota:editEst.texto||editEst.estrategia}]};
                setEstrategias(prev=>prev.map(e=>e.id===updated.id?updated:e));
                setSel(updated);
                fbEscribir("estrategias",updated.id,updated);
                setEditEst(null);
              }}
                style={{flex:2,padding:"12px",borderRadius:10,border:"none",background:T.navy,color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>
                Guardar cambios
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
// Fallback de incidencias_seed — VACÍO. Los datos vienen de Firebase.
const INCIDENCIAS_SEED = [];

// ═══════════════════════════════════════════════════════════════════
// INCIDENCIAS — gestión clara con escalado visual
// ═══════════════════════════════════════════════════════════════════
function Incidencias({usuario, clientesFB, onAbrirCliente, incidenciasDB: incDB}){
  const esAgente=usuario.rol==="agente";
  const esJefe=["jefe","director","ceo"].includes(usuario.rol);
  const esRolJefe=usuario.rol==="jefe";
  const miEquipo=usuario.equipo;
  // Clientes disponibles: del equipo para jefe, propios para agente
  const clientesDisp=clientesFB||(window._clientesFB)||[];

  const [incidencias,setIncidencias]=useState((incDB||INCIDENCIAS_SEED).map(i=>({
    ...i,historialEscalado:i.historialEscalado||[],
    escaladoA:i.escaladoA||null,informadoA:i.informadoA||[],
  })));
  const [sel,setSel]=useState(null);
  const [filtroTipo,setFiltroTipo]=useState("todas");
  const [filtroEquipoInc,setFiltroEquipoInc]=useState("todos");
  const [agenteSelInc,setAgenteSelInc]=useState(null);
  const [showForm,setShowForm]=useState(false);

  // Marcar como leído al abrir detalle
  useEffect(()=>{
    if(sel && usuario?.id) marcarComoVisto("incidencias", sel.id, usuario.id);
  },[sel&&sel.id]);
  const [form,setForm]=useState({tipo:"",subtipo:"",prioridad:"media",clienteNombre:"",clienteId:"",productoNombre:"",productoCodigo:"",lote:"",descripcion:"",fotos:[]});
  const fotoRef=React.useRef();

  const director=USUARIOS.find(u=>u.rol==="director");
  const ceo=USUARIOS.find(u=>u.rol==="ceo");

  const crearIncidencia=()=>{
    if(!form.tipo||!form.descripcion.trim()){alert("Tipo y descripción son obligatorios");return;}
    const nueva={
      id:`inc${Date.now()}`,
      ...form,
      autor:usuario.id,
      equipo:usuario.equipo||"",
      agente:usuario.id,
      fecha:new Date().toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit",year:"2-digit"}),
      estado:"abierta",
      historialEscalado:[],escaladoA:null,informadoA:[],
    };
    console.log("[INC] Creando incidencia:",nueva.id,nueva.tipo,nueva.clienteNombre);
    setIncidencias(p=>{console.log("[INC] Lista antes:",p.length,"→ después:",p.length+1);return [nueva,...p];});
    fbEscribir("incidencias",nueva.id,nueva).then(ok=>{
      console.log("[INC] Firebase:",ok?"✅ Guardada":"❌ Error al guardar");
    });
    // Notificar al jefe del equipo
    const jefe=USUARIOS.find(u=>(u.rol==="jefe"||u.rol==="director")&&(u.equipo===usuario.equipo||u.equipo===null));
    if(jefe&&jefe.id!==usuario.id) notificarAsignacion("incidencia",{...nueva,agente:jefe.id},usuario.id);
    setForm({tipo:"",subtipo:"",prioridad:"media",clienteNombre:"",clienteId:"",productoNombre:"",productoCodigo:"",lote:"",descripcion:"",fotos:[]});
    setShowForm(false);
  };

  const addFoto=(e)=>{
    [...e.target.files].forEach(file=>{
      const r=new FileReader();
      r.onload=ev=>setForm(f=>({...f,fotos:[...(f.fotos||[]),ev.target.result]}));
      r.readAsDataURL(file);
    });
    e.target.value="";
  };

  // Actualizar incidencia y guardar en Firebase
  const upd=(id,changes)=>{
    setIncidencias(p=>p.map(i=>i.id===id?{...i,...changes}:i));
    const updated={...incidencias.find(i=>i.id===id),...changes};
    fbEscribir("incidencias",id,updated);
    if(sel?.id===id) setSel(updated);
  };

  const addHistorial=(inc,accion,nota="",fotos=[])=>{
    const h={accion,por:usuario.nombre,fecha:new Date().toLocaleDateString("es-ES"),nota,fotos};
    upd(inc.id,{historialEscalado:[...(inc.historialEscalado||[]),h]});
  };

  const escalar=(inc,destId,nota)=>{
    const dest=USUARIOS.find(u=>u.id===destId);
    const h={accion:`↑ Escalada a ${dest?.nombre}`,por:usuario.nombre,
      fecha:new Date().toLocaleDateString("es-ES"),nota,fotos:[]};
    upd(inc.id,{estado:"escalada",escaladoA:destId,
      historialEscalado:[...(inc.historialEscalado||[]),h]});
    // Notificar al destinatario de la escalación
    if(dest) despacharNotificacion({tipo:"incidencia",
      titulo:`🚨 Incidencia escalada: ${inc.titulo||inc.asunto||inc.tipo||""}`,
      mensaje:`${usuario.nombre} te ha escalado una incidencia. Cliente: ${inc.clienteNombre||inc.cliente||"N/A"}. ${nota||""}`,
      destinatarioId:destId,prioridad:"urgente",creadoPor:usuario.id,
      fechaVencimiento:new Date(Date.now()+86400000)});
  };

  const informar=(inc,destId)=>{
    if((inc.informadoA||[]).includes(destId)) return;
    const dest=USUARIOS.find(u=>u.id===destId);
    const h={accion:`ℹ️ Informado a ${dest?.nombre}`,por:usuario.nombre,
      fecha:new Date().toLocaleDateString("es-ES"),nota:"",fotos:[]};
    upd(inc.id,{informadoA:[...(inc.informadoA||[]),destId],
      historialEscalado:[...(inc.historialEscalado||[]),h]});
    // Notificar al informado
    if(dest) despacharNotificacion({tipo:"incidencia",
      titulo:`ℹ️ Incidencia informada: ${inc.titulo||inc.asunto||inc.tipo||""}`,
      mensaje:`${usuario.nombre} te ha informado de una incidencia. Cliente: ${inc.clienteNombre||""}`,
      destinatarioId:destId,prioridad:"normal",creadoPor:usuario.id});
  };

  const cerrar=(inc,nota,extras={})=>{
    const h={accion:"✅ Cerrada",por:usuario.nombre,
      fecha:new Date().toLocaleDateString("es-ES"),nota,fotos:[]};
    upd(inc.id,{estado:"cerrada",
      causaRaiz:extras.causaRaiz||"",accionCorrectiva:extras.accionCorrectiva||"",
      costeIncidente:extras.coste||0,recurrente:extras.recurrente||false,
      notaCierre:nota,
      historialEscalado:[...(inc.historialEscalado||[]),h]});
    setSel(null);
    // Notificar al autor original que se ha cerrado
    if(inc.autor && inc.autor !== usuario.id){
      despacharNotificacion({tipo:"incidencia",
        titulo:`✅ Incidencia resuelta: ${inc.titulo||inc.asunto||inc.tipo||""}`,
        mensaje:`${usuario.nombre} ha cerrado la incidencia. ${nota?"Nota: "+nota:""}`,
        destinatarioId:inc.autor,prioridad:"normal",creadoPor:usuario.id});
    }
  };

  // Filtrar por rol
  const appMisIds=resolverMisIds(usuario);
  const misMostrar=incidencias.filter(i=>{
    if(i.eliminada) return false;
    if(esAgente) return i.autor===usuario.id||i.agente===usuario.id||appMisIds.has((i.agente||"").toUpperCase());
    if(esRolJefe) return i.equipo===miEquipo;
    return true;
  }).filter(i=>filtroTipo==="todas"||i.tipo===filtroTipo)
    .filter(i=>filtroEquipoInc==="todos"||(i.equipo||"").toUpperCase()===filtroEquipoInc.toUpperCase())
    .filter(i=>!agenteSelInc||i.agente===agenteSelInc||i.autor===agenteSelInc);

  const abiertas=misMostrar.filter(i=>i.estado!=="cerrada"&&i.estado!=="resuelta");
  const cerradas=misMostrar.filter(i=>i.estado==="cerrada"||i.estado==="resuelta");

  // ── DETALLE ────────────────────────────────────────────────────────
function DetIncidencia({sel,usuario,director,ceo,esJefe,esRolJefe,onBack,onEscalar,onInformar,onNota,onCerrar}){
  const tipo=INC_TIPOS[sel.tipo]||{label:sel.tipo,color:T.muted};
  const priColors={urgente:"#7F1D1D",alta:T.red,media:T.amber,baja:T.green};
  const priColor=priColors[sel.prioridad]||T.muted;
  const autorU=USUARIOS.find(u=>u.id===sel.autor);
  const puedoEscalar=esJefe&&sel.estado!=="cerrada";
  const respTipo=USUARIOS.find(u=>u.tipologia===sel.tipo);
  const yaEscaladoRespTipo=sel.escaladoA===respTipo?.id;
  const yaInfDir=(sel.informadoA||[]).includes(director?.id);
  const yaInfCeo=(sel.informadoA||[]).includes(ceo?.id);
  const [nota,setNota]=useState("");
  const [notaCierre,setNotaCierre]=useState("");
  const [causaRaiz,setCausaRaiz]=useState("");
  const [accionCorrectiva,setAccionCorrectiva]=useState("");
  const [costeIncidente,setCosteIncidente]=useState("");
  const [esRecurrente,setEsRecurrente]=useState(false);
  const [showCierre,setShowCierre]=useState(false);

  return(
      <div style={{paddingBottom:100}}>
        <BackBar label="Incidencias" onBack={onBack}/>
        <div style={{padding:"16px"}}>

          {/* Botón calendario */}
          <button onClick={()=>{
            const ics=generarICS({
              titulo:`CRM Incidencia: ${sel.titulo||sel.asunto||sel.tipo} — ${sel.clienteNombre||sel.cliente||""}`,
              descripcion:`${sel.descripcion||""}\nCliente: ${sel.clienteNombre||""}\nPrioridad: ${sel.prioridad||"media"}`,
              fechaInicio:new Date(Date.now()+3600000),
              recordatorioMin:30,
              url:"https://crmwikuk.vercel.app"
            });
            descargarICS(ics,`incidencia_${sel.id}.ics`);
          }}
            style={{width:"100%",padding:"10px",borderRadius:10,border:`1.5px solid ${T.blue}`,background:"#EFF6FF",
              color:T.blue,fontSize:12,fontWeight:700,cursor:"pointer",marginBottom:12,textAlign:"center"}}>
            📅 Añadir al calendario del teléfono
          </button>

          {/* Ficha */}
          <div style={{background:"#fff",borderRadius:16,marginBottom:16,overflow:"hidden",
            border:`1px solid ${T.border}`,borderTop:`4px solid ${tipo.color}`}}>
            <div style={{padding:"16px"}}>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
                <span style={{fontSize:12,fontWeight:700,color:tipo.color,
                  background:tipo.color+"15",borderRadius:99,padding:"3px 10px"}}>{tipo.label}</span>
                <span style={{fontSize:12,fontWeight:700,color:priColor,
                  background:priColor+"15",borderRadius:99,padding:"3px 10px"}}>
                  {sel.prioridad==="urgente"?"🔴 Urgente":sel.prioridad.charAt(0).toUpperCase()+sel.prioridad.slice(1)}
                </span>
                <span style={{fontSize:12,fontWeight:700,
                  color:sel.estado==="cerrada"?T.green:sel.estado==="escalada"?T.purple:T.amber,
                  background:(sel.estado==="cerrada"?T.green:sel.estado==="escalada"?T.purple:T.amber)+"15",
                  borderRadius:99,padding:"3px 10px"}}>
                  {sel.estado==="cerrada"?"✅ Cerrada":sel.estado==="escalada"?"↑ Escalada":"🔴 Abierta"}
                </span>
              </div>
              <p style={{margin:"0 0 8px",fontSize:16,fontWeight:800}}>
                {onAbrirCliente&&(sel.clienteNombre||sel.cliente)?<span onClick={()=>onAbrirCliente(sel.clienteNombre||sel.cliente)} style={{color:T.blue,cursor:"pointer",textDecoration:"underline"}}>{sel.clienteNombre||sel.cliente}</span>:(sel.clienteNombre||sel.cliente||"—")}
              </p>
              <p style={{margin:"0 0 10px",fontSize:13,color:T.text,lineHeight:1.6}}>{sel.descripcion||sel.desc}</p>
              <p style={{margin:0,fontSize:11,color:T.muted}}>
                {autorU?.nombre||sel.autor} · {sel.fecha}
              </p>
              {sel.escaladoA&&(
                <div style={{marginTop:8,padding:"7px 10px",background:T.purpleL,borderRadius:8}}>
                  <p style={{margin:0,fontSize:11,color:T.purple,fontWeight:700}}>
                    ↑ Escalada a: {USUARIOS.find(u=>u.id===sel.escaladoA)?.nombre}
                  </p>
                </div>
              )}
              {(sel.informadoA||[]).length>0&&(
                <div style={{marginTop:6,padding:"7px 10px",background:T.blueL,borderRadius:8}}>
                  <p style={{margin:0,fontSize:11,color:T.blue,fontWeight:700}}>
                    ℹ️ Informado a: {(sel.informadoA||[]).map(id=>USUARIOS.find(u=>u.id===id)?.nombre||id).join(", ")}
                  </p>
                </div>
              )}
            </div>
          </div>

          {/* Acciones de escalado — solo para jefes */}
          {puedoEscalar&&(
            <div style={{background:"#fff",borderRadius:16,padding:"16px",marginBottom:16,
              border:`1px solid ${T.border}`}}>
              <p style={{margin:"0 0 12px",fontSize:12,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
                Acciones de escalado
              </p>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {/* Escalar al responsable de tipología */}
                {esRolJefe&&respTipo&&!yaEscaladoRespTipo&&(
                  <button onClick={()=>escalar(sel,respTipo.id,"")}
                    style={{display:"flex",gap:12,alignItems:"center",padding:"13px 16px",
                      borderRadius:12,border:`1.5px solid ${tipo.color}`,background:tipo.color+"10",
                      cursor:"pointer",textAlign:"left"}}>
                    <span style={{fontSize:24}}>{respTipo.icon}</span>
                    <div style={{flex:1}}>
                      <p style={{margin:0,fontSize:13,fontWeight:700}}>Escalar a {respTipo.nombre}</p>
                      <p style={{margin:"2px 0 0",fontSize:11,color:T.muted}}>Responsable de {tipo.label}</p>
                    </div>
                    <span style={{color:tipo.color,fontWeight:700,fontSize:16}}>↑</span>
                  </button>
                )}
                {yaEscaladoRespTipo&&(
                  <div style={{padding:"10px 14px",background:T.greenL,borderRadius:10}}>
                    <p style={{margin:0,fontSize:12,fontWeight:700,color:T.green}}>
                      ✅ Ya escalada a {respTipo?.nombre}
                    </p>
                  </div>
                )}
                {/* Informar al director */}
                {director&&!yaInfDir&&(
                  <button onClick={()=>informar(sel,director.id)}
                    style={{display:"flex",gap:12,alignItems:"center",padding:"13px 16px",
                      borderRadius:12,border:`1.5px solid ${T.blue}`,background:T.blueL,
                      cursor:"pointer",textAlign:"left"}}>
                    <span style={{fontSize:24}}>{director.icon}</span>
                    <div style={{flex:1}}>
                      <p style={{margin:0,fontSize:13,fontWeight:700}}>Informar a {director.nombre}</p>
                      <p style={{margin:"2px 0 0",fontSize:11,color:T.muted}}>Para su conocimiento y seguimiento</p>
                    </div>
                    <span style={{color:T.blue,fontSize:16}}>ℹ️</span>
                  </button>
                )}
                {yaInfDir&&<div style={{padding:"8px 14px",background:T.blueL,borderRadius:9}}>
                  <p style={{margin:0,fontSize:11,fontWeight:700,color:T.blue}}>ℹ️ {director.nombre} ya informado</p>
                </div>}
                {/* Elevar al CEO */}
                {(esRolJefe===false&&usuario.rol==="director")&&ceo&&!yaInfCeo&&(
                  <button onClick={()=>informar(sel,ceo.id)}
                    style={{display:"flex",gap:12,alignItems:"center",padding:"13px 16px",
                      borderRadius:12,border:`1.5px solid ${T.purple}`,background:T.purpleL,
                      cursor:"pointer",textAlign:"left"}}>
                    <span style={{fontSize:24}}>{ceo.icon}</span>
                    <div style={{flex:1}}>
                      <p style={{margin:0,fontSize:13,fontWeight:700}}>Elevar al {ceo.nombre}</p>
                      <p style={{margin:"2px 0 0",fontSize:11,color:T.muted}}>Máxima prioridad</p>
                    </div>
                    <span style={{color:T.purple,fontSize:16}}>👑</span>
                  </button>
                )}
              </div>
            </div>
          )}

          {/* Añadir nota */}
          {sel.estado!=="cerrada"&&(
            <div style={{background:"#fff",borderRadius:16,padding:"16px",marginBottom:12,
              border:`1px solid ${T.border}`}}>
              <p style={{margin:"0 0 8px",fontSize:12,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
                💬 Añadir actualización
              </p>
              <textarea value={nota} onChange={e=>setNota(e.target.value)} rows={3}
                placeholder="Gestión realizada, estado actual…"
                style={{width:"100%",border:`1.5px solid ${nota?T.blue:T.border}`,borderRadius:10,
                  padding:"10px 12px",fontSize:13,resize:"none",outline:"none",
                  boxSizing:"border-box",fontFamily:"inherit",lineHeight:1.5,marginBottom:8}}/>
              <Btn full onClick={()=>{if(nota.trim()){addHistorial(sel,"💬 Nota",nota);setNota("");}}}
                color={T.navy} disabled={!nota.trim()}>
                Guardar nota
              </Btn>
            </div>
          )}

          {/* Cerrar */}
          {sel.estado!=="cerrada"&&(
            showCierre?(
              <div style={{background:"#fff",borderRadius:16,padding:"16px",marginBottom:12,
                border:`1.5px solid ${T.green}`}}>
                <p style={{margin:"0 0 12px",fontSize:13,fontWeight:700,color:T.green}}>✅ Resolución de incidencia</p>

                {/* Causa raíz */}
                <div style={{marginBottom:10}}>
                  <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Causa raíz *</p>
                  <select value={causaRaiz} onChange={e=>setCausaRaiz(e.target.value)}
                    style={{width:"100%",padding:"10px 12px",borderRadius:9,border:`1.5px solid ${!causaRaiz?T.red:T.border}`,fontSize:13,outline:"none",background:"#fff",fontFamily:"inherit"}}>
                    <option value="">— Seleccionar causa —</option>
                    {INC_CAUSA_RAIZ.map(c=>(<option key={c} value={c}>{c}</option>))}
                  </select>
                </div>

                {/* Acción correctiva */}
                <div style={{marginBottom:10}}>
                  <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Acción correctiva *</p>
                  <select value={accionCorrectiva} onChange={e=>setAccionCorrectiva(e.target.value)}
                    style={{width:"100%",padding:"10px 12px",borderRadius:9,border:`1.5px solid ${!accionCorrectiva?T.red:T.border}`,fontSize:13,outline:"none",background:"#fff",fontFamily:"inherit"}}>
                    <option value="">— Seleccionar acción —</option>
                    {INC_ACCION_CORRECTIVA.map(a=>(<option key={a} value={a}>{a}</option>))}
                  </select>
                </div>

                {/* Coste + Recurrente */}
                <div style={{display:"flex",gap:8,marginBottom:10}}>
                  <div style={{flex:1}}>
                    <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Coste € (opcional)</p>
                    <input type="number" value={costeIncidente} onChange={e=>setCosteIncidente(e.target.value)} placeholder="0"
                      style={{width:"100%",padding:"10px 12px",borderRadius:9,border:`1.5px solid ${T.border}`,fontSize:13,outline:"none",boxSizing:"border-box"}}/>
                  </div>
                  <div style={{flex:1}}>
                    <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>¿Recurrente?</p>
                    <div style={{display:"flex",gap:6}}>
                      {[{k:true,l:"Sí"},{k:false,l:"No"}].map(o=>(
                        <button key={String(o.k)} onClick={()=>setEsRecurrente(o.k)}
                          style={{flex:1,padding:"10px",borderRadius:9,border:`2px solid ${esRecurrente===o.k?(o.k?T.red:T.green):T.border}`,
                            background:esRecurrente===o.k?(o.k?T.red:T.green)+"15":"#fff",
                            color:esRecurrente===o.k?(o.k?T.red:T.green):T.muted,
                            fontWeight:esRecurrente===o.k?700:400,fontSize:13,cursor:"pointer"}}>{o.l}</button>
                      ))}
                    </div>
                  </div>
                </div>

                {/* Nota de resolución */}
                <div style={{marginBottom:10}}>
                  <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Nota de resolución</p>
                  <textarea value={notaCierre} onChange={e=>setNotaCierre(e.target.value)} rows={3}
                    placeholder="Cómo se resolvió…"
                    style={{width:"100%",border:`1.5px solid ${T.border}`,borderRadius:10,
                      padding:"10px 12px",fontSize:13,resize:"none",outline:"none",
                      boxSizing:"border-box",fontFamily:"inherit"}}/>
                </div>

                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setShowCierre(false)}
                    style={{flex:1,padding:"11px",borderRadius:10,border:`1px solid ${T.border}`,
                      background:"#fff",color:T.muted,fontWeight:600,fontSize:13,cursor:"pointer"}}>Cancelar</button>
                  <button onClick={()=>{
                    if(!causaRaiz||!accionCorrectiva){alert("Causa raíz y acción correctiva son obligatorios");return;}
                    onCerrar(notaCierre,{causaRaiz,accionCorrectiva,coste:Number(costeIncidente)||0,recurrente:esRecurrente});
                  }}
                    disabled={!causaRaiz||!accionCorrectiva}
                    style={{flex:2,padding:"11px",borderRadius:10,border:"none",
                      background:causaRaiz&&accionCorrectiva?T.green:"#E2E8F0",
                      color:causaRaiz&&accionCorrectiva?"#fff":"#94A3B8",fontWeight:700,fontSize:13,cursor:causaRaiz&&accionCorrectiva?"pointer":"default"}}>
                    ✅ Confirmar cierre
                  </button>
                </div>
              </div>
            ):(
              <button onClick={()=>setShowCierre(true)}
                style={{width:"100%",padding:"13px",borderRadius:12,marginBottom:12,
                  border:`2px solid ${T.green}`,background:T.greenL,
                  color:T.green,fontWeight:700,fontSize:13,cursor:"pointer"}}>
                ✅ Marcar como resuelta
              </button>
            )
          )}

          {/* Historial */}
          {(sel.historialEscalado||[]).length>0&&(
            <div style={{background:"#fff",borderRadius:16,padding:"16px",border:`1px solid ${T.border}`}}>
              <p style={{margin:"0 0 12px",fontSize:12,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
                🕐 Historial de gestión
              </p>
              {[...(sel.historialEscalado||[])].reverse().map((h,i,arr)=>(
                <div key={i} style={{display:"flex",gap:10,paddingBottom:10,marginBottom:10,
                  borderBottom:i<arr.length-1?`1px solid ${T.border}`:"none"}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:T.navy,flexShrink:0,marginTop:4}}/>
                  <div style={{flex:1}}>
                    <p style={{margin:"0 0 2px",fontSize:12,fontWeight:700}}>{h.accion}</p>
                    {h.nota&&<p style={{margin:"0 0 3px",fontSize:12,color:T.text}}>{h.nota}</p>}
                    {(h.fotos||[]).length>0&&(
                      <div style={{display:"flex",gap:6,margin:"4px 0"}}>
                        {h.fotos.map((f,j)=>(
                          <img key={j} src={f} alt="" style={{width:60,height:60,objectFit:"cover",
                            borderRadius:8,border:`1px solid ${T.border}`,cursor:"pointer"}}
                            onClick={()=>window.open(f)}/>
                        ))}
                      </div>
                    )}
                    <p style={{margin:0,fontSize:10,color:T.muted}}>{h.por} · {h.fecha}</p>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
  );
}

  if(sel) return <DetIncidencia sel={sel} usuario={usuario} director={director} ceo={ceo} esJefe={esJefe} esRolJefe={esRolJefe} onBack={()=>setSel(null)} onEscalar={(destId,nota)=>{escalar(sel,destId,nota);setSel({...sel,escaladoA:destId,estado:"escalada"});}} onInformar={(destId)=>informar(sel,destId)} onNota={(nota)=>addHistorial(sel,"💬 Nota",nota)} onCerrar={(nota,extras)=>cerrar(sel,nota,extras)}/>;

  // ── LISTA ─────────────────────────────────────────────────────────
  return(
    <div style={{padding:"16px 16px 100px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div>
          <p style={{margin:0,fontSize:22,fontWeight:900,color:T.text}}>🚨 Incidencias</p>
          <p style={{margin:"2px 0 0",fontSize:12,color:T.muted}}>
            {esAgente?"Mis incidencias":esRolJefe?`Equipo ${miEquipo}`:"Todas"}
          </p>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {abiertas.length>0&&(
            <div style={{background:T.red,color:"#fff",borderRadius:99,
              padding:"4px 14px",fontSize:13,fontWeight:800}}>
              {abiertas.length} abierta{abiertas.length>1?"s":""}
            </div>
          )}
          <button onClick={()=>setShowForm(s=>!s)}
            style={{background:T.red,border:"none",borderRadius:10,
              padding:"10px 16px",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>
            + Nueva
          </button>
        </div>
      </div>

      {/* Formulario nueva incidencia */}
      {showForm&&(
        <div style={{background:"#fff",borderRadius:16,padding:"16px",marginBottom:16,
          border:`2px solid ${T.red}`}}>
          <p style={{margin:"0 0 14px",fontSize:15,fontWeight:800,color:T.text}}>🚨 Nueva incidencia</p>

          {/* Cliente */}
          <div style={{marginBottom:12}}>
            <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Cliente *</p>
<SearchInput
              value={form.clienteNombre}
              onChange={v=>setForm(f=>({...f,clienteNombre:v,clienteId:""}))}
              placeholder="🔍 Buscar cliente..."
              suggestions={clientesDisp
                .filter(c=>{const n=(c.nombre||c.NOMBRE||"").toLowerCase();return form.clienteNombre.length>=2&&n.includes(form.clienteNombre.toLowerCase());})
                .slice(0,8).map(c=>({label:c.nombre||c.NOMBRE,sub:c.id,tipo:"cliente"}))}
              onSelect={s=>setForm(f=>({...f,clienteNombre:s.label,clienteId:s.sub||""}))}
            />
          </div>

          {/* Producto afectado */}
          <div style={{marginBottom:12}}>
            <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Producto afectado (opcional)</p>
            <SearchInput
              value={form.productoNombre}
              onChange={v=>setForm(f=>({...f,productoNombre:v,productoCodigo:""}))}
              placeholder="🔍 Buscar producto o código..."
              suggestions={PRODUCTOS_LOCAL
                .filter(p=>form.productoNombre.length>=2&&((p.nombre||"").toLowerCase().includes(form.productoNombre.toLowerCase())||(p.codigo||"").toLowerCase().includes(form.productoNombre.toLowerCase())))
                .slice(0,8).map(p=>({label:p.nombre,sub:p.codigo+" · "+p.formato,tipo:"producto",obj:p}))}
              onSelect={s=>setForm(f=>({...f,productoNombre:s.label,productoCodigo:s.obj.codigo}))}
            />
            {form.productoCodigo&&<p style={{margin:"4px 0 0",fontSize:10,color:T.blue,fontWeight:700,fontFamily:"monospace"}}>{form.productoCodigo}</p>}
          </div>

          {/* Tipo */}
          <div style={{marginBottom:12}}>
            <p style={{margin:"0 0 8px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Tipo *</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {Object.entries(INC_TIPOS).map(([k,t])=>(
                <button key={k} onClick={()=>setForm(f=>({...f,tipo:k,subtipo:""}))}
                  style={{padding:"9px 12px",borderRadius:9,cursor:"pointer",fontSize:12,
                    border:`2px solid ${form.tipo===k?t.color:T.border}`,
                    background:form.tipo===k?t.color+"15":"#fff",
                    color:form.tipo===k?t.color:T.muted,
                    fontWeight:form.tipo===k?700:400}}>
                  {t.label}
                </button>
              ))}
            </div>
          </div>

          {/* Subtipo (según tipo seleccionado) */}
          {form.tipo&&INC_SUBTIPOS[form.tipo]&&(
            <div style={{marginBottom:12}}>
              <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Subtipo</p>
              <select value={form.subtipo||""} onChange={e=>setForm(f=>({...f,subtipo:e.target.value}))}
                style={{width:"100%",padding:"10px 12px",borderRadius:9,border:`1.5px solid ${T.border}`,fontSize:13,outline:"none",background:"#fff",fontFamily:"inherit"}}>
                <option value="">— Seleccionar —</option>
                {INC_SUBTIPOS[form.tipo].map(s=>(<option key={s} value={s}>{s}</option>))}
              </select>
            </div>
          )}

          {/* Lote */}
          <div style={{marginBottom:12}}>
            <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Nº Lote (trazabilidad)</p>
            <input value={form.lote||""} onChange={e=>setForm(f=>({...f,lote:e.target.value}))}
              placeholder="Ej: LOT-2026-04-B"
              style={{width:"100%",padding:"10px 12px",borderRadius:9,border:`1.5px solid ${T.border}`,fontSize:13,outline:"none",boxSizing:"border-box"}}/>
          </div>

          {/* Prioridad */}
          <div style={{marginBottom:12}}>
            <p style={{margin:"0 0 8px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Prioridad</p>
            <div style={{display:"flex",gap:6}}>
