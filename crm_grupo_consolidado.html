// ─── DASHBOARD DIRECTOR/CEO ───────────────────────────────────────
const OPO_FB_PROJECT="grupo-consolidado-crm";
const FB_BASE = `https://firestore.googleapis.com/v1/projects/${OPO_FB_PROJECT}/databases/(default)/documents`;
const FB_STORAGE = `https://firebasestorage.googleapis.com/v0/b/${OPO_FB_PROJECT}.appspot.com/o`;

// ── Firebase Storage — subir foto ─────────────────────────────────
async function subirFoto(base64, ruta){
  try{
    // Convertir base64 a Blob
    const [meta,data]=base64.split(",");
    const mime=meta.match(/:(.*?);/)?.[1]||"image/jpeg";
    const bytes=atob(data);
    const arr=new Uint8Array(bytes.length);
    for(let i=0;i<bytes.length;i++) arr[i]=bytes.charCodeAt(i);
    const blob=new Blob([arr],{type:mime});

    // Subir a Storage
    const rutaCodificada=encodeURIComponent(ruta);
    const r=await fetch(`${FB_STORAGE}?uploadType=media&name=${rutaCodificada}`,{
      method:"POST",
      headers:{"Content-Type":mime},
      body:blob,
    });
    if(!r.ok) throw new Error(`Storage error: ${r.status}`);
    const res=await r.json();
    // URL pública de descarga
    const token=res.downloadTokens;
    return `${FB_STORAGE}/${rutaCodificada}?alt=media&token=${token}`;
  }catch(e){
    console.warn("Error subiendo foto:",e.message);
    return null; // fallback: devuelve null, se queda base64 local
  }
}

// Subir múltiples fotos y devolver URLs
async function subirFotos(fotos=[], carpeta="general"){
  if(!fotos||fotos.length===0) return [];
  const urls=await Promise.all(
    fotos.map(async (f,i)=>{
      if(f.startsWith("https://")) return f; // ya es URL, no resubir
      const ext=f.includes("png")?"png":"jpg";
      const nombre=`${carpeta}/${Date.now()}_${i}.${ext}`;
      const url=await subirFoto(f,nombre);
      return url||f; // si falla, mantiene base64
    })
  );
  return urls;
}

// ── Firebase genérico ─────────────────────────────────────────────
async function fbLeer(coleccion, pageSize=200){
  try{
    let docs=[], nextPage=null, intentos=0;
    do{
      const url=`${FB_BASE}/${coleccion}?pageSize=300${nextPage?"&pageToken="+nextPage:""}`;
      const r=await fetch(url);
      if(!r.ok) return [];
      const data=await r.json();
      if(data.documents) docs=[...docs,...data.documents.map(fromFirestore)];
      nextPage=data.nextPageToken||null;
      intentos++;
    }while(nextPage&&intentos<10);
    return docs;
  }catch(e){console.warn("FB leer:",e.message);return [];}
}

// Cargar TODOS los docs de una colección sin límite de páginas
async function fbLeerTodos(coleccion){
  try{
    let docs=[], nextPage=null, intentos=0;
    do{
      const url=`${FB_BASE}/${coleccion}?pageSize=300${nextPage?"&pageToken="+nextPage:""}`;
      const r=await fetch(url);
      if(!r.ok) break;
      const data=await r.json();
      if(data.documents) docs=[...docs,...data.documents.map(fromFirestore)];
      nextPage=data.nextPageToken||null;
      intentos++;
    }while(nextPage&&intentos<50);
    return docs;
  }catch(e){console.warn("FB leerTodos:",e.message);return [];}
}

// Query Firestore por grupoAgente — solo trae los clientes del vendedor
async function fbQueryGrupoAgente(grupoAgente){
  try{
    const body={
      structuredQuery:{
        from:[{collectionId:"clientes"}],
        where:{fieldFilter:{field:{fieldPath:"grupoAgente"},op:"EQUAL",value:{stringValue:grupoAgente}}},
        limit:1000
      }
    };
    const project="grupo-consolidado-crm";
    const url=`https://firestore.googleapis.com/v1/projects/${project}/databases/(default)/documents:runQuery`;
    const r=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    if(!r.ok) return [];
    const data=await r.json();
    return data.filter(d=>d.document).map(d=>fromFirestore(d.document));
  }catch(e){console.warn("FB query:",e.message);return [];}
}


// ── Serializar a formato Firestore ────────────────────────────────
function serializeToFirestore(datos){
  const fields={};
  const serialize=(v)=>{
    if(v===null||v===undefined) return {nullValue:null};
    if(typeof v==="boolean") return {booleanValue:v};
    if(typeof v==="number") return {doubleValue:v};
    if(typeof v==="string"){
      // Truncar strings muy largos (base64 imágenes) para no superar 1MB
      if(v.startsWith("data:image")&&v.length>5000) return {stringValue:"[imagen]"};
      return {stringValue:v};
    }
    if(Array.isArray(v)) return {arrayValue:{values:v.map(x=>serialize(x))}};
    if(typeof v==="object") return {mapValue:{fields:Object.fromEntries(
      Object.entries(v).map(([k,val])=>[k,serialize(val)])
    )}};
    return {stringValue:String(v)};
  };
  Object.entries(datos).forEach(([k,v])=>{ fields[k]=serialize(v); });
  return {fields};
}

// Escritura genérica — crea o sobreescribe documento
async function fbEscribir(coleccion, id, datos){
  try{
    const r=await fetch(`${FB_BASE}/${coleccion}/${id}`,{
      method:"PATCH",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(serializeToFirestore(datos))
    });
    if(!r.ok){
      const e=await r.json().catch(()=>({}));
      const msg=e?.error?.message||e?.error?.status||r.status;
      console.warn(`🔴 Firebase [${coleccion}/${id}] error ${r.status}:`, msg);
      // Mostrar en pantalla para diagnóstico
      if(r.status===403||r.status===401){
        console.warn("⚠️ REGLAS FIREBASE: La base de datos no permite escritura anónima.");
        console.warn("Solución: Firebase Console → Firestore → Reglas → cambiar a allow read, write: if true;");
      }
    }
    return r.ok;
  }catch(e){
    console.warn("🔴 Firebase red error:", e.message);
    return false;
  }
}

function parseFirestoreValue(v) {
  if (v.stringValue  !== undefined) return v.stringValue;
  if (v.integerValue !== undefined) return parseInt(v.integerValue);
  if (v.doubleValue  !== undefined) return parseFloat(v.doubleValue);
  if (v.booleanValue !== undefined) return v.booleanValue;
  if (v.nullValue    !== undefined) return null;
  if (v.arrayValue)  return (v.arrayValue.values||[]).map(parseFirestoreValue);
  if (v.mapValue)    return parseFirestoreMap(v.mapValue.fields||{});
  return undefined;
}
function parseFirestoreMap(fields) {
  const obj = {};
  Object.entries(fields).forEach(([k, v]) => {
    const val = parseFirestoreValue(v);
    if (val !== undefined) obj[k] = val;
  });
  return obj;
}
function fromFirestore(doc) {
  if (!doc.fields) return {id: doc.name?.split("/").pop()};
  const obj = {id: doc.name?.split("/").pop()};
  Object.entries(doc.fields).forEach(([k, v]) => {
    const val = parseFirestoreValue(v);
    if (val !== undefined) obj[k] = val;
  });
  return obj;
}

async function fbCargar() {
  try {
    let docs = [], nextPage = null, intentos = 0;
    do {
      const url = `${FB_BASE}/oportunidades?pageSize=100${nextPage ? "&pageToken=" + nextPage : ""}`;
      const r = await fetch(url);
      const data = await r.json();
      if (data.documents) docs = [...docs, ...data.documents.map(fromFirestore)];
      nextPage = data.nextPageToken || null;
      intentos++;
    } while (nextPage && intentos < 5);
    return docs;
  } catch(e) { console.warn("FB read:", e.message); return []; }
}

async function fbEliminar(id) {
  try {
    await fetch(`${FB_BASE}/oportunidades/${id}`, {method: "DELETE"});
    return true;
  } catch(e) { return false; }
}

          <p style={{margin:"0 0 2px",fontSize:10,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>📁 Proyectos</p>
          <p style={{margin:"0 0 2px",fontSize:20,fontWeight:900,color:T.purple}}>{proyActivos.length}</p>
          <p style={{margin:0,fontSize:11,color:T.muted}}>activos ahora</p>
        </Card>

          const ei=ETAPA_ICON[op.etapa]||"📌";
          const ag=USUARIOS.find(u=>u.id===op.agente);

            <Card key={op.id} onClick={()=>onNav("oportunidades")} style={{marginBottom:8,padding:"12px 16px",cursor:"pointer",borderLeft:`4px solid ${ec}`}}>

                <span style={{fontSize:20}}>{ei}</span>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{margin:0,fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{op.cliente}</p>
                  <p style={{margin:"2px 0 0",fontSize:11,color:T.muted}}>{ag?.nombre||""} · {op.prod}</p>

                <div style={{textAlign:"right",flexShrink:0}}>

      {/* Proyectos activos */}
      <div style={{marginBottom:24}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <p style={{margin:0,fontSize:13,fontWeight:800,color:T.text}}>📁 Proyectos activos</p>
          <button onClick={()=>onNav("proyectos")} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:T.blue,fontWeight:700}}>Ver todos →</button>
        </div>
        {proyActivos.map(p=>{
          const tc=TIPO_COLOR[p.tipo]||T.muted;
          const ti=TIPO_ICON[p.tipo]||"📌";
          const hitosV=(p.hitos||[]).filter(h=>h.nombre||h.titulo||h.descripcion);
          const hechos=hitosV.filter(h=>h.hecho).length;
          const pct=hitosV.length>0?Math.round(hechos/hitosV.length*100):0;
          return(
            <Card key={p.id} onClick={()=>onNav("proyectos")} style={{marginBottom:8,padding:"13px 16px",cursor:"pointer"}}>
              <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:8}}>
                <div style={{width:36,height:36,borderRadius:10,background:tc+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{ti}</div>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{margin:0,fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.nombre}</p>
                  <p style={{margin:"2px 0 0",fontSize:11,color:T.muted}}>{hechos}/{hitosV.length} hitos · hasta {p.fin}</p>
                </div>
                <span style={{fontSize:13,fontWeight:900,color:pct===100?T.green:tc,flexShrink:0}}>{pct}%</span>
              </div>
              <div style={{height:4,borderRadius:99,background:T.border}}>
                <div style={{height:"100%",width:`${pct}%`,background:pct===100?T.green:tc,borderRadius:99}}/>
              </div>
            </Card>
          );
        })}
      </div>

>
    </div>
  );
}

  propuesta:     {label:"📋 Propuesta",    color:T.blue,   bg:"#EFF6FF"},
  negociacion:   {label:"🤝 Negociación",  color:T.amber,  bg:"#FFFBEB"},
  cerrada_ganada:{label:"✅ Ganada",        color:T.green,  bg:"#F0FDF4"},
  cerrada_perdida:{label:"❌ Perdida",      color:T.red,    bg:"#FEF2F2"},

  perdida:       {label:"❌ Perdida",       color:T.red,    bg:"#FEF2F2"},

          <div key={f.key} style={{marginBottom:10}}>

            <input value={form[f.key]} onChange={e=>setForm(x=>({...x,[f.key]:e.target.value}))} placeholder={f.ph}
              style={{width:"100%",padding:"9px 12px",borderRadius:8,border:`1.5px solid ${T.border}`,fontSize:13,outline:"none",boxSizing:"border-box"}}/>
          </div>
        ))}
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          <div style={{flex:1}}><p style={{margin:"0 0 4px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Valor €</p>
            <input type="number" value={form.valor} onChange={e=>setForm(x=>({...x,valor:Number(e.target.value)}))} placeholder="0"
              style={{width:"100%",padding:"9px 12px",borderRadius:8,border:`1.5px solid ${T.border}`,fontSize:13,outline:"none",boxSizing:"border-box"}}/></div>
          <div style={{flex:1}}><p style={{margin:"0 0 4px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Probabilidad %</p>
            <input type="number" value={form.prob} min="0" max="100" onChange={e=>setForm(x=>({...x,prob:Number(e.target.value)}))}

        </div>
        <div style={{marginBottom:10}}><p style={{margin:"0 0 4px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Etapa</p>
          <select value={form.etapa} onChange={e=>setForm(x=>({...x,etapa:e.target.value}))}
            style={{width:"100%",padding:"9px 12px",borderRadius:8,border:`1.5px solid ${T.border}`,fontSize:13,outline:"none",boxSizing:"border-box",background:"#fff"}}>
            <option value="prospecto">🌱 Prospecto</option><option value="propuesta">📋 Propuesta</option>
            <option value="negociacion">🤝 Negociación</option><option value="cerrada_ganada">✅ Ganada</option><option value="cerrada_perdida">❌ Perdida</option>
          </select></div>
        <div style={{marginBottom:16}}><p style={{margin:"0 0 4px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Fecha estimada cierre</p>
          <input type="date" value={form.fecha} onChange={e=>setForm(x=>({...x,fecha:e.target.value}))}
            style={{width:"100%",padding:"9px 12px",borderRadius:8,border:`1.5px solid ${T.border}`,fontSize:13,outline:"none",boxSizing:"border-box"}}/></div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onClose} style={{flex:1,padding:"12px",borderRadius:10,border:`1px solid ${T.border}`,background:"#fff",fontSize:13,cursor:"pointer",color:T.muted}}>Cancelar</button>
          <button onClick={()=>{if(!form.cliente.trim())return;onSave({...form,agente:usuario.id,agenteId:usuario.id,agenteNombre:usuario.nombre,equipo:usuario.equipo});}}
            disabled={!form.cliente.trim()}
            style={{flex:2,padding:"12px",borderRadius:10,border:"none",fontSize:14,fontWeight:700,cursor:"pointer",
              background:form.cliente.trim()?T.navy:"#E2E8F0",color:form.cliente.trim()?"#fff":"#94A3B8"}}>

          <button onClick={()=>{if(!nota.trim())return;const hoy=new Date().toLocaleDateString("es-ES");onUpdate({...opo,actividad:[...(opo.actividad||[]),{tipo:"nota",texto:nota.trim(),fecha:hoy,autor:usuario.nombre}]});setNota("");}}
            disabled={!nota.trim()} style={{width:"100%",padding:"10px",borderRadius:8,border:"none",fontSize:13,fontWeight:700,background:nota.trim()?T.navy:"#E2E8F0",color:nota.trim()?"#fff":"#94A3B8",cursor:"pointer"}}>

function GestorOportunidades({usuario}){
  const [showScanner,setShowScanner]=useState(false);
  const [scanDatos,setScanDatos]=useState(null);
  const handleDatosTarjeta=(datos)=>{setScanDatos(datos);setShowScanner(false);setShowForm(true);};

  const [opos,setOpos]=useState([]);
  const [cargando,setCargando]=useState(true);
  const [detalle,setDetalle]=useState(null);
  const [showForm,setShowForm]=useState(false);
  const [editando,setEditando]=useState(null); // oportunidad que se está editando
  const [toastMsg,setToastMsg]=useState(null);

  // Cargar desde Firebase al arrancar
  const cargarOpos=()=>{
    setCargando(true);
    fbCargar().then(data=>{
      if(data.length>0){
        // Firebase gana — mezcla con OPORTUNIDADES_SEED (DEMO solo si no está en Firebase)
        const fbIds=new Set(data.map(d=>d.id));
        const merged=[...data,...OPORTUNIDADES_SEED.filter(d=>!fbIds.has(d.id))];
        setOpos(merged);
      } else {
        setOpos(OPORTUNIDADES_SEED);
      }
      setCargando(false);
    }).catch(()=>{setOpos(OPORTUNIDADES_SEED);setCargando(false);});
  };

  useEffect(()=>{ cargarOpos(); },[]);

  const toast=(msg,ok=true)=>{setToastMsg({msg,ok});setTimeout(()=>setToastMsg(null),3000);};
  const [vista,setVista]=useState("lista");
  const [filtroEst,setFiltroEst]=useState("activas");
  const [filtroAg,setFiltroAg]=useState("todos");
  const [q,setQ]=useState("");

  const updOpo=async o=>{
    setOpos(p=>p.map(x=>x.id===o.id?o:x));
    setDetalle(o);
    const ok=await fbGuardar(o.id, o);
    toast(ok?"✅ Guardado en Firebase":"⚠️ Error al guardar",ok);
  };
  const addOpo=o=>{
    setOpos(p=>[o,...p]);
    // Firebase en background — no bloquea UI
    fbGuardar(o.id, o).then(ok=>
      toast(ok?"✅ Guardado en Firebase":"📋 Guardado localmente",ok)
    ).catch(()=>toast("📋 Guardado localmente",false));
  };

  const esRolJefe=usuario?.rol==="jefe";
  const esRolAgente=usuario?.rol==="agente";
  const esRolDir=["director","ceo"].includes(usuario?.rol);
  const miEquipoOpo=usuario?.equipo;

  // Pre-filtro por rol — agente SOLO ve las suyas
  const oposMiRol=useMemo(()=>opos.filter(o=>{
    if(esRolAgente) return o.agenteId===usuario.id||o.agente===usuario.id;
    if(esRolJefe){
      const ag=USUARIOS.find(u=>u.id===(o.agenteId||o.agente));
      return ag?.equipo===miEquipoOpo||o.equipoId===miEquipoOpo;
    }
    return true; // director/ceo ve todas
  }),[opos,usuario.id,esRolAgente,esRolJefe,miEquipoOpo]);

  const activas=oposMiRol.filter(o=>!["ganada","perdida"].includes(o.estado));
  const sinAsignar=oposMiRol.filter(o=>!o.agenteId&&!["ganada","perdida"].includes(o.estado));
  const ganadas=oposMiRol.filter(o=>o.estado==="ganada");

  const filtradas=useMemo(()=>oposMiRol.filter(o=>{
    if(filtroEst==="activas"&&(o.esOportunidad===false||["ganada","perdida"].includes(o.estado))) return false;
    if(filtroEst==="sin_asignar"&&(o.agenteId||o.esOportunidad===false)) return false;
    if(filtroEst==="ganadas"&&o.estado!=="ganada") return false;
    if(filtroEst==="perdidas"&&o.estado!=="perdida") return false;
    if(filtroAg!=="todos"&&o.agenteId!==filtroAg) return false;
    if(q&&!o.nombre.toLowerCase().includes(q.toLowerCase())) return false;
    return true;
  }),[opos,filtroEst,filtroAg,q]);

  const TIPOS_MAP_L={nuevo_cliente:"🆕",recuperacion:"🔄",expansion:"📈",referencia:"👥"};
  const porEstado=est=>filtradas.filter(o=>o.estado===est);

  const CardOpo=({o,compact=false})=>{
    const ag=USUARIOS.find(v=>v.id===o.agenteId);
    const est=ESTADOS[o.estado]||ESTADOS.sin_asignar;
    const imgs=o.imagenes||[];
    const dias=()=>{try{const[d,m,y]=o.creadaEn.split("/");return Math.floor((new Date()-new Date(`${y}-${m}-${d}`))/86400000)||0;}catch{return 0;}};
    return(
      <div onClick={()=>setDetalle(o)}
        style={{background:"#fff",borderRadius:12,border:`1px solid ${T.border}`,borderLeft:`4px solid ${est.color}`,padding:compact?"10px 14px":"14px 16px",cursor:"pointer",boxShadow:"0 1px 4px #0001",transition:"box-shadow .15s",marginBottom:compact?8:0}}
        onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 16px #0002"}
        onMouseLeave={e=>e.currentTarget.style.boxShadow="0 1px 4px #0001"}>
        <div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",gap:5,marginBottom:5,flexWrap:"wrap",alignItems:"center"}}>
              <span style={{fontSize:12}}>{TIPOS_MAP_L[o.tipo]}</span>
              <p style={{margin:0,fontSize:compact?13:14,fontWeight:800,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:compact?"nowrap":"normal"}}>{o.nombre}</p>
              {!compact&&<span style={{padding:"2px 8px",borderRadius:5,background:est.bg,color:est.color,fontSize:10,fontWeight:700,flexShrink:0}}>{est.dot} {est.label}</span>}
            </div>
            {!compact&&<p style={{margin:"0 0 8px",fontSize:12,color:T.muted,lineHeight:1.5}}>{o.descripcionOportunidad?.slice(0,100)}{(o.descripcionOportunidad?.length||0)>100?"…":""}</p>}
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
              {ag?<div style={{display:"flex",gap:4,alignItems:"center"}}><span style={{width:16,height:16,borderRadius:"50%",background:ag.color,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"#fff",flexShrink:0}}>{ag.icon||ag.nombre[0]}</span><span style={{fontSize:11,color:T.muted}}>{ag.nombre}</span></div>
              :<span style={{fontSize:11,color:T.amber,fontWeight:600}}>⚠️ Sin asignar</span>}
              <span style={{fontSize:10,color:T.muted}}>·</span>
              <span style={{fontSize:11,color:T.muted}}>{dias()}d</span>
              {(o.notas||[]).length>0&&<><span style={{fontSize:10,color:T.muted}}>·</span><span style={{fontSize:11,color:T.blue,fontWeight:600}}>📝 {o.notas.length}</span></>}
              {imgs.length>0&&<><span style={{fontSize:10,color:T.muted}}>·</span><span style={{fontSize:11,color:T.amber,fontWeight:600}}>📷 {imgs.length}</span></>}
            </div>
          </div>
          {imgs[0]&&!compact&&<img src={imgs[0].src} alt="" style={{width:52,height:52,objectFit:"cover",borderRadius:9,flexShrink:0,border:`1px solid ${T.border}`}}/>}
        </div>
      </div>
    );
  };

  const ColKanban=({titulo,color,oposList})=>(
    <div style={{flex:1,minWidth:200,maxWidth:260}}>
      <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:12,padding:"8px 12px",background:color+"15",borderRadius:9,border:`1px solid ${color}33`}}>
        <span style={{fontSize:13,fontWeight:800,color}}>{titulo}</span>
        <span style={{marginLeft:"auto",background:color,color:"#fff",borderRadius:10,padding:"2px 8px",fontSize:11,fontWeight:800}}>{oposList.length}</span>
      </div>
      <div>
        {oposList.length===0&&<div style={{padding:"20px",textAlign:"center",color:T.muted,fontSize:12,background:T.bg,borderRadius:10,border:`1px dashed ${T.border}`}}>Vacío</div>}
        {oposList.map(o=><CardOpo key={o.id} o={o} compact/>)}
      </div>
    </div>
  );

  return(
    <div style={{maxWidth:900,margin:"0 auto",padding:"20px 14px",fontFamily:"'DM Sans','Helvetica Neue',sans-serif"}}>

      {showScanner&&<CardScanner onDatos={handleDatosTarjeta} onClose={()=>setShowScanner(false)}/> }
      {showForm&&<Wizard usuario={usuario} datosEscaneados={scanDatos} onSave={addOpo} onClose={()=>{setShowForm(false);setScanDatos(null);}}/>}
      {editando&&<Wizard usuario={usuario} opoEditar={editando} onSave={async o=>{
        const updated={...editando,...o,id:editando.id,historial:[...(editando.historial||[]),{accion:"✏️ Oportunidad editada",por:usuario?.nombre||"Usuario",fecha:new Date().toLocaleDateString("es-ES"),nota:""}]};
        await updOpo(updated);
        setDetalle(updated);
        setEditando(null);
      }} onClose={()=>setEditando(null)}/>}
      {detalle&&<Detalle opo={detalle} usuario={usuario} onClose={()=>setDetalle(null)} onUpdate={updOpo} onEdit={()=>setEditando(detalle)}/>}

      {toastMsg&&<div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",zIndex:1000,background:toastMsg.ok?T.greenL:T.amberL,border:`1.5px solid ${toastMsg.ok?T.green:T.amber}`,borderRadius:12,padding:"12px 20px",boxShadow:"0 8px 32px #0002",display:"flex",gap:10,alignItems:"center"}}>
        <span style={{fontSize:16}}>{toastMsg.ok?"✅":"⚠️"}</span>
        <span style={{fontSize:13,fontWeight:700,color:toastMsg.ok?T.green:T.amber}}>{toastMsg.msg}</span>
      </div>}

      <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:20,flexWrap:"wrap"}}>
        <div style={{flex:1}}>
          <h1 style={{margin:"0 0 3px",fontSize:21,fontWeight:800,color:T.navy}}>🎯 Gestor de Oportunidades</h1>
          <p style={{margin:0,fontSize:12,color:T.muted}}>{cargando?"Cargando desde Firebase…":`${opos.length} oportunidades cargadas`}</p>
        </div>
        <button onClick={cargarOpos} disabled={cargando}
          style={{padding:"10px 14px",borderRadius:10,border:`1.5px solid ${T.border}`,
            background:"#fff",color:T.muted,fontWeight:600,fontSize:13,cursor:cargando?"default":"pointer",flexShrink:0}}>
          {cargando?"⏳":"🔄"}
        </button>
        <button onClick={()=>setShowScanner(true)} style={{padding:"10px 14px",borderRadius:10,border:`1.5px solid ${T.border}`,background:"#fff",color:T.navy,fontWeight:700,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:7,flexShrink:0}}>
          <span style={{fontSize:18}}>📇</span> Tarjeta
        </button>
        <button onClick={()=>setShowForm(true)} style={{padding:"10px 18px",borderRadius:10,border:"none",background:T.amber,color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:7,flexShrink:0}}>
          <span style={{fontSize:18}}>🎯</span> Nueva oportunidad
        </button>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>setVista("lista")} style={{padding:"8px 14px",borderRadius:8,border:`1.5px solid ${vista==="lista"?T.navy:T.border}`,background:vista==="lista"?T.navy:"#fff",color:vista==="lista"?"#fff":T.muted,fontWeight:vista==="lista"?700:400,fontSize:12,cursor:"pointer"}}>≡ Lista</button>
          <button onClick={()=>setVista("kanban")} style={{padding:"8px 14px",borderRadius:8,border:`1.5px solid ${vista==="kanban"?T.navy:T.border}`,background:vista==="kanban"?T.navy:"#fff",color:vista==="kanban"?"#fff":T.muted,fontWeight:vista==="kanban"?700:400,fontSize:12,cursor:"pointer"}}>⊞ Kanban</button>
        </div>
      </div>

      {cargando?<div style={{textAlign:"center",padding:"60px",color:T.muted}}>
        <p style={{fontSize:40,margin:"0 0 12px"}}>⏳</p>
        <p style={{fontSize:14,fontWeight:700,color:T.text,margin:0}}>Cargando desde Firebase…</p>
      </div>:<>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:20}}>
          {[{l:"Activas",v:activas.length,c:T.blue,s:"En pipeline"},{l:"Sin asignar",v:sinAsignar.length,c:sinAsignar.length>0?T.amber:T.muted,s:"Pendientes"},{l:"Convertidas",v:ganadas.length,c:T.green,s:"Clientes CRM"},{l:"Total",v:opos.length,c:T.purple,s:"Históricas"}].map(k=>(
            <div key={k.l} style={{background:"#fff",border:`1px solid ${T.border}`,borderTop:`3px solid ${k.c}`,borderRadius:11,padding:"12px 14px",boxShadow:"0 1px 3px #0001"}}>
              <p style={{margin:"0 0 3px",fontSize:10,color:T.muted,fontWeight:700,textTransform:"uppercase"}}>{k.l}</p>
              <p style={{margin:"0 0 2px",fontSize:24,fontWeight:800,color:k.c}}>{k.v}</p>
              <p style={{margin:0,fontSize:10,color:T.muted}}>{k.s}</p>
            </div>
          ))}
        </div>

        <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
          <div style={{position:"relative",flex:1,minWidth:160}}>
            <input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 Buscar…" style={{width:"100%",padding:"9px 32px 9px 12px",borderRadius:9,border:`1.5px solid ${T.border}`,fontSize:13,outline:"none",fontFamily:"inherit"}}/>
            {q&&<button onClick={()=>setQ("")} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:15}}>×</button>}
          </div>
          {/* Selector de agente: solo jefes y directores */}
          {!esRolAgente&&(
          <select value={filtroAg} onChange={e=>setFiltroAg(e.target.value)} style={{padding:"9px 12px",borderRadius:9,border:`1.5px solid ${T.border}`,fontSize:13,outline:"none",background:"#fff",cursor:"pointer"}}>
            <option value="todos">{esRolJefe?`Todos (${miEquipoOpo})`:"Todos los agentes"}</option>
            {USUARIOS.filter(v=>v.rol==="agente"&&(esRolJefe?v.equipo===miEquipoOpo:true)).map(v=><option key={v.id} value={v.id}>{v.nombre}</option>)}
          </select>
          )}
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            {[["activas","Activas",T.blue],["sin_asignar","Sin asignar",T.amber],["ganadas","Convertidas",T.green],["perdidas","Perdidas",T.red],["todas","Todas",T.muted]].map(([k,l,c])=>(
              <button key={k} onClick={()=>setFiltroEst(k)} style={{padding:"7px 12px",borderRadius:7,border:`1.5px solid ${filtroEst===k?c:T.border}`,background:filtroEst===k?c+"18":"#fff",color:filtroEst===k?c:T.muted,fontWeight:filtroEst===k?700:400,fontSize:11,cursor:"pointer"}}>{l}</button>
            ))}
          </div>
        </div>

        <p style={{margin:"0 0 12px",fontSize:12,color:T.muted}}>{filtradas.length} oportunidad{filtradas.length!==1?"es":""}</p>

        {vista==="lista"&&<div style={{display:"flex",flexDirection:"column",gap:10}}>
          {filtradas.length===0&&<div style={{textAlign:"center",padding:"50px",background:"#fff",borderRadius:14,border:`1px solid ${T.border}`}}>
            <p style={{fontSize:32,margin:"0 0 8px"}}>🎯</p>
            <p style={{fontWeight:700,color:T.text,margin:"0 0 4px"}}>Sin resultados</p>
            <p style={{fontSize:12,color:T.muted,margin:0}}>Cambia los filtros o crea una nueva oportunidad</p>
          </div>}
          {filtradas.map(o=><CardOpo key={o.id} o={o}/>)}
        </div>}

        {vista==="kanban"&&<div style={{display:"flex",gap:12,overflowX:"auto",paddingBottom:12}}>
          <ColKanban titulo="Sin asignar" color={T.muted}  oposList={porEstado("sin_asignar")}/>
          <ColKanban titulo="Asignadas"   color={T.blue}   oposList={porEstado("asignada")}/>
          <ColKanban titulo="Seguimiento" color={T.amber}  oposList={porEstado("seguimiento")}/>
          <ColKanban titulo="Convertidas" color={T.green}  oposList={porEstado("ganada")}/>
          <ColKanban titulo="Perdidas"    color={T.red}    oposList={porEstado("perdida")}/>
        </div>}
      </>}
    </div>
  );
}



// ─── PROYECTOS ────────────────────────────────────────────────────
function Proyectos({usuario}){
  const [proyectos,setProyectos]=useState(PROYECTOS_SEED);
  const [sel,setSel]=useState(null);
  const [filtro,setFiltro]=useState("activo");
  const [filtroDep,setFiltroDep]=useState("todos");
  const [formOpen,setFormOpen]=useState(false);
  const [form,setForm]=useState({nombre:"",tipo:"lanzamiento",desc:"",fin:""});
  const [nuevoHito,setNuevoHito]=useState({nombre:"",fecha:"",responsable:"",nota:""});
  const [showCierre,setShowCierre]=useState(null); // "exito" | "perdido" | null
  const [notaCierre,setNotaCierre]=useState("");
  const [nuevaTarea,setNuevaTarea]=useState({depto:"",texto:"",resp:""});
  const esJefeOmas=["jefe","director","ceo"].includes(usuario?.rol);

  // Cargar proyectos desde Firebase (incluye industriales)
  React.useEffect(()=>{
    fbLeer("proyectos").then(data=>{
      if(data.length>0) setProyectos([...data,...PROYECTOS_SEED.filter(s=>!data.find(d=>d.id===s.id))]);
    }).catch(()=>{});
  },[usuario?.id]);

  const DEPTOS_PROY=[
    {k:"calidad",   icon:"🔬",label:"Calidad",   color:"#7C3AED"},
    {k:"id",        icon:"⚗️", label:"I+D",       color:"#2563EB"},
    {k:"produccion",icon:"🏭",label:"Producción", color:"#D97706"},
    {k:"direccion", icon:"📊",label:"Dirección",  color:"#0F172A"},
  ];

  const TIPOS={
    lanzamiento:{icon:"🚀",label:"Lanzamiento",  color:T.purple},
    campana:    {icon:"📣",label:"Campaña",       color:T.blue},
    recuperacion:{icon:"🔄",label:"Recuperación", color:T.amber},
    expansion:  {icon:"📈",label:"Expansión",     color:T.green},
    otro:       {icon:"📌",label:"Otro",          color:T.muted},
  };

  const activos=proyectos.filter(p=>p.estado==="activo").length;
  const cerrados=proyectos.filter(p=>p.estado==="cerrado").length;
  const visibles=filtro==="todos"?proyectos:proyectos.filter(p=>p.estado===filtro);

  const toggleHito=(proyId,hitoIdx)=>{
    const updProy=p=>({
      ...p,
      hitos:p.hitos.map((h,i)=>i===hitoIdx?{...h,hecho:!h.hecho,fecha:!h.hecho?new Date().toLocaleDateString("es-ES"):""}:h),
      progreso:Math.round((p.hitos.filter((h,i)=>i===hitoIdx?!h.hecho:h.hecho).length)/p.hitos.length*100)
    });
    setProyectos(pp=>pp.map(p=>p.id===proyId?updProy(p):p));
    if(sel?.id===proyId){
      const updated=updProy(sel);
      setSel(updated);
      fbEscribir("proyectos",proyId,updated);
    }
  };

  const addHito=(proyId)=>{
    if(!nuevoHito.nombre.trim()) return;
    const hoy=new Date().toLocaleDateString("es-ES");
    const hito={nombre:nuevoHito.nombre.trim(),fecha:nuevoHito.fecha,responsable:nuevoHito.responsable,nota:nuevoHito.nota||"",hecho:false,fechaHecho:""};
    const updProy=p=>({...p,hitos:[...(p.hitos||[]),hito]});
    setProyectos(pp=>pp.map(p=>p.id===proyId?updProy(p):p));
    if(sel?.id===proyId){const up=updProy(sel);setSel(up);fbEscribir("proyectos",proyId,up);}

    // Auto-crear tarea para el responsable asignado
    if(nuevoHito.responsable){
      const resp=USUARIOS.find(u=>u.id===nuevoHito.responsable);
      const DEPTOS_MAP={calidad:"🔬 Calidad",id:"⚗️ I+D",produccion:"🏭 Producción",direccion:"📊 Dirección"};
      const respNombre=resp?resp.nombre:(DEPTOS_MAP[nuevoHito.responsable]||nuevoHito.responsable);
      const tareaId="hito_tsk_"+Date.now();
      const tarea={
        id:tareaId,
        titulo:"📍 Hito: "+nuevoHito.nombre.trim(),
        descripcion:"Hito del proyecto: "+(sel?.nombre||proyId),
        tipo:"proyecto",
        prioridad:"normal",
        estado:"pendiente",
        agente:nuevoHito.responsable,
        agenteNombre:respNombre,
        creadaPor:usuario.id,
        creadaPorNombre:usuario.nombre,
        creadaEn:hoy,
        vence:nuevoHito.fecha||"",
        proyectoId:proyId,
        proyectoNombre:sel?.nombre||"",
        esHito:true,
      };
      fbEscribir("tareas",tareaId,tarea);
    }
    setNuevoHito({nombre:"",fecha:"",responsable:"",nota:""});
  };

  const addTareaDepto=(proyId)=>{
    if(!nuevaTarea.depto||!nuevaTarea.texto) return;
    const hoy=new Date().toLocaleDateString("es-ES");
    const tarea={id:"pt"+Date.now(),depto:nuevaTarea.depto,texto:nuevaTarea.texto,
      resp:nuevaTarea.resp,estado:"pendiente",fecha:hoy,creadaPor:usuario.nombre};
    const updProy=p=>({...p,tareasDepto:[...(p.tareasDepto||[]),tarea]});
    setProyectos(pp=>pp.map(p=>p.id===proyId?updProy(p):p));
    if(sel?.id===proyId){const up=updProy(sel);setSel(up);fbEscribir("proyectos",proyId,up);}
    setNuevaTarea({depto:"",texto:"",resp:""});
  };

  const toggleTareaDepto=(proyId,tareaId)=>{
    const updProy=p=>({...p,tareasDepto:(p.tareasDepto||[]).map(t=>
      t.id===tareaId?{...t,estado:t.estado==="hecha"?"pendiente":"hecha",
        fechaHecha:t.estado==="hecha"?"":new Date().toLocaleDateString("es-ES")}:t)});
    setProyectos(pp=>pp.map(p=>p.id===proyId?updProy(p):p));
    if(sel?.id===proyId){const up=updProy(sel);setSel(up);fbEscribir("proyectos",proyId,up);}
  };

  const cerrarProyecto=(proyId,exito)=>{
    const estado=exito?"cerrado_exito":"cerrado_perdido";
    const updProy=p=>({...p,estado,fin:new Date().toLocaleDateString("es-ES")});
    setProyectos(pp=>pp.map(p=>p.id===proyId?updProy(p):p));
    if(sel?.id===proyId){const up=updProy(sel);setSel(up);fbEscribir("proyectos",proyId,up);}
  };

  const crearProyecto=()=>{
    if(!form.nombre)return;
    const nuevo={id:`pr${Date.now()}`,nombre:form.nombre,tipo:form.tipo,estado:"activo",
      inicio:new Date().toISOString().slice(0,10),fin:form.fin||"2026-12-31",
      responsable:usuario.id,responsableNombre:usuario.nombre,
      agente:usuario.id,equipo:[usuario.id],
      desc:form.desc,progreso:0,hitos:[]};
    setProyectos(pp=>[nuevo,...pp]);
    fbEscribir("proyectos",nuevo.id,nuevo); // ← guardar en Firebase
    setForm({nombre:"",tipo:"lanzamiento",desc:"",fin:""});
    setFormOpen(false);
  };

  // Detalle proyecto
  if(sel){
    const tipo=TIPOS[sel.tipo]||TIPOS.otro;
    const hitosValidos=(sel.hitos||[]).filter(h=>h.nombre||h.titulo||h.descripcion);
  const hechos=hitosValidos.filter(h=>h.hecho).length;
  // Calcular progreso real desde hitos (ignora el campo guardado)
  const progresoReal=hitosValidos.length>0?Math.round(hechos/hitosValidos.length*100):0;
    return(
      <div style={{padding:"16px 16px 100px"}}>
        <BackBar label="Volver" onBack={()=>setSel(null)}/>

        {/* Cabecera */}
        <Card style={{marginBottom:16}}>
          <div style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:10}}>
            <div style={{width:48,height:48,borderRadius:14,background:tipo.color+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,flexShrink:0}}>
              {tipo.icon}
            </div>
            <div style={{flex:1}}>
              <p style={{margin:"0 0 4px",fontSize:16,fontWeight:900,color:T.text}}>{sel.nombre}</p>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                <Badge label={tipo.label} color={tipo.color}/>
                <Badge label={sel.estado==="activo"?"● Activo":"● Cerrado"} color={sel.estado==="activo"?T.green:T.muted}/>
              </div>
            </div>
          </div>
          {sel.desc&&<p style={{margin:"0 0 12px",fontSize:12,color:T.muted}}>{sel.desc}</p>}

          {/* Progreso */}
          <div style={{marginBottom:4,display:"flex",justifyContent:"space-between"}}>
            <span style={{fontSize:12,fontWeight:700,color:T.text}}>Progreso general</span>
            <span style={{fontSize:12,fontWeight:900,color:sel.progreso===100?T.green:tipo.color}}>{progresoReal}%</span>
          </div>
          <div style={{height:8,borderRadius:99,background:T.border}}>
            <div style={{height:"100%",width:`${progresoReal}%`,background:progresoReal===100?T.green:tipo.color,borderRadius:99,transition:"width .4s"}}/>
          </div>
          <p style={{margin:"6px 0 0",fontSize:11,color:T.muted}}>{hechos}/{hitosValidos.length} hitos completados · Hasta {sel.fin}</p>
        </Card>

        {/* Banner cierre — visible inmediatamente */}
        {(sel.estado==="cerrado_exito"||sel.estado==="cerrado_perdido")&&(
          <div style={{background:sel.estado==="cerrado_exito"?T.greenL:"#FEF2F2",
            borderRadius:12,padding:"14px 16px",marginBottom:16,
            border:"1.5px solid "+(sel.estado==="cerrado_exito"?T.green:T.red)}}>
            <p style={{margin:"0 0 4px",fontSize:15,fontWeight:800,
              color:sel.estado==="cerrado_exito"?T.green:T.red}}>
              {sel.estado==="cerrado_exito"?"✅ Proyecto cerrado con éxito":"❌ Proyecto cerrado sin éxito"}
            </p>
            {sel.fin&&<p style={{margin:"0 0 8px",fontSize:11,color:T.muted}}>📅 Fecha cierre: {sel.fin}</p>}
            {sel.notaCierre?(
              <div style={{background:"rgba(255,255,255,.7)",borderRadius:8,padding:"10px 12px",
                borderLeft:"3px solid "+(sel.estado==="cerrado_exito"?T.green:T.red)}}>
                <p style={{margin:"0 0 3px",fontSize:10,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
                  Conclusión / resultado final
                </p>
                <p style={{margin:0,fontSize:13,color:"#0F172A",lineHeight:1.6}}>{sel.notaCierre}</p>
              </div>
            ):(
              <p style={{margin:0,fontSize:12,color:T.muted,fontStyle:"italic"}}>Sin conclusión registrada</p>
            )}
          </div>
        )}

        {/* Hitos */}
        <p style={{margin:"0 0 10px",fontSize:13,fontWeight:800,color:T.text}}>📍 Hitos del proyecto</p>
        {(sel.hitos||[]).length===0?(
          <div style={{textAlign:"center",padding:24,color:T.muted,background:T.white,borderRadius:13,border:`1px solid ${T.border}`}}>
            <span style={{fontSize:32,display:"block",marginBottom:6}}>📭</span>
            <p style={{margin:0}}>Sin hitos definidos</p>
          </div>
        ):(sel.hitos||[]).map((h,realIdx)=>({h,realIdx})).filter(({h})=>h.nombre||h.titulo||h.descripcion).map(({h,realIdx})=>(
          <div key={realIdx} style={{display:"flex",gap:12,alignItems:"flex-start",padding:"13px 16px",borderRadius:12,
              border:`2px solid ${h.hecho?T.green+"55":T.border}`,background:h.hecho?T.greenL:T.white,
              marginBottom:8,transition:"all .15s"}}>
            <button onClick={()=>toggleHito(sel.id,realIdx)}
              style={{background:"none",border:"none",cursor:"pointer",padding:0,fontSize:22,flexShrink:0,marginTop:2}}>
              {h.hecho?"✅":"⭕"}
            </button>
            <div style={{flex:1}}>
              <p style={{margin:"0 0 3px",fontSize:13,fontWeight:h.hecho?600:700,color:h.hecho?T.muted:T.text,
                textDecoration:h.hecho?"line-through":"none"}}>{h.nombre||h.titulo||h.descripcion||"(sin nombre)"}</p>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                {h.fecha&&<span style={{fontSize:11,color:T.muted}}>
                  📅 {h.fecha.includes("-")?new Date(h.fecha).toLocaleDateString("es-ES"):h.fecha}
                </span>}
                {h.responsable&&(()=>{
                  const u=USUARIOS.find(x=>x.id===h.responsable||x.nombre===h.responsable);
                  return <span style={{fontSize:11,color:T.blue,fontWeight:600}}>👤 {u?u.icon+" "+u.nombre:h.responsable}</span>;
                })()}
                {h.nota&&<span style={{fontSize:11,color:T.muted,fontStyle:"italic"}}>{h.nota}</span>}
                {h.hecho&&h.fechaHecho&&<span style={{fontSize:11,color:T.green,fontWeight:600}}>✅ {h.fechaHecho}</span>}
              </div>
            </div>
            {!h.hecho&&(
              <button onClick={()=>toggleHito(sel.id,realIdx)}
                style={{padding:"5px 12px",borderRadius:8,border:"none",flexShrink:0,
                  background:T.green,color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer"}}>
                ✅ Completar
              </button>
            )}
          </div>
        ))}

        {/* Formulario nuevo hito - solo si activo */}
        {sel.estado==="activo"&&<div style={{background:"#F8FAFC",borderRadius:12,padding:12,marginBottom:20,border:"1px dashed "+T.border}}>
          <p style={{margin:"0 0 8px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>+ Nuevo hito</p>
          <input value={nuevoHito.nombre} onChange={e=>setNuevoHito(f=>({...f,nombre:e.target.value}))}
            placeholder="Descripción del hito *"
            style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1.5px solid "+T.border,
              fontSize:13,outline:"none",boxSizing:"border-box",fontFamily:"inherit",marginBottom:7}}/>
          <div style={{display:"flex",gap:7,marginBottom:7}}>
            <div style={{flex:1}}>
              <p style={{margin:"0 0 3px",fontSize:10,fontWeight:700,color:T.muted}}>Fecha objetivo</p>
              <input type="date" value={nuevoHito.fecha} onChange={e=>setNuevoHito(f=>({...f,fecha:e.target.value}))}
                style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"1.5px solid "+T.border,
                  fontSize:12,outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}/>
            </div>
            <div style={{flex:1}}>
              <p style={{margin:"0 0 3px",fontSize:10,fontWeight:700,color:T.muted}}>Departamento / Responsable</p>
              {(()=>{
                const comercialId=sel.responsableComercial||sel.agente||sel.responsable;
                const comercial=USUARIOS.find(u=>u.id===comercialId);
                return(
                <select value={nuevoHito.responsable} onChange={e=>setNuevoHito(f=>({...f,responsable:e.target.value}))}
                  style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"1.5px solid "+T.border,
                    fontSize:12,outline:"none",boxSizing:"border-box",fontFamily:"inherit",background:"#fff"}}>
                  <option value="">Sin asignar</option>
                  {comercial&&(
                    <optgroup label="Comercial">
                      <option value={comercial.id}>{comercial.icon} {comercial.nombre}</option>
                    </optgroup>
                  )}
                  <optgroup label="Dirección">
                    {USUARIOS.filter(u=>["jefe","director","ceo"].includes(u.rol)).map(u=>(
                      <option key={u.id} value={u.id}>{u.icon} {u.nombre}</option>
                    ))}
                  </optgroup>
                  <optgroup label="Departamentos">
                    {DEPTOS_PROY.map(d=>(
                      <option key={d.k} value={d.k}>{d.icon} {d.label}</option>
                    ))}
                  </optgroup>
                </select>
                );
              })()}
            </div>
          </div>
          <input value={nuevoHito.nota||""} onChange={e=>setNuevoHito(f=>({...f,nota:e.target.value}))}
            placeholder="Nota del hito (opcional)"
            style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"1.5px solid "+T.border,
              fontSize:12,outline:"none",boxSizing:"border-box",fontFamily:"inherit",marginBottom:7}}/>
          <button onClick={()=>addHito(sel.id)} disabled={!nuevoHito.nombre.trim()}
            style={{width:"100%",padding:"9px",borderRadius:8,border:"none",fontSize:12,fontWeight:700,cursor:"pointer",
              background:nuevoHito.nombre.trim()?T.navy:"#E2E8F0",
              color:nuevoHito.nombre.trim()?"#fff":"#94A3B8"}}>
            ✅ Añadir hito
          </button>
        </div>}


                {/* Cerrar proyecto */}
        {(esJefeOmas||(sel.responsableComercial===usuario.id||sel.agente===usuario.id||sel.responsable===usuario.id))&&sel.estado==="activo"&&(
          <div style={{marginTop:8,marginBottom:16}}>
            {!showCierre&&(
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{setShowCierre("exito");setNotaCierre("");}}
                  style={{flex:1,padding:"11px",borderRadius:10,border:"1.5px solid "+T.green,
                    background:T.greenL,color:T.green,fontWeight:700,fontSize:13,cursor:"pointer"}}>
                  ✅ Cerrar — Éxito
                </button>
                <button onClick={()=>{setShowCierre("perdido");setNotaCierre("");}}
                  style={{flex:1,padding:"11px",borderRadius:10,
                    border:"1.5px solid "+T.red,background:"#FEF2F2",
                    color:T.red,fontWeight:700,fontSize:13,cursor:"pointer"}}>
                  ❌ Cerrar sin éxito
                </button>
              </div>
            )}
            {showCierre&&(
              <div style={{background:"#fff",borderRadius:14,padding:16,
                border:"1.5px solid "+(showCierre==="exito"?T.green:T.red)}}>
                <p style={{margin:"0 0 10px",fontSize:14,fontWeight:800,
                  color:showCierre==="exito"?T.green:T.red}}>
                  {showCierre==="exito"?"✅ Cerrar proyecto con éxito":"❌ Cerrar proyecto sin éxito"}
                </p>
                <p style={{margin:"0 0 6px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
                  Conclusión / resultado final *
                </p>
                <textarea value={notaCierre} onChange={e=>setNotaCierre(e.target.value)}
                  rows={4}
                  placeholder={showCierre==="exito"
                    ?"Describe el resultado: pedido obtenido, volumen, cliente satisfecho, próximos pasos..."
                    :"Describe por qué no se cerró: precio, competencia, timing, producto no adecuado..."}
                  style={{width:"100%",padding:"10px 12px",borderRadius:9,
                    border:"1.5px solid "+(notaCierre?T.border:T.border),
                    fontSize:13,outline:"none",boxSizing:"border-box",
                    resize:"none",fontFamily:"inherit",marginBottom:10}}/>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>{setShowCierre(null);setNotaCierre("");}}
                    style={{flex:1,padding:"10px",borderRadius:9,border:"1px solid "+T.border,
                      background:"#fff",color:T.muted,fontSize:13,fontWeight:600,cursor:"pointer"}}>
                    Cancelar
                  </button>
                  <button onClick={()=>{
                    if(!notaCierre.trim()){alert("Escribe el resultado antes de cerrar");return;}
                    const exito=showCierre==="exito";
                    const hoy=new Date().toLocaleDateString("es-ES");
                    const estado=exito?"cerrado_exito":"cerrado_perdido";
                    const updProy=p=>({...p,estado,fin:hoy,notaCierre:notaCierre.trim(),
                      historial:[...(p.historial||[]),{
                        accion:exito?"✅ Proyecto cerrado con éxito":"❌ Proyecto cerrado sin éxito",
                        por:usuario.nombre,fecha:hoy,nota:notaCierre.trim()
                      }]});
                    setProyectos(pp=>pp.map(p=>p.id===sel.id?updProy(p):p));
                    const up=updProy(sel);setSel(up);
                    fbEscribir("proyectos",sel.id,up);
                    setShowCierre(null);setNotaCierre("");
                  }}
                    disabled={!notaCierre.trim()}
                    style={{flex:2,padding:"10px",borderRadius:9,border:"none",
                      background:notaCierre.trim()?(showCierre==="exito"?T.green:T.red):"#E2E8F0",
                      color:notaCierre.trim()?"#fff":"#94A3B8",
                      fontWeight:700,fontSize:13,cursor:"pointer"}}>
                    Confirmar cierre →
                  </button>
                </div>
              </div>
            )}
          </div>
        )}
        {/* Equipo */}
        <p style={{margin:"16px 0 8px",fontSize:13,fontWeight:800,color:T.text}}>👥 Equipo</p>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {(Array.isArray(sel.equipo)?sel.equipo:[sel.equipo]).filter(Boolean).map(uid=>{
            const u=USUARIOS.find(x=>x.id===uid)||{nombre:uid,icon:"👤",color:T.muted};
            return(
              <div key={uid} style={{display:"flex",gap:6,alignItems:"center",background:T.white,
                border:`1px solid ${T.border}`,borderRadius:99,padding:"6px 12px"}}>
                <span style={{fontSize:14}}>{u.icon}</span>
                <span style={{fontSize:12,fontWeight:600,color:T.text}}>{u.nombre}</span>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  return(
    <div style={{padding:"16px 16px 100px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <p style={{margin:0,fontSize:20,fontWeight:900,color:T.text}}>📁 Proyectos</p>
        <button onClick={()=>setFormOpen(!formOpen)}
          style={{padding:"8px 14px",borderRadius:10,border:"none",background:T.navy,color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>
          + Nuevo
        </button>
      </div>

      {/* KPIs */}
      <div style={{display:"flex",gap:10,marginBottom:16}}>
        <Card style={{flex:1,padding:"12px",textAlign:"center",borderTop:`3px solid ${T.green}`}}>
          <p style={{margin:0,fontSize:22,fontWeight:900,color:T.green}}>{activos}</p>
          <p style={{margin:"2px 0 0",fontSize:10,fontWeight:700,color:T.muted}}>🔵 Activos</p>
        </Card>
        <Card style={{flex:1,padding:"12px",textAlign:"center",borderTop:`3px solid ${T.muted}`}}>
          <p style={{margin:0,fontSize:22,fontWeight:900,color:T.muted}}>{cerrados}</p>
          <p style={{margin:"2px 0 0",fontSize:10,fontWeight:700,color:T.muted}}>✅ Cerrados</p>
        </Card>
      </div>

      {/* Formulario */}
      {formOpen&&(
        <Card style={{marginBottom:16,border:`2px solid ${T.purple}`}}>
          <p style={{margin:"0 0 12px",fontSize:14,fontWeight:800}}>Nuevo proyecto</p>
          <div style={{marginBottom:10}}>
            <p style={{margin:"0 0 4px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Nombre</p>
            <input value={form.nombre} onChange={e=>setForm(x=>({...x,nombre:e.target.value}))} placeholder="Nombre del proyecto"
              style={{width:"100%",border:`1.5px solid ${T.border}`,borderRadius:9,padding:"10px 12px",fontSize:13,outline:"none",boxSizing:"border-box"}}/>
          </div>
          <div style={{marginBottom:10}}>
            <p style={{margin:"0 0 6px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Tipo</p>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {Object.entries(TIPOS).map(([k,v])=>(
                <button key={k} onClick={()=>setForm(x=>({...x,tipo:k}))}
                  style={{padding:"7px 11px",borderRadius:8,border:`2px solid ${form.tipo===k?v.color:T.border}`,
                    background:form.tipo===k?v.color+"15":"#fff",color:form.tipo===k?v.color:T.muted,
                    fontSize:11,fontWeight:form.tipo===k?700:400,cursor:"pointer"}}>
                  {v.icon} {v.label}
                </button>
              ))}
            </div>
          </div>
          <div style={{marginBottom:14}}>
            <p style={{margin:"0 0 4px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Descripción</p>
            <textarea value={form.desc} onChange={e=>setForm(x=>({...x,desc:e.target.value}))} rows={2}
              placeholder="¿Qué se quiere conseguir?"
              style={{width:"100%",border:`1.5px solid ${T.border}`,borderRadius:9,padding:"10px 12px",fontSize:13,outline:"none",resize:"none",boxSizing:"border-box"}}/>
          </div>
          <div style={{display:"flex",gap:8}}>
            <Btn small outline color={T.muted} onClick={()=>setFormOpen(false)}>Cancelar</Btn>
            <Btn small full color={T.purple} onClick={crearProyecto} disabled={!form.nombre}>✓ Crear</Btn>
          </div>
        </Card>
      )}

      {/* Filtros */}
      <div style={{display:"flex",gap:6,marginBottom:14}}>
        {[["activo","Activos 🔵"],["cerrado","Cerrados ✅"],["todos","Todos"]].map(([k,l])=>(
          <button key={k} onClick={()=>setFiltro(k)}
            style={{padding:"6px 14px",borderRadius:99,border:`1.5px solid ${filtro===k?T.purple:T.border}`,
              background:filtro===k?T.purpleL:"#fff",color:filtro===k?T.purple:T.muted,
              fontSize:11,fontWeight:filtro===k?700:400,cursor:"pointer"}}>
            {l}
          </button>
        ))}
      </div>

      {visibles.filter(p=>{
        if(filtroDep==="todos") return true;
        return (p.deptos||[]).includes(filtroDep)||p.responsableComercial===usuario.id;
      }).map(p=>{
        const tipo=TIPOS[p.tipo]||TIPOS.otro;
        const hechos=p.hitos.filter(h=>h.hecho).length;
        return(
          <Card key={p.id} onClick={()=>setSel(p)} style={{marginBottom:10,cursor:"pointer"}}>
            <div style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:10}}>
              <div style={{width:44,height:44,borderRadius:12,background:tipo.color+"18",
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>
                {tipo.icon}
              </div>
              <div style={{flex:1}}>
                <p style={{margin:"0 0 4px",fontSize:14,fontWeight:800,color:T.text}}>{p.nombre}</p>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  <Badge label={tipo.label} color={tipo.color}/>
                  <Badge label={p.estado==="activo"?"● Activo":"● Cerrado"} color={p.estado==="activo"?T.green:T.muted}/>
                </div>
              </div>
              <span style={{fontSize:20,color:T.muted,flexShrink:0}}>›</span>
            </div>
            {p.desc&&<p style={{margin:"0 0 10px",fontSize:12,color:T.muted}}>{p.desc.slice(0,70)}{p.desc.length>70?"…":""}</p>}
            {(()=>{
              const hV=(p.hitos||[]).filter(h=>h.nombre||h.titulo||h.descripcion);
              const hH=hV.filter(h=>h.hecho).length;
              const pPct=hV.length>0?Math.round(hH/hV.length*100):0;
              return(<>
                <div style={{marginBottom:4,display:"flex",justifyContent:"space-between"}}>
                  <span style={{fontSize:11,color:T.muted}}>{hH}/{hV.length} hitos · hasta {p.fin}</span>
                  <span style={{fontSize:12,fontWeight:800,color:pPct===100?T.green:tipo.color}}>{pPct}%</span>
                </div>
                <div style={{height:5,borderRadius:99,background:T.border}}>
                  <div style={{height:"100%",width:`${pPct}%`,background:pPct===100?T.green:tipo.color,borderRadius:99}}/>
                </div>
              </>);
            })()}
          </Card>
        );
      })}
    </div>
  );
}
