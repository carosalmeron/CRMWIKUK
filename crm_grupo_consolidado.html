// ── Carga dinámica de USUARIOS desde Firebase ───────────────────
// Si existen docs en la colección "usuarios", se fusionan con el seed:
// - Firebase tiene prioridad (actualiza nombre, color, equipo, etc.)
// - Usuarios nuevos en Firebase se añaden automáticamente
// - El seed actúa como fallback si Firebase falla
async function cargarUsuariosFB(){
  try{
    const fbUsers=await fbLeer("usuarios");
    if(!fbUsers||fbUsers.length===0) return false;
    const merged=[...USUARIOS];
    fbUsers.forEach(fb=>{
      if(!fb.id||!fb.rol) return;
      const idx=merged.findIndex(u=>u.id===fb.id);
      const defIcon=fb.rol==="agente"?"🧑‍💼":fb.rol==="jefe"?"🏆":fb.rol==="director"?"📊":fb.rol==="ceo"?"👑":"👤";
      if(idx>=0){
        merged[idx]={...merged[idx],...fb,icon:fb.icon||merged[idx].icon||defIcon};
      }else{
        merged.push({...fb,icon:fb.icon||defIcon});
      }
    });
    USUARIOS=merged;
    console.log("✅ USUARIOS cargados desde Firebase:",USUARIOS.length,"("+fbUsers.length+" de FB)");
    return true;
  }catch(e){
    console.warn("⚠️ USUARIOS: usando seed local, Firebase falló:",e.message);
    return false;
  }
}

// ── Normalizar cliente desde Firebase (distintos esquemas de campo) ──
// Soporta campos en MAYÚSCULAS, minúsculas o camelCase
function normCliente(c){
  if(!c) return c;
  var n=c.NOMBRE||c.nombre||c.name||c.razonSocial||c.RAZON_SOCIAL||c.cliente||'';
  var id=c.id||c.ID||c.CODIGO||c.codigo||c.code||c.COD_CLIENTE||n;
  var tel=c.TEL||c.tel||c.TELEFONO||c.telefono||c.phone||c.PHONE||'';
  var dir=c.DIR||c.dir||c.DIRECCION||c.direccion||c.address||c.ADDRESS||c.LOCALIDAD||c.localidad||'';
  // Firebase usa "semanas" (array) o "semana" (número) como campo de ruta
  var semanaRaw=c.semana||c.SEMANA||(Array.isArray(c.semanas)&&c.semanas.length>0?c.semanas[0]:null)||c.ruta||c.RUTA||0;
  var ruta=Number(semanaRaw)||0;
  var agente=c.AGENTE||c.agente||c.VENDEDOR||c.vendedor||c.agenteId||'';
  return Object.assign({},c,{
    id:String(id), nombre:n, tel:tel, dir:dir,
    ruta:Number(ruta)||0, agente:agente,
    _raw:c
  });
}

// Todos los componentes leen/escriben aquí → los cambios de CEO llegan al jefe
// sin necesidad de Firebase
let _estrategiasGlobal = [...ESTRATEGIAS_SEED];
let _listeners = [];

const GlobalStore = {
  getEstrategias: () => _estrategiasGlobal,
  setEstrategias: (data) => {
    _estrategiasGlobal = data;
    _listeners.forEach(fn => fn(data));
  },
  updateEstrategia: (id, updater) => {
    _estrategiasGlobal = _estrategiasGlobal.map(e => e.id === id ? updater(e) : e);
    _listeners.forEach(fn => fn(_estrategiasGlobal));
  },
  subscribe: (fn) => {
    _listeners.push(fn);
    return () => { _listeners = _listeners.filter(f => f !== fn); };
  },
};

function SearchInput({value, onChange, placeholder, suggestions=[], onSelect, style={}, disabled=false}){
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);

  React.useEffect(()=>{
    const handler=(e)=>{ if(ref.current&&!ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", handler);
    return ()=>document.removeEventListener("mousedown", handler);
  },[]);

  return(
    <div ref={ref} style={{position:"relative",...style}}>
      <div style={{position:"relative",display:"flex",alignItems:"center"}}>
        <span style={{position:"absolute",left:12,color:"#94A3B8",fontSize:14,pointerEvents:"none"}}>🔍</span>
        <input
          value={value}
          onChange={e=>{onChange(e.target.value);setOpen(true);}}
          onFocus={()=>setOpen(true)}
          placeholder={placeholder}
          disabled={disabled}
          style={{width:"100%",padding:"10px 12px 10px 36px",borderRadius:9,
            border:"1.5px solid #E2E8F0",fontSize:13,outline:"none",
            boxSizing:"border-box",fontFamily:"inherit",background:"#fff"}}
        />
        {value&&(
          <button onClick={()=>{onChange("");setOpen(false);}}
            style={{position:"absolute",right:10,background:"none",border:"none",
              cursor:"pointer",color:"#94A3B8",fontSize:16,padding:0}}>×</button>
        )}
      </div>
      {open&&suggestions.length>0&&(
        <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,
          background:"#fff",borderRadius:10,border:"1px solid #E2E8F0",
          boxShadow:"0 8px 24px rgba(0,0,0,.12)",zIndex:200,
          maxHeight:220,overflowY:"auto"}}>
          {suggestions.slice(0,8).map((s,i)=>(
            <div key={i} onClick={()=>{onSelect(s);setOpen(false);}}
              style={{padding:"10px 14px",cursor:"pointer",fontSize:13,
                borderBottom:i<Math.min(suggestions.length,8)-1?"1px solid #F1F5F9":"none",
                display:"flex",alignItems:"center",gap:10}}
              onMouseEnter={e=>e.currentTarget.style.background="#F8FAFC"}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <span style={{fontSize:14,flexShrink:0}}>
                {s.tipo==="cliente"?"🏢":s.tipo==="producto"?"📦":"📋"}
              </span>
              <div style={{flex:1,minWidth:0}}>
                <p style={{margin:0,fontSize:13,fontWeight:600,color:"#0F172A",
                  overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.label}</p>
                {s.sub&&<p style={{margin:0,fontSize:11,color:"#94A3B8"}}>{s.sub}</p>}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function DashAgente({usuario, onNav, oportunidadesDB, clientesFB}){
  const {id,equipo,color}=usuario;
  const opsBD=oportunidadesDB||OPORTUNIDADES_SEED;
  // Usar clientes reales de Firebase, fallback a seed
  const misClientes=clientesFB&&clientesFB.length>0 ? clientesFB : (CLIENTES_POR_AGENTE[id]||[]);
  const mPend=MUESTRAS_SEED.filter(m=>m.estado==="pendiente"&&m.agente===id).length;
  const mCurso=MUESTRAS_SEED.filter(m=>m.agente===id).length;
  const ePend=ESTRATEGIAS_SEED.filter(e=>e.estado==="en_curso"&&e.agente===id).length;
  // Usar datos reales de Firebase — acepta tanto campo agente como agenteId
  const misOps=opsBD.filter(o=>(o.agente===id||o.agenteId===id)&&
    !["ganada","perdida","cerrada_ganada","cerrada_perdida"].some(e=>o.etapa===e||o.estado===e));
  const misProy=PROYECTOS_SEED.filter(p=>p.estado==="activo"&&p.equipo?.includes(id));
  const misInc=INCIDENCIAS_SEED.filter(i=>i.autor===id&&i.estado==="abierta");
  const totalSem=misClientes.length,visitados=Math.min(totalSem,8),pendVisita=totalSem-visitados;
  const semana=getSemanaISO();

  // Leer datos del agente desde AGENTES_DATA (poblado desde Firebase al arrancar)
  // Match flexible: por id, por grupoAgente (del portal), o por nombre
  const _ag=AGENTES_DATA.find(a=>a.id===usuario.id)
    || AGENTES_DATA.find(a=>usuario.grupoAgente && a.id===usuario.grupoAgente.toLowerCase())
    || AGENTES_DATA.find(a=>usuario.catalogoVendedor && a.id===usuario.catalogoVendedor.toLowerCase())
    || AGENTES_DATA.find(a=>usuario.nombre && a.nombre.toLowerCase()===usuario.nombre.toLowerCase())
    || {};
  const vMes   =_ag.vMes   ||0, vMesObj   =_ag.oMes   ||0;
  const mbMes  =_ag.mb     ||0, mbMesObj  =_ag.oMb    ||0;
  const vAnual =_ag.vAnual ||0, vAnualObj =_ag.oAnual ||0;
  const mbAnual=_ag.mb     ||0, mbAnualObj=_ag.oMb    ||0;
  // Guard: si objetivo=0 devuelve 0% en vez de NaN% (evita 0/0)
  const pctVM=vMesObj>0?Math.round(vMes/vMesObj*100):0;
  const pctVA=vAnualObj>0?Math.round(vAnual/vAnualObj*100):0;
  const pctMM=mbMesObj>0?Math.round(mbMes/mbMesObj*100):0;
  const pctMA=mbAnualObj>0?Math.round(mbAnual/mbAnualObj*100):0;

  // Anillo SVG de progreso
  const Ring=({pct,size=56,stroke=5})=>{
    const r=size/2-stroke;
    const circ=2*Math.PI*r;
    const fill=circ*(1-Math.min(pct,100)/100);
    const c=pct>=100?"#22C55E":pct>=80?"#F59E0B":"#EF4444";
    return(
      <svg width={size} height={size} style={{flexShrink:0,transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#E2E8F0" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={c} strokeWidth={stroke}
          strokeDasharray={circ} strokeDashoffset={fill}
          strokeLinecap="round" style={{transition:"stroke-dashoffset .8s ease"}}/>
      </svg>
    );
  };

  // Tarjeta métrica con anillo
  const MetricCard=({label,value,obj,pct,suffix="",note})=>{
    const c=pct>=100?"#22C55E":pct>=80?"#F59E0B":"#EF4444";
    return(
      <div style={{flex:1,background:"#fff",borderRadius:16,padding:"18px 16px",
        border:"1px solid #E2E8F0",
        boxShadow:"0 1px 3px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.06)"}}>
        <p style={{margin:"0 0 12px",fontSize:10,fontWeight:700,color:"#94A3B8",
          textTransform:"uppercase",letterSpacing:".1em"}}>{label}</p>
        <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:14}}>
          <div style={{position:"relative",flexShrink:0}}>
            <Ring pct={pct}/>
            <span style={{position:"absolute",top:"50%",left:"50%",
              transform:"translate(-50%,-50%) rotate(0deg)",
              fontSize:11,fontWeight:800,color:c}}>{pct}%</span>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <p style={{margin:0,fontSize:24,fontWeight:800,color:"#0F172A",
              letterSpacing:"-0.03em",lineHeight:1}}>
              {typeof value==="number"&&value>999?fmt(value):value}{suffix}
            </p>
            <p style={{margin:"3px 0 0",fontSize:11,color:"#94A3B8"}}>
              obj. {typeof obj==="number"&&obj>999?fmt(obj):obj}{suffix}
            </p>
          </div>
        </div>
        <div style={{height:2,borderRadius:99,background:"#F1F5F9",overflow:"hidden"}}>
          <div style={{height:"100%",width:`${Math.min(pct,100)}%`,borderRadius:99,
            background:c,transition:"width .8s ease"}}/>
        </div>
        {note&&<p style={{margin:"8px 0 0",fontSize:10,color:"#94A3B8"}}>{note}</p>}
      </div>
    );
  };

  // Config módulos pendientes
  const MODS=[
    {icon:"🎯",label:"Estrategias en curso",sub:"Registra el avance semanal",count:ePend,nav:"estrategias",bg:"#EFF6FF",ic:"#3B82F6"},
    {icon:"📁",label:"Proyectos activos",sub:misProy.map(p=>p.nombre).join(", ")||"",count:misProy.length,nav:"proyectos",bg:"#FFFBEB",ic:"#D97706"},
    {icon:"💼",label:"Oportunidades abiertas",sub:`${fmt(misOps.reduce((s,o)=>s+(o.valor||0),0))}€ en pipeline`,count:misOps.length,nav:"oportunidades",bg:"#F0F9FF",ic:"#0EA5E9"},
    {icon:"🚨",label:"Incidencias abiertas",sub:"Pendientes de resolución",count:misInc.length,nav:"incidencias",bg:"#FFF1F2",ic:"#F43F5E",urgent:true},
    {icon:"📦",label:"Muestras en curso",sub:`${mCurso} muestra${mCurso!==1?"s":""} activa${mCurso!==1?"s":""}`,count:mCurso,nav:"muestras",bg:"#F5F3FF",ic:"#7C3AED"},
  ].filter(m=>m.count>0);

  const hayPend=MODS.length>0||totalSem>0;

  return(
    <div style={{background:"#F1F5F9",minHeight:"100vh",paddingBottom:100}}>
      <style>{`
        @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .pend-row:hover{background:#F8FAFC!important}
      `}</style>

      {/* ══ HEADER ══ */}
      <div style={{background:"linear-gradient(135deg,#0F172A 0%,#1E293B 60%,#1E3A5F 100%)",
        padding:"32px 20px 28px",position:"relative",overflow:"hidden"}}>
        {/* Círculos decorativos */}
        <div style={{position:"absolute",right:-40,top:-40,width:180,height:180,borderRadius:"50%",background:"rgba(255,255,255,.03)"}}/>
        <div style={{position:"absolute",right:40,bottom:-60,width:120,height:120,borderRadius:"50%",background:"rgba(255,255,255,.04)"}}/>
        <div style={{position:"absolute",left:-20,bottom:-20,width:100,height:100,borderRadius:"50%",background:"rgba(99,102,241,.1)"}}/>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
          <div>
            {/* Pastillas */}
            <div style={{display:"flex",gap:6,marginBottom:10}}>
              <span style={{background:"rgba(255,255,255,.1)",color:"rgba(255,255,255,.7)",
                fontSize:10,fontWeight:700,padding:"3px 10px",borderRadius:99,
                letterSpacing:".08em",textTransform:"uppercase"}}>{equipo}</span>
              <span style={{background:"rgba(99,102,241,.3)",color:"#A5B4FC",
                fontSize:10,fontWeight:700,padding:"3px 10px",borderRadius:99}}>Sem. {semana}</span>
            </div>
            <p style={{margin:0,fontSize:26,fontWeight:800,color:"#FFFFFF",
              letterSpacing:"-0.03em",lineHeight:1.1}}>
              {usuario.nombre.split(" ").slice(0,2).join(" ")}
            </p>
          </div>

          {/* Mini-tarjeta % mes */}
          <div style={{background:"rgba(255,255,255,.08)",backdropFilter:"blur(8px)",
            border:"1px solid rgba(255,255,255,.12)",borderRadius:14,
            padding:"12px 16px",textAlign:"center",flexShrink:0}}>
            <p style={{margin:"0 0 2px",fontSize:9,fontWeight:700,color:"rgba(255,255,255,.5)",
              textTransform:"uppercase",letterSpacing:".1em"}}>Este mes</p>
            <p style={{margin:0,fontSize:28,fontWeight:900,lineHeight:1,
              color:pctVM>=100?"#4ADE80":pctVM>=80?"#FCD34D":"#FB7185"}}>{pctVM}%</p>
            <p style={{margin:"2px 0 0",fontSize:9,color:"rgba(255,255,255,.4)"}}>del objetivo</p>
          </div>
        </div>

        {/* Barra progreso ventas mes */}
        <div style={{marginBottom:6}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <span style={{fontSize:11,color:"rgba(255,255,255,.5)"}}>Ventas mes</span>
            <span style={{fontSize:11,color:"rgba(255,255,255,.7)",fontWeight:600}}>
              {fmt(vMes)}€ / {fmt(vMesObj)}€
            </span>
          </div>
          <div style={{height:4,borderRadius:99,background:"rgba(255,255,255,.12)",overflow:"hidden"}}>
            <div style={{height:"100%",width:`${Math.min(pctVM,100)}%`,borderRadius:99,
              background:pctVM>=100?"#4ADE80":pctVM>=80?"#FCD34D":"#FB7185",
              transition:"width .8s ease"}}/>
          </div>
        </div>
      </div>

      {/* ══ CONTENIDO ══ */}
      <div style={{padding:"20px 16px 0"}}>

        {/* ── Mi semana — acceso rápido ── */}
        <div onClick={()=>onNav("clientes")}
          style={{background:"#fff",borderRadius:16,padding:"14px 18px",
            marginBottom:20,cursor:"pointer",
            border:`1px solid ${T.border}`,
            boxShadow:"0 2px 12px rgba(0,0,0,.06)",
            display:"flex",gap:14,alignItems:"center"}}>
          <div style={{width:46,height:46,borderRadius:13,
            background:"linear-gradient(135deg,#0F172A,#334155)",
            display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:22,flexShrink:0}}>📋</div>
          <div style={{flex:1}}>
            <p style={{margin:"0 0 3px",fontSize:14,fontWeight:800,color:T.text}}>
              Mis clientes · Semana {semana}
            </p>
            <p style={{margin:"0 0 6px",fontSize:11,color:T.muted}}>
              {visitados} visitados · {pendVisita} por visitar · {totalSem} total
            </p>
            <div style={{height:3,borderRadius:99,background:T.border,overflow:"hidden"}}>
              <div style={{height:"100%",
                width:totalSem>0?`${Math.round(visitados/totalSem*100)}%`:"0%",
                borderRadius:99,background:visitados===totalSem&&totalSem>0?T.green:T.blue}}/>
            </div>
          </div>
          <span style={{color:T.muted,fontSize:20,flexShrink:0}}>›</span>
        </div>

        {/* — 1. Este mes — */}
        <p style={{margin:"0 0 10px",fontSize:10,fontWeight:700,color:"#64748B",
          textTransform:"uppercase",letterSpacing:".12em"}}>Este mes</p>
        <div style={{display:"flex",gap:10,marginBottom:12,animation:"fadeUp .4s ease"}}>
          <MetricCard label="Ventas" value={vMes} obj={vMesObj} pct={pctVM} suffix="€"/>
          <MetricCard label="Margen bruto" value={mbMes} obj={mbMesObj} pct={pctMM} suffix="%"/>
        </div>
        {/* Promo + Liquidación + Σ Total (valores del mes del agente logueado) */}
        {(()=>{
          const ag=AGENTES_DATA.find(a=>a.id===usuario.id)
            || AGENTES_DATA.find(a=>usuario.grupoAgente && a.id===usuario.grupoAgente.toLowerCase())
            || AGENTES_DATA.find(a=>usuario.catalogoVendedor && a.id===usuario.catalogoVendedor.toLowerCase())
            || AGENTES_DATA.find(a=>usuario.nombre && a.nombre.toLowerCase()===usuario.nombre.toLowerCase())
            ||{promoMes:0,oPromoMes:0,liqMes:0,oLiqMes:0};
          const promoR=ag.promoMes, promoO=ag.oPromoMes;
          const liqR=ag.liqMes,     liqO=ag.oLiqMes;
          const totalPL=promoR+liqR, totalPLObj=promoO+liqO;
          const pctP=promoO>0?Math.round(promoR/promoO*100):0;
          const pctL=liqO>0?Math.round(liqR/liqO*100):0;
          const pctT=totalPLObj>0?Math.round(totalPL/totalPLObj*100):0;
          return(
            <div style={{display:"flex",gap:8,marginBottom:22}}>
              {[
                {l:"🎯 Promoción",  v:`${fmt(promoR)}€`,  sub:`obj. ${fmt(promoO)}€`,    c:PL_COLOR(pctP)},
                {l:"📋 Liquidación",v:`${fmt(liqR)}€`,    sub:`obj. ${fmt(liqO)}€`,      c:PL_COLOR(pctL)},
                {l:"Σ Total",       v:`${fmt(totalPL)}€`, sub:`obj. ${fmt(totalPLObj)}€`,c:PL_COLOR(pctT)},
              ].map(k=>(
                <div key={k.l} style={{flex:1,background:"#F8FAFC",borderRadius:10,
                  padding:"10px 12px",border:"1px solid #E2E8F0"}}>
                  <p style={{margin:"0 0 2px",fontSize:9,color:"#94A3B8",textTransform:"uppercase",fontWeight:700}}>{k.l}</p>
                  <p style={{margin:0,fontSize:15,fontWeight:800,color:k.c}}>{k.v}</p>
                  <p style={{margin:0,fontSize:9,color:"#94A3B8"}}>{k.sub}</p>
                </div>
              ))}
            </div>
          );
        })()}

        {/* — 2. Año — */}
        <p style={{margin:"0 0 10px",fontSize:10,fontWeight:700,color:"#64748B",
          textTransform:"uppercase",letterSpacing:".12em"}}>Acumulado año</p>
        <div style={{display:"flex",gap:10,marginBottom:22,animation:"fadeUp .5s ease"}}>
          <MetricCard label="Ventas" value={vAnual} obj={vAnualObj} pct={pctVA} suffix="€"
            note={`Proy. ${fmt(Math.round(vAnual/semana*52))}€ anuales`}/>
          <MetricCard label="Margen bruto" value={mbAnual} obj={mbAnualObj} pct={pctMA} suffix="%"
            note={`${mbAnual>=mbAnualObj?"+":""}${(mbAnual-mbAnualObj).toFixed(1)}pp vs obj.`}/>
        </div>

        {/* — Hitos de proyecto asignados — */}
        <HitosProyectoWidget usuario={usuario} onNav={onNav}/>

        {/* — 3. Acciones urgentes — */}
        <TareasWidget onNav={onNav} usuario={usuario}/>

        {/* — 4. Pendientes — */}
        {hayPend&&(
          <>
            <p style={{margin:"0 0 10px",fontSize:10,fontWeight:700,color:"#64748B",
              textTransform:"uppercase",letterSpacing:".12em"}}>Pendientes</p>
            <div style={{background:"#fff",borderRadius:16,overflow:"hidden",
              border:"1px solid #E2E8F0",
              boxShadow:"0 1px 3px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.06)",
              marginBottom:22,animation:"fadeUp .6s ease"}}>

              {MODS.map((m,i)=>(
                <div key={m.nav} className="pend-row" onClick={()=>onNav(m.nav)}
                  style={{display:"flex",alignItems:"center",gap:14,padding:"14px 16px",
                    borderBottom:i<MODS.length-(totalSem>0?0:1)||(i<MODS.length-1)?"1px solid #F1F5F9":"none",
                    cursor:"pointer",transition:"background .15s"}}>
                  <div style={{width:38,height:38,borderRadius:11,background:m.bg,
                    display:"flex",alignItems:"center",justifyContent:"center",
                    fontSize:18,flexShrink:0}}>{m.icon}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{margin:0,fontSize:13,fontWeight:600,color:"#0F172A"}}>{m.label}</p>
                    {m.sub&&<p style={{margin:"2px 0 0",fontSize:11,color:"#94A3B8",
                      overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.sub}</p>}
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                    <span style={{fontSize:12,fontWeight:800,color:m.urgent?"#F43F5E":m.ic,
                      background:m.bg,borderRadius:99,
                      padding:"3px 10px",minWidth:24,textAlign:"center"}}>{m.count}</span>
                    <span style={{color:"#CBD5E1",fontSize:16,fontWeight:300}}>›</span>
                  </div>
                </div>
              ))}

              {/* Clientes semana */}
              {totalSem>0&&(
                <div style={{display:"flex",alignItems:"center",gap:14,padding:"14px 16px"}}>
                  <div style={{width:38,height:38,borderRadius:11,background:"#F0FDF4",
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>👥</div>
                  <div style={{flex:1}}>
                    <p style={{margin:0,fontSize:13,fontWeight:600,color:"#0F172A"}}>Clientes esta semana</p>
                    <p style={{margin:"2px 0 5px",fontSize:11,color:"#94A3B8"}}>
                      {visitados} visitados · {pendVisita} pendientes · {totalSem} total
                    </p>
                    <div style={{height:3,borderRadius:99,background:"#F1F5F9",overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${Math.round(visitados/totalSem*100)}%`,
                        borderRadius:99,background:"#22C55E",transition:"width .8s"}}/>
                    </div>
                  </div>
                  <span style={{fontSize:12,fontWeight:800,color:"#22C55E",
                    background:"#F0FDF4",borderRadius:99,padding:"3px 10px",flexShrink:0}}>
                    {Math.round(visitados/totalSem*100)}%
                  </span>
                </div>
              )}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ─── PASO MUESTRAS con buscador de producto y cliente ────────────
function MuestrasStep({muestras,onAdd,onDel,onEdit,clientes,onBack,onNext,color}){
  const [show,setShow]=useState(false);
  const [editId,setEditId]=useState(null); // null = nueva, string = editando
  const [form,setForm]=useState({prodCodigo:"",prodNombre:"",tipo:"Deshidratada",cantidad:"",clienteNombre:"",obs:""});
  const [qProd,setQProd]=useState("");
  const [showProd,setShowProd]=useState(false);
  const [qCli,setQCli]=useState("");
  const [showCli,setShowCli]=useState(false);

  const prodResults=useMemo(()=>{
    if(!qProd||qProd.length<2) return [];
    const q=qProd.toLowerCase();
    return PRODUCTOS_LOCAL.filter(p=>(p.codigo||"").toLowerCase().includes(q)||(p.nombre||"").toLowerCase().includes(q)).slice(0,20);
  },[qProd]);

  const cliResults=useMemo(()=>{
    if(!qCli||qCli.length<2) return [];
    const q=qCli.toLowerCase();
    return clientes.filter(c=>c.nombre.toLowerCase().includes(q)).slice(0,15);
  },[qCli,clientes]);

  const openNueva=()=>{
    setEditId(null);
    setForm({prodCodigo:"",prodNombre:"",tipo:"Deshidratada",cantidad:"",clienteNombre:"",obs:""});
    setQProd(""); setQCli(""); setShowProd(false); setShowCli(false);
    setShow(true);
  };

  const openEditar=(m)=>{
    setEditId(m.id);
    setForm({prodCodigo:m.prodCodigo||"",prodNombre:m.prodNombre,tipo:m.tipo,cantidad:m.cantidad,clienteNombre:m.clienteNombre,obs:m.obs||""});
    setQProd(""); setQCli(""); setShowProd(false); setShowCli(false);
    setShow(true);
  };

  const guardar=()=>{
    if(!form.prodNombre||!form.clienteNombre) return;
    if(editId){
      // Editar existente
      onEdit({id:editId,prodCodigo:form.prodCodigo,prodNombre:form.prodNombre,tipo:form.tipo,cantidad:form.cantidad||"1",clienteNombre:form.clienteNombre,obs:form.obs});
    } else {
      // Nueva
      onAdd({id:`m${Date.now()}`,prodCodigo:form.prodCodigo,prodNombre:form.prodNombre,tipo:form.tipo,cantidad:form.cantidad||"1",clienteNombre:form.clienteNombre,obs:form.obs});
    }
    setForm({prodCodigo:"",prodNombre:"",tipo:"Deshidratada",cantidad:"",clienteNombre:"",obs:""});
    setShow(false); setEditId(null); setQProd(""); setQCli("");
  };

  const ISt={width:"100%",border:`1.5px solid ${T.border}`,borderRadius:10,padding:"11px 12px",fontSize:13,outline:"none",boxSizing:"border-box"};

  return(
    <div>
      <p style={{margin:"0 0 4px",fontSize:17,fontWeight:800,color:T.text}}>📦 Muestras entregadas</p>
      <p style={{margin:"0 0 16px",fontSize:12,color:T.muted}}>Registra las muestras que has dejado esta semana</p>

      {muestras.map(m=>(
        <div key={m.id} style={{display:"flex",gap:12,alignItems:"center",padding:"12px 16px",
          background:"#FFF",borderRadius:12,border:`1px solid ${T.border}`,marginBottom:8,
          borderLeft:editId===m.id?`3px solid ${T.blue}`:undefined}}>
          <div style={{flex:1,minWidth:0}}>
            {m.prodCodigo&&<p style={{margin:0,fontSize:10,fontFamily:"monospace",color:T.blue,fontWeight:700}}>{m.prodCodigo}</p>}
            <p style={{margin:0,fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.prodNombre}</p>
            <p style={{margin:"2px 0 0",fontSize:11,color:T.muted}}>{m.tipo} · {m.cantidad} uds · {m.clienteNombre}</p>
            {m.obs&&<p style={{margin:"2px 0 0",fontSize:11,color:T.muted,fontStyle:"italic"}}>{m.obs}</p>}
          </div>
          <div style={{display:"flex",gap:6,flexShrink:0}}>
            <button onClick={()=>openEditar(m)}
              style={{background:T.blueL,border:"none",borderRadius:8,padding:"6px 10px",
                color:T.blue,fontSize:12,fontWeight:700,cursor:"pointer"}}>✏️</button>
            <button onClick={()=>onDel(m.id)}
              style={{background:T.redL,border:"none",borderRadius:8,padding:"6px 10px",
                color:T.red,fontSize:12,cursor:"pointer"}}>🗑</button>
          </div>
        </div>
      ))}

      {show&&(
        <div style={{background:T.bg,borderRadius:14,padding:"16px",border:`2px solid ${T.blue}`,marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <p style={{margin:0,fontSize:13,fontWeight:800,color:T.text}}>
              {editId?"✏️ Editar muestra":"📦 Nueva muestra"}
            </p>
            {editId&&<span style={{fontSize:11,color:T.blue,background:T.blueL,padding:"2px 10px",borderRadius:99,fontWeight:700}}>Editando</span>}
          </div>

          {/* Producto */}
          <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Producto *</p>
          <div style={{display:"flex",gap:6,marginBottom:4}}>
            <SearchInput
              value={form.prodNombre}
              onChange={v=>setForm(f=>({...f,prodNombre:v,prodCodigo:""}))}
              placeholder="🔍 Buscar producto o código..."
              suggestions={PRODUCTOS_LOCAL
                .filter(p=>form.prodNombre.length>=2&&((p.nombre||"").toLowerCase().includes(form.prodNombre.toLowerCase())||(p.codigo||"").toLowerCase().includes(form.prodNombre.toLowerCase())))
                .slice(0,8).map(p=>({label:p.nombre,sub:p.codigo+" · "+p.formato,tipo:"producto",obj:p}))}
              onSelect={s=>setForm(f=>({...f,prodNombre:s.label,prodCodigo:s.obj.codigo}))}
              style={{flex:1}}
            />

          {form.prodCodigo&&<p style={{margin:"0 0 6px",fontSize:10,color:T.blue,fontWeight:700,fontFamily:"monospace"}}>{form.prodCodigo}</p>}
          {false&&(
            <div style={{marginBottom:10,border:`1.5px solid ${T.blue}`,borderRadius:10,background:"#fff",overflow:"hidden"}}>

                </div>
                <button onClick={()=>{setShowProd(false);setQProd("");}} style={{background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:16}}>✕</button>

                {qProd.length<2&&<p style={{padding:"12px",fontSize:12,color:T.muted,margin:0}}>Escribe 2 letras para buscar…</p>}

                {prodResults.map(p=>(
                  <button key={p.codigo} onClick={()=>{setForm(f=>({...f,prodCodigo:p.codigo,prodNombre:p.nombre}));setShowProd(false);setQProd("");}}

                      <p style={{margin:0,fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.nombre}</p>

                    </div>
                    {p.precio&&<span style={{fontSize:11,fontWeight:700,color:T.green,flexShrink:0}}>{p.precio}€</span>}
                  </button>
                ))}

            </div>

              value={form.clienteNombre}

            />
            {showCli&&qCli.length>=2&&cliResults.length>0&&(
              <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,zIndex:50,
                background:"#fff",border:`1.5px solid ${T.blue}`,borderRadius:10,
                boxShadow:"0 4px 16px rgba(0,0,0,.1)",maxHeight:180,overflowY:"auto"}}>
                {cliResults.map(c=>(
                  <button key={c.id} onClick={()=>{setForm(f=>({...f,clienteNombre:c.nombre}));setQCli("");setShowCli(false);}}
                    style={{width:"100%",padding:"10px 14px",border:"none",borderBottom:`1px solid ${T.border}`,background:"transparent",cursor:"pointer",textAlign:"left"}}>
                    <p style={{margin:0,fontSize:13,fontWeight:600}}>{c.nombre}</p>
                    {c.dir&&<p style={{margin:0,fontSize:10,color:T.muted}}>📍 {c.dir}</p>}
                  </button>
                ))}
              </div>
            )}
          </div>

          {/* Observaciones */}
          <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Observaciones</p>
          <textarea value={form.obs} onChange={e=>setForm(f=>({...f,obs:e.target.value}))} rows={2}
            placeholder="Reacción del cliente, condiciones, próximos pasos…"
            style={{...ISt,resize:"none",lineHeight:1.5,marginBottom:12,fontFamily:"inherit"}}/>

          <div style={{display:"flex",gap:8}}>
            <Btn small outline color={T.muted} onClick={()=>{setShow(false);setEditId(null);setShowProd(false);setShowCli(false);}}>Cancelar</Btn>
            <Btn small full color={T.blue} onClick={guardar} disabled={!form.prodNombre||!form.clienteNombre}>
              {editId?"✓ Guardar cambios":"✓ Añadir"}
            </Btn>
          </div>
        </div>
      )}

      <button onClick={openNueva}
        style={{width:"100%",padding:"13px",borderRadius:12,border:`2px dashed ${T.blue}`,
          background:T.blueL,color:T.blue,fontWeight:700,fontSize:13,cursor:"pointer",marginBottom:16}}>
        + Añadir muestra entregada
      </button>
      <div style={{display:"flex",gap:8}}>
        <Btn onClick={onBack} outline color={T.muted}>← Atrás</Btn>
        <Btn full onClick={onNext} color={color}>Ver resumen →</Btn>
      </div>
    </div>
  );
}

// ─── PASO RECUPERACIÓN DE CLIENTES ──────────────────────────────
function RecuperacionStep({estrategias,onBack,onNext,color,uid,todosClientes}){
  const [tipo,setTipo]=useState(null);
  const [acciones,setAcciones]=useState([]);
  const [editId,setEditId]=useState(null);
  const [clienteNombre,setClienteNombre]=useState("");
  const [qCli,setQCli]=useState("");
  const [showCli,setShowCli]=useState(false);
  const [resultado,setResultado]=useState("");
  const [nota,setNota]=useState("");
  const [ofertas,setOfertas]=useState([]);
  const [qProd,setQProd]=useState("");
  const [showProd,setShowProd]=useState(false);
  const [formOf,setFormOf]=useState({codigo:"",nombre:"",precioBase:"",dto:"",nota:""});

  const cliResults=useMemo(()=>{
    if(qCli.length<2) return [];
    const q=qCli.toLowerCase();
    return (todosClientes||[]).filter(c=>c.nombre.toLowerCase().includes(q)).slice(0,12);
  },[qCli,todosClientes]);

  const prodResults=useMemo(()=>{
    if(qProd.length<2) return [];
    const q=qProd.toLowerCase();
    return PRODUCTOS_LOCAL.filter(p=>(p.codigo||"").toLowerCase().includes(q)||(p.nombre||"").toLowerCase().includes(q)).slice(0,20);
  },[qProd]);

  const precioFinal=useMemo(()=>{
    if(!formOf.precioBase) return "";
    const base=parseFloat(formOf.precioBase.replace(",","."));
    if(isNaN(base)) return "";
    if(formOf.dto){const dto=parseFloat(formOf.dto);return isNaN(dto)?base.toFixed(2):(base*(1-dto/100)).toFixed(2);}
    return base.toFixed(2);
  },[formOf.precioBase,formOf.dto]);

  const RESULTADO_OPS=[
    {k:"contactado", label:"📞 Contactado",      color:T.blue},
    {k:"visita",     label:"👋 Visita realizada", color:T.amber},
    {k:"pedido",     label:"✅ ¡Ha pedido!",      color:T.green},
    {k:"sin_avance", label:"⏸ Sin avance",       color:T.muted},
  ];

  const resetForm=()=>{
    setTipo(null);setEditId(null);setClienteNombre("");setQCli("");setShowCli(false);
    setResultado("");setNota("");setOfertas([]);
    setFormOf({codigo:"",nombre:"",precioBase:"",dto:"",nota:""});setQProd("");setShowProd(false);
  };

  const addOferta=()=>{
    if(!formOf.nombre.trim()) return;
    setOfertas(p=>[...p,{...formOf,precioFinal,id:`of${Date.now()}`}]);
    setFormOf({codigo:"",nombre:"",precioBase:"",dto:"",nota:""});
    setQProd(""); setShowProd(false);
  };

  const guardar=()=>{
    if(!clienteNombre.trim()) return;
    const acc={
      id:editId||`acc${Date.now()}`,
      tipo,clienteNombre:clienteNombre.trim(),
      resultado,nota,ofertas,semana:14,agente:uid,
    };
    if(editId) setAcciones(a=>a.map(x=>x.id===editId?acc:x));
    else setAcciones(a=>[...a,acc]);
    resetForm();
  };

  const ISt={width:"100%",border:`1.5px solid ${T.border}`,borderRadius:10,
    padding:"11px 12px",fontSize:13,outline:"none",boxSizing:"border-box"};

  // ── Formulario ────────────────────────────────────────────────────
  if(tipo){
    const ac=tipo==="nuevo"?T.green:T.blue;
    const ai=tipo==="nuevo"?"🌱":"🔄";
    return(
      <div>
        <BackBar label="Recuperación" onBack={resetForm}/>
        <p style={{margin:"0 0 20px",fontSize:16,fontWeight:800,color:T.text}}>
          {ai} {editId?"Editar":"Nueva"} — {tipo==="nuevo"?"Cliente nuevo":"Recuperar cliente"}
        </p>

        {/* Cliente con autocomplete */}
        <div style={{marginBottom:14,position:"relative"}}>
          <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Cliente *</p>
          <input value={clienteNombre}
            onChange={e=>{setClienteNombre(e.target.value);setQCli(e.target.value);setShowCli(true);}}
            onFocus={()=>setShowCli(true)}
            placeholder="Busca o escribe el nombre del cliente…" style={ISt}/>
          {showCli&&qCli.length>=2&&cliResults.length>0&&(
            <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,zIndex:50,
              background:"#fff",border:`1.5px solid ${ac}`,borderRadius:10,
              boxShadow:"0 4px 16px rgba(0,0,0,.1)",maxHeight:180,overflowY:"auto"}}>
              {cliResults.map(c=>(
                <button key={c.id} onClick={()=>{setClienteNombre(c.nombre);setQCli("");setShowCli(false);}}
                  style={{width:"100%",padding:"10px 14px",border:"none",
                    borderBottom:`1px solid ${T.border}`,background:"transparent",
                    cursor:"pointer",textAlign:"left"}}>
                  <p style={{margin:0,fontSize:13,fontWeight:600,color:T.text}}>{c.nombre}</p>
                  {c.dir&&<p style={{margin:0,fontSize:10,color:T.muted}}>📍 {c.dir}</p>}
                </button>
              ))}
            </div>
          )}
        </div>

        {/* Resultado — solo al editar una acción existente */}
        {editId&&(<>
          <p style={{margin:"0 0 8px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Resultado final</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
            {RESULTADO_OPS.map(r=>(
              <button key={r.k} onClick={()=>setResultado(r.k)}
                style={{padding:"8px 12px",borderRadius:9,cursor:"pointer",fontSize:12,
                  border:`2px solid ${resultado===r.k?r.color:T.border}`,
                  background:resultado===r.k?r.color+"15":"transparent",
                  color:resultado===r.k?r.color:T.muted,
                  fontWeight:resultado===r.k?700:400}}>
                {r.label}
              </button>
            ))}
          </div>
        </>)}

        {/* Nota */}
        <div style={{marginBottom:18}}>
          <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Nota / comentario</p>
          <textarea value={nota} onChange={e=>setNota(e.target.value)} rows={2}
            placeholder="Qué se habló, interés del cliente, próximos pasos…"
            style={{...ISt,resize:"none",lineHeight:1.5,fontFamily:"inherit"}}/>
        </div>

        {/* ── OFERTAS DE PRODUCTO ── */}
        <div style={{marginBottom:20}}>
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:10}}>
            <p style={{margin:0,fontSize:12,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>🏷️ Ofertas de precio</p>
            {ofertas.length>0&&<span style={{background:ac,color:"#fff",borderRadius:99,
              fontSize:10,fontWeight:800,padding:"2px 8px"}}>{ofertas.length}</span>}
          </div>

          {/* Ofertas añadidas */}
          {ofertas.map(o=>(
            <div key={o.id} style={{background:"#FFF",border:`1px solid ${T.border}`,
              borderLeft:`3px solid ${ac}`,
              borderRadius:11,padding:"11px 14px",marginBottom:8,display:"flex",gap:10,alignItems:"center"}}>
              <div style={{flex:1}}>
                {o.codigo&&<p style={{margin:0,fontSize:10,fontFamily:"monospace",color:ac,fontWeight:700}}>{o.codigo}</p>}
                <p style={{margin:0,fontSize:13,fontWeight:700}}>{o.nombre}</p>
                <div style={{display:"flex",gap:8,marginTop:3,alignItems:"center",flexWrap:"wrap"}}>
                  {o.precioBase&&<span style={{fontSize:12,color:T.muted,
                    textDecoration:o.dto?"line-through":"none"}}>{o.precioBase}€/kg</span>}
                  {o.dto&&<span style={{fontSize:12,fontWeight:700,color:T.red}}>-{o.dto}%</span>}
                  {o.precioFinal&&o.dto&&(
                    <span style={{fontSize:13,fontWeight:800,color:T.green}}>→ {o.precioFinal}€/kg</span>
                  )}
                  {!o.dto&&o.precioFinal&&<span style={{fontSize:13,fontWeight:700,color:T.green}}>{o.precioFinal}€/kg</span>}
                </div>
                {o.nota&&<p style={{margin:"3px 0 0",fontSize:11,color:T.muted,fontStyle:"italic"}}>{o.nota}</p>}
              </div>
              <button onClick={()=>setOfertas(p=>p.filter(x=>x.id!==o.id))}
                style={{background:"none",border:"none",cursor:"pointer",color:T.red,fontSize:18,flexShrink:0}}>🗑</button>
            </div>
          ))}

          {/* Formulario nueva oferta */}
          <div style={{background:T.bg,borderRadius:12,padding:"14px",border:`1.5px dashed ${ac}66`}}>
            {/* Buscador producto */}
            <div style={{display:"flex",gap:6,marginBottom:6}}>
              <SearchInput
                value={formOf.nombre}
                onChange={v=>setFormOf(f=>({...f,nombre:v,codigo:"",precioBase:""}))}
                placeholder="🔍 Buscar producto..."
                suggestions={PRODUCTOS_LOCAL
                  .filter(p=>formOf.nombre.length>=2&&((p.nombre||"").toLowerCase().includes(formOf.nombre.toLowerCase())||(p.codigo||"").toLowerCase().includes(formOf.nombre.toLowerCase())))
                  .slice(0,8).map(p=>({label:p.nombre,sub:p.codigo+" · "+p.precio+"€/kg",tipo:"producto",obj:p}))}
                onSelect={s=>setFormOf(f=>({...f,nombre:s.label,codigo:s.obj.codigo,precioBase:s.obj.precio}))}
                style={{flex:1}}
              />
            </div>
            {formOf.codigo&&<p style={{margin:"0 0 6px",fontSize:10,color:ac,fontWeight:700,fontFamily:"monospace"}}>{formOf.codigo}</p>}

            {/* Dropdown resultados */}
            {showProd&&(
              <div style={{border:`1.5px solid ${ac}`,borderRadius:9,background:"#FFF",
                overflow:"hidden",marginBottom:8}}>
                <input value={qProd} onChange={e=>setQProd(e.target.value)} autoFocus
                  placeholder="Buscar por nombre o código…"
                  style={{...ISt,padding:"8px 10px",borderRadius:0,border:"none",
                    borderBottom:`1px solid ${T.border}`}}/>
                <div style={{maxHeight:180,overflowY:"auto"}}>
                  {qProd.length<2&&<p style={{padding:"10px",fontSize:12,color:T.muted,margin:0}}>Escribe 2 letras para buscar…</p>}
                  {qProd.length>=2&&prodResults.length===0&&<p style={{padding:"10px",fontSize:12,color:T.muted,margin:0}}>Sin resultados</p>}
                  {prodResults.map(p=>(
                    <button key={p.codigo}
                      onClick={()=>{setFormOf(f=>({...f,codigo:p.codigo,nombre:p.nombre,precioBase:p.precio||""}));setShowProd(false);setQProd("");}}
                      style={{width:"100%",padding:"10px 14px",border:"none",
                        borderBottom:`1px solid ${T.border}`,background:"transparent",
                        cursor:"pointer",textAlign:"left",display:"flex",gap:10,alignItems:"center"}}>
                      <div style={{flex:1,minWidth:0}}>
                        <p style={{margin:0,fontSize:13,fontWeight:600,
                          overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.nombre}</p>
                        <p style={{margin:0,fontSize:10,color:T.muted}}>{p.codigo} · {p.cat}</p>
                      </div>
                      {p.precio&&<span style={{fontSize:12,fontWeight:700,color:T.green,flexShrink:0}}>{p.precio}€/kg</span>}
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* Precio base + descuento */}
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <div style={{flex:1}}>
                <p style={{margin:"0 0 4px",fontSize:10,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Precio tarifa €/kg</p>
                <input value={formOf.precioBase}
                  onChange={e=>setFormOf(f=>({...f,precioBase:e.target.value}))}
                  placeholder="0,00" style={{...ISt,padding:"10px 12px"}}/>
              </div>
              <div style={{flex:1}}>
                <p style={{margin:"0 0 4px",fontSize:10,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Descuento %</p>
                <input type="number" value={formOf.dto}
                  onChange={e=>setFormOf(f=>({...f,dto:e.target.value}))}
                  placeholder="0" style={{...ISt,padding:"10px 12px"}}/>
              </div>
            </div>

            {/* Precio final calculado */}
            {precioFinal&&(
              <div style={{background:T.greenL,borderRadius:9,padding:"9px 14px",
                marginBottom:8,display:"flex",gap:10,alignItems:"center"}}>
                <span style={{fontSize:16}}>✓</span>
                <div>
                  <p style={{margin:0,fontSize:14,fontWeight:800,color:T.green}}>
                    Precio oferta: {precioFinal}€/kg
                  </p>
                  {formOf.dto&&<p style={{margin:0,fontSize:11,color:T.green}}>
                    Descuento del {formOf.dto}% sobre tarifa {formOf.precioBase}€/kg
                  </p>}
                </div>
              </div>
            )}

            <input value={formOf.nota} onChange={e=>setFormOf(f=>({...f,nota:e.target.value}))}
              placeholder="Nota de la oferta (opcional)" style={{...ISt,marginBottom:8}}/>

            <button onClick={addOferta} disabled={!formOf.nombre.trim()}
              style={{width:"100%",padding:"11px",borderRadius:9,border:"none",
                background:formOf.nombre.trim()?ac:"#CBD5E1",
                color:"#fff",fontWeight:700,fontSize:13,
                cursor:formOf.nombre.trim()?"pointer":"default"}}>
              + Añadir oferta
            </button>
          </div>
        </div>

        <button onClick={guardar} disabled={!clienteNombre.trim()}
          style={{width:"100%",padding:"14px",borderRadius:12,border:"none",
            background:clienteNombre.trim()?ac:"#CBD5E1",
            color:"#fff",fontWeight:700,fontSize:15,
            cursor:clienteNombre.trim()?"pointer":"default"}}>
          {editId?"✓ Guardar cambios":"✓ Guardar acción"}
        </button>
      </div>
    );
  }

  // ── Pantalla principal ──────────────────────────────────────────
  return(
    <div>
      <p style={{margin:"0 0 4px",fontSize:17,fontWeight:800,color:T.text}}>🎯 Recuperación de clientes</p>
      <p style={{margin:"0 0 20px",fontSize:12,color:T.muted}}>Acciones de captación y recuperación esta semana</p>

      {/* Estrategias asignadas */}
      {estrategias.length>0&&(
        <div style={{marginBottom:20}}>
          <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
            📌 Estrategias activas asignadas
          </p>
          {estrategias.map(e=>{
            const ult=e.seguimientos?.slice(-1)[0];
            return(
              <Card key={e.id} style={{marginBottom:8,padding:"14px 16px",
                borderLeft:`4px solid ${T.amber}`}}>
                <p style={{margin:"0 0 2px",fontSize:14,fontWeight:800,color:T.text}}>{e.cliente}</p>
                <p style={{margin:"0 0 6px",fontSize:12,color:T.muted}}>{e.estrategia}</p>
                <div style={{background:T.amberL,borderRadius:7,padding:"4px 10px",display:"inline-block"}}>
                  <span style={{fontSize:11,fontWeight:700,color:T.amber}}>🎯 {e.objetivo}</span>
                </div>
                {ult&&<p style={{margin:"6px 0 0",fontSize:11,color:T.muted}}>
                  Último seguimiento S{ult.semana}: {ult.nota}
                </p>}
              </Card>
            );
          })}
        </div>
      )}

      {/* Acciones registradas */}
      {acciones.length>0&&(
        <div style={{marginBottom:20}}>
          <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
            ✍️ Mis acciones esta semana
          </p>
          {acciones.map(a=>{
            const res=RESULTADO_OPS.find(r=>r.k===a.resultado);
            return(
              <div key={a.id} style={{background:"#FFF",borderRadius:12,padding:"13px 16px",
                marginBottom:8,border:`1px solid ${T.border}`,
                borderLeft:`4px solid ${a.tipo==="nuevo"?T.green:T.blue}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:4}}>
                      <span>{a.tipo==="nuevo"?"🌱":"🔄"}</span>
                      <p style={{margin:0,fontSize:14,fontWeight:700,color:T.text}}>{a.clienteNombre}</p>
                    </div>
                    {res&&<Badge label={res.label} color={res.color}/>}
                    {a.nota&&<p style={{margin:"4px 0 0",fontSize:12,color:T.muted,fontStyle:"italic"}}>
                      "{a.nota.slice(0,60)}"
                    </p>}
                    {a.ofertas?.length>0&&<p style={{margin:"3px 0 0",fontSize:11,color:T.muted}}>
                      🏷️ {a.ofertas.length} oferta{a.ofertas.length>1?"s":""} de precio
                    </p>}
                  </div>
                  <div style={{display:"flex",gap:6,flexShrink:0}}>
                    <button onClick={()=>{
                      setTipo(a.tipo);setEditId(a.id);setClienteNombre(a.clienteNombre);
                      setResultado(a.resultado||"");setNota(a.nota||"");setOfertas(a.ofertas||[]);
                    }} style={{padding:"5px 10px",borderRadius:7,border:`1px solid ${T.border}`,
                      background:"#FFF",color:T.blue,fontSize:12,cursor:"pointer"}}>✏️</button>
                    <button onClick={()=>setAcciones(p=>p.filter(x=>x.id!==a.id))}
                      style={{background:"none",border:"none",cursor:"pointer",color:T.red,fontSize:16}}>🗑</button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Nueva acción */}
      <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Nueva acción</p>
      {[
        {t:"recuperacion",icon:"🔄",label:"Recuperar cliente",sub:"Cliente que ha dejado de comprar",color:T.blue},
        {t:"nuevo",       icon:"🌱",label:"Cliente nuevo",    sub:"Primera visita o prospecto",      color:T.green},
      ].map(opt=>(
        <button key={opt.t} onClick={()=>setTipo(opt.t)}
          style={{display:"flex",gap:14,alignItems:"center",padding:"16px",borderRadius:14,
            border:`2px solid ${opt.color}33`,background:`${opt.color}08`,cursor:"pointer",
            textAlign:"left",width:"100%",marginBottom:10,boxSizing:"border-box"}}>
          <span style={{fontSize:28,flexShrink:0}}>{opt.icon}</span>
          <div style={{flex:1}}>
            <p style={{margin:0,fontSize:15,fontWeight:700,color:T.text}}>{opt.label}</p>
            <p style={{margin:"2px 0 0",fontSize:12,color:T.muted}}>{opt.sub}</p>
          </div>
          <span style={{color:opt.color,fontSize:20}}>›</span>
        </button>
      ))}

      <div style={{display:"flex",gap:8,marginTop:8}}>
        <Btn onClick={onBack} outline color={T.muted}>← Atrás</Btn>
        <Btn full onClick={onNext} color={color}>Siguiente → Muestras</Btn>
      </div>
    </div>
  );
}


// ─── FORMULARIO NUEVO CLIENTE ─────────────────────────────────────
function NuevoClienteForm({ruta,onGuardar,onBack}){
  const [form,setForm]=useState({nombre:"",contacto:"",telefono:"",email:"",poblacion:"",empresa:"",tarjeta:null});
  const fotoRef=React.useRef();

  const ISt={width:"100%",border:`1.5px solid ${T.border}`,borderRadius:10,
    padding:"11px 12px",fontSize:13,outline:"none",boxSizing:"border-box"};

  return(
    <div>
      <BackBar label={`Ruta ${ruta}`} onBack={onBack}/>
      <p style={{margin:"0 0 4px",fontSize:17,fontWeight:800,color:T.text}}>🆕 Nuevo cliente</p>
      <p style={{margin:"0 0 20px",fontSize:12,color:T.muted}}>Ruta {ruta} · Se guardará en la base de datos</p>

      {/* Foto tarjeta */}
      <div style={{marginBottom:16}}>
        <p style={{margin:"0 0 6px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>📇 Foto de tarjeta de visita</p>
        {form.tarjeta?(
          <div style={{position:"relative",borderRadius:12,overflow:"hidden",border:`1px solid ${T.border}`}}>
            <img src={form.tarjeta} alt="tarjeta"
              style={{width:"100%",maxHeight:180,objectFit:"contain",display:"block",background:"#f4f4f4"}}/>
            <button onClick={()=>setForm(f=>({...f,tarjeta:null}))}
              style={{position:"absolute",top:8,right:8,background:"rgba(0,0,0,.6)",border:"none",
                borderRadius:"50%",width:28,height:28,cursor:"pointer",color:"#fff",fontSize:14}}>✕</button>
          </div>

          <input value={form[f.k]} onChange={e=>setForm(fn=>({...fn,[f.k]:e.target.value}))}

      <button onClick={()=>onGuardar(form)} disabled={!form.nombre.trim()}

    </div>
  );
}

          display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🏪</div>
        <div style={{flex:1,minWidth:0}}>
          <p style={{margin:0,fontSize:13,fontWeight:700,color:T.text,
            overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{nombre}</p>

            {op?<Badge label={op.label} color={op.color}/>
            :<span style={{fontSize:11,color:T.muted}}>Sin marcar</span>}

              overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:120}}>
              · {visita.nota}
            </span>}
          </div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
          {hist.length>0&&(
            <span style={{fontSize:10,fontWeight:700,color:T.blue,
              background:T.blueL,borderRadius:99,padding:"2px 7px"}}>{hist.length}</span>

          <span style={{fontSize:18,color:T.muted,display:"inline-block",
            transform:open?"rotate(90deg)":"rotate(0deg)",transition:"transform .2s"}}>›</span>
        </div>

      {open&&(
        <div style={{borderTop:`1px solid ${T.border}`,padding:"14px 16px 16px"}}>
