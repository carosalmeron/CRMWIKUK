              {[{k:"baja",l:"🟢 Baja",c:T.green},{k:"media",l:"🟡 Media",c:T.amber},
                {k:"alta",l:"🔴 Alta",c:T.red},{k:"urgente",l:"🚨 Urgente",c:"#7F1D1D"}].map(p=>(
                <button key={p.k} onClick={()=>setForm(f=>({...f,prioridad:p.k}))}
                  style={{flex:1,padding:"9px",borderRadius:9,cursor:"pointer",fontSize:11,
                    border:`2px solid ${form.prioridad===p.k?p.c:T.border}`,
                    background:form.prioridad===p.k?p.c+"15":"#fff",
                    color:form.prioridad===p.k?p.c:T.muted,
                    fontWeight:form.prioridad===p.k?700:400}}>
                  {p.l}
                </button>
              ))}
            </div>
          </div>

          {/* Descripción */}
          <div style={{marginBottom:12}}>
            <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Descripción *</p>
            <textarea value={form.descripcion} onChange={e=>setForm(f=>({...f,descripcion:e.target.value}))}
              rows={4} placeholder="Describe el problema con detalle…"
              style={{width:"100%",border:`1.5px solid ${form.descripcion?T.navy:T.border}`,borderRadius:10,
                padding:"11px 12px",fontSize:13,resize:"none",outline:"none",
                boxSizing:"border-box",fontFamily:"inherit",lineHeight:1.5}}/>
          </div>

          {/* Fotos */}
          <div style={{marginBottom:14}}>
            <p style={{margin:"0 0 6px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>📷 Fotos (opcional)</p>
            {(form.fotos||[]).length>0&&(
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
                {form.fotos.map((f,i)=>(
                  <div key={i} style={{position:"relative"}}>
                    <img src={f} alt="" style={{width:72,height:72,objectFit:"cover",
                      borderRadius:10,border:`1px solid ${T.border}`}}/>
                    <button onClick={()=>setForm(fm=>({...fm,fotos:fm.fotos.filter((_,j)=>j!==i)}))}
                      style={{position:"absolute",top:-6,right:-6,width:20,height:20,borderRadius:"50%",
                        background:T.red,border:"none",color:"#fff",fontSize:11,
                        cursor:"pointer",fontWeight:700}}>✕</button>
                  </div>
                ))}
              </div>
            )}
            <button onClick={()=>fotoRef.current.click()}
              style={{padding:"9px 16px",borderRadius:9,border:`1.5px dashed ${T.border}`,
                background:T.bg,color:T.muted,fontSize:13,cursor:"pointer"}}>
              📷 Añadir fotos
            </button>
            <input ref={fotoRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={addFoto}/>
          </div>

          {/* Botones */}
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>{setShowForm(false);setForm({tipo:"",prioridad:"media",clienteNombre:"",descripcion:"",fotos:[]});}}
              style={{flex:1,padding:"12px",borderRadius:10,border:`1px solid ${T.border}`,
                background:"#fff",color:T.muted,fontWeight:600,fontSize:13,cursor:"pointer"}}>
              Cancelar
            </button>
            <button onClick={crearIncidencia}
              disabled={!form.tipo||!form.descripcion.trim()||!form.clienteNombre.trim()}
              style={{flex:2,padding:"12px",borderRadius:10,border:"none",
                background:form.tipo&&form.descripcion.trim()&&form.clienteNombre.trim()?T.red:"#CBD5E1",
                color:"#fff",fontWeight:700,fontSize:14,
                cursor:form.tipo&&form.descripcion.trim()&&form.clienteNombre.trim()?"pointer":"default"}}>
              🚨 Crear incidencia
            </button>
          </div>
        </div>
      )}

      {/* Filtro por equipo */}
      {esJefe&&<FiltroEquipo value={filtroEquipoInc} onChange={setFiltroEquipoInc} agenteSel={agenteSelInc} onAgenteSel={setAgenteSelInc} items={incidencias.filter(i=>!i.eliminada)} getAgente={i=>i.agente||i.autor}/>}

      {/* Filtro por tipo */}
      <div style={{display:"flex",gap:6,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
        <button onClick={()=>setFiltroTipo("todas")}
          style={{padding:"7px 14px",borderRadius:99,flexShrink:0,fontSize:11,fontWeight:filtroTipo==="todas"?700:400,
            border:`1.5px solid ${filtroTipo==="todas"?T.navy:T.border}`,
            background:filtroTipo==="todas"?T.navy:"#fff",color:filtroTipo==="todas"?"#fff":T.muted,cursor:"pointer"}}>
          Todas
        </button>
        {Object.entries(INC_TIPOS).map(([k,t])=>(
          <button key={k} onClick={()=>setFiltroTipo(k)}
            style={{padding:"7px 14px",borderRadius:99,flexShrink:0,fontSize:11,fontWeight:filtroTipo===k?700:400,
              border:`1.5px solid ${filtroTipo===k?t.color:T.border}`,
              background:filtroTipo===k?t.color+"15":"#fff",color:filtroTipo===k?t.color:T.muted,cursor:"pointer"}}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Abiertas */}
      {abiertas.length>0&&(
        <div style={{marginBottom:20}}>
          {abiertas.map(i=>{
            const tipo=INC_TIPOS[i.tipo]||{label:i.tipo,color:T.muted};
            const priColors={urgente:"#7F1D1D",alta:T.red,media:T.amber,baja:T.green};
            const pColor=priColors[i.prioridad]||T.muted;
            return(
              <div key={i.id} onClick={()=>setSel(i)}
                style={{background:"#fff",borderRadius:14,padding:"14px 16px",marginBottom:8,
                  cursor:"pointer",border:`1px solid ${T.border}`,borderLeft:`4px solid ${tipo.color}`,
                  boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}>
                <div style={{display:"flex",gap:8,marginBottom:6,flexWrap:"wrap"}}>
                  <span style={{fontSize:11,fontWeight:700,color:tipo.color,
                    background:tipo.color+"15",borderRadius:99,padding:"2px 8px"}}>{tipo.label}</span>
                  <span style={{fontSize:11,fontWeight:700,color:pColor,
                    background:pColor+"15",borderRadius:99,padding:"2px 8px"}}>
                    {i.prioridad==="urgente"?"🔴 Urgente":i.prioridad.charAt(0).toUpperCase()+i.prioridad.slice(1)}
                  </span>
                  {i.escaladoA&&<span style={{fontSize:11,fontWeight:700,color:T.purple,
                    background:T.purpleL,borderRadius:99,padding:"2px 8px"}}>
                    ↑ {USUARIOS.find(u=>u.id===i.escaladoA)?.nombre}
                  </span>}
                  <span style={{fontSize:10,color:T.muted,marginLeft:"auto"}}>{i.fecha}</span>
                </div>
                <p style={{margin:"0 0 3px",fontSize:14,fontWeight:700}}>{i.clienteNombre||i.cliente}</p>
                <p style={{margin:0,fontSize:12,color:T.muted,overflow:"hidden",
                  textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{i.descripcion||i.desc}</p>
                {(i.informadoA||[]).length>0&&(
                  <p style={{margin:"4px 0 0",fontSize:10,color:T.blue,fontWeight:600}}>
                    ℹ️ Informado a: {(i.informadoA||[]).map(id=>USUARIOS.find(u=>u.id===id)?.nombre||id).join(", ")}
                  </p>
                )}
              </div>
            );
          })}
        </div>
      )}

      {abiertas.length===0&&(
        <div style={{textAlign:"center",padding:"40px 16px",color:T.muted,marginBottom:20}}>
          <p style={{fontSize:32,margin:"0 0 8px"}}>✅</p>
          <p style={{margin:0,fontSize:14}}>Sin incidencias abiertas</p>
        </div>
      )}

      {/* Cerradas */}
      {cerradas.length>0&&(
        <div>
          <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
            ✅ Resueltas ({cerradas.length})
          </p>
          {cerradas.map(i=>{
            const tipo=INC_TIPOS[i.tipo]||{label:i.tipo,color:T.muted};
            return(
              <div key={i.id} onClick={()=>setSel(i)}
                style={{background:"#F9FAFB",borderRadius:12,padding:"12px 14px",marginBottom:6,
                  cursor:"pointer",border:`1px solid ${T.border}`,opacity:.75}}>
                <div style={{display:"flex",gap:8,marginBottom:4}}>
                  <Badge label={tipo.label} color={T.muted}/>
                  <span style={{fontSize:10,color:T.muted,marginLeft:"auto"}}>{i.fecha}</span>
                </div>
                <p style={{margin:"0 0 2px",fontSize:13,fontWeight:700}}>{i.clienteNombre||i.cliente}</p>
                <p style={{margin:0,fontSize:11,color:T.muted,overflow:"hidden",
                  textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{i.descripcion||i.desc}</p>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

  const addUser=()=>{
    if(!form.nombre||!form.user||!form.email){alert("Nombre, usuario y email son obligatorios");return;}
    const pass=form.pass||genPass();
    const newUser={id:form.user,nombre:form.nombre,rol:form.rol,equipo:form.equipo||null,
      user:form.user,email:form.email,activo:true,
      color:form.rol==="agente"?T.amber:form.rol==="jefe"?T.green:T.blue,

    {rol:"ceo",     usuarios:usuarios.filter(u=>u.rol==="ceo")},

    {rol:"jefe",    usuarios:usuarios.filter(u=>u.rol==="jefe")},
    {rol:"agente",  usuarios:usuarios.filter(u=>u.rol==="agente")},
    {rol:"rrhh",    usuarios:usuarios.filter(u=>u.rol==="rrhh")},

                    <p style={{margin:0,fontSize:13,fontWeight:800,color:T.text}}>{info.label}</p>

                  </div>
                </div>
                {/* Usuarios en este rol */}
                <div style={{marginLeft:24,borderLeft:`2px solid ${info.color}44`,paddingLeft:16}}>
                  {g.usuarios.map(u=>(
                    <div key={u.id} style={{display:"flex",gap:10,alignItems:"center",
                      padding:"9px 12px",borderRadius:10,background:T.white,
                      border:`1px solid ${T.border}`,marginBottom:6}}>
                      <span style={{fontSize:16}}>{info.icon}</span>
                      <div style={{flex:1}}>

                      Copiar

            );
          })}
        </div>
      )}
    </div>
  );
}

const PRIORIDAD_CFG = {
  urgente: { label:"Urgente", color:"#EF4444", bg:"#FEF2F2", icon:"🔴" },
  alta:    { label:"Alta",    color:"#F59E0B", bg:"#FFFBEB", icon:"🟡" },
  normal:  { label:"Normal",  color:"#3B82F6", bg:"#EFF6FF", icon:"🔵" },
};

// Fallback de tareas_seed — VACÍO. Los datos vienen de Firebase.
const TAREAS_SEED = [];

// Widget compacto para dashboards
function HitosProyectoWidget({usuario, onNav}){
  const [hitosAsig, setHitosAsig] = React.useState([]);

  React.useEffect(()=>{
    fbLeer("proyectos").then(proyectos=>{
      const miId=usuario.id;
      const miGrupo=(usuario.grupoAgente||"").toLowerCase();
      const result=[];
      proyectos.filter(p=>p.estado==="activo").forEach(p=>{
        (p.hitos||[]).forEach((h,i)=>{
          if(!h.hecho && h.responsable && (
            h.responsable===miId ||
            h.responsable===miGrupo ||
            h.responsable===usuario.grupoAgente ||
            // Jefe/director ve hitos sin asignar o de su equipo
            (["jefe","director","ceo"].includes(usuario.rol) && (
              h.responsable==="dir"||h.responsable==="direccion"||
              h.responsable==="jl"||!h.responsable
            )) ||
            // Match por rol director
            (usuario.rol==="director" && h.responsable==="dir")
          )){
            result.push({...h,proyectoId:p.id,proyectoNombre:p.nombre,hitoIdx:i});
          }
        });
      });
      setHitosAsig(result);
    }).catch(()=>{});

  return(
    <div style={{marginBottom:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>

          📍 Mis hitos de proyecto
          <span style={{marginLeft:8,background:"#7C3AED",color:"#fff",
            fontSize:10,fontWeight:800,borderRadius:99,padding:"2px 8px"}}>
            {hitosAsig.length}
          </span>
        </p>
        <button onClick={()=>onNav("proyectos")}
          style={{background:"none",border:"none",fontSize:12,color:"#7C3AED",
            fontWeight:600,cursor:"pointer"}}>Ver proyectos →</button>
      </div>
      {hitosAsig.map((h,i)=>{
        const vence=h.fecha?new Date(h.fecha.split("/").reverse().join("-")):null;
        const hoy=new Date();
        const diasRestantes=vence?Math.ceil((vence-hoy)/(1000*60*60*24)):null;
        const urgente=diasRestantes!==null&&diasRestantes<=3;
        return(
          <div key={i}
            style={{background:"#fff",borderRadius:12,padding:"12px 14px",marginBottom:8,
              border:`1.5px solid ${urgente?"#EF4444":"#E9D5FF"}`,
              borderLeft:`4px solid ${urgente?"#EF4444":"#7C3AED"}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
              <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={()=>onNav("proyectos")}>
                <p style={{margin:"0 0 2px",fontSize:13,fontWeight:700,color:"#0F172A",
                  overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                  {urgente?"🔴 ":""}{h.nombre}
                </p>
                <p style={{margin:0,fontSize:11,color:"#64748B"}}>

                </p>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:5,flexShrink:0}}>
                {h.fecha&&(

                    color:urgente?"#EF4444":"#7C3AED",
                    background:urgente?"#FEF2F2":"#F5F3FF",
                    borderRadius:6,padding:"2px 8px"}}>
                    {diasRestantes!==null
                      ?diasRestantes<0?"Vencido":diasRestantes===0?"Hoy":diasRestantes===1?"Mañana":`${diasRestantes}d`
                      :h.fecha}
                  </span>
                )}
                <button onClick={()=>{
                  const hoy2=new Date().toLocaleDateString("es-ES");
                  fbLeer("proyectos").then(proyectos=>{
                    const proy=proyectos.find(p=>p.id===h.proyectoId);
                    if(!proy) return;
                    const hitos=(proy.hitos||[]).map((x,idx)=>
                      idx===h.hitoIdx?{...x,hecho:true,fechaHecho:hoy2}:x
                    );
                    const hechos2=hitos.filter(x=>x.hecho).length;
                    const progreso=Math.round(hechos2/hitos.length*100);
                    const updated={...proy,hitos,progreso};
                    fbEscribir("proyectos",proy.id,updated).then(()=>{
                      setHitosAsig(prev=>prev.filter((_,j)=>j!==i));

            </div>
          </div>
        );
      })}

  );
}

function TareasWidget({ onNav, usuario }) {
  const [tareas, setTareas] = useState([]);
  const [cargando, setCargando] = useState(true);

  const esCeo      = usuario?.rol === "ceo";
  const esDir      = usuario?.rol === "director";
  const esJefe     = usuario?.rol === "jefe";
  const esAgente   = usuario?.rol === "agente";
  const esJefeOmas = esCeo || esDir || esJefe;

  const agentesEquipo = USUARIOS.filter(u =>
    u.rol === "agente" && (esJefe ? u.equipo === usuario?.equipo : true)
  );

  const misIds = resolverMisIds(usuario);

  const filtrar = (lista) => {
    if (esCeo || esDir) return lista;
    if (esJefe) {
      return lista.filter(t => {
        if (!t.agente) return true; // sin asignar → jefe las ve
        return agentesEquipo.some(a =>
          a.id.toUpperCase() === (t.agente||"").toUpperCase() ||
          (a.grupoAgente||"").toUpperCase() === (t.agente||"").toUpperCase()
        );
      });
    }
    // Agente: solo las suyas, nunca sin_asignar
    if (!esAgente) return lista;
    return lista.filter(t => t.agente && misIds.has(t.agente.toUpperCase()));
  };

  useEffect(() => {
    fbLeer("tareas").then(data => {
      const src = data.length > 0 ? data : TAREAS_SEED;
      const pendientes = src.filter(t => t.estado==="pendiente" && !t.eliminada);
      const filtradas  = filtrar(pendientes);
      // Urgentes y sin_asignar primero
      filtradas.sort((a,b) => {
        const sinA = !a.agente ? -1 : 0;
        const sinB = !b.agente ? -1 : 0;
        if (sinA !== sinB) return sinA - sinB;
        const ord = { urgente:0, alta:1, normal:2 };
        return (ord[a.prioridad]||2) - (ord[b.prioridad]||2);
      });
      setTareas(filtradas);
      if (data.length === 0) TAREAS_SEED.forEach(t => fbEscribir("tareas", t.id, t));
    }).catch(()=>{}).finally(()=>setCargando(false));
  }, [usuario?.id]);

  if (cargando || tareas.length === 0) return null;

  const urgentes    = tareas.filter(t => t.prioridad==="urgente").length;
  const sinAsignar  = tareas.filter(t => !t.agente).length;

  return (
    <div style={{marginBottom:22}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <p style={{margin:0,fontSize:10,fontWeight:700,color:"#64748B",
          textTransform:"uppercase",letterSpacing:".12em"}}>
          {esJefeOmas ? "Tareas del equipo" : "Mis acciones"}
        </p>
        <div style={{display:"flex",gap:5}}>
          {esJefeOmas && sinAsignar > 0 && (
            <span style={{fontSize:11,fontWeight:700,color:"#D97706",background:"#FFFBEB",
              borderRadius:99,padding:"2px 8px"}}>
              ⚠️ {sinAsignar} sin asignar
            </span>
          )}
          {urgentes > 0 && (
            <span style={{fontSize:11,fontWeight:700,color:"#EF4444",background:"#FEF2F2",
              borderRadius:99,padding:"2px 8px"}}>
              🔴 {urgentes} urgente{urgentes>1?"s":""}
            </span>
          )}
        </div>
      </div>
      <div style={{background:"#fff",borderRadius:16,overflow:"hidden",border:"1px solid #E2E8F0",
        boxShadow:"0 1px 3px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.06)"}}>
        {tareas.slice(0,5).map((t,i) => {
          const cfg    = PRIORIDAD_CFG[t.prioridad] || PRIORIDAD_CFG.normal;
          const agObj  = esJefeOmas ? USUARIOS.find(u =>
            u.id.toUpperCase()===(t.agente||"").toUpperCase() ||
            (u.grupoAgente||"").toUpperCase()===(t.agente||"").toUpperCase()
          ) : null;
          const sinAg  = !t.agente;
          return (
            <div key={t.id} onClick={()=>onNav("tareas")}
              style={{display:"flex",alignItems:"center",gap:10,padding:"11px 16px",
                borderBottom:i<Math.min(tareas.length,5)-1?"1px solid #F1F5F9":"none",
                cursor:"pointer",
                background:sinAg?"#FFFBEB":"#fff"}}>
              <span style={{fontSize:13,flexShrink:0}}>{sinAg?"⚠️":cfg.icon}</span>
              <div style={{flex:1,minWidth:0}}>
                <p style={{margin:0,fontSize:13,fontWeight:600,color:"#0F172A",
                  overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                  {t.titulo}
                </p>
                <div style={{display:"flex",gap:5,alignItems:"center",marginTop:1}}>
                  {t.cliente&&<p style={{margin:0,fontSize:11,color:"#94A3B8",
                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{t.cliente}</p>}
                  {esJefeOmas && (
                    agObj
                      ? <span style={{fontSize:10,fontWeight:700,color:agObj.color,
                          background:agObj.color+"18",borderRadius:99,padding:"1px 6px",
                          whiteSpace:"nowrap",flexShrink:0}}>
                          {agObj.icon} {agObj.nombre}
                        </span>
                      : <span style={{fontSize:10,fontWeight:700,color:"#D97706",
                          background:"#FEF3C7",borderRadius:99,padding:"1px 6px",
                          whiteSpace:"nowrap",flexShrink:0}}>
                          Sin asignar →
                        </span>
                  )}
                </div>
              </div>
              {t.vence && !t.esHito && (
                <span style={{fontSize:10,fontWeight:700,color:sinAg?"#D97706":cfg.color,
                  background:sinAg?"#FEF3C7":cfg.bg,borderRadius:6,
                  padding:"2px 6px",flexShrink:0,whiteSpace:"nowrap"}}>
                  {t.vence}
                </span>
              )}
              {t.esHito&&(
                <button onClick={(e)=>{
                  e.stopPropagation();
                  const hoy=new Date().toLocaleDateString("es-ES");
                  const u={...t,estado:"hecha",hechaEn:hoy};
                  fbEscribir("tareas",t.id,u);
                  setTareas(prev=>prev.filter(x=>x.id!==t.id));
                  if(t.proyectoId){
                    fbLeer("proyectos").then(proyectos=>{
                      const proy=proyectos.find(p=>p.id===t.proyectoId);
                      if(!proy) return;
                      const nombreHito=(t.titulo||"").replace("📍 Hito: ","").trim();
                      const hitos=(proy.hitos||[]).map(h=>
                        !h.hecho&&(h.nombre===nombreHito||t.titulo?.includes(h.nombre))
                          ?{...h,hecho:true,fechaHecho:hoy}:h
                      );
                      const progreso=hitos.length>0?Math.round(hitos.filter(h=>h.hecho).length/hitos.length*100):0;
                      fbEscribir("proyectos",proy.id,{...proy,hitos,progreso});
                    }).catch(()=>{});
                  }
                }}
                  style={{padding:"4px 10px",borderRadius:7,border:"none",
                    background:"#7C3AED",color:"#fff",fontSize:11,
                    fontWeight:700,cursor:"pointer",flexShrink:0}}>
                  ✅ Completar
                </button>
              )}
            </div>
          );
        })}
        <div onClick={()=>onNav("tareas")} style={{padding:"9px 16px",textAlign:"center",
          fontSize:12,color:"#3B82F6",fontWeight:600,cursor:"pointer",background:"#F8FAFC",
          display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
          {esJefeOmas && sinAsignar>0
            ? <><span style={{color:"#D97706"}}>⚠️ {sinAsignar} sin asignar</span> · <span>Ver todas ({tareas.length}) →</span></>
            : <span>Ver todas ({tareas.length}) →</span>
          }
        </div>
      </div>
    </div>
  );
}

// Sección completa de gestión de tareas
function GestorTareas({ usuario, clientesFB }) {
  const esCeo      = usuario?.rol === "ceo";
  const esDir      = usuario?.rol === "director";
  const esJefe     = usuario?.rol === "jefe";
  const esAgente   = usuario?.rol === "agente";
  const esJefeOmas = esCeo || esDir || esJefe;

  const misIds = resolverMisIds(usuario);

  // Agentes disponibles para asignación
  const agentesAsig = USUARIOS.filter(u =>
    u.rol === "agente" && (esJefe ? u.equipo === usuario.equipo : true)
  );

  const [tareas,     setTareas]     = useState([]);
  const [filtro,     setFiltro]     = useState("pendiente");
  const [agFiltro,   setAgFiltro]   = useState("todos"); // filtro por agente (managers)
  const [showForm,   setShowForm]   = useState(false);
  const [editTarea,  setEditTarea]  = useState(null);
  const [treeOpen,   setTreeOpen]   = useState(null); // null | "equipos" | "WIKUK" | "INTERKEY"
  const [asignando,  setAsignando]  = useState(null); // tarea a reasignar
  const [form, setForm] = useState({
    titulo:"", descripcion:"", cliente:"", prioridad:"normal",
    vence:"", tipo:"contacto", agenteId:"",
  });

  // ── Filtro jerárquico ──────────────────────────────────────────
  const esMia = (t) => {
    if (esCeo || esDir) return true;
    if (esJefe) {
      const agT = (t.agente||"").toUpperCase();
      const esMiEquipo = agentesAsig.some(a =>
        a.id.toUpperCase()===agT || (a.grupoAgente||"").toUpperCase()===agT
      );
      const sinAsignar = !t.agente;
      return esMiEquipo || sinAsignar;
    }
    // Agente: NUNCA ve sin_asignar
    if (!t.agente) return false;
    return misIds.has(t.agente.toUpperCase());
  };

  const cargar = () => {
    fbLeer("tareas").then(data => {
      const todas = (data.length > 0 ? data : TAREAS_SEED).filter(t => !t.eliminada);
      setTareas(todas.filter(esMia));
      if (data.length === 0) TAREAS_SEED.forEach(t => fbEscribir("tareas", t.id, t));
    }).catch(() => setTareas(TAREAS_SEED.filter(esMia)));
  };

  useEffect(() => { cargar(); }, [usuario.id]);

  const upd = (k,v) => setForm(f => ({...f,[k]:v}));

  const guardar = () => {
    if (!form.titulo.trim()) return;
    const hoy = new Date().toLocaleDateString("es-ES");
    const miId = usuario.grupoAgente || usuario.user || usuario.id;
    const agenteDestino = esJefeOmas ? (form.agenteId || "") : miId;
    const t = editTarea
      ? {...editTarea, ...form, agente: agenteDestino}
      : { id:`tsk${Date.now()}`, ...form, agente:agenteDestino,
          creadaPor:usuario.id, creadaPorNombre:usuario.nombre,
          estado:"pendiente", creadaEn:hoy };
    fbEscribir("tareas", t.id, t).then(() => {
      setTareas(prev => editTarea ? prev.map(x=>x.id===t.id?t:x) : [t,...prev]);
      setShowForm(false); setEditTarea(null);
      setForm({titulo:"",descripcion:"",cliente:"",prioridad:"normal",vence:"",tipo:"contacto",agenteId:""});
      // Notificar al agente asignado
      if(t.agente && t.agente !== usuario.id) notificarAsignacion("tarea", t, usuario.id);
    });
  };

  const asignar = (tarea, agenteId) => {
    const updated = {...tarea, agente:agenteId,
      asignadoEn:new Date().toLocaleDateString("es-ES"),
      asignadoPor:usuario.nombre};
    fbEscribir("tareas", tarea.id, updated).then(() => {
      setTareas(prev => prev.map(t => t.id===tarea.id ? updated : t));
      setAsignando(null);
    });
  };

  const marcarHecha = (tarea) => {
    const hoy = new Date().toLocaleDateString("es-ES");
    const u = {...tarea, estado:"hecha", hechaEn:hoy};
    fbEscribir("tareas", tarea.id, u).then(() =>
      setTareas(prev => prev.map(t => t.id===tarea.id ? u : t))
    );
    // Notificar al creador de la tarea
    if(tarea.creadaPor && tarea.creadaPor !== usuario.id){
      despacharNotificacion({tipo:"tarea",titulo:`✅ Tarea completada: ${tarea.titulo||""}`,
        mensaje:`${usuario.nombre} ha completado la tarea "${tarea.titulo||""}"`,
        destinatarioId:tarea.creadaPor,prioridad:"normal",creadoPor:usuario.id});
    }
    // Si la tarea viene de un hito, actualizar el hito en el proyecto
    if(tarea.esHito && tarea.proyectoId){
      fbLeer("proyectos").then(proyectos=>{
        const proy=proyectos.find(p=>p.id===tarea.proyectoId);
        if(!proy) return;
        // Buscar el hito por nombre (ya que guardamos el nombre en el título de la tarea)
        const nombreHito=(tarea.titulo||"").replace("📍 Hito: ","").trim();
        const hitos=(proy.hitos||[]).map(h=>{
          if(!h.hecho && (h.nombre===nombreHito||tarea.titulo?.includes(h.nombre))){
            return{...h,hecho:true,fechaHecho:hoy};
          }
          return h;
        });
        const hechos=hitos.filter(h=>h.hecho).length;
        const progreso=hitos.length>0?Math.round(hechos/hitos.length*100):0;
        fbEscribir("proyectos",proy.id,{...proy,hitos,progreso});
      }).catch(()=>{});
    }
  };

  const eliminar = (id) => {
    fbEscribir("tareas", id, {id, eliminada:true}).then(() =>
      setTareas(prev => prev.filter(t => t.id !== id))
    );
  };

  const abrirEditar = (t) => {
    setEditTarea(t);
    setForm({titulo:t.titulo,descripcion:t.descripcion||"",cliente:t.cliente||"",
      prioridad:t.prioridad||"normal",vence:t.vence||"",tipo:t.tipo||"contacto",
      agenteId:t.agente||""});
    setShowForm(true);
  };

  // ── Datos derivados ────────────────────────────────────────────
  const sinAsignar = tareas.filter(t=>!t.agente&&!t.eliminada&&t.estado==="pendiente");
  // Filtrar por selección actual del árbol
  const tareasFiltroActual = tareas.filter(t=>{
    if(t.eliminada) return false;
    if(!esJefeOmas) return true;
    if(!agFiltro||agFiltro==="todos") return true;
    if(agFiltro==="sin_asignar") return !t.agente;
    if(agFiltro.startsWith("eq_")){
      const eq=agFiltro.replace("eq_","");
      const ag=USUARIOS.find(u=>u.id===(t.agente||""));
      return ag?.equipo===eq;
    }
    return (t.agente||"").toUpperCase()===agFiltro.toUpperCase()||
      USUARIOS.find(u=>u.id===agFiltro)?.grupoAgente===(t.agente||"");
  });
  const pendCount  = tareasFiltroActual.filter(t=>t.estado==="pendiente").length;

const OPO_FB_PROJECT="grupo-consolidado-crm";
const FB_BASE = `https://firestore.googleapis.com/v1/projects/${OPO_FB_PROJECT}/databases/(default)/documents`;
const FB_STORAGE = `https://firebasestorage.googleapis.com/v0/b/${OPO_FB_PROJECT}.appspot.com/o`;

// ── Firebase Storage — subir foto ─────────────────────────────────
async function subirFoto(base64, ruta){
  try{
    // Convertir base64 a Blob
    const [meta,data]=base64.split(",");
    const mime=(meta.match(/:(.*?);/)||[])[1]||"image/jpeg";
    const bytes=atob(data);
    const arr=new Uint8Array(bytes.length);
    for(let i=0;i<bytes.length;i++) arr[i]=bytes.charCodeAt(i);
    const blob=new Blob([arr],{type:mime});

    // Subir a Storage
    const rutaCodificada=encodeURIComponent(ruta);
    const r=await fetch(`${FB_STORAGE}?uploadType=media&name=${rutaCodificada}`,{
      method:"POST",
      headers:{"Content-Type":mime},
      body:blob,
    });
    if(!r.ok) throw new Error(`Storage error: ${r.status}`);
    const res=await r.json();
    // URL pública de descarga
    const token=res.downloadTokens;
    return `${FB_STORAGE}/${rutaCodificada}?alt=media&token=${token}`;
  }catch(e){
    console.warn("Error subiendo foto:",e.message);
    return null; // fallback: devuelve null, se queda base64 local
  }
}

// Subir múltiples fotos y devolver URLs
async function subirFotos(fotos=[], carpeta="general"){
  if(!fotos||fotos.length===0) return [];
  const urls=await Promise.all(
    fotos.map(async (f,i)=>{
      if(f.startsWith("https://")) return f; // ya es URL, no resubir
      const ext=f.includes("png")?"png":"jpg";
      const nombre=`${carpeta}/${Date.now()}_${i}.${ext}`;
      const url=await subirFoto(f,nombre);
      return url||f; // si falla, mantiene base64
    })
  );
  return urls;
}

// ─── SISTEMA OFFLINE — Caché local + Cola de escrituras ─────────
const CACHE_PREFIX="crm_cache_";
const COLA_KEY="crm_cola_pendiente";
const CACHE_TTL=1000*60*60*2; // 2 horas de validez de caché

function cacheGuardar(coleccion,datos){
  try{localStorage.setItem(CACHE_PREFIX+coleccion,JSON.stringify({ts:Date.now(),datos}));}catch(e){}
}
function cacheLeer(coleccion){
  try{
    const raw=localStorage.getItem(CACHE_PREFIX+coleccion);
    if(!raw) return null;
    const {ts,datos}=JSON.parse(raw);
    if(Date.now()-ts>CACHE_TTL) return null; // caché expirada
    return datos;
  }catch(e){return null;}
}
function colaAñadir(coleccion,id,datos){
  try{
    const cola=JSON.parse(localStorage.getItem(COLA_KEY)||"[]");
    // Reemplazar si ya existe el mismo doc
    const idx=cola.findIndex(c=>c.coleccion===coleccion&&c.id===id);
    const item={coleccion,id,datos,ts:Date.now()};
    if(idx>=0) cola[idx]=item; else cola.push(item);
    localStorage.setItem(COLA_KEY,JSON.stringify(cola));
    console.log(`📴 Offline: ${coleccion}/${id} guardado en cola (${cola.length} pendientes)`);
  }catch(e){}
}
function colaLeer(){
  try{return JSON.parse(localStorage.getItem(COLA_KEY)||"[]");}catch(e){return[];}
}
function colaLimpiar(){
  try{localStorage.setItem(COLA_KEY,"[]");}catch(e){}
}
// Indicador global de estado de conexión
let _crmOnline=navigator.onLine;
let _colaPendiente=colaLeer().length;
window.addEventListener("online",()=>{_crmOnline=true;console.log("🟢 Online — sincronizando...");sincronizarCola();});
window.addEventListener("offline",()=>{_crmOnline=false;console.log("🔴 Offline — escrituras se guardarán localmente");});

async function sincronizarCola(){
  const cola=colaLeer();
  if(cola.length===0) return 0;
  console.log(`🔄 Sincronizando ${cola.length} escrituras pendientes...`);
  let ok=0,err=0;
  for(const item of cola){
    try{
      const r=await fetch(`${FB_BASE}/${item.coleccion}/${item.id}`,{
        method:"PATCH",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(serializeToFirestore(item.datos))
      });
      if(r.ok){ok++;} else{err++;}
    }catch(e){err++;}
  }
  if(err===0){
    colaLimpiar();
    _colaPendiente=0;
    console.log(`✅ Sincronización completa: ${ok} documentos subidos`);
  }else{
    // Dejar en cola solo los que fallaron
    const nuevaCola=colaLeer().slice(ok);
    localStorage.setItem(COLA_KEY,JSON.stringify(nuevaCola));
    _colaPendiente=nuevaCola.length;
    console.log(`⚠️ Sincronización parcial: ${ok} ok, ${err} pendientes`);
  }
  return ok;
}

async function fbLeer(coleccion, pageSize=200){
  try{
    let docs=[], nextPage=null, intentos=0;
    do{
      const url=`${FB_BASE}/${coleccion}?pageSize=300${nextPage?"&pageToken="+nextPage:""}`;
      const r=await fetch(url);
      if(!r.ok){
        // Offline o error → intentar caché
        const cached=cacheLeer(coleccion);
        if(cached){console.log(`📴 ${coleccion}: usando caché local (${cached.length} docs)`);return cached;}
        return [];
      }
      const data=await r.json();
      if(data.documents) docs=[...docs,...data.documents.map(fromFirestore)];
      nextPage=data.nextPageToken||null;
      intentos++;
    }while(nextPage&&intentos<10);
    // Guardar en caché para uso offline
    if(docs.length>0) cacheGuardar(coleccion,docs);
    return docs;
  }catch(e){
    console.warn("📴 FB leer offline:",e.message);
    const cached=cacheLeer(coleccion);
    if(cached){console.log(`📴 ${coleccion}: usando caché local (${cached.length} docs)`);return cached;}
    return [];
  }
}

      const url=`${FB_BASE}/${coleccion}?pageSize=300${nextPage?"&pageToken="+nextPage:""}`;
      const r=await fetch(url);

      }

  }catch(e){

  }
}

// ── Serializar a formato Firestore ────────────────────────────────
function serializeToFirestore(datos){
  const fields={};
  const serialize=(v)=>{
    if(v===null||v===undefined) return {nullValue:null};
    if(typeof v==="boolean") return {booleanValue:v};
    if(typeof v==="number") return {doubleValue:v};
    if(typeof v==="string"){
      // Truncar strings muy largos (base64 imágenes) para no superar 1MB
      if(v.startsWith("data:image")&&v.length>5000) return {stringValue:"[imagen]"};
      return {stringValue:v};
    }
    if(Array.isArray(v)) return {arrayValue:{values:v.map(x=>serialize(x))}};
    if(typeof v==="object") return {mapValue:{fields:Object.fromEntries(
      Object.entries(v).map(([k,val])=>[k,serialize(val)])
    )}};
    return {stringValue:String(v)};
  };
  Object.entries(datos).forEach(([k,v])=>{ fields[k]=serialize(v); });
  return {fields};
}

// Escritura genérica — crea o sobreescribe documento
async function fbEscribir(coleccion, id, datos){
  // Actualizar caché local inmediatamente (para que la UI refleje el cambio)
  try{
    const cached=cacheLeer(coleccion);
    if(cached){
      const idx=cached.findIndex(d=>d.id===id);
      if(idx>=0) cached[idx]={...cached[idx],...datos}; else cached.push({...datos,id});
      cacheGuardar(coleccion,cached);
    }
  }catch(e){}

  try{
    const r=await fetch(`${FB_BASE}/${coleccion}/${id}`,{
      method:"PATCH",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(serializeToFirestore(datos))
    });
    if(!r.ok){
      const e=await r.json().catch(()=>({}));
      const msg=(e&&e.error&&e.error.message)||(e&&e.error&&e.error.status)||r.status;
      console.warn(`🔴 Firebase [${coleccion}/${id}] error ${r.status}:`, msg);
      if(r.status===403||r.status===401){
        console.warn("⚠️ REGLAS FIREBASE: La base de datos no permite escritura anónima.");
      }
      // Si es error de red/servidor, guardar en cola
      if(r.status>=500||r.status===0){
        colaAñadir(coleccion,id,datos);
        _colaPendiente=colaLeer().length;
      }
    }
    return r.ok;
  }catch(e){
    console.warn("📴 Offline — guardando en cola:", coleccion+"/"+id);
    colaAñadir(coleccion,id,datos);
    _colaPendiente=colaLeer().length;
    return false;
  }
}

function parseFirestoreValue(v) {
  if (v.stringValue  !== undefined) return v.stringValue;
  if (v.integerValue !== undefined) return parseInt(v.integerValue);
  if (v.doubleValue  !== undefined) return parseFloat(v.doubleValue);
  if (v.booleanValue !== undefined) return v.booleanValue;
  if (v.nullValue    !== undefined) return null;
  if (v.arrayValue)  return (v.arrayValue.values||[]).map(parseFirestoreValue);
  if (v.mapValue)    return parseFirestoreMap(v.mapValue.fields||{});
  return undefined;
}
function parseFirestoreMap(fields) {
  const obj = {};
  Object.entries(fields).forEach(([k, v]) => {
    const val = parseFirestoreValue(v);
    if (val !== undefined) obj[k] = val;
  });
  return obj;
}
function fromFirestore(doc) {
  if (!doc.fields) return {id: (doc.name||"").split("/").pop()};
  const obj = {id: (doc.name||"").split("/").pop()};
  Object.entries(doc.fields).forEach(([k, v]) => {
    const val = parseFirestoreValue(v);
    if (val !== undefined) obj[k] = val;
  });
  return obj;
}

          {/* Nivel 2: Equipos desplegables (solo visible si treeRootOpen) */}
          {treeRootOpen&&["WIKUK","INTERKEY"].map(eq=>{
            const eqColor=eq==="WIKUK"?T.green:T.amber;
            const agEq=EQUIPO_DATA_EXT.filter(v=>v.equipo===eq);
            const vMesEq=agEq.reduce((s,v)=>s+v.vMes,0);
            const isOpen=treeEqOpen===eq;
            const isSel=equipoFiltro===eq&&!agenteFiltro;
            return(
              <div key={eq} style={{marginBottom:6}}>
                <div onClick={()=>{
                    if(isSel){
                      // Ya está seleccionado → toggle expand
                      setTreeEqOpen(isOpen?null:eq);
                    } else {
                      // No seleccionado → filtrar + expandir
                      setEquipoFiltro(eq);
                      setAgenteFiltro(null);
                      setTreeEqOpen(eq);
                    }
                  }}
                  style={{background:isSel?eqColor+"15":"#fff",borderRadius:11,padding:"10px 14px",
                    cursor:"pointer",border:`2px solid ${isSel?eqColor:T.border}`,
                    display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:30,height:30,borderRadius:8,background:eqColor+"20",
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,
                    color:eqColor,fontWeight:800,flexShrink:0}}>{eq[0]}</div>
                  <div style={{flex:1}}>
                    <p style={{margin:0,fontSize:13,fontWeight:700,color:isSel?eqColor:T.text}}>{eq}</p>
                    <p style={{margin:0,fontSize:10,color:T.muted}}>
                      {agEq.length} vendedores · {fmt(vMesEq)}€ este mes
                    </p>
                  </div>
                  {isSel&&<span style={{color:eqColor,fontWeight:800}}>✓</span>}
                  <span style={{color:isOpen?eqColor:T.muted,fontSize:16,
                    transform:isOpen?"rotate(90deg)":"rotate(0deg)",display:"inline-block",transition:"transform .2s"}}>›</span>
                </div>

                {/* Nivel 3: Vendedores */}
                {isOpen&&(
                  <div style={{marginLeft:12,borderLeft:`2px solid ${eqColor}22`,paddingLeft:10,marginTop:6}}>
                    {agEq.map(v=>{
                      const sel=agenteFiltro===v.nombre;
                      return(
                        <div key={v.nombre} onClick={()=>{setAgenteFiltro(sel?null:v.nombre);setEquipoFiltro(eq);}}
                          style={{background:sel?v.color+"12":"#fff",borderRadius:10,
                            padding:"9px 12px",marginBottom:5,cursor:"pointer",
                            border:`1.5px solid ${sel?v.color:T.border}`,
                            display:"flex",alignItems:"center",gap:10}}>
                          <div style={{width:28,height:28,borderRadius:7,background:v.color+"20",
                            display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0}}>🧑‍💼</div>
                          <div style={{flex:1}}>
                            <p style={{margin:0,fontSize:12,fontWeight:700,color:T.text}}>{v.nombre}</p>
                            <p style={{margin:0,fontSize:10,color:T.muted}}>{fmt(v.vMes)}€ · mb {v.mb}%</p>
                          </div>
                          {sel&&<span style={{color:v.color,fontWeight:800}}>✓</span>}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* Tarjetas detalladas: SOLO cuando un vendedor específico está seleccionado */}
      {agenteFiltro ? (
        <div style={{marginBottom:20}}>
          <p style={{margin:"8px 0 10px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase",letterSpacing:".05em"}}>
            📊 Detalle de {agenteFiltro}
          </p>
          {[...EQUIPO_DATA_EXT].filter(v=>v.nombre===agenteFiltro)
            .sort((a,b)=>{
              const va=periodo==="semana"?a.vSem:periodo==="mes"?a.vMes:a.vAnual;
              const vb=periodo==="semana"?b.vSem:periodo==="mes"?b.vMes:b.vAnual;
              return vb-va;
            })
            .map((v,i)=>{
              const vReal=periodo==="semana"?v.vSem:periodo==="mes"?v.vMes:v.vAnual;
              const vObj =periodo==="semana"?v.oSem:periodo==="mes"?v.oMes:v.oAnual;
              const pctV =vObj>0?Math.round(vReal/vObj*100):0;
              const pctMb=v.oMb>0?Math.round(v.mb/v.oMb*100):0;
              const c   =pctV>=100?T.green:pctV>=80?T.amber:T.red;
              const cMb =pctMb>=100?T.green:pctMb>=80?T.amber:T.red;
              const MEDAL=["🥇","🥈","🥉","4️⃣","5️⃣"];
              const Ring=({pct:p,size=44,color:rc})=>{
                const r=size/2-5;const circ=2*Math.PI*r;const fill=circ*(1-Math.min(p,100)/100);
                return(<svg width={size} height={size} style={{flexShrink:0,transform:"rotate(-90deg)"}}>
                  <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#E2E8F0" strokeWidth="5"/>
                  <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={rc} strokeWidth="5"
                    strokeDasharray={circ} strokeDashoffset={fill} strokeLinecap="round"
                    style={{transition:"stroke-dashoffset .8s"}}/>
                </svg>);
              };
              return(
                <Card key={v.nombre} style={{marginBottom:8,padding:"14px 16px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                    <span style={{fontSize:20,flexShrink:0}}>{MEDAL[i]||`${i+1}`}</span>
                    <div style={{flex:1}}>
                      <p style={{margin:0,fontSize:13,fontWeight:800,color:T.text}}>{v.nombre}</p>
                      <Badge label={v.equipo} color={v.equipo==="WIKUK"?T.green:T.amber}/>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <p style={{margin:0,fontSize:17,fontWeight:900,color:c}}>{fmt(vReal)}€</p>
                      <p style={{margin:0,fontSize:10,color:T.muted}}>obj. {fmt(vObj)}€</p>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    {[
                      {label:"Ventas "+periodo,val:fmt(vReal)+"€",obj:"/"+fmt(vObj)+"€",pct:pctV,c},
                      {label:"Margen",val:v.mb+"%",obj:"obj. "+v.oMb+"%",pct:pctMb,c:cMb},
                    ].map(m=>(
                      <div key={m.label} style={{flex:1,background:"#F8FAFC",borderRadius:10,
                        padding:"10px 8px",display:"flex",gap:8,alignItems:"center"}}>
                        <div style={{position:"relative",flexShrink:0}}>
                          <Ring pct={m.pct} color={m.c}/>
                          <span style={{position:"absolute",top:"50%",left:"50%",
                            transform:"translate(-50%,-50%)",fontSize:9,fontWeight:800,color:m.c}}>{m.pct}%</span>
                        </div>
                        <div>
                          <p style={{margin:0,fontSize:9,color:T.muted,textTransform:"uppercase",fontWeight:700}}>{m.label}</p>
                          <p style={{margin:0,fontSize:12,fontWeight:800,color:T.text}}>{m.val}</p>
                          <p style={{margin:0,fontSize:9,color:T.muted}}>{m.obj}</p>
                        </div>
                      </div>
                    ))}
                  </div>
                  <div style={{marginTop:8,height:4,borderRadius:99,background:T.border}}>
                    <div style={{height:"100%",width:`${Math.min(pctV,100)}%`,background:c,borderRadius:99}}/>
                  </div>
                </Card>
              );
            })
          }
        </div>
      ) : null}

      {/* ══ 3. TAREAS + PIPELINE + RESTO ══ */}
      {/* Acciones urgentes */}
      <div style={{marginBottom:4}}>
        <HitosProyectoWidget usuario={usuario} onNav={onNav}/>
        <TareasWidget onNav={onNav} usuario={usuario}/>
      </div>

      {/* KPI pipeline + proyectos */}
      <div style={{display:"flex",gap:10,marginBottom:20}}>
        <Card onClick={()=>onNav("oportunidades")} style={{flex:1,padding:"14px",cursor:"pointer",borderTop:`3px solid ${T.navy}`}}>
          <p style={{margin:"0 0 2px",fontSize:10,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>💼 Pipeline</p>
          <p style={{margin:"0 0 2px",fontSize:20,fontWeight:900,color:T.navy}}>{fmt(valPipeline)}€</p>
          <p style={{margin:0,fontSize:11,color:T.muted}}>{opsActivas.length} ops activas</p>
        </Card>
        <Card onClick={()=>onNav("proyectos")} style={{flex:1,padding:"14px",cursor:"pointer",borderTop:`3px solid ${T.purple}`}}>
          <p style={{margin:"0 0 2px",fontSize:10,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>📁 Proyectos</p>
          <p style={{margin:"0 0 2px",fontSize:20,fontWeight:900,color:T.purple}}>{proyActivos.length}</p>
          <p style={{margin:0,fontSize:11,color:T.muted}}>activos ahora</p>
        </Card>
      </div>

      {/* Oportunidades en curso */}
      <div style={{marginBottom:24}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <p style={{margin:0,fontSize:13,fontWeight:800,color:T.text}}>💼 Oportunidades en curso</p>
          <button onClick={()=>onNav("oportunidades")} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:T.blue,fontWeight:700}}>Ver todas →</button>
        </div>
        {opsActivas.slice(0,3).map(op=>{
          const ec=ETAPA_COLOR[op.etapa]||T.muted;
          const ei=ETAPA_ICON[op.etapa]||"📌";
          const ag=USUARIOS.find(u=>u.id===op.agente);
          return(
            <Card key={op.id} onClick={()=>onNav("oportunidades")} style={{marginBottom:8,padding:"12px 16px",cursor:"pointer",borderLeft:`4px solid ${ec}`}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:20}}>{ei}</span>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{margin:0,fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{op.cliente}</p>
                  <p style={{margin:"2px 0 0",fontSize:11,color:T.muted}}>{ag?.nombre||""} · {op.prod}</p>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <p style={{margin:0,fontSize:14,fontWeight:900,color:T.text}}>{fmt(op.valor)}€</p>
                  <p style={{margin:0,fontSize:10,color:ec,fontWeight:700}}>{op.prob}%</p>
                </div>
              </div>
            </Card>
          );
        })}
      </div>

      {/* Proyectos activos */}
      <div style={{marginBottom:24}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <p style={{margin:0,fontSize:13,fontWeight:800,color:T.text}}>📁 Proyectos activos</p>
          <button onClick={()=>onNav("proyectos")} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:T.blue,fontWeight:700}}>Ver todos →</button>
        </div>
        {proyActivos.map(p=>{
          const tc=TIPO_COLOR[p.tipo]||T.muted;
          const ti=TIPO_ICON[p.tipo]||"📌";
          const hitosV=(p.hitos||[]).filter(h=>h.nombre||h.titulo||h.descripcion);
          const hechos=hitosV.filter(h=>h.hecho).length;
          const pct=hitosV.length>0?Math.round(hechos/hitosV.length*100):0;
          return(
            <Card key={p.id} onClick={()=>onNav("proyectos")} style={{marginBottom:8,padding:"13px 16px",cursor:"pointer"}}>
              <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:8}}>
                <div style={{width:36,height:36,borderRadius:10,background:tc+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{ti}</div>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{margin:0,fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.nombre}</p>
                  <p style={{margin:"2px 0 0",fontSize:11,color:T.muted}}>{hechos}/{hitosV.length} hitos · hasta {p.fin}</p>
                </div>
                <span style={{fontSize:13,fontWeight:900,color:pct===100?T.green:tc,flexShrink:0}}>{pct}%</span>
              </div>
              <div style={{height:4,borderRadius:99,background:T.border}}>
                <div style={{height:"100%",width:`${pct}%`,background:pct===100?T.green:tc,borderRadius:99}}/>
              </div>
            </Card>
          );
        })}
      </div>

      {/* Estrategias activas */}
      <div style={{marginBottom:24}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <p style={{margin:0,fontSize:13,fontWeight:800,color:T.text}}>🎯 Estrategias activas</p>
          <button onClick={()=>onNav("estrategias")} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:T.blue,fontWeight:700}}>Ver todas →</button>
        </div>
        {estActivas.length>0?estActivas.slice(0,5).map(e=>(
          <Card key={e.id} onClick={()=>onNav("estrategias")} style={{marginBottom:8,padding:"13px 16px",cursor:"pointer"}}>
            <p style={{margin:"0 0 3px",fontSize:13,fontWeight:700}}>{e.cliente||e.clienteNombre}</p>
            <p style={{margin:"0 0 4px",fontSize:11,color:T.muted}}>{e.texto||e.estrategia||e.objetivo}</p>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <span style={{fontSize:10,fontWeight:700,color:e.estado==="en_curso"?T.blue:T.amber,
                background:(e.estado==="en_curso"?T.blue:T.amber)+"15",padding:"2px 8px",borderRadius:6}}>
                {e.estado==="en_curso"?"🔵 En curso":"⏳ Pendiente aprobación"}
              </span>
              {e.agenteNombre&&<span style={{fontSize:10,color:T.muted}}>👤 {e.agenteNombre}</span>}
            </div>
          </Card>
        )):(
          <p style={{fontSize:12,color:T.muted,textAlign:"center",padding:16}}>Sin estrategias activas</p>
        )}
      </div>

    </div>
  );
}

const ESTADOS={
  prospecto:     {label:"🌱 Prospecto",    color:T.muted,  bg:"#F8FAFC"},
  propuesta:     {label:"📋 Propuesta",    color:T.blue,   bg:"#EFF6FF"},
  negociacion:   {label:"🤝 Negociación",  color:T.amber,  bg:"#FFFBEB"},
  cerrada_ganada:{label:"✅ Ganada",        color:T.green,  bg:"#F0FDF4"},
  cerrada_perdida:{label:"❌ Perdida",      color:T.red,    bg:"#FEF2F2"},
  ganada:        {label:"✅ Ganada",        color:T.green,  bg:"#F0FDF4"},
  perdida:       {label:"❌ Perdida",       color:T.red,    bg:"#FEF2F2"},
  sin_asignar:   {label:"⚪ Sin estado",   color:T.muted,  bg:"#F8FAFC"},
};

function Wizard({usuario,datosEscaneados,opoEditar,onSave,onClose}){
  const [step,setStep]=useState(opoEditar?3:0);
  const [tipo,setTipo]=useState((opoEditar||{}).tipoOpo||"nuevo");
  const [cli,setCli]=useState({
    nombre:(opoEditar||{}).cliente||(datosEscaneados||{}).empresa||"",
    tipologia:(opoEditar||{}).tipologia||"",
    nif:(opoEditar||{}).nif||(datosEscaneados||{}).nif||"",
    contacto:(opoEditar||{}).contacto||(datosEscaneados||{}).contacto||"",
    cargo:(opoEditar||{}).cargo||(datosEscaneados||{}).cargo||"",
    telefono:(opoEditar||{}).telefono||(datosEscaneados||{}).telefono||"",
    email:(opoEditar||{}).email||(datosEscaneados||{}).email||"",
    ciudad:(opoEditar||{}).ciudad||(datosEscaneados||{}).ciudad||"",
    web:(opoEditar||{}).web||"",
    direccion:(opoEditar||{}).direccion||(datosEscaneados||{}).direccion||"",
    descripcion:(opoEditar||{}).descripcionCliente||"",
  });
  const [fotos,setFotos]=useState((opoEditar||{}).fotos||[]);
  const [desc,setDesc]=useState(()=>{
    const n=(opoEditar||{}).descripcion||(opoEditar||{}).descripcionOportunidad||(opoEditar||{}).notas||"";
    return typeof n==="string"?n:Array.isArray(n)?n.map(x=>typeof x==="string"?x:x.texto||x.nota||"").join("\n"):"";
  });
  const [asignado,setAsignado]=useState((opoEditar||{}).agenteId||(opoEditar||{}).agente||"");
  const [valor,setValor]=useState((opoEditar||{}).valor||0);
  const [prob,setProb]=useState((opoEditar||{}).prob||50);
  const [etapa,setEtapa]=useState((opoEditar||{}).etapa||"propuesta");
  const [fecha,setFecha]=useState((opoEditar||{}).fecha||"");
  const [grabando,setGrabando]=useState(false);
  const [scanLoading,setScanLoading]=useState(false);
  const [fotoTarjeta,setFotoTarjeta]=useState(null);
  const [verFoto,setVerFoto]=useState(null);
  const fotoRef=useRef();
  const recogRef=useRef(null);

  // ── OCR: escanear tarjeta de visita con Claude API ──
  const escanearTarjeta=async(e)=>{
    const file=(e.target.files&&e.target.files[0]);if(!file)return;
    setScanLoading(true);
    try{
      const dataUrl=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file);});
      setFotoTarjeta(dataUrl);
      setFotos(p=>[...p,{data:dataUrl,nombre:"tarjeta_visita.jpg"}]);
      // Comprimir antes de enviar a la API
      const compressed=await comprimirImagen(dataUrl,1024);
      const base64=compressed.split(",")[1];
      const resp=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":ANTHROPIC_API_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",max_tokens:500,
          messages:[{role:"user",content:[
            {type:"image",source:{type:"base64",media_type:"image/jpeg",data:base64}},
            {type:"text",text:'Extrae TODOS los datos visibles de esta tarjeta de visita. Responde SOLO con un JSON: {"nombre":"","contacto":"","cargo":"","telefono":"","email":"","ciudad":"","web":"","direccion":"","nif":""}. Rellena todos los campos que puedas leer.'}
          ]}]
        })
      });
      const data=await resp.json();
      const text=((data.content&&data.content[0]&&data.content[0].text)||"{}").replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(text);
      setCli(c=>({
        ...c,
        nombre:parsed.nombre||parsed.empresa||c.nombre,
        contacto:parsed.contacto||c.contacto,
        cargo:parsed.cargo||c.cargo,
        telefono:parsed.telefono||c.telefono,
        email:parsed.email||c.email,
        ciudad:parsed.ciudad||c.ciudad,
        web:parsed.web||c.web,
        direccion:parsed.direccion||c.direccion,
        nif:parsed.nif||c.nif,
      }));
    }catch(err){console.log("OCR error:",err);}
    finally{setScanLoading(false);}
  };

  // ── Voz: transcripción con Web Speech API ──
  const toggleGrabar=()=>{
    if(grabando){
      if(recogRef.current){recogRef.current.stop();recogRef.current=null;}
      setGrabando(false);return;
    }
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert("Tu navegador no soporta reconocimiento de voz. Usa Chrome o Safari.");return;}
    const recognition=new SR();
    recognition.lang="es-ES";
    recognition.continuous=true;
    recognition.interimResults=true;
    let finalText="";
    recognition.onresult=(e)=>{
      let interim="";
      for(let i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal) finalText+=e.results[i][0].transcript+" ";
        else interim+=e.results[i][0].transcript;
      }
      setDesc(d=>{
        // Replace from last dictation marker
        const base=d.replace(/\[dictando\.\.\.\].*$/,"").trim();
        const newText=finalText+(interim?`[dictando...] ${interim}`:"");
        return base+(base?" ":"")+newText;
      });
    };
    recognition.onerror=(e)=>{console.log("Speech error:",e.error);setGrabando(false);};
    recognition.onend=()=>{
      setGrabando(false);
      // Clean up interim markers
      setDesc(d=>d.replace(/\[dictando\.\.\.\].*/,"").trim());
      recogRef.current=null;
    };
    recognition.start();
    recogRef.current=recognition;
    setGrabando(true);
  };

  const TIPOS=[
    {k:"nuevo",icon:"🆕",label:"Nuevo cliente",sub:"Sin relación previa"},
    {k:"recuperacion",icon:"🔄",label:"Recuperación",sub:"Ex-cliente a reconquistar"},
    {k:"expansion",icon:"📈",label:"Expansión",sub:"Ampliar con cliente actual"},
    {k:"referencia",icon:"👥",label:"Referencia",sub:"Recomendado por otro cliente"},
  ];
  const TIPOLOGIAS=["Obrador artesanal","Industria cárnica","Carnicería","Hostelería","Retail","Mayorista","Exportador"];
  const PASOS=["Tipo","Cliente","Imágenes","Oportunidad","Asignar","Confirmar"];

  const agentes=USUARIOS.filter(u=>u.rol==="agente");

  const addFoto=(e)=>{
    const files=e.target.files;if(!files)return;
    [...files].forEach(file=>{
      const r=new FileReader();
      r.onload=ev=>setFotos(p=>[...p,{data:ev.target.result,nombre:file.name}]);
      r.readAsDataURL(file);
    });
  };

  const guardar=()=>{
    const id=(opoEditar||{}).id||("OPO-"+Date.now());
    onSave({
      id,
      tipoOpo:tipo,
      cliente:cli.nombre,
      tipologia:cli.tipologia,
      nif:cli.nif,contacto:cli.contacto,cargo:cli.cargo,
      telefono:cli.telefono,email:cli.email,ciudad:cli.ciudad,
      web:cli.web,direccion:cli.direccion,descripcionCliente:cli.descripcion,
      fotos:fotos.map(f=>f.data||f),
      notas:desc,descripcion:desc,
      valor:Number(valor)||0,prob:Number(prob)||50,
      etapa,fecha,
      agente:asignado||usuario.id,
      agenteId:asignado||usuario.id,
      agenteNombre:(USUARIOS.find(u=>u.id===(asignado||usuario.id))||{}).nombre||usuario.nombre,
      equipo:usuario.equipo||(USUARIOS.find(u=>u.id===asignado)||{}).equipo||"",
      estado:asignado?"asignada":"sin_asignar",
      historial:[{accion:opoEditar?"✏️ Editada":"🆕 Creada",por:usuario.nombre,fecha:new Date().toLocaleDateString("es-ES")}],
      creadoPor:usuario.id,
      fechaCreacion:new Date().toISOString(),
    });
  };

  const canNext=()=>{
    if(step===0) return !!tipo;
    if(step===1) return !!cli.nombre.trim();
    if(step===3) return (typeof desc==="string"?desc:"").trim().length>=10;
    return true;
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:8}}>
      <div style={{background:"#fff",borderRadius:20,width:"min(640px,100%)",maxHeight:"92vh",display:"flex",flexDirection:"column",overflow:"hidden",boxShadow:"0 24px 64px rgba(0,0,0,.25)"}}>

        {/* Photo viewer overlay */}
        {verFoto&&(
          <div onClick={()=>setVerFoto(null)}
            style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:300,
              display:"flex",alignItems:"center",justifyContent:"center",padding:16,cursor:"pointer"}}>
            <img src={verFoto} style={{maxWidth:"100%",maxHeight:"90vh",objectFit:"contain",borderRadius:8}}/>
            <button onClick={()=>setVerFoto(null)}
              style={{position:"absolute",top:16,right:16,width:40,height:40,borderRadius:"50%",
                background:"rgba(255,255,255,.2)",border:"none",color:"#fff",fontSize:20,cursor:"pointer"}}>✕</button>
          </div>
        )}

        {/* Header + Stepper */}
        <div style={{background:T.navy,padding:"18px 22px 14px",flexShrink:0}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <span style={{fontSize:18}}>🎯</span>
              <p style={{margin:0,fontSize:16,fontWeight:800,color:"#fff"}}>{opoEditar?"Editar":"Nueva oportunidad"}</p>
            </div>
            <button onClick={onClose} style={{background:"rgba(255,255,255,.1)",border:"none",borderRadius:8,width:32,height:32,color:"#fff",fontSize:16,cursor:"pointer"}}>✕</button>
          </div>
          <div style={{display:"flex",gap:0,alignItems:"center"}}>
            {PASOS.map((p,i)=>{
              const done=i<step, active=i===step;
              return(
                <React.Fragment key={i}>
                  {i>0&&<div style={{flex:1,height:2,background:done?"#4ADE80":"rgba(255,255,255,.15)",margin:"0 2px"}}/>}
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                    <div style={{width:28,height:28,borderRadius:"50%",
                      background:done?"#4ADE80":active?"#fff":"rgba(255,255,255,.12)",
                      color:done?"#fff":active?T.navy:"rgba(255,255,255,.4)",
                      display:"flex",alignItems:"center",justifyContent:"center",
                      fontSize:11,fontWeight:800}}>
                      {done?"✓":i+1}
                    </div>
                    <span style={{fontSize:9,fontWeight:active?700:400,color:active?"#fff":"rgba(255,255,255,.4)"}}>{p}</span>
                  </div>
                </React.Fragment>
              );
            })}
          </div>
        </div>

        {/* Content */}
        <div style={{flex:1,overflowY:"auto",padding:"20px 22px"}}>

          {/* STEP 0: Tipo */}
          {step===0&&(
            <div>
              <p style={{margin:"0 0 4px",fontSize:18,fontWeight:800}}>¿Qué tipo de oportunidad?</p>
              <p style={{margin:"0 0 16px",fontSize:13,color:T.muted}}>Clasifica la oportunidad para un mejor seguimiento</p>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {TIPOS.map(t=>(
                  <button key={t.k} onClick={()=>setTipo(t.k)}
                    style={{padding:"20px 16px",borderRadius:14,border:`2px solid ${tipo===t.k?T.navy:T.border}`,
                      background:tipo===t.k?"#F1F5F9":"#fff",cursor:"pointer",textAlign:"left"}}>
                    <span style={{fontSize:28,display:"block",marginBottom:8}}>{t.icon}</span>
                    <p style={{margin:"0 0 3px",fontSize:14,fontWeight:700}}>{t.label}</p>
                    <p style={{margin:0,fontSize:11,color:T.muted}}>{t.sub}</p>
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* STEP 1: Cliente */}
          {step===1&&(
            <div>
              <p style={{margin:"0 0 4px",fontSize:18,fontWeight:800}}>Datos del cliente</p>
              <p style={{margin:"0 0 16px",fontSize:13,color:T.muted}}>Rellena los que tengas disponibles</p>

              {/* Tarjeta de visita — foto + OCR */}
              {fotoTarjeta?(
                <div style={{marginBottom:16}}>
                  <div onClick={()=>setVerFoto(fotoTarjeta)} style={{borderRadius:12,overflow:"hidden",border:`2px solid ${T.green}`,position:"relative",marginBottom:8,cursor:"pointer"}}>
                    <img src={fotoTarjeta} style={{width:"100%",maxHeight:180,objectFit:"cover",display:"block"}}/>
                    <div style={{position:"absolute",bottom:6,right:6,background:"rgba(0,0,0,.5)",color:"#fff",borderRadius:6,padding:"3px 8px",fontSize:10,fontWeight:600}}>🔍 Ver completa</div>
                    {scanLoading&&<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                      <span style={{color:"#fff",fontSize:14,fontWeight:700}}>⏳ Leyendo con IA...</span>
                    </div>}
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={async()=>{
                      setScanLoading(true);
                      try{
                        const compressed=await comprimirImagen(fotoTarjeta,1024);
                        const base64=compressed.split(",")[1];
                        const resp=await fetch("https://api.anthropic.com/v1/messages",{
                          method:"POST",
                          headers:{"Content-Type":"application/json","x-api-key":ANTHROPIC_API_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
                          body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,
                            messages:[{role:"user",content:[
                              {type:"image",source:{type:"base64",media_type:"image/jpeg",data:base64}},
                              {type:"text",text:'Extrae TODOS los datos visibles de esta tarjeta de visita. Responde SOLO con un JSON sin markdown ni explicaciones: {"nombre":"nombre de la empresa","contacto":"nombre de la persona","cargo":"cargo o puesto","telefono":"número completo","email":"email completo","ciudad":"ciudad o localidad","web":"sitio web","direccion":"dirección completa","nif":"NIF o CIF"}. Rellena todos los campos que puedas leer.'}
                            ]}]})
                        });
                        if(!resp.ok){
                          const errBody=await resp.text();
                          console.log("OCR API error:",resp.status,errBody);
                          alert("⚠️ Error API ("+resp.status+"). Rellena manualmente.");
                          return;
                        }
                        const data=await resp.json();
                        console.log("OCR response:",data);
                        const text=((data.content&&data.content[0]&&data.content[0].text)||"{}").replace(/```json|```/g,"").trim();
                        const p=JSON.parse(text);
                        console.log("OCR parsed:",p);
                        const updates={};
                        if(p.nombre&&p.nombre.trim()) updates.nombre=p.nombre.trim();
                        if(p.empresa&&p.empresa.trim()&&!updates.nombre) updates.nombre=p.empresa.trim();
                        if(p.contacto&&p.contacto.trim()) updates.contacto=p.contacto.trim();
                        if(p.persona&&p.persona.trim()&&!updates.contacto) updates.contacto=p.persona.trim();
                        if(p.cargo&&p.cargo.trim()) updates.cargo=p.cargo.trim();
                        if(p.telefono&&p.telefono.trim()) updates.telefono=p.telefono.trim();
                        if(p.email&&p.email.trim()) updates.email=p.email.trim();
                        if(p.ciudad&&p.ciudad.trim()) updates.ciudad=p.ciudad.trim();
                        if(p.web&&p.web.trim()) updates.web=p.web.trim();
                        if(p.direccion&&p.direccion.trim()) updates.direccion=p.direccion.trim();
                        if(p.nif&&p.nif.trim()) updates.nif=p.nif.trim();
                        if(p.cif&&p.cif.trim()&&!updates.nif) updates.nif=p.cif.trim();
                        const keys=Object.keys(updates);
                        if(keys.length>0){
                          setCli(c=>({...c,...updates}));
                          alert("✅ "+keys.length+" campos: "+keys.join(", "));
                        }else{
                          alert("⚠️ No se encontraron datos. Rellena manualmente.");
                        }
                      }catch(e){
                        console.log("OCR error:",e);
                        alert("⚠️ Error: "+(e.message||"conexión fallida")+". Rellena manualmente.");
                      }finally{setScanLoading(false);}
                    }} disabled={scanLoading}
                      style={{flex:2,padding:"10px",borderRadius:9,border:"none",
                        background:scanLoading?"#CBD5E1":T.navy,color:"#fff",
                        fontSize:12,fontWeight:700,cursor:scanLoading?"default":"pointer"}}>
                      {scanLoading?"⏳ Leyendo...":"🔍 Leer datos con IA"}
                    </button>
                    <button onClick={()=>{
                      const inp=document.createElement("input");
                      inp.type="file";inp.accept="image/*";
                      inp.onchange=(ev)=>{
                        const file=(ev.target.files&&ev.target.files[0]);if(!file)return;
                        const r=new FileReader();
                        r.onload=()=>{setFotoTarjeta(r.result);setFotos(p=>[...p.filter(f=>f.nombre!=="tarjeta_visita"),{data:r.result,nombre:"tarjeta_visita"}]);};
                        r.readAsDataURL(file);
                      };inp.click();
                    }}
                      style={{flex:1,padding:"10px",borderRadius:9,border:`1px solid ${T.border}`,
                        background:"#fff",color:T.text,fontSize:12,fontWeight:600,cursor:"pointer"}}>
                      🔄 Cambiar
                    </button>
                    <button onClick={()=>{setFotoTarjeta(null);setFotos(p=>p.filter(f=>f.nombre!=="tarjeta_visita"));}}
                      style={{padding:"10px 14px",borderRadius:9,border:`1px solid ${T.red}`,
                        background:"#FEF2F2",color:T.red,fontSize:12,fontWeight:700,cursor:"pointer"}}>
                      ✕
                    </button>
                  </div>
                </div>
              ):(
                <div style={{marginBottom:16}}>
                  <p style={{margin:"0 0 8px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>📷 Tarjeta de visita</p>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>{
                      const inp=document.createElement("input");
                      inp.type="file";inp.accept="image/*";inp.setAttribute("capture","environment");
                      inp.onchange=(ev)=>{
                        const file=(ev.target.files&&ev.target.files[0]);if(!file)return;
                        const r=new FileReader();
                        r.onload=()=>{setFotoTarjeta(r.result);setFotos(p=>[...p,{data:r.result,nombre:"tarjeta_visita"}]);};
                        r.readAsDataURL(file);
                      };inp.click();
                    }}
                      style={{flex:1,padding:"14px 12px",borderRadius:12,border:`2px dashed ${T.green}`,
                        background:"#F0FDF4",color:T.green,fontSize:13,fontWeight:700,cursor:"pointer",
                        display:"flex",gap:8,alignItems:"center",justifyContent:"center"}}>
                      📸 Hacer foto
                    </button>
                    <button onClick={()=>{
                      const inp=document.createElement("input");
                      inp.type="file";inp.accept="image/*";
                      inp.onchange=(ev)=>{
                        const file=(ev.target.files&&ev.target.files[0]);if(!file)return;
                        const r=new FileReader();
                        r.onload=()=>{setFotoTarjeta(r.result);setFotos(p=>[...p,{data:r.result,nombre:"tarjeta_visita"}]);};
                        r.readAsDataURL(file);
                      };inp.click();
                    }}
                      style={{flex:1,padding:"14px 12px",borderRadius:12,border:`2px dashed ${T.blue}`,
                        background:"#EFF6FF",color:T.blue,fontSize:13,fontWeight:700,cursor:"pointer",
                        display:"flex",gap:8,alignItems:"center",justifyContent:"center"}}>
                      🖼️ Galería
                    </button>
                  </div>
                  <p style={{margin:"6px 0 0",fontSize:11,color:T.muted,textAlign:"center"}}>
                    Tras seleccionar, pulsa "🔍 Leer datos con IA" para auto-rellenar
                  </p>
                </div>
              )}

              {/* Tipología */}
              <p style={{margin:"0 0 8px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Tipología</p>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
                {TIPOLOGIAS.map(t=>(
                  <button key={t} onClick={()=>setCli(c=>({...c,tipologia:c.tipologia===t?"":t}))}
                    style={{padding:"7px 12px",borderRadius:9,border:`1.5px solid ${cli.tipologia===t?T.navy:T.border}`,
                      background:cli.tipologia===t?"#F1F5F9":"#fff",color:cli.tipologia===t?T.navy:T.text,
                      fontSize:12,fontWeight:cli.tipologia===t?700:400,cursor:"pointer"}}>
                    {t}
                  </button>
                ))}
              </div>

              {/* Campos */}
              {[
                {k:"nombre",l:"Nombre empresa *",ph:"CARNICAS MARTINEZ SL"},
                {k:"nif",l:"NIF / CIF",ph:"B12345678",half:true},
                {k:"contacto",l:"Persona contacto",ph:"Juan García",half:true},
                {k:"cargo",l:"Cargo",ph:"Director de Compras",half:true},
                {k:"telefono",l:"Teléfono",ph:"+34 600 000 000",half:true},
                {k:"email",l:"Email",ph:"compras@empresa.com",half:true},
                {k:"ciudad",l:"Ciudad",ph:"Granada",half:true},
                {k:"web",l:"Web",ph:"www.empresa.com"},
                {k:"direccion",l:"Dirección",ph:"Calle Mayor 1, Polígono Industrial..."},
                {k:"descripcion",l:"Descripción del cliente",ph:"Tipo de negocio, empleados, productos que trabaja, situación actual...",multi:true},
              ].map((f,i,arr)=>{
                const prev=i>0?arr[i-1]:null;
                const isSecondHalf=f.half&&prev?.half;
                if(isSecondHalf) return null; // rendered in pair
                const next=f.half&&arr[i+1]?.half?arr[i+1]:null;
                if(f.half&&next){
                  return(
                    <div key={f.k} style={{display:"flex",gap:10,marginBottom:12}}>
                      {[f,next].map(ff=>(
                        <div key={ff.k} style={{flex:1}}>
                          <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>{ff.l}</p>
                          <input value={cli[ff.k]} onChange={e=>setCli(c=>({...c,[ff.k]:e.target.value}))}
                            placeholder={ff.ph}
                            style={{width:"100%",padding:"10px 12px",borderRadius:9,border:`1.5px solid ${T.border}`,fontSize:13,outline:"none",boxSizing:"border-box"}}/>
                        </div>
                      ))}
                    </div>
                  );
                }
                return(
                  <div key={f.k} style={{marginBottom:12}}>
                    <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>{f.l}</p>
                    {f.multi?(
                      <textarea value={cli[f.k]} onChange={e=>setCli(c=>({...c,[f.k]:e.target.value}))}
                        placeholder={f.ph} rows={3}
                        style={{width:"100%",padding:"10px 12px",borderRadius:9,border:`1.5px solid ${T.border}`,fontSize:13,outline:"none",boxSizing:"border-box",resize:"vertical",fontFamily:"inherit"}}/>
                    ):(
                      <input value={cli[f.k]} onChange={e=>setCli(c=>({...c,[f.k]:e.target.value}))}
                        placeholder={f.ph}
                        style={{width:"100%",padding:"10px 12px",borderRadius:9,border:`1.5px solid ${T.border}`,fontSize:13,outline:"none",boxSizing:"border-box"}}/>
                    )}
                  </div>
                );
              })}
            </div>
          )}

          {/* STEP 2: Imágenes */}
          {step===2&&(
            <div>
              <p style={{margin:"0 0 4px",fontSize:18,fontWeight:800}}>Fotos e imágenes</p>
              <p style={{margin:"0 0 16px",fontSize:13,color:T.muted}}>Tarjeta de visita, local, catálogo, documentos... Escribe una descripción en cada imagen</p>

              <div onClick={()=>fotoRef.current?.click()}
