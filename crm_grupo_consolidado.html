// ─── CALENDARIO / AGENDA ─────────────────────────────────────────
function Calendario({usuario, clientesFB, onAbrirCliente, onEventosChange}){
  const [eventos,setEventos]=useState([]);
  const [cargando,setCargando]=useState(true);
  const [semanaOffset,setSemanaOffset]=useState(0);
  const [diaSel,setDiaSel]=useState(new Date().getDay()||1); // 1=lun...5=vie
  const [showForm,setShowForm]=useState(false);
  const [formDia,setFormDia]=useState(null);
  const [form,setForm]=useState({hora:"09:00",cliente:"",tipo:"visita",nota:""});
  const [editId,setEditId]=useState(null);
  const [rutasPlan,setRutasPlan]=useState([]);

  const esAgente=usuario.rol==="agente";
  const esJefe=usuario.rol==="jefe";
  const esDir=["director","ceo"].includes(usuario.rol);
  const appMisIds=resolverMisIds(usuario);

  // Calcular semana
  const hoy=new Date();
  const lunes=new Date(hoy);
  lunes.setDate(hoy.getDate()-((hoy.getDay()+6)%7)+(semanaOffset*7));
  const dias=[];
  const DIAS_NOMBRE=["Lun","Mar","Mié","Jue","Vie"];
  for(let i=0;i<5;i++){
    const d=new Date(lunes);d.setDate(lunes.getDate()+i);
    dias.push({idx:i+1,nombre:DIAS_NOMBRE[i],fecha:d,
      str:d.toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit"}),
      iso:d.toISOString().split("T")[0],
      esHoy:d.toDateString()===hoy.toDateString()});
  }

  const semLabel=`${dias[0].str} — ${dias[4].str}`;
  const semISO=(()=>{const d=lunes;const s=new Date(d.getFullYear(),0,1);return Math.ceil(((d-s)/86400000+s.getDay()+1)/7);})();

  // Cargar eventos de Firebase
  useEffect(()=>{
    setCargando(true);
    fbLeer("calendario").then(data=>{
      const todos=data.filter(e=>!e.eliminado);
      setEventos(todos);
      if(onEventosChange) onEventosChange(todos);
    }).catch(()=>{}).finally(()=>setCargando(false));
  },[]);

  // Sync back to App when eventos change
  useEffect(()=>{
    if(onEventosChange&&eventos.length>0) onEventosChange(eventos);
  },[eventos]);

  // Cargar rutas planificadas para la semana visible
  useEffect(()=>{
    if(!esAgente) return;
    const planKey=`plan_${usuario.id}_sem${semISO}`;
    fbLeer("planificacion").then(data=>{
      const p=data.find(d=>d.id===planKey);
      setRutasPlan(p&&p.rutas?p.rutas:[]);
    }).catch(()=>{});
  },[semISO,usuario.id]);

  // Filtrar eventos por semana y rol
  const eventosSemana=useMemo(()=>{
    const isoSet=new Set(dias.map(d=>d.iso));
    return eventos.filter(e=>{
      if(!isoSet.has(e.fecha)) return false;
      if(esAgente) return appMisIds.has((e.agente||"").toUpperCase());
      if(esJefe){const ag=USUARIOS.find(u=>u.id===e.agente);return ag?.equipo===usuario.equipo;}
      return true;
    });
  },[eventos,dias,usuario.id]);

  const eventosDia=(iso)=>eventosSemana.filter(e=>e.fecha===iso).sort((a,b)=>(a.hora||"").localeCompare(b.hora||""));

  const TIPOS={
    visita:{icon:"👋",label:"Visita",color:"#3B82F6"},
    llamada:{icon:"📞",label:"Llamada",color:"#8B5CF6"},
    reunion:{icon:"🤝",label:"Reunión",color:"#F59E0B"},
    tarea:{icon:"📌",label:"Tarea",color:"#EF4444"},
    demo:{icon:"📦",label:"Demo/Muestra",color:"#059669"},
  };

  const guardar=()=>{
    if(!form.cliente.trim()&&form.tipo!=="tarea") return;
    const dia=formDia||dias.find(d=>d.idx===diaSel);
    if(!dia) return;
    const id=editId||("cal_"+Date.now());
    const evento={
      id,fecha:dia.iso,hora:form.hora,
      cliente:form.cliente.trim(),tipo:form.tipo,nota:form.nota,
      agente:usuario.id,agenteNombre:usuario.nombre,
      equipo:usuario.equipo||"",semana:semISO,
      creadoEn:new Date().toLocaleDateString("es-ES"),
    };
    if(editId){
      setEventos(ev=>ev.map(e=>e.id===editId?evento:e));
    }else{
      setEventos(ev=>[...ev,evento]);
    }
    fbEscribir("calendario",id,evento);
    setShowForm(false);setEditId(null);
    setForm({hora:"09:00",cliente:"",tipo:"visita",nota:""});
  };

  const eliminar=(id)=>{
    if(!confirm("¿Eliminar este evento?")) return;
    setEventos(ev=>ev.filter(e=>e.id!==id));
    fbEscribir("calendario",id,{id,eliminado:true});
  };

  const editar=(ev)=>{
    setEditId(ev.id);
    setForm({hora:ev.hora||"09:00",cliente:ev.cliente||"",tipo:ev.tipo||"visita",nota:ev.nota||""});
    setFormDia(dias.find(d=>d.iso===ev.fecha));
    setShowForm(true);
  };

  const clientes=clientesFB||[];
  const diaActual=dias.find(d=>d.idx===diaSel)||dias[0];
  const eventosDiaActual=eventosDia(diaActual.iso);

  // Contar eventos por día para badges
  const contDia=(d)=>eventosDia(d.iso).length;

  return(
    <div style={{padding:"0 0 100px"}}>
      {/* Navegación semana */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
        padding:"16px",background:"#fff",borderBottom:`1px solid ${T.border}`}}>
        <button onClick={()=>setSemanaOffset(s=>s-1)}
          style={{background:"none",border:`1px solid ${T.border}`,borderRadius:8,
            padding:"8px 14px",fontSize:16,cursor:"pointer",color:T.text}}>←</button>
        <div style={{textAlign:"center"}}>
          <p style={{margin:0,fontSize:14,fontWeight:800,color:T.text}}>📅 Semana {semISO}</p>
          <p style={{margin:"2px 0 0",fontSize:11,color:T.muted}}>{semLabel}</p>
        </div>
        <div style={{display:"flex",gap:6}}>
          {semanaOffset!==0&&(
            <button onClick={()=>setSemanaOffset(0)}
              style={{background:T.navy,border:"none",borderRadius:8,
                padding:"8px 12px",fontSize:11,fontWeight:700,cursor:"pointer",color:"#fff"}}>Hoy</button>
          )}
          <button onClick={()=>setSemanaOffset(s=>s+1)}
            style={{background:"none",border:`1px solid ${T.border}`,borderRadius:8,
              padding:"8px 14px",fontSize:16,cursor:"pointer",color:T.text}}>→</button>
        </div>
      </div>

      {/* Selector de día */}
      <div style={{display:"flex",background:"#fff",padding:"8px 12px",gap:4,
        borderBottom:`1px solid ${T.border}`}}>
        {dias.map(d=>(
          <button key={d.idx} onClick={()=>setDiaSel(d.idx)}
            style={{flex:1,padding:"10px 4px",borderRadius:10,border:"none",cursor:"pointer",
              background:diaSel===d.idx?T.navy:d.esHoy?"#EFF6FF":"transparent",
              color:diaSel===d.idx?"#fff":d.esHoy?T.navy:T.text,
              display:"flex",flexDirection:"column",alignItems:"center",gap:2,position:"relative"}}>
            <span style={{fontSize:10,fontWeight:700,opacity:.7}}>{d.nombre}</span>
            <span style={{fontSize:15,fontWeight:900}}>{d.fecha.getDate()}</span>
            {contDia(d)>0&&diaSel!==d.idx&&(
              <span style={{position:"absolute",top:2,right:4,background:T.navy,color:"#fff",
                fontSize:8,fontWeight:800,padding:"1px 4px",borderRadius:99,minWidth:14,textAlign:"center"}}>
                {contDia(d)}
              </span>
            )}
          </button>
        ))}
      </div>

      {/* Contenido del día */}
      <div style={{padding:"16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <p style={{margin:0,fontSize:13,fontWeight:800,color:T.text}}>
            {diaActual.nombre} {diaActual.str} · {eventosDiaActual.length} evento{eventosDiaActual.length!==1?"s":""}
          </p>
          <button onClick={()=>{setShowForm(true);setFormDia(diaActual);setEditId(null);setForm({hora:"09:00",cliente:"",tipo:"visita",nota:""});}}
            style={{padding:"7px 14px",borderRadius:8,border:"none",background:T.navy,
              color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>
            + Añadir
          </button>
        </div>

        {/* Formulario */}
        {showForm&&(
          <div style={{background:"#fff",borderRadius:14,padding:16,marginBottom:16,
            border:`2px solid ${T.navy}`,boxShadow:"0 4px 12px rgba(0,0,0,.08)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <p style={{margin:0,fontSize:13,fontWeight:800,color:T.navy}}>
                {editId?"✏️ Editar evento":"📅 Nuevo evento"} — {formDia?.nombre} {formDia?.str}
              </p>
              <button onClick={()=>{setShowForm(false);setEditId(null);}}
                style={{background:"none",border:"none",fontSize:18,color:T.muted,cursor:"pointer"}}>×</button>
            </div>

            {/* Tipo */}
            <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
              {Object.entries(TIPOS).map(([k,t])=>(
                <button key={k} onClick={()=>setForm(f=>({...f,tipo:k}))}
                  style={{padding:"6px 12px",borderRadius:8,border:`2px solid ${form.tipo===k?t.color:T.border}`,
                    background:form.tipo===k?t.color+"12":"#fff",fontSize:11,fontWeight:700,
                    color:form.tipo===k?t.color:T.muted,cursor:"pointer"}}>
                  {t.icon} {t.label}
                </button>
              ))}
            </div>

            {/* Hora */}
            <div style={{display:"flex",gap:8,marginBottom:10}}>
              <div style={{flex:1}}>
                <p style={{margin:"0 0 4px",fontSize:10,fontWeight:700,color:T.muted}}>Hora</p>
                <input type="time" value={form.hora} onChange={e=>setForm(f=>({...f,hora:e.target.value}))}
                  style={{width:"100%",padding:"9px 12px",borderRadius:8,border:`1.5px solid ${T.border}`,
                    fontSize:14,outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}/>
              </div>
            </div>

            {/* Cliente */}
            {form.tipo!=="tarea"&&(
              <div style={{marginBottom:10}}>
                <p style={{margin:"0 0 4px",fontSize:10,fontWeight:700,color:T.muted}}>Cliente</p>
                <SearchInput
                  value={form.cliente}
                  onChange={v=>setForm(f=>({...f,cliente:v}))}
                  placeholder="🔍 Buscar cliente..."
                  suggestions={clientes
                    .filter(c=>form.cliente.length>=2&&(c.nombre||c.NOMBRE||"").toLowerCase().includes(form.cliente.toLowerCase()))
                    .slice(0,6).map(c=>({label:c.nombre||c.NOMBRE,sub:c.poblacion||c.ciudad||"",tipo:"cliente"}))}
                  onSelect={s=>setForm(f=>({...f,cliente:s.label}))}
                />
              </div>
            )}

            {/* Nota */}
            <div style={{marginBottom:12}}>
              <p style={{margin:"0 0 4px",fontSize:10,fontWeight:700,color:T.muted}}>Nota (opcional)</p>
              <input value={form.nota} onChange={e=>setForm(f=>({...f,nota:e.target.value}))}
                placeholder="Objetivo de la visita, tema..."
                style={{width:"100%",padding:"9px 12px",borderRadius:8,border:`1.5px solid ${T.border}`,
                  fontSize:13,outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}/>
            </div>

            <button onClick={guardar}
              style={{width:"100%",padding:"12px",borderRadius:10,border:"none",
                background:T.navy,color:"#fff",fontSize:13,fontWeight:800,cursor:"pointer"}}>
              {editId?"💾 Guardar cambios":"✅ Añadir al calendario"}
            </button>
          </div>
        )}

        {/* Lista de eventos */}
        {cargando?(
          <p style={{textAlign:"center",padding:32,color:T.muted}}>Cargando calendario...</p>
        ):eventosDiaActual.length===0&&!showForm?(
          <div style={{textAlign:"center",padding:"40px 20px",color:T.muted}}>
            <span style={{fontSize:40,display:"block",marginBottom:8}}>📭</span>
            <p style={{margin:0,fontSize:13}}>Sin eventos para {diaActual.nombre} {diaActual.str}</p>
            <p style={{margin:"6px 0 0",fontSize:11,color:"#94A3B8"}}>Pulsa "+ Añadir" para programar una visita</p>
          </div>
        ):(
          <div>
            {eventosDiaActual.map(ev=>{
              const tipo=TIPOS[ev.tipo]||TIPOS.visita;
              const ag=USUARIOS.find(u=>u.id===ev.agente);
              return(
                <div key={ev.id} style={{display:"flex",gap:12,marginBottom:8,
                  background:"#fff",borderRadius:12,padding:"12px 14px",
                  border:`1.5px solid ${tipo.color}33`,borderLeft:`4px solid ${tipo.color}`}}>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",
                    padding:"4px 0",minWidth:44}}>
                    <span style={{fontSize:20}}>{tipo.icon}</span>
                    <span style={{fontSize:12,fontWeight:900,color:tipo.color,marginTop:2}}>{ev.hora}</span>
                  </div>
                  <div style={{flex:1}}>
                    <p style={{margin:0,fontSize:13,fontWeight:700,color:T.text}}>
                      {ev.cliente&&onAbrirCliente?(
                        <span onClick={()=>onAbrirCliente(ev.cliente)} style={{color:T.blue,cursor:"pointer",textDecoration:"underline"}}>{ev.cliente}</span>
                      ):(ev.cliente||tipo.label)}
                    </p>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:3}}>
                      <span style={{fontSize:10,fontWeight:700,color:tipo.color,background:tipo.color+"12",
                        padding:"2px 6px",borderRadius:5}}>{tipo.label}</span>
                      {(esJefe||esDir)&&ag&&<span style={{fontSize:10,color:T.muted}}>{ag.icon} {ag.nombre}</span>}
                    </div>
                    {ev.nota&&<p style={{margin:"4px 0 0",fontSize:11,color:T.muted,fontStyle:"italic"}}>{ev.nota}</p>}
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:4,flexShrink:0}}>
                    <button onClick={()=>editar(ev)}
                      style={{padding:"4px 8px",borderRadius:6,border:`1px solid ${T.border}`,
                        background:"#fff",color:T.blue,fontSize:10,fontWeight:700,cursor:"pointer"}}>✏️</button>
                    <button onClick={()=>eliminar(ev.id)}
                      style={{padding:"4px 8px",borderRadius:6,border:`1px solid ${T.border}`,
                        background:"#fff",color:T.red,fontSize:10,fontWeight:700,cursor:"pointer"}}>🗑️</button>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* ── Planificación de rutas de la semana ── */}
        {esAgente&&(()=>{
          const getRouteNum=(c)=>{
            if(c.semana&&Number(c.semana)>0) return Number(c.semana);
            if(c.ruta&&Number(c.ruta)>0) return Number(c.ruta);
            if(Array.isArray(c.semanas)&&c.semanas.length>0){const n=Number(c.semanas[0]);if(n>0)return n;}
            return 0;
          };
          const rutasDisp=[...new Set((clientes||[]).map(c=>getRouteNum(c)).filter(r=>r>0))].sort((a,b)=>a-b);
          const cliPorRuta=(r)=>(clientes||[]).filter(c=>getRouteNum(c)===r).length;
          const planKey=`plan_${usuario.id}_sem${semISO}`;

          const toggleR=(r)=>{
            const nv=rutasPlan.includes(r)?rutasPlan.filter(x=>x!==r):[...rutasPlan,r].sort((a,b)=>a-b);
            setRutasPlan(nv);
            fbEscribir("planificacion",planKey,{id:planKey,agente:usuario.id,semana:semISO,rutas:nv,
              fecha:new Date().toLocaleDateString("es-ES")});
          };

          if(rutasDisp.length===0) return null;
          return(
            <div style={{background:"#fff",borderRadius:12,padding:14,marginTop:16,border:`1px solid ${T.border}`}}>
              <p style={{margin:"0 0 8px",fontSize:12,fontWeight:800,color:T.text}}>
                🗺️ Rutas · Semana {semISO}
              </p>
              <p style={{margin:"0 0 10px",fontSize:11,color:T.muted}}>
                Selecciona las rutas que trabajarás esta semana:
              </p>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {rutasDisp.map(r=>{
                  const sel=rutasPlan.includes(r);
                  return(
                    <button key={r} onClick={()=>toggleR(r)}
                      style={{padding:"8px 14px",borderRadius:10,fontSize:12,fontWeight:700,
                        border:`2px solid ${sel?T.green:T.border}`,
                        background:sel?T.green+"12":"#fff",color:sel?T.green:T.text,
                        cursor:"pointer"}}>
                      {sel?"✅":"⬜"} Ruta {r} <span style={{fontSize:10,color:T.muted}}>({cliPorRuta(r)})</span>
                    </button>
                  );
                })}
              </div>
              {rutasPlan.length>0&&(
                <p style={{margin:"10px 0 0",fontSize:11,fontWeight:700,color:T.green}}>
                  ✅ {rutasPlan.map(r=>cliPorRuta(r)).reduce((a,b)=>a+b,0)} clientes en ruta{rutasPlan.length>1?"s":""} {rutasPlan.join(", ")}
                </p>
              )}
            </div>
          );
        })()}

        {/* Resumen semanal */}
        {eventosSemana.length>0&&(
          <div style={{background:"#fff",borderRadius:12,padding:14,marginTop:16,border:`1px solid ${T.border}`}}>
            <p style={{margin:"0 0 8px",fontSize:12,fontWeight:800,color:T.text}}>📊 Resumen de la semana</p>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {Object.entries(TIPOS).map(([k,t])=>{
                const n=eventosSemana.filter(e=>e.tipo===k).length;
                if(n===0) return null;
                return(
                  <span key={k} style={{fontSize:11,fontWeight:700,color:t.color,background:t.color+"12",
                    padding:"4px 10px",borderRadius:8}}>
                    {t.icon} {n} {t.label}{n>1?"s":""}
                  </span>
                );
              })}
              <span style={{fontSize:11,fontWeight:700,color:T.navy,background:T.navy+"12",
                padding:"4px 10px",borderRadius:8}}>
                📅 {eventosSemana.length} total
              </span>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function HistorialSemanal({ usuario }) {
  const esCeo      = usuario.rol === "ceo";
  const esDirector = usuario.rol === "director";
  const esDir      = esDirector; // alias para compat
  const esJefe     = usuario.rol === "jefe";
  const esAgentRol = usuario.rol === "agente";
  const esJefeOmas = esCeo || esDirector || esJefe;

  const SEMANA_ACTUAL = (()=>{
    const d=new Date(); const s=new Date(d.getFullYear(),0,1);
    return Math.ceil(((d-s)/86400000+s.getDay()+1)/7);
  })();

  const [semana,      setSemana]      = React.useState(SEMANA_ACTUAL);
  const [equipoSel,   setEquipoSel]   = React.useState("todos");
  const [agenteSel,   setAgenteSel]   = React.useState(null);
  const [treeHistRootOpen, setTreeHistRootOpen] = React.useState(false);
  const [treeHistEqOpen,   setTreeHistEqOpen]   = React.useState(null);
  const [tabSel,      setTabSel]      = React.useState("resumen");
  const [visitas,     setVisitas]     = React.useState([]);
  const [muestras,    setMuestras]    = React.useState([]);
  const [oportunidades,setOportunidades]=React.useState([]);
  const [informes,    setInformes]    = React.useState([]);
  const [cargando,    setCargando]    = React.useState(true);
  const [showFormVis, setShowFormVis] = React.useState(false);
  const [tareaRapida, setTareaRapida] = React.useState(null);
  const [asignandoOpoId, setAsignandoOpoId] = React.useState(null);
  const [showInforme, setShowInforme] = React.useState(false);
  const [formInf, setFormInf] = React.useState({resumen:"",logros:"",dificultades:"",proximaSemana:""}); // id de opo con panel abierto
  const [formVis,     setFormVis]     = React.useState({
    clienteNombre:"", ciudad:"", contacto:"", resultado:"seguimiento",
    nota:"", agenteId:"", urgente:false,
  });

  const miEquipo = usuario.equipo;
  const misIds = resolverMisIds(usuario);

  const agentesEquipo = USUARIOS.filter(u =>
    u.rol==="agente" && (esJefe ? u.equipo===miEquipo : true)
  );

  const esMio = (doc) => {
    if (esCeo || esDirector) return true;
    if (esJefe) {
      const agDoc=(doc.agente||doc.agenteId||doc.agenteGrupo||"").toLowerCase();
      const esMiEquipo=agentesEquipo.some(id=>id.id.toLowerCase()===agDoc||(id.grupoAgente||"").toLowerCase()===agDoc);
      const esMiCreacion=misIds.has((doc.creadoPor||"").toUpperCase())||doc.creadoPor===usuario.id;
      return esMiEquipo||esMiCreacion;
    }
    const esMiDoc=misIds.has((doc.agente||doc.agenteGrupo||"").toUpperCase());
    const esVisitaDirectorAMiCliente=
      (doc.creadoPor==="dir"||doc.creadoPorNombre==="Jefe de Ventas")&&
      misIds.has((doc.agenteAsignado||doc.grupoAgente||"").toUpperCase());
    return esMiDoc||esVisitaDirectorAMiCliente;
  };

  React.useEffect(()=>{
    setCargando(true);
    const timer = setTimeout(()=>setCargando(false), 8000); // timeout fallback
    Promise.all([
      fbLeer("visitas"),
      fbLeer("muestras"),
      fbLeer("oportunidades"),
      fbLeer("informes"),
    ]).then(([vis,mues,ops,infs])=>{
      setVisitas(vis.filter(v=>esMio(v)&&!v.eliminada));
      setMuestras(mues.filter(m=>esMio(m)&&!m.eliminada));
      setOportunidades(ops.filter(o=>esMio(o)&&!o.eliminada));
      setInformes(esJefeOmas?infs:infs.filter(i=>esMio(i)));
    }).catch(()=>{
      setVisitas([]); setMuestras([]); setOportunidades([]); setInformes([]);
    }).finally(()=>{clearTimeout(timer);setCargando(false);});
  },[usuario.id]);

  const semanaLabel = s => {
    const d=new Date(2026,0,1);
    d.setDate(d.getDate()+(s-1)*7);
    return d.toLocaleDateString("es-ES",{month:"short",day:"numeric"});
  };

  const visSemana = visitas.filter(v=>{
    if(Number(v.semana)!==semana) return false;
    const agV=v.agente||v.agenteId||"";
    const agObj=USUARIOS.find(u=>u.id===agV||u.grupoAgente===agV);
    if(agenteSel){
      const selObj=USUARIOS.find(u=>u.id===agenteSel);
      const match=agV.toUpperCase()===(agenteSel||"").toUpperCase()||
        (selObj&&selObj.grupoAgente&&selObj.grupoAgente===agV);
      if(!match) return false;
    }
    if(equipoSel!=="todos"&&agObj?.equipo!==equipoSel) return false;
    return true;
  });
  const muesSemana = muestras.filter(m=>Number(m.semana)===semana);
  const opsSemana  = oportunidades.filter(o=>Number(o.semana)===semana);

  // Todas las visitas de la semana sin filtro agente/equipo (para cards de agente)
  const visSemanaTodas = visitas.filter(v=>Number(v.semana)===semana);
  const opsSemanaTodas = oportunidades.filter(o=>Number(o.semana)===semana);

  // Informes de esta semana
  const infsSemana = informes.filter(i=>Number(i.semana)===semana);
  const agentesConInforme = new Set(infsSemana.map(i=>i.agente));
  const agentesTotales = esJefeOmas
    ? USUARIOS.filter(u=>u.rol==="agente"&&(esJefe?u.equipo===miEquipo:true)&&
        (equipoSel==="todos"?true:u.equipo===equipoSel)).length
    : 1;
  const miInforme = !esJefeOmas && infsSemana.find(i=>i.agente===usuario.id);
  const todosCerrado = agentesTotales>0 && agentesConInforme.size>=agentesTotales;
  const alguoEnvio   = agentesConInforme.size>0;
  const estadoColor  = todosCerrado?T.green:alguoEnvio?T.amber:semana<SEMANA_ACTUAL?T.red:T.muted;
  const estadoIcon   = todosCerrado?"✅":alguoEnvio?"⚠️":semana<SEMANA_ACTUAL?"❌":"📋";
  const estadoLabel  = esJefeOmas
    ? (todosCerrado?agentesConInforme.size+"/"+agentesTotales+" informes enviados"
      :alguoEnvio?agentesConInforme.size+"/"+agentesTotales+" informes enviados"
      :semana<SEMANA_ACTUAL?"Ningún informe enviado":"Semana en curso")
    : (miInforme?"Informe enviado el "+miInforme.fechaEnvio
      :semana<SEMANA_ACTUAL?"Informe pendiente":"Semana en curso");

  const TABS=[
    {id:"resumen",   label:"📊 Resumen"},
    {id:"visitas",   label:"👥 Visitas ("+visSemana.length+")"},
    ...(esJefeOmas?[{id:"oportunidades",label:"💼 Ops ("+opsSemana.length+")"}]:[{id:"muestras",label:"📦 Muestras ("+muesSemana.length+")"}]),
    {id:"evolucion", label:"📈 Evolución"},
  ];

  const RES_COLORS={pedido:T.green,seguimiento:T.amber,primera_visita:T.blue,no_contesta:"#E2E8F0",sin_contacto:"#E2E8F0"};
  const RES_LABEL ={pedido:"Pedido",seguimiento:"Seguim.",primera_visita:"1ª visita",no_contesta:"No contesta",sin_contacto:"Sin contacto"};

  // Donut SVG
  const DonutChart=({data,total,label})=>{
    const r=52,circ=2*Math.PI*r,cx=64,cy=64;
    let offset=0;
    return(
      <svg width={128} height={128} viewBox="0 0 128 128">
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#F1F5F9" strokeWidth={14}/>
        {data.map(({pct,color},i)=>{
          const dash=circ*pct/100;
          const el=<circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={14}
            strokeDasharray={dash+" "+(circ-dash)} strokeDashoffset={-offset*circ/100}
            strokeLinecap="butt" style={{transform:"rotate(-90deg)",transformOrigin:"50% 50%"}}/>;
          offset+=pct; return el;
        })}
        <text x={cx} y={cy-6} textAnchor="middle" fontSize="22" fontWeight="800" fill="#0F172A">{total}</text>
        <text x={cx} y={cy+14} textAnchor="middle" fontSize="11" fill="#94A3B8">{label}</text>
      </svg>
    );
  };

  const agentesActivos=[...new Set(visSemana.map(v=>v.agente||v.agenteId).filter(Boolean))].length;

  const guardarInforme = () => {
    const hoy = new Date().toLocaleDateString("es-ES");
    const doc = {
      id:`informe_${usuario.id}_s${semana}`,
      agente:     usuario.id,
      agenteNombre:usuario.nombre,
      equipo:     usuario.equipo||"dirección",
      semana,
      ano:        new Date().getFullYear(),
      fechaEnvio: hoy,
      estado:     "enviado",
      resumen:    formInf.resumen,
      logros:     formInf.logros,
      dificultades:formInf.dificultades,
      proximaSemana:formInf.proximaSemana,
      numVisitas: visSemana.length,
    };
    fbEscribir("informes", doc.id, doc).then(()=>{
      setInformes(prev=>[...prev.filter(i=>i.id!==doc.id), doc]);
      setShowInforme(false);
      setFormInf({resumen:"",logros:"",dificultades:"",proximaSemana:""});
      alert("✅ Informe semana "+semana+" enviado");
    });
  };

  const crearTareaRapida = (titulo, cliente, agenteId) => {
    const hoy = new Date().toLocaleDateString("es-ES");
    const id  = "tsk"+Date.now();
    const doc = {
      id, titulo, cliente,
      agente:     agenteId || "",
      creadaPor:  usuario.id,
      creadaPorNombre: usuario.nombre,
      estado:     "pendiente",
      prioridad:  "normal",
      tipo:       "contacto",
      creadaEn:   hoy,
    };

      clienteNombre: formVis.clienteNombre,
      ciudad:        formVis.ciudad,
      contacto:      formVis.contacto,
      resultado:     formVis.resultado,
      nota:          formVis.nota,
      urgente:       formVis.urgente,

      agenteAsignado:formVis.agenteId || usuario.id,
      creadoPor:     usuario.id,
      creadoPorNombre:usuario.nombre,
      semana,
      fecha:         hoy,
      tipo:          "visita_director",

      setVisitas(prev=>[...prev, doc]);

      setFormVis({clienteNombre:"",ciudad:"",contacto:"",resultado:"seguimiento",nota:"",agenteId:"",urgente:false});

              background:showInforme?"#F0F9FF":"#fff",cursor:"pointer",
              display:"flex",alignItems:"center",gap:10,

            <span style={{flex:1,textAlign:"left"}}>{showInforme?"× Cancelar":"Enviar informe semana "+semana}</span>

                📤 Informe semanal · Semana {semana}
              </p>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <div>

                <div>

                </div>
                <div>
                  <p style={{margin:"0 0 4px",fontSize:11,fontWeight:700,color:T.muted}}>Dificultades / incidencias</p>
                  <textarea style={{...inp,minHeight:48}} placeholder="Problemas encontrados, clientes complicados..."
                    value={formInf.dificultades} onChange={e=>setFormInf(f=>({...f,dificultades:e.target.value}))}/>

                  <p style={{margin:"0 0 4px",fontSize:11,fontWeight:700,color:T.muted}}>Plan próxima semana</p>
                  <textarea style={{...inp,minHeight:48}} placeholder="Objetivos y prioridades para la semana siguiente..."
                    value={formInf.proximaSemana} onChange={e=>setFormInf(f=>({...f,proximaSemana:e.target.value}))}/>
                </div>
                <div style={{background:"#F8FAFC",borderRadius:9,padding:"10px 12px"}}>
                  <p style={{margin:0,fontSize:11,color:T.muted}}>

        </div>

      {/* Selector de semana con estado de informe */}

        <div style={{background:"#fff",border:"1.5px solid "+estadoColor+"30",borderRadius:14,padding:"12px 16px",marginBottom:14}}>

              style={{width:36,height:36,borderRadius:9,border:"1.5px solid "+T.border,

                <p style={{margin:0,fontSize:9,color:T.muted}}>{k.sub}</p>

              style={{background:equipoSel==="todos"&&!agenteSel?T.navy:"#fff",

            const eqColor=eq==="WIKUK"?T.green:T.amber;
            const agEq=USUARIOS.filter(u=>u.rol==="agente"&&u.equipo===eq);
            const vEq=visSemanaTodas.filter(v=>agEq.some(a=>a.id===(v.agente||v.agenteId)||(a.grupoAgente&&a.grupoAgente===v.agente))).length;

            const isSel=equipoSel===eq&&!agenteSel;
            return(
              <div key={eq} style={{marginBottom:6,marginLeft:(esCeo||esDir)?12:0,

                <div onClick={()=>{
                    if(isSel){setTreeHistEqOpen(isOpen?null:eq);}
                    else{setEquipoSel(eq);setAgenteSel(null);setTreeHistEqOpen(eq);}

                    cursor:"pointer",border:"2px solid "+(isSel?eqColor:T.border),
                    display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:30,height:30,borderRadius:8,background:eqColor+"20",
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,
                    color:eqColor,fontWeight:800,flexShrink:0}}>{eq[0]}</div>
                  <div style={{flex:1}}>
                    <p style={{margin:0,fontSize:13,fontWeight:700,color:isSel?eqColor:T.text}}>{eq}</p>

                      {agEq.length} comerciales · {vEq} visitas
                    </p>
                  </div>
                  {isSel&&<span style={{color:eqColor,fontWeight:800}}>✓</span>}
                  <span style={{color:isOpen?eqColor:T.muted,fontSize:16,
                    transform:isOpen?"rotate(90deg)":"rotate(0deg)",display:"inline-block",transition:"transform .2s"}}>›</span>

                    <>
                      <div style={{display:"flex",gap:4,marginBottom:6}}>

        <div>
          {visSemana.length>0?(

                    <DonutChart data={data} total={visSemana.length} label="visitas"/>

                  value={formVis.nota} onChange={e=>setFormVis(f=>({...f,nota:e.target.value}))}/>
                <label style={{display:"flex",alignItems:"center",gap:8,fontSize:13,cursor:"pointer"}}>
                  <input type="checkbox" checked={formVis.urgente}
                    onChange={e=>setFormVis(f=>({...f,urgente:e.target.checked}))}/>
                  🔴 Marcar como urgente
                </label>
                <button onClick={guardarVisita}
                  style={{width:"100%",padding:"12px",background:T.navy,color:"#fff",
                    border:"none",borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer"}}>
                  ✅ Guardar visita
                </button>
              </div>
            </div>
            );
          })()}

          {visSemana.length===0&&!showFormVis&&<div style={{textAlign:"center",padding:32,color:T.muted}}>Sin visitas esta semana</div>}
          {visSemana.map((v,i)=>{
            const ag=esJefeOmas?USUARIOS.find(u=>u.id===(v.agente||v.agenteId)||u.grupoAgente===(v.agente||"")):null;
            const rc=RES_COLORS[v.resultado]||T.muted;
            return(
              <div key={i} style={{background:"#fff",borderRadius:12,padding:"12px 16px",
                border:"1px solid "+T.border,borderLeft:"4px solid "+rc}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                  <div style={{flex:1}}>
                    <p style={{margin:"0 0 2px",fontSize:13,fontWeight:700,color:T.text}}>{v.clienteNombre||v.empresa||"—"}</p>
                    <p style={{margin:"0 0 4px",fontSize:11,color:T.muted}}>{v.ciudad||v.contacto||""}</p>
                    {v.nota&&<p style={{margin:0,fontSize:11,color:"#475569",lineHeight:1.5}}>{v.nota}</p>}
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <span style={{fontSize:10,fontWeight:700,color:rc,background:rc+"18",borderRadius:6,padding:"2px 8px",display:"block",marginBottom:4}}>
                      {RES_LABEL[v.resultado]||v.resultado||"—"}
                    </span>
                    {ag&&<span style={{fontSize:10,color:ag.color,fontWeight:600}}>{ag.nombre}</span>}
                  </div>
                </div>
                {esJefeOmas&&(
                  <button
                    onClick={()=>crearTareaRapida(
                      "Seguimiento — "+(v.clienteNombre||v.empresa||"cliente"),
                      v.clienteNombre||v.empresa||"",
                      ag?.id||""
                    )}
                    style={{marginTop:8,width:"100%",padding:"6px",
                      border:"1px solid "+T.border,borderRadius:8,background:"#F8FAFC",
                      fontSize:11,color:T.muted,cursor:"pointer",fontWeight:600}}>
                    📌 Crear tarea de seguimiento
                  </button>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* Tab: Oportunidades (managers) */}
      {tabSel==="oportunidades"&&esJefeOmas&&(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {opsSemana.length===0&&<div style={{textAlign:"center",padding:32,color:T.muted}}>Sin oportunidades esta semana</div>}
          {(()=>{
            const agentesDisp=USUARIOS.filter(u=>u.rol==="agente"&&(esJefe?u.equipo===miEquipo:true));
            const asignarOpo=(oId, agenteId, oDoc)=>{
              const updated={...oDoc,agenteId,estado:"asignada"};
              fbEscribir("oportunidades",oId,updated).then(()=>{
                setOportunidades(prev=>prev.map(x=>x.id===oId?updated:x));
                setAsignandoOpoId(null);
              });
            };
            return opsSemana.map((o,i)=>{
            const ag=USUARIOS.find(u=>u.id===(o.agenteId||o.agente)||u.grupoAgente===(o.agenteId||o.agente||""));
            const sinAsignar=!o.agenteId&&!o.agente;
            const showAsignar=asignandoOpoId===o.id;
            return(
              <div key={i} style={{background:"#fff",borderRadius:12,padding:"12px 16px",
                border:"1.5px solid "+(sinAsignar?T.amber:T.border)}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                  <div style={{flex:1}}>
                    <p style={{margin:"0 0 2px",fontSize:13,fontWeight:700,color:T.text}}>{o.nombre||o.cliente||"—"}</p>
                    <p style={{margin:"0 0 3px",fontSize:11,color:T.muted}}>{o.ciudad||o.descripcionCliente||""}</p>
                    {o.contacto&&<p style={{margin:0,fontSize:11,color:T.muted}}>👤 {o.contacto}</p>}
                  </div>
                  <div style={{flexShrink:0,textAlign:"right"}}>
                    {ag
                      ?<span style={{fontSize:10,fontWeight:700,color:ag.color,background:ag.color+"18",
                          borderRadius:99,padding:"2px 8px",display:"block"}}>{ag.icon} {ag.nombre}</span>
                      :<span style={{fontSize:10,fontWeight:700,color:T.amber,background:"#FFFBEB",
                          borderRadius:99,padding:"2px 8px",display:"block"}}>⚠️ Sin asignar</span>
                    }
                  </div>
                </div>

                {/* Acciones */}
                <div style={{display:"flex",gap:6,marginTop:8}}>
                  <button onClick={()=>setAsignandoOpoId(showAsignar?null:o.id)}
                    style={{flex:1,padding:"6px",border:"1px solid "+T.blue,borderRadius:8,
                      background:T.blueL,color:T.blue,fontSize:11,fontWeight:700,cursor:"pointer"}}>
                    {showAsignar?"× Cancelar":"👤 Asignar agente"}
                  </button>
                  <button onClick={()=>crearTareaRapida(
                      "Seguimiento — "+(o.nombre||o.cliente||"oportunidad"),
                      o.nombre||o.cliente||"",
                      ag?.id||""
                    )}
                    style={{flex:1,padding:"6px",border:"1px solid "+T.border,borderRadius:8,
                      background:"#F8FAFC",color:T.muted,fontSize:11,fontWeight:600,cursor:"pointer"}}>
                    📌 Crear tarea
                  </button>
                </div>

                {/* Panel asignación */}
                {showAsignar&&(
                  <div style={{marginTop:10,padding:"10px 12px",background:"#F8FAFC",
                    borderRadius:9,border:"1px solid "+T.border}}>
                    <p style={{margin:"0 0 8px",fontSize:12,fontWeight:700,color:T.text}}>Asignar a:</p>
                    <div style={{display:"flex",flexDirection:"column",gap:5}}>
                      {agentesDisp.map(a=>(
                        <button key={a.id} onClick={()=>asignarOpo(o.id,a.id,o)}
                          style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",
                            borderRadius:8,border:"1.5px solid "+T.border,background:"#fff",
                            cursor:"pointer",textAlign:"left"}}>
                          <span style={{fontSize:16}}>{a.icon}</span>
                          <span style={{fontSize:12,fontWeight:600,color:T.text}}>{a.nombre}</span>
                          <span style={{fontSize:11,color:T.muted,marginLeft:"auto"}}>{a.equipo}</span>
                        </button>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            );
          });})()}
        </div>
      )}

      {/* Tab: Muestras (agente) */}
      {tabSel==="muestras"&&!esJefeOmas&&(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {muesSemana.length===0&&<div style={{textAlign:"center",padding:32,color:T.muted}}>Sin muestras esta semana</div>}
          {muesSemana.map((m,i)=>(
            <div key={i} style={{background:"#fff",borderRadius:12,padding:"12px 16px",border:"1px solid "+T.border}}>
              <p style={{margin:"0 0 2px",fontSize:13,fontWeight:700,color:T.text}}>{m.empresa||m.cliente||"—"}</p>
              <p style={{margin:0,fontSize:11,color:T.muted}}>{m.producto||""}</p>
            </div>
          ))}
        </div>
      )}

      {/* Tab: Evolución — barras SVG por semana */}
      {tabSel==="evolucion"&&(
        <div style={{background:"#fff",borderRadius:14,padding:16,border:"1px solid "+T.border}}>
          <p style={{margin:"0 0 12px",fontSize:13,fontWeight:700,color:T.text}}>Visitas últimas 8 semanas</p>
          {(()=>{
            const semanas=Array.from({length:8},(_,i)=>semana-7+i).filter(s=>s>0);
            const data=semanas.map(s=>({s,n:visitas.filter(v=>Number(v.semana)===s).length}));
            const maxN=Math.max(...data.map(d=>d.n),1);
            const barH=80;
            return(
              <div style={{display:"flex",alignItems:"flex-end",gap:6,height:barH+30}}>
                {data.map(d=>{
                  const h=d.n>0?Math.max(d.n/maxN*barH,8):4;
                  const isCurrent=d.s===semana;
                  return(
                    <div key={d.s} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                      {d.n>0&&<span style={{fontSize:10,fontWeight:700,color:isCurrent?T.navy:T.muted}}>{d.n}</span>}
                      <div style={{width:"100%",height:h,borderRadius:4,
                        background:isCurrent?T.navy:d.n>0?T.blue+"60":T.border}}/>
                      <span style={{fontSize:9,color:T.muted}}>S{d.s}</span>
                    </div>
                  );
                })}
              </div>
            );
          })()}
        </div>
      )}
    </div>
  );
}

// ASISTENTE IA — Managed Agents (se restaurará en siguiente paso)
// ══════════════════════════════════════════════════════════════════
function AsistenteIA({ usuario, clientesFB, oportunidadesDB }) {
  const [apiKey,   setApiKey]   = React.useState(()=>sessionStorage.getItem("ant_key")||"");
  const [conectado,setConectado]= React.useState(()=>!!sessionStorage.getItem("ant_key"));
  const [msgs,     setMsgs]     = React.useState([]);
  const [input,    setInput]    = React.useState("");
  const [cargando,  setCargando]  = React.useState(false);
  const [escuchando,setEscuchando]= React.useState(false);
  const [vozActiva, setVozActiva] = React.useState(false);
  const endRef    = React.useRef(null);
  const reconRef  = React.useRef(null);

  React.useEffect(()=>{ endRef.current?.scrollIntoView({behavior:"smooth"}); },[msgs]);

  const conectar = () => {
    if(!apiKey.trim().startsWith("sk-ant")) return alert("Clave inválida — debe empezar por sk-ant");
    sessionStorage.setItem("ant_key", apiKey.trim());
    setConectado(true);
  };

  const contextSistema = React.useMemo(()=>{
    const ctxIds=resolverMisIds(usuario);
    const misOps = (oportunidadesDB||[]).filter(o=>
      esDelUsuario(o.agente,ctxIds)||esDelUsuario(o.agenteId,ctxIds)||
      ["director","ceo"].includes(usuario.rol)
    ).slice(0,20);
    const misClientes = (clientesFB||[]).slice(0,30);
    const opsStr = misOps.length>0
      ? "Oportunidades activas ("+misOps.length+"):\n"
        + misOps.map(o=>"- "+(o.nombre||o.cliente)+": "+(o.estado||o.etapa)+", "+(o.valor||"")+"€").join("\n")
      : "";
    const cliStr = misClientes.length>0
      ? "Clientes recientes ("+misClientes.length+"):\n"
        + misClientes.map(c=>"- "+(c.NOMBRE||c.nombre)).slice(0,15).join("\n")
      : "";
    return "Eres un asistente comercial experto para Grupo Consolidado (WIKUK + INTERKEY), empresa de ingredientes y tripas para la industria cárnica española.\n\n"
      + "Usuario: "+usuario.nombre+" | Rol: "+usuario.rol+" | Equipo: "+(usuario.equipo||"dirección")+"\n\n"
      + (opsStr ? opsStr+"\n\n" : "")
      + (cliStr ? cliStr+"\n\n" : "")
      + "Ayuda con: análisis de clientes, redactar emails comerciales, propuestas, estrategias de recuperación, preparar informes. Responde siempre en español, de forma concisa y práctica.";
  },[usuario,clientesFB,oportunidadesDB]);

  // ── Micrófono (Speech-to-Text) ─────────────────────
  const iniciarEscucha = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR){
      alert("Reconocimiento de voz no disponible. Usa Chrome o Edge.");
      return;
    }
    if(escuchando){
      reconRef.current?.stop();
      setEscuchando(false);
      return;
    }
    const r = new SR();
    r.lang = "es-ES";
    r.continuous = false;
    r.interimResults = false;
    reconRef.current = r;
    r.onstart  = () => setEscuchando(true);
    r.onend    = () => setEscuchando(false);
    r.onerror  = () => setEscuchando(false);
    r.onresult = (e) => {
      const txt = e.results[0][0].transcript;
      setInput(prev => prev ? prev + " " + txt : txt);
    };
    r.start();
  };

  // ── Text-to-Speech ───────────────────────────────────
  const leerEnVoz = (texto) => {
    if(!vozActiva || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(texto);
    utt.lang = "es-ES";
    utt.rate = 1.05;
    utt.pitch = 1;
    window.speechSynthesis.speak(utt);
  };

  const enviar = async () => {
    if(!input.trim()||cargando) return;
    const userMsg = {role:"user", content:input.trim()};
    const newMsgs = [...msgs, userMsg];
    setMsgs(newMsgs);
    setInput("");
    setCargando(true);
    try {
      const r = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "x-api-key": ANTHROPIC_API_KEY,
          "anthropic-version":"2023-06-01",
          "anthropic-dangerous-direct-browser-access":"true",
          "anthropic-dangerous-direct-browser-access":"true",
        },
        body: JSON.stringify({
          model:"claude-opus-4-5",
          max_tokens:1024,
          system: contextSistema,
          messages: newMsgs,
        })
      });
      const data = await r.json();
      if(data.error) throw new Error(data.error.message);
      const reply = (data.content&&data.content[0]&&data.content[0].text) || "Sin respuesta";
      setMsgs(p=>[...p,{role:"assistant",content:reply}]);
      leerEnVoz(reply);
    } catch(e) {
      setMsgs(p=>[...p,{role:"assistant",content:`❌ Error: ${e.message}`}]);
    }
    setCargando(false);
  };

  const desconectar = () => {
    sessionStorage.removeItem("ant_key");
    setConectado(false); setApiKey(""); setMsgs([]);
  };

  if(!conectado) return (
    <div style={{padding:"32px 20px",maxWidth:480,margin:"0 auto"}}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{fontSize:64,marginBottom:12}}>🤖</div>
        <p style={{margin:"0 0 6px",fontSize:22,fontWeight:900,color:"#0F172A"}}>Asistente IA</p>
        <p style={{margin:0,fontSize:13,color:"#64748B"}}>Powered by Claude · Anthropic</p>
      </div>
      <div style={{background:"#F0F9FF",borderRadius:12,padding:"14px 16px",marginBottom:20,fontSize:12,color:"#0369A1"}}>
        <p style={{margin:"0 0 6px",fontWeight:700}}>¿Qué puede hacer?</p>
        {"Consultar y analizar clientes · Redactar emails y propuestas · Sugerir estrategias · Preparar informes semanales".split(" · ").map(t=>(
          <p key={t} style={{margin:"3px 0"}}>• {t}</p>
        ))}
      </div>
      <p style={{margin:"0 0 8px",fontSize:12,fontWeight:700,color:"#0F172A"}}>API Key de Anthropic</p>
      <input
        type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)}
        placeholder="sk-ant-..." onKeyDown={e=>e.key==="Enter"&&conectar()}
        style={{width:"100%",padding:"12px 14px",borderRadius:10,border:"1.5px solid #E2E8F0",
          fontSize:13,outline:"none",boxSizing:"border-box",marginBottom:12,fontFamily:"monospace"}}
      />
      <button onClick={conectar}
        style={{width:"100%",padding:"14px",background:"#0F172A",color:"#fff",border:"none",
          borderRadius:10,fontSize:14,fontWeight:700,cursor:"pointer"}}>
        Conectar asistente →
      </button>
      <p style={{margin:"12px 0 0",fontSize:11,color:"#94A3B8",textAlign:"center"}}>
        La clave se guarda solo en este navegador (sessionStorage)
      </p>
    </div>
  );

  const SUGERENCIAS = [
    "¿Qué clientes llevan más de 3 meses sin comprar?",
    "Redacta un email de seguimiento para Guissona",
    "¿Cuáles son mis oportunidades más urgentes?",
    "Prepara un resumen de actividad de esta semana",
  ];

  return (
    <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 140px)",padding:"0 0 0 0"}}>
      {/* Header */}
      <div style={{padding:"12px 16px",borderBottom:"1px solid #E2E8F0",display:"flex",
        alignItems:"center",gap:10,background:"#fff",flexShrink:0}}>
        <span style={{fontSize:24}}>🤖</span>
        <div style={{flex:1}}>
          <p style={{margin:0,fontSize:13,fontWeight:700,color:"#0F172A"}}>Asistente IA</p>
          <p style={{margin:0,fontSize:11,color:"#22C55E"}}>● Conectado · Claude claude-sonnet-4-20250514</p>
        </div>
        <button onClick={desconectar}
          style={{fontSize:11,color:"#94A3B8",background:"none",border:"1px solid #E2E8F0",
            borderRadius:6,padding:"4px 10px",cursor:"pointer"}}>
          Desconectar
        </button>
      </div>

      {/* Mensajes */}
      <div style={{flex:1,overflowY:"auto",padding:"16px",display:"flex",flexDirection:"column",gap:12}}>
        {msgs.length===0 && (
          <div>
            <p style={{textAlign:"center",color:"#94A3B8",fontSize:13,margin:"20px 0 16px"}}>
              Hola {usuario.nombre.split(" ")[0]}, ¿en qué puedo ayudarte?
            </p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {SUGERENCIAS.map(s=>(
                <button key={s} onClick={()=>{setInput(s);}}
                  style={{padding:"10px 12px",borderRadius:10,border:"1.5px solid #E2E8F0",
                    background:"#fff",fontSize:11,color:"#475569",cursor:"pointer",
                    textAlign:"left",lineHeight:1.4}}>
                  {s}
                </button>
              ))}
            </div>
          </div>
        )}
        {msgs.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
            <div style={{maxWidth:"85%",padding:"10px 14px",borderRadius:12,
              background:m.role==="user"?"#0F172A":"#F1F5F9",
              color:m.role==="user"?"#fff":"#0F172A",
              fontSize:13,lineHeight:1.6,
              borderBottomRightRadius:m.role==="user"?2:12,
              borderBottomLeftRadius:m.role==="assistant"?2:12,
              whiteSpace:"pre-wrap"}}>
              {m.content}
            </div>
          </div>
        ))}
        {cargando&&(
          <div style={{display:"flex",gap:6,padding:"10px 14px",background:"#F1F5F9",
            borderRadius:12,width:"fit-content",alignItems:"center"}}>
            {[0,1,2].map(i=>(
              <div key={i} style={{width:8,height:8,borderRadius:"50%",background:"#94A3B8",
                animation:`bounce 1s ${i*0.2}s infinite`}}/>
            ))}
          </div>
        )}
        <div ref={endRef}/>
      </div>

      {/* Input con voz */}
      <div style={{padding:"10px 16px",borderTop:"1px solid #E2E8F0",background:"#fff",flexShrink:0}}>
        {/* Controles de voz */}
        <div style={{display:"flex",gap:6,marginBottom:8,justifyContent:"flex-end"}}>
          <button onClick={iniciarEscucha}
            style={{display:"flex",alignItems:"center",gap:5,padding:"5px 12px",
              borderRadius:99,border:"1.5px solid "+(escuchando?"#EF4444":"#E2E8F0"),
              background:escuchando?"#FEF2F2":"#F8FAFC",
              color:escuchando?"#EF4444":"#64748B",
              fontSize:11,fontWeight:700,cursor:"pointer",
              animation:escuchando?"pulse 1s infinite":undefined}}>
            {escuchando?"⏹ Escuchando...":"🎤 Voz"}
          </button>
          <button onClick={()=>{
              setVozActiva(v=>!v);
              if(vozActiva) window.speechSynthesis?.cancel();
            }}
            style={{display:"flex",alignItems:"center",gap:5,padding:"5px 12px",
              borderRadius:99,border:"1.5px solid "+(vozActiva?"#3B82F6":"#E2E8F0"),
              background:vozActiva?"#EFF6FF":"#F8FAFC",
              color:vozActiva?"#3B82F6":"#64748B",
              fontSize:11,fontWeight:700,cursor:"pointer"}}>
            {vozActiva?"🔊 Voz ON":"🔇 Voz OFF"}
          </button>
        </div>
        {/* Campo de texto */}
        <div style={{display:"flex",gap:8}}>
          <input value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&enviar()}
            placeholder={escuchando?"🎤 Escuchando...":"Escribe o usa el micrófono..."}
            disabled={cargando}
            style={{flex:1,padding:"10px 14px",borderRadius:10,
              border:"1.5px solid "+(escuchando?"#EF4444":"#E2E8F0"),
              fontSize:13,outline:"none",fontFamily:"inherit",
              background:escuchando?"#FEF2F2":"#fff"}}
          />
          <button onClick={enviar} disabled={cargando||!input.trim()}
            style={{padding:"10px 18px",
              background:cargando||!input.trim()?"#E2E8F0":"#0F172A",
              color:cargando||!input.trim()?"#94A3B8":"#fff",
              border:"none",borderRadius:10,fontSize:13,fontWeight:700,
              cursor:cargando||!input.trim()?"not-allowed":"pointer"}}>
            {cargando?"...":"↑"}
          </button>
        </div>
      </div>
      <style>{`
        @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
      `}</style>
    </div>
  );
}

// ── Montar la app ──────────────────────────────────────────────────
const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);

(function(){
  // Buscar usuario del portal por 3 vías:
  // 1. URL hash: crm_grupo_consolidado.html#wk1
  // 2. localStorage gc_portal_user (compartido entre parent e iframe mismo dominio)
  // 3. postMessage del portal

  function buildUserFromPortal(pu){
    // Construir usuario CRM desde datos del portal
    if(!pu) return null;
    var crmId=pu.crmId||pu.id||pu.username;
    if(!crmId) return null;
    // 1) Buscar por crmId directo
    var fixed=USUARIOS.find(function(u){return u.id===crmId;});
    if(fixed) return fixed;
    // 2) Buscar por grupoAgente/catalogoVendedor (resuelve cuando crmId no está asignado)
    var vendedor=(pu.catalogoVendedor||pu.grupoAgente||'').toUpperCase();
    if(vendedor){
      fixed=USUARIOS.find(function(u){return u.grupoAgente&&u.grupoAgente.toUpperCase()===vendedor;});
      if(fixed) return fixed;
    }
    // 3) Crear usuario dinámico como fallback
    var rol=pu.rol||'agente';
    if(rol==='crm_director'||rol==='director') rol='director';
    else if(rol==='crm_jefe'||rol==='jefe') rol='jefe';
    else rol='agente';
    return {
      id: crmId,
      nombre: pu.nombre||pu.username||crmId,
      rol: rol,
      equipo: pu.equipo||null,
      color: pu.color||'#64748B',
      icon: '🧑‍💼',
      grupoAgente: pu.grupoAgente||pu.catalogoVendedor||null,
      catalogoVendedor: pu.catalogoVendedor||pu.grupoAgente||null,
      user: pu.username||crmId,
    };
  }

  function getAutoUser(){
    // Prioridad 1: localStorage del portal (más fiable — tiene todos los datos)
    try{
      var stored=localStorage.getItem('gc_portal_user');
      if(stored){
        var pu=JSON.parse(stored);
        var u=buildUserFromPortal(pu);
        if(u) return u;
      }
    }catch(e){}

    // Prioridad 2: URL hash — formato #crmId o #crmId|vendedor
    try{
      var hash=window.location.hash.replace('#','');
      if(hash){
        var decoded=decodeURIComponent(hash);
        var crmId=decoded.includes('|')?decoded.split('|')[0].trim():decoded.trim();
        var found=USUARIOS.find(function(u){return u.id===crmId;});
        if(found) return found;
      }
    }catch(e){}

    return null;
  }

  var autoUser=getAutoUser();
  root.render(React.createElement(App,{_autoLogin:autoUser||null}));

  // Vía 3: postMessage (por si las otras fallan — el portal lo envía al cargar)
  window.addEventListener('message',function(e){
    if(e.data&&e.data.type==='PORTAL_USER'){
      var pu=e.data.user;
      var crmUser=buildUserFromPortal(pu);
      if(crmUser){
        root.render(React.createElement(App,{_autoLogin:crmUser}));
      }
    }
  });
})();
  </script>
</body>
</html>
