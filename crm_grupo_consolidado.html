                <span style={{fontSize:36,display:"block",marginBottom:8}}>📷</span>
                <p style={{margin:"0 0 4px",fontSize:14,fontWeight:700}}>Añadir imágenes</p>
                <p style={{margin:0,fontSize:12,color:T.muted}}>Tarjeta de visita · Fotos del local · Catálogos · Documentos</p>
                <p style={{margin:"6px 0 0",fontSize:11,color:T.blue}}>Haz clic para abrir el explorador de archivos</p>
                <input ref={fotoRef} type="file" accept="image/*" multiple onChange={addFoto} style={{display:"none"}}/>
              </div>

              {fotos.length>0&&(
                <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
                  {fotos.map((f,i)=>(
                    <div key={i} style={{position:"relative",width:80,height:80,borderRadius:10,overflow:"hidden",border:`1px solid ${T.border}`,cursor:"pointer"}}
                      onClick={()=>setVerFoto(f.data||f)}>
                      <img src={f.data||f} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                      <button onClick={(e)=>{e.stopPropagation();setFotos(p=>p.filter((_,j)=>j!==i));}}
                        style={{position:"absolute",top:2,right:2,width:20,height:20,borderRadius:"50%",background:"rgba(0,0,0,.6)",color:"#fff",border:"none",fontSize:10,cursor:"pointer"}}>✕</button>
                    </div>
                  ))}
                </div>
              )}

              <div style={{background:"#F8FAFC",borderRadius:10,padding:"10px 14px",fontSize:12,color:T.muted,border:`1px solid ${T.border}`}}>
                Las imágenes son opcionales — se guardarán en Firebase junto con el resto de datos
              </div>
            </div>
          )}

          {/* STEP 3: Oportunidad */}
          {step===3&&(
            <div>
              <p style={{margin:"0 0 4px",fontSize:18,fontWeight:800}}>¿Cuál es la oportunidad?</p>
              <p style={{margin:"0 0 16px",fontSize:13,color:T.muted}}>Describe el objetivo, el producto y por qué tienes posibilidades</p>

              <div style={{background:"#FFFBEB",borderRadius:10,padding:"12px 14px",marginBottom:16,border:`1px solid #F59E0B33`}}>
                <p style={{margin:"0 0 6px",fontSize:12,fontWeight:700,color:T.amber}}>💡 Una buena descripción incluye:</p>
                <p style={{margin:0,fontSize:12,color:T.text,lineHeight:1.6}}>
                  · Producto o gama que quieres introducir<br/>
                  · Volumen estimado mensual<br/>
                  · Lo que usa actualmente el cliente<br/>
                  · Tu ventaja sobre la competencia<br/>
                  · Plazo estimado para cerrar
                </p>
              </div>

              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <p style={{margin:0,fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Descripción *</p>
                <button onClick={toggleGrabar}
                  style={{padding:"5px 12px",borderRadius:8,border:`1px solid ${grabando?T.red:T.border}`,
                    background:grabando?"#FEF2F2":"#fff",color:grabando?T.red:T.text,
                    fontSize:12,fontWeight:600,cursor:"pointer",display:"flex",gap:4,alignItems:"center",
                    animation:grabando?"pulse 1.5s infinite":"none"}}>
                  🎙 {grabando?"⏹ Parar":"Hablar"}
                </button>
              </div>
              <textarea value={desc} onChange={e=>setDesc(e.target.value)} rows={8}
                placeholder={"Pulsa 🎙 Hablar o escribe aquí...\n\n· Producto que quieres introducir\n· Volumen estimado mensual\n· Lo que usa actualmente\n· Tu ventaja sobre la competencia"}
                style={{width:"100%",padding:"12px 14px",borderRadius:10,border:`1.5px solid ${T.border}`,fontSize:14,
                  outline:"none",boxSizing:"border-box",resize:"vertical",fontFamily:"inherit",lineHeight:1.6}}/>
              <p style={{margin:"4px 0 0",fontSize:11,color:desc.length>=10?T.green:T.muted,textAlign:"right"}}>
                {desc.length} caracteres {desc.length<10?"(mínimo 10)":"✓"}
              </p>

              {/* Valor y probabilidad */}
              <div style={{display:"flex",gap:10,marginTop:14}}>
                <div style={{flex:1}}>
                  <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Valor estimado €</p>
                  <input type="number" value={valor} onChange={e=>setValor(e.target.value)} placeholder="0"
                    style={{width:"100%",padding:"10px 12px",borderRadius:9,border:`1.5px solid ${T.border}`,fontSize:14,outline:"none",boxSizing:"border-box"}}/>
                </div>
                <div style={{flex:1}}>
                  <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Probabilidad %</p>
                  <input type="number" value={prob} min="0" max="100" onChange={e=>setProb(e.target.value)}
                    style={{width:"100%",padding:"10px 12px",borderRadius:9,border:`1.5px solid ${T.border}`,fontSize:14,outline:"none",boxSizing:"border-box"}}/>
                </div>
              </div>
            </div>
          )}

          {/* STEP 4: Asignar */}
          {step===4&&(
            <div>
              <p style={{margin:"0 0 4px",fontSize:18,fontWeight:800}}>Asignar comercial</p>

                <div style={{width:40,height:40,borderRadius:"50%",background:"#E2E8F0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>👤</div>
                <div style={{flex:1}}>
                  <p style={{margin:0,fontSize:14,fontWeight:700,color:!asignado?T.green:T.text}}>Sin asignar por ahora</p>

              {agentes.map(ag=>{
                const sel=asignado===ag.id;

                      background:sel?"#F1F5F9":"#fff",cursor:"pointer",textAlign:"left",marginBottom:6,
                      display:"flex",gap:14,alignItems:"center"}}>
                    <div style={{width:40,height:40,borderRadius:"50%",background:(ag.color||T.blue)+"22",
                      border:`2px solid ${(ag.color||T.blue)}55`,display:"flex",alignItems:"center",justifyContent:"center",
                      fontSize:12,fontWeight:800,color:ag.color||T.blue}}>{ini}</div>
                    <div style={{flex:1}}>
                      <p style={{margin:0,fontSize:14,fontWeight:sel?700:500}}>{ag.nombre}</p>
                      <p style={{margin:"2px 0 0",fontSize:11,color:T.muted}}>Equipo {ag.equipo}</p>
                    </div>
                    {sel&&<span style={{color:T.navy,fontSize:20}}>✓</span>}
                  </button>
                );
              })}
            </div>
          )}

          {/* STEP 5: Confirmar */}
          {step===5&&(
            <div>
              <p style={{margin:"0 0 16px",fontSize:18,fontWeight:800}}>Confirmar oportunidad</p>

              <div style={{background:"#F8FAFC",borderRadius:14,padding:"16px 18px",marginBottom:12,border:`1px solid ${T.border}`}}>
                <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
                  {TIPOS.find(t=>t.k===tipo)&&(
                    <span style={{background:T.navy,color:"#fff",padding:"3px 10px",borderRadius:6,fontSize:11,fontWeight:700}}>
                      {TIPOS.find(t=>t.k===tipo)?.icon} {TIPOS.find(t=>t.k===tipo)?.label}
                    </span>
                  )}
                  {cli.tipologia&&<span style={{background:T.blue+"15",color:T.blue,padding:"3px 10px",borderRadius:6,fontSize:11,fontWeight:700}}>{cli.tipologia}</span>}
                </div>
                <p style={{margin:"0 0 4px",fontSize:16,fontWeight:800}}>{cli.nombre||"Sin nombre"}</p>
                {cli.contacto&&<p style={{margin:"0 0 2px",fontSize:12,color:T.muted}}>👤 {cli.contacto}{cli.cargo?` · ${cli.cargo}`:""}</p>}
                {cli.telefono&&<p style={{margin:"0 0 2px",fontSize:12,color:T.muted}}>📞 {cli.telefono}</p>}
                {cli.email&&<p style={{margin:"0 0 2px",fontSize:12,color:T.muted}}>✉️ {cli.email}</p>}
                {cli.ciudad&&<p style={{margin:0,fontSize:12,color:T.muted}}>📍 {cli.ciudad}{cli.direccion?` · ${cli.direccion}`:""}</p>}
              </div>

              {desc&&(
                <div style={{background:"#fff",borderRadius:12,padding:"12px 14px",marginBottom:12,border:`1px solid ${T.border}`}}>
                  <p style={{margin:"0 0 6px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Descripción</p>
                  <p style={{margin:0,fontSize:13,color:T.text,lineHeight:1.5}}>{desc.slice(0,200)}{desc.length>200?"...":""}</p>
                </div>
              )}

              <div style={{display:"flex",gap:8,marginBottom:12}}>
                {valor>0&&(
                  <div style={{flex:1,background:"#F0FDF4",borderRadius:10,padding:"10px 12px",border:`1px solid ${T.green}33`}}>
                    <p style={{margin:0,fontSize:10,color:T.muted,fontWeight:700}}>VALOR</p>
                    <p style={{margin:0,fontSize:16,fontWeight:800,color:T.green}}>{fmt(Number(valor))}€</p>
                  </div>
                )}
                <div style={{flex:1,background:"#EFF6FF",borderRadius:10,padding:"10px 12px",border:`1px solid ${T.blue}33`}}>
                  <p style={{margin:0,fontSize:10,color:T.muted,fontWeight:700}}>PROBABILIDAD</p>
                  <p style={{margin:0,fontSize:16,fontWeight:800,color:T.blue}}>{prob}%</p>
                </div>
              </div>

              {asignado&&(()=>{
                const ag=USUARIOS.find(u=>u.id===asignado);
                return ag?(
                  <div style={{background:"#fff",borderRadius:10,padding:"10px 14px",marginBottom:12,border:`1px solid ${T.border}`,display:"flex",gap:10,alignItems:"center"}}>
                    <span style={{fontSize:11,color:T.muted,fontWeight:700}}>Asignado a:</span>
                    <span style={{fontSize:13,fontWeight:700}}>{ag.nombre}</span>
                    <span style={{fontSize:11,color:T.muted}}>· {ag.equipo}</span>
                  </div>
                ):null;
              })()}

              {fotos.length>0&&(
                <div style={{display:"flex",gap:6,marginBottom:12}}>
                  {fotos.map((f,i)=>(
                    <div key={i} style={{width:48,height:48,borderRadius:8,overflow:"hidden",border:`1px solid ${T.border}`}}>
                      <img src={f.data||f} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>

        {/* Footer navigation */}
        <div style={{padding:"14px 22px",borderTop:`1px solid ${T.border}`,display:"flex",gap:10,flexShrink:0}}>
          {step>0&&(
            <button onClick={()=>setStep(s=>s-1)}
              style={{flex:1,padding:"13px",borderRadius:12,border:`1px solid ${T.border}`,background:"#fff",
                color:T.text,fontSize:14,fontWeight:600,cursor:"pointer"}}>
              ← Atrás
            </button>
          )}
          {step<5?(
            <button onClick={()=>setStep(s=>s+1)} disabled={!canNext()}
              style={{flex:2,padding:"13px",borderRadius:12,border:"none",
                background:canNext()?T.navy:"#E2E8F0",color:canNext()?"#fff":"#94A3B8",
                fontSize:14,fontWeight:700,cursor:canNext()?"pointer":"default"}}>
              {step===2?"Continuar sin imágenes →":"Siguiente →"}
            </button>
          ):(
            <button onClick={guardar}
              style={{flex:2,padding:"13px",borderRadius:12,border:"none",
                background:T.green,color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>
              ✅ {opoEditar?"Guardar cambios":"Crear oportunidad"}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

          <button onClick={()=>{if(!nota.trim())return;const hoy=new Date().toLocaleDateString("es-ES");onUpdate({...opo,actividad:[...(opo.actividad||[]),{tipo:"nota",texto:nota.trim(),fecha:hoy,autor:usuario.nombre}]});setNota("");}}

function GestorOportunidades({usuario, onAbrirCliente}){
  const [showScanner,setShowScanner]=useState(false);
  const [scanDatos,setScanDatos]=useState(null);
  const handleDatosTarjeta=(datos)=>{setScanDatos(datos);setShowScanner(false);setShowForm(true);};

  const [opos,setOpos]=useState([]);
  const [cargando,setCargando]=useState(true);
  const [detalle,setDetalle]=useState(null);
  const [showForm,setShowForm]=useState(false);
  const [editando,setEditando]=useState(null);
  const [toastMsg,setToastMsg]=useState(null);
  const [filtroEquipoOpo,setFiltroEquipoOpo]=useState("todos");
  const [agenteSelOpo,setAgenteSelOpo]=useState(null);

  const esAgente=usuario?.rol==="agente";
  const esJefe=usuario?.rol==="jefe";
  const esDir=["director","ceo"].includes(usuario?.rol);
  const appMisIds=resolverMisIds(usuario);
  const miEquipo=usuario?.equipo;

  // Cargar desde Firebase al arrancar
  const cargarOpos=function(){
    setCargando(true);
    fbLeer("oportunidades").then(function(data){
      console.log("[OPO] fbLeer devolvio:", data.length, "oportunidades");
      if(data.length>0) console.log("[OPO] IDs:", data.map(function(d){return d.id;}).slice(0,10).join(", "));
      if(data.length>0){
        const fbIds=new Set(data.map(d=>d.id));
        let merged=[...data,...OPORTUNIDADES_SEED.filter(d=>!fbIds.has(d.id))];
        merged=merged.filter(o=>!o.eliminada);
        // Filtrar por rol
        if(esAgente){
          merged=merged.filter(o=>esDelUsuario(o.agente,appMisIds)||esDelUsuario(o.agenteId,appMisIds));
        } else if(esJefe){
          const idsEq=new Set(USUARIOS.filter(u=>u.rol==="agente"&&u.equipo===miEquipo).map(u=>u.id));
          merged=merged.filter(o=>idsEq.has(o.agente||o.agenteId));
        }
        setOpos(merged);
        console.log("[OPO] Tras filtrar rol:", merged.length, "visibles");
      } else {
        console.log("[OPO] Firebase vacio, usando seed");
        setOpos(OPORTUNIDADES_SEED);
      }
      setCargando(false);
    }).catch(()=>{setOpos(OPORTUNIDADES_SEED);setCargando(false);});
  };

  useEffect(()=>{ cargarOpos(); },[]);

  const toast=(msg,ok=true)=>{setToastMsg({msg,ok});setTimeout(()=>setToastMsg(null),3000);};
  const [vista,setVista]=useState("lista");
  const [filtroEst,setFiltroEst]=useState("activas");
  const [filtroAg,setFiltroAg]=useState("todos");
  const [q,setQ]=useState("");

  const updOpo=async o=>{
    setOpos(p=>p.map(x=>x.id===o.id?o:x));
    setDetalle(o);
    const ok=await fbGuardar(o.id, o);
    toast(ok?"✅ Guardado en Firebase":"⚠️ Error al guardar",ok);
    // Notificar cambios de etapa importantes
    if(ok){
      const etapa=o.etapa||o.estado||"";
      if(etapa==="cerrada_ganada"||etapa==="ganada"){
        // Oportunidad ganada → notificar al jefe
        const jefe=USUARIOS.find(u=>(u.rol==="jefe"||u.rol==="director")&&(u.equipo===usuario.equipo||!u.equipo));
        if(jefe && jefe.id !== usuario.id){
          despacharNotificacion({tipo:"oportunidad",titulo:`🎉 Oportunidad GANADA: ${o.cliente||o.nombre||""}`,
            mensaje:`${usuario.nombre} ha ganado la oportunidad. Valor: ${o.valor||0}€`,
            destinatarioId:jefe.id,prioridad:"alta",creadoPor:usuario.id});
        }
      } else if(etapa==="cerrada_perdida"||etapa==="perdida"){
        // Oportunidad perdida → notificar al jefe
        const jefe=USUARIOS.find(u=>(u.rol==="jefe"||u.rol==="director")&&(u.equipo===usuario.equipo||!u.equipo));
        if(jefe && jefe.id !== usuario.id){
          despacharNotificacion({tipo:"oportunidad",titulo:`❌ Oportunidad perdida: ${o.cliente||o.nombre||""}`,
            mensaje:`${usuario.nombre} ha marcado como perdida la oportunidad "${o.cliente||""}"`,
            destinatarioId:jefe.id,prioridad:"normal",creadoPor:usuario.id});
        }
      }
    }
  };
  const addOpo=function(o){
    setFiltroEst("activas");setFiltroAg("todos");setFiltroEquipoOpo("todos");setAgenteSelOpo(null);setQ("");
    setShowForm(false);setShowScanner(false);setScanDatos(null);
    setOpos(function(p){return [o].concat(p);});
    console.log("[OPO] Guardando:", o.id, o.nombre||o.cliente);
    var url=FB_BASE+"/oportunidades/"+o.id;
    var body=JSON.stringify(serializeToFirestore(o));
    console.log("[OPO] URL:", url);
    console.log("[OPO] Body size:", body.length);
    fetch(url,{method:"PATCH",headers:{"Content-Type":"application/json"},body:body}).then(function(r){
      console.log("[OPO] PATCH status:", r.status);
      return r.json();
    }).then(function(data){
      console.log("[OPO] PATCH response:", JSON.stringify(data).substring(0,200));
      // Verificar: leer el documento que acabamos de guardar
      return fetch(url);
    }).then(function(r2){
      console.log("[OPO] GET verify status:", r2.status);
      return r2.json();
    }).then(function(data2){
      console.log("[OPO] GET verify:", data2.fields?"EXISTE con "+Object.keys(data2.fields).length+" campos":"NO EXISTE");
      if(o.agenteId && o.agenteId !== (usuario||{}).id) notificarAsignacion("tarea", Object.assign({},o,{titulo:"Oportunidad: "+o.cliente}), (usuario||{}).id);
    });
  };

  const delOpo=(id)=>{
    if(!confirm("¿Eliminar esta oportunidad?")) return;
    setOpos(p=>p.filter(o=>o.id!==id));
    fbGuardar(id,{id,eliminada:true,eliminadoPor:usuario.id,fechaEliminacion:new Date().toISOString()})
      .then(()=>toast("🗑️ Eliminada"))
      .catch(()=>toast("🗑️ Eliminada localmente",false));
    setDetalle(null);
  };

  const esRolJefe=usuario?.rol==="jefe";
  const esRolAgente=usuario?.rol==="agente";
  const esRolDir=["director","ceo"].includes(usuario?.rol);
  const miEquipoOpo=usuario?.equipo;

  // Pre-filtro por rol — agente SOLO ve las suyas
  // Resolver ID CRM real desde grupoAgente (portal puede usar ID distinto)
  const misCrmIds=useMemo(()=>{
    const ids=new Set([usuario.id,(usuario.user||""),(usuario.grupoAgente||"")].filter(Boolean));
    if(usuario.grupoAgente){
      const match=USUARIOS.find(u=>u.grupoAgente&&u.grupoAgente.toUpperCase()===(usuario.grupoAgente||"").toUpperCase());
      if(match) ids.add(match.id);
    }
    return ids;
  },[usuario.id,usuario.grupoAgente]);

  const oposMiRol=useMemo(()=>opos.filter(o=>{
    if(esRolAgente) return misCrmIds.has(o.agenteId)||misCrmIds.has(o.agente);
    if(esRolJefe){
      const ag=USUARIOS.find(u=>u.id===(o.agenteId||o.agente));
      return ag?.equipo===miEquipoOpo||o.equipoId===miEquipoOpo;
    }
    return true; // director/ceo ve todas
  }),[opos,misCrmIds,esRolAgente,esRolJefe,miEquipoOpo]);

  const activas=oposMiRol.filter(o=>!["ganada","perdida"].includes(o.estado));
  const sinAsignar=oposMiRol.filter(o=>!o.agenteId&&!["ganada","perdida"].includes(o.estado));
  const ganadas=oposMiRol.filter(o=>o.estado==="ganada");

  const filtradas=useMemo(()=>oposMiRol.filter(o=>{
    if(filtroEst==="activas"&&(o.esOportunidad===false||["ganada","perdida"].includes(o.estado))) return false;
    if(filtroEst==="sin_asignar"&&(o.agenteId||o.esOportunidad===false)) return false;
    if(filtroEst==="ganadas"&&o.estado!=="ganada") return false;
    if(filtroEst==="perdidas"&&o.estado!=="perdida") return false;
    if(filtroAg!=="todos"&&o.agenteId!==filtroAg) return false;
    if(q&&!o.nombre.toLowerCase().includes(q.toLowerCase())) return false;
    // Filtro por equipo
    if(filtroEquipoOpo!=="todos"){
      const ag=USUARIOS.find(u=>u.id===(o.agenteId||o.agente));
      if(!ag||!ag.equipo||ag.equipo.toUpperCase()!==filtroEquipoOpo.toUpperCase()) return false;
    }
    // Filtro por agente individual
    if(agenteSelOpo&&(o.agenteId||o.agente)!==agenteSelOpo) return false;
    return true;
  }),[opos,filtroEst,filtroAg,q,filtroEquipoOpo,agenteSelOpo]);

  const TIPOS_MAP_L={nuevo_cliente:"🆕",recuperacion:"🔄",expansion:"📈",referencia:"👥"};
  const porEstado=est=>filtradas.filter(o=>o.estado===est);

  const CardOpo=({o,compact=false})=>{
    const ag=USUARIOS.find(v=>v.id===o.agenteId);
    const est=ESTADOS[o.estado]||ESTADOS.sin_asignar;
    const imgs=o.imagenes||[];
    const dias=()=>{try{const[d,m,y]=o.creadaEn.split("/");return Math.floor((new Date()-new Date(`${y}-${m}-${d}`))/86400000)||0;}catch{return 0;}};
    return(
      <div onClick={()=>setDetalle(o)}
        style={{background:"#fff",borderRadius:12,border:`1px solid ${T.border}`,borderLeft:`4px solid ${est.color}`,padding:compact?"10px 14px":"14px 16px",cursor:"pointer",boxShadow:"0 1px 4px #0001",transition:"box-shadow .15s",marginBottom:compact?8:0}}
        onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 16px #0002"}
        onMouseLeave={e=>e.currentTarget.style.boxShadow="0 1px 4px #0001"}>
        <div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",gap:5,marginBottom:5,flexWrap:"wrap",alignItems:"center"}}>
              <span style={{fontSize:12}}>{TIPOS_MAP_L[o.tipo]}</span>
              <p style={{margin:0,fontSize:compact?13:14,fontWeight:800,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:compact?"nowrap":"normal"}}>{o.nombre}</p>
              {!compact&&<span style={{padding:"2px 8px",borderRadius:5,background:est.bg,color:est.color,fontSize:10,fontWeight:700,flexShrink:0}}>{est.dot} {est.label}</span>}
            </div>
            {!compact&&<p style={{margin:"0 0 8px",fontSize:12,color:T.muted,lineHeight:1.5}}>{o.descripcionOportunidad?.slice(0,100)}{(o.descripcionOportunidad?.length||0)>100?"…":""}</p>}
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
              {ag?<div style={{display:"flex",gap:4,alignItems:"center"}}><span style={{width:16,height:16,borderRadius:"50%",background:ag.color,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"#fff",flexShrink:0}}>{ag.icon||ag.nombre[0]}</span><span style={{fontSize:11,color:T.muted}}>{ag.nombre}</span></div>
              :<span style={{fontSize:11,color:T.amber,fontWeight:600}}>⚠️ Sin asignar</span>}
              <span style={{fontSize:10,color:T.muted}}>·</span>
              <span style={{fontSize:11,color:T.muted}}>{dias()}d</span>
              {(o.notas||[]).length>0&&<><span style={{fontSize:10,color:T.muted}}>·</span><span style={{fontSize:11,color:T.blue,fontWeight:600}}>📝 {o.notas.length}</span></>}
              {imgs.length>0&&<><span style={{fontSize:10,color:T.muted}}>·</span><span style={{fontSize:11,color:T.amber,fontWeight:600}}>📷 {imgs.length}</span></>}
            </div>
          </div>
          {imgs[0]&&!compact&&<img src={imgs[0].src} alt="" style={{width:52,height:52,objectFit:"cover",borderRadius:9,flexShrink:0,border:`1px solid ${T.border}`}}/>}
        </div>
      </div>
    );
  };

  const ColKanban=({titulo,color,oposList})=>(
    <div style={{flex:1,minWidth:200,maxWidth:260}}>
      <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:12,padding:"8px 12px",background:color+"15",borderRadius:9,border:`1px solid ${color}33`}}>
        <span style={{fontSize:13,fontWeight:800,color}}>{titulo}</span>
        <span style={{marginLeft:"auto",background:color,color:"#fff",borderRadius:10,padding:"2px 8px",fontSize:11,fontWeight:800}}>{oposList.length}</span>
      </div>
      <div>
        {oposList.length===0&&<div style={{padding:"20px",textAlign:"center",color:T.muted,fontSize:12,background:T.bg,borderRadius:10,border:`1px dashed ${T.border}`}}>Vacío</div>}
        {oposList.map(o=><CardOpo key={o.id} o={o} compact/>)}
      </div>
    </div>
  );

  return(
    <div style={{maxWidth:900,margin:"0 auto",padding:"20px 14px",fontFamily:"'DM Sans','Helvetica Neue',sans-serif"}}>

      {showScanner&&<Wizard usuario={usuario} datosEscaneados={null} onSave={addOpo} onClose={()=>{setShowScanner(false);}}/>}
      {!showScanner&&showForm&&<Wizard usuario={usuario} datosEscaneados={scanDatos} onSave={addOpo} onClose={()=>{setShowForm(false);setScanDatos(null);}}/>}
      {editando&&<Wizard usuario={usuario} opoEditar={editando} onSave={async o=>{
        const updated={...editando,...o,id:editando.id,historial:[...(editando.historial||[]),{accion:"✏️ Oportunidad editada",por:usuario?.nombre||"Usuario",fecha:new Date().toLocaleDateString("es-ES"),nota:""}]};
        await updOpo(updated);
        setDetalle(updated);
        setEditando(null);
      }} onClose={()=>setEditando(null)}/>}
      {detalle&&<Detalle opo={detalle} usuario={usuario} onClose={()=>setDetalle(null)} onUpdate={updOpo} onEdit={()=>{setEditando(detalle);setDetalle(null);}} onDel={delOpo} onAbrirCliente={onAbrirCliente}/>}

      {toastMsg&&<div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",zIndex:1000,background:toastMsg.ok?T.greenL:T.amberL,border:`1.5px solid ${toastMsg.ok?T.green:T.amber}`,borderRadius:12,padding:"12px 20px",boxShadow:"0 8px 32px #0002",display:"flex",gap:10,alignItems:"center"}}>
        <span style={{fontSize:16}}>{toastMsg.ok?"✅":"⚠️"}</span>
        <span style={{fontSize:13,fontWeight:700,color:toastMsg.ok?T.green:T.amber}}>{toastMsg.msg}</span>
      </div>}

      <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:20,flexWrap:"wrap"}}>
        <div style={{flex:1}}>
          <h1 style={{margin:"0 0 3px",fontSize:21,fontWeight:800,color:T.navy}}>🎯 Gestor de Oportunidades</h1>
          <p style={{margin:0,fontSize:12,color:T.muted}}>{cargando?"Cargando desde Firebase…":`${oposMiRol.length} oportunidades cargadas`}</p>
        </div>
        <button onClick={cargarOpos} disabled={cargando}
          style={{padding:"10px 14px",borderRadius:10,border:`1.5px solid ${T.border}`,
            background:"#fff",color:T.muted,fontWeight:600,fontSize:13,cursor:cargando?"default":"pointer",flexShrink:0}}>
          {cargando?"⏳":"🔄"}
        </button>
        <button onClick={()=>setShowScanner(true)} style={{padding:"10px 14px",borderRadius:10,border:`1.5px solid ${T.border}`,background:"#fff",color:T.navy,fontWeight:700,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:7,flexShrink:0}}>
          <span style={{fontSize:18}}>📇</span> Tarjeta
        </button>
        <button onClick={()=>setShowForm(true)} style={{padding:"10px 18px",borderRadius:10,border:"none",background:T.amber,color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:7,flexShrink:0}}>
          <span style={{fontSize:18}}>🎯</span> Nueva oportunidad
        </button>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>setVista("lista")} style={{padding:"8px 14px",borderRadius:8,border:`1.5px solid ${vista==="lista"?T.navy:T.border}`,background:vista==="lista"?T.navy:"#fff",color:vista==="lista"?"#fff":T.muted,fontWeight:vista==="lista"?700:400,fontSize:12,cursor:"pointer"}}>≡ Lista</button>
          <button onClick={()=>setVista("kanban")} style={{padding:"8px 14px",borderRadius:8,border:`1.5px solid ${vista==="kanban"?T.navy:T.border}`,background:vista==="kanban"?T.navy:"#fff",color:vista==="kanban"?"#fff":T.muted,fontWeight:vista==="kanban"?700:400,fontSize:12,cursor:"pointer"}}>⊞ Kanban</button>
        </div>
      </div>

      {cargando?<div style={{textAlign:"center",padding:"60px",color:T.muted}}>
        <p style={{fontSize:40,margin:"0 0 12px"}}>⏳</p>
        <p style={{fontSize:14,fontWeight:700,color:T.text,margin:0}}>Cargando desde Firebase…</p>
      </div>:<>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:20}}>
          {[{l:"Activas",v:activas.length,c:T.blue,s:"En pipeline"},{l:"Sin asignar",v:sinAsignar.length,c:sinAsignar.length>0?T.amber:T.muted,s:"Pendientes"},{l:"Convertidas",v:ganadas.length,c:T.green,s:"Clientes CRM"},{l:"Total",v:oposMiRol.length,c:T.purple,s:"Históricas"}].map(k=>(
            <div key={k.l} style={{background:"#fff",border:`1px solid ${T.border}`,borderTop:`3px solid ${k.c}`,borderRadius:11,padding:"12px 14px",boxShadow:"0 1px 3px #0001"}}>
              <p style={{margin:"0 0 3px",fontSize:10,color:T.muted,fontWeight:700,textTransform:"uppercase"}}>{k.l}</p>
              <p style={{margin:"0 0 2px",fontSize:24,fontWeight:800,color:k.c}}>{k.v}</p>
              <p style={{margin:0,fontSize:10,color:T.muted}}>{k.s}</p>
            </div>
          ))}
        </div>

        <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
          <div style={{position:"relative",flex:1,minWidth:160}}>
            <input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 Buscar…" style={{width:"100%",padding:"9px 32px 9px 12px",borderRadius:9,border:`1.5px solid ${T.border}`,fontSize:13,outline:"none",fontFamily:"inherit"}}/>
            {q&&<button onClick={()=>setQ("")} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:15}}>×</button>}
          </div>
          {/* Selector de agente: solo jefes y directores */}
          {!esRolAgente&&<FiltroEquipo value={filtroEquipoOpo} onChange={setFiltroEquipoOpo} agenteSel={agenteSelOpo} onAgenteSel={setAgenteSelOpo} items={opos} getAgente={o=>o.agenteId||o.agente}/>}
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            {[["activas","Activas",T.blue],["sin_asignar","Sin asignar",T.amber],["ganadas","Convertidas",T.green],["perdidas","Perdidas",T.red],["todas","Todas",T.muted]].map(([k,l,c])=>(
              <button key={k} onClick={()=>setFiltroEst(k)} style={{padding:"7px 12px",borderRadius:7,border:`1.5px solid ${filtroEst===k?c:T.border}`,background:filtroEst===k?c+"18":"#fff",color:filtroEst===k?c:T.muted,fontWeight:filtroEst===k?700:400,fontSize:11,cursor:"pointer"}}>{l}</button>
            ))}
          </div>
        </div>

        <p style={{margin:"0 0 12px",fontSize:12,color:T.muted}}>{filtradas.length} oportunidad{filtradas.length!==1?"es":""}</p>

        {vista==="lista"&&<div style={{display:"flex",flexDirection:"column",gap:10}}>
          {filtradas.length===0&&<div style={{textAlign:"center",padding:"50px",background:"#fff",borderRadius:14,border:`1px solid ${T.border}`}}>
            <p style={{fontSize:32,margin:"0 0 8px"}}>🎯</p>
            <p style={{fontWeight:700,color:T.text,margin:"0 0 4px"}}>Sin resultados</p>
            <p style={{fontSize:12,color:T.muted,margin:0}}>Cambia los filtros o crea una nueva oportunidad</p>
          </div>}
          {filtradas.map(o=><CardOpo key={o.id} o={o}/>)}
        </div>}

        {vista==="kanban"&&<div style={{display:"flex",gap:12,overflowX:"auto",paddingBottom:12}}>
          <ColKanban titulo="Sin asignar" color={T.muted}  oposList={porEstado("sin_asignar")}/>
          <ColKanban titulo="Asignadas"   color={T.blue}   oposList={porEstado("asignada")}/>
          <ColKanban titulo="Seguimiento" color={T.amber}  oposList={porEstado("seguimiento")}/>
          <ColKanban titulo="Convertidas" color={T.green}  oposList={porEstado("ganada")}/>
          <ColKanban titulo="Perdidas"    color={T.red}    oposList={porEstado("perdida")}/>
        </div>}
      </>}
    </div>
  );
}



// ─── PROYECTOS ────────────────────────────────────────────────────
function Proyectos({usuario, onAbrirCliente, onIrASeccion}){
  const [proyectos,setProyectos]=useState(PROYECTOS_SEED);
  const [sel,setSel]=useState(null);
  const [filtro,setFiltro]=useState("activo");
  const [filtroDep,setFiltroDep]=useState("todos");
  const [filtroEquipoProy,setFiltroEquipoProy]=useState("todos");
  const [agenteSelProy,setAgenteSelProy]=useState(null);
  const [formOpen,setFormOpen]=useState(false);
  const [form,setForm]=useState({nombre:"",tipo:"lanzamiento",desc:"",fin:""});
  const [nuevoHito,setNuevoHito]=useState({nombre:"",fecha:"",responsable:"",nota:""});
  const [editHitoIdx,setEditHitoIdx]=useState(null); // índice del hito en edición
  const [editHitoForm,setEditHitoForm]=useState({nombre:"",fecha:"",responsable:"",nota:""});
  const [showCierre,setShowCierre]=useState(null); // "exito" | "perdido" | null
  const [notaCierre,setNotaCierre]=useState("");
  const [motivoCierreProy,setMotivoCierreProy]=useState("");
  const [nuevaTarea,setNuevaTarea]=useState({depto:"",texto:"",resp:""});
  const esJefeOmas=["jefe","director","ceo"].includes(usuario?.rol);
  const esAgente=usuario?.rol==="agente";
  const esJefe=usuario?.rol==="jefe";
  const miEquipo=usuario?.equipo;
  const appMisIds=resolverMisIds(usuario);

  // Cargar proyectos desde Firebase con filtro por rol
  React.useEffect(()=>{
    fbLeer("proyectos").then(data=>{
      if(data.length>0){
        let todos=[...data,...PROYECTOS_SEED.filter(s=>!data.find(d=>d.id===s.id))];
        // Filtrar según rol
        if(esAgente){
          todos=todos.filter(p=>{
            const ag=(p.agente||p.agenteId||"").toUpperCase();
            const eq=p.equipo||[];
            return appMisIds.has(ag)||
              (Array.isArray(eq)&&eq.some(e=>appMisIds.has(e.toUpperCase())))||
              (typeof eq==="string"&&appMisIds.has(eq.toUpperCase()));
          });
        } else if(esJefe){
          const idsEquipo=new Set(USUARIOS.filter(u=>u.rol==="agente"&&u.equipo===miEquipo).map(u=>u.id));
          todos=todos.filter(p=>idsEquipo.has(p.agente||p.agenteId)||
            (Array.isArray(p.equipo)&&p.equipo.some(e=>idsEquipo.has(e))));
        }
        setProyectos(todos);
      }
    }).catch(()=>{});
  },[usuario?.id]);

  const DEPTOS_PROY=[
    {k:"calidad",   icon:"🔬",label:"Calidad",   color:"#7C3AED"},
    {k:"id",        icon:"⚗️", label:"I+D",       color:"#2563EB"},
    {k:"produccion",icon:"🏭",label:"Producción", color:"#D97706"},
    {k:"direccion", icon:"📊",label:"Dirección",  color:"#0F172A"},
  ];

  const TIPOS={
    lanzamiento:{icon:"🚀",label:"Lanzamiento",  color:T.purple},
    campana:    {icon:"📣",label:"Campaña",       color:T.blue},
    recuperacion:{icon:"🔄",label:"Recuperación", color:T.amber},
    expansion:  {icon:"📈",label:"Expansión",     color:T.green},
    otro:       {icon:"📌",label:"Otro",          color:T.muted},
  };

  const activos=proyectos.filter(p=>p.estado==="activo").length;
  const cerrados=proyectos.filter(p=>p.estado==="cerrado").length;
  const visibles=(filtro==="todos"?proyectos:proyectos.filter(function(p){return p.estado===filtro;}))
    .filter(function(p){
      if(filtroEquipoProy==="todos") return true;
      try{
        var pEq=(p.equipo||"").toUpperCase();
        if(pEq===filtroEquipoProy.toUpperCase()) return true;
        var agId=p.responsableComercial||p.agente||p.creadoPor||"";
        if(typeof agId!=="string") return true;
        var usr=USUARIOS.find(function(u){return u.id===agId;});
        return usr&&usr.equipo&&usr.equipo.toUpperCase()===filtroEquipoProy.toUpperCase();
      }catch(e){return true;}
    })
    .filter(function(p){
      if(!agenteSelProy) return true;
      return (p.responsableComercial||p.agente||p.creadoPor)===agenteSelProy;
    });

  const toggleHito=(proyId,hitoIdx)=>{
    const updProy=p=>({
      ...p,
      hitos:p.hitos.map((h,i)=>i===hitoIdx?{...h,hecho:!h.hecho,fecha:!h.hecho?new Date().toLocaleDateString("es-ES"):""}:h),
      progreso:Math.round((p.hitos.filter((h,i)=>i===hitoIdx?!h.hecho:h.hecho).length)/p.hitos.length*100)
    });
    setProyectos(pp=>pp.map(p=>p.id===proyId?updProy(p):p));
    if(sel?.id===proyId){
      const updated=updProy(sel);
      setSel(updated);
      fbEscribir("proyectos",proyId,updated);
      // Notificar al creador del proyecto cuando se completa un hito
      const hito=sel.hitos&&sel.hitos[hitoIdx];
      if(hito && !hito.hecho){ // se está marcando como hecho
        const creador=sel.responsableComercial||sel.agente||sel.creadoPor;
        if(creador && creador !== usuario.id){
          despacharNotificacion({tipo:"hito",titulo:`✅ Hito completado: ${hito.nombre}`,
            mensaje:`${usuario.nombre} ha completado el hito "${hito.nombre}" del proyecto "${sel.nombre||""}"`,
            destinatarioId:creador,prioridad:"normal",creadoPor:usuario.id});
        }
      }
    }
  };

  const addHito=(proyId)=>{
    if(!nuevoHito.nombre.trim()) return;
    const hoy=new Date().toLocaleDateString("es-ES");
    const hito={nombre:nuevoHito.nombre.trim(),fecha:nuevoHito.fecha,responsable:nuevoHito.responsable,nota:nuevoHito.nota||"",hecho:false,fechaHecho:""};
    const updProy=p=>({...p,hitos:[...(p.hitos||[]),hito]});
    setProyectos(pp=>pp.map(p=>p.id===proyId?updProy(p):p));
    if(sel?.id===proyId){const up=updProy(sel);setSel(up);fbEscribir("proyectos",proyId,up);}

    // Auto-crear tarea para el responsable asignado
    if(nuevoHito.responsable){
      const resp=USUARIOS.find(u=>u.id===nuevoHito.responsable);
      const DEPTOS_MAP={calidad:"🔬 Calidad",id:"⚗️ I+D",produccion:"🏭 Producción",direccion:"📊 Dirección"};
      const respNombre=resp?resp.nombre:(DEPTOS_MAP[nuevoHito.responsable]||nuevoHito.responsable);
      const tareaId="hito_tsk_"+Date.now();
      const tarea={
        id:tareaId,
        titulo:"📍 Hito: "+nuevoHito.nombre.trim(),
        descripcion:"Hito del proyecto: "+(sel?.nombre||proyId),
        tipo:"proyecto",
        prioridad:"normal",
        estado:"pendiente",
        agente:nuevoHito.responsable,
        agenteNombre:respNombre,
        creadaPor:usuario.id,
        creadaPorNombre:usuario.nombre,
        creadaEn:hoy,
        vence:nuevoHito.fecha||"",
        proyectoId:proyId,
        proyectoNombre:sel?.nombre||"",
        esHito:true,
      };
      fbEscribir("tareas",tareaId,tarea);
      // Notificar al responsable del hito
      notificarAsignacion("hito", {
        ...tarea,
        nombre: nuevoHito.nombre.trim(),
        proyecto: sel?.nombre || proyId,
        agente: nuevoHito.responsable,
        fechaLimite: nuevoHito.fecha,
      }, usuario.id);
    }
    setNuevoHito({nombre:"",fecha:"",responsable:"",nota:""});
  };

  const deleteHito=(proyId,hitoIdx)=>{
    if(!confirm("¿Eliminar este hito?")) return;
    const updProy=p=>{
      const newHitos=(p.hitos||[]).filter((_,i)=>i!==hitoIdx);
      const hechos=newHitos.filter(h=>h.hecho).length;
      return{...p,hitos:newHitos,progreso:newHitos.length>0?Math.round(hechos/newHitos.length*100):0};
    };
    setProyectos(pp=>pp.map(p=>p.id===proyId?updProy(p):p));
    if(sel?.id===proyId){const up=updProy(sel);setSel(up);fbEscribir("proyectos",proyId,up);}
    setEditHitoIdx(null);
  };

  const startEditHito=(hitoIdx)=>{
    const h=(sel.hitos||[])[hitoIdx];
    if(!h) return;
    setEditHitoIdx(hitoIdx);
    setEditHitoForm({nombre:h.nombre||h.titulo||"",fecha:h.fecha||"",responsable:h.responsable||"",nota:h.nota||""});
  };

  const saveEditHito=(proyId)=>{

                      background:notaCierre.trim()?(showCierre==="exito"?T.green:T.red):"#E2E8F0",
                      color:notaCierre.trim()?"#fff":"#94A3B8",
                      fontWeight:700,fontSize:13,cursor:"pointer"}}>
                    Confirmar cierre →
                  </button>
                </div>
              </div>
            )}
          </div>
        )}
        {/* Equipo */}
        <p style={{margin:"16px 0 8px",fontSize:13,fontWeight:800,color:T.text}}>👥 Equipo</p>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {(Array.isArray(sel.equipo)?sel.equipo:[sel.equipo]).filter(Boolean).map(uid=>{
            const u=USUARIOS.find(x=>x.id===uid)||{nombre:uid,icon:"👤",color:T.muted};
            return(
              <div key={uid} style={{display:"flex",gap:6,alignItems:"center",background:T.white,
                border:`1px solid ${T.border}`,borderRadius:99,padding:"6px 12px"}}>
                <span style={{fontSize:14}}>{u.icon}</span>
                <span style={{fontSize:12,fontWeight:600,color:T.text}}>{u.nombre}</span>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  return(
    <div style={{padding:"16px 16px 100px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <p style={{margin:0,fontSize:20,fontWeight:900,color:T.text}}>📁 Proyectos</p>
        <button onClick={()=>setFormOpen(!formOpen)}
          style={{padding:"8px 14px",borderRadius:10,border:"none",background:T.navy,color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>
          + Nuevo
        </button>
      </div>

      {/* KPIs */}
      <div style={{display:"flex",gap:10,marginBottom:16}}>
        <Card style={{flex:1,padding:"12px",textAlign:"center",borderTop:`3px solid ${T.green}`}}>
          <p style={{margin:0,fontSize:22,fontWeight:900,color:T.green}}>{activos}</p>
          <p style={{margin:"2px 0 0",fontSize:10,fontWeight:700,color:T.muted}}>🔵 Activos</p>
        </Card>
        <Card style={{flex:1,padding:"12px",textAlign:"center",borderTop:`3px solid ${T.muted}`}}>
          <p style={{margin:0,fontSize:22,fontWeight:900,color:T.muted}}>{cerrados}</p>
          <p style={{margin:"2px 0 0",fontSize:10,fontWeight:700,color:T.muted}}>✅ Cerrados</p>
        </Card>
      </div>

      {/* Formulario */}
      {formOpen&&(
        <Card style={{marginBottom:16,border:`2px solid ${T.purple}`}}>
          <p style={{margin:"0 0 12px",fontSize:14,fontWeight:800}}>Nuevo proyecto</p>
          <div style={{marginBottom:10}}>
            <p style={{margin:"0 0 4px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Nombre</p>
            <input value={form.nombre} onChange={e=>setForm(x=>({...x,nombre:e.target.value}))} placeholder="Nombre del proyecto"
              style={{width:"100%",border:`1.5px solid ${T.border}`,borderRadius:9,padding:"10px 12px",fontSize:13,outline:"none",boxSizing:"border-box"}}/>
          </div>
          <div style={{marginBottom:10}}>
            <p style={{margin:"0 0 6px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Tipo</p>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {Object.entries(TIPOS).map(([k,v])=>(
                <button key={k} onClick={()=>setForm(x=>({...x,tipo:k}))}
                  style={{padding:"7px 11px",borderRadius:8,border:`2px solid ${form.tipo===k?v.color:T.border}`,
                    background:form.tipo===k?v.color+"15":"#fff",color:form.tipo===k?v.color:T.muted,
                    fontSize:11,fontWeight:form.tipo===k?700:400,cursor:"pointer"}}>
                  {v.icon} {v.label}
                </button>
              ))}
            </div>
          </div>
          <div style={{marginBottom:14}}>
            <p style={{margin:"0 0 4px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Descripción</p>
            <textarea value={form.desc} onChange={e=>setForm(x=>({...x,desc:e.target.value}))} rows={2}
              placeholder="¿Qué se quiere conseguir?"
              style={{width:"100%",border:`1.5px solid ${T.border}`,borderRadius:9,padding:"10px 12px",fontSize:13,outline:"none",resize:"none",boxSizing:"border-box"}}/>
          </div>
          <div style={{display:"flex",gap:8}}>
            <Btn small outline color={T.muted} onClick={()=>setFormOpen(false)}>Cancelar</Btn>
            <Btn small full color={T.purple} onClick={crearProyecto} disabled={!form.nombre}>✓ Crear</Btn>
          </div>
        </Card>
      )}

      {/* Filtro equipo */}
      {esJefeOmas&&<FiltroEquipo value={filtroEquipoProy} onChange={setFiltroEquipoProy} agenteSel={agenteSelProy} onAgenteSel={setAgenteSelProy} items={proyectos} getAgente={p=>p.responsableComercial||p.agente||p.creadoPor}/>}

      {/* Filtros */}
      <div style={{display:"flex",gap:6,marginBottom:14}}>
        {[["activo","Activos 🔵"],["cerrado","Cerrados ✅"],["todos","Todos"]].map(([k,l])=>(
          <button key={k} onClick={()=>setFiltro(k)}
            style={{padding:"6px 14px",borderRadius:99,border:`1.5px solid ${filtro===k?T.purple:T.border}`,
              background:filtro===k?T.purpleL:"#fff",color:filtro===k?T.purple:T.muted,
              fontSize:11,fontWeight:filtro===k?700:400,cursor:"pointer"}}>
            {l}
          </button>
        ))}
      </div>

      {visibles.filter(p=>{
        if(filtroDep==="todos") return true;
        return (p.deptos||[]).includes(filtroDep)||p.responsableComercial===usuario.id;
      }).map(p=>{
        const tipo=TIPOS[p.tipo]||TIPOS.otro;
        const hechos=p.hitos.filter(h=>h.hecho).length;
        return(
          <Card key={p.id} onClick={()=>setSel(p)} style={{marginBottom:10,cursor:"pointer"}}>
            <div style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:10}}>
              <div style={{width:44,height:44,borderRadius:12,background:tipo.color+"18",
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>
                {tipo.icon}
              </div>
              <div style={{flex:1}}>
                <p style={{margin:"0 0 4px",fontSize:14,fontWeight:800,color:T.text}}>{p.nombre}</p>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  <Badge label={tipo.label} color={tipo.color}/>
                  <Badge label={p.estado==="activo"?"● Activo":"● Cerrado"} color={p.estado==="activo"?T.green:T.muted}/>
                </div>
              </div>
              <span style={{fontSize:20,color:T.muted,flexShrink:0}}>›</span>
            </div>
            {p.desc&&<p style={{margin:"0 0 10px",fontSize:12,color:T.muted}}>{p.desc.slice(0,70)}{p.desc.length>70?"…":""}</p>}
            {(()=>{
              const hV=(p.hitos||[]).filter(h=>h.nombre||h.titulo||h.descripcion);
              const hH=hV.filter(h=>h.hecho).length;
              const pPct=hV.length>0?Math.round(hH/hV.length*100):0;
              return(<>
                <div style={{marginBottom:4,display:"flex",justifyContent:"space-between"}}>
                  <span style={{fontSize:11,color:T.muted}}>{hH}/{hV.length} hitos · hasta {p.fin}</span>
                  <span style={{fontSize:12,fontWeight:800,color:pPct===100?T.green:tipo.color}}>{pPct}%</span>
                </div>
                <div style={{height:5,borderRadius:99,background:T.border}}>
                  <div style={{height:"100%",width:`${pPct}%`,background:pPct===100?T.green:tipo.color,borderRadius:99}}/>
                </div>
              </>);
            })()}
          </Card>
        );
      })}
    </div>
  );
}
