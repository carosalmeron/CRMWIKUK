// GESTOR DE CLIENTES — Actividad diaria
// Estado compartido: actividadSemana[clienteId] = {
//   visitas: [{resultado,nota,fecha}],  ← historial completo
//   muestras:[{id,prodNombre,...}],
//   estrategia:{texto,tipo},
//   incidencia:{texto,tipo}
// }
// ═══════════════════════════════════════════════════════════════════
// ─── HISTORIAL DE CLIENTES (vista jefe/dir) ────────────────────────
function HistorialClientes({usuario, actividad}){
  const esDir=["director","ceo"].includes(usuario.rol);
  const miEquipo=usuario.equipo;

  // Construir lista de agentes visibles
  const agentes=USUARIOS.filter(u=>u.rol==="agente"&&(esDir||u.equipo===miEquipo));

  // Todos los clientes del equipo, con referencia al agente
  const todosClientes=agentes.flatMap(ag=>
    (CLIENTES_POR_AGENTE[ag.id]||[]).map(c=>({...c,agenteId:ag.id,agenteNombre:ag.nombre,agenteColor:ag.color}))
  );

  const [agenteF,setAgenteF]=useState("todos");
  const [q,setQ]=useState("");
  const [sel,setSel]=useState(null);
  const [tabSel,setTabSel]=useState("historial");

  const RESULTADOS_V=[
    {k:"pedido",           label:"✅ Pedido",         color:T.green},
    {k:"llamada",          label:"📞 Llamada",         color:T.blue},
    {k:"visita_sin_pedido",label:"👋 Visita s/pedido", color:T.amber},
    {k:"no_contesta",      label:"📵 No contesta",     color:T.muted},
    {k:"primera_visita",   label:"🆕 Primera visita",  color:T.purple},
  ];

  const getAct=(cid)=>actividad[cid]||{visitas:[],muestras:[],estrategia:null,incidencias:[]};

  const clientesFilt=todosClientes.filter(c=>{
    if(agenteF!=="todos"&&c.agenteId!==agenteF) return false;
    if(q&&!c.nombre.toLowerCase().includes(q.toLowerCase())) return false;
    return true;
  });

  // ── FICHA CLIENTE (solo lectura + historial) ──
  if(sel){
    const act=getAct(sel.id);
    const ag=USUARIOS.find(u=>u.id===sel.agenteId);
    const TABS=[
      {id:"historial",icon:"🕐",label:"Historial"},
      {id:"muestras", icon:"📦",label:"Muestras"},
      {id:"estrat",   icon:"🎯",label:"Estrategia"},
      {id:"incidencias",icon:"🚨",label:"Incidencias"},
    ];
    return(
      <div style={{paddingBottom:100,background:"#F8FAFC",minHeight:"100vh"}}>
        <div style={{background:"linear-gradient(135deg,#0F172A,#1E293B)",padding:"16px 16px 20px"}}>
          <button onClick={()=>setSel(null)}
            style={{display:"flex",alignItems:"center",gap:10,background:"rgba(255,255,255,.12)",
              border:"1.5px solid rgba(255,255,255,.25)",color:"#fff",fontSize:15,fontWeight:700,
              cursor:"pointer",padding:"12px 20px",borderRadius:12,marginBottom:14,
              width:"100%",boxSizing:"border-box"}}>
            <span style={{fontSize:24}}>←</span><span>Clientes del equipo</span>
          </button>
          <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
            <div style={{flex:1}}>
              <p style={{margin:"0 0 4px",fontSize:20,fontWeight:800,color:"#fff"}}>{sel.nombre}</p>
              {sel.tel&&<span style={{fontSize:11,color:"#94A3B8",marginRight:10}}>📞 {sel.tel}</span>}
              {sel.dir&&<span style={{fontSize:11,color:"#94A3B8"}}>📍 {sel.dir}</span>}
            </div>
            <div style={{background:"rgba(255,255,255,.08)",borderRadius:10,padding:"6px 12px",textAlign:"center"}}>
              {ag&&<><p style={{margin:0,fontSize:10,color:ag.color,fontWeight:700}}>{ag.nombre}</p>
              <p style={{margin:0,fontSize:9,color:"#64748B"}}>Ruta {sel.ruta}</p></>}
            </div>
          </div>
          {/* Resumen rápido */}
          <div style={{display:"flex",gap:8,marginTop:12}}>
            {[
              {label:"Visitas",val:act.visitas?.length||0,color:"#4ADE80"},
              {label:"Muestras",val:act.muestras?.length||0,color:"#C4B5FD"},
              {label:"Incidencias",val:act.incidencias?.filter(i=>i.estado==="abierta").length||0,color:"#FCA5A5"},
            ].map(k=>(
              <div key={k.label} style={{background:"rgba(255,255,255,.08)",borderRadius:9,padding:"8px 12px",flex:1}}>
                <p style={{margin:0,fontSize:18,fontWeight:900,color:k.color}}>{k.val}</p>
                <p style={{margin:"2px 0 0",fontSize:9,color:"rgba(255,255,255,.5)",fontWeight:600}}>{k.label}</p>
              </div>
            ))}
          </div>
        </div>

        {/* Tabs */}
        <div style={{display:"flex",background:"#fff",borderBottom:`1px solid ${T.border}`,
          position:"sticky",top:0,zIndex:10}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTabSel(t.id)}
              style={{flex:1,padding:"12px 4px",border:"none",background:"transparent",
                fontSize:10,fontWeight:tabSel===t.id?800:500,cursor:"pointer",
                color:tabSel===t.id?T.navy:T.muted,
                borderBottom:`2px solid ${tabSel===t.id?T.navy:"transparent"}`,
                display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
              <span style={{fontSize:16}}>{t.icon}</span>{t.label}
            </button>
          ))}
        </div>

        <div style={{padding:"16px"}}>
          {/* Historial */}
          {tabSel==="historial"&&(
            <HistorialTab
              visitas={act.visitas||[]}
              muestras={act.muestras||[]}
              estrategia={act.estrategia}
              incidencias={act.incidencias||[]}
              resultados={RESULTADOS_V}
            />
          )}
          {/* Muestras */}
          {tabSel==="muestras"&&(
            <div>
              {(act.muestras||[]).length===0&&(
                <p style={{textAlign:"center",color:T.muted,padding:"32px"}}>Sin muestras registradas</p>
              )}
              {(act.muestras||[]).map((m,i)=>(
                <div key={i} style={{background:"#fff",borderRadius:12,padding:"12px 14px",
                  marginBottom:8,border:`1px solid ${T.border}`}}>
                  {m.prodCodigo&&<p style={{margin:0,fontSize:10,color:T.blue,fontWeight:700,fontFamily:"monospace"}}>{m.prodCodigo}</p>}
                  <p style={{margin:0,fontSize:13,fontWeight:700}}>{m.prodNombre||m.prod}</p>
                  <p style={{margin:"2px 0 0",fontSize:11,color:T.muted}}>{m.tipo} · {m.cantidad} uds · {m.fecha}</p>
                </div>
              ))}
            </div>
          )}
          {/* Estrategia */}
          {tabSel==="estrat"&&(
            <div>
              {!act.estrategia&&<p style={{textAlign:"center",color:T.muted,padding:"32px"}}>Sin estrategia activa</p>}
              {act.estrategia&&(
                <div style={{background:"#fff",borderRadius:14,padding:"16px",
                  border:`1px solid ${T.border}`,borderLeft:`4px solid ${T.amber}`}}>
                  <Badge label={act.estrategia.tipo==="recuperacion"?"🔄 Recuperación":"🌱 Nuevo"} color={T.amber}/>
                  <p style={{margin:"8px 0 4px",fontSize:15,fontWeight:700}}>{act.estrategia.texto}</p>
                  {act.estrategia.objetivo&&<p style={{margin:0,fontSize:12,color:T.muted}}>🎯 {act.estrategia.objetivo}</p>}
                  {(act.estrategia.ofertas||[]).length>0&&(
                    <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${T.border}`}}>
                      <p style={{margin:"0 0 6px",fontSize:10,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Productos con oferta</p>
                      {act.estrategia.ofertas.map((o,i)=>(
                        <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${T.border}`}}>
                          <span style={{fontSize:12}}>{o.nombre}</span>
                          <span style={{fontSize:12,fontWeight:700,color:T.green}}>{o.precioFinal}€/kg <span style={{color:T.red,fontWeight:600}}>-{o.dto}%</span></span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>
          )}
          {/* Incidencias */}
          {tabSel==="incidencias"&&(
            <div>
              {(act.incidencias||[]).length===0&&(
                <p style={{textAlign:"center",color:T.muted,padding:"32px"}}>Sin incidencias registradas</p>
              )}
              {(act.incidencias||[]).map((inc,i)=>{
                const tipo=INC_TIPOS[inc.tipo]||{label:inc.tipo,color:T.muted};
                return(
                  <div key={i} style={{background:"#fff",borderRadius:12,padding:"12px 14px",
                    marginBottom:8,border:`1px solid ${T.border}`,borderLeft:`4px solid ${tipo.color}`}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                      <Badge label={tipo.label} color={tipo.color}/>
                      <span style={{fontSize:10,color:inc.estado==="cerrada"?T.green:T.red,fontWeight:700}}>
                        {inc.estado==="cerrada"?"✅ Cerrada":"🔴 Abierta"}
                      </span>
                    </div>
                    <p style={{margin:0,fontSize:12,color:T.text,lineHeight:1.5}}>{inc.descripcion}</p>
                    <p style={{margin:"4px 0 0",fontSize:10,color:T.muted}}>{inc.fecha}</p>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    );
  }

  // ── LISTA DE CLIENTES ──
  return(
    <div style={{padding:"16px 16px 100px"}}>
      <p style={{margin:"0 0 14px",fontSize:21,fontWeight:900,color:T.text}}>
        📋 Clientes {esDir?"de todos los equipos":`del equipo ${miEquipo}`}
      </p>

      {/* Filtros */}
      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
        <div style={{flex:1,position:"relative",minWidth:180}}>
          <input value={q} onChange={e=>setQ(e.target.value)}
            placeholder="🔍 Buscar cliente…"
            style={{width:"100%",border:`1.5px solid ${T.border}`,borderRadius:10,
              padding:"10px 12px",fontSize:13,outline:"none",boxSizing:"border-box"}}/>
          {q&&<button onClick={()=>setQ("")}
            style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",
              background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:16}}>×</button>}
        </div>
        <select value={agenteF} onChange={e=>setAgenteF(e.target.value)}
          style={{padding:"10px 12px",borderRadius:10,border:`1.5px solid ${T.border}`,
            fontSize:13,outline:"none",background:"#fff",cursor:"pointer"}}>
          <option value="todos">Todos los agentes</option>
          {agentes.map(a=><option key={a.id} value={a.id}>{a.nombre}</option>)}
        </select>
      </div>

      <p style={{margin:"0 0 12px",fontSize:11,color:T.muted}}>
        {clientesFilt.length} cliente{clientesFilt.length!==1?"s":""}
      </p>

      {clientesFilt.map(c=>{
        const act=getAct(c.id);
        const ult=act.visitas?.slice(-1)[0];
        const rOp=ult?RESULTADOS_V.find(r=>r.k===ult.resultado):null;
        const incAbiertas=(act.incidencias||[]).filter(i=>i.estado==="abierta").length;
        return(
          <div key={c.id} onClick={()=>{setSel(c);setTabSel("historial");}}
            style={{background:"#fff",borderRadius:14,padding:"13px 16px",
              marginBottom:8,cursor:"pointer",
              border:`1px solid ${T.border}`,
              borderLeft:`4px solid ${rOp?rOp.color:T.border}`,
              boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}>
            <div style={{display:"flex",gap:10,alignItems:"center"}}>
              <div style={{flex:1,minWidth:0}}>
                <p style={{margin:"0 0 2px",fontSize:14,fontWeight:700,color:T.text,
                  overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.nombre}</p>
                <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                  <span style={{fontSize:11,color:c.agenteColor,fontWeight:600}}>{c.agenteNombre}</span>
                  {rOp&&<span style={{fontSize:11,color:rOp.color,fontWeight:600}}>{rOp.label}</span>}
                  {!ult&&<span style={{fontSize:11,color:T.muted}}>Sin actividad</span>}
                </div>
              </div>
              <div style={{display:"flex",gap:6,flexShrink:0,alignItems:"center"}}>
                {act.muestras?.length>0&&<span style={{fontSize:10,color:T.purple,background:T.purpleL,borderRadius:99,padding:"2px 7px",fontWeight:700}}>📦 {act.muestras.length}</span>}
                {act.estrategia&&<span style={{fontSize:10,color:T.amber,background:T.amberL,borderRadius:99,padding:"2px 7px",fontWeight:700}}>🎯</span>}
                {incAbiertas>0&&<span style={{fontSize:10,color:T.red,background:T.redL,borderRadius:99,padding:"2px 7px",fontWeight:700}}>🚨 {incAbiertas}</span>}
                <span style={{color:T.muted,fontSize:18}}>›</span>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function GestorClientes({usuario, actividad, onActividad, onBack, clientesFB}){
  const clientes=clientesFB&&clientesFB.length>0 ? clientesFB : (CLIENTES_POR_AGENTE[usuario.id]||[]);
  const [rutaSel,setRutaSel]=useState(null);
  const [clienteSel,setClienteSel]=useState(null);
  const [tabSel,setTabSel]=useState("visita");
  const [busqueda,setBusqueda]=useState("");
  const [asignandoRuta,setAsignandoRuta]=useState(null);
  const [nuevaRuta,setNuevaRuta]=useState("");
  const [clientesLocal,setClientesLocal]=useState(null);
  const [showReasignar,setShowReasignar]=useState(false);
  const [nuevoAgente,setNuevoAgente]=useState("");
  const [tareasReasig,setTareasReasig]=useState([]);

  // Cargar solicitudes de reasignación pendientes
  React.useEffect(()=>{
    fbLeer("tareas").then(data=>{
      setTareasReasig(data.filter(t=>t.esSolicitudReasignacion&&t.estado==="pendiente"));
    }).catch(()=>{});
  },[]);

  const clienteTieneReasig=(clienteId)=>tareasReasig.some(t=>t.clienteId===clienteId);
  const semanaActual=14;

  const esJefeOmas=["jefe","director","ceo"].includes(usuario?.rol);
  const agentesDisp=USUARIOS.filter(u=>u.rol==="agente"&&
    (usuario?.rol==="jefe"?u.equipo===usuario.equipo:true));

  const reasignarCliente=(cliente)=>{
    if(!nuevoAgente) return;
    const ag=USUARIOS.find(u=>u.id===nuevoAgente);
    if(!ag) return;
    const updated={...cliente,
      GRUPOAGENTE:ag.grupoAgente||ag.id,
      grupoAgente:ag.grupoAgente||ag.id,
      agente:ag.id,
    };
    fbEscribir("clientes",cliente.id,updated).then(()=>{
      setClientesLocal(prev=>{
        const base=prev||clientes;
        return base.map(c=>c.id===cliente.id?updated:c);
      });
      setShowReasignar(false);
      setNuevoAgente("");
      alert("✅ Cliente reasignado a "+ag.nombre);
    });
  };

  // clientes efectivos (pueden tener rutas asignadas localmente)
  const clientesEfectivos=clientesLocal||clientes;

  // El campo "semana" o "semanas" (array) de Firebase ES la ruta
  const getRouteNum=(c)=>{
    // Primero semana como número
    if(c.semana&&Number(c.semana)>0) return Number(c.semana);
    if(c.ruta&&Number(c.ruta)>0) return Number(c.ruta);
    // semanas como array [1] o [1,2,3]
    if(Array.isArray(c.semanas)&&c.semanas.length>0){
      const n=Number(c.semanas[0]);
      if(n>0) return n;
    }
    // semanaVisita u otros nombres posibles
    if(c.semanaVisita&&Number(c.semanaVisita)>0) return Number(c.semanaVisita);
    if(c.SEMANAVISITA&&Number(c.SEMANAVISITA)>0) return Number(c.SEMANAVISITA);
    return 0;
  };

  // Grupos de rutas disponibles (solo con semana > 0)
  const rutasNums=[...new Set(clientesEfectivos.map(c=>getRouteNum(c)).filter(r=>r>0))].sort((a,b)=>a-b);
  const sinRuta=clientesEfectivos.filter(c=>getRouteNum(c)===0);

  const getAct=(cid)=>actividad[cid]||{visitas:[],muestras:[],estrategia:null,incidencia:null};

  // Asignar ruta a un cliente → guarda en Firebase + actualiza local
  const asignarRuta=(cliente,ruta)=>{
    const rutaNum=Number(ruta);
    if(!rutaNum||rutaNum<=0) return;
    const updated={...cliente,semana:rutaNum,ruta:rutaNum};
    fbEscribir("clientes",cliente.id,updated);
    setClientesLocal(prev=>{
      const base=prev||clientes;
      return base.map(c=>c.id===cliente.id?updated:c);
    });
    setAsignandoRuta(null);
    setNuevaRuta("");
  };

  const getAct2=(cid)=>actividad[cid]||{visitas:[],muestras:[],estrategia:null,incidencias:[]};

  // ── FICHA CLIENTE ─────────────────────────────────────────────────
  if(clienteSel){
    const act=getAct(clienteSel.id);
    const ultimaVisita=act.visitas?.slice(-1)[0];
    const TABS=[
      {id:"visita",   icon:"👋",label:"Visita"},
      {id:"muestras", icon:"📦",label:"Muestras"},
      {id:"estrat",   icon:"🎯",label:"Estrategia"},
      {id:"incidencia",icon:"🚨",label:"Incidencia"},
      {id:"historial",icon:"🕐",label:"Historial"},
    ];

    const RESULTADOS_V=[
      {k:"pedido",           label:"✅ Pedido",          color:T.green},
      {k:"llamada",          label:"📞 Llamada",          color:T.blue},
      {k:"visita_sin_pedido",label:"👋 Visita s/pedido",  color:T.amber},
      {k:"no_contesta",      label:"📵 No contesta",      color:T.muted},
      {k:"primera_visita",   label:"🆕 Primera visita",   color:T.purple},
    ];

    return(
      <div style={{padding:"0 0 100px",background:"#F8FAFC",minHeight:"100vh"}}>
        {/* Header ficha */}
        <div style={{background:"linear-gradient(135deg,#0F172A,#1E293B)",
          padding:"16px 16px 16px"}}>
          <button onClick={()=>setClienteSel(null)}
            style={{display:"flex",alignItems:"center",gap:10,
              background:"rgba(255,255,255,.12)",border:"1.5px solid rgba(255,255,255,.25)",
              color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",
              padding:"12px 20px",borderRadius:12,marginBottom:14,width:"100%",
              boxSizing:"border-box"}}>
            <span style={{fontSize:24,lineHeight:1}}>←</span>
            <span>Ruta {rutaSel}</span>
          </button>
          <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
            <div style={{flex:1}}>
              <p style={{margin:"0 0 3px",fontSize:20,fontWeight:800,color:"#fff",
                lineHeight:1.2}}>{clienteSel.nombre}</p>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:4}}>
                {clienteSel.tel&&<span style={{fontSize:11,color:"#94A3B8"}}>📞 {clienteSel.tel}</span>}
                {clienteSel.dir&&<span style={{fontSize:11,color:"#94A3B8"}}>📍 {clienteSel.dir}</span>}
              </div>
            </div>
            {clienteSel.esNuevo&&(
              <span style={{background:T.purpleL,color:T.purple,fontSize:10,
                fontWeight:700,padding:"3px 8px",borderRadius:99}}>NUEVO</span>
            )}
            {esJefeOmas&&(
              <button onClick={()=>setShowReasignar(v=>!v)}
                style={{background:"rgba(255,255,255,.12)",border:"1px solid rgba(255,255,255,.3)",
                  color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer",
                  padding:"5px 10px",borderRadius:8,flexShrink:0}}>
                👤 Reasignar
              </button>
            )}
          </div>

          {/* Panel reasignación agente */}
          {esJefeOmas&&showReasignar&&(
            <div style={{background:"rgba(255,255,255,.08)",borderRadius:10,
              padding:"12px 14px",marginTop:10,border:"1px solid rgba(255,255,255,.2)"}}>
              <p style={{margin:"0 0 8px",fontSize:11,fontWeight:700,color:"rgba(255,255,255,.6)",
                textTransform:"uppercase"}}>
                Agente actual: {clienteSel.GRUPOAGENTE||clienteSel.grupoAgente||"—"}
              </p>
              <select value={nuevoAgente} onChange={e=>setNuevoAgente(e.target.value)}
                style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"none",
                  fontSize:13,marginBottom:8,outline:"none",boxSizing:"border-box"}}>
                <option value="">Seleccionar agente...</option>
                {agentesDisp.map(a=>(
                  <option key={a.id} value={a.id}>{a.icon} {a.nombre} · {a.equipo}</option>
                ))}
              </select>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>{setShowReasignar(false);setNuevoAgente("");}}
                  style={{flex:1,padding:"8px",borderRadius:8,border:"none",
                    background:"rgba(255,255,255,.15)",color:"#fff",fontSize:12,cursor:"pointer"}}>
                  Cancelar
                </button>
                <button onClick={()=>reasignarCliente(clienteSel)}
                  disabled={!nuevoAgente}
                  style={{flex:2,padding:"8px",borderRadius:8,border:"none",
                    background:nuevoAgente?"#22C55E":"rgba(255,255,255,.1)",
                    color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"}}>
                  ✅ Confirmar reasignación
                </button>
              </div>
            </div>
          )}

          {/* Estado rápido */}
          <div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap",alignItems:"center"}}>
            {/* Solicitar reasignación — solo agentes */}
            {!esJefeOmas&&(
              <button onClick={()=>{
                const hoy=new Date().toLocaleDateString("es-ES");
                const id="tsk_reasign_"+Date.now();
                const doc={
                  id,
                  titulo:"Solicitud reasignación — "+(clienteSel.nombre||clienteSel.NOMBRE||"cliente"),
                  descripcion:"El agente "+usuario.nombre+" solicita reasignar este cliente ("+
                    (clienteSel.id||"")+" · "+(clienteSel.GRUPOAGENTE||clienteSel.grupoAgente||"sin agente")+
                    ") a otro vendedor.",
                  cliente:clienteSel.nombre||clienteSel.NOMBRE||"",
                  clienteId:clienteSel.id||"",
                  tipo:"coordinacion",
                  prioridad:"normal",
                  estado:"pendiente",
                  agente:"",
                  creadaPor:usuario.id,
                  creadaPorNombre:usuario.nombre,
                  creadaEn:hoy,
                  esSolicitudReasignacion:true,
                };
                fbEscribir("tareas",id,doc).then(()=>
                  alert("✅ Solicitud enviada al jefe de equipo. Recibirá la tarea de reasignación.")
                );
              }}
                style={{background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.25)",
                  color:"rgba(255,255,255,.8)",fontSize:11,fontWeight:600,cursor:"pointer",
                  padding:"4px 12px",borderRadius:8,flexShrink:0,whiteSpace:"nowrap"}}>
              🔄 Solicitar reasignación
            </button>
            )}
            {ultimaVisita&&(
              <div style={{background:"rgba(255,255,255,.08)",borderRadius:8,
                padding:"4px 10px",fontSize:11,color:"rgba(255,255,255,.7)"}}>
                Última visita: {ultimaVisita.fecha} · {RESULTADOS_V.find(r=>r.k===ultimaVisita.resultado)?.label||ultimaVisita.resultado}
              </div>
            )}
            {act.muestras?.length>0&&(
              <div style={{background:"rgba(124,58,237,.2)",borderRadius:8,
                padding:"4px 10px",fontSize:11,color:"#C4B5FD"}}>
                📦 {act.muestras.length} muestra{act.muestras.length>1?"s":""}
              </div>
            )}
            {act.estrategia&&(
              <div style={{background:"rgba(251,191,36,.15)",borderRadius:8,
                padding:"4px 10px",fontSize:11,color:"#FCD34D"}}>
                🎯 Estrategia activa
              </div>
            )}
          </div>
        </div>

        {/* Tabs */}
        <div style={{display:"flex",background:"#fff",borderBottom:`1px solid ${T.border}`,
          position:"sticky",top:0,zIndex:10}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTabSel(t.id)}
              style={{flex:1,padding:"12px 4px",border:"none",background:"transparent",
                fontSize:10,fontWeight:tabSel===t.id?800:500,cursor:"pointer",
                color:tabSel===t.id?T.navy:T.muted,
                borderBottom:`2px solid ${tabSel===t.id?T.navy:"transparent"}`,
                transition:"all .15s",display:"flex",flexDirection:"column",
                alignItems:"center",gap:3}}>
              <span style={{fontSize:16}}>{t.icon}</span>
              {t.label}
            </button>
          ))}
        </div>

        <div style={{padding:"16px"}}>

          {/* ── TAB VISITA ── */}
          {tabSel==="visita"&&(
            <VisitaTab
              cliente={clienteSel}
              act={act}
              resultados={RESULTADOS_V}
              onGuardar={(v)=>{
                const entrada={...v,fecha:new Date().toLocaleDateString("es-ES",
                  {day:"2-digit",month:"2-digit",year:"2-digit"})};
                onActividad(clienteSel.id,{
                  ...act,
                  visitas:[...(act.visitas||[]),entrada]
                });
                // Guardar en Firebase
                fbEscribir("visitas",`${usuario.id}_${clienteSel.id}_sem${semana}_${Date.now()}`,{
                  ...entrada,clienteId:clienteSel.id,clienteNombre:clienteSel.nombre,
                  agente:usuario.id,semana
                });
              }}
            />
          )}

          {/* ── TAB MUESTRAS ── */}
          {tabSel==="muestras"&&(
            <MuestrasClienteTab
              muestras={act.muestras||[]}
              clienteNombre={clienteSel.nombre}
              onAdd={(m)=>{
                const nueva={...m,clienteId:clienteSel.id,clienteNombre:clienteSel.nombre,
                  agente:usuario.id,equipo:usuario.equipo||"",semana};
                onActividad(clienteSel.id,{...act,muestras:[...(act.muestras||[]),nueva]});
                fbEscribir("muestras",nueva.id,{
                  ...nueva,fotos:undefined // fotos solo en local
                });
              }}
              onDel={(id)=>{
                onActividad(clienteSel.id,{...act,muestras:(act.muestras||[]).filter(m=>m.id!==id)});
                // Marcar como eliminada en Firebase
                fbEscribir("muestras",id,{id,eliminada:true,eliminadoPor:usuario.id,
                  fecha:new Date().toLocaleDateString("es-ES")});
              }}
            />
          )}

          {/* ── TAB ESTRATEGIA ── */}
          {tabSel==="estrat"&&(
            <EstrategiaTab
              estrategia={act.estrategia}
              clienteNombre={clienteSel.nombre}
              onGuardar={(e)=>{
                const estDoc={...e,
                  id:`est_${usuario.id}_${clienteSel.id}`,
                  clienteId:clienteSel.id,
                  clienteNombre:clienteSel.nombre,
                  agente:usuario.id,
                  equipo:usuario.equipo||"",
                  estado:"pendiente_aprobacion",
                  semana,
                  fecha:new Date().toLocaleDateString("es-ES"),
                  // Guardar ofertas sin imágenes para no superar límite Firestore
                  ofertas:(e.ofertas||[]).map(o=>({...o})),
                };
                onActividad(clienteSel.id,{...act,estrategia:e});
                fbEscribir("estrategias",estDoc.id,estDoc);
              }}
              onBorrar={()=>{
                onActividad(clienteSel.id,{...act,estrategia:null});
                fbEscribir("estrategias",`est_${usuario.id}_${clienteSel.id}`,
                  {eliminada:true,eliminadoPor:usuario.id,fecha:new Date().toLocaleDateString("es-ES")});
              }}
            />
          )}

          {/* ── TAB INCIDENCIA ── */}
          {tabSel==="incidencia"&&(
            <IncidenciaTab
              incidencias={act.incidencias||[]}
              clienteNombre={clienteSel.nombre}
              usuario={usuario}
              onAdd={async (inc)=>{
                const id=`inc${Date.now()}`;
                const carpeta=`incidencias/${id}`;
                // Subir fotos a Storage y obtener URLs permanentes
                const fotosURLs=await subirFotos(inc.fotos||[], carpeta);
                const nueva={...inc,id,fotos:fotosURLs,
                  clienteId:clienteSel.id,clienteNombre:clienteSel.nombre,
                  agente:usuario.id,equipo:usuario.equipo||"",
                  fecha:new Date().toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit",year:"2-digit"}),
                  estado:"abierta"};
                onActividad(clienteSel.id,{...act,incidencias:[...(act.incidencias||[]),nueva]});
                fbEscribir("incidencias",nueva.id,nueva);
              }}
              onCerrar={(id)=>onActividad(clienteSel.id,{...act,
                incidencias:(act.incidencias||[]).map(i=>i.id===id?{...i,estado:"cerrada"}:i)})}
            />
          )}

          {/* ── TAB HISTORIAL ── */}
          {tabSel==="historial"&&(
            <HistorialTab
              visitas={act.visitas||[]}
              muestras={act.muestras||[]}
              estrategia={act.estrategia}
              incidencias={act.incidencias||[]}
              resultados={RESULTADOS_V}
            />
          )}
        </div>
      </div>
    );
  }


    // ── LISTA DE CLIENTES SIN RUTA (para asignar) ─────────────────────
  if(rutaSel==="sinRuta"){
    const clientesFiltrados=busqueda
      ? sinRuta.filter(c=>{const n=(c.nombre||c.name||'');return n.toLowerCase().includes(busqueda.toLowerCase());})
      : sinRuta;
    return(
      <div style={{padding:"0 0 100px",background:"#F8FAFC",minHeight:"100vh"}}>
        <div style={{background:"linear-gradient(135deg,#92400E,#B45309)",padding:"16px 16px 20px"}}>
          <button onClick={()=>{setRutaSel(null);setBusqueda('');setAsignandoRuta(null);}}
            style={{display:"flex",alignItems:"center",gap:10,background:"rgba(255,255,255,.15)",
              border:"1.5px solid rgba(255,255,255,.3)",color:"#fff",fontSize:14,fontWeight:700,
              cursor:"pointer",padding:"10px 18px",borderRadius:10,marginBottom:12,
              width:"100%",boxSizing:"border-box"}}>
            <span>←</span><span>Mis rutas</span>
          </button>
          <p style={{margin:"0 0 2px",fontSize:20,fontWeight:800,color:"#fff"}}>⚠️ Sin ruta asignada</p>
          <p style={{margin:0,fontSize:12,color:"rgba(255,255,255,.7)"}}>
            {sinRuta.length} clientes · {clientesFiltrados.length} mostrados
          </p>
        </div>
        <div style={{padding:"12px 16px 0"}}>
          <input value={busqueda} onChange={e=>setBusqueda(e.target.value)}
            placeholder={"🔍 Buscar entre "+sinRuta.length+" clientes..."}
            style={{width:"100%",padding:"10px 14px",borderRadius:10,border:"1px solid #E2E8F0",
              fontSize:14,fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}/>
        </div>
        <div style={{padding:"12px 16px"}}>
          {clientesFiltrados.slice(0,200).map(function(c,idx){
            const cid=String(c.id||c.codigoERP||idx);
            const nom=String(c.nombre||c.name||'Sin nombre');
            const cod=String(c.codigoERP||c.id||'');
            const estaAsignando=asignandoRuta===cid;
            return(
              <div key={cid} style={{background:"#fff",borderRadius:12,padding:"12px 14px",
                marginBottom:8,border:"1.5px solid #FDE68A"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:36,height:36,borderRadius:9,flexShrink:0,
                    background:"linear-gradient(135deg,#92400E,#B45309)",
                    color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",
                    fontSize:13,fontWeight:800}}>
                    {nom.charAt(0)}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{margin:0,fontSize:13,fontWeight:700,color:"#0F172A",
                      overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{nom}</p>
                    {cod&&<p style={{margin:0,fontSize:11,color:"#94A3B8",fontFamily:"monospace"}}>{cod}</p>}
                  </div>
                  <button onClick={function(){setAsignandoRuta(estaAsignando?null:cid);setNuevaRuta("");}}
                    style={{padding:"6px 12px",borderRadius:7,border:"none",flexShrink:0,

                          style={{width:56,padding:"6px 8px",borderRadius:8,textAlign:"center",
                            border:"1.5px solid #E2E8F0",fontSize:13,fontFamily:"inherit",outline:"none"}}/>
                        {nuevaRuta&&Number(nuevaRuta)>0&&(
                          <button onClick={function(){asignarRuta(c,nuevaRuta);}}

  // ── LISTA DE CLIENTES DE UNA RUTA ─────────────────────────────────
  if(rutaSel!==null && rutaSel!=="sinRuta"){
    const clientesRuta=clientesEfectivos.filter(function(c){return getRouteNum(c)===rutaSel;});

              fontSize:14,fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}/>

        <div style={{padding:"12px 16px"}}>
          {clientesFiltrados.length===0&&(
            <div style={{textAlign:"center",padding:"40px",color:"#94A3B8"}}>
              <p style={{fontSize:32}}>🔍</p><p style={{fontWeight:700}}>Sin resultados</p>
            </div>
          )}
          {clientesFiltrados.map(function(c,idx){
            const cid=String(c.id||c.codigoERP||idx);
            const nom=String(c.nombre||c.name||'Sin nombre');
            const cod=String(c.codigoERP||c.id||'');
            const act=getAct(cid);
            const ult=(act.visitas||[]).slice(-1)[0];
            const RESS=[
              {k:"pedido",label:"✅ Pedido",color:"#22C55E"},
              {k:"llamada",label:"📞 Llamada",color:"#3B82F6"},
              {k:"visita_sin_pedido",label:"👋 Sin pedido",color:"#F59E0B"},
              {k:"no_contesta",label:"📵 No contesta",color:"#94A3B8"},
              {k:"primera_visita",label:"🆕 Primera",color:"#8B5CF6"},

                  border:tieneReasig?"2px solid #F59E0B":"1px solid #E2E8F0",

                  <span style={{position:"absolute",top:-9,right:12,
                    background:"#F59E0B",color:"#fff",fontSize:9,fontWeight:800,
                    padding:"2px 8px",borderRadius:99,letterSpacing:".03em"}}>
                    🔄 Solicita reasignación
                  </span>
                )}
                <div style={{width:40,height:40,borderRadius:10,flexShrink:0,
                  background:"linear-gradient(135deg,#0F172A,#334155)",
                  color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:15,fontWeight:800}}>
                  {nom.charAt(0)}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{margin:0,fontSize:14,fontWeight:700,color:"#0F172A",
                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{nom}</p>
                  <div style={{display:"flex",gap:8,marginTop:2,flexWrap:"wrap"}}>
                    {cod&&<span style={{fontSize:11,color:"#94A3B8",fontFamily:"monospace"}}>{cod}</span>}
                    {rOp&&<span style={{fontSize:11,fontWeight:600,color:rOp.color}}>{rOp.label}</span>}
                    {tieneReasig&&<span style={{fontSize:11,fontWeight:700,color:"#D97706"}}>🔄 Reasignación pendiente</span>}
                  </div>
                </div>
                <span style={{color:"#94A3B8",fontSize:18}}>›</span>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ── PANTALLA PRINCIPAL: SELECCIÓN DE RUTA ─────────────────────────
  const totalVisitados=clientesEfectivos.filter(c=>getAct(c.id).visitas?.length>0).length;
  const totalMuestras=clientesEfectivos.reduce((s,c)=>s+(getAct(c.id).muestras?.length||0),0);

  return(
    <div style={{padding:"0 0 100px",background:"#F8FAFC",minHeight:"100vh"}}>
      <div style={{background:"linear-gradient(135deg,#0F172A,#1E293B)",
        padding:"16px 16px 22px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",right:-20,top:-20,width:100,height:100,
          borderRadius:"50%",background:"rgba(255,255,255,.04)"}}/>
        <p style={{margin:"0 0 3px",fontSize:11,fontWeight:700,color:"#4B5563",
          letterSpacing:".1em",textTransform:"uppercase"}}>{usuario.equipo}</p>
        <p style={{margin:"0 0 12px",fontSize:22,fontWeight:800,color:"#fff"}}>📋 Mis clientes</p>
        <div style={{display:"flex",gap:8}}>
          {[
            {label:"Total",value:clientesEfectivos.length,color:"#60A5FA"},
            {label:"Visitados",value:totalVisitados,total:clientesEfectivos.length,color:"#4ADE80"},
            {label:"Muestras",value:totalMuestras,color:"#C4B5FD"},
          ].map(k=>(
            <div key={k.label} style={{flex:1,background:"rgba(255,255,255,.08)",borderRadius:10,padding:"10px 12px"}}>
              <p style={{margin:0,fontSize:20,fontWeight:900,color:k.color,lineHeight:1}}>
                {k.value}{k.total?`/${k.total}`:""}
              </p>
              <p style={{margin:"3px 0 0",fontSize:10,color:"rgba(255,255,255,.5)",fontWeight:600}}>{k.label}</p>
            </div>
          ))}
        </div>
      </div>

      <div style={{padding:"16px"}}>
        {/* DEBUG — eliminar cuando funcione */}
        <div style={{background:"#EFF6FF",border:"1px solid #93C5FD",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:11}}>
          <span style={{fontWeight:700,color:"#1D4ED8"}}>🔍 Debug: </span>
          <span style={{color:"#1E40AF"}}>{clientesEfectivos.length} clientes cargados · {rutasNums.length} rutas · {sinRuta.length} sin ruta</span>
        </div>
        <p style={{margin:"0 0 12px",fontSize:11,fontWeight:700,color:T.muted,
          textTransform:"uppercase",letterSpacing:".08em"}}>
          {rutasNums.length>0?"Selecciona una ruta":`${clientesEfectivos.length} clientes`}

        {clientesEfectivos.length===0&&(
          <div style={{background:"#FFF7ED",border:"1px solid #F59E0B",borderRadius:12,padding:"14px 16px",marginBottom:12}}>

              En el Admin del portal, asigna el código de vendedor correcto a este usuario.

        {/* Rutas con clientes */}
        {rutasNums.map(r=>{
          const cli=clientesEfectivos.filter(c=>getRouteNum(c)===r);
          const visitados=cli.filter(c=>getAct(c.id).visitas?.length>0).length;
          const muestrasR=cli.reduce((s,c)=>s+(getAct(c.id).muestras?.length||0),0);
          return(
            <div key={r} onClick={()=>setRutaSel(r)}
              style={{background:"#fff",borderRadius:16,padding:"18px 20px",marginBottom:10,
                cursor:"pointer",border:`1px solid ${T.border}`,
                boxShadow:"0 1px 4px rgba(0,0,0,.04)",display:"flex",alignItems:"center",gap:16}}>
              <div style={{width:52,height:52,borderRadius:14,
                background:"linear-gradient(135deg,#0F172A,#334155)",
                color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:24,fontWeight:900,flexShrink:0}}>{r}</div>
              <div style={{flex:1}}>
                <p style={{margin:"0 0 4px",fontSize:16,fontWeight:700,color:T.text}}>Ruta {r}</p>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  <span style={{fontSize:11,color:visitados===cli.length&&cli.length>0?T.green:T.muted,fontWeight:600}}>
                    👥 {visitados}/{cli.length} visitados
                  </span>
                  {muestrasR>0&&<span style={{fontSize:11,color:T.purple,fontWeight:600}}>📦 {muestrasR} muestras</span>}
                </div>
                <div style={{height:3,borderRadius:99,background:T.border,marginTop:8,overflow:"hidden"}}>
                  <div style={{height:"100%",width:cli.length>0?`${Math.round(visitados/cli.length*100)}%`:"0%",
                    borderRadius:99,background:visitados===cli.length&&cli.length>0?T.green:T.blue,transition:"width .5s"}}/>
                </div>
              </div>
              <span style={{color:T.muted,fontSize:20}}>›</span>
            </div>
          );
        })}

        {/* Grupo sin ruta asignada */}
        {sinRuta.length>0&&(
          <div onClick={()=>setRutaSel("sinRuta")}
            style={{background:"#FFF7ED",borderRadius:16,padding:"18px 20px",marginBottom:10,
              cursor:"pointer",border:"1.5px solid #FDE68A",
              display:"flex",alignItems:"center",gap:16}}>
            <div style={{width:52,height:52,borderRadius:14,
              background:"linear-gradient(135deg,#92400E,#B45309)",
              color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:22,fontWeight:900,flexShrink:0}}>⚠️</div>
            <div style={{flex:1}}>
              <p style={{margin:"0 0 3px",fontSize:16,fontWeight:700,color:"#92400E"}}>Sin ruta asignada</p>
              <p style={{margin:0,fontSize:12,color:"#B45309"}}>{sinRuta.length} clientes pendientes · Pulsa para asignar ruta</p>
            </div>
            <span style={{color:"#B45309",fontSize:20}}>›</span>
          </div>
        )}
      </div>
    </div>
  );
}

function VisitaTab({cliente,act,resultados,onGuardar}){
  const [res,setRes]=useState("");
  const [nota,setNota]=useState("");
  const [guardado,setGuardado]=useState(false);
  const [micOn,setMicOn]=useState(false);
  const micRef=React.useRef(null);

  const dictarNota=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert("Usa Chrome o Edge para el micrófono.");return;}
    if(micOn){micRef.current?.stop();setMicOn(false);return;}
    const r=new SR();
    r.lang="es-ES"; r.continuous=false; r.interimResults=false;
    micRef.current=r;
    r.onstart=()=>setMicOn(true);
    r.onend=()=>setMicOn(false);
    r.onerror=()=>setMicOn(false);
    r.onresult=(e)=>{
      const txt=e.results[0][0].transcript;
      setNota(prev=>prev?prev+" "+txt:txt);
    };
    r.start();
  };

  const guardar=()=>{
    if(!res) return;
    onGuardar({resultado:res,nota});
    setGuardado(true);
    setTimeout(()=>setGuardado(false),3000);
    setNota(""); setRes("");
  };

  return(
    <div>
      {guardado&&(
        <div style={{background:T.greenL,border:`1px solid ${T.green}`,borderRadius:12,
          padding:"12px 16px",marginBottom:16,display:"flex",gap:8,alignItems:"center"}}>
          <span style={{fontSize:18}}>✅</span>
          <p style={{margin:0,fontSize:13,fontWeight:700,color:T.green}}>Visita registrada correctamente</p>
        </div>
      )}
      <p style={{margin:"0 0 8px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
        Resultado de la visita
      </p>
      <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:16}}>
        {resultados.map(r=>(
          <button key={r.k} onClick={()=>setRes(r.k)}
            style={{padding:"9px 14px",borderRadius:10,cursor:"pointer",fontSize:12,
              border:`2px solid ${res===r.k?r.color:T.border}`,
              background:res===r.k?r.color+"15":"#fff",
              color:res===r.k?r.color:T.muted,
              fontWeight:res===r.k?700:400}}>
            {r.label}
          </button>
        ))}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <p style={{margin:0,fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Notas</p>
        <button onClick={dictarNota}
          style={{display:"flex",alignItems:"center",gap:5,padding:"5px 12px",
            borderRadius:99,border:"1.5px solid "+(micOn?"#EF4444":T.border),
            background:micOn?"#FEF2F2":"#F8FAFC",
            color:micOn?"#EF4444":T.muted,
            fontSize:11,fontWeight:700,cursor:"pointer"}}>
          {micOn?"⏹ Escuchando...":"🎤 Dictar"}
        </button>
      </div>
      <textarea value={nota} onChange={e=>setNota(e.target.value)} rows={4}
        placeholder={micOn?"🎤 Habla ahora...":"Qué se habló, qué productos interesan, próximos pasos, acuerdos…"}
        style={{width:"100%",
          border:`1.5px solid ${micOn?"#EF4444":nota?T.blue:T.border}`,
          borderRadius:12,padding:"12px",fontSize:13,resize:"none",outline:"none",
          boxSizing:"border-box",lineHeight:1.6,fontFamily:"inherit",marginBottom:16,
          background:micOn?"#FEF2F2":"#fff"}}/>
      <button onClick={guardar} disabled={!res}
        style={{width:"100%",padding:"14px",borderRadius:12,border:"none",
          background:res?"#0F172A":"#CBD5E1",color:"#fff",fontWeight:700,
          fontSize:15,cursor:res?"pointer":"default"}}>
        {res?"✓ Guardar visita":"Selecciona el resultado primero"}
      </button>
    </div>
  );
}

              onSelect={s=>setForm(f=>({...f,prodNombre:s.label,prodCodigo:s.obj.codigo}))}

              <p style={{margin:"0 0 4px",fontSize:10,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Uds.</p>

                placeholder="1" style={ISt}/>
            </div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>{setShow(false);setQProd("");}}
              style={{flex:1,padding:"10px",borderRadius:10,border:`1px solid ${T.border}`,
                background:"#fff",color:T.muted,fontWeight:600,fontSize:13,cursor:"pointer"}}>
              Cancelar
            </button>
            <button onClick={()=>{
              if(!form.prodNombre) return;
              onAdd({...form,id:`m${Date.now()}`,
                fecha:new Date().toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit",year:"2-digit"})});
              setForm({prodCodigo:"",prodNombre:"",tipo:"Deshidratada",cantidad:""});
              setShow(false); setQProd("");
            }} style={{flex:2,padding:"10px",borderRadius:10,border:"none",
              background:T.purple,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>
              ✓ Añadir muestra
            </button>
          </div>
        </div>
      )}
      {!show&&(
        <button onClick={()=>setShow(true)}
          style={{width:"100%",padding:"13px",borderRadius:12,marginTop:8,
            border:`2px dashed ${T.purple}`,background:T.purpleL,
            color:T.purple,fontWeight:700,fontSize:13,cursor:"pointer"}}>
          + Anotar muestra entregada
        </button>
      )}
    </div>
  );
}

function EstrategiaTab({estrategia,clienteNombre,onGuardar,onBorrar}){
  const [form,setForm]=useState(estrategia||{tipo:"recuperacion",texto:"",objetivo:"",ofertas:[]});
  const [editando,setEditando]=useState(!estrategia);
  const [qProd,setQProd]=useState("");
  const [showProd,setShowProd]=useState(false);
  const [formOf,setFormOf]=useState({codigo:"",nombre:"",precioBase:"",dto:"",nota:""});

  const prodRes=useMemo(()=>{
    if(qProd.length<2) return [];
    const q=qProd.toLowerCase();
    return PRODUCTOS_LOCAL.filter(p=>(p.codigo||"").toLowerCase().includes(q)||(p.nombre||"").toLowerCase().includes(q)).slice(0,15);
  },[qProd]);

  const precioFinal=useMemo(()=>{
    if(!formOf.precioBase) return "";
    const base=parseFloat(formOf.precioBase.replace(",","."));
    if(isNaN(base)) return "";
    if(formOf.dto){const dto=parseFloat(formOf.dto);return isNaN(dto)?base.toFixed(2):(base*(1-dto/100)).toFixed(2);}
    return base.toFixed(2);
  },[formOf.precioBase,formOf.dto]);

  const addOferta=()=>{
    if(!formOf.nombre.trim()) return;
    setForm(f=>({...f,ofertas:[...(f.ofertas||[]),{...formOf,precioFinal,id:`of${Date.now()}`}]}));
    setFormOf({codigo:"",nombre:"",precioBase:"",dto:"",nota:""});
    setQProd(""); setShowProd(false);
  };

  const ISt={width:"100%",border:`1.5px solid ${T.border}`,borderRadius:10,
    padding:"10px 12px",fontSize:13,outline:"none",boxSizing:"border-box"};

  // ── Vista resumen ────────────────────────────────────────────────
  if(!editando&&estrategia){
    return(
      <div>

          border:`1px solid ${T.border}`,borderLeft:`4px solid ${T.amber}`,marginBottom:16}}>

            <Badge label={estrategia.tipo==="recuperacion"?"🔄 Recuperación":"🌱 Cliente nuevo"} color={T.amber}/>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>{setForm({...estrategia,ofertas:estrategia.ofertas||[]});setEditando(true);}}

                  padding:"4px 10px",color:T.blue,fontSize:12,cursor:"pointer"}}>✏️ Editar</button>
              <button onClick={onBorrar}
                style={{background:"none",border:"none",cursor:"pointer",color:T.red,fontSize:16}}>🗑</button>
            </div>
          </div>
          <p style={{margin:"0 0 4px",fontSize:14,fontWeight:700,color:T.text}}>{estrategia.texto}</p>
          {estrategia.objetivo&&<p style={{margin:"0 0 8px",fontSize:12,color:T.muted}}>🎯 {estrategia.objetivo}</p>}
          {(estrategia.ofertas||[]).length>0&&(
            <div style={{marginTop:8,paddingTop:8,borderTop:`1px solid ${T.border}`}}>

                🏷️ Productos con oferta

              {estrategia.ofertas.map((o,i)=>(
                <div key={i} style={{display:"flex",gap:8,alignItems:"center",
                  padding:"6px 0",borderBottom:i<estrategia.ofertas.length-1?`1px solid ${T.border}`:"none"}}>
                  <div style={{flex:1,minWidth:0}}>
                    {o.codigo&&<span style={{fontSize:10,fontFamily:"monospace",color:T.blue,fontWeight:700}}>{o.codigo} · </span>}
                    <span style={{fontSize:12,fontWeight:600}}>{o.nombre}</span>
                  </div>
                  <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
                    {o.precioBase&&<span style={{fontSize:11,color:T.muted,textDecoration:o.dto?"line-through":"none"}}>{o.precioBase}€</span>}
                    {o.dto&&<span style={{fontSize:11,color:T.red,fontWeight:700}}>-{o.dto}%</span>}
                    {o.precioFinal&&o.dto&&<span style={{fontSize:12,fontWeight:800,color:T.green}}>{o.precioFinal}€/kg</span>}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
        <p style={{fontSize:11,color:T.muted,textAlign:"center"}}>

        </p>
      </div>
    );
  }

  // ── Formulario ────────────────────────────────────────────────────
  return(

      {/* Tipo */}

      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {[{k:"recuperacion",icon:"🔄",label:"Recuperar cliente"},{k:"nuevo",icon:"🌱",label:"Cliente nuevo"}].map(t=>(
          <button key={t.k} onClick={()=>setForm(f=>({...f,tipo:t.k}))}

      {/* ── PRODUCTOS CON OFERTA ── */}
      <div style={{marginBottom:20}}>
        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:10}}>
          <p style={{margin:0,fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
            🏷️ Productos con precio oferta
          </p>
          {(form.ofertas||[]).length>0&&(
            <span style={{background:T.amber,color:"#fff",borderRadius:99,
              fontSize:10,fontWeight:800,padding:"2px 8px"}}>{form.ofertas.length}</span>

        </div>

        {/* Ofertas añadidas */}
        {(form.ofertas||[]).map((o,i)=>(
          <div key={o.id||i} style={{background:"#fff",borderRadius:11,padding:"11px 14px",

            borderLeft:`3px solid ${T.amber}`,

                {o.precioFinal&&<span style={{fontSize:13,fontWeight:800,color:T.green}}>{o.precioFinal}€/kg</span>}

        {/* Formulario nueva oferta */}
        <div style={{background:T.bg,borderRadius:12,padding:"14px",border:`1.5px dashed ${T.amber}66`}}>
          {/* Buscador producto */}
          <div style={{display:"flex",gap:6,marginBottom:formOf.codigo?4:8}}>
            <SearchInput
              value={formOf.nombre}
              onChange={v=>setFormOf(f=>({...f,nombre:v,codigo:"",precioBase:""}))}

              suggestions={PRODUCTOS_LOCAL
                .filter(p=>formOf.nombre.length>=2&&((p.nombre||"").toLowerCase().includes(formOf.nombre.toLowerCase())||(p.codigo||"").toLowerCase().includes(formOf.nombre.toLowerCase())))
                .slice(0,8).map(p=>({label:p.nombre,sub:p.codigo+" · "+p.precio+"€/kg",tipo:"producto",obj:p}))}

              style={{flex:1}}

                    </div>
                    {p.precio&&<span style={{fontSize:12,fontWeight:700,color:T.green,flexShrink:0}}>{p.precio}€/kg</span>}

              <p style={{margin:"0 0 4px",fontSize:10,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Precio tarifa €/kg</p>

            <div style={{flex:1}}>
              <p style={{margin:"0 0 4px",fontSize:10,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Dto. solicitado %</p>
              <input type="number" value={formOf.dto} onChange={e=>setFormOf(f=>({...f,dto:e.target.value}))}
                placeholder="0" style={{...ISt,padding:"10px 12px"}}/>
            </div>
          </div>

          {/* Precio calculado */}
          {precioFinal&&(
            <div style={{background:T.greenL,borderRadius:9,padding:"9px 14px",
              marginBottom:8,display:"flex",gap:10,alignItems:"center"}}>
              <span>✓</span>
              <div>
                <p style={{margin:0,fontSize:14,fontWeight:800,color:T.green}}>
                  Precio oferta: {precioFinal}€/kg
                </p>
                {formOf.dto&&<p style={{margin:0,fontSize:11,color:T.green}}>

                </p>}
              </div>
            </div>
          )}

          <input value={formOf.nota} onChange={e=>setFormOf(f=>({...f,nota:e.target.value}))}

          <button onClick={addOferta} disabled={!formOf.nombre.trim()}
            style={{width:"100%",padding:"11px",borderRadius:9,border:"none",
              background:formOf.nombre.trim()?T.amber:"#CBD5E1",
              color:"#fff",fontWeight:700,fontSize:13,
              cursor:formOf.nombre.trim()?"pointer":"default"}}>
            + Añadir producto con oferta
          </button>
        </div>
      </div>

      {/* Guardar */}
      <div style={{display:"flex",gap:8}}>
        {estrategia&&<button onClick={()=>setEditando(false)}
          style={{flex:1,padding:"12px",borderRadius:11,border:`1px solid ${T.border}`,
            background:"#fff",color:T.muted,fontWeight:600,fontSize:13,cursor:"pointer"}}>
          Cancelar
        </button>}
        <button onClick={()=>{if(!form.texto.trim()) return;onGuardar(form);setEditando(false);}}
          disabled={!form.texto.trim()}
          style={{flex:2,padding:"12px",borderRadius:11,border:"none",
            background:form.texto.trim()?T.amber:"#CBD5E1",
            color:"#fff",fontWeight:700,fontSize:14,
            cursor:form.texto.trim()?"pointer":"default"}}>
          ✓ Solicitar estrategia
        </button>
      </div>
    </div>
  );
}

          <p style={{margin:"0 0 6px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>📷 Fotos</p>
          {(form.fotos||[]).length>0&&(
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
              {form.fotos.map((f,i)=>(
                <div key={i} style={{position:"relative",flexShrink:0}}>
                  <img src={f} alt="" style={{width:80,height:80,objectFit:"cover",
                    borderRadius:10,border:`1px solid ${T.border}`}}/>
                  <button onClick={()=>setForm(fm=>({...fm,fotos:fm.fotos.filter((_,j)=>j!==i)}))}
                    style={{position:"absolute",top:-6,right:-6,width:20,height:20,borderRadius:"50%",
                      background:"#EF4444",border:"none",color:"#fff",fontSize:11,
                      cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>
                    ✕
                  </button>
                </div>
              ))}
              <div onClick={()=>fotoRef.current.click()}
                style={{width:80,height:80,borderRadius:10,border:`2px dashed ${T.border}`,
                  display:"flex",alignItems:"center",justifyContent:"center",
                  cursor:"pointer",fontSize:24,color:T.muted,background:T.bg}}>
                +
              </div>
            </div>
          )}
          {(form.fotos||[]).length===0&&(
            <div onClick={()=>fotoRef.current.click()}
              style={{border:`2px dashed ${T.border}`,borderRadius:10,padding:"16px",
                textAlign:"center",cursor:"pointer",background:T.bg,marginBottom:12}}>
              <span style={{fontSize:28,display:"block",marginBottom:4}}>📷</span>
              <p style={{margin:0,fontSize:12,color:T.muted,fontWeight:600}}>
                Toca para añadir fotos
              </p>
              <p style={{margin:"2px 0 0",fontSize:10,color:T.muted}}>
                Puedes seleccionar varias
              </p>
            </div>
          )}
          <input ref={fotoRef} type="file" accept="image/*" multiple style={{display:"none"}}
            onChange={addFoto}/>

          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>{setShow(false);setForm({tipo:"",prioridad:"media",descripcion:"",fotos:[]}); }}
              style={{flex:1,padding:"11px",borderRadius:10,border:`1px solid ${T.border}`,
                background:"#fff",color:T.muted,fontWeight:600,fontSize:13,cursor:"pointer"}}>
              Cancelar
            </button>
            <button onClick={()=>{
              if(!form.tipo||!form.descripcion.trim()) return;
              onAdd(form);
              setForm({tipo:"",prioridad:"media",descripcion:"",fotos:[]});
              setShow(false);
            }} disabled={!form.tipo||!form.descripcion.trim()}
              style={{flex:2,padding:"11px",borderRadius:10,border:"none",
                background:form.tipo&&form.descripcion.trim()?T.red:"#CBD5E1",
                color:"#fff",fontWeight:700,fontSize:13,
                cursor:form.tipo&&form.descripcion.trim()?"pointer":"default"}}>
              🚨 Registrar incidencia
            </button>
          </div>
        </div>
      )}

      {!show&&(
        <button onClick={()=>setShow(true)}
          style={{width:"100%",padding:"13px",borderRadius:12,marginTop:8,
            border:`2px dashed ${T.red}66`,background:"#FFF1F2",
            color:T.red,fontWeight:700,fontSize:13,cursor:"pointer"}}>
          + Registrar incidencia
        </button>
      )}
    </div>
  );
}

function HistorialTab({visitas,muestras,estrategia,incidencias=[],resultados}){
  const hayDatos=visitas.length>0||muestras.length>0||estrategia||incidencias.length>0;
  if(!hayDatos){
    return(
      <div style={{textAlign:"center",padding:"40px 16px",color:T.muted}}>
        <p style={{fontSize:32,margin:"0 0 8px"}}>📂</p>
        <p style={{margin:0,fontSize:14}}>Sin historial registrado</p>
        <p style={{margin:"4px 0 0",fontSize:12}}>Las visitas, muestras y estrategias aparecerán aquí</p>
      </div>
    );
  }
  return(
    <div>
      {visitas.length>0&&(
        <div style={{marginBottom:20}}>
          <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
            👋 Visitas ({visitas.length})
          </p>
          {[...visitas].reverse().map((v,i)=>{
            const r=resultados.find(x=>x.k===v.resultado);
            return(
              <div key={i} style={{background:"#fff",borderRadius:12,padding:"12px 14px",
                marginBottom:8,border:`1px solid ${T.border}`,
                borderLeft:`4px solid ${r?r.color:T.border}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                  {r&&<Badge label={r.label} color={r.color}/>}
                  <span style={{fontSize:10,color:T.muted}}>{v.fecha}</span>
                </div>
                {v.nota&&<p style={{margin:0,fontSize:12,color:T.text,lineHeight:1.5}}>{v.nota}</p>}
              </div>
            );
          })}
        </div>
      )}
      {muestras.length>0&&(
        <div style={{marginBottom:20}}>
          <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
            📦 Muestras ({muestras.length})
          </p>
          {muestras.map((m,i)=>(
            <div key={i} style={{background:"#fff",borderRadius:12,padding:"12px 14px",
              marginBottom:8,border:`1px solid ${T.border}`}}>
              {m.prodCodigo&&<p style={{margin:0,fontSize:10,color:T.purple,fontWeight:700,fontFamily:"monospace"}}>{m.prodCodigo}</p>}
              <p style={{margin:0,fontSize:13,fontWeight:700}}>{m.prodNombre}</p>
              <p style={{margin:"2px 0 0",fontSize:11,color:T.muted}}>{m.tipo} · {m.cantidad} uds · {m.fecha}</p>
            </div>
          ))}
        </div>
      )}
      {estrategia&&(
        <div>
          <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
            🎯 Estrategia solicitada
          </p>
          <div style={{background:"#fff",borderRadius:12,padding:"12px 14px",
            border:`1px solid ${T.border}`,borderLeft:`4px solid ${T.amber}`}}>
            <Badge label={estrategia.tipo==="recuperacion"?"🔄 Recuperación":"🌱 Nuevo"} color={T.amber}/>
            <p style={{margin:"6px 0 2px",fontSize:13,fontWeight:700}}>{estrategia.texto}</p>
            {estrategia.objetivo&&<p style={{margin:0,fontSize:11,color:T.muted}}>🎯 {estrategia.objetivo}</p>}
          </div>
        </div>
      )}
      {incidencias.length>0&&(
        <div style={{marginTop:estrategia?16:0}}>
          <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
            🚨 Incidencias ({incidencias.length})
          </p>
          {incidencias.map((inc,i)=>{
            const col=inc.estado==="cerrada"?T.muted:T.red;
            return(
              <div key={i} style={{background:"#fff",borderRadius:12,padding:"11px 14px",
                marginBottom:6,border:`1px solid ${T.border}`,
                borderLeft:`4px solid ${col}`,opacity:inc.estado==="cerrada"?.6:1}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <div style={{display:"flex",gap:6}}>
                    <Badge label={inc.tipo||"otro"} color={col}/>
                    <Badge label={inc.prioridad||"media"} color={col}/>
                  </div>
                  <span style={{fontSize:10,color:T.muted}}>{inc.fecha}</span>
                </div>
                <p style={{margin:0,fontSize:12,color:T.text,lineHeight:1.5}}>{inc.descripcion}</p>
                {inc.estado==="cerrada"&&<p style={{margin:"4px 0 0",fontSize:10,color:T.green,fontWeight:700}}>✅ Resuelta</p>}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}


// ─── APP PRINCIPAL ────────────────────────────────────────────────

// INFORME SEMANAL DEL JEFE — Resumen ejecutivo agregado
// ═══════════════════════════════════════════════════════════════════
function InformeJefe({usuario, oportunidadesDB}){
  const [semana,setSemana]=useState(()=>{
    const now=new Date();
    const start=new Date(now.getFullYear(),0,1);
    const d=Math.floor((now-start)/86400000);
    return Math.ceil((d+start.getDay()+1)/7);
  });
  const [informes,setInformes]=useState([]);
  const [visitas,setVisitas]=useState([]);
  const [muestras,setMuestras]=useState([]);
  const [tareas,setTareas]=useState([]);
  const [proyectos,setProyectos]=useState([]);
  const [incidencias,setIncidencias]=useState([]);
  const [cargando,setCargando]=useState(true);
  const [expandido,setExpandido]=useState({});

  const esDir=["director","ceo"].includes(usuario.rol);
  const miEquipo=usuario.equipo;
  const agentesVis=USUARIOS.filter(u=>u.rol==="agente"&&(esDir||u.equipo===miEquipo));

  React.useEffect(()=>{
    Promise.all([
      fbLeer("informes").catch(()=>[]),
      fbLeer("visitas").catch(()=>[]),
      fbLeer("muestras").catch(()=>[]),
      fbLeer("tareas").catch(()=>[]),
      fbLeer("proyectos").catch(()=>[]),
      fbLeer("incidencias").catch(()=>[]),
    ]).then(([inf,vis,mue,tar,pro,inc])=>{
      setInformes(inf||[]);
      setVisitas(vis||[]);
      setMuestras(mue||[]);
      setTareas(tar||[]);
      setProyectos(pro||[]);
      setIncidencias(inc||[]);
      setCargando(false);
    });
  },[]);

  // Filtrar solo datos del equipo
  const pertenece=(item)=>{
    const aid=item.agente||item.agenteId||item.agenteNombre||"";
    if(esDir) return true;
    return agentesVis.some(a=>
      a.id===aid||a.nombre===aid||
      (a.grupoAgente&&a.grupoAgente.toLowerCase()===String(aid).toLowerCase())
    );
  };

  const infsSem=informes.filter(i=>Number(i.semana)===semana&&pertenece(i));
  const visSem=visitas.filter(v=>pertenece(v));
  const muesSem=muestras.filter(m=>pertenece(m));
  const tareasSem=tareas.filter(t=>!t.eliminada&&pertenece(t));
  const opsSem=(oportunidadesDB||OPORTUNIDADES_SEED).filter(o=>{
    const ag=USUARIOS.find(u=>u.id===(o.agente||o.agenteId));
    if(esDir) return true;
    return ag?.equipo===miEquipo;
  });

  // ── 1. VENTAS ──
  const totVentas=infsSem.reduce((s,i)=>s+(Number(i.ventas)||Number(i.venta)||0),0);
  const porEquipo=["WIKUK","INTERKEY"].map(eq=>{
    const agEq=agentesVis.filter(a=>a.equipo===eq);
    const vEq=infsSem.filter(i=>agEq.some(a=>a.id===(i.agente||i.agenteId))).reduce((s,i)=>s+(Number(i.ventas)||Number(i.venta)||0),0);
    return {eq,ventas:vEq,n:agEq.length};
  });

  // ── 2. DETALLES POR VENDEDOR ──
  const porVendedor=agentesVis.map(a=>{
    const infsA=infsSem.filter(i=>i.agente===a.id||i.agenteId===a.id);
    const visA=visSem.filter(v=>v.agente===a.id||v.agenteId===a.id);
    const muesA=muesSem.filter(m=>m.agente===a.id);
    const opsA=opsSem.filter(o=>o.agente===a.id||o.agenteId===a.id);
    const vRaw=infsA.reduce((s,i)=>s+(Number(i.ventas)||Number(i.venta)||0),0);
    return {agente:a,visitas:visA.length,muestras:muesA.length,ventas:vRaw,ops:opsA.length};
  }).filter(v=>v.visitas>0||v.ventas>0||v.muestras>0);

  // ── 3. FERIAS / EVENTOS ──
  const ferias=visSem.filter(v=>v.tipo==="feria"||v.tipo==="evento"||v.tipo==="reunion");

  // ── 4. MUESTRAS ──
  const muestEnviadas=muesSem.filter(m=>m.estado==="enviada"||m.estado==="en_curso");
  const muestCerradas=muesSem.filter(m=>m.estado==="cerrada"||m.estado==="pedido"||m.resultado==="pedido");

  // ── 5. PROYECTOS ──
  const proyCerrados=proyectos.filter(p=>p.estado==="cerrado_exito"||p.estado==="cerrado_perdido");
  const proyConHitos=proyectos.filter(p=>p.estado==="activo"&&(p.hitos||[]).length>0);
  const hitosSemana=proyConHitos.flatMap(p=>(p.hitos||[]).map(h=>({...h,proyecto:p.nombre,proyectoId:p.id}))).filter(h=>h.hecho||h.fecha);

  // ── 6. OPORTUNIDADES ──
  const opsAbi=opsSem.filter(o=>!["cerrada_ganada","cerrada_perdida","ganada","perdida"].some(e=>o.etapa===e||o.estado===e));
  const opsGan=opsSem.filter(o=>o.etapa==="cerrada_ganada"||o.estado==="ganada");
  const opsPer=opsSem.filter(o=>o.etapa==="cerrada_perdida"||o.estado==="perdida");
  const valPipeline=opsAbi.reduce((s,o)=>s+(Number(o.valor)||0),0);

  // ── 7. TAREAS ──
  const tareasPend=tareasSem.filter(t=>t.estado==="pendiente");
  const tareasHechas=tareasSem.filter(t=>t.estado==="hecha");
  const tareasUrg=tareasPend.filter(t=>t.prioridad==="urgente");

  const Seccion=({id,icon,titulo,kpi,color,children})=>{
    const abierto=expandido[id]!==false;
    return(
      <div style={{background:"#fff",borderRadius:14,marginBottom:10,
        border:`1px solid ${T.border}`,overflow:"hidden"}}>
        <div onClick={()=>setExpandido(e=>({...e,[id]:!abierto}))}
          style={{padding:"14px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:10,
            borderLeft:`4px solid ${color||T.navy}`}}>
          <span style={{fontSize:22}}>{icon}</span>
          <div style={{flex:1}}>
            <p style={{margin:0,fontSize:14,fontWeight:800,color:T.text}}>{titulo}</p>
            {kpi&&<p style={{margin:"2px 0 0",fontSize:12,color:color||T.navy,fontWeight:700}}>{kpi}</p>}
          </div>
          <span style={{color:T.muted,fontSize:16,
            transform:abierto?"rotate(90deg)":"rotate(0deg)",transition:"transform .2s"}}>›</span>
        </div>
        {abierto&&(
          <div style={{padding:"0 16px 16px",borderTop:`1px solid ${T.border}`}}>
            {children}
          </div>
        )}
      </div>
    );
  };

  if(cargando) return <div style={{padding:40,textAlign:"center",color:T.muted}}>⏳ Cargando informe…</div>;

  return(
    <div style={{padding:"16px 16px 100px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div>
          <p style={{margin:0,fontSize:20,fontWeight:900,color:T.text}}>📊 Informe semanal</p>
          <p style={{margin:"2px 0 0",fontSize:11,color:T.muted}}>
            {esDir?"Todos los equipos":`Equipo ${miEquipo}`}
          </p>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <button onClick={()=>setSemana(s=>s-1)} style={{padding:"6px 12px",borderRadius:8,border:`1px solid ${T.border}`,background:"#fff",cursor:"pointer",fontSize:14}}>‹</button>
          <span style={{fontSize:13,fontWeight:700,color:T.text,minWidth:80,textAlign:"center"}}>Semana {semana}</span>
          <button onClick={()=>setSemana(s=>s+1)} style={{padding:"6px 12px",borderRadius:8,border:`1px solid ${T.border}`,background:"#fff",cursor:"pointer",fontSize:14}}>›</button>
        </div>
      </div>

      {/* ── 1. VENTAS ── */}
      <Seccion id="ventas" icon="💰" titulo="Ventas de la semana"
        kpi={fmt(totVentas)+"€  ·  "+infsSem.length+" informes"} color={T.green}>
        {porEquipo.some(e=>e.ventas>0)?porEquipo.map(e=>(
          <div key={e.eq} style={{padding:"10px 12px",background:"#F8FAFC",borderRadius:10,marginBottom:8,
            display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <p style={{margin:0,fontSize:13,fontWeight:700,color:e.eq==="WIKUK"?T.green:T.amber}}>{e.eq}</p>
              <p style={{margin:0,fontSize:10,color:T.muted}}>{e.n} comerciales</p>
            </div>
            <p style={{margin:0,fontSize:16,fontWeight:900,color:T.text}}>{fmt(e.ventas)}€</p>
          </div>
        )):<p style={{margin:"12px 0",fontSize:12,color:T.muted,textAlign:"center"}}>Sin informes enviados esta semana</p>}
      </Seccion>

      {/* ── 2. DETALLES POR VENDEDOR ── */}
      <Seccion id="vendedores" icon="👥" titulo="Detalle por vendedor"
        kpi={porVendedor.length+" con actividad"} color={T.blue}>
        {porVendedor.length>0?porVendedor.map(v=>(
          <div key={v.agente.id} style={{padding:"10px 12px",background:"#F8FAFC",borderRadius:10,marginBottom:8}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
              <span style={{fontSize:18}}>{v.agente.icon}</span>
              <div style={{flex:1}}>
                <p style={{margin:0,fontSize:13,fontWeight:700,color:T.text}}>{v.agente.nombre}</p>
                <p style={{margin:0,fontSize:10,color:T.muted}}>{v.agente.equipo}</p>
              </div>
              <p style={{margin:0,fontSize:15,fontWeight:900,color:T.green}}>{fmt(v.ventas)}€</p>
            </div>
            <div style={{display:"flex",gap:4,fontSize:10}}>
              <span style={{flex:1,padding:"3px 6px",background:"#EFF6FF",color:T.blue,borderRadius:5,textAlign:"center",fontWeight:700}}>👁 {v.visitas} vis</span>
              <span style={{flex:1,padding:"3px 6px",background:"#F5F3FF",color:T.purple,borderRadius:5,textAlign:"center",fontWeight:700}}>📦 {v.muestras} mu</span>
              <span style={{flex:1,padding:"3px 6px",background:"#F0F9FF",color:"#0EA5E9",borderRadius:5,textAlign:"center",fontWeight:700}}>💼 {v.ops} ops</span>
            </div>
          </div>
        )):<p style={{margin:"12px 0",fontSize:12,color:T.muted,textAlign:"center"}}>Sin actividad registrada</p>}
      </Seccion>

      {/* ── 3. FERIAS / EVENTOS ── */}
      <Seccion id="ferias" icon="🏛" titulo="Ferias, eventos y reuniones"
        kpi={ferias.length+" este período"} color={T.amber}>
        {ferias.length>0?ferias.slice(0,10).map((f,i)=>(
          <div key={i} style={{padding:"8px 12px",borderLeft:`3px solid ${T.amber}`,background:"#FFFBEB",
            borderRadius:"0 8px 8px 0",marginBottom:6}}>
            <p style={{margin:"0 0 2px",fontSize:12,fontWeight:700,color:T.text}}>
              {f.tipo==="feria"?"🏛":f.tipo==="evento"?"🎟":"💼"} {f.clienteNombre||f.titulo||"—"}
            </p>
            <p style={{margin:0,fontSize:11,color:T.muted}}>{f.fecha||f.creadaEn} · {f.agenteNombre||""}</p>
            {f.notas&&<p style={{margin:"4px 0 0",fontSize:11,color:"#92400E",fontStyle:"italic"}}>{f.notas.slice(0,120)}</p>}
          </div>
        )):<p style={{margin:"12px 0",fontSize:12,color:T.muted,textAlign:"center"}}>Sin ferias ni eventos registrados</p>}
      </Seccion>

      {/* ── 4. MUESTRAS ── */}
      <Seccion id="muestras" icon="📦" titulo="Muestras"
        kpi={muestEnviadas.length+" enviadas · "+muestCerradas.length+" cerradas"} color={T.purple}>
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          <div style={{flex:1,padding:"10px",background:"#F5F3FF",borderRadius:10,textAlign:"center"}}>
            <p style={{margin:0,fontSize:22,fontWeight:900,color:T.purple}}>{muestEnviadas.length}</p>
            <p style={{margin:0,fontSize:10,color:T.muted}}>Enviadas</p>
          </div>
          <div style={{flex:1,padding:"10px",background:"#F0FDF4",borderRadius:10,textAlign:"center"}}>
            <p style={{margin:0,fontSize:22,fontWeight:900,color:T.green}}>{muestCerradas.length}</p>
            <p style={{margin:0,fontSize:10,color:T.muted}}>Con pedido</p>
          </div>
        </div>
        {muesSem.slice(0,5).map((m,i)=>(
          <div key={i} style={{padding:"7px 10px",background:"#F8FAFC",borderRadius:8,marginBottom:5,fontSize:11}}>
            <span style={{fontWeight:700,color:T.text}}>{m.clienteNombre||m.cliente||"—"}</span>
            <span style={{color:T.muted}}> · {m.producto||"—"} · </span>
            <span style={{color:m.estado==="cerrada"?T.green:T.amber,fontWeight:700}}>{m.estado||"pendiente"}</span>
          </div>
        ))}
      </Seccion>

      {/* ── 5. PROYECTOS ── */}
      <Seccion id="proyectos" icon="📁" titulo="Proyectos"
        kpi={proyConHitos.length+" activos · "+proyCerrados.length+" cerrados"} color={T.purple}>
        {proyConHitos.length>0&&(
          <div style={{marginBottom:10}}>
            <p style={{margin:"0 0 6px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Hitos activos</p>
            {proyConHitos.slice(0,5).map(p=>{
              const hechos=(p.hitos||[]).filter(h=>h.hecho).length;
              const tot=(p.hitos||[]).length;
              const proxHito=(p.hitos||[]).find(h=>!h.hecho);
              return(
                <div key={p.id} style={{padding:"8px 10px",background:"#F8FAFC",borderRadius:8,marginBottom:6}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{fontSize:12,fontWeight:700,color:T.text}}>{p.nombre}</span>
                    <span style={{fontSize:11,color:T.green,fontWeight:700}}>{hechos}/{tot}</span>
                  </div>
                  {proxHito&&<p style={{margin:0,fontSize:10,color:T.amber}}>⏳ {proxHito.nombre}{proxHito.fecha?` (${proxHito.fecha})`:""}</p>}
                </div>
              );
            })}
          </div>
