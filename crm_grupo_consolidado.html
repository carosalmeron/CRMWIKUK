// ── Normalizar cliente desde Firebase (distintos esquemas de campo) ──
// Soporta campos en MAYÚSCULAS, minúsculas o camelCase
function normCliente(c){
  if(!c) return c;
  var n=c.NOMBRE||c.nombre||c.name||c.razonSocial||c.RAZON_SOCIAL||c.cliente||'';
  var id=c.id||c.ID||c.CODIGO||c.codigo||c.code||c.COD_CLIENTE||n;
  var tel=c.TEL||c.tel||c.TELEFONO||c.telefono||c.phone||c.PHONE||'';
  var dir=c.DIR||c.dir||c.DIRECCION||c.direccion||c.address||c.ADDRESS||c.LOCALIDAD||c.localidad||'';
  // Firebase usa "semanas" (array) o "semana" (número) como campo de ruta
  var semanaRaw=c.semana||c.SEMANA||(Array.isArray(c.semanas)&&c.semanas.length>0?c.semanas[0]:null)||c.ruta||c.RUTA||0;
  var ruta=Number(semanaRaw)||0;
  var agente=c.AGENTE||c.agente||c.VENDEDOR||c.vendedor||c.agenteId||'';
  return Object.assign({},c,{
    id:String(id), nombre:n, tel:tel, dir:dir,
    ruta:Number(ruta)||0, agente:agente,
    _raw:c
  });
}

// ─── ESTADO GLOBAL COMPARTIDO (persiste entre logins en la misma sesión) ──────
// Todos los componentes leen/escriben aquí → los cambios de CEO llegan al jefe
// sin necesidad de Firebase
let _estrategiasGlobal = [...ESTRATEGIAS_SEED];
let _listeners = [];

const GlobalStore = {
  getEstrategias: () => _estrategiasGlobal,
  setEstrategias: (data) => {
    _estrategiasGlobal = data;
    _listeners.forEach(fn => fn(data));
  },
  updateEstrategia: (id, updater) => {
    _estrategiasGlobal = _estrategiasGlobal.map(e => e.id === id ? updater(e) : e);
    _listeners.forEach(fn => fn(_estrategiasGlobal));
  },
  subscribe: (fn) => {
    _listeners.push(fn);
    return () => { _listeners = _listeners.filter(f => f !== fn); };
  },
};

function EstrategiaAprobacionCard({e,usuario,onConfirmar,onRechazar,onEscalar}){
  const ag=USUARIOS.find(u=>u.id===e.agente);
  const director=USUARIOS.find(u=>u.rol==="director");
  const ceo=USUARIOS.find(u=>u.rol==="ceo");
  const ofertas=e.ofertas||[];

  const [dec,setDec]=useState({});       // {oid: "si"|"no"|"subir"}
  const [precios,setPrecios]=useState({}); // {oid: precio}
  const [destinos,setDestinos]=useState({});
  const [notaFinal,setNotaFinal]=useState("");
  const [hecho,setHecho]=useState(false);

  const DEST=usuario.rol==="jefe"&&director?[{id:director.id,nombre:director.nombre,icon:director.icon}]
    :usuario.rol==="director"&&ceo?[{id:ceo.id,nombre:ceo.nombre,icon:ceo.icon}]:[];

  const n=ofertas.length;
  const n_ok=Object.values(dec).filter(Boolean).length;
  const listas=n===0||n_ok===n;

  const confirmar=()=>{
    const ofAct=ofertas.map(o=>{
      const oid=o.id||o.nombre;
      const d=dec[oid];
      if(d==="si")    return {...o,aprobada:true,aprobadaPor:usuario.nombre};
      if(d==="precio") return {...o,aprobada:true,precioFinal:precios[oid]||o.precioFinal,
        precioOriginal:o.precioFinal,modificada:true,aprobadaPor:usuario.nombre};
      if(d==="no")    return {...o,aprobada:false,rechazadaPor:usuario.nombre};
      if(d==="subir") return {...o,aprobada:null,elevadaA:destinos[oid],elevadaPor:usuario.nombre};
      return o;
    });
    setHecho(true);
    onConfirmar(e,ofAct,notaFinal);
  };

  if(hecho) return(
    React.createElement('div', { style: {background:T.greenL,borderRadius:14,padding:"14px 16px",marginBottom:10,
      border:`1.5px solid ${T.green}`,display:"flex",gap:12,alignItems:"center"},}

        , React.createElement('p', { style: {margin:"2px 0 0",fontSize:12,color:T.green},}, e.cliente||e.clienteNombre)
      )
    )
  );

  return(
    React.createElement('div', { style: {background:"#fff",borderRadius:16,marginBottom:14,overflow:"hidden",
      border:`2px solid ${T.amber}`},}

      /* Cabecera */

async function subirFoto(base64, ruta){

// Subir múltiples fotos y devolver URLs
async function subirFotos(fotos=[], carpeta="general"){
  if(!fotos||fotos.length===0) return [];
  const urls=await Promise.all(
    fotos.map(async (f,i)=>{
      if(f.startsWith("https://")) return f; // ya es URL, no resubir
      const ext=f.includes("png")?"png":"jpg";
      const nombre=`${carpeta}/${Date.now()}_${i}.${ext}`;
      const url=await subirFoto(f,nombre);
      return url||f; // si falla, mantiene base64
    })
  );
  return urls;
}

// ── Serializar a formato Firestore ────────────────────────────────
function serializeToFirestore(datos){
  const fields={};
  const serialize=(v)=>{
    if(v===null||v===undefined) return {nullValue:null};
    if(typeof v==="boolean") return {booleanValue:v};
    if(typeof v==="number") return {doubleValue:v};
    if(typeof v==="string"){
      // Truncar strings muy largos (base64 imágenes) para no superar 1MB
      if(v.startsWith("data:image")&&v.length>5000) return {stringValue:"[imagen]"};
      return {stringValue:v};
    }
    if(Array.isArray(v)) return {arrayValue:{values:v.map(x=>serialize(x))}};
    if(typeof v==="object") return {mapValue:{fields:Object.fromEntries(
      Object.entries(v).map(([k,val])=>[k,serialize(val)])
    )}};
    return {stringValue:String(v)};
  };
  Object.entries(datos).forEach(([k,v])=>{ fields[k]=serialize(v); });
  return {fields};
}

// Comprime imagen base64 para no superar el límite de Firestore (1MB/doc)
async function comprimirImagen(base64, maxWidth=600, quality=0.65) {
  return new Promise(res=>{
    try {
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const ratio=Math.min(1, maxWidth/img.width);
        canvas.width=img.width*ratio; canvas.height=img.height*ratio;
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        res(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror=()=>res(base64);
      img.src=base64;
    } catch(e){ res(base64); }
  });
}

function App(props){
  const [usuario,setUsuario]=useState(function(){
    // Auto-login desde portal: initializar directamente sin useEffect
    return (props&&props._autoLogin)?props._autoLogin:null;
  });
  const [section,setSection]=useState("dashboard");
  const [adminOpen,setAdminOpen]=useState(false);

  // Actividad diaria compartida entre GestorClientes e Informe
  const [actividadSemana,setActividadSemana]=useState({});
  const onActividad=(cid,data)=>setActividadSemana(a=>({...a,[cid]:data}));

  // ── Datos desde Firebase ──────────────────────────────────────────
  const [muestrasDB,setMuestrasDB]=useState(MUESTRAS_SEED);
  const [estrategiasDB,setEstrategiasDB]=useState(ESTRATEGIAS_SEED);
  const [incidenciasDB,setIncidenciasDB]=useState(INCIDENCIAS_SEED);
  const [fbCargando,setFbCargando]=useState(false);
  const [fbStatus,setFbStatus]=useState(""); // "ok" | "error" | ""
  const [oportunidadesDB,setOportunidadesDB]=useState(OPORTUNIDADES_SEED);
  const [clientesDB,setClientesDB]=useState(null); // null = aún no cargado

  // Cargar clientes del usuario — query específica por grupoAgente (mucho más rápido)
  useEffect(()=>{
    if(!usuario) return;
    // Obtener el vendedor del usuario desde el hash de la URL o localStorage
    let miVendedor=null;
    try{
      const hash=decodeURIComponent(window.location.hash.replace('#',''));
      if(hash.includes('|')) miVendedor=hash.split('|')[1];
    }catch(e){}
    if(!miVendedor){
      try{
        const pu=JSON.parse(localStorage.getItem('gc_portal_user')||'{}');
        miVendedor=pu.catalogoVendedor||null;
      }catch(e){}
    }

    if(miVendedor){
      // Query directa solo para este vendedor — evita cargar 6000+ docs
      fbQueryGrupoAgente(miVendedor).then(clientes=>{
        const activos=clientes.filter(c=>c.activo!==false);

// ── Montar la app ──────────────────────────────────────────────────

(function(){
  // Buscar usuario del portal por 3 vías:
  // 1. URL hash: crm_grupo_consolidado.html#wk1
  // 2. localStorage gc_portal_user (compartido entre parent e iframe mismo dominio)
  // 3. postMessage del portal

  function buildUserFromPortal(pu){
    // Construir usuario CRM desde datos del portal
    if(!pu) return null;
    var crmId=pu.crmId||pu.id||pu.username;
    if(!crmId) return null;
    // Primero buscar en USUARIOS fijos — pero enriquecer con datos del portal
    var fixed=USUARIOS.find(function(u){return u.id===crmId;});
    if(fixed){
      // Añadir catalogoVendedor y username del portal (importantes para Firebase KPI)
      return Object.assign({},fixed,{
        catalogoVendedor: pu.catalogoVendedor||fixed.catalogoVendedor||null,
        username: pu.username||pu.id||null
      });
    }
    // Crear usuario dinámico
    var rol=pu.rol||'agente';
    if(rol==='crm_director'||rol==='director') rol='director';
    else if(rol==='crm_jefe'||rol==='jefe') rol='jefe';
    else rol='agente';
    return {
      id: crmId,
      nombre: pu.nombre||pu.username||crmId,
      rol: rol,
      equipo: pu.equipo||null,
      color: pu.color||'#64748B',
      icon: '🧑‍💼',
      catalogoVendedor: pu.catalogoVendedor||null,
      username: pu.username||null
    };
  }

  function getAutoUser(){
    // Prioridad 1: localStorage del portal (más fiable — tiene todos los datos)
    try{
      var stored=localStorage.getItem('gc_portal_user');
      if(stored){
        var pu=JSON.parse(stored);
        var u=buildUserFromPortal(pu);
        if(u) return u;
      }
    }catch(e){}

    // Prioridad 2: URL hash — formato #crmId o #crmId|vendedor
    try{
      var hash=window.location.hash.replace('#','');
      if(hash){
        var decoded=decodeURIComponent(hash);
        var parts=decoded.split('|');
        var crmId=parts[0].trim();
        var vendHash=parts[1]||null;
        if(crmId){
          var found=USUARIOS.find(function(u){return u.id===crmId;});
          if(found) return found;
          // Usuario dinámico (no está en lista fija): crear con rol agente
          return {id:crmId,nombre:crmId,rol:'agente',equipo:null,color:'#64748B',icon:'🧑‍💼',catalogoVendedor:vendHash||null};
        }
      }
    }catch(e){}

    return null;
  }

  var autoUser=getAutoUser();
  ReactDOM.render(React.createElement(App,{_autoLogin:autoUser||null}), document.getElementById('root'));

  // Vía 3: postMessage (por si las otras fallan — el portal lo envía al cargar)
  // Usa window.__crmSetUsuario registrado por App para actualizar el estado React correctamente
  window.addEventListener('message',function(e){
    if(e.data&&e.data.type==='PORTAL_USER'){
      var pu=e.data.user;
      var crmUser=buildUserFromPortal(pu);
      if(crmUser){
        if(window.__crmSetUsuario){
          // Si App ya está montada, actualizar su estado directamente
          window.__crmSetUsuario(crmUser);
        } else {
          // Si App aún no registró el setter, re-renderizar (primer montaje)
          ReactDOM.render(React.createElement(App,{_autoLogin:crmUser}), document.getElementById('root'));
        }
      }
    }
  });
})();

</script>
