// ═══════════════════════════════════════════════════════════════════════════
// Carga de objetivos/presupuesto/monetización desde Firebase.
// - Intenta 3 colecciones candidatas (objetivos, presupuesto, monetizacion)
// - Mapea el campo COMERCIAL (nombre en xlsx) al id CRM usando USUARIOS.grupoAgente
// - Muta AGENTES_DATA en-place agregando por semana actual, mes actual y año
// - Reporta progreso detallado en consola (window.F12 → Console)
// Devuelve true si actualizó al menos un agente, false si no encontró datos.
// ═══════════════════════════════════════════════════════════════════════════
async function cargarObjetivosFB(){
  const anio = new Date().getFullYear();
  const mesAct = new Date().getMonth(); // 0-11
  const semActual = getSemanaISO();

  // Mes de una semana ISO (aprox, por el lunes de esa semana).
  const mesDeSemana = (sem) => {
    const jan1 = new Date(anio, 0, 1);
    const offset = (sem - 1) * 7 * 86400000;
    return new Date(jan1.getTime() + offset).getMonth();
  };

  // Getter defensivo: busca variantes del nombre del campo y devuelve número (0 si no existe).
  const num = (doc, ...variants) => {
    for (const v of variants) {
      const raw = doc[v];
      if (raw === undefined || raw === null || raw === '') continue;
      const n = typeof raw === 'number' ? raw : parseFloat(String(raw).replace(/[^0-9.\-]/g,''));
      if (!isNaN(n)) return n;
    }
    return 0;
  };

  // Mapear un doc de agentes_kpi o presupuesto/monetizacion al agente de AGENTES_DATA.
  // Matchea por crmId (preferido), luego por campo agente, luego por nombre.
  const findAgente = (doc) => {
    for (const ag of AGENTES_DATA) {
      if (doc.crmId && doc.crmId === ag.id) return ag;
      const usr = USUARIOS.find(u => u.id === ag.id);
      const grp = (usr?.grupoAgente || '').toUpperCase();
      if (doc.agente && String(doc.agente).toUpperCase() === grp) return ag;
      if (doc.agente && String(doc.agente).toLowerCase() === ag.id) return ag;
      if (doc.nombre && String(doc.nombre).toLowerCase() === String(ag.nombre||'').toLowerCase()) return ag;
    }
    return null;
  };

  let agentesActualizados = 0;

  // ══ PASO 1: agentes_kpi → totales anuales (2 docs, instantáneo) ══
  try {
    const kpis = await fbLeerTodos('agentes_kpi');
    console.log(`[OBJETIVOS] agentes_kpi: ${kpis.length} docs`);
    for (const kpi of kpis) {
      const ag = findAgente(kpi);
      if (!ag) { console.log(`[OBJETIVOS] agentes_kpi doc sin match: agente=${kpi.agente}, nombre=${kpi.nombre}`); continue; }

      // Totales anuales (ya pre-agregados)
      ag.vAnual      = num(kpi, 'ventasRealAcum');
      ag.oAnual      = num(kpi, 'ventasPptoAcum');
      ag.promoAnual  = num(kpi, 'promoRealAcum');
      ag.oPromoAnual = num(kpi, 'promoObjAcum');
      ag.liqAnual    = num(kpi, 'liquidRealAcum');
      ag.oLiqAnual   = num(kpi, 'liquidObjAcum');
      const mgM = num(kpi, 'mgMedio');
      const mgO = num(kpi, 'mgObjetivo');
      ag.mb  = (mgM > 0 && mgM < 1) ? +(mgM * 100).toFixed(1) : mgM;
      ag.oMb = (mgO > 0 && mgO < 1) ? +(mgO * 100).toFixed(1) : mgO;

      agentesActualizados++;
      console.log(`[OBJETIVOS] ✓ KPI ${ag.nombre} (${ag.id}): año=${ag.vAnual}€/obj ${ag.oAnual}€, promo=${ag.promoAnual}€, liq=${ag.liqAnual}€, MB=${ag.mb}%`);
    }
  } catch(e) { console.warn('[OBJETIVOS] Error leyendo agentes_kpi:', e.message); }

  // ══ PASO 2: presupuesto + monetizacion → datos por semana/mes ══
  const todosLosDocs = [];
  for (const col of ['presupuesto','monetizacion']) {
    try {
      const docs = await fbLeerTodos(col);
      console.log(`[OBJETIVOS] ${col}: ${docs.length} docs`);
      if (docs.length > 0) todosLosDocs.push(...docs);
    } catch(e) { console.warn(`[OBJETIVOS] Error leyendo ${col}:`, e.message); }
  }

  if (todosLosDocs.length > 0) {
    console.log(`[OBJETIVOS] Total presupuesto+monetizacion: ${todosLosDocs.length} docs. Sem actual: ${semActual}, mes: ${mesAct+1}`);

    for (const ag of AGENTES_DATA) {
      const usr = USUARIOS.find(u => u.id === ag.id);
      const grp = (usr?.grupoAgente || '').toUpperCase();

      const docsAg = todosLosDocs.filter(d => {
        const a = num(d,'ano','AÑO','anio');
        if (a !== anio) return false;
        if (d.crmId && d.crmId === ag.id) return true;
        if (d.agente && String(d.agente).toUpperCase() === grp) return true;
        if (d.agente && String(d.agente).toLowerCase() === ag.id) return true;
        return false;
      });

      if (docsAg.length === 0) continue;

      // Semana actual
      const docSem = docsAg.find(d => num(d,'semana','SEMANA') === semActual);
      if (docSem) {
        ag.vSem      = num(docSem,'ventasReal','VENTAS REAL');
        ag.oSem      = num(docSem,'ventasPpto','VENTAS PPTO.','VENTAS PPTO');
        ag.promoSem  = num(docSem,'promoReal','PROMO REAL');
        ag.oPromoSem = num(docSem,'promoObjetivo','PROMO OBJETIVO');
        ag.liqSem    = num(docSem,'liquidReal','LIQUID. REAL','LIQUID REAL');
        ag.oLiqSem   = num(docSem,'liquidObjetivo','LIQUID. OBJETIVO','LIQUID OBJETIVO');
        if (!ag.mb) {
          const mgR = num(docSem,'mgReal','MG REAL');
          const mgP = num(docSem,'mgPpto','MG PPTO');
          ag.mb  = (mgR>0 && mgR<1) ? +(mgR*100).toFixed(1) : mgR;
          ag.oMb = (mgP>0 && mgP<1) ? +(mgP*100).toFixed(1) : mgP;
        }
      }

      // Mes actual (sumar semanas que caen en este mes)
      const docsMes = docsAg.filter(d => mesDeSemana(num(d,'semana','SEMANA')) === mesAct);
      ag.vMes       = docsMes.reduce((s,d)=>s+num(d,'ventasReal','VENTAS REAL'),0);
      ag.oMes       = docsMes.reduce((s,d)=>s+num(d,'ventasPpto','VENTAS PPTO.','VENTAS PPTO'),0);
      ag.promoMes   = docsMes.reduce((s,d)=>s+num(d,'promoReal','PROMO REAL'),0);
      ag.oPromoMes  = docsMes.reduce((s,d)=>s+num(d,'promoObjetivo','PROMO OBJETIVO'),0);
      ag.liqMes     = docsMes.reduce((s,d)=>s+num(d,'liquidReal','LIQUID. REAL','LIQUID REAL'),0);
      ag.oLiqMes    = docsMes.reduce((s,d)=>s+num(d,'liquidObjetivo','LIQUID. OBJETIVO','LIQUID OBJETIVO'),0);

      console.log(`[OBJETIVOS] → ${ag.nombre}: sem ${semActual}=${ag.vSem}€, mes=${ag.vMes}€/obj ${ag.oMes}€`);
    }
  }

  console.log(`[OBJETIVOS] ══ ${agentesActualizados} agentes con KPI anual desde Firebase ══`);
  return agentesActualizados > 0;
}

function App(props){
  const [usuario,setUsuario]=useState(function(){
    // Auto-login desde portal: initializar directamente sin useEffect
    return (props&&props._autoLogin)?props._autoLogin:null;
  });
  const [section,setSection_]=useState("dashboard");
  const prevSectionRef=React.useRef("dashboard");
  const [hideNav,setHideNav]=useState(false);
  const setSection=function(s){prevSectionRef.current=section;setSection_(s);setHideNav(s==="plan_semanal");};
  const [adminOpen,setAdminOpen]=useState(false);
  const [busquedaGlobal,setBusquedaGlobal]=useState(false);
  const [busqTexto,setBusqTexto]=useState("");
  const [clienteDirecto,setClienteDirecto]=useState(null);
  const [notifOpen,setNotifOpen]=useState(false);

  // ── Navegación cruzada entre módulos ──
  const onAbrirCliente=(nombre)=>{
    if(!nombre) return;
    setClienteDirecto({nombre:nombre.toUpperCase(),ts:Date.now()});
    setSection(esAgente?"clientes":"clientes_eq");
  };
  const onIrASeccion=(sec)=>setSection(sec);

  // ── Normalizar ID del usuario al CRM ID real ─────────────────────
  // Si el portal asigna un ID tipo "U_xxx" pero en USUARIOS existe un
  // agente con el mismo grupoAgente, actualiza usuario.id al ID del CRM.
  // Esto hace que TODOS los filtros (===usuario.id) funcionen sin cambios.
  useEffect(()=>{
    if(!usuario||!usuario.grupoAgente) return;
    const match=USUARIOS.find(u=>u.grupoAgente&&u.grupoAgente.toUpperCase()===(usuario.grupoAgente||"").toUpperCase());
    if(match&&match.id!==usuario.id){
      console.log("[AUTH] Normalizando ID:",usuario.id,"→",match.id,"(via grupoAgente:",usuario.grupoAgente+")");
      setUsuario(prev=>({...prev,...match,catalogoVendedor:prev.catalogoVendedor||prev.grupoAgente}));
    }
  },[usuario?.grupoAgente]);

  // ── Tracking de tiempo de uso (optimizado para móvil) ───────────
  useEffect(()=>{
    if(!usuario||!usuario.id) return;
    const sesionId="ses_"+usuario.id+"_"+Date.now();
    const inicio=Date.now();
    const hoy=new Date().toLocaleDateString("es-ES");
    const semana=getSemanaISO();
    let ultimoGuardado=0;

    const guardarSesion=()=>{
      const ahora=Date.now();
      const durMin=Math.round((ahora-inicio)/60000);
      // Evitar escrituras duplicadas en menos de 30 seg
      if(ahora-ultimoGuardado<30000) return;
      ultimoGuardado=ahora;
      fbEscribir("sesiones",sesionId,{
        id:sesionId,agente:usuario.id,agenteNombre:usuario.nombre||usuario.id,
        equipo:usuario.equipo||"",rol:usuario.rol||"",
        fecha:hoy,semana:semana,
        inicio:new Date(inicio).toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"}),
        fin:new Date(ahora).toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"}),
        duracionMin:Math.max(durMin,1),
      });
    };

    // Guardar inmediatamente al entrar (registra la sesión desde el primer momento)
    guardarSesion();

    // Actualizar cada 60 segundos
    const timer=setInterval(guardarSesion,60000);

    // visibilitychange es más fiable en móvil que beforeunload
    const onVisChange=()=>{if(document.visibilityState==="hidden") guardarSesion();};
    document.addEventListener("visibilitychange",onVisChange);

    // beforeunload como backup (funciona en desktop)
    const onUnload=()=>guardarSesion();
    window.addEventListener("beforeunload",onUnload);

    // pagehide es el evento más fiable en iOS Safari
    window.addEventListener("pagehide",onUnload);

    return()=>{
      clearInterval(timer);
      document.removeEventListener("visibilitychange",onVisChange);
      window.removeEventListener("beforeunload",onUnload);
      window.removeEventListener("pagehide",onUnload);
      guardarSesion();
    };
  },[usuario?.id,usuario?.nombre]);

  // Actividad diaria compartida entre GestorClientes e Informe
  const [actividadSemana,setActividadSemana]=useState({});
  const onActividad=(cid,data)=>setActividadSemana(a=>({...a,[cid]:data}));

  // ── Datos desde Firebase ──────────────────────────────────────────
  const [muestrasDB,setMuestrasDB]=useState(MUESTRAS_SEED);
  const [calendarioDB,setCalendarioDB]=useState([]);
  const [estrategiasDB,setEstrategiasDB]=useState(ESTRATEGIAS_SEED);
  const [incidenciasDB,setIncidenciasDB]=useState(INCIDENCIAS_SEED);
  const [fbCargando,setFbCargando]=useState(false);
  const [fbStatus,setFbStatus]=useState(""); // "ok" | "error" | ""
  const [oportunidadesDB,setOportunidadesDB]=useState(OPORTUNIDADES_SEED);
  const [clientesDB,setClientesDB]=useState(null); // null = aún no cargado
  const [objVer,setObjVer]=useState(0); // incrementa al cargar objetivos de Firebase (fuerza re-render de dashboards)
  const [usrVer,setUsrVer]=useState(0); // incrementa al cargar usuarios de Firebase (fuerza re-render Login/listas)

  // Cargar USUARIOS desde Firebase al arrancar — antes del login
  useEffect(()=>{
    cargarUsuariosFB().then(ok=>{
      if(ok) setUsrVer(v=>v+1);
    });
  },[]);

  // Cargar objetivos/presupuesto/monetización al arrancar — una vez por sesión
  useEffect(()=>{
    cargarObjetivosFB().then(ok=>{
      if(ok) setObjVer(v=>v+1);
    });
  },[]);

  // Cargar clientes del usuario — query específica por grupoAgente (mucho más rápido)
  useEffect(()=>{
    if(!usuario) return;
    // Obtener el vendedor del usuario desde el hash de la URL o localStorage
    let miVendedor=null;
    try{
      const hash=decodeURIComponent(window.location.hash.replace('#',''));
      if(hash.includes('|')) miVendedor=hash.split('|')[1];
    }catch(e){}
    if(!miVendedor){
      try{
        const pu=JSON.parse(localStorage.getItem('gc_portal_user')||'{}');
        miVendedor=pu.catalogoVendedor||null;
      }catch(e){}
    }
    // 3rd source: usuario object has grupoAgente or catalogoVendedor directly
    if(!miVendedor){
      miVendedor=usuario.grupoAgente||usuario.catalogoVendedor||null;
    }
    // 4th source: sessionStorage (more privacy-friendly than localStorage)
    if(!miVendedor){
      try{
        const pu=JSON.parse(sessionStorage.getItem('gc_portal_user')||'{}');
        miVendedor=pu.catalogoVendedor||null;
      }catch(e){}
    }
    // 5th fallback: if agente and no miVendedor, try fbLeerTodos filtered by grupoAgente
    if(!miVendedor && usuario.rol==="agente"){
      miVendedor=usuario.id.toUpperCase();
    }

    // Director/CEO: siempre cargan TODOS los clientes (sin filtro por miVendedor)
    if(["director","ceo","jefe"].includes(usuario.rol)){
      fbLeerTodos("clientes").then(clientes=>{
        const activos=clientes.filter(c=>c.activo!==false);
        const porGrupo={};const porAgente={};
        activos.forEach(c=>{
          if(c.grupoAgente){if(!porGrupo[c.grupoAgente])porGrupo[c.grupoAgente]=[];porGrupo[c.grupoAgente].push(c);}
          const ag=c.agente||c.agenteId;if(ag){if(!porAgente[ag])porAgente[ag]=[];porAgente[ag].push(c);}
        });
        console.log("✅ Clientes cargados ("+usuario.rol+"):",activos.length);
        setClientesDB({_porGrupo:porGrupo,_porAgente:porAgente,_todos:activos});
      }).catch(()=>{});
    } else if(miVendedor){
      // Agente: solo sus clientes
      fbQueryGrupoAgente(miVendedor).then(clientes=>{
        const activos=clientes.filter(c=>c.activo!==false);
        const porGrupo={[miVendedor]:activos};
        const porAgente={};
        activos.forEach(c=>{const ag=c.agente||c.agenteId;if(ag){if(!porAgente[ag])porAgente[ag]=[];porAgente[ag].push(c);}});
        console.log("✅ Clientes cargados para",miVendedor,":",activos.length);
        setClientesDB({_porGrupo:porGrupo,_porAgente:porAgente,_todos:activos,_vendedor:miVendedor});
      }).catch(()=>{});
    } else if(false){
      // Director/CEO: carga todos (paginado completo)
      fbLeerTodos("clientes").then(clientes=>{
        const activos=clientes.filter(c=>c.activo!==false);
        const porGrupo={};const porAgente={};
        activos.forEach(c=>{
          if(c.grupoAgente){if(!porGrupo[c.grupoAgente])porGrupo[c.grupoAgente]=[];porGrupo[c.grupoAgente].push(c);}
          const ag=c.agente||c.agenteId;if(ag){if(!porAgente[ag])porAgente[ag]=[];porAgente[ag].push(c);}
        });
        setClientesDB({_porGrupo:porGrupo,_porAgente:porAgente,_todos:activos});
      }).catch(()=>{});
    }
  },[usuario?.id]);

  useEffect(()=>{
    if(!usuario) return;
    setFbCargando(true);
    Promise.all([
      fbLeer("muestras"),
      fbLeer("estrategias"),
      fbLeer("incidencias"),
      fbLeer("visitas"),
      fbCargar(), // oportunidades
    ]).then(([muestras,estrategias,incidencias,visitas,opos])=>{
      if(muestras.length>0) setMuestrasDB(muestras.filter(m=>!m.eliminada));
      // Cargar calendario
      fbLeer("calendario").then(data=>{
        setCalendarioDB(data.filter(e=>!e.eliminado));
      }).catch(()=>{});
      if(estrategias.length>0){
        const filtered=estrategias.filter(e=>!e.eliminada);
        console.log("[ESTRATEGIAS] Cargadas desde Firebase:",filtered.length,"estrategias",filtered.map(e=>({id:e.id,cliente:e.cliente,agente:e.agente,equipo:e.equipo,estado:e.estado})));
        setEstrategiasDB(filtered);
        GlobalStore.setEstrategias(filtered);
      }
      if(incidencias.length>0) setIncidenciasDB(incidencias.filter(i=>!i.eliminada));
      if(opos.length>0){
        const norm=opos.map(o=>({...o,agente:o.agente||o.agenteId,agenteId:o.agenteId||o.agente}));
        const fbIds=new Set(norm.map(o=>o.id));
        setOportunidadesDB([...norm,...OPORTUNIDADES_SEED.filter(o=>!fbIds.has(o.id))]);
      }

      // Reconstruir actividadSemana desde Firebase para el agente actual
      if(usuario?.rol==="agente"){
        const actRec={};
        // Visitas
        visitas.filter(v=>v.agente===usuario.id).forEach(v=>{
          if(!actRec[v.clienteId]) actRec[v.clienteId]={visitas:[],muestras:[],estrategia:null,incidencias:[]};
          actRec[v.clienteId].visitas=[...(actRec[v.clienteId].visitas||[]),v];
        });
        // Muestras
        muestras.filter(m=>m.agente===usuario.id&&!m.eliminada).forEach(m=>{
          if(!actRec[m.clienteId]) actRec[m.clienteId]={visitas:[],muestras:[],estrategia:null,incidencias:[]};
          actRec[m.clienteId].muestras=[...(actRec[m.clienteId].muestras||[]),m];
        });
        // Estrategias
        estrategias.filter(e=>e.agente===usuario.id&&!e.eliminada).forEach(e=>{
          if(!actRec[e.clienteId]) actRec[e.clienteId]={visitas:[],muestras:[],estrategia:null,incidencias:[]};
          actRec[e.clienteId].estrategia=e;
        });
        // Incidencias
        incidencias.filter(i=>i.agente===usuario.id).forEach(i=>{
          if(!actRec[i.clienteId]) actRec[i.clienteId]={visitas:[],muestras:[],estrategia:null,incidencias:[]};
          actRec[i.clienteId].incidencias=[...(actRec[i.clienteId].incidencias||[]),i];
        });
        if(Object.keys(actRec).length>0) setActividadSemana(actRec);
      }

      setFbStatus("ok");
      // Sincronizar cola de escrituras pendientes (modo offline)
      if(colaLeer().length>0) sincronizarCola();
    }).catch(e=>{console.warn("Firebase error:",e);setFbStatus("error");})
    .finally(()=>setFbCargando(false));
  },[usuario?.id]);

  const handleLogin=(u)=>{
    setUsuario(u);
    setSection("dashboard");
    if(u.rol==="admin") setAdminOpen(true);
  };

  // ── Sistema de notificaciones (MUST be before any early return) ──
  const _esAgente=usuario?.rol==="agente";
  const _esJefe=usuario?.rol==="jefe";
  const _miEquipo=usuario?.equipo;
  const _appMisIds=usuario?resolverMisIds(usuario):new Set();
  const notificaciones=useMemo(()=>{
    if(!usuario) return [];
    const notifs=[];
    const hoy=new Date();
    const semActual=Math.ceil(((hoy-new Date(hoy.getFullYear(),0,1))/86400000+new Date(hoy.getFullYear(),0,1).getDay()+1)/7);
    muestrasDB.filter(m=>{
      if(m.estado!=="pendiente") return false;
      if(_esAgente&&!_appMisIds.has((m.agente||"").toUpperCase())) return false;
      if(_esJefe){const ag=USUARIOS.find(u=>u.id===m.agente);if(!ag||ag.equipo!==_miEquipo) return false;}
      const sem=parseInt(m.semana)||0;
      return sem>0&&(semActual-sem)>=2;
    }).forEach(m=>{
      const semanas=semActual-(parseInt(m.semana)||0);
      notifs.push({tipo:"muestra",icon:"📦",color:"#F59E0B",prioridad:semanas>4?3:2,
        titulo:`${m.prod} — ${m.cliente}`,sub:`⏳ ${semanas} semanas sin respuesta`,
        accion:()=>{setNotifOpen(false);setSection("muestras");}});
    });
    incidenciasDB.filter(inc=>{
      if(inc.estado==="cerrada"||inc.estado==="resuelta") return false;
      if(_esAgente&&inc.autor!==usuario.id) return false;
      if(_esJefe&&inc.equipo!==_miEquipo) return false;
      if(!inc.fecha) return true;
      const parts=inc.fecha.split("/");if(parts.length<3) return false;
      const f=new Date(parts[2].length===2?"20"+parts[2]:parts[2],parts[1]-1,parts[0]);
      return (hoy-f)/(1000*60*60*24)>7;
    }).forEach(inc=>{
      notifs.push({tipo:"incidencia",icon:"🚨",color:"#EF4444",prioridad:3,
        titulo:inc.titulo||inc.asunto||"Incidencia",
        sub:`🔴 Abierta — ${inc.tipo||""}${inc.cliente?" · "+inc.cliente:""}`,
        accion:()=>{setNotifOpen(false);setSection("incidencias");}});
    });
    estrategiasDB.filter(e=>{
      if(e.estado==="completada"||e.estado==="cancelada"||e.eliminada) return false;
      if(_esAgente&&!_appMisIds.has((e.agente||e.agenteId||"").toUpperCase())) return false;
      if(_esJefe){const ag=USUARIOS.find(u=>u.id===(e.agente||e.agenteId));if(!ag||ag.equipo!==_miEquipo) return false;}
      return true;
    }).forEach(e=>{
      notifs.push({tipo:"estrategia",icon:"🎯",color:"#22C55E",prioridad:1,
        titulo:e.titulo||e.nombre||"Estrategia",sub:"En curso — requiere seguimiento",
        accion:()=>{setNotifOpen(false);setSection("estrategias");}});
    });
    oportunidadesDB.filter(o=>{
      if(["ganada","perdida","cerrada_ganada","cerrada_perdida"].includes(o.estado||o.etapa)) return false;
      if(_esAgente&&!esDelUsuario(o.agente,_appMisIds)&&!esDelUsuario(o.agenteId,_appMisIds)) return false;
      if(_esJefe){const ag=USUARIOS.find(u=>u.id===(o.agenteId||o.agente));if(!ag||ag.equipo!==_miEquipo) return false;}
      const notas=o.actividad||o.notas||[];
      if(Array.isArray(notas)&&notas.length>0){
        const ult=notas[notas.length-1];
        if(ult.fecha){const p=ult.fecha.split("/");if(p.length>=3){const f=new Date(p[2].length===2?"20"+p[2]:p[2],p[1]-1,p[0]);if((hoy-f)/(1000*60*60*24)<14)return false;}}
      }
      return true;
    }).slice(0,5).forEach(o=>{
      notifs.push({tipo:"oportunidad",icon:"💼",color:"#1E3A5F",prioridad:2,
        titulo:o.nombre||o.cliente||"Oportunidad",sub:"Sin actividad reciente",
        accion:()=>{setNotifOpen(false);setSection("oportunidades");}});
    });
    notifs.sort((a,b)=>b.prioridad-a.prioridad);
    return notifs;
  },[muestrasDB,incidenciasDB,estrategiasDB,oportunidadesDB,usuario?.id]);

  if(!usuario){
    // Si estamos dentro del iframe del portal, volver al Hub en vez de mostrar Login
    if(window.parent!==window){
      try{ window.parent.backToHub(); }catch(e){}
      return <div style={{padding:40,textAlign:"center",color:"#64748B"}}>Volviendo al Hub…</div>;
    }
    return <Login onLogin={handleLogin}/>;
  }

  if(adminOpen) return <PanelAdmin onBack={()=>{setAdminOpen(false);try{window.parent.backToHub();}catch(e){}setUsuario(null);}}/>;

  const esAgente=usuario.rol==="agente";
  const esJefe=usuario.rol==="jefe";
  const esDir=["director","ceo"].includes(usuario.rol);
  const esJefeOmas=esJefe||esDir;
  const miEquipo=usuario.equipo;
  // Firebase usa grupoAgente (= catalogoVendedor del portal, ej: "CARLOSG", "DAVIDMAG")
  const getClientesPara=(agenteId)=>{
    if(clientesDB){
      // CEO/Director: todos los clientes (prioridad máxima)
      if(["director","ceo"].includes(usuario.rol)&&clientesDB._todos){
        return clientesDB._todos;
      }
      // Jefe: todos los clientes de su equipo
      if(usuario.rol==="jefe"&&usuario.equipo&&clientesDB._todos){
        const porEquipo=clientesDB._todos.filter(c=>c.equipo===usuario.equipo||(c.EQUIPO||"").toUpperCase()===usuario.equipo.toUpperCase());
        if(porEquipo.length>0) return porEquipo;
        return clientesDB._todos; // fallback: todos si no hay campo equipo
      }
      // Agente: obtener catalogoVendedor
      let catalogoVendedor=null;
      try{
        const hash=decodeURIComponent(window.location.hash.replace('#',''));
        if(hash.includes('|')) catalogoVendedor=hash.split('|')[1];
      }catch(e){}
      if(!catalogoVendedor){
        try{
          const pu=JSON.parse(localStorage.getItem('gc_portal_user')||'{}');
          catalogoVendedor=pu.catalogoVendedor||null;
        }catch(e){}
      }
      if(catalogoVendedor&&clientesDB._porGrupo&&clientesDB._porGrupo[catalogoVendedor]){
        return clientesDB._porGrupo[catalogoVendedor];
      }
      if(clientesDB._porAgente&&clientesDB._porAgente[agenteId]){
        return clientesDB._porAgente[agenteId];
      }
    }
    return CLIENTES_POR_AGENTE[agenteId]||[];
  };

  // Clientes del usuario actual
  const misClientesFB=getClientesPara(usuario.id);
  window._clientesFB=misClientesFB; // global para búsquedas en sub-componentes

  // Filtros por rol usando datos de Firebase
  const pend=muestrasDB.filter(m=>
    m.estado==="pendiente"&&(esAgente?m.agente===usuario.id:
    esJefe?USUARIOS.find(u=>u.id===m.agente)?.equipo===miEquipo:true)
  ).length;

  const estEnCurso=esAgente
    ? estrategiasDB.filter(e=>(e.estado==="en_curso"||e.estado==="pendiente_aprobacion")&&(e.agente===usuario.id||e.equipo===miEquipo||!e.equipo)&&!e.eliminada&&!e.resolucion).length
    : esJefe
    ? estrategiasDB.filter(e=>(e.estado==="en_curso"||e.estado==="pendiente_aprobacion")&&USUARIOS.find(u=>u.id===e.agente)?.equipo===miEquipo&&!e.eliminada&&!e.resolucion).length
    : estrategiasDB.filter(e=>(e.estado==="en_curso"||e.estado==="pendiente_aprobacion")&&!e.eliminada&&!e.resolucion).length;

  // Badge oportunidades + incidencias — datos reales de Firebase
  const appMisIds=resolverMisIds(usuario);

  const incAbiertas=incidenciasDB.filter(i=>{
    if(i.estado==="cerrada"||i.estado==="resuelta"||i.eliminada||i.estado==="cancelada") return false;
    if(esAgente) return i.autor===usuario.id||i.agente===usuario.id||appMisIds.has((i.agente||"").toUpperCase());
    if(esJefe) return i.equipo===miEquipo;
    if(esDir) return true;
    return true;
  }).length;

  const opsAbiertas=oportunidadesDB.filter(o=>{
    const cerrada=["ganada","perdida","cerrada_ganada","cerrada_perdida"].some(e=>o.etapa===e||o.estado===e);
    if(cerrada) return false;
    if(esAgente) return esDelUsuario(o.agente,appMisIds)||esDelUsuario(o.agenteId,appMisIds);
    if(esJefe){const ag=USUARIOS.find(u=>u.id===(o.agenteId||o.agente));return ag?.equipo===miEquipo;}
    return true;
  }).length;

  const urgCount=0; // badge dinámico — cargado en TareasWidget

  const NAV_AGENTE=[

    {id:"plan_semanal", icon:"📅",label:"Mi semana",   color:T.blue},
    {id:"informe",      icon:"📤",label:"Informe",     color:T.navy},
    {id:"clientes",     icon:"📋",label:"Clientes",    color:T.blue},
    {id:"oportunidades",icon:"💼",label:"Ops",         color:T.navy,  badge:opsAbiertas},
    {id:"muestras",     icon:"📦",label:"Muestras",    color:T.purple, badge:pend},
    {id:"proyectos",    icon:"📁",label:"Proyectos",   color:T.purple},
    {id:"estrategias",  icon:"🎯",label:"Estrategias", color:T.green,  badge:estEnCurso},
    {id:"incidencias",  icon:"🚨",label:"Incidencias", color:T.red,    badge:incAbiertas},
    {id:"historial",    icon:"📅",label:"Historial",    color:T.purple},
    {id:"calendario",   icon:"🗓️",label:"Agenda",       color:T.blue},
    {id:"tareas",       icon:"📌",label:"Tareas",        color:T.red},
    {id:"reporting",    icon:"📈",label:"Reporting",     color:T.navy},
    {id:"ia",           icon:"🤖",label:"IA",             color:T.purple},
  ];

  const NAV_JEFE=[
    {id:"dashboard",    icon:"📊",label:"Mi equipo",   color:usuario.color},
    {id:"informes_hub", icon:"📋",label:"Informes",    color:T.navy},
    {id:"historial",    icon:"📅",label:"Historial",   color:T.purple},
    {id:"calendario",   icon:"🗓️",label:"Agenda",       color:T.blue},
    {id:"tareas",       icon:"📌",label:"Tareas",      color:T.red,   badge:urgCount},
    {id:"clientes_eq",  icon:"📋",label:"Clientes",    color:T.blue},
    {id:"muestras",     icon:"📦",label:"Muestras",    color:T.purple, badge:pend},
    {id:"estrategias",  icon:"🎯",label:"Estrategias", color:T.green, badge:estEnCurso},
    {id:"oportunidades",icon:"💼",label:"Ops",         color:T.navy,  badge:opsAbiertas},
    {id:"proyectos",    icon:"📁",label:"Proyectos",   color:T.purple},
    {id:"incidencias",  icon:"🚨",label:"Incidencias", color:T.red,   badge:incAbiertas},
    {id:"reporting",    icon:"📈",label:"Reporting",    color:T.navy},
    {id:"ia",           icon:"🤖",label:"IA",          color:T.purple},
  ];

  const NAV_DIR=[
    {id:"dashboard",    icon:"📊",label:"Dashboard",    color:usuario.color},
    {id:"informes_hub", icon:"📋",label:"Informes",    color:T.navy},
    {id:"historial",    icon:"📅",label:"Historial",    color:T.purple},
    {id:"calendario",   icon:"🗓️",label:"Agenda",        color:T.blue},
    {id:"tareas",       icon:"📌",label:"Tareas",       color:T.red,   badge:urgCount},
    {id:"clientes_eq",  icon:"📋",label:"Clientes",     color:T.blue},
    {id:"muestras",     icon:"📦",label:"Muestras",     color:T.purple, badge:pend},
    {id:"estrategias",  icon:"🎯",label:"Estrategias",  color:T.green, badge:estEnCurso},
    {id:"oportunidades",icon:"💼",label:"Ops",          color:T.navy,  badge:opsAbiertas},
    {id:"proyectos",    icon:"📁",label:"Proyectos",    color:T.purple},
    {id:"incidencias",  icon:"🚨",label:"Incidencias",  color:T.red,   badge:incAbiertas},
    {id:"reporting",    icon:"📈",label:"Reporting",     color:T.navy},
    {id:"ia",           icon:"🤖",label:"IA",           color:T.purple},
  ];

  const nav=esAgente?NAV_AGENTE:esJefe?NAV_JEFE:NAV_DIR;

  // Dashboard del jefe: solo su equipo
  const DashJefe=()=>{
    const agentesEquipo=USUARIOS.filter(u=>u.rol==="agente"&&u.equipo===miEquipo);
    const n=agentesEquipo.length||1;
    const semana=getSemanaISO();
    // Leer datos del equipo desde AGENTES_DATA (poblado desde Firebase al arrancar)
    const _delEq=AGENTES_DATA.filter(a=>a.equipo===miEquipo);
    const vMesEq    =_delEq.reduce((s,a)=>s+(a.vMes   ||0),0);
    const vMesObjEq =_delEq.reduce((s,a)=>s+(a.oMes   ||0),0);
    const vAnualEq  =_delEq.reduce((s,a)=>s+(a.vAnual ||0),0);
    const vAnualObjEq=_delEq.reduce((s,a)=>s+(a.oAnual||0),0);
    // Margen promedio del equipo (ponderación simple)
    const _mbs=_delEq.filter(a=>a.mb>0);
    const mbMesEq    =_mbs.length?_mbs.reduce((s,a)=>s+a.mb,0)/_mbs.length:0;
    const mbMesObjEq =_mbs.length?_mbs.reduce((s,a)=>s+a.oMb,0)/_mbs.length:0;
    const mbAnualEq=mbMesEq, mbAnualObjEq=mbMesObjEq;
    // Guard: si objetivo=0 devuelve 0% en vez de NaN% (evita 0/0)
    const pctVM=vMesObjEq>0?Math.round(vMesEq/vMesObjEq*100):0;
    const pctVA=vAnualObjEq>0?Math.round(vAnualEq/vAnualObjEq*100):0;
    const pctMM=mbMesObjEq>0?Math.round(mbMesEq/mbMesObjEq*100):0;
    const pctMA=mbAnualObjEq>0?Math.round(mbAnualEq/mbAnualObjEq*100):0;

    const opsEq=(oportunidadesDB||OPORTUNIDADES_SEED).filter(o=>{
      const ag=agentesEquipo.find(a=>a.id===o.agente||a.id===o.agenteId);
      return ag&&!["ganada","perdida","cerrada_ganada","cerrada_perdida"].some(e=>o.etapa===e||o.estado===e);
    });
    const incEq=incidenciasDB.filter(i=>i.equipo===miEquipo&&i.estado==="abierta");
    const estEq=estrategiasDB.filter(e=>e.estado==="en_curso"&&agentesEquipo.find(a=>a.id===e.agente));
    const mEq=muestrasDB.filter(m=>agentesEquipo.find(a=>a.id===m.agente));
    const proyEq=PROYECTOS_SEED.filter(p=>p.estado==="activo"&&agentesEquipo.find(a=>p.equipo&&p.equipo.includes(a.id)));

    const Ring=({pct,size=52,stroke=5})=>{
      const r=size/2-stroke;
      const circ=2*Math.PI*r;
      const fill=circ*(1-Math.min(pct,100)/100);
      const c=pct>=100?"#22C55E":pct>=80?"#F59E0B":"#EF4444";
      return(
        <svg width={size} height={size} style={{flexShrink:0,transform:"rotate(-90deg)"}}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#E2E8F0" strokeWidth={stroke}/>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={c} strokeWidth={stroke}
            strokeDasharray={circ} strokeDashoffset={fill}
            strokeLinecap="round" style={{transition:"stroke-dashoffset .8s ease"}}/>
        </svg>
      );
    };

    const MetricCard=({label,value,obj,pct,suffix="€",note})=>{
      const c=pct>=100?"#22C55E":pct>=80?"#F59E0B":"#EF4444";
      return(
        <div style={{flex:1,background:"#fff",borderRadius:16,padding:"18px 16px",
          border:"1px solid #E2E8F0",
          boxShadow:"0 1px 3px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.06)"}}>
          <p style={{margin:"0 0 12px",fontSize:10,fontWeight:700,color:"#94A3B8",
            textTransform:"uppercase",letterSpacing:".1em"}}>{label}</p>
          <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:14}}>
            <div style={{position:"relative",flexShrink:0}}>
              <Ring pct={pct}/>
              <span style={{position:"absolute",top:"50%",left:"50%",
                transform:"translate(-50%,-50%)",fontSize:10,fontWeight:800,color:c}}>{pct}%</span>
            </div>
            <div style={{flex:1}}>
              <p style={{margin:0,fontSize:22,fontWeight:800,color:"#0F172A",
                letterSpacing:"-0.03em",lineHeight:1}}>
                {typeof value==="number"&&value>999?fmt(value):value}{suffix}
              </p>
              <p style={{margin:"3px 0 0",fontSize:11,color:"#94A3B8"}}>
                obj. {typeof obj==="number"&&obj>999?fmt(obj):obj}{suffix}
              </p>
            </div>
          </div>
          <div style={{height:2,borderRadius:99,background:"#F1F5F9",overflow:"hidden"}}>
            <div style={{height:"100%",width:`${Math.min(pct,100)}%`,borderRadius:99,
              background:c,transition:"width .8s ease"}}/>
          </div>
          {note&&<p style={{margin:"8px 0 0",fontSize:10,color:"#94A3B8"}}>{note}</p>}
        </div>
      );
    };

    const MODS=[
      {icon:"🎯",label:"Estrategias en curso",sub:`${n} comerciales`,count:estEq.length,nav:"estrategias",bg:"#EFF6FF",ic:"#3B82F6"},
      {icon:"📁",label:"Proyectos activos",sub:proyEq.map(p=>p.nombre).join(", ")||"",count:proyEq.length,nav:"proyectos",bg:"#FFFBEB",ic:"#D97706"},
      {icon:"💼",label:"Oportunidades abiertas",sub:`${fmt(opsEq.reduce((s,o)=>s+(o.valor||0),0))}€ pipeline`,count:opsEq.length,nav:"oportunidades",bg:"#F0F9FF",ic:"#0EA5E9"},
      {icon:"🚨",label:"Incidencias abiertas",sub:"Pendientes de resolución",count:incEq.length,nav:"incidencias",bg:"#FFF1F2",ic:"#F43F5E",urgent:true},
      {icon:"📦",label:"Muestras en curso",sub:`${mEq.length} muestra${mEq.length!==1?"s":""} activa${mEq.length!==1?"s":""}`,count:mEq.length,nav:"muestras",bg:"#F5F3FF",ic:"#7C3AED"},
    ].filter(m=>m.count>0);

    return(
      <div style={{background:"#F1F5F9",minHeight:"100vh",paddingBottom:100}}>
        <style>{`.pend-row2:hover{background:#F8FAFC!important}`}</style>

        {/* Header */}
        <div style={{background:"linear-gradient(135deg,#0F172A 0%,#1E293B 60%,#1E3A5F 100%)",
          padding:"32px 20px 28px",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",right:-40,top:-40,width:180,height:180,borderRadius:"50%",background:"rgba(255,255,255,.03)"}}/>
          <div style={{position:"absolute",right:40,bottom:-60,width:120,height:120,borderRadius:"50%",background:"rgba(255,255,255,.04)"}}/>

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
            <div>
              <div style={{display:"flex",gap:6,marginBottom:10}}>
                <span style={{background:"rgba(255,255,255,.1)",color:"rgba(255,255,255,.7)",
                  fontSize:10,fontWeight:700,padding:"3px 10px",borderRadius:99,
                  textTransform:"uppercase",letterSpacing:".08em"}}>{miEquipo}</span>
                <span style={{background:"rgba(99,102,241,.3)",color:"#A5B4FC",
                  fontSize:10,fontWeight:700,padding:"3px 10px",borderRadius:99}}>Sem. {semana}</span>
                <span style={{background:"rgba(255,255,255,.08)",color:"rgba(255,255,255,.5)",
                  fontSize:10,fontWeight:600,padding:"3px 10px",borderRadius:99}}>{n} comerciales</span>
              </div>
              <p style={{margin:0,fontSize:24,fontWeight:800,color:"#FFFFFF",
                letterSpacing:"-0.03em",lineHeight:1.1}}>
                {usuario.nombre.split(" ").slice(0,2).join(" ")}
              </p>
            </div>
            <div style={{background:"rgba(255,255,255,.08)",backdropFilter:"blur(8px)",
              border:"1px solid rgba(255,255,255,.12)",borderRadius:14,
              padding:"12px 16px",textAlign:"center",flexShrink:0}}>
              <p style={{margin:"0 0 2px",fontSize:9,fontWeight:700,color:"rgba(255,255,255,.5)",
                textTransform:"uppercase",letterSpacing:".1em"}}>Equipo mes</p>
              <p style={{margin:0,fontSize:28,fontWeight:900,lineHeight:1,
                color:pctVM>=100?"#4ADE80":pctVM>=80?"#FCD34D":"#FB7185"}}>{pctVM}%</p>
              <p style={{margin:"2px 0 0",fontSize:9,color:"rgba(255,255,255,.4)"}}>del objetivo</p>
            </div>
          </div>
          <div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{fontSize:11,color:"rgba(255,255,255,.5)"}}>Ventas equipo mes</span>
              <span style={{fontSize:11,color:"rgba(255,255,255,.7)",fontWeight:600}}>
                {fmt(vMesEq)}€ / {fmt(vMesObjEq)}€
              </span>
            </div>
            <div style={{height:4,borderRadius:99,background:"rgba(255,255,255,.12)",overflow:"hidden"}}>
              <div style={{height:"100%",width:`${Math.min(pctVM,100)}%`,borderRadius:99,
                background:pctVM>=100?"#4ADE80":pctVM>=80?"#FCD34D":"#FB7185",transition:"width .8s"}}/>
            </div>
          </div>
        </div>

        <div style={{padding:"20px 16px 0"}}>
          {/* 1 · Este mes */}
          <p style={{margin:"0 0 10px",fontSize:10,fontWeight:700,color:"#64748B",
            textTransform:"uppercase",letterSpacing:".12em"}}>Este mes — equipo</p>
          <div style={{display:"flex",gap:10,marginBottom:12}}>
            <MetricCard label="Ventas" value={vMesEq} obj={vMesObjEq} pct={pctVM}/>
            <MetricCard label="Margen bruto" value={mbMesEq} obj={mbMesObjEq} pct={pctMM} suffix="%"/>
          </div>

          {/* 1b · Promo + Liquidación + Σ — agregado del equipo (mes) */}
          {(()=>{
            const delEq=AGENTES_DATA.filter(a=>a.equipo===miEquipo);
            const promoR=delEq.reduce((s,a)=>s+(a.promoMes||0),0);
            const promoO=delEq.reduce((s,a)=>s+(a.oPromoMes||0),0);
            const liqR  =delEq.reduce((s,a)=>s+(a.liqMes||0),0);
            const liqO  =delEq.reduce((s,a)=>s+(a.oLiqMes||0),0);
            const totalPL=promoR+liqR, totalPLObj=promoO+liqO;
            const pctP=promoO>0?Math.round(promoR/promoO*100):0;
            const pctL=liqO>0?Math.round(liqR/liqO*100):0;
            const pctT=totalPLObj>0?Math.round(totalPL/totalPLObj*100):0;
            return(
              <div style={{display:"flex",gap:8,marginBottom:22}}>
                {[
                  {l:"🎯 Promoción",  v:`${fmt(promoR)}€`,  sub:`obj. ${fmt(promoO)}€`,    c:PL_COLOR(pctP)},
                  {l:"📋 Liquidación",v:`${fmt(liqR)}€`,    sub:`obj. ${fmt(liqO)}€`,      c:PL_COLOR(pctL)},
                  {l:"Σ Total",       v:`${fmt(totalPL)}€`, sub:`obj. ${fmt(totalPLObj)}€`,c:PL_COLOR(pctT)},
                ].map(k=>(
                  <div key={k.l} style={{flex:1,background:"#F8FAFC",borderRadius:10,
                    padding:"10px 12px",border:"1px solid #E2E8F0"}}>
                    <p style={{margin:"0 0 2px",fontSize:9,color:"#94A3B8",textTransform:"uppercase",fontWeight:700}}>{k.l}</p>
                    <p style={{margin:0,fontSize:15,fontWeight:800,color:k.c}}>{k.v}</p>
                    <p style={{margin:0,fontSize:9,color:"#94A3B8"}}>{k.sub}</p>
                  </div>
                ))}
              </div>
            );
          })()}

          {/* 2 · Año */}
          <p style={{margin:"0 0 10px",fontSize:10,fontWeight:700,color:"#64748B",
            textTransform:"uppercase",letterSpacing:".12em"}}>Acumulado año — equipo</p>
          <div style={{display:"flex",gap:10,marginBottom:22}}>
            <MetricCard label="Ventas" value={vAnualEq} obj={vAnualObjEq} pct={pctVA}
              note={`Proy. ${fmt(Math.round(vAnualEq/semana*52))}€`}/>
            <MetricCard label="Margen bruto" value={mbAnualEq} obj={mbAnualObjEq} pct={pctMA} suffix="%"
              note={`${mbAnualEq>=mbAnualObjEq?"+":""}${(mbAnualEq-mbAnualObjEq).toFixed(1)}pp`}/>
          </div>

          {/* 3 · Pendientes */}
          {MODS.length>0&&(
            <>
              <p style={{margin:"0 0 10px",fontSize:10,fontWeight:700,color:"#64748B",
                textTransform:"uppercase",letterSpacing:".12em"}}>Pendientes — equipo</p>
              <div style={{background:"#fff",borderRadius:16,overflow:"hidden",
                border:"1px solid #E2E8F0",
                boxShadow:"0 1px 3px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.06)",marginBottom:22}}>
                {MODS.map((m,i)=>(
                  <div key={m.nav} className="pend-row2" onClick={()=>setSection(m.nav)}
                    style={{display:"flex",alignItems:"center",gap:14,padding:"14px 16px",
                      borderBottom:i<MODS.length-1?"1px solid #F1F5F9":"none",
                      cursor:"pointer",transition:"background .15s"}}>
                    <div style={{width:38,height:38,borderRadius:11,background:m.bg,
                      display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{m.icon}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{margin:0,fontSize:13,fontWeight:600,color:"#0F172A"}}>{m.label}</p>
                      {m.sub&&<p style={{margin:"2px 0 0",fontSize:11,color:"#94A3B8",
                        overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.sub}</p>}
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                      <span style={{fontSize:12,fontWeight:800,color:m.urgent?"#F43F5E":m.ic,
                        background:m.bg,borderRadius:99,padding:"3px 10px"}}>{m.count}</span>
                      <span style={{color:"#CBD5E1",fontSize:16}}>›</span>
                    </div>
                  </div>
                ))}
              </div>
            </>
          )}

          {/* Equipo */}
          <p style={{margin:"0 0 10px",fontSize:10,fontWeight:700,color:"#64748B",
            textTransform:"uppercase",letterSpacing:".12em"}}>Equipo · {miEquipo}</p>
          <div style={{background:"#fff",borderRadius:16,overflow:"hidden",
            border:"1px solid #E2E8F0",
            boxShadow:"0 1px 3px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.06)"}}>
            {agentesEquipo.map((a,i)=>{
              const mA=muestrasDB.filter(m=>m.agente===a.id).length;
              const pctA=85;
              const cA=pctA>=100?"#22C55E":pctA>=80?"#F59E0B":"#EF4444";
              return(
                <div key={a.id} style={{display:"flex",gap:12,alignItems:"center",
                  padding:"14px 16px",
                  borderBottom:i<agentesEquipo.length-1?"1px solid #F1F5F9":"none"}}>
                  {/* Avatar gradiente */}
                  <div style={{width:40,height:40,borderRadius:12,flexShrink:0,
                    background:"linear-gradient(135deg,#1E293B,#334155)",
                    display:"flex",alignItems:"center",justifyContent:"center",
                    fontSize:13,fontWeight:700,color:"#fff",letterSpacing:"-.01em"}}>
                    {a.nombre.split(" ").map(w=>w[0]).slice(0,2).join("")}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:5}}>
                      <p style={{margin:0,fontSize:13,fontWeight:600,color:"#0F172A",
                        overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.nombre}</p>
                      {mA>0&&(
                        <span style={{background:"#FFFBEB",color:"#D97706",fontSize:9,
                          fontWeight:700,padding:"2px 7px",borderRadius:99,flexShrink:0}}>
                          {mA} muestras
                        </span>
                      )}
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <div style={{height:3,flex:1,borderRadius:99,background:"#F1F5F9",overflow:"hidden"}}>
                        <div style={{height:"100%",width:`${pctA}%`,borderRadius:99,
                          background:cA,transition:"width .8s"}}/>
                      </div>
                      <span style={{fontSize:10,fontWeight:700,color:cA,flexShrink:0}}>{pctA}%</span>
                    </div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <p style={{margin:0,fontSize:13,fontWeight:700,color:"#0F172A"}}>24.5k€</p>
                    <p style={{margin:"1px 0 0",fontSize:10,color:"#94A3B8"}}>ventas</p>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  };







  return(
    <div style={{maxWidth:540,margin:"0 auto",minHeight:"100vh",background:T.bg,fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"}}>
      {/* Header */}
      <div style={{background:T.white,borderBottom:`1px solid ${T.border}`,
        padding:"14px 16px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:50}}>
        <div style={{width:36,height:36,borderRadius:10,background:usuario.color,
          display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>
          {usuario.icon}
        </div>
        <div style={{flex:1}}>
          <p style={{margin:0,fontSize:14,fontWeight:800,color:T.text}}>{usuario.nombre}</p>
          <p style={{margin:0,fontSize:11,color:T.muted}}>
            {esAgente?"Comercial":esJefe?"Responsable":usuario.rol==="director"?"Jefe de Ventas":"CEO"}
            {usuario.equipo?` · ${usuario.equipo}`:""}
            {" · "}
            {fbCargando&&<span style={{color:T.amber}}>⏳ Cargando nube…</span>}
            {!fbCargando&&fbStatus==="ok"&&!navigator.onLine&&<span style={{color:T.amber}}>📴 Offline (caché)</span>}
            {!fbCargando&&fbStatus==="ok"&&navigator.onLine&&<span style={{color:T.green}}>🔵 Firebase OK</span>}
            {!fbCargando&&fbStatus==="error"&&<span style={{color:T.muted}}>⚪ Sin conexión</span>}
            {colaLeer().length>0&&<span style={{color:T.amber,marginLeft:4}}>· 📤 {colaLeer().length} pendiente{colaLeer().length>1?"s":""}</span>}
          </p>
        </div>
        <button onClick={()=>{setBusquedaGlobal(true);setBusqTexto("");}}
          style={{background:"none",border:`1px solid ${T.border}`,borderRadius:8,padding:"7px 10px",color:T.muted,fontSize:14,cursor:"pointer"}}>
          🔍
        </button>
        <button onClick={()=>setNotifOpen(v=>!v)}
          style={{background:"none",border:`1px solid ${notificaciones.length>0?"#F59E0B33":T.border}`,
            borderRadius:8,padding:"7px 10px",color:T.muted,fontSize:14,cursor:"pointer",position:"relative"}}>
          🔔
          {notificaciones.length>0&&(
            <span style={{position:"absolute",top:-4,right:-4,background:"#EF4444",color:"#fff",
              fontSize:9,fontWeight:800,padding:"1px 5px",borderRadius:99,minWidth:16,textAlign:"center"}}>
              {notificaciones.length}
            </span>
          )}
        </button>
        <button onClick={()=>{
            try{ window.parent.backToHub(); }catch(e){}
            setUsuario(null);
          }}
          style={{background:"none",border:`1px solid ${T.border}`,borderRadius:8,padding:"7px 10px",color:T.muted,fontSize:12,cursor:"pointer"}}>
          Salir
        </button>
      </div>

      {/* ═══ PANEL DE NOTIFICACIONES ═══ */}
      {notifOpen&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:998}}>
          {/* Backdrop */}
          <div onClick={()=>setNotifOpen(false)} style={{position:"absolute",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.3)"}}/>
          {/* Panel */}
          <div style={{position:"absolute",top:60,right:8,left:8,maxHeight:"75vh",
            background:"#fff",borderRadius:16,boxShadow:"0 8px 32px rgba(0,0,0,.18)",
            display:"flex",flexDirection:"column",overflow:"hidden"}}>
            {/* Header */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
              padding:"14px 16px",borderBottom:`1px solid ${T.border}`}}>
              <p style={{margin:0,fontSize:15,fontWeight:800,color:T.text}}>
                🔔 Notificaciones {notificaciones.length>0&&<span style={{color:"#EF4444"}}>({notificaciones.length})</span>}
              </p>
              <button onClick={()=>setNotifOpen(false)}
                style={{background:"none",border:"none",fontSize:18,color:T.muted,cursor:"pointer"}}>×</button>
            </div>
            {/* Lista */}
            <div style={{flex:1,overflowY:"auto",padding:"8px 12px"}}>
              {notificaciones.length===0?(
                <div style={{textAlign:"center",padding:"32px 16px",color:T.muted}}>
                  <span style={{fontSize:36,display:"block",marginBottom:8}}>✅</span>
                  <p style={{margin:0,fontSize:13}}>Sin notificaciones pendientes</p>
                  <p style={{margin:"6px 0 0",fontSize:11,color:"#94A3B8"}}>Todo al día</p>
                </div>
              ):(
                notificaciones.map((n,i)=>(
                  <div key={i} onClick={n.accion}
                    style={{display:"flex",gap:10,alignItems:"flex-start",padding:"12px",
                      background:i%2===0?"#F8FAFC":"#fff",borderRadius:10,marginBottom:4,
                      cursor:"pointer",border:`1px solid ${n.prioridad>=3?n.color+"33":T.border}`,
                      borderLeft:`3px solid ${n.color}`}}>
                    <span style={{fontSize:18,flexShrink:0,marginTop:2}}>{n.icon}</span>
                    <div style={{flex:1,overflow:"hidden"}}>
                      <p style={{margin:0,fontSize:12,fontWeight:700,color:T.text,
                        overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{n.titulo}</p>
                      <p style={{margin:"2px 0 0",fontSize:11,color:n.color,fontWeight:600}}>{n.sub}</p>
                    </div>
                    <span style={{fontSize:11,color:T.muted,flexShrink:0}}>→</span>
                  </div>
                ))
              )}
            </div>
          </div>
        </div>
      )}

      {/* ═══ BUSCADOR GLOBAL ═══ */}
      {busquedaGlobal&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:999,
          background:"#fff",display:"flex",flexDirection:"column"}}>
          {/* Header búsqueda */}
          <div style={{display:"flex",gap:10,alignItems:"center",padding:"12px 16px",
            borderBottom:`1px solid ${T.border}`,background:"#fff"}}>
            <span style={{fontSize:20}}>🔍</span>
            <input autoFocus value={busqTexto} onChange={e=>setBusqTexto(e.target.value)}
              placeholder="Buscar clientes, muestras, oportunidades..."
              style={{flex:1,padding:"11px 14px",borderRadius:10,border:`1.5px solid ${T.border}`,
                fontSize:15,outline:"none",fontFamily:"inherit",background:"#F8FAFC"}}/>
            <button onClick={()=>setBusquedaGlobal(false)}
              style={{background:"none",border:`1px solid ${T.border}`,borderRadius:8,
                padding:"8px 14px",fontSize:13,fontWeight:700,color:T.muted,cursor:"pointer"}}>
              Cerrar
            </button>
          </div>
          {/* Resultados */}
          <div style={{flex:1,overflowY:"auto",padding:"12px 16px"}}>
            {(()=>{
              const q=busqTexto.trim().toLowerCase();
              if(q.length<2) return(
                <div style={{textAlign:"center",padding:"60px 20px",color:T.muted}}>
                  <span style={{fontSize:48,display:"block",marginBottom:12}}>🔍</span>
                  <p style={{margin:0,fontSize:14}}>Escribe al menos 2 caracteres para buscar</p>
                  <p style={{margin:"8px 0 0",fontSize:12,color:"#94A3B8"}}>
                    Busca en clientes, muestras, oportunidades, proyectos, estrategias e incidencias
                  </p>
                </div>
              );

              const resultados=[];

              // Buscar en clientes
              const cliTodos=clientesDB?._todos||misClientesFB||[];
              cliTodos.filter(c=>{
                const n=(c.nombre||c.NOMBRE||"").toLowerCase();
                const p=(c.poblacion||c.ciudad||"").toLowerCase();
                const ct=(c.contacto||"").toLowerCase();
                return n.includes(q)||p.includes(q)||ct.includes(q);
              }).slice(0,8).forEach(c=>resultados.push({
                tipo:"cliente",icon:"👤",color:T.blue,
                titulo:c.nombre||c.NOMBRE,
                sub:[c.poblacion||c.ciudad,c.pais,c.contacto].filter(Boolean).join(" · "),
                accion:()=>{setBusquedaGlobal(false);onAbrirCliente(c.nombre||c.NOMBRE);}
              }));

              // Buscar en muestras
              muestrasDB.filter(m=>{
                return (m.prod||"").toLowerCase().includes(q)||(m.cliente||"").toLowerCase().includes(q)||(m.tipo||"").toLowerCase().includes(q);
              }).slice(0,8).forEach(m=>{
                const est=m.estado==="pedido"?"🛒":m.estado==="positivo"?"✅":m.estado==="ko"?"❌":"⏳";
                resultados.push({
                  tipo:"muestra",icon:"📦",color:T.purple,
                  titulo:`${m.prod}`,
                  sub:`${m.cliente} · S${m.semana} · ${est} ${m.estado}`,
                  accion:()=>{setBusquedaGlobal(false);setSection("muestras");}
                });
              });

              // Buscar en oportunidades
              oportunidadesDB.filter(o=>{
                return (o.nombre||o.cliente||"").toLowerCase().includes(q)||(o.producto||"").toLowerCase().includes(q);
              }).slice(0,8).forEach(o=>resultados.push({
                tipo:"oportunidad",icon:"💼",color:T.navy,
                titulo:o.nombre||o.cliente,
                sub:[o.estado||o.etapa,o.valor?o.valor+"€":""].filter(Boolean).join(" · "),
                accion:()=>{setBusquedaGlobal(false);setSection("oportunidades");}
              }));

              // Buscar en estrategias
              estrategiasDB.filter(e=>{
                return (e.titulo||e.nombre||"").toLowerCase().includes(q)||(e.desc||e.objetivo||"").toLowerCase().includes(q);
              }).slice(0,6).forEach(e=>resultados.push({
                tipo:"estrategia",icon:"🎯",color:T.green,
                titulo:e.titulo||e.nombre,
                sub:e.estado||"",
                accion:()=>{setBusquedaGlobal(false);setSection("estrategias");}
              }));

              // Buscar en incidencias
              incidenciasDB.filter(inc=>{
                return (inc.titulo||inc.asunto||"").toLowerCase().includes(q)||(inc.cliente||"").toLowerCase().includes(q);
              }).slice(0,6).forEach(inc=>resultados.push({
                tipo:"incidencia",icon:"🚨",color:T.red,
                titulo:inc.titulo||inc.asunto,
                sub:[inc.cliente,inc.estado,inc.tipo].filter(Boolean).join(" · "),
                accion:()=>{setBusquedaGlobal(false);setSection("incidencias");}
              }));

              // Buscar en usuarios
              USUARIOS.filter(u=>u.rol==="agente"&&(u.nombre||"").toLowerCase().includes(q)).forEach(u=>resultados.push({
                tipo:"vendedor",icon:u.icon||"🧑‍💼",color:u.color||T.amber,
                titulo:u.nombre,
                sub:`${u.equipo} · ${u.rol}`,
                accion:()=>{setBusquedaGlobal(false);}
              }));

              if(resultados.length===0) return(
                <div style={{textAlign:"center",padding:"40px 20px",color:T.muted}}>
                  <span style={{fontSize:40,display:"block",marginBottom:8}}>🤷</span>
                  <p style={{margin:0,fontSize:14}}>Sin resultados para "{busqTexto}"</p>
                </div>
              );

              // Agrupar por tipo
              const grupos={};
              resultados.forEach(r=>{if(!grupos[r.tipo])grupos[r.tipo]=[];grupos[r.tipo].push(r);});
              const labels={cliente:"Clientes",muestra:"Muestras",oportunidad:"Oportunidades",
                estrategia:"Estrategias",incidencia:"Incidencias",vendedor:"Vendedores"};

              return Object.entries(grupos).map(([tipo,items])=>(
                <div key={tipo} style={{marginBottom:16}}>
                  <p style={{margin:"0 0 8px",fontSize:11,fontWeight:700,color:T.muted,
                    textTransform:"uppercase",letterSpacing:".05em"}}>
                    {items[0].icon} {labels[tipo]||tipo} ({items.length})
                  </p>
                  {items.map((r,i)=>(
                    <div key={i} onClick={r.accion}
                      style={{display:"flex",gap:12,alignItems:"center",padding:"12px 14px",
                        background:i%2===0?"#F8FAFC":"#fff",borderRadius:10,marginBottom:4,
                        cursor:"pointer",border:`1px solid ${T.border}`}}>
                      <span style={{fontSize:20,flexShrink:0,width:32,height:32,borderRadius:8,
                        background:r.color+"15",display:"flex",alignItems:"center",justifyContent:"center"}}>
                        {r.icon}
                      </span>
                      <div style={{flex:1,overflow:"hidden"}}>
                        <p style={{margin:0,fontSize:13,fontWeight:700,color:T.text,
                          overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.titulo}</p>
                        {r.sub&&<p style={{margin:"2px 0 0",fontSize:11,color:T.muted,
                          overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.sub}</p>}
                      </div>
                      <span style={{fontSize:12,color:T.muted}}>→</span>
                    </div>
                  ))}
                </div>
              ));
            })()}
          </div>
        </div>
      )}

      {/* Contenido */}
      <div style={{paddingBottom:90}}>

        {/* Barra superior de retorno — aparece en todas las secciones excepto dashboard */}
        {section!=="dashboard"&&(
          <div style={{display:"flex",alignItems:"center",gap:12,
            padding:"12px 16px",background:"#fff",
            borderBottom:`1px solid ${T.border}`,
            position:"sticky",top:0,zIndex:30,
            boxShadow:"0 1px 6px rgba(0,0,0,.06)"}}>
            <button onClick={()=>setSection("dashboard")}
              style={{display:"flex",alignItems:"center",gap:8,background:T.navy,
                border:"none",borderRadius:10,padding:"9px 16px",
                cursor:"pointer",flexShrink:0}}>
              <span style={{fontSize:18,color:"#fff",lineHeight:1}}>←</span>
              <span style={{fontSize:13,fontWeight:700,color:"#fff"}}>Inicio</span>
            </button>
            <p style={{margin:0,fontSize:14,fontWeight:700,color:T.text,
              overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
              {section==="clientes"?"📋 Mis clientes":
               section==="clientes_eq"?"📋 Clientes del equipo":
               section==="informes_hub"?"📋 Informes":
               section==="informe"?"📤 Mi informe":
               section==="informe_jefe"?"📋 Informe ejecutivo semanal":
               section==="muestras"?"📦 Muestras":
               section==="estrategias"?"🎯 Estrategias":
               section==="oportunidades"?"💼 Oportunidades":
               section==="proyectos"?"📁 Proyectos":
               section==="incidencias"?"🚨 Incidencias":
               section==="usuarios"?"👥 Equipo":
               section==="historial"?"📅 Historial semanal":
               section==="tareas"?"📌 Tareas y acciones":
               section==="calendario"?"🗓️ Agenda":
               section==="reporting"?"📈 Reporting":
               section==="ia"?"🤖 Asistente IA":
               section==="plan_semanal"?"📅 Mi semana":
               section}
            </p>
          </div>
        )}

        {/* AGENTE */}
        {esAgente&&section==="dashboard"&&  <DashAgente usuario={usuario} onNav={setSection} oportunidadesDB={oportunidadesDB} clientesFB={misClientesFB} muestrasDB={muestrasDB} estrategiasDB={estrategiasDB} incidenciasDB={incidenciasDB} calendarioDB={calendarioDB} actividad={actividadSemana} _ver={objVer}/>}
        {esAgente&&section==="clientes"&&   <GestorClientes usuario={usuario} actividad={actividadSemana} onActividad={onActividad} onBack={function(){setSection(prevSectionRef.current||"dashboard");}} clientesFB={misClientesFB} muestrasDB={muestrasDB} oportunidadesDB={oportunidadesDB} incidenciasDB={incidenciasDB} estrategiasDB={estrategiasDB} clienteDirecto={clienteDirecto} onClienteDirectoUsado={()=>setClienteDirecto(null)}/>}
        {esAgente&&section==="plan_semanal"&& <MiSemana usuario={usuario} clientesFB={misClientesFB} onBack={()=>setSection("dashboard")} onNav={setSection} estrategiasDB={estrategiasDB} oportunidadesDB={oportunidadesDB} incidenciasDB={incidenciasDB} muestrasDB={muestrasDB} actividad={actividadSemana} onAbrirCliente={function(nombre){setClienteDirecto({nombre:nombre,ts:Date.now()});setHideNav(true);setSection("clientes");}}/>}
        {section==="informe"&&esAgente&&    <Informe usuario={usuario} actividadSemana={actividadSemana} clientesFB={misClientesFB}/>}
        {section==="informe"&&!esAgente&&   <MiInformeJefe usuario={usuario} oportunidadesDB={oportunidadesDB} clientesFB={misClientesFB} onNav={setSection}/>}
        {section==="informe_jefe"&&         <InformeJefe usuario={usuario} oportunidadesDB={oportunidadesDB}/>}
        {section==="informes_hub"&&(
          <div style={{padding:"20px 16px"}}>
            <p style={{margin:"0 0 4px",fontSize:20,fontWeight:900,color:T.text}}>📋 Informes</p>
            <p style={{margin:"0 0 20px",fontSize:12,color:T.muted}}>Registra tu actividad o consulta el resumen del equipo</p>

            <div onClick={()=>setSection("informe")}
              style={{background:"#fff",borderRadius:14,padding:"20px",marginBottom:12,
                border:`1.5px solid ${T.border}`,cursor:"pointer",
                display:"flex",alignItems:"center",gap:14,
                boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}>
              <div style={{width:52,height:52,borderRadius:12,background:"#EFF6FF",
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,flexShrink:0}}>📤</div>
              <div style={{flex:1}}>
                <p style={{margin:"0 0 3px",fontSize:15,fontWeight:800,color:T.text}}>Mi informe semanal</p>
                <p style={{margin:0,fontSize:12,color:T.muted,lineHeight:1.4}}>
                  Registra tus visitas, ferias, eventos, muestras y cierra la semana
                </p>
              </div>
              <span style={{color:T.muted,fontSize:20}}>›</span>
            </div>

            <div onClick={()=>setSection("informe_jefe")}
              style={{background:"#fff",borderRadius:14,padding:"20px",
                border:`1.5px solid ${T.border}`,cursor:"pointer",
                display:"flex",alignItems:"center",gap:14,
                boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}>
              <div style={{width:52,height:52,borderRadius:12,background:"#F0FDF4",
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,flexShrink:0}}>📊</div>
              <div style={{flex:1}}>
                <p style={{margin:"0 0 3px",fontSize:15,fontWeight:800,color:T.text}}>Informe ejecutivo</p>
                <p style={{margin:0,fontSize:12,color:T.muted,lineHeight:1.4}}>
                  Resumen agregado del equipo: ventas, proyectos, hitos, ops y tareas
                </p>
              </div>
              <span style={{color:T.muted,fontSize:20}}>›</span>
            </div>
          </div>
        )}
        {esAgente&&section==="muestras"&&   <MisMuestras usuario={usuario} clientesFB={misClientesFB} onAbrirCliente={onAbrirCliente} onIrASeccion={onIrASeccion}/>}
        {esJefeOmas&&section==="muestras"&&  <MisMuestras usuario={usuario} clientesFB={misClientesFB} onAbrirCliente={onAbrirCliente} onIrASeccion={onIrASeccion}/>}

        {/* JEFE — dashboard filtrado a su equipo */}
        {esJefe&&section==="dashboard"&&    <DashJefe key={"jefe"}/>}
        {esJefeOmas&&section==="clientes_eq"&& <HistorialClientes usuario={usuario} actividad={actividadSemana} muestrasDB={muestrasDB} oportunidadesDB={oportunidadesDB} incidenciasDB={incidenciasDB} estrategiasDB={estrategiasDB} clienteDirecto={clienteDirecto} onClienteDirectoUsado={()=>setClienteDirecto(null)} clientesFB={clientesDB?._todos||misClientesFB||[]}/>}

        {/* DIRECTOR / CEO — dashboard global */}
        {esDir&&section==="dashboard"&&     <DashDirector usuario={usuario} onNav={setSection} estrategiasDB={estrategiasDB}/>}

        {/* Compartidas — con filtrado por rol dentro de cada componente */}
        {section==="estrategias"&&          <MisEstrategias usuario={usuario}/>}
        {section==="oportunidades"&&        <GestorOportunidades usuario={usuario} onAbrirCliente={onAbrirCliente}/>}
        {section==="proyectos"&&            <Proyectos usuario={usuario} onAbrirCliente={onAbrirCliente} onIrASeccion={onIrASeccion}/>}
        {section==="incidencias"&&          <Incidencias usuario={usuario} clientesFB={misClientesFB} onAbrirCliente={onAbrirCliente} incidenciasDB={incidenciasDB}/>}

        {/* Secciones nuevas */}
        {section==="historial"&& <HistorialSemanal usuario={usuario}/> }
        {section==="tareas"&&    <GestorTareas usuario={usuario} clientesFB={misClientesFB}/> }
        {section==="reporting"&& <Reporting usuario={usuario} muestrasDB={muestrasDB} oportunidadesDB={oportunidadesDB} incidenciasDB={incidenciasDB} estrategiasDB={estrategiasDB} clientesDB={clientesDB} misClientesFB={misClientesFB}/>}
        {section==="calendario"&& <Calendario usuario={usuario} clientesFB={misClientesFB} onAbrirCliente={onAbrirCliente} onEventosChange={setCalendarioDB}/>}
        {section==="ia"&&(
          <AsistenteIA
            usuario={usuario}
            clientesFB={clientesDB?._todos||misClientesFB||[]}
            oportunidadesDB={oportunidadesDB}
          />
        )}

        {/* Equipo — jefe ve solo su equipo, director/CEO ven todos */}
        {esJefeOmas&&section==="usuarios"&&(
          <div style={{padding:"20px 16px"}}>
            <p style={{margin:"0 0 4px",fontSize:20,fontWeight:900,color:T.text}}>👥 {esJefe?`Equipo ${miEquipo}`:"Todos los equipos"}</p>
            <p style={{margin:"0 0 16px",fontSize:12,color:T.muted}}>
              {esJefe?`${USUARIOS.filter(u=>u.rol==="agente"&&u.equipo===miEquipo).length} comerciales`:"WIKUK + INTERKEY"}
            </p>
            {esDir&&(
              <div style={{display:"flex",gap:8,marginBottom:16}}>
                <Badge label={`WIKUK: ${USUARIOS.filter(u=>u.rol==="agente"&&u.equipo==="WIKUK").length}`} color={T.green}/>
                <Badge label={`INTERKEY: ${USUARIOS.filter(u=>u.rol==="agente"&&u.equipo==="INTERKEY").length}`} color={T.amber}/>
              </div>
            )}
            {USUARIOS.filter(u=>u.rol==="agente"&&(esDir||u.equipo===miEquipo)).map(u=>(
              <Card key={u.id} style={{marginBottom:8,display:"flex",gap:12,alignItems:"center",padding:"14px 16px"}}>
                <div style={{width:40,height:40,borderRadius:10,background:u.color+"20",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{u.icon}</div>
                <div style={{flex:1}}>
                  <p style={{margin:0,fontSize:14,fontWeight:700}}>{u.nombre}</p>
                  <Badge label={u.equipo} color={u.equipo==="WIKUK"?T.green:T.amber}/>
                </div>
                <div style={{textAlign:"right"}}>
                  {(()=>{
                    const d=AGENTES_DATA.find(a=>a.id===u.id);
                    const vMes=d?.vMes||0, oMes=d?.oMes||0;
                    const pct=oMes>0?Math.round(vMes/oMes*100):0;
                    const c=pct>=100?T.green:pct>=80?T.amber:T.muted;
                    return(<>
                      <p style={{margin:0,fontSize:14,fontWeight:800,color:T.text}}>{fmt(vMes)}€</p>
                      <p style={{margin:0,fontSize:11,color:c}}>{oMes>0?`${pct}% obj${pct>=100?" ✓":""}`:"— sin datos"}</p>
                    </>);
                  })()}
                </div>
              </Card>
            ))}
          </div>
        )}
      </div>

      {/* Bottom Nav */}
      {!hideNav&&<BottomNav items={nav} current={section} onChange={setSection}/>}
    </div>
  );
}




// ─── REPORTING Y EXPORTACIÓN ─────────────────────────────────────
function exportarExcel(datos, nombre, columnas){
  if(!window.XLSX){alert("Error: librería de Excel no cargada");return;}
  const ws=XLSX.utils.json_to_sheet(datos.map(d=>{
    const row={};
    columnas.forEach(c=>{row[c.label]=typeof c.fn==="function"?c.fn(d):(d[c.key]||"");});
    return row;
  }));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,nombre.slice(0,31));
  XLSX.writeFile(wb,`${nombre}_${new Date().toLocaleDateString("es-ES").replace(/\//g,"-")}.xlsx`);
}

function MiniBar({datos,color,height=80,labels}){
  if(!datos||datos.length===0) return null;
  const max=Math.max(...datos,1);
  const w=100/datos.length;
  return(
    <div style={{position:"relative",height,display:"flex",alignItems:"flex-end",gap:2}}>
      {datos.map((v,i)=>(
        <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
          <span style={{fontSize:9,fontWeight:700,color:v===max?color:"#94A3B8"}}>{v}</span>
          <div style={{width:"100%",height:Math.max(4,v/max*(height-20)),background:color,
            borderRadius:"4px 4px 0 0",opacity:v===0?.15:1,transition:"height .3s"}}/>
          {labels&&labels[i]&&<span style={{fontSize:8,color:"#94A3B8"}}>{labels[i]}</span>}
        </div>
      ))}
    </div>
  );
}

function Reporting({usuario,muestrasDB,oportunidadesDB,incidenciasDB,estrategiasDB,clientesDB,misClientesFB}){
  const esAgente=usuario.rol==="agente";
  const esJefe=usuario.rol==="jefe";
  const esDir=["director","ceo"].includes(usuario.rol);
  const miEquipo=usuario.equipo;
  const appMisIds=resolverMisIds(usuario);
  const [printing,setPrinting]=useState(false);
  const [sesiones,setSesiones]=useState([]);
  const [showSesDetalle,setShowSesDetalle]=useState(false);
  const [showSesHistorico,setShowSesHistorico]=useState(false);
  const [filtroAg,setFiltroAg]=useState("todos");
  const [eqOpen,setEqOpen]=useState(""); // "" | "WIKUK" | "WIKUK_exp" | "INTERKEY" | "INTERKEY_exp"

  // Agentes del equipo
  const agentesEquipo=USUARIOS.filter(u=>u.rol==="agente"&&(esDir||u.equipo===miEquipo));

  // Cargar sesiones de uso
  useEffect(()=>{
    fbLeer("sesiones").then(data=>{
      const filtradas=data.filter(s=>{
        if(esDir) return true;
        if(esJefe){const ag=USUARIOS.find(u=>u.id===s.agente);return ag?.equipo===miEquipo;}
        return appMisIds.has((s.agente||"").toUpperCase());
      });
      setSesiones(filtradas);
    }).catch(()=>{});
  },[]);

  // Calcular tiempo por agente (semana actual)
  const semActualISO=getSemanaISO();
  const tiempoPorAgente=useMemo(()=>{
    const map={};
    sesiones.filter(s=>s.semana===semActualISO).forEach(s=>{
      if(!map[s.agente]) map[s.agente]={nombre:s.agenteNombre||s.agente,min:0,sesiones:0};
      map[s.agente].min+=(parseInt(s.duracionMin)||0);
      map[s.agente].sesiones++;
    });
    return Object.values(map).sort((a,b)=>b.min-a.min);
  },[sesiones]);

  const tiempoTotal=tiempoPorAgente.reduce((s,a)=>s+a.min,0);
  const formatMin=(m)=>m>=60?`${Math.floor(m/60)}h ${m%60}m`:`${m}m`;

  // Filtrar datos según rol + filtro de agente/equipo
  const filtrarPorAg=(items,campoAgente)=>{
    if(filtroAg==="todos") return items;
    // Si filtroAg es un nombre de equipo (WIKUK/INTERKEY), filtrar por equipo
    if(filtroAg==="WIKUK"||filtroAg==="INTERKEY"){
      const idsEq=new Set(USUARIOS.filter(u=>u.rol==="agente"&&u.equipo===filtroAg).flatMap(u=>[u.id.toUpperCase(),(u.grupoAgente||"").toUpperCase()]).filter(Boolean));
      return items.filter(item=>idsEq.has((item[campoAgente]||"").toUpperCase()));
    }
    // Si es un ID de agente
    return items.filter(item=>(item[campoAgente]||"").toUpperCase()===filtroAg.toUpperCase());
  };

  const misMuestras=useMemo(()=>{
    let base;
    if(esDir) base=muestrasDB;
    else if(esJefe){
      const ags=new Set(agentesEquipo.flatMap(u=>[u.id.toUpperCase(),(u.grupoAgente||"").toUpperCase()]).filter(Boolean));
      base=muestrasDB.filter(m=>ags.has((m.agente||"").toUpperCase()));
    }else base=muestrasDB.filter(m=>appMisIds.has((m.agente||"").toUpperCase()));
    return filtrarPorAg(base,"agente");
  },[muestrasDB,usuario.id,filtroAg]);

  const misOpos=useMemo(()=>{
    let base;
    if(esDir) base=oportunidadesDB;
    else if(esJefe){
      const ags=new Set(agentesEquipo.map(u=>u.id));
      base=oportunidadesDB.filter(o=>ags.has(o.agente||o.agenteId));
    }else base=oportunidadesDB.filter(o=>esDelUsuario(o.agente,appMisIds)||esDelUsuario(o.agenteId,appMisIds));
    if(filtroAg!=="todos"){
      if(filtroAg==="WIKUK"||filtroAg==="INTERKEY"){
        const idsEq=new Set(USUARIOS.filter(u=>u.rol==="agente"&&u.equipo===filtroAg).map(u=>u.id));
        base=base.filter(o=>idsEq.has(o.agente||o.agenteId));
      }else{
        base=base.filter(o=>(o.agente||o.agenteId||"").toUpperCase()===filtroAg.toUpperCase());
      }
    }
    return base;
  },[oportunidadesDB,usuario.id,filtroAg]);

  const misInc=useMemo(()=>{
    let base;
    if(esDir) base=incidenciasDB;
    else if(esJefe) base=incidenciasDB.filter(i=>i.equipo===miEquipo);
    else base=incidenciasDB.filter(i=>i.autor===usuario.id);
    return filtrarPorAg(base,"autor");
  },[incidenciasDB,usuario.id,filtroAg]);

  const clientes=clientesDB?._todos||misClientesFB||[];

  // KPIs
  const mPend=misMuestras.filter(m=>m.estado==="pendiente").length;
  const mPos=misMuestras.filter(m=>m.estado==="positivo"||m.estado==="pedido").length;
  const mKo=misMuestras.filter(m=>m.estado==="ko").length;
  const oActivas=misOpos.filter(o=>!["ganada","perdida","cerrada_ganada","cerrada_perdida"].includes(o.estado||o.etapa)).length;
  const oGanadas=misOpos.filter(o=>o.estado==="ganada"||o.etapa==="ganada").length;
  const incAb=misInc.filter(i=>i.estado!=="cerrada"&&i.estado!=="resuelta").length;

  // Muestras por semana (últimas 8 semanas)
  const hoy=new Date();
  const semActual=Math.ceil(((hoy-new Date(hoy.getFullYear(),0,1))/86400000+new Date(hoy.getFullYear(),0,1).getDay()+1)/7);
  const semLabels=[];const semDatos=[];const semPos=[];
  for(let i=7;i>=0;i--){
    const s=semActual-i;
    semLabels.push("S"+s);
    semDatos.push(misMuestras.filter(m=>parseInt(m.semana)===s).length);
    semPos.push(misMuestras.filter(m=>parseInt(m.semana)===s&&(m.estado==="positivo"||m.estado==="pedido")).length);
  }

  // Muestras por agente
  const porAgente=useMemo(()=>{
    const map={};
    misMuestras.forEach(m=>{
      const ag=m.agente||"—";
      if(!map[ag]) map[ag]={total:0,positivo:0,ko:0,pendiente:0};
      map[ag].total++;
      if(m.estado==="positivo"||m.estado==="pedido") map[ag].positivo++;
      else if(m.estado==="ko") map[ag].ko++;
      else map[ag].pendiente++;
    });
    return Object.entries(map).map(([id,v])=>{
      const u=USUARIOS.find(u=>u.id===id);
      return{nombre:u?u.nombre:id,...v,tasa:v.total>0?Math.round(v.positivo/v.total*100):0};
    }).sort((a,b)=>b.total-a.total);
  },[misMuestras]);

  // Exportar funciones
  const exportMuestras=()=>exportarExcel(misMuestras,"Muestras",[
    {label:"Producto",key:"prod"},{label:"Cliente",key:"cliente"},{label:"Tipo",key:"tipo"},
    {label:"Semana",key:"semana"},{label:"Fecha",key:"fecha"},{label:"Estado",key:"estado"},
    {label:"Agente",key:"agente"},{label:"Equipo",key:"equipo"},
    {label:"Estado Muestra",key:"estadoMuestra"},{label:"Nota",key:"nota"},
    {label:"Comentarios",fn:m=>(m.historial||[]).length},

  const exportOpos=()=>exportarExcel(misOpos,"Oportunidades",[
    {label:"Nombre",fn:o=>o.nombre||o.cliente},{label:"Cliente",key:"cliente"},
    {label:"Estado",fn:o=>o.estado||o.etapa},{label:"Valor (€)",key:"valor"},
    {label:"Probabilidad (%)",key:"prob"},{label:"Agente",key:"agente"},
    {label:"Producto",key:"prod"},{label:"Fecha",key:"fecha"},
  ]);

  const exportClientes=()=>exportarExcel(clientes,"Clientes",[
    {label:"Nombre",fn:c=>c.nombre||c.NOMBRE},{label:"Contacto",key:"contacto"},
    {label:"Teléfono",key:"tel"},{label:"Email",key:"email"},
    {label:"Población",fn:c=>c.poblacion||c.ciudad||c.dir||""},{label:"País",key:"pais"},
    {label:"Agente",fn:c=>c.grupoAgente||c.GRUPOAGENTE||c.agente||""},{label:"Notas",key:"notas"},
  ]);

  const exportInc=()=>exportarExcel(misInc,"Incidencias",[
    {label:"Título",fn:i=>i.titulo||i.asunto},{label:"Cliente",key:"cliente"},
    {label:"Tipo",key:"tipo"},{label:"Estado",key:"estado"},
    {label:"Fecha",key:"fecha"},{label:"Descripción",key:"descripcion"},
  ]);

  const imprimirPDF=()=>{
    // Forzar todos los contenedores a mostrar contenido completo
    const root=document.getElementById("root");
    const origStyles=[];
    root.querySelectorAll("div").forEach(el=>{
      const s=el.style;
      origStyles.push({el,overflow:s.overflow,maxHeight:s.maxHeight,height:s.height,position:s.position,paddingBottom:s.paddingBottom});
      s.overflow="visible";s.maxHeight="none";s.height="auto";
      if(s.paddingBottom==="90px"||s.paddingBottom==="100px") s.paddingBottom="0px";
    });
    // Scroll al top
    window.scrollTo(0,0);
    setPrinting(true);
    setTimeout(()=>{
      window.print();
      // Restaurar estilos
      origStyles.forEach(({el,overflow,maxHeight,height,position,paddingBottom})=>{
        el.style.overflow=overflow;el.style.maxHeight=maxHeight;el.style.height=height;
        el.style.position=position;el.style.paddingBottom=paddingBottom;
      });
      setPrinting(false);
    },400);
  };

  return(
    <div id="reporting-print" style={{padding:"0 0 100px"}}>
      {/* Header visible solo al imprimir */}
      {printing&&(
        <div style={{padding:"20px 16px",borderBottom:"2px solid #0F172A",marginBottom:16}}>
          <p style={{margin:0,fontSize:22,fontWeight:900,color:"#0F172A"}}>📈 Informe CRM — Grupo Consolidado</p>
          <p style={{margin:"4px 0 0",fontSize:13,color:"#64748B"}}>
            {esDir?"Global":esJefe?`Equipo ${miEquipo}`:usuario.nombre} · Semana {semActual} · {new Date().toLocaleDateString("es-ES")}
          </p>
        </div>

      {/* Header */}
      <div style={{padding:"16px",marginBottom:8}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>

            <p style={{margin:0,fontSize:18,fontWeight:900,color:T.text}}>📈 Reporting</p>

              :esDir?"Global":esJefe?`Equipo ${miEquipo}`:"Mis datos"} · S{semActual} · {new Date().toLocaleDateString("es-ES")}
            </p>
          </div>
          <button onClick={imprimirPDF}
            style={{padding:"8px 16px",borderRadius:8,border:"none",background:T.navy,
