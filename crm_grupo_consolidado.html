                      fontSize:13,flexShrink:0}}>{hop?.label?.split(" ")[0]||"📌"}</div>
                    <div style={{flex:1}}>
                      {hop&&<Badge label={hop.label} color={hop.color}/>}
                      {h.nota&&<p style={{margin:"3px 0 0",fontSize:12,color:T.text,lineHeight:1.4}}>{h.nota}</p>}
                      <p style={{margin:"3px 0 0",fontSize:10,color:T.muted}}>{h.fecha}</p>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}
    </Card>
  );
}

function Informe({usuario, clientesFB}){
  // Wait for Firebase clients — show loading if empty
  const cargandoClientes = !clientesFB || clientesFB.length === 0;
  const clientes = clientesFB&&clientesFB.length>0 ? clientesFB : (CLIENTES_POR_AGENTE[usuario.id]||[]);
  // Semana real según fecha actual
  const getSemanaISO=()=>{
    const d=new Date();
    const startOfYear=new Date(d.getFullYear(),0,1);
    return Math.ceil(((d-startOfYear)/86400000+startOfYear.getDay()+1)/7);
  };
  const semana=getSemanaISO();
  const [step,setStep]=useState(0);
  const [ventas,setVentas]=useState({venta:"",mb:"",promo:"",liq:""});
  const [visitas,setVisitas]=useState({});
  const [muestras,setMuestras]=useState([]);
  const [enviado,setEnviado]=useState(false);

  // Ruta seleccionada y cliente seleccionado
  const [rutaSel,setRutaSel]=useState(null);
  const [clienteSel,setClienteSel]=useState(null);
  const [formV,setFormV]=useState({resultado:"pedido",notas:""});
  const [showNuevo,setShowNuevo]=useState(false);
  const [nuevosCreados,setNuevosCreados]=useState([]);
  const [micActivo,setMicActivo]=useState(false);
  const micRef=React.useRef(null);
  const fotoRef=React.useRef();

  const usarMicrofono=(onTexto)=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert("Micrófono no disponible. Usa Chrome o Edge.");return;}
    if(micActivo){micRef.current?.stop();setMicActivo(false);return;}
    const r=new SR();
    r.lang="es-ES"; r.continuous=false; r.interimResults=false;
    micRef.current=r;
    r.onstart=()=>setMicActivo(true);
    r.onend=()=>setMicActivo(false);
    r.onerror=()=>setMicActivo(false);
    r.onresult=(e)=>{
      const txt=e.results[0][0].transcript;
      onTexto(txt);
    };
    r.start();
  };

  const guardarNuevo=(formData)=>{
    if(!formData.nombre.trim()) return;
    const nuevoC={
      id:`NUEVO-${Date.now()}`,
      nombre:formData.nombre.trim(),
      contacto:formData.contacto,
      telefono:formData.telefono,
      email:formData.email,
      poblacion:formData.poblacion,
      empresa:formData.empresa,
      ruta:rutaSel,
      agente:usuario.id,
      equipo:usuario.equipo||"",
      fechaAlta:new Date().toLocaleDateString("es-ES"),
      semana,
      esNuevo:true
    };
    fbEscribir("clientes", nuevoC.id, nuevoC);
    setNuevosCreados(p=>[...p,nuevoC]);
    setClienteSel(nuevoC);
    setFormV({resultado:"primera_visita",notas:""});
    setShowNuevo(false);
  };

  const RESULTADOS=[
    {k:"pedido",           label:"✅ Pedido",          color:T.green},
    {k:"llamada",          label:"📞 Llamada",          color:T.blue},
    {k:"visita_sin_pedido",label:"👋 Visita s/pedido",  color:T.amber},
    {k:"no_contesta",      label:"📵 No contesta",      color:T.muted},
    {k:"primera_visita",   label:"🆕 Primera visita",   color:T.purple},
  ];

  const PASOS=[
    {id:"ventas",      icon:"💰",label:"Ventas"},
    {id:"visitas",     icon:"👥",label:"Visitas"},
    {id:"recuperacion",icon:"🎯",label:"Estrategias"},
    {id:"muestras",    icon:"📦",label:"Muestras"},
    {id:"resumen",     icon:"📤",label:"Enviar"},
  ];

  const [avances,setAvances]=useState({}); // {[estrategiaId]: {resultado, nota}}
  const misEstrategias=ESTRATEGIAS_SEED.filter(e=>e.agente===usuario.id&&e.estado==="en_curso");

  // Detectar campo de ruta — Firebase usa SEMANAVISITA, local usa ruta/semana
  const getRouteNum2=(c)=>{
    if(c.ruta&&Number(c.ruta)>0) return Number(c.ruta);
    if(c.SEMANAVISITA&&Number(c.SEMANAVISITA)>0) return Number(c.SEMANAVISITA);
    if(c.semanaVisita&&Number(c.semanaVisita)>0) return Number(c.semanaVisita);
    if(c.semana&&Number(c.semana)>0) return Number(c.semana);
    if(Array.isArray(c.semanas)&&c.semanas.length>0) return Number(c.semanas[0])||0;
    return 0;
  };
  const rutasDisp=[...new Set(clientes.map(c=>getRouteNum2(c)).filter(r=>r>0))].sort((a,b)=>a-b);
  const visitasDone=Object.keys(visitas).length;
  const ventasOk=ventas.venta&&ventas.mb;

  const guardarVisita=()=>{
    if(!clienteSel||!formV.resultado) return;
    const fecha=new Date().toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit",year:"2-digit"});
    const visitaDoc={
      clienteId:clienteSel.id,
      clienteNombre:clienteSel.nombre,
      resultado:formV.resultado,
      notas:formV.notas,
      fecha,
      semana,
      agente:usuario.id,
      equipo:usuario.equipo||"",
    };
    // Guardar visita en Firebase
    fbEscribir("visitas", `${usuario.id}_${clienteSel.id}_sem${semana}`, visitaDoc);

    setVisitas(prev=>{
      const existing=prev[clienteSel.id];
      const historial=existing
        ?[...(existing.historial||[]),{resultado:existing.resultado,notas:existing.notas||"",fecha:existing.fecha}]
        :[];
      return{...prev,[clienteSel.id]:{clienteNombre:clienteSel.nombre,resultado:formV.resultado,notas:formV.notas,fecha,historial}};
    });
    setFormV({resultado:"pedido",notas:""});
    setClienteSel(null);
  };

  if(cargandoClientes){
    return(
      <div style={{padding:"40px 20px",textAlign:"center"}}>
        <div style={{fontSize:48,marginBottom:16}}>⏳</div>
        <p style={{fontSize:16,fontWeight:700,color:"#0F172A",marginBottom:8}}>Cargando tus clientes...</p>
        <p style={{fontSize:13,color:"#64748B",marginBottom:24}}>Conectando con Firebase</p>
        <div style={{width:200,height:4,background:"#E2E8F0",borderRadius:99,margin:"0 auto",overflow:"hidden"}}>
          <div style={{width:"60%",height:"100%",background:"#0F172A",borderRadius:99,
            animation:"slide 1.5s ease-in-out infinite"}}/>
        </div>
        <style>{`@keyframes slide{0%{transform:translateX(-100%)}100%{transform:translateX(250%)}}`}</style>
      </div>
    );
  }

  if(enviado){
    return(
      <div style={{padding:"40px 24px",textAlign:"center"}}>
        <div style={{fontSize:64,marginBottom:16}}>🎉</div>
        <p style={{margin:"0 0 8px",fontSize:22,fontWeight:900,color:T.text}}>¡Informe enviado!</p>
        <p style={{margin:"0 0 24px",fontSize:14,color:T.muted}}>Semana 14 registrada correctamente</p>
        <Card style={{textAlign:"left",marginBottom:16}}>
          {[
            {icon:"💰",label:"Ventas",v:`${fmt(parseInt(ventas.venta)||0)}€`},
            {icon:"📊",label:"MB",v:`${ventas.mb||0}%`},
            {icon:"👥",label:"Visitas",v:`${visitasDone}/${clientes.length}`},
            {icon:"📦",label:"Muestras",v:`${muestras.reduce((s,m)=>s+(parseInt(m.uds)||0),0)} uds`},
          ].map(r=>(
            <div key={r.label} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:`1px solid ${T.border}`}}>
              <span style={{fontSize:13,color:T.muted}}>{r.icon} {r.label}</span>
              <span style={{fontSize:13,fontWeight:700,color:T.text}}>{r.v}</span>
            </div>
          ))}
        </Card>
        <Btn full onClick={()=>{setEnviado(false);setStep(0);setVentas({venta:"",mb:"",promo:"",liq:""});setVisitas({});setMuestras([]);setRutaSel(null);setClienteSel(null);}} color={T.navy}>
          Nuevo informe
        </Btn>
      </div>
    );
  }

  return(
    <div style={{padding:"16px 16px 100px"}}>
      {/* Stepper */}
      <div style={{display:"flex",gap:4,marginBottom:24}}>
        {PASOS.map((p,i)=>{
          const done=i<step,active=i===step;
          return(
            <button key={p.id} onClick={()=>setStep(i)}
              style={{flex:1,padding:"10px 4px",borderRadius:12,border:`1px solid ${active?usuario.color:done?T.green:T.border}`,
                background:active?usuario.color:done?T.greenL:T.white,
                cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,
                boxShadow:"0 1px 3px #0001"}}>
              <span style={{fontSize:18}}>{done?"✅":p.icon}</span>
              <span style={{fontSize:9,fontWeight:700,color:active?"#fff":done?T.greenD:T.muted}}>{p.label}</span>
            </button>
          );
        })}
      </div>

      {/* PASO 0 — Ventas */}
      {step===0&&(
        <div>
          <p style={{margin:"0 0 20px",fontSize:17,fontWeight:800,color:T.text}}>💰 ¿Cuánto has vendido esta semana?</p>
          {[
            {k:"venta",label:"Ventas totales",icon:"💰",placeholder:"ej: 24500",sufijo:"€"},
            {k:"mb",label:"Margen bruto (MB%)",icon:"📊",placeholder:"ej: 34",sufijo:"%"},
            {k:"promo",label:"Ventas promo",icon:"🎯",placeholder:"ej: 1200",sufijo:"€"},
            {k:"liq",label:"Liquidación",icon:"📋",placeholder:"ej: 800",sufijo:"€"},
          ].map(f=>(
            <div key={f.k} style={{marginBottom:14}}>
              <p style={{margin:"0 0 6px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>{f.icon} {f.label}</p>
              <div style={{position:"relative"}}>
                <input type="number" value={ventas[f.k]} onChange={e=>setVentas(v=>({...v,[f.k]:e.target.value}))}
                  placeholder={f.placeholder}
                  style={{width:"100%",border:`1.5px solid ${ventas[f.k]?T.blue:T.border}`,borderRadius:11,
                    padding:"13px 40px 13px 14px",fontSize:15,outline:"none",boxSizing:"border-box"}}/>
                <span style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",
                  fontSize:13,fontWeight:700,color:T.muted}}>{f.sufijo}</span>
              </div>
            </div>
          ))}
          <Btn full onClick={()=>setStep(1)} color={usuario.color} disabled={!ventasOk}>
            Siguiente → Visitas
          </Btn>
        </div>
      )}

      {/* PASO 1 — Visitas con flujo de ruta */}
      {step===1&&(()=>{
        // Sub-pantalla: detalle de visita a cliente
        if(clienteSel){
          const vExist=visitas[clienteSel.id];
          const hist=vExist?.historial||[];
          return(
            <div>
              <BackBar label={`Ruta ${rutaSel}`} onBack={()=>setClienteSel(null)}/>
              {/* Ficha cliente */}
              <Card style={{marginBottom:16}}>
                <p style={{margin:"0 0 4px",fontSize:16,fontWeight:800,color:T.text}}>{clienteSel.nombre}</p>
                {clienteSel.tel&&<p style={{margin:"0 0 2px",fontSize:12,color:T.muted}}>📞 {clienteSel.tel}</p>}
                {clienteSel.dir&&<p style={{margin:0,fontSize:12,color:T.muted}}>📍 {clienteSel.dir}</p>}
                {vExist&&(
                  <div style={{marginTop:8,display:"inline-flex",gap:6,padding:"4px 10px",
                    background:T.greenL,borderRadius:6,fontSize:11,color:T.green,fontWeight:700}}>
                    ✓ Ya registrado esta semana
                  </div>
                )}
              </Card>
              {/* Resultado */}
              <p style={{margin:"0 0 8px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Resultado de la visita</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:16}}>
                {RESULTADOS.map(r=>(
                  <button key={r.k} onClick={()=>setFormV(f=>({...f,resultado:r.k}))}
                    style={{padding:"9px 14px",borderRadius:10,
                      border:`2px solid ${formV.resultado===r.k?r.color:T.border}`,
                      background:formV.resultado===r.k?r.color+"15":"transparent",
                      color:formV.resultado===r.k?r.color:T.muted,
                      fontWeight:formV.resultado===r.k?700:400,fontSize:12,cursor:"pointer"}}>
                    {r.label}
                  </button>
                ))}
              </div>
              {/* Notas */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <p style={{margin:0,fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Notas</p>
                <button onClick={()=>usarMicrofono(txt=>setFormV(f=>({...f,notas:f.notas?f.notas+" "+txt:txt})))}
                  style={{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",
                    borderRadius:99,border:"1.5px solid "+(micActivo?"#EF4444":T.border),
                    background:micActivo?"#FEF2F2":"#F8FAFC",
                    color:micActivo?"#EF4444":T.muted,
                    fontSize:11,fontWeight:700,cursor:"pointer"}}>
                  {micActivo?"⏹ Escuchando...":"🎤 Dictar nota"}
                </button>
              </div>
              <textarea value={formV.notas} onChange={e=>setFormV(f=>({...f,notas:e.target.value}))} rows={3}
                placeholder={micActivo?"🎤 Escucha activa — habla ahora...":"Qué se habló, próximos pasos, interés en productos…"}
                style={{width:"100%",
                  border:`1.5px solid ${micActivo?"#EF4444":formV.notas?T.blue:T.border}`,
                  borderRadius:10,padding:"12px",fontSize:13,resize:"none",outline:"none",
                  boxSizing:"border-box",lineHeight:1.5,fontFamily:"inherit",marginBottom:16,
                  background:micActivo?"#FEF2F2":"#fff"}}/>
              <button onClick={guardarVisita}
                style={{width:"100%",padding:"14px",borderRadius:12,border:"none",
                  background:T.navy,color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer",marginBottom:16}}>
                Guardar visita →
              </button>
              {/* Histórico */}
              {hist.length>0&&(
                <div>
                  <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
                    🕐 Historial ({hist.length} visita{hist.length!==1?"s":""})
                  </p>
                  {hist.map((h,i)=>{
                    const hr=RESULTADOS.find(r=>r.k===h.resultado);
                    return(
                      <Card key={i} style={{marginBottom:8,padding:"12px 14px"}}>
                        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:h.notas?4:0}}>
                          {hr&&<Badge label={hr.label} color={hr.color}/>}
                          <span style={{fontSize:10,color:T.muted,marginLeft:"auto"}}>{h.fecha}</span>
                        </div>
                        {h.notas&&<p style={{margin:0,fontSize:12,color:T.text,lineHeight:1.5}}>{h.notas}</p>}
                      </Card>
                    );
                  })}
                </div>
              )}
            </div>
          );
        }

        // Sub-pantalla: lista de clientes de la ruta seleccionada
        if(rutaSel!==null){
          const clientesRuta=clientes.filter(c=>getRouteNum2(c)===rutaSel);
          const nuevosDeRuta=nuevosCreados.filter(c=>c.ruta===rutaSel);

          // ── Pantalla: nuevo cliente ──────────────────────────────
          if(showNuevo){
            return(
              <NuevoClienteForm
                ruta={rutaSel}
                onBack={()=>setShowNuevo(false)}
                onGuardar={guardarNuevo}
              />
            );
          }

          return(
            <div>
              <BackBar label="Cambiar ruta" onBack={()=>setRutaSel(null)}/>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                <div>
                  <p style={{margin:0,fontSize:17,fontWeight:800,color:T.text}}>Ruta {rutaSel}</p>
                  <p style={{margin:"2px 0 0",fontSize:12,color:T.muted}}>
                    {clientesRuta.length+nuevosDeRuta.length} clientes · {[...clientesRuta,...nuevosDeRuta].filter(c=>visitas[c.id]).length} visitados
                  </p>
                </div>
                <div style={{background:T.greenL,borderRadius:99,padding:"5px 14px"}}>
                  <span style={{fontSize:13,fontWeight:700,color:T.green}}>
                    {[...clientesRuta,...nuevosDeRuta].filter(c=>visitas[c.id]).length}/{clientesRuta.length+nuevosDeRuta.length}
                  </span>
                </div>
              </div>

              {/* Clientes de la ruta */}
              {[...clientesRuta,...nuevosDeRuta].map(c=>{
                const v=visitas[c.id];
                const rOp=RESULTADOS.find(r=>r.k===v?.resultado);
                return(
                  <Card key={c.id} onClick={()=>{setClienteSel(c);setFormV({resultado:"pedido",notas:""}); }}
                    style={{marginBottom:8,padding:"13px 16px",cursor:"pointer",
                      borderLeft:`4px solid ${rOp?rOp.color:T.border}`}}>
                    <div style={{display:"flex",gap:10,alignItems:"center"}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:2}}>
                          <p style={{margin:0,fontSize:13,fontWeight:700,color:T.text,
                            overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.nombre}</p>
                          {c.esNuevo&&<span style={{fontSize:9,fontWeight:700,color:T.purple,
                            background:T.purpleL,borderRadius:99,padding:"1px 7px",flexShrink:0}}>NUEVO</span>}
                        </div>
                        <div style={{display:"flex",gap:6,marginTop:3,alignItems:"center"}}>
                          {rOp?<Badge label={rOp.label} color={rOp.color}/>
                          :<span style={{fontSize:11,color:T.muted}}>Sin registrar</span>}
                          {v?.notas&&<span style={{fontSize:10,color:T.muted,fontStyle:"italic",
                            overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:120}}>
                            · {v.notas}
                          </span>}
                        </div>
                      </div>
                      {(v?.historial?.length||0)>0&&(
                        <span style={{fontSize:10,fontWeight:700,color:T.blue,
                          background:T.blueL,borderRadius:99,padding:"2px 7px",flexShrink:0}}>
                          {v.historial.length} prev.
                        </span>
                      )}
                      <span style={{color:T.muted,fontSize:18}}>›</span>
                    </div>
                  </Card>
                );
              })}

              {/* Botón nuevo cliente */}
              <button onClick={()=>setShowNuevo(true)}
                style={{width:"100%",padding:"13px",borderRadius:12,marginBottom:16,marginTop:4,
                  border:`2px dashed ${T.purple}`,background:T.purpleL,
                  color:T.purple,fontWeight:700,fontSize:13,cursor:"pointer",
                  display:"flex",gap:8,alignItems:"center",justifyContent:"center"}}>
                <span style={{fontSize:18}}>🆕</span> Añadir cliente nuevo
              </button>

              <div style={{display:"flex",gap:8}}>
                <Btn onClick={()=>setRutaSel(null)} outline color={T.navy}>← Rutas</Btn>
                <Btn full onClick={()=>setStep(2)} color={usuario.color}>Siguiente → Recuperación</Btn>
              </div>
            </div>
          );
        }

        // Pantalla principal: selección de ruta
        return(
          <div>
            <p style={{margin:"0 0 4px",fontSize:17,fontWeight:800,color:T.text}}>👥 ¿Qué ruta haces hoy?</p>
            <p style={{margin:"0 0 18px",fontSize:12,color:T.muted}}>Selecciona la ruta para ver tus clientes</p>
            {rutasDisp.map(r=>{
              const cli=clientes.filter(c=>getRouteNum2(c)===r);
              const visitados=cli.filter(c=>visitas[c.id]).length;
              return(
                <div key={r} onClick={()=>setRutaSel(r)}
                  style={{background:T.white,borderRadius:14,border:`1px solid ${T.border}`,
                    padding:"18px 20px",marginBottom:10,cursor:"pointer",
                    display:"flex",alignItems:"center",gap:16,
                    boxShadow:"0 1px 4px #0001"}}>
                  <div style={{width:48,height:48,borderRadius:12,background:T.navy,
                    color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",
                    fontSize:22,fontWeight:900,flexShrink:0}}>{r}</div>
                  <div style={{flex:1}}>
                    <p style={{margin:"0 0 3px",fontSize:15,fontWeight:700,color:T.text}}>Ruta {r}</p>
                    <p style={{margin:0,fontSize:12,color:T.muted}}>
                      {cli.length} clientes{visitados>0?` · ${visitados} visitados`:""}
                    </p>
                  </div>
                  {visitados>0&&(
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <span style={{fontSize:13,fontWeight:700,
                        color:visitados===cli.length?T.green:T.amber}}>
                        {visitados}/{cli.length}
                      </span>
                    </div>
                  )}
                  <span style={{color:T.muted,fontSize:20}}>›</span>
                </div>
              );
            })}
          </div>
        );
      })()}

      {/* PASO 2 — Recuperación de clientes */}
      {step===2&&(
        <RecuperacionStep
          estrategias={misEstrategias}
          onBack={()=>setStep(1)}
          onNext={()=>setStep(3)}
          color={usuario.color}
          uid={usuario.id}
          todosClientes={clientes}
        />
      )}

      {/* PASO 3 — Muestras con buscador */}
      {step===3&&(
        <MuestrasStep
          muestras={muestras}
          onAdd={m=>setMuestras(mm=>[...mm,m])}
          onDel={id=>setMuestras(mm=>mm.filter(m=>m.id!==id))}
          onEdit={m=>setMuestras(mm=>mm.map(x=>x.id===m.id?m:x))}
          clientes={clientes}
          onBack={()=>setStep(2)}
          onNext={()=>setStep(4)}
          color={usuario.color}
        />
      )}

      {/* PASO 4 — Resumen */}
      {step===4&&(
        <div>
          <p style={{margin:"0 0 20px",fontSize:17,fontWeight:800,color:T.text}}>📤 Resumen semanal</p>
          {[
            {icon:"💰",label:"Ventas",       v:`${fmt(parseInt(ventas.venta)||0)}€`,        ok:!!ventas.venta},
            {icon:"📊",label:"Margen",       v:`${ventas.mb||0}%`,                          ok:!!ventas.mb},
            {icon:"👥",label:"Visitas",      v:`${visitasDone}/${clientes.length}`,          ok:visitasDone===clientes.length},
            {icon:"🎯",label:"Recuperación", v:`${Object.keys(avances).length}/${misEstrategias.length} registradas`, ok:Object.keys(avances).length===misEstrategias.length||misEstrategias.length===0},
            {icon:"📦",label:"Muestras",     v:`${muestras.length} productos`,              ok:true},
          ].map(r=>(
            <div key={r.label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
              padding:"14px 0",borderBottom:`1px solid ${T.border}`}}>
              <span style={{fontSize:14,color:T.muted}}>{r.icon} {r.label}</span>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <span style={{fontSize:14,fontWeight:700,color:T.text}}>{r.v}</span>
                <span style={{fontSize:16}}>{r.ok?"✅":"⚠️"}</span>
              </div>
            </div>
          ))}
          <div style={{height:20}}/>
          <div style={{display:"flex",gap:8}}>
            <Btn onClick={()=>setStep(3)} outline color={T.muted}>← Atrás</Btn>
            <Btn full onClick={()=>{
              const doc={
                id:`informe_${usuario.id}_s${semana}`,
                agente:usuario.id,
                agenteNombre:usuario.nombre,
                grupoAgente:usuario.grupoAgente||usuario.id,
                equipo:usuario.equipo||"",
                semana,
                ano:new Date().getFullYear(),
                fechaEnvio:new Date().toLocaleDateString("es-ES"),
                ventas:parseFloat(ventas.venta||0),
                mb:parseFloat(ventas.mb||0),
                promo:parseFloat(ventas.promo||0),
                liq:parseFloat(ventas.liq||0),
                numVisitas:Object.keys(visitas).length,
                numMuestras:muestras.length,
                estado:"enviado",
              };
              fbEscribir("informes", doc.id, doc).then(()=>{
                setEnviado(true);
              }).catch(()=>setEnviado(true));
            }} color={T.green}>🚀 Enviar informe</Btn>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── MIS MUESTRAS ─────────────────────────────────────────────────
function MisMuestras({usuario, clientesFB, onAbrirCliente, onIrASeccion}){
  const [muestras,setMuestras]=useState([]);
  const [cargando,setCargando]=useState(true);
  const [sel,setSel]=useState(null);
  const [fb,setFb]=useState("positivo");
  const [nota,setNota]=useState("");
  const [motivo,setMotivo]=useState("");
  const [comentario,setComentario]=useState("");
  const [filtro,setFiltro]=useState("pendiente");
  const [filtroAgente,setFiltroAgente]=useState("todos");
  const [filtroEquipoMue,setFiltroEquipoMue]=useState("todos");
  const [agenteSelMue,setAgenteSelMue]=useState(null);
  const [showNueva,setShowNueva]=useState(false);
  const [nuevaForm,setNuevaForm]=useState({clienteNombre:"",prod:"",tipo:"Deshidratada",uds:"",nota:""});
  const [showNuevoCliente,setShowNuevoCliente]=useState(false);
  const [nuevoCliente,setNuevoCliente]=useState({nombre:"",contacto:"",tel:"",email:"",poblacion:"",pais:"España",notas:""});

  const esAgente=usuario.rol==="agente";
  const esJefe=usuario.rol==="jefe";
  const esDir=["director","ceo"].includes(usuario.rol);
  const esJefeOmas=esJefe||esDir;
  const miEquipo=usuario.equipo;
  const agentesEquipo=USUARIOS.filter(u=>u.rol==="agente"&&(esDir||u.equipo===miEquipo));

  // Resolver todos los IDs CRM del usuario
  const misIds=resolverMisIds(usuario);

  useEffect(()=>{
    fbLeer("muestras").then(data=>{
      if(data.length===0){setMuestras(MUESTRAS_SEED);setCargando(false);return;}
      let propias;
      if(esAgente){
        // Agente: solo las suyas
        propias=data.filter(m=>!m.eliminada&&misIds.has((m.agente||"").toUpperCase()));
      } else if(esJefe){
        // Jefe: todas las de su equipo
        const idsEquipo=new Set(agentesEquipo.map(a=>a.id.toUpperCase()));
        agentesEquipo.forEach(a=>{if(a.grupoAgente)idsEquipo.add(a.grupoAgente.toUpperCase());});
        propias=data.filter(m=>!m.eliminada&&idsEquipo.has((m.agente||"").toUpperCase()));
      } else {
        // Director/CEO: todas
        propias=data.filter(m=>!m.eliminada);
      }
      setMuestras(propias);
    }).catch(()=>{
      setMuestras(MUESTRAS_SEED);
    }).finally(()=>setCargando(false));
  },[usuario.id]);

  const DEPTOS=[
    {k:"calidad",   icon:"🔬",label:"Calidad"},
    {k:"id",        icon:"⚗️", label:"I+D"},
    {k:"produccion",icon:"🏭",label:"Producción"},
    {k:"direccion", icon:"📊",label:"Dirección"},
  ];

  const FEEDBACK=[
    {k:"positivo",  icon:"✅",label:"Le gusta",          color:T.green},
    {k:"pedido",    icon:"🛒",label:"Ha pedido",          color:T.blue},
    {k:"proyecto",  icon:"🚀",label:"Enviar a Proyecto",  color:T.purple},
    {k:"ko",        icon:"❌",label:"No le gusta",        color:T.red},
  ];

  const [proyForm,setProyForm]=useState({nombre:"",deptos:[],nota:""});
  const guardar=()=>{
    if(fb==="proyecto"){
      const hoy=new Date().toLocaleDateString("es-ES");
      const proyId="PROY_"+Date.now();
      const updatedM={...sel,estado:"proyecto",nota,fechaFeedback:hoy,proyectoId:proyId};
      setMuestras(mm=>mm.map(m=>m.id===sel.id?updatedM:m));
      fbEscribir("muestras",sel.id,updatedM);
      const p={id:proyId,nombre:proyForm.nombre||(sel.prod+" — "+(sel.cliente||"")),
        cliente:sel.cliente||"",clienteId:sel.clienteId||"",
        producto:sel.prod||"",muestraId:sel.id,
        estado:"activo",tipo:"industrial",inicio:hoy,fin:"",
        responsableComercial:usuario.id,responsableNombre:usuario.nombre,
        agente:usuario.id,equipo:usuario.equipo||"",
        deptos:proyForm.deptos,nota:proyForm.nota||nota,progreso:0,
        hitos:[
          {nombre:"Muestra aprobada por cliente",hecho:true,fecha:hoy},
          {nombre:"Prueba industrial programada",hecho:false,fecha:""},
          {nombre:"Prueba industrial realizada",hecho:false,fecha:""},
          {nombre:"Pedido industrial confirmado",hecho:false,fecha:""},
        ],
        historial:[{accion:"🚀 Proyecto creado desde muestra",por:usuario.nombre,fecha:hoy,
          nota:"Muestra: "+sel.prod+" · Cliente: "+(sel.cliente||"")}],
      };
      fbEscribir("proyectos",proyId,p).then(()=>alert("✅ Proyecto industrial creado"));
      setSel(null);setNota("");setFb("");setProyForm({nombre:"",deptos:[],nota:""});
      return;
    }
    const updated={...sel,estado:fb,nota,motivo:motivo||"",fechaFeedback:new Date().toLocaleDateString("es-ES")};
    setMuestras(mm=>mm.map(m=>m.id===sel.id?updated:m));
    fbEscribir("muestras",sel.id,updated);
    // Notificar resultado positivo al jefe
    if(fb==="positivo"||fb==="pedido"){
      const jefe=USUARIOS.find(u=>(u.rol==="jefe"||u.rol==="director")&&(u.equipo===usuario.equipo||!u.equipo));
      if(jefe && jefe.id!==usuario.id){
        despacharNotificacion({tipo:"muestra",titulo:`📦 Muestra positiva: ${sel.prod||""} — ${sel.cliente||""}`,
          mensaje:`${usuario.nombre} ha registrado resultado ${fb}. Motivo: ${motivo||"N/A"}. ${nota||""}`,
          destinatarioId:jefe.id,prioridad:"alta",creadoPor:usuario.id});
      }
    }
    setSel(null); setNota(""); setMotivo("");
  };

  const visiblesPorAg=(filtroAgente==="todos"?muestras:muestras.filter(m=>(m.agente||"").toUpperCase()===filtroAgente.toUpperCase()))
    .filter(m=>{
      if(filtroEquipoMue==="todos") return true;
      const usr=USUARIOS.find(u=>u.id===m.agente||(u.grupoAgente||"").toUpperCase()===(m.agente||"").toUpperCase());
      return usr&&usr.equipo&&usr.equipo.toUpperCase()===filtroEquipoMue.toUpperCase();
    })
    .filter(m=>{
      if(!agenteSelMue) return true;
      if(m.agente===agenteSelMue) return true;
      const usr=USUARIOS.find(u=>u.id===agenteSelMue);
      return usr&&usr.grupoAgente&&(m.agente||"").toUpperCase()===usr.grupoAgente.toUpperCase();
    });
  const visibles=filtro==="todas"?visiblesPorAg:filtro==="positivo"?visiblesPorAg.filter(m=>m.estado==="positivo"||m.estado==="pedido"):visiblesPorAg.filter(m=>m.estado===filtro);
  const pend=visiblesPorAg.filter(m=>m.estado==="pendiente").length;
  const pos=visiblesPorAg.filter(m=>m.estado==="positivo"||m.estado==="pedido").length;
  const ko=visiblesPorAg.filter(m=>m.estado==="ko").length;

  // Contar muestras por agente (para jefe/director)
  const muestrasPorAg=useMemo(()=>{
    const map={};
    muestras.forEach(m=>{
      const ag=(m.agente||"desconocido");
      if(!map[ag]) map[ag]=0;
      map[ag]++;
    });
    return map;
  },[muestras]);

  if(cargando) return <div style={{padding:40,textAlign:"center",color:T.muted}}>⏳ Cargando muestras…</div>;

  if(sel){
    const esPendiente=sel.estado==="pendiente";
    const estadoSel={
      pendiente:{icon:"⏳",color:T.amber,label:"Pendiente"},
      positivo: {icon:"✅",color:T.green, label:"Le gusta"},
      pedido:   {icon:"🛒",color:T.blue,  label:"Ha pedido"},
      ko:       {icon:"❌",color:T.red,   label:"No le gusta"},
      proyecto: {icon:"🚀",color:T.purple,label:"Enviado a proyecto"},
    }[sel.estado]||{icon:"⏳",color:T.muted,label:sel.estado};
    const fbObj=FEEDBACK.find(f=>f.k===fb);
    return(
      <div style={{padding:"20px 16px 100px"}}>
        <BackBar label="Volver" onBack={()=>setSel(null)}/>

        {/* Cabecera muestra */}
        <Card style={{marginBottom:16}}>
          <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:12}}>
            <span style={{fontSize:32}}>📦</span>
            <div style={{flex:1}}>
              <p style={{margin:0,fontSize:16,fontWeight:800,color:T.text}}>{sel.prod}</p>
              <p style={{margin:"2px 0 0",fontSize:12,color:T.muted}}>
                {onAbrirCliente?<span onClick={(e)=>{e.stopPropagation();onAbrirCliente(sel.cliente);}} style={{color:T.blue,cursor:"pointer",textDecoration:"underline",fontWeight:600}}>{sel.cliente}</span>:sel.cliente}
                {" · "}{sel.tipo} · S{sel.semana}
              </p>
            </div>
            <span style={{fontSize:12,fontWeight:700,color:estadoSel.color,background:estadoSel.color+"15",
              padding:"4px 10px",borderRadius:8}}>{estadoSel.icon} {estadoSel.label}</span>
          </div>

          {/* Detalles */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,fontSize:12,color:T.muted}}>
            {sel.fecha&&<div>📅 Fecha: <b style={{color:T.text}}>{sel.fecha}</b></div>}
            {sel.semana&&<div>📆 Semana: <b style={{color:T.text}}>S{sel.semana}</b></div>}
            {sel.tipo&&<div>🏷️ Tipo: <b style={{color:T.text}}>{sel.tipo}</b></div>}
            {sel.equipo&&<div>🏢 Equipo: <b style={{color:T.text}}>{sel.equipo}</b></div>}
            {sel.estadoMuestra&&<div>📦 Envío: <b style={{color:T.text}}>{sel.estadoMuestra}</b></div>}
            {sel.uds&&<div>📏 Cantidad: <b style={{color:T.text}}>{sel.uds}</b></div>}
          </div>
          {sel.proyectoId&&(
            <div onClick={()=>onIrASeccion&&onIrASeccion("proyectos")} style={{marginTop:8,padding:"8px 12px",background:T.purple+"12",borderRadius:8,border:`1px solid ${T.purple}33`,cursor:onIrASeccion?"pointer":"default"}}>
              <p style={{margin:0,fontSize:12,fontWeight:700,color:T.purple}}>🚀 Vinculada a proyecto: {sel.proyectoId} {onIrASeccion?"→":""}</p>
            </div>
          )}
        </Card>

        {/* ── Historial de comentarios ── */}
        <Card style={{marginBottom:16}}>
          <p style={{margin:"0 0 12px",fontSize:14,fontWeight:800,color:T.text}}>💬 Comentarios e historial</p>

          {/* Nota principal (legacy) */}
          {sel.nota&&(
            <div style={{padding:"10px 14px",background:estadoSel.color+"10",borderRadius:10,
              border:`1px solid ${estadoSel.color}33`,marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:11,fontWeight:700,color:estadoSel.color}}>{estadoSel.icon} Feedback</span>
                {sel.fechaFeedback&&<span style={{fontSize:10,color:T.muted}}>{sel.fechaFeedback}</span>}
              </div>
              <p style={{margin:0,fontSize:13,color:T.text,lineHeight:1.5}}>"{sel.nota}"</p>
            </div>
          )}

          {/* Historial de comentarios */}
          {(sel.historial||[]).map((c,i)=>(
            <div key={i} style={{padding:"10px 14px",background:T.bg,borderRadius:10,
              border:`1px solid ${T.border}`,marginBottom:6}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:11,fontWeight:700,color:T.blue}}>💬 {c.por||usuario.nombre}</span>
                <span style={{fontSize:10,color:T.muted}}>{c.fecha}</span>
              </div>
              <p style={{margin:0,fontSize:13,color:T.text,lineHeight:1.5}}>{c.texto}</p>
            </div>
          ))}

          {(!sel.nota&&(!sel.historial||sel.historial.length===0))&&(
            <p style={{margin:0,fontSize:12,color:T.muted,fontStyle:"italic",padding:"8px 0"}}>
              Sin comentarios todavía
            </p>
          )}

          {/* Añadir comentario — siempre visible */}
          <div style={{marginTop:10,display:"flex",gap:8}}>
            <textarea value={comentario} onChange={e=>setComentario(e.target.value)}
              placeholder="Añadir comentario..."
              rows={2} style={{flex:1,padding:"10px 12px",borderRadius:10,border:`1.5px solid ${T.border}`,
                fontSize:13,outline:"none",boxSizing:"border-box",resize:"none",fontFamily:"inherit"}}/>
            <button onClick={()=>{
              if(!comentario.trim()) return;
              const hoy=new Date().toLocaleDateString("es-ES");
              const nuevoComentario={texto:comentario.trim(),por:usuario.nombre,fecha:hoy};
              const updated={...sel,historial:[...(sel.historial||[]),nuevoComentario]};
              setMuestras(mm=>mm.map(m=>m.id===sel.id?updated:m));
              fbEscribir("muestras",sel.id,updated);
              setSel(updated);
              setComentario("");
            }} disabled={!comentario.trim()}
              style={{padding:"10px 16px",borderRadius:10,border:"none",alignSelf:"flex-end",
                background:comentario.trim()?T.navy:"#E2E8F0",color:comentario.trim()?"#fff":"#94A3B8",
                fontSize:13,fontWeight:700,cursor:comentario.trim()?"pointer":"default",flexShrink:0}}>
              📤
            </button>
          </div>
        </Card>

        {/* Si es pendiente → formulario de feedback */}
        {esPendiente&&(<>
          <p style={{margin:"0 0 12px",fontSize:15,fontWeight:800,color:T.text}}>¿Qué dice el cliente?</p>
          {FEEDBACK.map(f=>(
            <button key={f.k} onClick={()=>setFb(f.k)}
              style={{width:"100%",padding:"16px",borderRadius:13,border:`2px solid ${fb===f.k?f.color:T.border}`,
                background:fb===f.k?f.color+"12":"#fff",display:"flex",gap:14,alignItems:"center",
                cursor:"pointer",marginBottom:10}}>
              <span style={{fontSize:28}}>{f.icon}</span>
              <p style={{margin:0,fontSize:16,fontWeight:fb===f.k?800:500,color:fb===f.k?f.color:T.text}}>{f.label}</p>
              {fb===f.k&&<span style={{marginLeft:"auto",color:f.color,fontSize:20}}>✓</span>}
            </button>
          ))}

          {/* Motivo (según resultado) */}
          {fb==="ko"&&(
            <div style={{marginTop:10}}>
              <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.red,textTransform:"uppercase"}}>Motivo del rechazo *</p>
              <select value={motivo} onChange={e=>setMotivo(e.target.value)}
                style={{width:"100%",padding:"10px 12px",borderRadius:9,border:`1.5px solid ${!motivo?T.red:T.border}`,fontSize:13,outline:"none",background:"#fff",fontFamily:"inherit"}}>
                <option value="">— Seleccionar motivo —</option>
                {MUESTRA_MOTIVO_RECHAZO.map(m=>(<option key={m} value={m}>{m}</option>))}
              </select>
            </div>
          )}
          {(fb==="positivo"||fb==="pedido")&&(
            <div style={{marginTop:10}}>
              <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.green,textTransform:"uppercase"}}>¿Qué le ha gustado?</p>
              <select value={motivo} onChange={e=>setMotivo(e.target.value)}
                style={{width:"100%",padding:"10px 12px",borderRadius:9,border:`1.5px solid ${T.border}`,fontSize:13,outline:"none",background:"#fff",fontFamily:"inherit"}}>
                <option value="">— Seleccionar motivo —</option>
                {MUESTRA_MOTIVO_OK.map(m=>(<option key={m} value={m}>{m}</option>))}
              </select>
            </div>
          )}

          {fb==="proyecto"&&(
            <div style={{background:"#F5F3FF",borderRadius:12,padding:14,marginTop:10,
              border:"1.5px solid "+T.purple}}>
              <p style={{margin:"0 0 8px",fontSize:13,fontWeight:800,color:T.purple}}>🚀 Proyecto industrial</p>
              <input value={proyForm.nombre} onChange={e=>setProyForm(f=>({...f,nombre:e.target.value}))}
                placeholder="Nombre del proyecto (opcional)"
                style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"1.5px solid "+T.border,
                  fontSize:12,outline:"none",boxSizing:"border-box",marginBottom:8,fontFamily:"inherit"}}/>
              <p style={{margin:"0 0 6px",fontSize:10,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Departamentos</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8}}>
                {DEPTOS.map(d=>{const s=proyForm.deptos.includes(d.k);return(
                  <button key={d.k} onClick={()=>setProyForm(f=>({...f,deptos:s?f.deptos.filter(x=>x!==d.k):[...f.deptos,d.k]}))}
                    style={{padding:"4px 9px",borderRadius:99,fontSize:11,fontWeight:700,cursor:"pointer",
                      border:"1.5px solid "+(s?T.purple:T.border),
                      background:s?T.purple+"18":"#fff",color:s?T.purple:T.muted}}>
                    {d.icon} {d.label}
                  </button>);})}
              </div>
              <textarea value={proyForm.nota} onChange={e=>setProyForm(f=>({...f,nota:e.target.value}))}
                placeholder="Descripción, acuerdos, próximos pasos..." rows={2}
                style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"1.5px solid "+T.border,
                  fontSize:12,outline:"none",boxSizing:"border-box",resize:"none",fontFamily:"inherit"}}/>
            </div>
          )}
          <div style={{marginTop:12,marginBottom:20}}>
            <p style={{margin:"0 0 8px",fontSize:13,fontWeight:700,color:T.text}}>Nota <span style={{color:T.muted,fontWeight:400}}>(opcional)</span></p>
            <textarea value={nota} onChange={e=>setNota(e.target.value)} rows={3}
              placeholder="¿Qué dijo el cliente exactamente?"
              style={{width:"100%",border:`1.5px solid ${T.border}`,borderRadius:10,padding:"12px",fontSize:14,resize:"none",outline:"none",boxSizing:"border-box"}}/>
          </div>
          <Btn full color={fbObj?fbObj.color:T.purple} onClick={guardar} disabled={fb==="ko"&&!motivo}>
            {fb==="proyecto"?"🚀 Crear proyecto y cerrar muestra":fb==="ko"&&!motivo?"Selecciona motivo de rechazo":"Guardar feedback"}
          </Btn>
        </>)}

        {/* Si NO es pendiente → opción de cambiar estado */}
        {!esPendiente&&(
          <div style={{marginTop:8}}>
            <Btn full outline color={T.amber} onClick={()=>{
              const updated={...sel,estado:"pendiente",nota:"",fechaFeedback:""};
              setMuestras(mm=>mm.map(m=>m.id===sel.id?updated:m));
              fbEscribir("muestras",sel.id,updated);
              setSel(updated);
            }}>
              🔄 Reabrir como pendiente
            </Btn>
          </div>
        )}
      </div>
    );
  }

  return(
    <div style={{padding:"20px 16px 100px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <p style={{margin:0,fontSize:20,fontWeight:900,color:T.text}}>📦 Mis muestras</p>
        <button onClick={()=>setShowNueva(v=>!v)}
          style={{background:showNueva?"#E2E8F0":T.navy,color:showNueva?T.muted:"#fff",
            border:"none",borderRadius:10,padding:"8px 14px",fontSize:13,fontWeight:700,cursor:"pointer"}}>
          {showNueva?"× Cancelar":"+ Nueva muestra"}
        </button>
      </div>

      {showNueva&&(
        <div style={{background:"#fff",borderRadius:14,padding:16,marginBottom:20,border:"1.5px solid "+T.navy}}>
          <p style={{margin:"0 0 12px",fontSize:14,fontWeight:700,color:T.text}}>Nueva muestra</p>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <SearchInput
              value={nuevaForm.clienteNombre}
              onChange={v=>{setNuevaForm(f=>({...f,clienteNombre:v}));if(showNuevoCliente)setNuevoCliente(f=>({...f,nombre:v}));}}
              placeholder="🔍 Buscar cliente..."
              suggestions={(clientesFB||[])
                .filter(c=>(c.nombre||c.NOMBRE||"").toLowerCase().includes(nuevaForm.clienteNombre.toLowerCase())&&nuevaForm.clienteNombre.length>=2)
                .slice(0,8).map(c=>({label:c.nombre||c.NOMBRE,sub:c.id,tipo:"cliente",obj:c}))}
              onSelect={s=>{setNuevaForm(f=>({...f,clienteNombre:s.label,clienteId:s.obj?.id||""}));setShowNuevoCliente(false);}}
            />
            {!showNuevoCliente?(
              <div style={{display:"flex",gap:8,alignItems:"center",margin:"-6px 0 0"}}>
                <p style={{margin:0,fontSize:10,color:T.muted,fontStyle:"italic",flex:1}}>Si no aparece, escribe el nombre o</p>
                <button onClick={()=>{setShowNuevoCliente(true);setNuevoCliente(f=>({...f,nombre:nuevaForm.clienteNombre}));}}
                  style={{background:T.green+"15",border:`1px solid ${T.green}44`,borderRadius:8,
                    padding:"4px 10px",fontSize:11,fontWeight:700,color:T.green,cursor:"pointer"}}>
                  ➕ Crear cliente
                </button>
              </div>
            ):(
              <div style={{background:"#F0FDF4",borderRadius:12,padding:14,border:`1.5px solid ${T.green}55`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <p style={{margin:0,fontSize:13,fontWeight:800,color:T.green}}>➕ Nuevo cliente</p>
                  <button onClick={()=>setShowNuevoCliente(false)}
                    style={{background:"none",border:"none",fontSize:16,color:T.muted,cursor:"pointer"}}>×</button>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  <input value={nuevoCliente.nombre} onChange={e=>{setNuevoCliente(f=>({...f,nombre:e.target.value}));setNuevaForm(f=>({...f,clienteNombre:e.target.value}));}}
                    placeholder="Nombre empresa *" style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1.5px solid "+T.border,fontSize:13,outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}/>
                  <input value={nuevoCliente.contacto} onChange={e=>setNuevoCliente(f=>({...f,contacto:e.target.value}))}
                    placeholder="Persona de contacto" style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1.5px solid "+T.border,fontSize:13,outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}/>
                  <div style={{display:"flex",gap:8}}>
                    <input value={nuevoCliente.tel} onChange={e=>setNuevoCliente(f=>({...f,tel:e.target.value}))}
                      placeholder="Teléfono" type="tel" style={{flex:1,padding:"9px 12px",borderRadius:8,border:"1.5px solid "+T.border,fontSize:13,outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}/>
                    <input value={nuevoCliente.email} onChange={e=>setNuevoCliente(f=>({...f,email:e.target.value}))}
                      placeholder="Email" type="email" style={{flex:1,padding:"9px 12px",borderRadius:8,border:"1.5px solid "+T.border,fontSize:13,outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}/>
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <input value={nuevoCliente.poblacion} onChange={e=>setNuevoCliente(f=>({...f,poblacion:e.target.value}))}
                      placeholder="Población" style={{flex:1,padding:"9px 12px",borderRadius:8,border:"1.5px solid "+T.border,fontSize:13,outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}/>
                    <input value={nuevoCliente.pais} onChange={e=>setNuevoCliente(f=>({...f,pais:e.target.value}))}
                      placeholder="País" style={{flex:1,padding:"9px 12px",borderRadius:8,border:"1.5px solid "+T.border,fontSize:13,outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}/>
                  </div>
                  <textarea value={nuevoCliente.notas} onChange={e=>setNuevoCliente(f=>({...f,notas:e.target.value}))}
                    placeholder="Notas (texto libre)" rows={2}
                    style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1.5px solid "+T.border,fontSize:13,outline:"none",boxSizing:"border-box",resize:"none",fontFamily:"inherit"}}/>
                  <button onClick={()=>{
                    if(!nuevoCliente.nombre.trim()&&!nuevaForm.clienteNombre.trim()) return;
                    const nombre=(nuevoCliente.nombre||nuevaForm.clienteNombre).trim();
                    const cliId="CLI_"+Date.now();
                    const cli={
                      id:cliId,nombre,NOMBRE:nombre.toUpperCase(),
                      contacto:nuevoCliente.contacto,tel:nuevoCliente.tel,email:nuevoCliente.email,
                      poblacion:nuevoCliente.poblacion,pais:nuevoCliente.pais||"España",notas:nuevoCliente.notas,
                      grupoAgente:usuario.grupoAgente||usuario.id,agente:usuario.id,equipo:usuario.equipo||"",
                      activo:true,creadoEn:new Date().toLocaleDateString("es-ES"),creadoPor:usuario.nombre,origen:"crm_muestra",
                    };
                    fbEscribir("clientes",cliId,cli);
                    setNuevaForm(f=>({...f,clienteNombre:nombre,clienteId:cliId}));
                    setShowNuevoCliente(false);
                    setNuevoCliente({nombre:"",contacto:"",tel:"",email:"",poblacion:"",pais:"España",notas:""});
                  }}
                    style={{width:"100%",padding:"11px",borderRadius:9,border:"none",
                      background:T.green,color:"#fff",fontSize:13,fontWeight:800,cursor:"pointer",marginTop:4}}>
                    ✅ Guardar cliente
                  </button>
                </div>
              </div>
            )}
            <SearchInput
              value={nuevaForm.prod}
              onChange={v=>setNuevaForm(f=>({...f,prod:v}))}
              placeholder="🔍 Buscar producto o código..."
              suggestions={PRODUCTOS_LOCAL
                .filter(p=>nuevaForm.prod.length>=2&&((p.nombre||"").toLowerCase().includes(nuevaForm.prod.toLowerCase())||(p.codigo||"").toLowerCase().includes(nuevaForm.prod.toLowerCase())))
                .slice(0,8).map(p=>({label:p.nombre,sub:p.codigo+" · "+p.formato,tipo:"producto",obj:p}))}
              onSelect={s=>setNuevaForm(f=>({...f,prod:s.label,tipo:s.obj.cat?.includes('CTH')?'CTH':s.obj.cat?.includes('Deshidrat')?'Deshidratada':'Ingredientes'}))}
            />
            <div style={{display:"flex",gap:8}}>
              <select value={nuevaForm.tipo} onChange={e=>setNuevaForm(f=>({...f,tipo:e.target.value}))}
                style={{flex:1,padding:"10px 12px",borderRadius:9,border:"1.5px solid "+T.border,
                  fontSize:13,outline:"none",fontFamily:"inherit"}}>
                <option value="Deshidratada">Deshidratada</option>
                <option value="Ingredientes">Ingredientes</option>
                <option value="CTH">CTH</option>
                <option value="Otros">Otros</option>
              </select>
              <input value={nuevaForm.uds} onChange={e=>setNuevaForm(f=>({...f,uds:e.target.value}))}
                placeholder="Uds." style={{width:80,padding:"10px 12px",borderRadius:9,
                  border:"1.5px solid "+T.border,fontSize:13,outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}/>
            </div>
            <textarea value={nuevaForm.nota} onChange={e=>setNuevaForm(f=>({...f,nota:e.target.value}))}
              placeholder="Notas (opcional)" rows={2}
              style={{width:"100%",padding:"10px 12px",borderRadius:9,border:"1.5px solid "+T.border,
                fontSize:13,outline:"none",boxSizing:"border-box",resize:"none",fontFamily:"inherit"}}/>
            <button onClick={()=>{
              if(!nuevaForm.clienteNombre.trim()||!nuevaForm.prod.trim()) return;
              const d=new Date();const s=new Date(d.getFullYear(),0,1);
              const sem=Math.ceil(((d-s)/86400000+s.getDay()+1)/7);
              const hoy=new Date().toLocaleDateString("es-ES");
              let clienteId=nuevaForm.clienteId||"";
              // Si es cliente nuevo, crear en Firebase
              if(showNuevoCliente&&nuevoCliente.nombre.trim()){
                clienteId="CLI_"+Date.now();
                const cli={
                  id:clienteId,
                  nombre:nuevoCliente.nombre.trim(),
                  NOMBRE:nuevoCliente.nombre.trim().toUpperCase(),
                  contacto:nuevoCliente.contacto,
                  tel:nuevoCliente.tel,
                  email:nuevoCliente.email,
                  poblacion:nuevoCliente.poblacion,
                  pais:nuevoCliente.pais||"España",
                  notas:nuevoCliente.notas,
                  grupoAgente:usuario.grupoAgente||usuario.id,
                  agente:usuario.id,
                  equipo:usuario.equipo||"",
                  activo:true,
                  creadoEn:hoy,
                  creadoPor:usuario.nombre,
                  origen:"crm_muestra",
                };
                fbEscribir("clientes",clienteId,cli);
              }
              const m={id:"m"+Date.now(),prod:nuevaForm.prod,cliente:nuevaForm.clienteNombre,
                clienteId:clienteId,
                tipo:nuevaForm.tipo,uds:nuevaForm.uds,nota:nuevaForm.nota,
                estado:"pendiente",agente:usuario.id,equipo:usuario.equipo||"",
                semana:sem,fecha:hoy};
              setMuestras(prev=>[m,...prev]);
              fbEscribir("muestras",m.id,m);
              setShowNueva(false);
              setShowNuevoCliente(false);
              setNuevaForm({clienteNombre:"",prod:"",tipo:"Deshidratada",uds:"",nota:""});
              setNuevoCliente({nombre:"",contacto:"",tel:"",email:"",poblacion:"",pais:"España",notas:""});
            }}
              style={{width:"100%",padding:"12px",background:T.navy,color:"#fff",
                border:"none",borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer"}}>
              {showNuevoCliente?"✅ Crear cliente y muestra":"✅ Crear muestra"}
            </button>
          </div>
        </div>
      )}

      {/* Filtro por equipo */}
      {esJefeOmas&&<FiltroEquipo value={filtroEquipoMue} onChange={setFiltroEquipoMue} agenteSel={agenteSelMue} onAgenteSel={setAgenteSelMue} items={muestras} getAgente={m=>m.agente}/>}

      {/* KPIs — MisMuestras */}
      <div style={{display:"flex",gap:10,marginBottom:20}}>
        {[{l:"⏳ Pendiente",v:pend,c:T.amber,f:"pendiente"},{l:"✅ Positivo",v:pos,c:T.green,f:"positivo"},{l:"❌ KO",v:ko,c:T.red,f:"ko"}].map(k=>(
          <div key={k.l} onClick={()=>setFiltro(x=>x===k.f?"todas":k.f)}
            style={{flex:1,background:filtro===k.f?k.c+"15":T.white,border:`2px solid ${filtro===k.f?k.c:T.border}`,
              borderRadius:13,padding:"12px 10px",cursor:"pointer",textAlign:"center"}}>
            <p style={{margin:0,fontSize:24,fontWeight:900,color:k.c}}>{k.v}</p>
            <p style={{margin:"2px 0 0",fontSize:10,fontWeight:700,color:T.muted}}>{k.l}</p>
          </div>
        ))}
      </div>

      {visibles.length===0?(
        <div style={{textAlign:"center",padding:32,color:T.muted}}>
          <span style={{fontSize:40,display:"block",marginBottom:8}}>📭</span>
          <p style={{margin:0,fontSize:14}}>Sin muestras en este estado</p>
        </div>
      ):(
        visibles.map(m=>{
          const estado={
            pendiente:{icon:"⏳",color:T.amber,label:"Pendiente",bg:T.amberL},
            positivo: {icon:"✅",color:T.green, label:"Positivo", bg:T.greenL},
            pedido:   {icon:"🛒",color:T.blue,  label:"Ha pedido",bg:T.blueL},
            ko:       {icon:"❌",color:T.red,   label:"KO",       bg:T.redL},
          }[m.estado]||{icon:"⏳",color:T.muted,label:"",bg:T.bg};
          return(
            <Card key={m.id} onClick={()=>{setSel(m);setComentario("");}}
              style={{marginBottom:10,border:`2px solid ${estado.color}33`,background:estado.bg,
                cursor:"pointer"}}>
              <div style={{display:"flex",gap:12,alignItems:"center"}}>
                <span style={{fontSize:28}}>{estado.icon}</span>
                <div style={{flex:1}}>
                  <p style={{margin:0,fontSize:14,fontWeight:700,color:T.text}}>{m.prod}</p>
                  <p style={{margin:"2px 0 0",fontSize:11,color:T.muted}}>{m.cliente} · S{m.semana}
                    {esJefeOmas&&(()=>{const ag=USUARIOS.find(u=>u.id===m.agente);return ag?` · ${ag.icon} ${ag.nombre}`:m.agente?` · ${m.agente}`:""})()}
                  </p>
                  {m.nota&&<p style={{margin:"4px 0 0",fontSize:12,color:estado.color,fontStyle:"italic"}}>"{m.nota}"</p>}
                  {(m.historial||[]).length>0&&<p style={{margin:"3px 0 0",fontSize:10,color:T.blue,fontWeight:600}}>💬 {m.historial.length} comentario{m.historial.length>1?"s":""}</p>}
                </div>
                {m.estado==="pendiente"?<span style={{fontSize:13,color:T.amber,fontWeight:700}}>Registrar →</span>
                :<span style={{fontSize:13,color:T.muted}}>Ver →</span>}
              </div>
            </Card>
          );
        })
      )}
    </div>
  );
}

// ─── TARJETA DE APROBACIÓN POR PRODUCTO ──────────────────────────
// ═══════════════════════════════════════════════════════════════════
// APROBACIÓN DE ESTRATEGIA — por producto, siempre visible
// ═══════════════════════════════════════════════════════════════════
function EstrategiaAprobacionCard({e,usuario,onConfirmar,onRechazar,onEscalar}){
  const ag=USUARIOS.find(u=>u.id===e.agente);
  const director=USUARIOS.find(u=>u.rol==="director");
  const ceo=USUARIOS.find(u=>u.rol==="ceo");
  const ofertas=e.ofertas||[];

  const [dec,setDec]=useState({});       // {oid: "si"|"no"|"subir"}
  const [precios,setPrecios]=useState({}); // {oid: precio}
  const [destinos,setDestinos]=useState({});
  const [notaFinal,setNotaFinal]=useState("");
  const [hecho,setHecho]=useState(false);

  const DEST=usuario.rol==="jefe"&&director?[{id:director.id,nombre:director.nombre,icon:director.icon}]
    :usuario.rol==="director"&&ceo?[{id:ceo.id,nombre:ceo.nombre,icon:ceo.icon}]:[];

  const n=ofertas.length;
  const n_ok=Object.values(dec).filter(Boolean).length;
  const listas=n===0||n_ok===n;

  const confirmar=()=>{
    const ofAct=ofertas.map(o=>{
      const oid=o.id||o.nombre;
      const d=dec[oid];
      if(d==="si")    return {...o,aprobada:true,aprobadaPor:usuario.nombre};
      if(d==="precio") return {...o,aprobada:true,precioFinal:precios[oid]||o.precioFinal,
        precioOriginal:o.precioFinal,modificada:true,aprobadaPor:usuario.nombre};
      if(d==="no")    return {...o,aprobada:false,rechazadaPor:usuario.nombre};
      if(d==="subir") return {...o,aprobada:null,elevadaA:destinos[oid],elevadaPor:usuario.nombre};
      return o;
    });
    setHecho(true);
    onConfirmar(e,ofAct,notaFinal);
  };

  if(hecho) return(
    <div style={{background:T.greenL,borderRadius:14,padding:"14px 16px",marginBottom:10,
      border:`1.5px solid ${T.green}`,display:"flex",gap:12,alignItems:"center"}}>
      <span style={{fontSize:28}}>✅</span>
      <div>
        <p style={{margin:0,fontSize:14,fontWeight:800,color:T.green}}>Aprobación enviada</p>
        <p style={{margin:"2px 0 0",fontSize:12,color:T.green}}>{e.cliente||e.clienteNombre}</p>
      </div>
    </div>
  );

  return(
    <div style={{background:"#fff",borderRadius:16,marginBottom:14,overflow:"hidden",
      border:`2px solid ${T.amber}`}}>

      {/* Cabecera */}
      <div style={{background:"#FFFBEB",padding:"12px 16px",borderBottom:`1px solid ${T.amber}33`}}>
        <div style={{display:"flex",gap:8,marginBottom:6,flexWrap:"wrap"}}>
          {ag&&<Badge label={`👤 ${ag.nombre}`} color={ag.color}/>}
          {e.escaladoA&&<Badge label="↑ Escalada" color={T.purple}/>}
        </div>
        <p style={{margin:"0 0 2px",fontSize:15,fontWeight:800,color:T.text}}>{e.cliente||e.clienteNombre}</p>
        <p style={{margin:0,fontSize:12,color:T.muted}}>{e.texto||e.estrategia}</p>
        {e.objetivo&&<p style={{margin:"4px 0 0",fontSize:11,color:T.amber,fontWeight:600}}>🎯 {e.objetivo}</p>}
      </div>

      <div style={{padding:"14px 16px"}}>
        {/* Sin productos: aprobar/rechazar directamente */}
        {n===0&&(
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <button onClick={()=>onRechazar(e,"No procede")}
              style={{flex:1,padding:"12px",borderRadius:10,border:`1.5px solid ${T.red}`,
                background:"#fff",color:T.red,fontWeight:700,fontSize:13,cursor:"pointer"}}>
              ❌ Rechazar
            </button>
            <button onClick={()=>onConfirmar(e,[],notaFinal)}
              style={{flex:2,padding:"12px",borderRadius:10,border:"none",
                background:T.green,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>
              ✅ Aprobar
            </button>
          </div>
        )}

        {/* Productos — decisión por producto */}
        {n>0&&(
          <div style={{marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
              <p style={{margin:0,fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
                Productos con precio oferta
              </p>
              <span style={{fontSize:11,color:n_ok===n?T.green:T.amber,fontWeight:700}}>
                {n_ok}/{n} decididos
              </span>
            </div>

            {ofertas.map((o,i)=>{
              const oid=o.id||o.nombre;
              const d=dec[oid];
              return(
                <div key={oid} style={{marginBottom:10,borderRadius:12,overflow:"hidden",
                  border:`1.5px solid ${d==="si"||d==="precio"?T.green:d==="no"?T.red:d==="subir"?T.purple:T.border}`}}>

                  {/* Producto info */}
                  <div style={{padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",
                    background:d==="si"||d==="precio"?T.greenL:d==="no"?"#FEF2F2":d==="subir"?T.purpleL:"#FAFAFA"}}>
                    <div style={{flex:1,minWidth:0}}>
                      {o.codigo&&<p style={{margin:0,fontSize:10,fontFamily:"monospace",color:T.blue,fontWeight:700}}>{o.codigo}</p>}
                      <p style={{margin:0,fontSize:13,fontWeight:600}}>{o.nombre}</p>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0,marginLeft:8}}>
                      {o.precioBase&&<p style={{margin:0,fontSize:11,color:T.muted,textDecoration:"line-through"}}>{o.precioBase}€</p>}
                      <p style={{margin:0,fontSize:14,fontWeight:900,color:
                        d==="precio"&&precios[oid]?T.amber:T.green}}>
                        {d==="precio"&&precios[oid]?precios[oid]:o.precioFinal||o.precioBase}€
                        <span style={{fontSize:10,fontWeight:400,color:T.muted}}>/kg</span>
                      </p>
                      {o.dto&&<p style={{margin:0,fontSize:10,color:T.red,fontWeight:700}}>-{o.dto}%</p>}
                    </div>
                  </div>

                  {/* Badge decisión */}
                  {d&&(
                    <div style={{padding:"5px 14px",background:d==="si"||d==="precio"?T.greenL:d==="no"?"#FEF2F2":T.purpleL,
                      display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{fontSize:11,fontWeight:700,
                        color:d==="si"||d==="precio"?T.green:d==="no"?T.red:T.purple}}>
                        {d==="si"?"✅ Aprobado al precio solicitado":
                         d==="precio"?"✏️ Aprobado con precio modificado":
                         d==="no"?"❌ Rechazado":
                         `↑ Elevado a ${USUARIOS.find(u=>u.id===destinos[oid])?.nombre||"Superior"}`}
                      </span>
                      <button onClick={()=>setDec(p=>{const n={...p};delete n[oid];return n;})}
                        style={{background:"none",border:"none",fontSize:11,color:T.muted,
                          cursor:"pointer",textDecoration:"underline",padding:0}}>deshacer</button>
                    </div>
                  )}

                  {/* Campo precio personalizado */}
                  {d==="precio"&&(
                    <div style={{padding:"8px 14px",display:"flex",gap:8,alignItems:"center",
                      background:"#FFFBEB",borderTop:`1px solid ${T.amber}44`}}>
                      <p style={{margin:0,fontSize:12,color:T.amber,fontWeight:700,flexShrink:0}}>Precio aprobado:</p>
                      <input type="number" defaultValue={o.precioFinal||o.precioBase}
                        onChange={ev=>setPrecios(p=>({...p,[oid]:ev.target.value}))}
                        style={{flex:1,border:`2px solid ${T.amber}`,borderRadius:8,
                          padding:"7px 10px",fontSize:14,fontWeight:800,outline:"none"}}/>
                      <span style={{fontSize:12,color:T.muted,flexShrink:0}}>€/kg</span>
                    </div>
                  )}

                  {/* Panel subir */}
                  {d==="subir"&&DEST.length>0&&!destinos[oid]&&(
                    <div style={{padding:"10px 14px",background:T.purpleL,borderTop:`1px solid ${T.purple}33`}}>
                      <p style={{margin:"0 0 8px",fontSize:12,fontWeight:700,color:T.purple}}>¿A quién elevas?</p>
                      {DEST.map(dest=>(
                        <button key={dest.id}
                          onClick={()=>setDestinos(p=>({...p,[oid]:dest.id}))}
                          style={{display:"flex",gap:10,alignItems:"center",width:"100%",
                            padding:"10px 12px",borderRadius:9,border:`1.5px solid ${T.purple}`,
                            background:"#fff",cursor:"pointer",marginBottom:4}}>
                          <span style={{fontSize:18}}>{dest.icon}</span>
                          <span style={{fontSize:13,fontWeight:700}}>{dest.nombre}</span>
                          <span style={{marginLeft:"auto",color:T.purple}}>→</span>
                        </button>
                      ))}
                    </div>
                  )}

                  {/* Botones de decisión — solo si sin decidir */}
                  {!d&&(
                    <div style={{display:"grid",gridTemplateColumns:`1fr 1fr 1fr${DEST.length>0?" 1fr":""}`,
                      borderTop:`1px solid ${T.border}`}}>
                      {[
                        {k:"si",    label:"✅ Sí",      bg:"#F0FDF4",color:T.green},
                        {k:"precio",label:"✏️ Precio",  bg:"#FFFBEB",color:T.amber},
                        ...(DEST.length>0?[{k:"subir",label:"↑ Subir",bg:T.purpleL,color:T.purple}]:[]),
                        {k:"no",    label:"❌ No",      bg:"#FEF2F2",color:T.red},
                      ].map((btn,bi,arr)=>(
                        <button key={btn.k} onClick={()=>setDec(p=>({...p,[oid]:btn.k}))}
                          style={{padding:"11px 4px",border:"none",
                            borderLeft:bi>0?`1px solid ${T.border}`:"none",
                            background:btn.bg,color:btn.color,
                            fontWeight:700,fontSize:12,cursor:"pointer"}}>
                          {btn.label}
                        </button>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* Nota + confirmar */}
        <input value={notaFinal} onChange={e=>setNotaFinal(e.target.value)}
          placeholder="Nota para el agente (opcional)…"
          style={{width:"100%",border:`1.5px solid ${T.border}`,borderRadius:9,
            padding:"10px 12px",fontSize:13,outline:"none",boxSizing:"border-box",marginBottom:10}}/>

        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>onRechazar(e,"No procede")}
            style={{flex:1,padding:"13px",borderRadius:10,border:`1.5px solid ${T.red}`,
              background:"#fff",color:T.red,fontWeight:700,fontSize:13,cursor:"pointer"}}>
            ❌ Rechazar todo
          </button>
          <button onClick={confirmar} disabled={n>0&&!listas}
            style={{flex:2,padding:"13px",borderRadius:10,border:"none",
              background:n===0||listas?T.navy:"#CBD5E1",
              color:"#fff",fontWeight:700,fontSize:14,
              cursor:n===0||listas?"pointer":"default"}}>
            {n===0||listas?"✅ Confirmar":"Decide todos los productos"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ESTRATEGIAS — vista clara por rol
// ═══════════════════════════════════════════════════════════════════
function MisEstrategias({usuario}){
  const esJefe  = usuario?.rol==="jefe"||usuario?.rol==="director"||usuario?.rol==="ceo";
  const esRolJefe = usuario?.rol==="jefe";
  const esRolDir  = usuario?.rol==="director";
  const esRolCeo  = usuario?.rol==="ceo";
  const esAgente  = usuario?.rol==="agente";
  const miEquipo  = usuario?.equipo;

  const [estrategias,setEstrategiasLocal]=useState(()=>GlobalStore.getEstrategias());
  const [cargando,setCargando]=useState(false);
  const [sel,setSel]=useState(null);
  const [filtroSec,setFiltroSec]=useState("curso");
  const [filtroEquipoEst,setFiltroEquipoEst]=useState("todos");
  const [agenteSelEst,setAgenteSelEst]=useState(null);
  const [showNuevaEst,setShowNuevaEst]=useState(false);

  // Función de filtro por equipo + agente
  const fEqEst=(items)=>{
    let r=items;
    if(filtroEquipoEst!=="todos") r=r.filter(e=>{
      const eq=e.equipo||(USUARIOS.find(u=>u.id===e.agente)||{}).equipo||"";
      return eq.toUpperCase()===filtroEquipoEst.toUpperCase();
    });
    if(agenteSelEst) r=r.filter(e=>e.agente===agenteSelEst||(USUARIOS.find(u=>u.id===e.agente)||{}).id===agenteSelEst);
    return r;
  };
  const [formEst,setFormEst]=useState({cliente:"",objetivo:"",texto:""});
  const [editEst,setEditEst]=useState(null);

  // Marcar como leído al abrir detalle
  useEffect(()=>{

  useEffect(()=>{

    return unsub;
  },[]);

  const setEstrategias=(updater)=>{
    const next=typeof updater==="function"?updater(GlobalStore.getEstrategias()):updater;
    GlobalStore.setEstrategias(next);
    setEstrategiasLocal([...next]);
  };

  const recargar=()=>{
    setCargando(true);
    fbLeer("estrategias").then(data=>{
      console.log("[EST] Firebase raw:",data.length,"items");
      data.forEach(d=>console.log("[EST] raw →",d.id,"cli:",d.cliente,"estado:",d.estado,"agente:",d.agente,"equipo:'"+d.equipo+"'","eliminada:",d.eliminada));
      const fbIds=new Set(data.map(d=>d.id));
      const merged=[...data.filter(d=>!d.eliminada),...ESTRATEGIAS_SEED.filter(s=>!fbIds.has(s.id))];
      console.log("[EST] Merged (no eliminadas):",merged.length);
      GlobalStore.setEstrategias(merged);
      setEstrategiasLocal([...merged]);
    }).catch(e=>console.error("[EST] Error:",e)).finally(()=>setCargando(false));
  };

  // Auto-cargar desde Firebase al montar si GlobalStore está vacío
  useEffect(()=>{recargar();},[]);

  const confirmarEstrategia=(e,ofertasAct,nota)=>{
    const elevadas=ofertasAct.filter(o=>o.elevadaA);
    const hayElevadas=elevadas.length>0;
    const destElevacion=elevadas.find(o=>o.elevadaA==="ceo")?.elevadaA||elevadas[0]?.elevadaA||null;
    const aprobadas=ofertasAct.filter(o=>o.aprobada===true);
    const rechazadas=ofertasAct.filter(o=>o.aprobada===false);
    const tipoRes=rechazadas.length===ofertasAct.length&&ofertasAct.length>0?"rechazada":
      aprobadas.length===ofertasAct.length&&ofertasAct.length>0?"aprobada":"aprobada_parcial";
    const entrada={
      accion:hayElevadas?`⚡ Parcial — ${elevadas.length} elevado${elevadas.length>1?"s":""}`:`✅ Resuelto por ${usuario.nombre}`,
      por:usuario.nombre,fecha:new Date().toLocaleDateString("es-ES"),nota};
    const updated=estrategias.map(x=>x.id===e.id?{
      ...x,
      estado:hayElevadas?"pendiente_aprobacion":"en_curso",
      escaladoA:hayElevadas?destElevacion:null,
      resolucion:hayElevadas?null:{tipo:tipoRes,por:usuario.nombre,rol:usuario.rol,
        fecha:new Date().toLocaleDateString("es-ES"),nota},
      aprobadoPor:usuario.nombre,ofertas:ofertasAct,
      seguimientos:[...(x.seguimientos||[]),{semana:14,resultado:hayElevadas?"elevada":tipoRes,nota}],
      historialEscalado:[...(x.historialEscalado||[]),entrada],
    }:x);
    setEstrategias(updated);
    fbEscribir("estrategias",e.id,updated.find(x=>x.id===e.id));
    // Notificar al agente que propuso la estrategia
    if(e.agente && e.agente !== usuario.id && !hayElevadas){
      const tipoLabel=tipoRes==="aprobada"?"✅ Aprobada":tipoRes==="rechazada"?"❌ Rechazada":"⚡ Aprobada parcialmente";
      despacharNotificacion({tipo:"estrategia",
        titulo:`${tipoLabel}: ${e.cliente||e.clienteNombre||"Estrategia"}`,
        mensaje:`${usuario.nombre} ha resuelto tu estrategia para ${e.cliente||""}. ${nota||""}`,
        destinatarioId:e.agente,prioridad:"normal",creadoPor:usuario.id});
    }
  };

  const escalarEstrategia=(e,destId,nota)=>{
    const dest=USUARIOS.find(u=>u.id===destId);
    const entrada={accion:`↑ Elevada a ${dest?.nombre}`,por:usuario.nombre,
      fecha:new Date().toLocaleDateString("es-ES"),nota};
    const updated=estrategias.map(x=>x.id===e.id?{
      ...x,estado:"pendiente_aprobacion",escaladoA:destId,
      historialEscalado:[...(x.historialEscalado||[]),entrada],
    }:x);
    setEstrategias(updated);
    fbEscribir("estrategias",e.id,updated.find(x=>x.id===e.id));
    // Notificar al destinatario de la elevación
    if(dest) despacharNotificacion({tipo:"estrategia",
      titulo:`📤 Estrategia elevada: ${e.cliente||e.clienteNombre||""}`,
      mensaje:`${usuario.nombre} te ha elevado una estrategia para revisión. Cliente: ${e.cliente||""}. ${nota||""}`,
      destinatarioId:destId,prioridad:"alta",creadoPor:usuario.id});
  };

  const rechazar=(e,motivo)=>{
    const entrada={accion:`❌ Rechazada por ${usuario.nombre}`,por:usuario.nombre,
      fecha:new Date().toLocaleDateString("es-ES"),nota:motivo};
    const updated=estrategias.map(x=>x.id===e.id?{...x,estado:"sin_exito",
      resolucion:{tipo:"rechazada",por:usuario.nombre,rol:usuario.rol,
        fecha:new Date().toLocaleDateString("es-ES"),nota:motivo},
      seguimientos:[...(x.seguimientos||[]),{semana:14,resultado:"rechazada",nota:motivo}],
      historialEscalado:[...(x.historialEscalado||[]),entrada]}:x);
    setEstrategias(updated);
    fbEscribir("estrategias",e.id,updated.find(x=>x.id===e.id));
    // Notificar al agente
    if(e.agente && e.agente !== usuario.id){
      despacharNotificacion({tipo:"estrategia",
        titulo:`❌ Estrategia rechazada: ${e.cliente||e.clienteNombre||""}`,
        mensaje:`${usuario.nombre} ha rechazado la estrategia. Motivo: ${motivo||"Sin especificar"}`,
        destinatarioId:e.agente,prioridad:"normal",creadoPor:usuario.id});

  };

  // Clasificación
  const deEquipo=(e)=>{
    if(esRolJefe){const ag=USUARIOS.find(u=>u.id===e.agente);return ag?.equipo===miEquipo||e.equipo===miEquipo;}
    return true;
  };

  // Pendientes de MI aprobación (usa el nuevo campo pendienteDe)
  const pendAprobMia=estrategias.filter(e=>
    e.estado==="pendiente_aprobacion"&&!e.eliminada&&
    (e.pendienteDe===usuario.id || 
     // Fallback legacy: si no tiene pendienteDe, usar lógica antigua
     (!e.pendienteDe && esRolJefe && !e.escaladoA && deEquipo(e)) ||
     (!e.pendienteDe && e.escaladoA===usuario.id))
  );

  const elevadasPorMi=estrategias.filter(e=>
    e.estado==="pendiente_aprobacion"&&!e.eliminada&&
    (e.cadenaAprobacion||[]).some(c=>c.id===usuario.id&&c.estado==="escalado")
  );

  // Helper: ¿la estrategia pertenece al usuario o es global?
  const esDelEquipoOGlobal=(e)=>{
    if(e.agente===usuario.id) return true;
    if(e.equipo&&e.equipo===miEquipo) return true;
    if(!e.equipo||e.equipo==="") return true;
    return false;
  };

  // Para agente: separadas por resolución
  const aprobadas=esAgente
    ? estrategias.filter(e=>esDelEquipoOGlobal(e)&&e.resolucion&&
        (e.resolucion.tipo==="aprobada"||e.resolucion.tipo==="aprobada_parcial"))
    : esRolJefe
    ? estrategias.filter(e=>deEquipo(e)&&e.resolucion&&e.resolucion.por!==usuario.nombre&&
        (e.resolucion.tipo==="aprobada"||e.resolucion.tipo==="aprobada_parcial"))
    : estrategias.filter(e=>e.resolucion&&(e.resolucion.tipo==="aprobada"||e.resolucion.tipo==="aprobada_parcial")&&
        ((e.historialEscalado||[]).some(h=>h.por===usuario.nombre)||e.agente===usuario.id));

  const rechazadas=esAgente
    ? estrategias.filter(e=>esDelEquipoOGlobal(e)&&e.resolucion?.tipo==="rechazada")
    : esRolJefe
    ? estrategias.filter(e=>deEquipo(e)&&e.resolucion?.tipo==="rechazada"&&e.resolucion.por!==usuario.nombre)
    : [];

  const enRevisionAgente=esAgente?estrategias.filter(e=>esDelEquipoOGlobal(e)&&e.estado==="pendiente_aprobacion"):[];
  const activasAgente=esAgente?estrategias.filter(e=>esDelEquipoOGlobal(e)&&e.estado==="en_curso"&&!e.resolucion):[];
  const misMostrar=(esJefe||esRolDir||esRolCeo)?estrategias.filter(e=>deEquipo(e)&&e.estado==="en_curso"&&!e.resolucion&&!e.eliminada):[];
  const misPendAprobDir=(esRolDir||esRolCeo)?estrategias.filter(e=>e.estado==="pendiente_aprobacion"&&!e.eliminada):[];
  const misResueltasDir=(esRolDir||esRolCeo)?estrategias.filter(e=>e.resolucion&&!e.eliminada):[];

  // Debug filters
  if(estrategias.length>0){

    estrategias.forEach(e=>console.log("[EST] check:",e.id,"cli:",e.cliente,"estado:",e.estado,"perteneceAMi:",esDelEquipoOGlobal(e)));
    console.log("[EST] activasAgente:",activasAgente.length,"enRevision:",enRevisionAgente.length,"misMostrar:",misMostrar.length);
  }

  // ── DETALLE ─────────────────────────────────────────────────────
  if(sel){
    const esSuya=sel.agente===usuario.id;

    return(

          {sel.estado==="pendiente_aprobacion"&&(sel.pendienteDe===usuario.id||(sel.cadenaAprobacion||[]).some(c=>c.id===usuario.id&&(c.estado==="pendiente"||c.estado==="pendiente_final")))&&(
            <div style={{background:"#FFFBEB",borderRadius:14,padding:16,marginBottom:16,
              border:`2px solid ${T.amber}`}}>
              <p style={{margin:"0 0 4px",fontSize:14,fontWeight:800,color:T.amber}}>
                {(sel.cadenaAprobacion||[]).some(c=>c.id===usuario.id&&c.estado==="pendiente_final")
                  ?"✅ Descuento aprobado por superior — tu OK final"
                  :"🔐 Aprobación pendiente de ti"}
              </p>
              <p style={{margin:"0 0 8px",fontSize:12,color:T.muted}}>
                Dto. máximo: <b style={{color:sel.maxDescuento>15?T.red:sel.maxDescuento>10?T.amber:T.green}}>{sel.maxDescuento||0}%</b>
                {" · "}Creada por: {sel.creadoPorNombre}
              </p>
              {(sel.ofertas||[]).length>0&&(
                <div style={{marginBottom:10}}>
                  {sel.ofertas.map((o,i)=>(
                    <div key={i} style={{background:"#fff",borderRadius:8,padding:"6px 10px",marginBottom:4,
                      borderLeft:`3px solid ${T.amber}`,fontSize:12}}>
