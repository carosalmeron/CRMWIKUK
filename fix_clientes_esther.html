<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Fix Clientes → Esther</title>
<style>
body{font-family:-apple-system,sans-serif;max-width:600px;margin:40px auto;padding:20px;background:#F8FAFC;}
.card{background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:20px;margin-bottom:16px;}
h1{font-size:20px;color:#0F172A;}
.log{background:#F1F5F9;border-radius:8px;padding:12px;font-size:12px;line-height:2;white-space:pre-wrap;max-height:400px;overflow:auto;}
button{background:#0F172A;color:#fff;border:none;padding:14px 28px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;width:100%;}
button:disabled{opacity:.5;}
.cli{padding:8px 12px;border-left:3px solid #3B82F6;margin:6px 0;background:#F8FAFC;border-radius:0 8px 8px 0;}
</style></head><body>
<h1>🔧 Corregir clientes → Esther</h1>
<div class="card">
<p style="font-size:13px;color:#64748B;margin:0 0 12px">Estos 4 clientes pasarán de <strong>ACOMAS</strong> a <strong>ESTHER</strong>:</p>
<div class="cli"><strong>B431788</strong> — FRANCISCO PACREU DIAZ</div>
<div class="cli"><strong>B431764</strong> — YASSINE MAARAD</div>
<div class="cli"><strong>B431716</strong> — DOLORS CARRERAS GUEVARA</div>
<div id="vallespir-slot" class="cli" style="border-color:#F59E0B"><strong>CARNS VALLESPIR</strong> — buscando en Firebase...</div>
</div>

<button id="btn" onclick="ejecutar()" disabled>⏳ Buscando CARNS VALLESPIR...</button>
<div class="log" id="log"></div>

<script>
const FB='https://firestore.googleapis.com/v1/projects/grupo-consolidado-crm/databases/(default)/documents';

const FIJOS=[
  {id:'B431788',nombre:'FRANCISCO PACREU DIAZ'},
  {id:'B431764',nombre:'YASSINE MAARAD'},
  {id:'B431716',nombre:'DOLORS CARRERAS GUEVARA'}
];
let vallespirId=null;

function log(msg){document.getElementById('log').textContent+=msg+'\n';}

async function buscarVallespir(){
  log('🔍 Buscando CARNS VALLESPIR en Firebase...');
  let pageToken=null;
  for(let p=0;p<30;p++){
    const url=FB+'/clientes?pageSize=300'+(pageToken?'&pageToken='+pageToken:'');
    const r=await fetch(url);
    const j=await r.json();
    if(!j.documents)break;
    for(const doc of j.documents){
      const f=doc.fields||{};
      const nombre=((f.nombre||{}).stringValue||(f.NOMBRE||{}).stringValue||'').toUpperCase();
      if(nombre.includes('VALLESPIR')&&nombre.includes('CARN')){
        const id=doc.name.split('/').pop();
        const ga=(f.GRUPOAGENTE||f.grupoAgente||{}).stringValue||'?';
        log('✅ Encontrado: '+id+' | '+nombre+' | agente actual: '+ga);
        vallespirId=id;
        document.getElementById('vallespir-slot').innerHTML='<strong>'+id+'</strong> — '+nombre;
        document.getElementById('vallespir-slot').style.borderColor='#3B82F6';
      }
    }
    if(!j.nextPageToken)break;
    pageToken=j.nextPageToken;
  }
  if(!vallespirId){
    log('⚠️ CARNS VALLESPIR no encontrado — se corregirán solo los 3 conocidos');
    document.getElementById('vallespir-slot').innerHTML='<strong>⚠️ No encontrado</strong> — se corregirán los 3 restantes';
    document.getElementById('vallespir-slot').style.borderColor='#EF4444';
  }
  document.getElementById('btn').disabled=false;
  document.getElementById('btn').textContent='🚀 Corregir a ESTHER';
}

async function actualizarCliente(id,nombre){
  log('📝 Actualizando '+id+' ('+nombre+')...');
  const url=FB+'/clientes/'+id+'?updateMask.fieldPaths=GRUPOAGENTE&updateMask.fieldPaths=grupoAgente&updateMask.fieldPaths=equipo';
  const r=await fetch(url,{
    method:'PATCH',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({fields:{
      GRUPOAGENTE:{stringValue:'ESTHER'},
      grupoAgente:{stringValue:'ESTHER'},
      equipo:{stringValue:''}
    }})
  });
  if(r.ok){
    log('✅ '+nombre+' → ESTHER ✓');
    return true;
  } else {
    const t=await r.text();
    log('❌ Error '+id+': '+r.status+' '+t);
    return false;
  }
}

async function ejecutar(){
  const btn=document.getElementById('btn');
  btn.disabled=true;btn.textContent='⏳ Corrigiendo...';
  let ok=0,err=0;

  for(const c of FIJOS){
    if(await actualizarCliente(c.id,c.nombre)) ok++; else err++;
  }
  if(vallespirId){
    if(await actualizarCliente(vallespirId,'CARNS VALLESPIR')) ok++; else err++;
  }

  log('\n═══════════════════════════════');
  log('✅ Corregidos: '+ok+' | ❌ Errores: '+err);
  btn.textContent='✅ Hecho ('+ok+' corregidos)';
  btn.style.background='#22C55E';
}

buscarVallespir();
</script>
</body></html>
