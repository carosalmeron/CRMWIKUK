<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Normalizar identificadores — CRM</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
  body{background:#F1F5F9;color:#0F172A;padding:16px;line-height:1.5}
  .wrap{max-width:760px;margin:0 auto}
  .header{background:linear-gradient(135deg,#1E3A5F,#0F172A);color:#fff;padding:20px;
    border-radius:14px;margin-bottom:16px}
  .header h1{font-size:20px;margin-bottom:4px}
  .header .sub{font-size:12px;opacity:.75}
  .pwd{background:#fff;padding:16px;border-radius:10px;border:1px solid #E2E8F0}
  .pwd input{width:100%;padding:10px 12px;border:1.5px solid #E2E8F0;border-radius:8px;font-size:14px}
  .pwd button{margin-top:10px;width:100%;padding:11px;background:#1E3A5F;color:#fff;
    border:none;border-radius:8px;font-weight:700;cursor:pointer}
  .stat-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .stat{background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:10px 14px;flex:1;min-width:120px;text-align:center}
  .stat .n{font-size:22px;font-weight:900}
  .stat .l{font-size:10px;color:#64748B;text-transform:uppercase;font-weight:700}
  .stat.ok .n{color:#22C55E}
  .stat.warn .n{color:#F59E0B}
  .stat.danger .n{color:#DC2626}
  .col-title{font-size:14px;font-weight:800;margin:16px 0 8px;display:flex;align-items:center;gap:8px}
  .doc{background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:12px 14px;margin-bottom:8px}
  .doc.resuelto{border-left:4px solid #22C55E}
  .doc.dudoso{border-left:4px solid #F59E0B;background:#FFFBEB}
  .doc.ok-ya{border-left:4px solid #CBD5E1;opacity:.6}
  .doc .info{font-size:12px;color:#475569}
  .doc .info b{color:#0F172A}
  .doc .cambio{font-size:13px;margin:6px 0;font-weight:700}
  .doc .cambio .old{color:#DC2626;text-decoration:line-through}
  .doc .cambio .new{color:#059669}
  .doc select{padding:7px 10px;border:1.5px solid #E2E8F0;border-radius:7px;font-size:13px;margin-right:8px}
  .doc button{padding:7px 14px;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer}
  .btn-aplicar{background:#22C55E;color:#fff}
  .btn-aplicado{background:#E2E8F0;color:#64748B}
  .btn-todos{background:#1E3A5F;color:#fff;padding:10px 18px;border:none;border-radius:9px;
    font-size:13px;font-weight:700;cursor:pointer;margin-bottom:12px}
  .loader{text-align:center;padding:40px;color:#64748B}
  .filtros-vista{display:flex;gap:6px;margin-bottom:12px}
  .fv{padding:6px 12px;border-radius:99px;border:1.5px solid #E2E8F0;background:#fff;
    font-size:12px;font-weight:700;cursor:pointer}
  .fv.activo{background:#1E3A5F;color:#fff;border-color:#1E3A5F}
</style>
</head>
<body>
<div class="wrap" id="app"><div class="loader">Cargando…</div></div>

<script>
const FB = "https://firestore.googleapis.com/v1/projects/grupo-consolidado-crm/databases/(default)/documents";
const PWD_OK = "wikuk2026";

// Vendedores: se cargan dinámicamente de Firebase (usuarios + portal_users).
// Cada uno: {id (canónico), nombre, equipo, variantes:[todas sus claves]}
let VENDEDORES = [];
// Mapa de respaldo: id canónico conocido por nombre (para los del CRM original)
const CANONICO_POR_NOMBRE = {
  "DAVID MAG":"wk1","VERONICA":"wk2","VERÓNICA":"wk2","SILVIA":"wk3",
  "CARLOS G.":"ik1","CARLOS G":"ik1","RICARDO":"ik2","AZARCO":"ik4",
  "RAMON":"rpiedra","RAMÓN":"rpiedra","JOSE LUIS":"jl","JOSÉ LUIS":"jl"
};

// Colecciones a normalizar y en qué campo está el vendedor
const COLECCIONES = [
  {col:"muestras",      campos:["agente","agenteId","creadoPor"]},
  {col:"oportunidades", campos:["agente","agenteId","creadoPor","autor"]},
  {col:"ofertas",       campos:["agente","agenteId","creadoPor"]},
  {col:"incidencias",   campos:["autor","agente","creadoPor"]},
  {col:"planes_semanales", campos:["agente","grupoAgente"]},
];

function fsToObj(doc){
  if(!doc||!doc.fields) return null;
  const o={};
  for(const k in doc.fields){
    const v=doc.fields[k];
    if(v.stringValue!==undefined)o[k]=v.stringValue;
    else if(v.integerValue!==undefined)o[k]=parseInt(v.integerValue);
    else if(v.doubleValue!==undefined)o[k]=parseFloat(v.doubleValue);
    else if(v.booleanValue!==undefined)o[k]=v.booleanValue;
    else if(v.timestampValue!==undefined)o[k]=v.timestampValue;
    else if(v.nullValue!==undefined)o[k]=null;
    else if(v.arrayValue&&v.arrayValue.values){
      o[k]=v.arrayValue.values.map(x=>{
        if(x.stringValue!==undefined)return x.stringValue;
        if(x.integerValue!==undefined)return parseInt(x.integerValue);
        if(x.mapValue)return fsToObj({fields:x.mapValue.fields});
        return x;
      });
    } else if(v.mapValue)o[k]=fsToObj({fields:v.mapValue.fields});
  }
  return o;
}
function toFsValue(v){
  if(v===null||v===undefined) return {nullValue:null};
  if(typeof v==="string") return {stringValue:v};
  if(typeof v==="boolean") return {booleanValue:v};
  if(typeof v==="number") return Number.isInteger(v)?{integerValue:String(v)}:{doubleValue:v};
  if(Array.isArray(v)) return {arrayValue:{values:v.map(toFsValue)}};
  if(typeof v==="object"){
    const f={}; for(const k in v) f[k]=toFsValue(v[k]);
    return {mapValue:{fields:f}};
  }
  return {stringValue:String(v)};
}

async function fbList(col){
  let docs=[], pageToken=null;
  do{
    const url=`${FB}/${col}?pageSize=200${pageToken?`&pageToken=${pageToken}`:""}`;
    const r=await fetch(url);
    if(!r.ok) break;
    const j=await r.json();
    if(j.documents){
      j.documents.forEach(d=>{
        const o=fsToObj(d);
        o._docId=d.name.split("/").pop();
        docs.push(o);
      });
    }
    pageToken=j.nextPageToken;
  }while(pageToken);
  return docs;
}

// Actualiza UN campo de un documento (con updateMask, no destruye lo demás)
async function fbUpdateCampo(col, id, campo, valor){
  const url=`${FB}/${col}/${id}?updateMask.fieldPaths=${encodeURIComponent(campo)}`;
  const body={fields:{}};
  body.fields[campo]=toFsValue(valor);
  const r=await fetch(url,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!r.ok) throw new Error(await r.text());
  return true;
}

// Resuelve un valor a un id canónico de vendedor
function resolverVendedor(valor){
  if(!valor) return null;
  const v=String(valor).toUpperCase().trim();
  for(const ve of VENDEDORES){
    if(ve.id.toUpperCase()===v) return ve;
    if(ve.variantes.indexOf(v)>=0) return ve;
  }
  return null;
}

let DATOS=[]; // [{col, campos, docs:[...]}]
let vistaFiltro="todos"; // todos | pendientes | dudosos
let MAPA_PORTAL={}; // u_xxxxx (mayúsculas) -> {nombre, rol}

// (v3) Carga usuarios de Firebase y construye la lista de VENDEDORES dinámicamente.
// Un "vendedor" = usuario con rol agente/crm_agente. Reúne todas sus claves como variantes.
async function cargarMapaUsuarios(){
  let portalUsers=[], crmUsers=[];
  try{ portalUsers=await fbList("portal_users"); }catch(e){}
  try{ crmUsers=await fbList("usuarios"); }catch(e){}
  const todos=portalUsers.concat(crmUsers);

  // Agrupar registros por persona: la clave de agrupación es nombre (normalizado)
  // o cualquier variante compartida. Usamos un mapa por nombre.
  const porPersona={}; // nombreNorm -> {nombre, equipo, rol, claves:Set}

  function clavesDe(u){
    const c=[];
    ["_docId","id","grupoAgente","username","catalogoVendedor","nombre","portalId","portalDocId"].forEach(k=>{
      if(u[k]) c.push(String(u[k]).toUpperCase().trim());
    });
    return c;
  }

  todos.forEach(u=>{
    const rol=(u.rol||"").toLowerCase();
    const nom=(u.nombre||u.username||u.catalogoVendedor||"").trim();
    const claves=clavesDe(u);
    // Guardar mapa de IDs -> nombre/rol (para las pistas)
    const nomP=u.nombre||u.username||u.catalogoVendedor||"";
    claves.forEach(c=>{ if(!MAPA_PORTAL[c]) MAPA_PORTAL[c]={nombre:nomP, rol:u.rol||""}; });

    // Solo nos interesan los vendedores (agente / crm_agente)
    if(rol!=="agente" && rol!=="crm_agente") return;
    if(!nom) return;
    const key=nom.toUpperCase();
    if(!porPersona[key]){
      porPersona[key]={nombre:nom, equipo:u.equipo||"", rol:rol, claves:new Set()};
    }
    if(u.equipo && !porPersona[key].equipo) porPersona[key].equipo=u.equipo;
    claves.forEach(c=>porPersona[key].claves.add(c));
  });

  // Convertir a lista VENDEDORES con id canónico
  VENDEDORES=[];
  Object.keys(porPersona).forEach(key=>{
    const p=porPersona[key];
    // id canónico: el conocido del CRM original, o el código corto si existe, o el _docId
    let idCanon=CANONICO_POR_NOMBRE[key];
    if(!idCanon){
      // buscar una clave que parezca código corto (wk1, ik2, etc.)
      p.claves.forEach(c=>{
        if(!idCanon && /^[A-Z]{2}\d+$/.test(c)) idCanon=c.toLowerCase();
      });
    }
    if(!idCanon){
      // si no, usar la primera clave que no sea un u_xxxxx largo
      p.claves.forEach(c=>{
        if(!idCanon && c.indexOf("U_")!==0 && c.length<=12) idCanon=c.toLowerCase();
      });
    }
    if(!idCanon) idCanon=key.toLowerCase().replace(/\s+/g,"");
    VENDEDORES.push({
      id:idCanon, nombre:p.nombre, equipo:p.equipo,
      variantes:Array.from(p.claves)
    });
  });
  VENDEDORES.sort((a,b)=>(a.equipo||"").localeCompare(b.equipo||"")||a.nombre.localeCompare(b.nombre));
}

async function escanear(){
  document.getElementById("app").innerHTML='<div class="loader">Cargando usuarios del portal…</div>';
  await cargarMapaUsuarios();
  document.getElementById("app").innerHTML='<div class="loader">Escaneando colecciones…</div>';
  DATOS=[];
  for(const c of COLECCIONES){
    let docs=[];
    try{ docs=await fbList(c.col); }catch(e){ docs=[]; }
    const filas=[];
    docs.forEach(d=>{
      if(d.eliminada) return;
      // Buscar el primer campo con valor
      let campoUsado=null, valorActual=null;
      for(const campo of c.campos){
        if(d[campo]){ campoUsado=campo; valorActual=d[campo]; break; }
      }
      if(!campoUsado) return; // sin campo de vendedor — se ignora
      const ve=resolverVendedor(valorActual);
      const yaCanonico = ve && String(valorActual).toUpperCase()===ve.id.toUpperCase();
      filas.push({
        col:c.col, docId:d._docId, campo:campoUsado,
        valorActual:valorActual,
        vendedor:ve, yaCanonico:yaCanonico,
        nombreDoc: d.cliente||d.clienteNombre||d.producto||d.prod||d.titulo||d.nombre||d._docId,
        aplicado:false,
      });
    });
    DATOS.push({col:c.col, filas:filas});
  }
  render();
}

function render(){
  let totalDocs=0, yaOk=0, porMigrar=0, dudosos=0;
  DATOS.forEach(g=>{
    g.filas.forEach(f=>{
      totalDocs++;
      if(f.yaCanonico) yaOk++;
      else if(f.vendedor) porMigrar++;
      else dudosos++;
    });
  });

  let html=`
    <div class="header">
      <h1>🔧 Normalizar identificadores</h1>
      <div class="sub">Unifica el campo de vendedor al id canónico (wk1, ik2, ik4…)</div>
    </div>
    <div class="stat-row">
      <div class="stat ok"><div class="n">${yaOk}</div><div class="l">Ya correctos</div></div>
      <div class="stat warn"><div class="n">${porMigrar}</div><div class="l">Por migrar</div></div>
      <div class="stat danger"><div class="n">${dudosos}</div><div class="l">Sin resolver</div></div>
    </div>
    <div class="filtros-vista">
      <div class="fv ${vistaFiltro==='todos'?'activo':''}" onclick="setVista('todos')">Todos (${totalDocs})</div>
      <div class="fv ${vistaFiltro==='pendientes'?'activo':''}" onclick="setVista('pendientes')">Por migrar (${porMigrar})</div>
      <div class="fv ${vistaFiltro==='dudosos'?'activo':''}" onclick="setVista('dudosos')">Sin resolver (${dudosos})</div>
    </div>
  `;

  if(porMigrar>0 && vistaFiltro!=='dudosos'){
    html+=`<button class="btn-todos" onclick="aplicarTodosResueltos()">✓ Aplicar todos los que tienen vendedor claro (${porMigrar})</button>`;
  }

  DATOS.forEach((g,gi)=>{
    let filasVista=g.filas;
    if(vistaFiltro==='pendientes') filasVista=g.filas.filter(f=>!f.yaCanonico&&f.vendedor&&!f.aplicado);
    else if(vistaFiltro==='dudosos') filasVista=g.filas.filter(f=>!f.vendedor&&!f.aplicado);
    if(filasVista.length===0) return;

    html+=`<div class="col-title">📁 ${g.col} <span style="font-size:11px;color:#94A3B8;font-weight:600">(${filasVista.length})</span></div>`;
    filasVista.forEach((f,fi)=>{
      const idx=g.filas.indexOf(f);
      if(f.aplicado){
        html+=`<div class="doc ok-ya"><div class="info"><b>${esc(f.nombreDoc)}</b> · ${f.campo}: <b>${esc(f.valorActual)}</b> ✓ aplicado</div></div>`;
      } else if(f.yaCanonico){
        html+=`<div class="doc ok-ya"><div class="info"><b>${esc(f.nombreDoc)}</b> · ${f.campo}=<b>${esc(f.valorActual)}</b> · ya correcto</div></div>`;
      } else if(f.vendedor){
        html+=`<div class="doc resuelto">
          <div class="info"><b>${esc(f.nombreDoc)}</b></div>
          <div class="cambio">${f.campo}: <span class="old">${esc(f.valorActual)}</span> → <span class="new">${f.vendedor.id}</span> <span style="color:#64748B;font-weight:400">(${f.vendedor.nombre})</span></div>
          <button class="btn-aplicar" onclick="aplicarUno(${gi},${idx})">Aplicar</button>
        </div>`;
      } else {
        // Dudoso: selector manual
        let opts='<option value="">— elegir —</option>';
        VENDEDORES.forEach(v=>{ opts+=`<option value="${v.id}">${v.nombre}${v.equipo?" ("+v.equipo+")":""}</option>`; });
        opts+='<option value="dir">📊 Director</option>';
        opts+='<option value="rw1">🏆 Jefe WIKUK</option>';
        opts+='<option value="ri1">🏆 Jefe INTERKEY</option>';
        opts+='<option value="ceo">👑 CEO</option>';
        // Pista: ¿sabemos a quién pertenece este ID por el portal?
        const pista=MAPA_PORTAL[String(f.valorActual).toUpperCase().trim()];
        let pistaTxt="";
        if(pista && pista.nombre){
          pistaTxt=`<div class="cambio" style="color:#1E40AF">💡 Este ID es de: <b>${esc(pista.nombre)}</b>${pista.rol?" ("+esc(pista.rol)+")":""}</div>`;
        }
        html+=`<div class="doc dudoso">
          <div class="info"><b>${esc(f.nombreDoc)}</b> · ${f.campo} = <b>${esc(f.valorActual)}</b></div>
          ${pistaTxt}
          <div class="cambio" style="color:#92400E">Asígnalo al vendedor/rol correcto, o pulsa Ignorar.</div>
          <select id="sel-${gi}-${idx}">${opts}</select>
          <button class="btn-aplicar" onclick="aplicarManual(${gi},${idx})">Aplicar</button>
          <button class="btn-aplicado" onclick="ignorarUno(${gi},${idx})">Ignorar</button>
        </div>`;
      }
    });
  });

  if(totalDocs===0) html+='<div class="doc"><div class="info">No se encontraron documentos.</div></div>';

  document.getElementById("app").innerHTML=html;
}

function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function setVista(v){vistaFiltro=v;render();}

async function aplicarUno(gi,idx){
  const f=DATOS[gi].filas[idx];
  if(!f.vendedor) return;
  try{
    await fbUpdateCampo(f.col,f.docId,f.campo,f.vendedor.id);
    f.aplicado=true; f.yaCanonico=true; f.valorActual=f.vendedor.id;
    render();
  }catch(e){ alert("Error: "+e.message); }
}

async function aplicarManual(gi,idx){
  const f=DATOS[gi].filas[idx];
  const sel=document.getElementById(`sel-${gi}-${idx}`);
  const id=sel.value;
  if(!id){ alert("Elige una opción primero"); return; }
  try{
    await fbUpdateCampo(f.col,f.docId,f.campo,id);
    f.aplicado=true; f.yaCanonico=true; f.valorActual=id;
    f.vendedor=VENDEDORES.find(v=>v.id===id)||{id:id,nombre:id};
    render();
  }catch(e){ alert("Error: "+e.message); }
}

// Marca un documento como ignorado (no se toca, sale de la lista)
function ignorarUno(gi,idx){
  const f=DATOS[gi].filas[idx];
  f.aplicado=true; // se oculta del listado activo
  f.ignorado=true;
  render();
}

async function aplicarTodosResueltos(){
  let pendientes=[];
  DATOS.forEach((g,gi)=>{
    g.filas.forEach((f,idx)=>{
      if(!f.yaCanonico&&f.vendedor&&!f.aplicado) pendientes.push({gi,idx});
    });
  });
  if(pendientes.length===0) return;
  if(!confirm(`¿Aplicar ${pendientes.length} cambios? Cada documento se actualizará al id canónico.`)) return;
  document.getElementById("app").innerHTML='<div class="loader">Aplicando '+pendientes.length+' cambios…</div>';
  let ok=0,err=0;
  for(const p of pendientes){
    const f=DATOS[p.gi].filas[p.idx];
    try{
      await fbUpdateCampo(f.col,f.docId,f.campo,f.vendedor.id);
      f.aplicado=true; f.yaCanonico=true; f.valorActual=f.vendedor.id;
      ok++;
    }catch(e){ err++; }
  }
  alert(`Aplicados: ${ok}${err>0?" · Errores: "+err:""}`);
  render();
}

function pedirPwd(){
  document.getElementById("app").innerHTML=`
    <div class="header"><h1>🔧 Normalizar identificadores</h1>
      <div class="sub">Herramienta restringida</div></div>
    <div class="pwd">
      <label style="display:block;font-size:12px;font-weight:700;color:#64748B;margin-bottom:6px">CONTRASEÑA</label>
      <input type="password" id="pwd" placeholder="Contraseña">
      <button onclick="comprobarPwd()">Entrar</button>
    </div>`;
  document.getElementById("pwd").addEventListener("keypress",e=>{if(e.key==="Enter")comprobarPwd();});
}
function comprobarPwd(){
  if(document.getElementById("pwd").value===PWD_OK){
    sessionStorage.setItem("norm_ok","1");
    escanear();
  } else alert("Contraseña incorrecta");
}

if(sessionStorage.getItem("norm_ok")==="1") escanear();
else pedirPwd();
</script>
</body>
</html>
