<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Propuesta Comercial — Grupo Consolidado</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#F1F5F9;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:20px;max-width:460px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.08);overflow:hidden}
.header{background:linear-gradient(135deg,#0F172A,#1E293B);color:#fff;padding:28px 24px 22px;text-align:center}
.header h1{font-size:18px;font-weight:800;margin-bottom:4px}
.header p{font-size:12px;color:rgba(255,255,255,.6)}
.body{padding:24px}
.client{font-size:20px;font-weight:800;color:#0F172A;margin-bottom:4px}
.date{font-size:12px;color:#94A3B8;margin-bottom:20px}
.section{margin-bottom:20px}
.section-title{font-size:10px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.product{background:#F8FAFC;border:1px solid #E2E8F0;border-radius:12px;padding:14px 16px;margin-bottom:8px}
.product-name{font-size:14px;font-weight:700;color:#0F172A}
.product-detail{font-size:12px;color:#64748B;margin-top:4px}
.dto{display:inline-block;background:#F0FDF4;color:#15803D;font-size:12px;font-weight:700;padding:4px 10px;border-radius:99px;margin-top:8px;border:1px solid #BBF7D0}
.message{background:#FFFBEB;border:1px solid #FDE68A;border-radius:12px;padding:14px 16px;font-size:13px;color:#92400E;line-height:1.6}
.footer{padding:16px 24px;background:#F8FAFC;border-top:1px solid #E2E8F0;text-align:center}
.footer p{font-size:11px;color:#94A3B8}
.footer a{color:#3B82F6;text-decoration:none;font-weight:600}
.loading{text-align:center;padding:60px 20px;color:#94A3B8}
.error{text-align:center;padding:60px 20px;color:#EF4444}
</style>
</head>
<body>
<div class="card" id="app">
  <div class="loading">
    <p style="font-size:24px;margin-bottom:12px">📄</p>
    <p>Cargando propuesta...</p>
  </div>
</div>
<script>
var FB="https://firestore.googleapis.com/v1/projects/grupo-consolidado-crm/databases/(default)/documents";
function pv(v){if(!v)return;if("stringValue"in v)return v.stringValue;if("integerValue"in v)return+v.integerValue;if("doubleValue"in v)return+v.doubleValue;if("booleanValue"in v)return v.booleanValue;if("arrayValue"in v)return(v.arrayValue.values||[]).map(pv);if("mapValue"in v){var o={};Object.entries(v.mapValue.fields||{}).forEach(function(e){o[e[0]]=pv(e[1])});return o}}
function fromFS(doc){if(!doc||!doc.fields)return null;var o={id:(doc.name||"").split("/").pop()};Object.entries(doc.fields).forEach(function(e){var val=pv(e[1]);if(val!==undefined)o[e[0]]=val});return o}

var params=new URLSearchParams(window.location.search);
var id=params.get("id");
var token=params.get("token");

if(!id||!token){
  document.getElementById("app").innerHTML='<div class="error"><p style="font-size:40px;margin-bottom:12px">🔒</p><p style="font-size:16px;font-weight:700">Enlace no válido</p><p style="margin-top:8px;font-size:13px;color:#94A3B8">Este enlace ha caducado o no es correcto.</p></div>';
}else{
  fetch(FB+"/estrategias/"+id).then(function(r){return r.json()}).then(function(doc){
    var d=fromFS(doc);
    if(!d||d.tokenCliente!==token){
      document.getElementById("app").innerHTML='<div class="error"><p style="font-size:40px;margin-bottom:12px">🔒</p><p style="font-size:16px;font-weight:700">Acceso denegado</p><p style="margin-top:8px;font-size:13px;color:#94A3B8">El token no coincide o la propuesta ha sido eliminada.</p></div>';
      return;
    }
    var productos=d.productos||[];
    var prodHtml="";
    if(productos.length>0){
      productos.forEach(function(p){
        prodHtml+='<div class="product"><div class="product-name">'+(p.nombre||p.producto||"Producto")+'</div>';
        if(p.calibre)prodHtml+='<div class="product-detail">Calibre: '+p.calibre+'</div>';
        if(p.precioOferta)prodHtml+='<div class="product-detail" style="font-weight:700;color:#0F172A;font-size:15px;margin-top:4px">'+Number(p.precioOferta).toFixed(2).replace(".",",")+" €/"+(p.unidad||"kg")+'</div>';
        prodHtml+='</div>';
      });
    }else{
      prodHtml='<div class="product"><div class="product-name">'+(d.estrategia||d.descripcion||"Propuesta comercial")+'</div>';
      if(d.maxDescuento)prodHtml+='<div class="dto">Descuento: '+d.maxDescuento+'%</div>';
      prodHtml+='</div>';
    }
    var nota=d.notaCliente||d.descripcion||d.estrategia||"";
    var fechaEnvio=d.fechaEnvioCliente?new Date(d.fechaEnvioCliente).toLocaleDateString("es-ES",{day:"numeric",month:"long",year:"numeric"}):"";

    document.getElementById("app").innerHTML=
      '<div class="header"><h1>📄 Propuesta Comercial</h1><p>Grupo Consolidado — Wikuk & Interkey</p></div>'
      +'<div class="body">'
      +'<div class="client">'+(d.cliente||d.clienteNombre||"")+'</div>'
      +'<div class="date">'+(fechaEnvio?"Enviado el "+fechaEnvio:"")+'</div>'
      +'<div class="section"><div class="section-title">Productos ofertados</div>'+prodHtml+'</div>'
      +(nota?'<div class="section"><div class="section-title">Mensaje</div><div class="message">'+nota.replace(/</g,"&lt;")+'</div></div>':'')
      +'</div>'
      +'<div class="footer"><p>Para cualquier consulta, contacta con tu comercial habitual.</p><p style="margin-top:6px"><a href="https://crmwikuk.vercel.app">Grupo Consolidado</a></p></div>';
  }).catch(function(){
    document.getElementById("app").innerHTML='<div class="error"><p style="font-size:40px;margin-bottom:12px">⚠️</p><p style="font-size:16px;font-weight:700">Error de conexión</p><p style="margin-top:8px;font-size:13px;color:#94A3B8">No se pudo cargar la propuesta. Inténtalo de nuevo.</p></div>';
  });
}
</script>
</body>
</html>
