<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico — Jose Luis</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#0B1220;color:#E2E8F0;padding:16px;line-height:1.5;font-size:13px}
  .wrap{max-width:600px;margin:0 auto}
  h1{font-size:18px;margin-bottom:4px}
  .sub{color:#94A3B8;font-size:12px;margin-bottom:16px}
  .gate input{padding:10px;border-radius:8px;border:none;font-size:15px;width:200px}
  .gate button{padding:10px 18px;background:#F59E0B;color:#0B1220;border:none;
    border-radius:8px;font-weight:800;cursor:pointer;font-size:14px}
  .card{background:#1E293B;border-radius:10px;padding:13px 15px;margin-bottom:10px}
  .card h3{font-size:13px;color:#FBBF24;margin-bottom:8px}
  .row{display:flex;justify-content:space-between;padding:5px 0;
    border-bottom:1px solid #334155;font-size:12px;gap:8px}
  .row:last-child{border-bottom:none}
  .row .k{color:#94A3B8}
  .row .v{font-weight:700;font-family:monospace;color:#fff;text-align:right}
  .loading{text-align:center;padding:40px;color:#94A3B8}
  pre{background:#0F172A;padding:10px;border-radius:8px;font-size:11px;
    overflow-x:auto;color:#7DD3FC;white-space:pre-wrap;word-break:break-all;margin-top:6px}
  .tag{display:inline-block;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:800;margin-left:6px}
  .ok{background:#064E3B;color:#6EE7B7}
  .bad{background:#7F1D1D;color:#FCA5A5}
  .big{font-size:22px;font-weight:900;color:#FBBF24}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
const FB="https://firestore.googleapis.com/v1/projects/grupo-consolidado-crm/databases/(default)/documents";
const PWD="wikuk2026";
const TERMINOS=["JOSE LUIS","JOSELUIS","JLGARCIA","JL GARCIA","JLUIS"];

function fsToObj(doc){
  if(!doc||!doc.fields)return null;
  const o={};
  for(const k in doc.fields){
    const v=doc.fields[k];
    if(v.stringValue!==undefined)o[k]=v.stringValue;
    else if(v.integerValue!==undefined)o[k]=parseInt(v.integerValue);
    else if(v.doubleValue!==undefined)o[k]=parseFloat(v.doubleValue);
    else if(v.booleanValue!==undefined)o[k]=v.booleanValue;
    else if(v.timestampValue!==undefined)o[k]=v.timestampValue;
    else if(v.mapValue)o[k]="(objeto)";
    else if(v.arrayValue)o[k]="(lista)";
  }
  return o;
}
async function fbList(col){
  let docs=[],tok=null,p=0;
  do{
    const u=FB+"/"+col+"?pageSize=300"+(tok?"&pageToken="+tok:"");
    let r; try{r=await fetch(u);}catch(e){return {error:"red"};}
    if(!r.ok)return {error:r.status};
    const j=await r.json();
    if(j.documents)j.documents.forEach(d=>{const o=fsToObj(d);if(o){o._id=d.name.split("/").pop();docs.push(o);}});
    tok=j.nextPageToken;p++;
  }while(tok&&p<25);
  return docs;
}
function esc(s){return String(s==null?"":s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function up(s){return String(s==null?"":s).toUpperCase().trim();}

async function run(){
  document.getElementById("app").innerHTML='<div class="loading">⏳ Cargando…</div>';
  const usuarios=await fbList("usuarios");
  const portal=await fbList("portal_users");
  const visitas=await fbList("visitas");

  let html='<h1>🔬 Diagnóstico — Jose Luis</h1>'+
    '<div class="sub">Cuentas e identificadores de sus visitas</div>';

  const cuentas=[];
  (usuarios.error?[]:usuarios).forEach(u=>{
    if(TERMINOS.some(t=>JSON.stringify(u).toUpperCase().indexOf(t)>=0))
      cuentas.push(Object.assign({},u,{_col:"usuarios"}));
  });
  (portal.error?[]:portal).forEach(u=>{
    if(TERMINOS.some(t=>JSON.stringify(u).toUpperCase().indexOf(t)>=0))
      cuentas.push(Object.assign({},u,{_col:"portal_users"}));
  });
  html+='<div class="card"><h3>👤 Cuentas de Jose Luis ('+cuentas.length+')</h3>';
  if(cuentas.length===0) html+='<div class="row"><span class="v">Ninguna encontrada</span></div>';
  cuentas.forEach(c=>{ html+='<pre>'+esc(JSON.stringify(c,null,1))+'</pre>'; });
  html+='</div>';

  const idsCuenta=new Set();
  cuentas.forEach(c=>{
    ["_id","id","grupoAgente","username","catalogoVendedor","crmId","nombre"].forEach(k=>{
      if(c[k]) idsCuenta.add(up(c[k]));
    });
  });

  if(visitas.error){
    html+='<div class="card"><h3>❌ Error leyendo visitas</h3></div>';
    document.getElementById("app").innerHTML='<div class="wrap">'+html+'</div>';
    return;
  }
  const sus=visitas.filter(v=>{
    const ag=up(v.agente||v.agenteId||v.creadoPor||v.grupoAgente);
    if(idsCuenta.has(ag)) return true;
    return TERMINOS.some(t=>ag.indexOf(t)>=0) || ["JL","JOSELUIS","JLGARCIA"].indexOf(ag)>=0;
  });

  html+='<div class="card"><h3>📋 Visitas detectadas de Jose Luis</h3>'+
    '<div class="big">'+sus.length+'</div></div>';

  const ids={};
  sus.forEach(v=>{
    const ag=v.agente||v.agenteId||v.creadoPor||v.grupoAgente||"(sin agente)";
    ids[ag]=(ids[ag]||0)+1;
  });
  html+='<div class="card"><h3>⚡ Identificadores en sus visitas</h3>';
  Object.keys(ids).sort((a,b)=>ids[b]-ids[a]).forEach(id=>{
    const reconocido=idsCuenta.has(up(id));
    html+='<div class="row"><span class="k">"'+esc(id)+'"</span>'+
      '<span class="v">'+ids[id]+' visita(s)'+
      (reconocido?'<span class="tag ok">de su cuenta</span>':'<span class="tag bad">NO enlazado</span>')+
      '</span></div>';
  });
  html+='<pre>Identificadores de sus cuentas: '+esc([...idsCuenta].join(", "))+'</pre>';
  html+='</div>';

  if(sus.length>0){
    html+='<div class="card"><h3>Ejemplo — 1 visita suya</h3><pre>'+
      esc(JSON.stringify(sus[0],null,1))+'</pre></div>';
  }

  document.getElementById("app").innerHTML='<div class="wrap">'+html+'</div>';
}

function gate(){
  document.getElementById("app").innerHTML=
    '<h1>🔬 Diagnóstico Jose Luis</h1><div class="sub">Acceso restringido</div>'+
    '<div class="gate"><input type="password" id="p" placeholder="Contraseña"> '+
    '<button onclick="chk()">Entrar</button></div>';
  document.getElementById("p").addEventListener("keypress",e=>{if(e.key==="Enter")chk();});
}
function chk(){
  if(document.getElementById("p").value===PWD) run();
  else alert("Contraseña incorrecta");
}
gate();
</script>
</body>
</html>
