<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unificar cuentas — CRM</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#0B1220;color:#E2E8F0;padding:16px;line-height:1.55;font-size:14px}
  .wrap{max-width:620px;margin:0 auto}
  h1{font-size:19px;margin-bottom:4px}
  .sub{color:#94A3B8;font-size:12px;margin-bottom:18px}
  .gate input{padding:11px;border-radius:8px;border:none;font-size:15px;width:220px}
  .gate button,.btn{padding:11px 20px;background:#F59E0B;color:#0B1220;border:none;
    border-radius:8px;font-weight:800;cursor:pointer;font-size:14px}
  .btn.sec{background:#334155;color:#E2E8F0}
  .btn.danger{background:#DC2626;color:#fff}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .loading{text-align:center;padding:40px;color:#94A3B8}
  .loading .s{font-size:30px;animation:p 1.3s infinite}
  @keyframes p{0%,100%{opacity:.3}50%{opacity:1}}

  .card{background:#1E293B;border-radius:11px;padding:14px 16px;margin-bottom:11px}
  .card.dup{border:1.5px solid #B45309}
  .card.ok{border:1.5px solid #15803D}
  .card h3{font-size:14px;margin-bottom:3px}
  .card .meta{font-size:11px;color:#94A3B8;margin-bottom:10px}

  .acc{border-radius:9px;padding:10px 12px;margin-bottom:7px;background:#0F172A;
    border:2px solid #334155;cursor:pointer}
  .acc.sel{border-color:#22C55E;background:#0B2818}
  .acc-top{display:flex;align-items:center;gap:9px}
  .acc-radio{width:18px;height:18px;border-radius:50%;border:2px solid #475569;flex-shrink:0}
  .acc.sel .acc-radio{border-color:#22C55E;background:#22C55E;
    box-shadow:inset 0 0 0 3px #0B2818}
  .acc-name{font-weight:800;font-size:13px;flex:1}
  .acc-badge{font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px;
    background:#1E3A5F;color:#93C5FD}
  .acc-detail{font-size:11px;color:#94A3B8;font-family:monospace;margin-top:6px;
    padding-left:27px;word-break:break-all}
  .acc-count{font-size:12px;font-weight:800;color:#FBBF24;padding-left:27px;margin-top:3px}

  .row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;
    border-bottom:1px solid #334155}
  .row:last-child{border-bottom:none}
  .row .k{color:#94A3B8}
  .row .v{font-weight:700;font-family:monospace}

  .equipo-sel{display:flex;gap:6px;margin:8px 0 4px}
  .equipo-sel button{flex:1;padding:8px;border-radius:7px;border:2px solid #334155;
    background:#0F172A;color:#94A3B8;font-size:12px;font-weight:700;cursor:pointer}
  .equipo-sel button.on{border-color:#F59E0B;background:#F59E0B;color:#0B1220}

  .actions{display:flex;gap:8px;margin-top:12px}
  .log{background:#0F172A;border-radius:8px;padding:10px 12px;margin-top:10px;
    font-size:11px;font-family:monospace;max-height:200px;overflow-y:auto}
  .log div{padding:2px 0}
  .log .ok{color:#6EE7B7}
  .log .err{color:#FCA5A5}
  .log .info{color:#7DD3FC}
  .nota{background:#0F172A;border-left:3px solid #F59E0B;padding:9px 12px;
    border-radius:6px;font-size:12px;margin-bottom:14px;color:#CBD5E1}
  .empty{text-align:center;padding:30px;color:#64748B}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
const FB="https://firestore.googleapis.com/v1/projects/grupo-consolidado-crm/databases/(default)/documents";
const PWD="wikuk2026";

// Colecciones de actividad cuyo campo de agente hay que migrar
const COLS_ACTIVIDAD=[
  {col:"visitas",     campos:["agente","agenteId","creadoPor","agenteAsignado","agenteGrupo"]},
  {col:"muestras",    campos:["agente","agenteId","creadoPor"]},
  {col:"ofertas",     campos:["agente","agenteId","creadoPor"]},
  {col:"oportunidades",campos:["agente","agenteId","creadoPor","autor"]},
  {col:"incidencias", campos:["autor","agente","creadoPor"]},
  {col:"planes_semanales",campos:["agente","grupoAgente","creadoPor"]},
  {col:"estrategias", campos:["agente","creadoPor"]},
  {col:"potenciales", campos:["agente","creadoPor"]},
];

function fsToObj(doc){
  if(!doc||!doc.fields)return null;
  const o={};
  for(const k in doc.fields){
    const v=doc.fields[k];
    if(v.stringValue!==undefined)o[k]=v.stringValue;
    else if(v.integerValue!==undefined)o[k]=parseInt(v.integerValue);
    else if(v.doubleValue!==undefined)o[k]=parseFloat(v.doubleValue);
    else if(v.booleanValue!==undefined)o[k]=v.booleanValue;
    else if(v.timestampValue!==undefined)o[k]=v.timestampValue;
    else if(v.mapValue)o[k]={__map:true};
    else if(v.arrayValue)o[k]={__arr:true};
  }
  return o;
}
async function fbList(col){
  let docs=[],tok=null,p=0;
  do{
    const u=FB+"/"+col+"?pageSize=300"+(tok?"&pageToken="+tok:"");
    let r; try{r=await fetch(u);}catch(e){return {error:"red"};}
    if(!r.ok)return {error:r.status};
    const j=await r.json();
    if(j.documents)j.documents.forEach(d=>{const o=fsToObj(d);if(o){o._id=d.name.split("/").pop();docs.push(o);}});
    tok=j.nextPageToken;p++;
  }while(tok&&p<25);
  return docs;
}
// Actualiza UN campo de un documento (sin destruir el resto)
async function fbUpdateCampo(col,docId,campo,valor){
  const url=FB+"/"+col+"/"+encodeURIComponent(docId)+"?updateMask.fieldPaths="+campo;
  const body={fields:{}};
  body.fields[campo]={stringValue:valor};
  const r=await fetch(url,{method:"PATCH",headers:{"Content-Type":"application/json"},
    body:JSON.stringify(body)});
  return r.ok;
}
function esc(s){return String(s==null?"":s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function up(s){return String(s==null?"":s).toUpperCase().trim();}

// ── Estado ──
let DATA={};       // colecciones cargadas
let PERSONAS=[];   // [{nombre, cuentas:[...], total}]
let elegidas={};   // nombre → índice de cuenta elegida
let equipoElegido={}; // nombre → equipo

// ── Cargar y agrupar ──
async function cargar(){
  pintarLoading("Cargando cuentas…");
  const usuarios=await fbList("usuarios");
  const portal=await fbList("portal_users");
  DATA.usuarios = usuarios.error?[]:usuarios;
  DATA.portal = portal.error?[]:portal;

  pintarLoading("Cargando actividad…");
  for(const c of COLS_ACTIVIDAD){
    const d=await fbList(c.col);
    DATA[c.col]=d.error?[]:d;
  }
  agrupar();
  render();
}

function todasLasClaves(cuenta){
  // Todas las formas en que esta cuenta puede aparecer en un campo "agente"
  const ks=new Set();
  ["_id","id","grupoAgente","username","catalogoVendedor","nombre","crmId"].forEach(k=>{
    if(cuenta[k]) ks.add(up(cuenta[k]));
  });
  return ks;
}

function contarActividad(claves){
  // Cuenta cuántos registros de actividad pertenecen a estas claves
  let total=0;
  COLS_ACTIVIDAD.forEach(c=>{
    (DATA[c.col]||[]).forEach(doc=>{
      for(const campo of c.campos){
        if(doc[campo] && claves.has(up(doc[campo]))){ total++; break; }
      }
    });
  });
  return total;
}

function agrupar(){
  // (v2) Junta cuentas que comparten NOMBRE o cualquier IDENTIFICADOR
  const todas=[];
  function prep(cuenta,origen){
    cuenta._origen=origen;
    cuenta._claves=todasLasClaves(cuenta);
    cuenta._actividad=contarActividad(cuenta._claves);
    todas.push(cuenta);
  }
  DATA.usuarios.forEach(u=>prep(u,"usuarios"));
  DATA.portal.forEach(u=>prep(u,"portal_users"));

  // Cada cuenta tiene un conjunto de "huellas": nombre + todos sus ids
  function huellas(c){
    const h=new Set();
    const nom=up(c.nombre||c.username||c.catalogoVendedor);
    if(nom) h.add("N:"+nom);
    c._claves.forEach(k=>{
      // ids cortos/significativos sirven de enlace; ignorar genéricos
      if(k && k.length>=2) h.add("K:"+k);
    });
    return h;
  }
  todas.forEach(c=>{ c._huellas=huellas(c); });

  // Unión: dos cuentas van al mismo grupo si comparten alguna huella
  const grupos=[]; // cada uno = {cuentas:[], huellas:Set}
  todas.forEach(c=>{
    let destino=null;
    for(const g of grupos){
      for(const h of c._huellas){ if(g.huellas.has(h)){ destino=g; break; } }
      if(destino) break;
    }
    if(!destino){ destino={cuentas:[],huellas:new Set()}; grupos.push(destino); }
    destino.cuentas.push(c);
    c._huellas.forEach(h=>destino.huellas.add(h));
  });
  // Segunda pasada: fusionar grupos que quedaron conectados indirectamente
  let fusionado=true;
  while(fusionado){
    fusionado=false;
    for(let i=0;i<grupos.length;i++){
      for(let j=i+1;j<grupos.length;j++){
        let comun=false;
        for(const h of grupos[j].huellas){ if(grupos[i].huellas.has(h)){ comun=true; break; } }
        if(comun){
          grupos[j].cuentas.forEach(c=>grupos[i].cuentas.push(c));
          grupos[j].huellas.forEach(h=>grupos[i].huellas.add(h));
          grupos.splice(j,1); fusionado=true; j--;
        }
      }
    }
  }

  PERSONAS=grupos.map((g,gi)=>{
    // nombre representativo: el de la cuenta con más actividad
    let mejor=g.cuentas[0];
    g.cuentas.forEach(c=>{ if(c._actividad>mejor._actividad) mejor=c; });
    const p={
      nombre: mejor.nombre||mejor.username||"Cuenta "+(gi+1),
      cuentas: g.cuentas,
      total: g.cuentas.reduce((s,c)=>s+c._actividad,0),
      duplicado: g.cuentas.length>1,
      _key: "g"+gi
    };
    let maxIdx=0,maxN=-1;
    p.cuentas.forEach((c,i)=>{ if(c._actividad>maxN){maxN=c._actividad;maxIdx=i;} });
    elegidas[p._key]=maxIdx;
    equipoElegido[p._key]=p.cuentas[maxIdx].equipo||p.cuentas[0].equipo||"";
    return p;
  });
  PERSONAS.sort((a,b)=>{
    if(a.duplicado!==b.duplicado) return a.duplicado?-1:1;
    return b.total-a.total;
  });
}

// ── Render ──
function pintarLoading(t){
  document.getElementById("app").innerHTML=
    '<div class="loading"><div class="s">🔗</div><div>'+esc(t)+'</div></div>';
}

function render(){
  const dups=PERSONAS.filter(p=>p.duplicado);
  let html='<h1>🔗 Unificar cuentas duplicadas</h1>'+
    '<div class="sub">Personas con más de una cuenta · '+dups.length+' duplicado(s)</div>';

  html+='<div class="nota">Para cada persona duplicada: elige la cuenta CORRECTA (el ✓ verde), '+
    'confirma el equipo, y pulsa <b>Unificar</b>. Sus visitas, muestras y ofertas pasarán a la cuenta buena. '+
    'La cuenta sobrante se marca como duplicada (no se borra).</div>';

  if(dups.length===0){
    html+='<div class="empty">✓ No hay cuentas duplicadas</div>';
  }

  dups.forEach(p=>{
    const key=p._key;
    html+='<div class="card dup" id="card-'+esc(key)+'">';
    html+='<h3>👤 '+esc(p.nombre)+'</h3>';
    html+='<div class="meta">'+p.cuentas.length+' cuentas · '+p.total+' registros de actividad en total</div>';

    p.cuentas.forEach((c,i)=>{
      const sel=elegidas[key]===i;
      html+='<div class="acc '+(sel?'sel':'')+'" onclick="elegir(\''+esc(key)+'\','+i+')">';
      html+='<div class="acc-top">';
      html+='<div class="acc-radio"></div>';
      html+='<span class="acc-name">'+esc(c.nombre||c.username)+'</span>';
      html+='<span class="acc-badge">'+esc(c._origen)+'</span>';
      html+='</div>';
      html+='<div class="acc-detail">id: '+esc(c.id||c._id)+' · equipo: '+esc(c.equipo||"-")+
        ' · rol: '+esc(c.rol||"-")+'</div>';
      html+='<div class="acc-count">'+c._actividad+' registros con esta cuenta</div>';
      html+='</div>';
    });

    // Selector de equipo
    html+='<div style="font-size:11px;color:#94A3B8;margin-top:8px">Equipo de la cuenta unificada:</div>';
    html+='<div class="equipo-sel">';
    ["WIKUK","INTERKEY"].forEach(eq=>{
      html+='<button class="'+(equipoElegido[key]===eq?'on':'')+'" '+
        'onclick="setEquipo(\''+esc(key)+'\',\''+eq+'\')">'+eq+'</button>';
    });
    html+='</div>';

    html+='<div class="actions">';
    html+='<button class="btn" onclick="unificar(\''+esc(key)+'\')">🔗 Unificar cuentas</button>';
    html+='</div>';
    html+='<div class="log" id="log-'+esc(key)+'" style="display:none"></div>';
    html+='</div>';
  });

  // Cuentas sanas (informativo, colapsado)
  const sanas=PERSONAS.filter(p=>!p.duplicado);
  if(sanas.length>0){
    html+='<div class="card ok"><h3>✓ Cuentas sin duplicar ('+sanas.length+')</h3>';
    html+='<div class="meta">'+sanas.map(p=>esc(p.nombre)).join(" · ")+'</div></div>';
  }

  document.getElementById("app").innerHTML='<div class="wrap">'+html+'</div>';
}

window.elegir=function(key,i){ elegidas[key]=i;
  // al cambiar de cuenta, sugerir su equipo
  const p=PERSONAS.find(x=>x._key===key);
  if(p&&p.cuentas[i].equipo) equipoElegido[key]=p.cuentas[i].equipo;
  render();
};
window.setEquipo=function(key,eq){ equipoElegido[key]=eq; render(); };

window.unificar=async function(key){
  const p=PERSONAS.find(x=>x._key===key);
  if(!p) return;
  const buena=p.cuentas[elegidas[key]];
  const malas=p.cuentas.filter((c,i)=>i!==elegidas[key]);
  const equipo=equipoElegido[key];

  if(!confirm("Unificar «"+p.nombre+"»:\n\n"+
    "Cuenta BUENA: "+(buena.id||buena._id)+" ("+buena._origen+")\n"+
    "Equipo: "+equipo+"\n\n"+
    "Se migrarán "+malas.reduce((s,c)=>s+c._actividad,0)+" registros de "+
    malas.length+" cuenta(s) duplicada(s).\n\n¿Continuar?")) return;

  const logEl=document.getElementById("log-"+key);
  logEl.style.display="block";
  logEl.innerHTML="";
  const log=(msg,cls)=>{ logEl.innerHTML+='<div class="'+(cls||"")+'">'+esc(msg)+'</div>';
    logEl.scrollTop=logEl.scrollHeight; };

  // Identificador canónico destino = id de la cuenta buena
  const idDestino = buena.id || buena._id;
  log("Destino: "+idDestino+" · equipo "+equipo,"info");

  // (v3) Claves a reemplazar: TODAS las de las cuentas malas + las compartidas.
  // El objetivo es que todo apunte al idDestino exacto. Solo se respeta
  // el registro que YA tiene exactamente idDestino.
  const clavesMalas=new Set();
  malas.forEach(c=>{ c._claves.forEach(k=>clavesMalas.add(k)); });
  // Añadir también las claves de la cuenta buena que NO son el idDestino
  // (ej: grupoAgente "JLGARCIA" → hay que migrarlo al id "u_xxx")
  buena._claves.forEach(k=>{ if(k!==up(idDestino)) clavesMalas.add(k); });
  // Nunca tocar el propio idDestino
  clavesMalas.delete(up(idDestino));

  let migrados=0, errores=0;
  for(const c of COLS_ACTIVIDAD){
    const docs=DATA[c.col]||[];
    for(const doc of docs){
      let cambiado=false;
      for(const campo of c.campos){
        if(doc[campo] && clavesMalas.has(up(doc[campo])) && up(doc[campo])!==up(idDestino)){
          const ok=await fbUpdateCampo(c.col,doc._id,campo,idDestino);
          if(ok){ doc[campo]=idDestino; cambiado=true; }
          else errores++;
        }
      }
      if(cambiado) migrados++;
    }
    if(docs.length) log("✓ "+c.col+" revisado","ok");
  }
  log("───────────","info");
  log("Migrados: "+migrados+" registros","ok");
  if(errores>0) log("Errores: "+errores,"err");

  // Actualizar equipo de la cuenta buena si cambió
  if(equipo && buena.equipo!==equipo){
    const colBuena = buena._origen==="usuarios"?"usuarios":"portal_users";
    const ok=await fbUpdateCampo(colBuena,buena._id,"equipo",equipo);
    if(ok) log("✓ Equipo actualizado a "+equipo,"ok");
  }

  // Marcar cuentas malas como duplicadas (no se borran)
  for(const c of malas){
    const colMala = c._origen==="usuarios"?"usuarios":"portal_users";
    await fbUpdateCampo(colMala,c._id,"duplicadaDe",idDestino);
    log("✓ Cuenta "+(c.id||c._id)+" marcada como duplicada","ok");
  }

  log("✅ UNIFICACIÓN COMPLETADA","ok");
  log("Recarga el CRM para ver el cambio.","info");
};

function gate(){
  document.getElementById("app").innerHTML=
    '<h1>🔗 Unificar cuentas</h1><div class="sub">Acceso restringido</div>'+
    '<div class="gate"><input type="password" id="p" placeholder="Contraseña"> '+
    '<button onclick="chk()">Entrar</button></div>';
  document.getElementById("p").addEventListener("keypress",e=>{if(e.key==="Enter")chk();});
}
window.chk=function(){
  if(document.getElementById("p").value===PWD){
    sessionStorage.setItem("unif_ok","1"); cargar();
  } else alert("Contraseña incorrecta");
};
if(sessionStorage.getItem("unif_ok")==="1") cargar();
else gate();
</script>
</body>
</html>
