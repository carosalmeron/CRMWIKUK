<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auditoría de actividad — CRM</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#0B1220;color:#0F172A;line-height:1.5;-webkit-font-smoothing:antialiased}
  .phone{max-width:480px;margin:0 auto;background:#F1F5F9;min-height:100vh;padding-bottom:50px}

  .gate{padding:60px 24px;text-align:center}
  .gate h2{color:#fff;font-size:20px;margin-bottom:6px}
  .gate p{color:#94A3B8;font-size:13px;margin-bottom:20px}
  .gate input{width:100%;max-width:280px;padding:12px;border-radius:9px;border:none;font-size:15px}
  .gate button{margin-top:12px;padding:12px 28px;background:#F59E0B;color:#0F172A;
    border:none;border-radius:9px;font-weight:800;font-size:14px;cursor:pointer}

  .loading{padding:60px 24px;text-align:center;color:#94A3B8}
  .loading .spin{font-size:34px;margin-bottom:14px;animation:p 1.4s ease-in-out infinite}
  @keyframes p{0%,100%{opacity:.3}50%{opacity:1}}
  .load-step{font-size:12px;color:#64748B;margin-top:4px}

  .hero{background:linear-gradient(160deg,#1E3A5F 0%,#0F172A 100%);color:#fff;padding:20px 20px 24px}
  .hero h1{font-size:23px;font-weight:900;letter-spacing:-.02em}
  .hero .sub{font-size:13px;color:#CBD5E1;margin-top:3px}

  .verdict-box{background:#fff;margin:-14px 16px 0;border-radius:14px;padding:16px 18px;
    box-shadow:0 6px 24px rgba(15,23,42,.10);position:relative;z-index:2}
  .verdict-box .tag{font-size:10px;font-weight:800;letter-spacing:.08em;color:#64748B;text-transform:uppercase}
  .verdict-box p{font-size:13.5px;color:#1E293B;margin-top:6px}
  .verdict-box b{font-weight:800}

  .section{margin:20px 16px 0}
  .s-title{font-size:15px;font-weight:900;color:#0F172A;margin-bottom:9px}

  .col-card{background:#fff;border-radius:13px;margin-bottom:10px;border:1px solid #E2E8F0;overflow:hidden}
  .col-head{padding:13px 15px;display:flex;align-items:center;gap:11px;cursor:pointer}
  .col-ico{font-size:20px;flex-shrink:0}
  .col-body{flex:1;min-width:0}
  .col-name{font-size:14px;font-weight:800;color:#0F172A;text-transform:capitalize}
  .col-meta{font-size:11px;color:#64748B;font-weight:600;margin-top:1px}
  .col-grade{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;
    justify-content:center;font-size:17px;font-weight:900;flex-shrink:0;color:#fff}
  .col-detail{border-top:1px solid #F1F5F9;padding:12px 15px;display:none}
  .col-detail.open{display:block}

  .metric{display:flex;justify-content:space-between;align-items:center;
    padding:6px 0;font-size:12px;border-bottom:1px solid #F8FAFC}
  .metric:last-child{border-bottom:none}
  .metric .ml{color:#475569}
  .metric .mv{font-weight:800}
  .pill{font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px}
  .pill.ok{background:#F0FDF4;color:#15803D}
  .pill.med{background:#FFFBEB;color:#B45309}
  .pill.bad{background:#FEF2F2;color:#B91C1C}

  .field-bar{margin:5px 0}
  .field-bar .fl{font-size:11px;display:flex;justify-content:space-between;color:#475569}
  .field-bar .ft{height:6px;background:#F1F5F9;border-radius:99px;overflow:hidden;margin-top:2px}
  .field-bar .ff{height:100%;border-radius:99px}

  .vend-list{margin-top:8px}
  .vend-item{display:flex;justify-content:space-between;font-size:11px;padding:4px 0;color:#475569}
  .vend-item b{color:#0F172A}

  .subhead{font-size:10px;font-weight:800;color:#94A3B8;text-transform:uppercase;
    letter-spacing:.05em;margin:12px 0 5px}

  .reco{background:#fff;border-radius:12px;padding:13px;margin-bottom:8px;
    border-left:5px solid #1E3A5F;display:flex;gap:11px}
  .reco.si{border-left-color:#22C55E}
  .reco.no{border-left-color:#DC2626}
  .reco.parcial{border-left-color:#F59E0B}
  .reco-ico{font-size:19px;flex-shrink:0}
  .reco-body{flex:1}
  .reco-t{font-size:13px;font-weight:800;color:#0F172A}
  .reco-w{font-size:11.5px;color:#475569;margin-top:3px}

  .footnote{margin:18px 16px 0;font-size:11px;color:#64748B;text-align:center;
    background:#fff;border-radius:12px;padding:13px;border:1px dashed #CBD5E1}
</style>
</head>
<body>
<div class="phone" id="app"></div>

<script>
const FB = "https://firestore.googleapis.com/v1/projects/grupo-consolidado-crm/databases/(default)/documents";
const PWD_OK = "wikuk2026";

// Colecciones de actividad comercial a auditar.
// campoFecha / campoVendedor: listas de nombres candidatos.
const COLS = [
  {col:"visitas",       ico:"🚶", campoFecha:["fecha","fechaVisita","ts","createdAt","fechaCreacion"],
     campoVend:["agente","agenteId","grupoAgente","creadoPor","vendedor"],
     clave:["cliente","clienteNombre","clienteCodigo"]},
  {col:"muestras",      ico:"📦", campoFecha:["fecha","fechaCreacion","fechaEntrega","ts"],
     campoVend:["agente","agenteId","creadoPor","grupoAgente"],
     clave:["cliente","clienteNombre","prod","producto"]},
  {col:"ofertas",       ico:"💰", campoFecha:["fechaCreacion","fecha","fechaEnvioCliente","ts"],
     campoVend:["agente","agenteId","creadoPor","grupoAgente"],
     clave:["clienteNombre","cliente"]},
  {col:"oportunidades", ico:"🎯", campoFecha:["fechaCreacion","fecha","createdAt","ts"],
     campoVend:["agente","agenteId","creadoPor","autor","grupoAgente"],
     clave:["nombre","cliente","clienteNombre"]},
  {col:"incidencias",   ico:"🚨", campoFecha:["fechaCreacion","fecha","ts"],
     campoVend:["autor","agente","creadoPor"],
     clave:["titulo","asunto","cliente"]},
  {col:"proyectos",     ico:"📁", campoFecha:["fechaCreacion","fecha","ts"],
     campoVend:["agente","responsable","creadoPor"],
     clave:["nombre","cliente"]},
  {col:"tareas",        ico:"✅", campoFecha:["fecha","vence","fechaCreacion","ts"],
     campoVend:["agente","agenteId","creadoPor"],
     clave:["titulo","texto","nombre"]},
  {col:"planes_semanales", ico:"📅", campoFecha:["fecha","fechaCreacion","ts"],
     campoVend:["agente","grupoAgente","creadoPor"],
     clave:["semana","id"]},
  {col:"estrategias",   ico:"♟️", campoFecha:["fecha","fechaCreacion","ts"],
     campoVend:["agente","creadoPor"],
     clave:["cliente","nombre"]},
  {col:"potenciales",   ico:"🔍", campoFecha:["fecha","fechaCreacion","ts"],
     campoVend:["agente","creadoPor","grupoAgente"],
     clave:["nombre","cliente"]},
];

const SEED_VEND = [
  {id:"wk1",nombre:"David Mag",equipo:"WIKUK",variantes:["WK1","DAVIDMAG"]},
  {id:"wk2",nombre:"Verónica",equipo:"WIKUK",variantes:["WK2","VERONICA"]},
  {id:"wk3",nombre:"Silvia",equipo:"WIKUK",variantes:["WK3","SILVIA"]},
  {id:"ik1",nombre:"Carlos G.",equipo:"INTERKEY",variantes:["IK1","CARLOSG"]},
  {id:"ik2",nombre:"Ricardo",equipo:"INTERKEY",variantes:["IK2","RICARDO"]},
  {id:"ik4",nombre:"Azarco",equipo:"INTERKEY",variantes:["IK4","AZARCO"]},
  {id:"rpiedra",nombre:"Ramon",equipo:"WIKUK",variantes:["RPIEDRA"]},
  {id:"jl",nombre:"Jose Luis",equipo:"WIKUK",variantes:["JL","JLGARCIA"]},
];

// ── Firebase ──
function fsToObj(doc){
  if(!doc||!doc.fields) return null;
  const o={};
  for(const k in doc.fields){
    const v=doc.fields[k];
    if(v.stringValue!==undefined)o[k]=v.stringValue;
    else if(v.integerValue!==undefined)o[k]=parseInt(v.integerValue);
    else if(v.doubleValue!==undefined)o[k]=parseFloat(v.doubleValue);
    else if(v.booleanValue!==undefined)o[k]=v.booleanValue;
    else if(v.timestampValue!==undefined)o[k]=v.timestampValue;
    else if(v.nullValue!==undefined)o[k]=null;
    else if(v.arrayValue&&v.arrayValue.values){
      o[k]=v.arrayValue.values.map(x=>{
        if(x.stringValue!==undefined)return x.stringValue;
        if(x.integerValue!==undefined)return parseInt(x.integerValue);
        if(x.mapValue)return fsToObj({fields:x.mapValue.fields});
        return x;
      });
    } else if(v.mapValue)o[k]=fsToObj({fields:v.mapValue.fields});
  }
  return o;
}
async function fbList(col){
  let docs=[], pageToken=null, pages=0;
  do{
    const url=`${FB}/${col}?pageSize=300${pageToken?`&pageToken=${pageToken}`:""}`;
    let r;
    try{ r=await fetch(url); }catch(e){ break; }
    if(!r.ok) break;
    const j=await r.json();
    if(j.documents){
      j.documents.forEach(d=>{
        const o=fsToObj(d);
        if(o){ o._docId=d.name.split("/").pop(); docs.push(o); }
      });
    }
    pageToken=j.nextPageToken;
    pages++;
  }while(pageToken && pages<25);
  return docs;
}

function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

// ¿La fecha es válida y razonable?
function fechaValida(raw){
  if(!raw) return false;
  let s=String(raw);
  if(/^\d{4}-\d{2}-\d{2}/.test(s)){ const d=new Date(s.substring(0,10)); return !isNaN(d); }
  if(s.indexOf("/")>=0){
    const p=s.split("/");
    if(p.length===3) return true;
  }
  if(/^\d{10,13}$/.test(s)) return true; // timestamp
  const d=new Date(s);
  return !isNaN(d);
}
function aFecha(raw){
  if(!raw) return null;
  let s=String(raw);
  if(s.indexOf("/")>=0){
    const p=s.split("/");
    if(p.length===3){ let yy=p[2]; if(yy.length===2)yy="20"+yy;
      return new Date(yy+"-"+p[1].padStart(2,"0")+"-"+p[0].padStart(2,"0")); }
  }
  if(/^\d{10}$/.test(s)) return new Date(parseInt(s)*1000);
  if(/^\d{13}$/.test(s)) return new Date(parseInt(s));
  const d=new Date(s.substring(0,19));
  return isNaN(d)?null:d;
}

let VEND=[], AUDIT=[];

async function cargar(){
  pintarLoading("Conectando…");
  // Vendedores
  let us=[],pu=[];
  pintarLoading("Cargando usuarios…");
  try{ us=await fbList("usuarios"); }catch(e){}
  try{ pu=await fbList("portal_users"); }catch(e){}
  construirVend(us.concat(pu));

  // Auditar cada colección
  AUDIT=[];
  for(const c of COLS){
    pintarLoading("Auditando "+c.col+"…");
    let docs=[];
    try{ docs=await fbList(c.col); }catch(e){}
    AUDIT.push(auditar(c,docs));
  }
  render();
}

function construirVend(todos){
  const porNombre={};
  todos.forEach(u=>{
    const rol=(u.rol||"").toLowerCase();
    if(rol!=="agente"&&rol!=="crm_agente") return;
    const nom=(u.nombre||u.username||u.catalogoVendedor||"").trim();
    if(!nom) return;
    const key=nom.toUpperCase();
    if(!porNombre[key]) porNombre[key]={nombre:nom,equipo:u.equipo||"",claves:new Set()};
    if(u.equipo&&!porNombre[key].equipo) porNombre[key].equipo=u.equipo;
    ["_docId","id","grupoAgente","username","catalogoVendedor","nombre"].forEach(k=>{
      if(u[k]) porNombre[key].claves.add(String(u[k]).toUpperCase().trim());
    });
  });
  VEND=Object.keys(porNombre).map(key=>{
    const p=porNombre[key];
    const seed=SEED_VEND.find(s=>p.claves.has(s.id.toUpperCase())||s.variantes.some(v=>p.claves.has(v)));
    if(seed){ seed.variantes.forEach(v=>p.claves.add(v)); p.claves.add(seed.id.toUpperCase());
      if(!p.equipo)p.equipo=seed.equipo; }
    return {nombre:p.nombre,equipo:p.equipo,claves:p.claves};
  });
  if(VEND.length===0){
    VEND=SEED_VEND.map(s=>({nombre:s.nombre,equipo:s.equipo,
      claves:new Set([s.id.toUpperCase()].concat(s.variantes))}));
  }
}

function auditar(conf, docs){
  const vivos=docs.filter(d=>!d.eliminada&&!d.eliminado);
  const total=vivos.length;
  const r={col:conf.col, ico:conf.ico, total:total, totalCrudo:docs.length, docs:vivos};

  // Fecha
  let conFecha=0, fechas=[];
  vivos.forEach(d=>{
    let raw=null;
    for(const cf of conf.campoFecha){ if(d[cf]){ raw=d[cf]; break; } }
    if(raw && fechaValida(raw)){ conFecha++; const f=aFecha(raw); if(f)fechas.push(f); }
  });
  r.pctFecha = total>0?Math.round(conFecha/total*100):0;
  r.campoFechaUsado = conf.campoFecha.find(cf=>vivos.some(d=>d[cf]))||"(ninguno)";
  // Rango de fechas
  if(fechas.length){
    fechas.sort((a,b)=>a-b);
    r.fechaMin=fechas[0]; r.fechaMax=fechas[fechas.length-1];
    // ¿Cuántas en los últimos 30 / 90 días?
    const ahora=Date.now();
    r.ult30=fechas.filter(f=>(ahora-f.getTime())<30*86400000).length;
    r.ult90=fechas.filter(f=>(ahora-f.getTime())<90*86400000).length;
  }

  // Vendedor asignado
  let conVend=0, asignadosOk=0;
  const porVend={};
  vivos.forEach(d=>{
    let raw=null;
    for(const cv of conf.campoVend){ if(d[cv]){ raw=d[cv]; break; } }
    if(raw){
      conVend++;
      const v=String(raw).toUpperCase().trim();
      const ve=VEND.find(x=>x.claves.has(v));
      if(ve){ asignadosOk++; porVend[ve.nombre]=(porVend[ve.nombre]||0)+1; }
      else porVend["(sin reconocer: "+raw+")"]=(porVend["(sin reconocer: "+raw+")"]||0)+1;
    }
  });
  r.pctVend = total>0?Math.round(conVend/total*100):0;
  r.pctVendOk = total>0?Math.round(asignadosOk/total*100):0;
  r.campoVendUsado = conf.campoVend.find(cv=>vivos.some(d=>d[cv]))||"(ninguno)";
  r.porVend = Object.keys(porVend).map(k=>({nombre:k,n:porVend[k]})).sort((a,b)=>b.n-a.n);

  // Campo clave (cliente/nombre) relleno
  let conClave=0;
  vivos.forEach(d=>{
    for(const ck of conf.clave){ if(d[ck]){ conClave++; break; } }
  });
  r.pctClave = total>0?Math.round(conClave/total*100):0;

  // Nota de calidad (A-F)
  if(total===0){ r.nota="—"; r.notaColor="#94A3B8"; r.calidad="vacía"; }
  else {
    const score=(r.pctFecha*0.4 + r.pctVendOk*0.45 + r.pctClave*0.15);
    if(score>=85){ r.nota="A"; r.notaColor="#16A34A"; r.calidad="excelente"; }
    else if(score>=70){ r.nota="B"; r.notaColor="#65A30D"; r.calidad="buena"; }
    else if(score>=50){ r.nota="C"; r.notaColor="#F59E0B"; r.calidad="regular"; }
    else if(score>=30){ r.nota="D"; r.notaColor="#EA580C"; r.calidad="pobre"; }
    else { r.nota="F"; r.notaColor="#DC2626"; r.calidad="muy pobre"; }
    r.score=Math.round(score);
  }
  return r;
}

// ── Render ──
function pintarLoading(step){
  document.getElementById("app").innerHTML=`
    <div class="loading"><div class="spin">🔬</div>
      <div>Auditando datos de actividad…</div>
      <div class="load-step">${esc(step||"")}</div></div>`;
}

function fmtFecha(d){
  if(!d) return "—";
  return d.toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit",year:"numeric"});
}

function render(){
  // Resumen global
  const conDatos=AUDIT.filter(a=>a.total>0);
  const vacias=AUDIT.filter(a=>a.total===0);
  const buenas=AUDIT.filter(a=>a.nota==="A"||a.nota==="B");
  const totalRegistros=AUDIT.reduce((s,a)=>s+a.total,0);

  // Veredicto en lenguaje llano
  let veredicto="";
  if(totalRegistros===0){
    veredicto="<b>No hay datos de actividad.</b> Las colecciones están vacías — habría que empezar registrando actividad antes de poder medir nada.";
  } else {
    const nombresVacias=vacias.map(a=>a.col).join(", ");
    const nombresBuenas=buenas.map(a=>a.col).join(", ");
    veredicto=`Hay <b>${totalRegistros} registros</b> de actividad en total. `;
    if(buenas.length>0) veredicto+=`Con calidad suficiente para medir: <b>${nombresBuenas}</b>. `;
    if(vacias.length>0) veredicto+=`Sin datos: <b>${nombresVacias}</b>. `;
    const flojas=conDatos.filter(a=>a.nota==="C"||a.nota==="D"||a.nota==="F");
    if(flojas.length>0) veredicto+=`Con datos pero de calidad floja: <b>${flojas.map(a=>a.col).join(", ")}</b> — normalmente por fechas o vendedor sin rellenar.`;
  }

  // Tarjetas de colección
  let cards="";
  AUDIT.sort((a,b)=>b.total-a.total);
  AUDIT.forEach((a,idx)=>{
    cards+=`<div class="col-card">
      <div class="col-head" onclick="toggle(${idx})">
        <div class="col-ico">${a.ico}</div>
        <div class="col-body">
          <div class="col-name">${a.col.replace(/_/g," ")}</div>
          <div class="col-meta">${a.total} registro${a.total!==1?"s":""}${a.total>0?" · calidad "+a.calidad:" · vacía"}</div>
        </div>
        <div class="col-grade" style="background:${a.notaColor}">${a.nota}</div>
      </div>
      <div class="col-detail" id="det-${idx}">${renderDetalle(a)}</div>
    </div>`;
  });

  // Recomendaciones: qué se puede medir
  let recos=renderRecomendaciones();

  document.getElementById("app").innerHTML=`
    <div class="hero">
      <h1>🔬 Auditoría de actividad</h1>
      <div class="sub">Qué datos hay y si sirven para medir</div>
    </div>
    <div class="verdict-box">
      <div class="tag">Veredicto</div>
      <p>${veredicto}</p>
    </div>
    <div class="section">
      <div class="s-title">Colecciones de actividad</div>
      ${cards}
    </div>
    <div class="section">
      <div class="s-title">¿Qué métricas se pueden sacar?</div>
      ${recos}
    </div>
    <div class="footnote">Auditoría sobre datos reales de Firebase · toca cada colección para el detalle</div>
  `;
}

function renderDetalle(a){
  if(a.total===0){
    return `<div style="font-size:12px;color:#94A3B8;text-align:center;padding:6px">
      Colección vacía. ${a.totalCrudo>0?"("+a.totalCrudo+" registros pero marcados como eliminados)":"Sin registros."}</div>`;
  }
  let h="";
  // Métricas de calidad
  h+=`<div class="metric"><span class="ml">Registros activos</span><span class="mv">${a.total}</span></div>`;

  // Fecha
  const fechaPill=a.pctFecha>=85?"ok":a.pctFecha>=50?"med":"bad";
  h+=`<div class="field-bar">
    <div class="fl"><span>Con fecha válida (campo: ${a.campoFechaUsado})</span>
    <span class="pill ${fechaPill}">${a.pctFecha}%</span></div>
    <div class="ft"><div class="ff" style="width:${a.pctFecha}%;background:${a.pctFecha>=85?'#22C55E':a.pctFecha>=50?'#F59E0B':'#DC2626'}"></div></div>
  </div>`;

  // Vendedor
  const vendPill=a.pctVendOk>=85?"ok":a.pctVendOk>=50?"med":"bad";
  h+=`<div class="field-bar">
    <div class="fl"><span>Asignado a vendedor reconocido (campo: ${a.campoVendUsado})</span>
    <span class="pill ${vendPill}">${a.pctVendOk}%</span></div>
    <div class="ft"><div class="ff" style="width:${a.pctVendOk}%;background:${a.pctVendOk>=85?'#22C55E':a.pctVendOk>=50?'#F59E0B':'#DC2626'}"></div></div>
  </div>`;
  if(a.pctVend>a.pctVendOk){
    h+=`<div style="font-size:10px;color:#B45309;margin-top:-2px">⚠ ${a.pctVend-a.pctVendOk}% tiene vendedor pero con un código no reconocido</div>`;
  }

  // Clave
  h+=`<div class="field-bar">
    <div class="fl"><span>Con cliente/nombre relleno</span>
    <span class="pill ${a.pctClave>=85?'ok':a.pctClave>=50?'med':'bad'}">${a.pctClave}%</span></div>
    <div class="ft"><div class="ff" style="width:${a.pctClave}%;background:${a.pctClave>=85?'#22C55E':a.pctClave>=50?'#F59E0B':'#DC2626'}"></div></div>
  </div>`;

  // Rango temporal
  if(a.fechaMin){
    h+=`<div class="subhead">Rango temporal</div>`;
    h+=`<div class="metric"><span class="ml">Primer registro</span><span class="mv">${fmtFecha(a.fechaMin)}</span></div>`;
    h+=`<div class="metric"><span class="ml">Último registro</span><span class="mv">${fmtFecha(a.fechaMax)}</span></div>`;
    h+=`<div class="metric"><span class="ml">Últimos 30 días</span><span class="mv">${a.ult30||0} registros</span></div>`;
    h+=`<div class="metric"><span class="ml">Últimos 90 días</span><span class="mv">${a.ult90||0} registros</span></div>`;
  }

  // Por vendedor
  if(a.porVend.length){
    h+=`<div class="subhead">Reparto por vendedor</div><div class="vend-list">`;
    a.porVend.slice(0,12).forEach(v=>{
      const malo=v.nombre.indexOf("sin reconocer")>=0;
      h+=`<div class="vend-item"><span style="${malo?'color:#B91C1C':''}">${esc(v.nombre)}</span><b>${v.n}</b></div>`;
    });
    h+=`</div>`;
  }
  return h;
}

function renderRecomendaciones(){
  // Cruza la calidad de las colecciones con qué métricas necesitan
  const get=c=>AUDIT.find(a=>a.col===c)||{total:0,nota:"—",pctFecha:0,pctVendOk:0};
  const metricas=[
    {nombre:"Volumen de visitas por vendedor", req:["visitas"], need:"fecha+vendedor"},
    {nombre:"Constancia (visitas repartidas en la semana)", req:["visitas"], need:"fecha"},
    {nombre:"Muestras entregadas y % con feedback", req:["muestras"], need:"fecha+vendedor"},
    {nombre:"Ofertas creadas y % cerradas", req:["ofertas"], need:"fecha+vendedor"},
    {nombre:"Oportunidades abiertas por vendedor", req:["oportunidades"], need:"vendedor"},
    {nombre:"Incidencias registradas por vendedor", req:["incidencias"], need:"vendedor"},
    {nombre:"Cobertura: clientes distintos visitados", req:["visitas"], need:"vendedor+cliente"},
    {nombre:"Trabajo que se enfría (sin cerrar)", req:["muestras","ofertas"], need:"fecha"},
  ];
  let h="";
  metricas.forEach(mt=>{
    let posible=true, motivo="";
    mt.req.forEach(c=>{
      const a=get(c);
      if(a.total===0){ posible=false; motivo=`falta registrar ${c}`; }
    });
    let parcial=false;
    if(posible){
      mt.req.forEach(c=>{
        const a=get(c);
        if((mt.need.indexOf("fecha")>=0 && a.pctFecha<70) ||
           (mt.need.indexOf("vendedor")>=0 && a.pctVendOk<70)){
          parcial=true;
          motivo=`${c}: calidad de ${mt.need.indexOf("fecha")>=0&&a.pctFecha<70?"fechas":"asignación a vendedor"} baja`;
        }
      });
    }
    let cls,ico,estado;
    if(!posible){ cls="no"; ico="✗"; estado="No se puede aún"; }
    else if(parcial){ cls="parcial"; ico="◐"; estado="Parcial / poco fiable"; }
    else { cls="si"; ico="✓"; estado="Se puede medir bien"; }
    h+=`<div class="reco ${cls}">
      <div class="reco-ico">${ico}</div>
      <div class="reco-body">
        <div class="reco-t">${esc(mt.nombre)}</div>
        <div class="reco-w">${estado}${motivo?" — "+esc(motivo):""}</div>
      </div></div>`;
  });
  return h;
}

function toggle(idx){
  const el=document.getElementById("det-"+idx);
  if(el) el.classList.toggle("open");
}

// ── Arranque ──
function gate(){
  document.getElementById("app").innerHTML=`
    <div class="gate"><h2>🔬 Auditoría de actividad</h2>
      <p>Acceso restringido</p>
      <input type="password" id="pwd" placeholder="Contraseña">
      <br><button onclick="comprobar()">Entrar</button></div>`;
  document.getElementById("pwd").addEventListener("keypress",e=>{if(e.key==="Enter")comprobar();});
}
function comprobar(){
  if(document.getElementById("pwd").value===PWD_OK){
    sessionStorage.setItem("audit_ok","1");
    cargar();
  } else alert("Contraseña incorrecta");
}
if(sessionStorage.getItem("audit_ok")==="1") cargar();
else gate();
</script>
