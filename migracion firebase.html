  var fields = {};
  Object.keys(p).forEach(function(k) {
    if (p[k] !== undefined && p[k] !== null && p[k] !== '') {

  });
  return { fields: fields };
}

var _log = document.getElementById('log');
function log(msg) {
  _log.textContent += msg + '\n';
  _log.scrollTop = _log.scrollHeight;
}

async function startMigration() {
  var btn = document.getElementById('goBtn');
  btn.disabled = true;
  var bar = document.getElementById('bar');
  var status = document.getElementById('status');
  
  log('🔥 Iniciando migración de ' + PRODUCTOS.length + ' productos...');
  log('Destino: ' + FB_BASE + '/productos');
  log('');
  
  var ok = 0, err = 0;
  var batchSize = 10;
  
  for (var i = 0; i < PRODUCTOS.length; i += batchSize) {
    var batch = PRODUCTOS.slice(i, i + batchSize);
    var promises = batch.map(function(p) {
      var docId = p.codigo.replace(/[\/.#$\[\]]/g, '_');
      var url = FB_BASE + '/productos/' + encodeURIComponent(docId);
      return fetch(url, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(toFirestoreDoc(p))
      }).then(function(r) {
        if (r.ok) { ok++; }
        else { err++; log('❌ Error ' + p.codigo + ': ' + r.status); }
      }).catch(function(e) {
        err++; log('❌ Error ' + p.codigo + ': ' + e.message);
      });
    });
    
    await Promise.all(promises);
    
    var pct = Math.round((i + batch.length) / PRODUCTOS.length * 100);
    bar.style.width = pct + '%';
    status.textContent = 'Migrando... ' + (i + batch.length) + '/' + PRODUCTOS.length;
    
    if ((i + batch.length) % 100 === 0 || i + batch.length >= PRODUCTOS.length) {
      log('📦 ' + (i + batch.length) + '/' + PRODUCTOS.length + ' (' + ok + ' ok, ' + err + ' err)');
    }
  }
  
  log('');
  log('✅ Migración completada: ' + ok + ' ok, ' + err + ' errores');
  status.textContent = '✅ Completado: ' + ok + ' productos subidos';
  bar.style.width = '100%';
  bar.style.background = '#16A34A';
}
</script>
