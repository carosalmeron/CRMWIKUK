<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vista CEO — Grupo Consolidado</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#0B1220;color:#0F172A;line-height:1.5;-webkit-font-smoothing:antialiased}
  .phone{max-width:480px;margin:0 auto;background:#F1F5F9;min-height:100vh;padding-bottom:50px}

  /* Password gate */
  .gate{padding:60px 24px;text-align:center}
  .gate h2{color:#fff;font-size:20px;margin-bottom:6px}
  .gate p{color:#94A3B8;font-size:13px;margin-bottom:20px}
  .gate input{width:100%;max-width:280px;padding:12px;border-radius:9px;border:none;font-size:15px}
  .gate button{margin-top:12px;padding:12px 28px;background:#F59E0B;color:#0F172A;
    border:none;border-radius:9px;font-weight:800;font-size:14px;cursor:pointer}

  /* Loading */
  .loading{padding:60px 24px;text-align:center;color:#94A3B8}
  .loading .spin{font-size:34px;margin-bottom:14px;animation:p 1.4s ease-in-out infinite}
  @keyframes p{0%,100%{opacity:.3}50%{opacity:1}}
  .load-step{font-size:12px;color:#64748B;margin-top:4px}

  /* Hero */
  .hero{background:linear-gradient(160deg,#1E3A5F 0%,#0F172A 100%);color:#fff;
    padding:20px 20px 24px;position:relative;overflow:hidden}
  .hero::after{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;
    background:radial-gradient(circle,rgba(245,158,11,.18),transparent 70%)}
  .hero .fecha{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#94A3B8;font-weight:700}
  .hero h1{font-size:24px;font-weight:900;margin:5px 0 2px;letter-spacing:-.02em}
  .hero .sub{font-size:13px;color:#CBD5E1}
  .back{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.1);
    color:#fff;border:none;padding:7px 13px;border-radius:8px;font-size:12px;font-weight:700;
    cursor:pointer;margin-bottom:12px}

  /* Global summary */
  .gsum{background:#fff;margin:-14px 16px 0;border-radius:14px;padding:16px 18px;
    box-shadow:0 6px 24px rgba(15,23,42,.10);position:relative;z-index:2}
  .gsum-top{display:flex;justify-content:space-between;align-items:flex-end}
  .gsum-val{font-size:26px;font-weight:900;letter-spacing:-.02em}
  .gsum-of{font-size:12px;color:#64748B;font-weight:600;text-align:right}
  .bar{height:11px;background:#F1F5F9;border-radius:99px;overflow:hidden;margin:9px 0 4px}
  .bar-fill{height:100%;border-radius:99px}
  .gsum-tags{display:flex;gap:7px;margin-top:12px}
  .gtag{flex:1;text-align:center;border-radius:9px;padding:8px 4px;font-size:11px;font-weight:800}
  .gtag .n{font-size:18px;font-weight:900;display:block}

  .section{margin:20px 16px 0}
  .s-head{display:flex;align-items:baseline;gap:8px;margin-bottom:9px}
  .s-num{font-size:11px;font-weight:900;color:#F59E0B}
  .s-title{font-size:15px;font-weight:900;color:#0F172A}
  .s-sub{font-size:11px;color:#94A3B8;margin-left:auto;font-weight:600}

  /* Vendor row (global list) */
  .vrow{background:#fff;border-radius:12px;padding:13px 14px;margin-bottom:8px;
    border-left:5px solid #CBD5E1;cursor:pointer;display:flex;align-items:center;gap:12px}
  .vrow.riesgo{border-left-color:#DC2626}
  .vrow.atencion{border-left-color:#F59E0B}
  .vrow.bien{border-left-color:#22C55E}
  .vrow-body{flex:1;min-width:0}
  .vrow-name{font-size:14px;font-weight:800;color:#0F172A}
  .vrow-eq{font-size:11px;color:#94A3B8;font-weight:600}
  .vrow-bar{height:7px;background:#F1F5F9;border-radius:99px;overflow:hidden;margin-top:6px}
  .vrow-bar div{height:100%;border-radius:99px}
  .vrow-meta{font-size:11px;color:#64748B;margin-top:4px;font-weight:600}
  .vrow-pct{font-size:17px;font-weight:900;text-align:right;flex-shrink:0;min-width:48px}
  .vrow-chev{color:#CBD5E1;font-size:20px;flex-shrink:0}

  /* Brief */
  .brief{background:#fff;border-radius:14px;padding:15px 17px;border:1px solid #E2E8F0}
  .brief .tag{font-size:10px;font-weight:800;letter-spacing:.08em;color:#64748B;text-transform:uppercase}
  .brief p{font-size:13.5px;color:#1E293B;margin-top:6px}
  .brief b{color:#0F172A;font-weight:800}

  /* Perf card */
  .perf{background:#fff;border-radius:14px;padding:17px;border:1px solid #E2E8F0}
  .perf-main{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:3px}
  .perf-val{font-size:30px;font-weight:900;letter-spacing:-.03em}
  .perf-of{font-size:12px;color:#64748B;font-weight:600;text-align:right}
  .perf-pct{font-size:12px;font-weight:700}
  .perf-grid{display:flex;gap:9px;margin-top:14px}
  .mini{flex:1;background:#F8FAFC;border-radius:11px;padding:10px 11px}
  .mini .l{font-size:9px;color:#64748B;font-weight:700;text-transform:uppercase}
  .mini .v{font-size:17px;font-weight:900;margin-top:3px}
  .mini .d{font-size:10px;font-weight:700;margin-top:1px}
  .up{color:#16A34A}.down{color:#DC2626}.flat{color:#64748B}

  /* Verdict */
  .verdict{display:inline-flex;align-items:center;gap:6px;margin-top:12px;
    padding:6px 13px;border-radius:99px;font-size:12px;font-weight:800}
  .verdict.atencion{background:#F59E0B;color:#3A2606}
  .verdict.bien{background:#22C55E;color:#06280F}
  .verdict.riesgo{background:#EF4444;color:#fff}

  /* Signals */
  .signal{background:#fff;border-radius:12px;padding:13px;margin-bottom:8px;
    border-left:5px solid #CBD5E1;display:flex;gap:11px}
  .signal.alta{border-left-color:#DC2626}
  .signal.media{border-left-color:#F59E0B}
  .sig-ico{font-size:20px;flex-shrink:0}
  .sig-body{flex:1;min-width:0}
  .sig-issue{font-size:13.5px;font-weight:800;color:#0F172A}
  .sig-detail{font-size:12px;color:#475569;margin-top:3px}
  .sig-impact{display:inline-block;margin-top:6px;font-size:11px;font-weight:800;
    padding:3px 8px;border-radius:6px;background:#FEF2F2;color:#B91C1C}
  .sig-impact.amb{background:#FFFBEB;color:#B45309}
  .nada{background:#fff;border-radius:12px;padding:22px;text-align:center;border:1px solid #E2E8F0}
  .nada .ic{font-size:32px}
  .nada p{font-size:13px;font-weight:700;color:#22C55E;margin-top:6px}

  /* Funnel */
  .funnel{background:#fff;border-radius:14px;padding:15px 17px;border:1px solid #E2E8F0}
  .stage{margin-bottom:10px}
  .stage:last-child{margin-bottom:0}
  .stage-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
  .stage-name{font-weight:700;color:#334155}
  .stage-val{font-weight:900;color:#0F172A}
  .stage-bar{height:20px;border-radius:6px;min-width:38px}

  /* Trend */
  .trend{background:#fff;border-radius:14px;padding:15px 17px 11px;border:1px solid #E2E8F0;position:relative}
  .chart{display:flex;align-items:flex-end;justify-content:space-between;height:120px;gap:7px;margin-top:6px}
  .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%}
  .col-bars{flex:1;width:100%;display:flex;align-items:flex-end;justify-content:center}
  .col-bar{width:72%;border-radius:5px 5px 0 0}
  .col-val{font-size:9px;font-weight:800;color:#475569}
  .col-lbl{font-size:10px;color:#94A3B8;font-weight:700}
  .legend{font-size:10px;color:#94A3B8;margin-top:7px;text-align:center}

  /* Debug */
  .debug{margin:18px 16px 0;background:#1E293B;color:#94A3B8;border-radius:10px;
    padding:12px 14px;font-size:11px;font-family:monospace}
  .debug summary{cursor:pointer;color:#CBD5E1;font-weight:700}
  .debug div{margin-top:6px}
  .footnote{margin:18px 16px 0;font-size:11px;color:#64748B;text-align:center;
    background:#fff;border-radius:12px;padding:13px;border:1px dashed #CBD5E1}
</style>
</head>
<body>
<div class="phone" id="app"></div>

<script>
// ════════════ CONFIG ════════════
const FB = "https://firestore.googleapis.com/v1/projects/grupo-consolidado-crm/databases/(default)/documents";
const PWD_OK = "wikuk2026";

// Mapeo de vendedores del seed (fallback). id canónico + variantes.
const SEED_VEND = [
  {id:"wk1", nombre:"David Mag",  equipo:"WIKUK",    variantes:["WK1","DAVIDMAG"]},
  {id:"wk2", nombre:"Verónica",   equipo:"WIKUK",    variantes:["WK2","VERONICA"]},
  {id:"wk3", nombre:"Silvia",     equipo:"WIKUK",    variantes:["WK3","SILVIA"]},
  {id:"ik1", nombre:"Carlos G.",  equipo:"INTERKEY", variantes:["IK1","CARLOSG"]},
  {id:"ik2", nombre:"Ricardo",    equipo:"INTERKEY", variantes:["IK2","RICARDO"]},
  {id:"ik4", nombre:"Azarco",     equipo:"INTERKEY", variantes:["IK4","AZARCO"]},
  {id:"rpiedra", nombre:"Ramon",  equipo:"WIKUK",    variantes:["RPIEDRA"]},
  {id:"jl",  nombre:"Jose Luis",  equipo:"WIKUK",    variantes:["JL","JLGARCIA"]},
];

const HOY = new Date();
const ANIO = HOY.getFullYear();
const MES = HOY.getMonth(); // 0-11
const MES_NOMBRE = ["enero","febrero","marzo","abril","mayo","junio","julio",
  "agosto","septiembre","octubre","noviembre","diciembre"];
const MES_CORTO = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

// ════════════ FIREBASE ════════════
function fsToObj(doc){
  if(!doc||!doc.fields) return null;
  const o={};
  for(const k in doc.fields){
    const v=doc.fields[k];
    if(v.stringValue!==undefined)o[k]=v.stringValue;
    else if(v.integerValue!==undefined)o[k]=parseInt(v.integerValue);
    else if(v.doubleValue!==undefined)o[k]=parseFloat(v.doubleValue);
    else if(v.booleanValue!==undefined)o[k]=v.booleanValue;
    else if(v.timestampValue!==undefined)o[k]=v.timestampValue;
    else if(v.nullValue!==undefined)o[k]=null;
    else if(v.arrayValue&&v.arrayValue.values){
      o[k]=v.arrayValue.values.map(x=>{
        if(x.stringValue!==undefined)return x.stringValue;
        if(x.integerValue!==undefined)return parseInt(x.integerValue);
        if(x.doubleValue!==undefined)return parseFloat(x.doubleValue);
        if(x.mapValue)return fsToObj({fields:x.mapValue.fields});
        return x;
      });
    } else if(v.mapValue)o[k]=fsToObj({fields:v.mapValue.fields});
  }
  return o;
}
async function fbList(col, maxPages){
  let docs=[], pageToken=null, pages=0;
  const cap = maxPages||30;
  do{
    const url=`${FB}/${col}?pageSize=300${pageToken?`&pageToken=${pageToken}`:""}`;
    let r;
    try{ r=await fetch(url); }catch(e){ break; }
    if(!r.ok) break;
    const j=await r.json();
    if(j.documents){
      j.documents.forEach(d=>{
        const o=fsToObj(d);
        if(o){ o._docId=d.name.split("/").pop(); docs.push(o); }
      });
    }
    pageToken=j.nextPageToken;
    pages++;
  }while(pageToken && pages<cap);
  return docs;
}

// ════════════ HELPERS ════════════
function num(doc, ...keys){
  for(const k of keys){
    let raw=doc[k];
    if(raw===undefined||raw===null||raw==="") continue;
    if(typeof raw==="number") return raw;
    const n=parseFloat(String(raw).replace(/[^0-9.\-]/g,""));
    if(!isNaN(n)) return n;
  }
  return 0;
}
function pick(doc, keys){
  for(const k of keys){
    if(doc[k]!==undefined && doc[k]!==null && doc[k]!=="") return doc[k];
  }
  return null;
}
function eur(n){
  if(n==null||isNaN(n)) return "—";
  return Math.round(n).toLocaleString("es-ES")+" €";
}
function eurK(n){
  if(n==null||isNaN(n)) return "—";
  if(Math.abs(n)>=1000) return Math.round(n/1000)+"k";
  return Math.round(n)+"";
}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
// Mes (0-11) al que pertenece una semana ISO de un año dado
function mesDeSemana(sem, anio){
  const jan1=new Date(anio,0,1);
  const off=(sem-1)*7*86400000;
  return new Date(jan1.getTime()+off).getMonth();
}
function normPct(mg){
  if(mg>0 && mg<1) return +(mg*100).toFixed(1);
  return +mg.toFixed(1);
}
function diasDesde(f){
  if(!f) return null;
  let s=String(f);
  if(s.indexOf("/")>=0){
    const p=s.split("/");
    if(p.length===3){ let yy=p[2]; if(yy.length===2)yy="20"+yy; s=yy+"-"+p[1].padStart(2,"0")+"-"+p[0].padStart(2,"0"); }
  }
  const d=new Date(s.substring(0,10)+"T00:00:00");
  if(isNaN(d)) return null;
  return Math.floor((Date.now()-d.getTime())/86400000);
}

// ════════════ ESTADO ════════════
let DATA = {}; // colecciones crudas
let VEND = []; // lista de vendedores {id,nombre,equipo,claves:Set}
let vista = "global"; // "global" | id de vendedor

// ════════════ CARGA ════════════
async function cargarTodo(){
  pintarLoading("Conectando con Firebase…");
  const cols = ["usuarios","portal_users","agentes_kpi","presupuesto",
    "monetizacion","oportunidades","muestras","ofertas"];
  DATA={};
  for(const c of cols){
    pintarLoading("Cargando "+c+"…");
    DATA[c]=await fbList(c);
  }
  construirVendedores();
  vista="global";
  render();
}

function construirVendedores(){
  // Construye la lista de vendedores desde usuarios+portal_users (rol agente)
  const todos=(DATA.usuarios||[]).concat(DATA.portal_users||[]);
  const porNombre={};
  todos.forEach(u=>{
    const rol=(u.rol||"").toLowerCase();
    if(rol!=="agente" && rol!=="crm_agente") return;
    const nom=(u.nombre||u.username||u.catalogoVendedor||"").trim();
    if(!nom) return;
    const key=nom.toUpperCase();
    if(!porNombre[key]) porNombre[key]={nombre:nom,equipo:u.equipo||"",claves:new Set()};
    if(u.equipo && !porNombre[key].equipo) porNombre[key].equipo=u.equipo;
    ["_docId","id","grupoAgente","username","catalogoVendedor","nombre","portalId","portalDocId"].forEach(k=>{
      if(u[k]) porNombre[key].claves.add(String(u[k]).toUpperCase().trim());
    });
  });
  VEND=[];
  Object.keys(porNombre).forEach(key=>{
    const p=porNombre[key];
    // id canónico
    let idc=null;
    const seed=SEED_VEND.find(s=>p.claves.has(s.id.toUpperCase()) ||
      s.variantes.some(v=>p.claves.has(v)));
    if(seed){ idc=seed.id; if(!p.equipo)p.equipo=seed.equipo;
      seed.variantes.forEach(v=>p.claves.add(v)); p.claves.add(seed.id.toUpperCase()); }
    if(!idc){ p.claves.forEach(c=>{ if(!idc&&/^[A-Z]{2}\d+$/.test(c))idc=c.toLowerCase(); }); }
    if(!idc) idc=key.toLowerCase().replace(/\s+/g,"");
    VEND.push({id:idc,nombre:p.nombre,equipo:p.equipo,claves:p.claves});
  });
  // Si Firebase no devolvió usuarios, usar el seed
  if(VEND.length===0){
    VEND=SEED_VEND.map(s=>({id:s.id,nombre:s.nombre,equipo:s.equipo,
      claves:new Set([s.id.toUpperCase()].concat(s.variantes))}));
  }
  VEND.sort((a,b)=>(a.equipo||"").localeCompare(b.equipo||"")||a.nombre.localeCompare(b.nombre));
}

// ════════════ CÁLCULO DE MÉTRICAS POR VENDEDOR ════════════
function esDe(doc, ve, campos){
  for(const c of campos){
    const v=doc[c];
    if(v && ve.claves.has(String(v).toUpperCase().trim())) return true;
  }
  return false;
}

function metricas(ve){
  const m={ve:ve};

  // ── KPI anual (agentes_kpi) ──
  const kpi=(DATA.agentes_kpi||[]).find(k=>esDe(k,ve,["crmId","agente","nombre","grupoAgente"]));
  m.vAnual = kpi?num(kpi,"ventasRealAcum"):0;
  m.oAnual = kpi?num(kpi,"ventasPptoAcum"):0;
  m.mb     = kpi?normPct(num(kpi,"mgMedio")):0;
  m.oMb    = kpi?normPct(num(kpi,"mgObjetivo")):0;

  // ── Presupuesto + monetización semanal ──
  const presup=(DATA.presupuesto||[]).concat(DATA.monetizacion||[])
    .filter(d=>esDe(d,ve,["crmId","agente","grupoAgente"]));

  // Mes actual / mes anterior
  function sumMes(mesIdx, anio){
    return presup.filter(d=>{
      const a=num(d,"ano","AÑO","anio")||anio;
      if(a!==anio) return false;
      return mesDeSemana(num(d,"semana","SEMANA"),anio)===mesIdx;
    });
  }
  const docsMes=sumMes(MES,ANIO);
  m.vMes=docsMes.reduce((s,d)=>s+num(d,"ventasReal","VENTAS REAL"),0);
  m.oMes=docsMes.reduce((s,d)=>s+num(d,"ventasPpto","VENTAS PPTO.","VENTAS PPTO"),0);

  const mesAntIdx=MES===0?11:MES-1;
  const anioAnt=MES===0?ANIO-1:ANIO;
  const docsMesAnt=sumMes(mesAntIdx,anioAnt);
  m.vMesAnt=docsMesAnt.reduce((s,d)=>s+num(d,"ventasReal","VENTAS REAL"),0);

  // Margen del mes si no vino del KPI
  if(!m.mb){
    const mgs=docsMes.map(d=>normPct(num(d,"mgReal","MG REAL"))).filter(x=>x>0);
    if(mgs.length) m.mb=+(mgs.reduce((a,b)=>a+b,0)/mgs.length).toFixed(1);
    const mgo=docsMes.map(d=>normPct(num(d,"mgPpto","MG PPTO"))).filter(x=>x>0);
    if(mgo.length) m.oMb=+(mgo.reduce((a,b)=>a+b,0)/mgo.length).toFixed(1);
  }

  // ── Tendencia 6 meses ──
  m.trend=[];
  for(let i=5;i>=0;i--){
    let mi=MES-i, yr=ANIO;
    while(mi<0){ mi+=12; yr--; }
    const docs=sumMes(mi,yr);
    const v=docs.reduce((s,d)=>s+num(d,"ventasReal","VENTAS REAL"),0);
    const o=docs.reduce((s,d)=>s+num(d,"ventasPpto","VENTAS PPTO.","VENTAS PPTO"),0);
    m.trend.push({mes:MES_CORTO[mi],v:v,o:o});
  }

  // ── Pipeline (oportunidades) ──
  const opos=(DATA.oportunidades||[]).filter(o=>{
    if(o.eliminada) return false;
    if(!esDe(o,ve,["agente","agenteId","creadoPor","autor"])) return false;
    const et=String(o.etapa||o.fase||o.estado||"").toLowerCase();
    return et.indexOf("cerrad")<0 && et.indexOf("perdid")<0 && et.indexOf("ganad")<0;
  });
  const porEtapa={};
  opos.forEach(o=>{
    const et=String(o.etapa||o.fase||o.estado||"sin etapa");
    const val=num(o,"valor","valorEstimado","importe","valorTotal","monto");
    if(!porEtapa[et]) porEtapa[et]={nombre:et,val:0,n:0};
    porEtapa[et].val+=val; porEtapa[et].n++;
  });
  m.pipeline=Object.keys(porEtapa).map(k=>porEtapa[k]).sort((a,b)=>b.val-a.val);
  m.pipelineTotal=m.pipeline.reduce((s,x)=>s+x.val,0);
  m.pipelineN=opos.length;

  // ── Muestras pendientes ──
  const mues=(DATA.muestras||[]).filter(x=>!x.eliminada &&
    String(x.estado||"").toLowerCase()==="pendiente" &&
    esDe(x,ve,["agente","agenteId","creadoPor"]));
  m.muestrasPend=mues.length;
  m.muestrasVencidas=mues.filter(x=>{
    const d=diasDesde(x.fecha||x.fechaCreacion);
    return d!==null && d>=10;
  }).length;

  // ── Ofertas abiertas ──
  const ofs=(DATA.ofertas||[]).filter(o=>{
    if(o.eliminada) return false;
    if(!esDe(o,ve,["agente","agenteId","creadoPor"])) return false;
    const abierta=(o.lineas||[]).some(l=>!l.estado||l.estado==="pendiente");
    return abierta || o.hayRespuestaPendienteValidacion;
  });
  m.ofertasAbiertas=ofs.length;
  m.ofertasViejas=ofs.filter(o=>{
    const d=diasDesde(o.fechaEnvioCliente||o.fechaCreacion);
    return d!==null && d>=10;
  }).length;

  // ── Derivados ──
  m.pctMes = m.oMes>0 ? m.vMes/m.oMes : null;
  m.pctAnio = m.oAnual>0 ? m.vAnual/m.oAnual : null;
  m.deltaMes = m.vMesAnt>0 ? (m.vMes-m.vMesAnt)/m.vMesAnt : null;

  // ── Señales ──
  m.senales=[];
  if(m.oMb>0 && m.mb>0 && m.mb < m.oMb-3){
    m.senales.push({sev:"alta",ico:"💸",issue:"El margen se está erosionando",
      detail:`Cierra al ${m.mb}% cuando el objetivo es ${m.oMb}%. Vende, pero cada venta deja menos beneficio.`,
      impact:`${(m.oMb-m.mb).toFixed(1)} puntos de margen por debajo`});
  }
  if(m.pctMes!==null && m.pctMes<0.6){
    m.senales.push({sev:"alta",ico:"📉",issue:"Muy por debajo del objetivo del mes",
      detail:`Lleva ${Math.round(m.pctMes*100)}% del objetivo de ${MES_NOMBRE[MES]}. A este ritmo no llega.`,
      impact:`Faltan ${eur(m.oMes-m.vMes)}`});
  } else if(m.pctMes!==null && m.pctMes<0.9){
    m.senales.push({sev:"media",ico:"🎯",issue:"Por detrás del objetivo del mes",
      detail:`Lleva ${Math.round(m.pctMes*100)}% del objetivo. Recuperable, pero hay que empujar.`,
      impact:`Faltan ${eur(m.oMes-m.vMes)}`});
  }
  if(m.muestrasVencidas>0){
    m.senales.push({sev:"media",ico:"📦",issue:`${m.muestrasVencidas} muestra${m.muestrasVencidas>1?"s":""} sin feedback +10 días`,
      detail:"Una muestra parada es una venta a medio camino que nadie está empujando.",
      impact:"Potencial bloqueado"});
  }
  if(m.ofertasViejas>0){
    m.senales.push({sev:"media",ico:"⏳",issue:`${m.ofertasViejas} oferta${m.ofertasViejas>1?"s":""} sin cerrar +10 días`,
      detail:"Pasados 10 días, una oferta sin seguimiento se enfría. Falta una llamada.",
      impact:"Sin cerrar"});
  }
  if(m.deltaMes!==null && m.deltaMes<-0.1){
    m.senales.push({sev:"media",ico:"↘️",issue:"Ventas por debajo del mes anterior",
      detail:`${Math.round(m.deltaMes*100)}% frente al mes pasado (${eur(m.vMesAnt)}).`,
      impact:"Tendencia a la baja"});
  }

  // ── Veredicto ──
  const graves=m.senales.filter(s=>s.sev==="alta").length;
  const medias=m.senales.filter(s=>s.sev==="media").length;
  if(graves>0 || (m.pctMes!==null && m.pctMes<0.5)) m.verdict="riesgo";
  else if(medias>0 || (m.pctMes!==null && m.pctMes<0.85)) m.verdict="atencion";
  else m.verdict="bien";

  return m;
}

// Brief generado a partir de las métricas
function generarBrief(m){
  const partes=[];
  if(m.pctMes!==null){
    if(m.pctMes>=1) partes.push(`va por delante del objetivo del mes (${Math.round(m.pctMes*100)}%)`);
    else if(m.pctMes>=0.85) partes.push(`está cerca del objetivo del mes (${Math.round(m.pctMes*100)}%)`);
    else partes.push(`va al ${Math.round(m.pctMes*100)}% del objetivo del mes`);
  }
  if(m.oMb>0 && m.mb>0){
    if(m.mb<m.oMb-3) partes.push(`pero <b>pierde margen</b> (${m.mb}% frente a ${m.oMb}% objetivo)`);
    else if(m.mb>=m.oMb) partes.push(`con buen margen (${m.mb}%)`);
  }
  const parado=m.muestrasVencidas+m.ofertasViejas;
  let extra="";
  if(parado>0) extra=` Tiene <b>${parado} cosa${parado>1?"s":""} parada${parado>1?"s":""}</b> entre muestras y ofertas sin mover.`;
  let txt=esc(m.ve.nombre)+" "+partes.join(", ")+"."+extra;
  if(m.verdict==="bien") txt+=" Sin señales graves.";
  return txt;
}

// ════════════ RENDER ════════════
function pintarLoading(step){
  document.getElementById("app").innerHTML=`
    <div class="loading">
      <div class="spin">📊</div>
      <div>Cargando datos reales…</div>
      <div class="load-step">${esc(step||"")}</div>
    </div>`;
}

function render(){
  if(vista==="global") renderGlobal();
  else renderVendedor(vista);
  window.scrollTo(0,0);
}

function renderGlobal(){
  const todas=VEND.map(metricas);
  // Totales
  const totV=todas.reduce((s,m)=>s+m.vMes,0);
  const totO=todas.reduce((s,m)=>s+m.oMes,0);
  const pct=totO>0?totV/totO:0;
  const nR=todas.filter(m=>m.verdict==="riesgo").length;
  const nA=todas.filter(m=>m.verdict==="atencion").length;
  const nB=todas.filter(m=>m.verdict==="bien").length;

  // Ordenar: riesgo primero, luego atención, luego bien; dentro por pctMes asc
  const orden={riesgo:0,atencion:1,bien:2};
  todas.sort((a,b)=>{
    if(orden[a.verdict]!==orden[b.verdict]) return orden[a.verdict]-orden[b.verdict];
    return (a.pctMes||0)-(b.pctMes||0);
  });

  let filas="";
  todas.forEach(m=>{
    const pm=m.pctMes!==null?Math.round(m.pctMes*100):null;
    const col=m.verdict==="riesgo"?"#DC2626":m.verdict==="atencion"?"#F59E0B":"#22C55E";
    const barW=pm!==null?Math.min(100,pm):0;
    const nSig=m.senales.length;
    filas+=`<div class="vrow ${m.verdict}" onclick="abrir('${m.ve.id}')">
      <div class="vrow-body">
        <div class="vrow-name">${esc(m.ve.nombre)}</div>
        <div class="vrow-eq">${esc(m.ve.equipo||"—")}</div>
        <div class="vrow-bar"><div style="width:${barW}%;background:${col}"></div></div>
        <div class="vrow-meta">${eur(m.vMes)} de ${m.oMes>0?eur(m.oMes):"objetivo s/d"}${nSig>0?" · "+nSig+" señal"+(nSig>1?"es":""):""}</div>
      </div>
      <div class="vrow-pct" style="color:${col}">${pm!==null?pm+"%":"—"}</div>
      <div class="vrow-chev">›</div>
    </div>`;
  });

  document.getElementById("app").innerHTML=`
    <div class="hero">
      <div class="fecha">${HOY.toLocaleDateString("es-ES",{weekday:"long",day:"numeric",month:"long"})}</div>
      <h1>Vista CEO</h1>
      <div class="sub">Grupo Consolidado · ${VEND.length} vendedores</div>
    </div>

    <div class="gsum">
      <div class="gsum-top">
        <div>
          <div style="font-size:11px;color:#64748B;font-weight:700;text-transform:uppercase">Ventas de ${MES_NOMBRE[MES]}</div>
          <div class="gsum-val">${eur(totV)}</div>
        </div>
        <div class="gsum-of">objetivo<br><b style="color:#0F172A;font-size:15px">${eur(totO)}</b></div>
      </div>
      <div class="bar"><div class="bar-fill" style="width:${Math.min(100,pct*100)}%;
        background:${pct>=0.9?"linear-gradient(90deg,#16A34A,#22C55E)":pct>=0.6?"linear-gradient(90deg,#F59E0B,#FBBF24)":"linear-gradient(90deg,#DC2626,#F87171)"}"></div></div>
      <div style="font-size:12px;font-weight:700;color:#64748B">${Math.round(pct*100)}% del objetivo conjunto</div>
      <div class="gsum-tags">
        <div class="gtag" style="background:#FEF2F2;color:#B91C1C"><span class="n">${nR}</span>en riesgo</div>
        <div class="gtag" style="background:#FFFBEB;color:#B45309"><span class="n">${nA}</span>atención</div>
        <div class="gtag" style="background:#F0FDF4;color:#15803D"><span class="n">${nB}</span>en objetivo</div>
      </div>
    </div>

    <div class="section">
      <div class="s-head">
        <span class="s-num">●</span>
        <span class="s-title">Vendedores</span>
        <span class="s-sub">los que necesitan atención, primero</span>
      </div>
      ${filas||'<div class="nada"><p>No hay vendedores cargados</p></div>'}
    </div>

    ${renderDebug()}
    <div class="footnote">Datos reales de Firebase · Toca un vendedor para ver su análisis completo</div>
  `;
}

function renderVendedor(id){
  const ve=VEND.find(v=>v.id===id);
  if(!ve){ vista="global"; render(); return; }
  const m=metricas(ve);

  const vColor=m.verdict==="riesgo"?"#DC2626":m.verdict==="atencion"?"#D97706":"#16A34A";
  const vLabel=m.verdict==="riesgo"?"⚠️ EN RIESGO":m.verdict==="atencion"?"⚠️ REQUIERE ATENCIÓN":"✓ EN OBJETIVO";

  // Performance
  const pm=m.pctMes!==null?Math.round(m.pctMes*100):null;
  const barCol=m.pctMes===null?"#CBD5E1":m.pctMes>=0.9?"linear-gradient(90deg,#16A34A,#22C55E)":
    m.pctMes>=0.6?"linear-gradient(90deg,#F59E0B,#FBBF24)":"linear-gradient(90deg,#DC2626,#F87171)";

  // Señales
  let sigHtml="";
  if(m.senales.length===0){
    sigHtml=`<div class="nada"><div class="ic">✓</div><p>Sin señales de alerta</p>
      <div style="font-size:12px;color:#64748B;margin-top:4px;font-weight:600">Nada requiere tu intervención ahora mismo</div></div>`;
  } else {
    m.senales.forEach(s=>{
      sigHtml+=`<div class="signal ${s.sev}">
        <div class="sig-ico">${s.ico}</div>
        <div class="sig-body">
          <div class="sig-issue">${esc(s.issue)}</div>
          <div class="sig-detail">${s.detail}</div>
          <span class="sig-impact ${s.sev==="media"?"amb":""}">${esc(s.impact)}</span>
        </div></div>`;
    });
  }

  // Pipeline
  let pipeHtml="";
  if(m.pipeline.length===0){
    pipeHtml='<div style="font-size:12px;color:#94A3B8;text-align:center;padding:8px">Sin oportunidades abiertas</div>';
  } else {
    const maxP=Math.max.apply(null,m.pipeline.map(s=>s.val))||1;
    const cols=["#1E3A5F","#3B82F6","#0EA5E9","#94A3B8","#CBD5E1"];
    m.pipeline.forEach((s,i)=>{
      const w=Math.max(12,Math.round(s.val/maxP*100));
      pipeHtml+=`<div class="stage">
        <div class="stage-top"><span class="stage-name">${esc(s.nombre)} (${s.n})</span>
        <span class="stage-val">${eur(s.val)}</span></div>
        <div class="stage-bar" style="width:${w}%;background:${cols[i%cols.length]}"></div>
      </div>`;
    });
  }

  // Tendencia
  const maxT=Math.max.apply(null,m.trend.map(t=>Math.max(t.v,t.o)))||1;
  let trendHtml="";
  m.trend.forEach((t,i)=>{
    const h=Math.round(t.v/maxT*100);
    const ult=i===m.trend.length-1;
    const hit=t.o>0 && t.v>=t.o;
    const col=ult?"linear-gradient(180deg,#F59E0B,#FBBF24)":hit?"#22C55E":"linear-gradient(180deg,#475569,#334155)";
    trendHtml+=`<div class="col">
      <div class="col-bars"><div class="col-bar" style="height:${h}%;background:${col}"></div></div>
      <div class="col-val">${t.v>0?eurK(t.v):"—"}</div>
      <div class="col-lbl">${t.mes}</div>
    </div>`;
  });

  // Decisiones (derivadas de las señales)
  const decs=[];
  if(m.senales.some(s=>s.issue.indexOf("margen")>=0))
    decs.push({t:"1:1 sobre política de descuento",w:"El margen, no el volumen, es el problema. Marca un suelo de margen y entiende por qué baja precio."});
  if(m.muestrasVencidas>0)
    decs.push({t:"Desbloquear las muestras paradas",w:"Pídele fecha de cierre para cada una. Un 'no' rápido vale más que un 'quizá' eterno."});
  if(m.ofertasViejas>0)
    decs.push({t:"Revisar las ofertas sin respuesta",w:"Cada una necesita una llamada de seguimiento esta semana, o se cierra."});
  if(m.pctMes!==null && m.pctMes<0.85)
    decs.push({t:"Plan para cerrar el mes",w:`Faltan ${eur(m.oMes-m.vMes)}. Repasa con el vendedor qué oportunidades del pipeline puede acelerar.`});
  if(decs.length===0)
    decs.push({t:"Mantener el ritmo",w:"Va bien. Refuerza lo que funciona y úsalo de referencia con el resto del equipo."});

  let decHtml="";
  decs.slice(0,3).forEach((d,i)=>{
    decHtml+=`<div class="decision">
      <div class="dec-n">${i+1}</div>
      <div class="dec-body"><div class="dec-title">${esc(d.t)}</div>
      <div class="dec-why">${d.w}</div></div></div>`;
  });

  document.getElementById("app").innerHTML=`
    <div class="hero">
      <button class="back" onclick="abrir('__global__')">← Todos los vendedores</button>
      <div class="fecha">${HOY.toLocaleDateString("es-ES",{day:"numeric",month:"long"})} · ${MES_NOMBRE[MES]}</div>
      <h1>${esc(ve.nombre)}</h1>
      <div class="sub">${esc(ve.equipo||"—")} · Comercial</div>
      <div class="verdict ${m.verdict}">${vLabel}</div>
    </div>

    <div class="gsum">
      <div class="brief" style="border:none;padding:0">
        <div class="tag">Resumen para el CEO</div>
        <p>${generarBrief(m)}</p>
      </div>
    </div>

    <div class="section">
      <div class="s-head"><span class="s-num">01</span><span class="s-title">¿Está rindiendo?</span>
        <span class="s-sub">ventas de ${MES_NOMBRE[MES]}</span></div>
      <div class="perf">
        <div class="perf-main">
          <div>
            <div style="font-size:11px;color:#64748B;font-weight:700;text-transform:uppercase">Ventas del mes</div>
            <div class="perf-val" style="color:${vColor}">${eur(m.vMes)}</div>
          </div>
          <div class="perf-of">objetivo<br><b style="color:#0F172A;font-size:15px">${m.oMes>0?eur(m.oMes):"s/d"}</b></div>
        </div>
        <div class="bar"><div class="bar-fill" style="width:${pm!==null?Math.min(100,pm):0}%;background:${barCol}"></div></div>
        <div class="perf-pct" style="color:${vColor}">${pm!==null?pm+"% del objetivo":"objetivo no disponible"}${m.oMes>m.vMes&&pm!==null?" · faltan "+eur(m.oMes-m.vMes):""}</div>
        <div class="perf-grid">
          <div class="mini"><div class="l">Margen</div>
            <div class="v" style="color:${m.oMb>0&&m.mb<m.oMb-3?"#DC2626":"#0F172A"}">${m.mb>0?m.mb+"%":"—"}</div>
            <div class="d ${m.oMb>0&&m.mb<m.oMb?"down":"flat"}">${m.oMb>0?"obj. "+m.oMb+"%":"sin objetivo"}</div></div>
          <div class="mini"><div class="l">vs mes ant.</div>
            <div class="v" style="color:${m.deltaMes!==null&&m.deltaMes<0?"#DC2626":"#0F172A"}">${m.deltaMes!==null?(m.deltaMes>0?"+":"")+Math.round(m.deltaMes*100)+"%":"—"}</div>
            <div class="d flat">${m.vMesAnt>0?eur(m.vMesAnt):"s/d"}</div></div>
          <div class="mini"><div class="l">Año</div>
            <div class="v">${m.pctAnio!==null?Math.round(m.pctAnio*100)+"%":"—"}</div>
            <div class="d flat">${m.vAnual>0?eurK(m.vAnual)+" / "+eurK(m.oAnual):"s/d"}</div></div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="s-head"><span class="s-num">02</span><span class="s-title">La señal</span>
        <span class="s-sub">qué necesita tu atención</span></div>
      ${sigHtml}
    </div>

    <div class="section">
      <div class="s-head"><span class="s-num">03</span><span class="s-title">El dinero en juego</span>
        <span class="s-sub">${eur(m.pipelineTotal)} en ${m.pipelineN} oport.</span></div>
      <div class="funnel">${pipeHtml}</div>
    </div>

    <div class="section">
      <div class="s-head"><span class="s-num">04</span><span class="s-title">¿Va a mejor o a peor?</span>
        <span class="s-sub">ventas · 6 meses</span></div>
      <div class="trend"><div class="chart">${trendHtml}</div>
        <div class="legend">Naranja = mes actual · Verde = mes que alcanzó objetivo</div></div>
    </div>

    <div class="section">
      <div class="s-head"><span class="s-num">05</span><span class="s-title">Tus decisiones</span>
        <span class="s-sub">sal de aquí con esto</span></div>
      ${decHtml}
    </div>

    <div class="footnote">Datos reales de Firebase · ${MES_NOMBRE[MES]} ${ANIO}</div>
  `;
}

function renderDebug(){
  let rows="";
  ["usuarios","portal_users","agentes_kpi","presupuesto","monetizacion","oportunidades","muestras","ofertas"].forEach(c=>{
    rows+=`<div>${c}: ${(DATA[c]||[]).length} docs</div>`;
  });
  return `<details class="debug"><summary>🔍 Diagnóstico de datos</summary>${rows}
    <div>vendedores detectados: ${VEND.length}</div></details>`;
}

function abrir(id){
  vista = id==="__global__" ? "global" : id;
  render();
}

// ════════════ ARRANQUE ════════════
function gate(){
  document.getElementById("app").innerHTML=`
    <div class="gate">
      <h2>📊 Vista CEO</h2>
      <p>Acceso restringido</p>
      <input type="password" id="pwd" placeholder="Contraseña">
      <br><button onclick="comprobar()">Entrar</button>
    </div>`;
  document.getElementById("pwd").addEventListener("keypress",e=>{if(e.key==="Enter")comprobar();});
}
function comprobar(){
  if(document.getElementById("pwd").value===PWD_OK){
    sessionStorage.setItem("ceo_ok","1");
    cargarTodo();
  } else alert("Contraseña incorrecta");
}

if(sessionStorage.getItem("ceo_ok")==="1") cargarTodo();
else gate();
</script>
