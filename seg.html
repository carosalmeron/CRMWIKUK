<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seguimiento de muestra</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#F1F5F9;color:#0F172A;line-height:1.55;font-size:14px;-webkit-font-smoothing:antialiased}
  .phone{max-width:520px;margin:0 auto;background:#fff;min-height:100vh;padding-bottom:80px}

  /* Estados */
  .loading,.error{padding:60px 24px;text-align:center;color:#64748B}
  .loading .ic,.error .ic{font-size:38px;margin-bottom:14px}

  /* Cabecera */
  .hero{background:linear-gradient(160deg,#1E3A5F 0%,#0F172A 100%);color:#fff;padding:22px 20px}
  .hero .tag{font-size:11px;letter-spacing:.08em;text-transform:uppercase;
    color:#94A3B8;font-weight:700}
  .hero h1{font-size:20px;font-weight:800;margin:5px 0 3px;letter-spacing:-.01em}
  .hero .sub{font-size:13px;color:#CBD5E1}

  /* Mensaje del comercial */
  .agente-msg{margin:14px 16px 0;padding:14px 16px;background:#FEF3C7;
    border-left:4px solid #F59E0B;border-radius:10px}
  .agente-msg .lbl{font-size:10px;font-weight:800;letter-spacing:.06em;color:#92400E;
    text-transform:uppercase;margin-bottom:4px}
  .agente-msg p{margin:0;font-size:13.5px;color:#0F172A;white-space:pre-wrap}

  /* Tarjeta */
  .card{margin:14px 16px 0;background:#fff;border:1px solid #E2E8F0;border-radius:12px;
    padding:14px 16px}
  .card h3{font-size:11px;font-weight:800;color:#64748B;text-transform:uppercase;
    letter-spacing:.06em;margin-bottom:10px}

  /* Estado actual */
  .estado-actual{padding:16px;border-radius:12px;text-align:center;margin-bottom:10px}
  .estado-actual .ico{font-size:30px;line-height:1}
  .estado-actual .nombre{font-size:16px;font-weight:800;margin-top:5px}
  .estado-actual .desc{font-size:12px;margin-top:3px;opacity:.85}

  /* Datos en filas */
  .dato{display:flex;justify-content:space-between;padding:7px 0;
    border-bottom:1px solid #F1F5F9;font-size:13px}
  .dato:last-child{border-bottom:none}
  .dato .k{color:#64748B}
  .dato .v{font-weight:700;color:#0F172A;text-align:right;max-width:60%}

  /* Historial */
  .hist-item{display:flex;gap:11px;padding:8px 0;border-bottom:1px solid #F1F5F9}
  .hist-item:last-child{border-bottom:none}
  .hist-dot{width:10px;height:10px;border-radius:50%;background:#1E3A5F;
    margin-top:5px;flex-shrink:0}
  .hist-body{flex:1;min-width:0}
  .hist-name{font-size:12.5px;font-weight:700;color:#0F172A}
  .hist-fecha{font-size:11px;color:#94A3B8}

  /* Chat */
  .chat{padding:0 4px}
  .msg{margin-bottom:10px;display:flex;flex-direction:column}
  .msg.agente{align-items:flex-start}
  .msg.cliente{align-items:flex-end}
  .msg .bub{max-width:80%;padding:10px 13px;border-radius:14px;font-size:13px;
    white-space:pre-wrap;word-break:break-word}
  .msg.agente .bub{background:#F1F5F9;color:#0F172A;border-bottom-left-radius:4px}
  .msg.cliente .bub{background:#1E3A5F;color:#fff;border-bottom-right-radius:4px}
  .msg .meta{font-size:10px;color:#94A3B8;margin-top:3px;padding:0 4px}
  .chat-empty{text-align:center;padding:18px;color:#94A3B8;font-size:12px;font-style:italic}

  .chat-input{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid #E2E8F0}
  .chat-input textarea{flex:1;padding:10px;border:1px solid #CBD5E1;border-radius:9px;
    font-size:13px;resize:none;font-family:inherit;min-height:42px}
  .chat-input button{padding:0 16px;background:#1E3A5F;color:#fff;border:none;
    border-radius:9px;font-weight:700;font-size:13px;cursor:pointer}
  .chat-input button:disabled{opacity:.4}

  /* Botones de acción */
  .acciones{margin:18px 16px 0}
  .btn-big{width:100%;padding:13px;border:none;border-radius:11px;font-size:14px;
    font-weight:800;cursor:pointer;margin-bottom:8px;display:flex;align-items:center;
    justify-content:center;gap:7px}
  .btn-asist{background:#F59E0B;color:#fff}
  .btn-ok{background:#22C55E;color:#fff}
  .btn-ko{background:#EF4444;color:#fff}
  .btn-secundary{background:#fff;color:#0F172A;border:1.5px solid #CBD5E1}

  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;
    display:flex;align-items:flex-end;justify-content:center;padding:0}
  .modal{background:#fff;border-radius:20px 20px 0 0;padding:22px;width:100%;
    max-width:520px;max-height:90vh;overflow-y:auto}
  .modal h2{font-size:17px;font-weight:800;margin-bottom:5px;text-align:center}
  .modal .modal-sub{font-size:12px;color:#64748B;margin-bottom:16px;text-align:center}
  .modal textarea{width:100%;padding:10px;border:1px solid #CBD5E1;border-radius:9px;
    font-size:13px;font-family:inherit;resize:vertical;min-height:90px;box-sizing:border-box}
  .modal .acts{display:flex;gap:8px;margin-top:14px}
  .modal .acts button{flex:1;padding:11px;border-radius:9px;font-weight:700;
    font-size:13px;cursor:pointer;border:none}
  .modal .acts .cancel{background:#fff;color:#64748B;border:1.5px solid #CBD5E1}

  /* Cierre sugerido visible */
  .sugerencia{background:#FEF3C7;border-left:4px solid #F59E0B;padding:11px 13px;
    border-radius:9px;margin-bottom:10px}
  .sugerencia .titulo{font-size:12px;font-weight:800;color:#92400E;margin-bottom:3px}
  .sugerencia .texto{font-size:12.5px;color:#451A03;white-space:pre-wrap}

  .pie{text-align:center;color:#94A3B8;font-size:11px;margin-top:24px;padding:0 20px 16px}
</style>
</head>
<body>
<div class="phone" id="app">
  <div class="loading">
    <div class="ic">⏳</div>
    <p>Cargando seguimiento...</p>
  </div>
</div>

<script>
const FB="https://firestore.googleapis.com/v1/projects/grupo-consolidado-crm/databases/(default)/documents";

// ── Estados en lenguaje cliente ──
const ESTADOS={
  pendiente:{ico:"📋",nombre:"Recibida y en estudio",desc:"Tu muestra ha sido entregada y está siendo analizada",color:"#F59E0B",bg:"#FEF3C7"},
  positivo:{ico:"✅",nombre:"Valoración positiva",desc:"El comercial ha registrado que la muestra te ha gustado",color:"#16A34A",bg:"#DCFCE7"},
  pedido:{ico:"🛒",nombre:"Convertida en pedido",desc:"Has hecho un pedido de este producto",color:"#0EA5E9",bg:"#E0F2FE"},
  ko:{ico:"❌",nombre:"Cerrada sin éxito",desc:"La muestra no encajó con tus necesidades",color:"#DC2626",bg:"#FEE2E2"},
  proyecto:{ico:"🚀",nombre:"Convertida en proyecto",desc:"La muestra ha pasado a ser un proyecto de mayor recorrido",color:"#7C3AED",bg:"#EDE9FE"}
};

// ── Firebase REST ──
function fsToObj(doc){
  if(!doc||!doc.fields) return null;
  const o={};
  for(const k in doc.fields){
    const v=doc.fields[k];
    if(v.stringValue!==undefined)o[k]=v.stringValue;
    else if(v.integerValue!==undefined)o[k]=parseInt(v.integerValue);
    else if(v.doubleValue!==undefined)o[k]=parseFloat(v.doubleValue);
    else if(v.booleanValue!==undefined)o[k]=v.booleanValue;
    else if(v.timestampValue!==undefined)o[k]=v.timestampValue;
    else if(v.nullValue!==undefined)o[k]=null;
    else if(v.arrayValue&&v.arrayValue.values){
      o[k]=v.arrayValue.values.map(x=>{
        if(x.stringValue!==undefined)return x.stringValue;
        if(x.integerValue!==undefined)return parseInt(x.integerValue);
        if(x.mapValue)return fsToObj({fields:x.mapValue.fields});
        return x;
      });
    } else if(v.mapValue)o[k]=fsToObj({fields:v.mapValue.fields});
  }
  return o;
}
function objToFs(o){
  const fields={};
  for(const k in o){
    const v=o[k];
    if(v===null||v===undefined) fields[k]={nullValue:null};
    else if(typeof v==="string") fields[k]={stringValue:v};
    else if(typeof v==="number") fields[k]=Number.isInteger(v)?{integerValue:v}:{doubleValue:v};
    else if(typeof v==="boolean") fields[k]={booleanValue:v};
    else if(Array.isArray(v)){
      fields[k]={arrayValue:{values:v.map(x=>{
        if(typeof x==="string") return {stringValue:x};
        if(typeof x==="number") return Number.isInteger(x)?{integerValue:x}:{doubleValue:x};
        if(typeof x==="object"&&x!==null) return {mapValue:{fields:objToFs(x)}};
        return {stringValue:String(x)};
      })}};
    } else if(typeof v==="object"){
      fields[k]={mapValue:{fields:objToFs(v)}};
    }
  }
  return fields;
}

async function fbGet(col,id){
  const r=await fetch(FB+"/"+col+"/"+encodeURIComponent(id));
  if(!r.ok) return null;
  const j=await r.json();
  const o=fsToObj(j);
  if(o) o._id=id;
  return o;
}
async function fbActualizar(col,id,campo,valor){
  // PATCH con updateMask para actualizar solo el campo
  const url=FB+"/"+col+"/"+encodeURIComponent(id)+"?updateMask.fieldPaths="+campo;
  const body={fields:objToFs({[campo]:valor})};
  const r=await fetch(url,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  return r.ok;
}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function fmtFecha(raw){
  if(!raw) return "—";
  let s=String(raw);
  if(s.indexOf("/")>=0) return s; // ya es dd/mm/aa
  const d=new Date(s);
  if(isNaN(d)) return s;
  return d.toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit",year:"2-digit"});
}
function fmtFechaHora(raw){
  if(!raw) return "—";
  const d=new Date(raw);
  if(isNaN(d)) return raw;
  return d.toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit"})+" · "+
         d.toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"});
}

// ── Estado global ──
let MUESTRA=null;
let MUESTRA_ID="";
let TOKEN="";
let nuevoMsg="";
let enviandoMsg=false;

function getParams(){
  const p=new URLSearchParams(window.location.search);
  return {tipo:p.get("tipo"),id:p.get("id"),token:p.get("token")};
}

async function cargar(){
  const {tipo,id,token}=getParams();
  if(tipo!=="muestra"||!id||!token){
    pintarError("Enlace no válido","Faltan parámetros o tipo desconocido.");
    return;
  }
  MUESTRA_ID=id; TOKEN=token;
  const m=await fbGet("muestras",id);
  if(!m){ pintarError("No encontrada","No se ha podido localizar el seguimiento."); return; }
  if(m.tokenCliente!==token){
    pintarError("Acceso denegado","Este enlace no es válido. Pídele al comercial uno nuevo.");
    return;
  }
  MUESTRA=m;
  render();
}

function pintarError(titulo,sub){
  document.getElementById("app").innerHTML=
    '<div class="error"><div class="ic">⚠️</div>'+
    '<h2 style="font-size:17px;color:#0F172A;margin-bottom:6px">'+esc(titulo)+'</h2>'+
    '<p style="font-size:13px">'+esc(sub)+'</p></div>';
}

function render(){
  const m=MUESTRA;
  const est=ESTADOS[m.estado]||ESTADOS.pendiente;
  let html="";

  // Cabecera
  html+='<div class="hero">';
  html+='<div class="tag">Seguimiento de muestra</div>';
  html+='<h1>'+esc(m.prod||m.producto||"Muestra")+'</h1>';
  html+='<div class="sub">'+esc(m.cliente||m.clienteNombre||"")+'</div>';
  html+='</div>';

  // Mensaje del comercial
  if(m.notaInicial){
    html+='<div class="agente-msg">';
    html+='<div class="lbl">💬 Mensaje de '+esc(m.agenteNombre||"tu comercial")+'</div>';
    html+='<p>'+esc(m.notaInicial)+'</p>';
    html+='</div>';
  }

  // Estado actual
  html+='<div class="card"><h3>Estado actual</h3>';
  html+='<div class="estado-actual" style="background:'+est.bg+';color:'+est.color+'">';
  html+='<div class="ico">'+est.ico+'</div>';
  html+='<div class="nombre">'+esc(est.nombre)+'</div>';
  html+='<div class="desc" style="color:#0F172A">'+esc(est.desc)+'</div>';
  html+='</div></div>';

  // Si hay cierre sugerido pendiente
  if(m.cierreSugerido&&m.cierreSugerido.pendiente){
    const cs=m.cierreSugerido;
    html+='<div class="card"><h3>Tu sugerencia de cierre</h3>';
    html+='<div class="sugerencia">';
    html+='<div class="titulo">'+(cs.tipo==="ok"?"✅ Has sugerido cierre con éxito":"❌ Has sugerido cierre sin éxito")+'</div>';
    html+='<div class="texto">'+esc(cs.comentario||"")+'</div>';
    html+='<div style="font-size:10px;color:#92400E;margin-top:5px">Enviada '+esc(fmtFechaHora(cs.fecha))+' · pendiente de revisión por el comercial</div>';
    html+='</div></div>';
  }

  // Datos
  html+='<div class="card"><h3>Detalle</h3>';
  html+='<div class="dato"><span class="k">Producto</span><span class="v">'+esc(m.prod||m.producto||"—")+'</span></div>';
  if(m.tipo) html+='<div class="dato"><span class="k">Tipo</span><span class="v">'+esc(m.tipo)+'</span></div>';
  if(m.uds)  html+='<div class="dato"><span class="k">Cantidad</span><span class="v">'+esc(m.uds)+'</span></div>';
  if(m.fecha) html+='<div class="dato"><span class="k">Fecha de entrega</span><span class="v">'+esc(fmtFecha(m.fecha))+'</span></div>';
  if(m.fechaFeedback) html+='<div class="dato"><span class="k">Fecha de valoración</span><span class="v">'+esc(fmtFecha(m.fechaFeedback))+'</span></div>';
  if(m.agenteNombre) html+='<div class="dato"><span class="k">Tu comercial</span><span class="v">'+esc(m.agenteNombre)+'</span></div>';
  if(m.nota) html+='<div class="dato"><span class="k">Notas</span><span class="v">'+esc(m.nota)+'</span></div>';
  html+='</div>';

  // Historial de cambios de estado
  if(Array.isArray(m.historialEstado)&&m.historialEstado.length>0){
    html+='<div class="card"><h3>Historial</h3>';
    m.historialEstado.forEach(h=>{
      const e=ESTADOS[h.estado]||{ico:"•",nombre:h.estado};
      html+='<div class="hist-item">';
      html+='<div class="hist-dot"></div>';
      html+='<div class="hist-body">';
      html+='<div class="hist-name">'+e.ico+' '+esc(e.nombre)+'</div>';
      html+='<div class="hist-fecha">'+esc(fmtFechaHora(h.fecha))+(h.por?" · "+esc(h.por):"")+'</div>';
      html+='</div></div>';
    });
    html+='</div>';
  }

  // Si pasó a proyecto
  if(m.proyectoId){
    html+='<div class="card" style="border-color:#7C3AED;background:#F5F3FF">';
    html+='<h3 style="color:#5B21B6">🚀 Convertida en proyecto</h3>';
    html+='<p style="font-size:13px;color:#0F172A">Esta muestra ha pasado a ser un proyecto de mayor recorrido. Tu comercial te informará sobre los siguientes pasos.</p>';
    html+='</div>';
  }

  // Hilo de mensajes (solo cliente ↔ comercial)
  html+='<div class="card"><h3>💬 Conversación con tu comercial</h3>';
  const msgs=Array.isArray(m.mensajesCliente)?m.mensajesCliente:[];
  if(msgs.length===0){
    html+='<div class="chat-empty">Aún no hay mensajes. Escribe abajo si tienes algún comentario o pregunta.</div>';
  } else {
    html+='<div class="chat">';
    msgs.forEach(msg=>{
      const cls=msg.autor==="cliente"?"cliente":"agente";
      const quien=msg.autor==="cliente"?"Tú":(msg.autorNombre||m.agenteNombre||"Comercial");
      html+='<div class="msg '+cls+'">';
      html+='<div class="bub">'+esc(msg.texto||"")+'</div>';
      html+='<div class="meta">'+esc(quien)+' · '+esc(fmtFechaHora(msg.fecha))+'</div>';
      html+='</div>';
    });
    html+='</div>';
  }
  // Solo permitir escribir si la muestra no está cerrada
  const cerrada=m.estado==="ko"||m.estado==="pedido";
  if(!cerrada){
    html+='<div class="chat-input">';
    html+='<textarea id="nuevoMsg" placeholder="Escribe un comentario...">'+esc(nuevoMsg)+'</textarea>';
    html+='<button id="btnEnviar" '+(enviandoMsg?"disabled":"")+'>Enviar</button>';
    html+='</div>';
  } else {
    html+='<div class="chat-empty">Esta muestra está cerrada. Si necesitas algo, contacta directamente con tu comercial.</div>';
  }
  html+='</div>';

  // Acciones
  if(!cerrada){
    html+='<div class="acciones">';
    html+='<button class="btn-big btn-asist" id="btnAsist">📩 Solicitar asistencia técnica</button>';
    if(!m.cierreSugerido||!m.cierreSugerido.pendiente){
      html+='<button class="btn-big btn-ok" id="btnSugOk">✅ Sugerir cierre con éxito</button>';
      html+='<button class="btn-big btn-ko" id="btnSugKo">❌ Sugerir cierre sin éxito</button>';
    }
    html+='</div>';
  }

  html+='<div class="pie">🔒 Esta página es privada y se identifica por un enlace único.</div>';

  document.getElementById("app").innerHTML=html;

  // Eventos
  const inp=document.getElementById("nuevoMsg");
  if(inp){
    inp.addEventListener("input",function(e){nuevoMsg=e.target.value;});
    inp.addEventListener("focus",function(){setTimeout(function(){inp.scrollIntoView({behavior:"smooth",block:"center"});},300);});
  }
  const btn=document.getElementById("btnEnviar");
  if(btn) btn.addEventListener("click",enviarMensaje);
  const ba=document.getElementById("btnAsist");
  if(ba) ba.addEventListener("click",solicitarAsistencia);
  const bo=document.getElementById("btnSugOk");
  if(bo) bo.addEventListener("click",function(){abrirModalCierre("ok");});
  const bk=document.getElementById("btnSugKo");
  if(bk) bk.addEventListener("click",function(){abrirModalCierre("ko");});
}

async function enviarMensaje(){
  const texto=(nuevoMsg||"").trim();
  if(!texto) return;
  if(enviandoMsg) return;
  enviandoMsg=true;
  document.getElementById("btnEnviar").disabled=true;

  const msgs=Array.isArray(MUESTRA.mensajesCliente)?MUESTRA.mensajesCliente.slice():[];
  msgs.push({autor:"cliente",texto:texto,fecha:new Date().toISOString()});
  const ok=await fbActualizar("muestras",MUESTRA_ID,"mensajesCliente",msgs);
  if(ok){
    MUESTRA.mensajesCliente=msgs;
    nuevoMsg="";
    // Notificar
    await fetch("/api/notificar-seguimiento",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({tipo:"mensaje",muestraId:MUESTRA_ID,token:TOKEN,texto:texto})
    }).catch(function(){});
    render();
  } else {
    alert("No se pudo enviar el mensaje. Inténtalo de nuevo.");
  }
  enviandoMsg=false;
}

async function solicitarAsistencia(){
  if(!confirm("¿Solicitar asistencia técnica? Se avisará al comercial y a los responsables del seguimiento.")) return;
  const texto=prompt("Cuéntanos brevemente qué necesitas (opcional):");
  // Registrar como mensaje destacado
  const msgs=Array.isArray(MUESTRA.mensajesCliente)?MUESTRA.mensajesCliente.slice():[];
  msgs.push({autor:"cliente",texto:"📩 SOLICITUD DE ASISTENCIA TÉCNICA"+(texto?"\n\n"+texto:""),fecha:new Date().toISOString(),tipo:"asistencia"});
  await fbActualizar("muestras",MUESTRA_ID,"mensajesCliente",msgs);
  MUESTRA.mensajesCliente=msgs;
  await fetch("/api/notificar-seguimiento",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({tipo:"asistencia",muestraId:MUESTRA_ID,token:TOKEN,texto:texto||""})
  }).catch(function(){});
  alert("✓ Solicitud enviada. El comercial recibirá un aviso y se pondrá en contacto contigo.");
  render();
}

function abrirModalCierre(tipo){
  const titulo=tipo==="ok"?"Sugerir cierre con éxito":"Sugerir cierre sin éxito";
  const sub=tipo==="ok"?
    "Si la muestra ha cumplido tus expectativas, indícanoslo. El comercial recibirá tu sugerencia y la confirmará."
    :"Si la muestra no encaja, indícanos por qué. El comercial recibirá tu sugerencia.";
  const html=
    '<div class="modal-bg" id="modalBg">'+
    '<div class="modal" onclick="event.stopPropagation()">'+
    '<h2>'+(tipo==="ok"?"✅":"❌")+' '+titulo+'</h2>'+
    '<div class="modal-sub">'+sub+'</div>'+
    '<textarea id="comentario" placeholder="Cuéntanos brevemente (mínimo 10 caracteres)" autofocus></textarea>'+
    '<div class="acts">'+
    '<button class="cancel" onclick="cerrarModal()">Cancelar</button>'+
    '<button style="background:'+(tipo==="ok"?"#22C55E":"#EF4444")+';color:#fff" onclick="enviarSugerencia(\''+tipo+'\')">Enviar sugerencia</button>'+
    '</div></div></div>';
  document.body.insertAdjacentHTML("beforeend",html);
  document.getElementById("modalBg").addEventListener("click",function(e){
    if(e.target.id==="modalBg") cerrarModal();
  });
}
function cerrarModal(){
  const m=document.getElementById("modalBg");
  if(m) m.remove();
}
async function enviarSugerencia(tipo){
  const txt=(document.getElementById("comentario").value||"").trim();
  if(txt.length<10){ alert("Por favor explica brevemente (mínimo 10 caracteres)"); return; }
  const sug={tipo:tipo,comentario:txt,fecha:new Date().toISOString(),pendiente:true};
  const ok=await fbActualizar("muestras",MUESTRA_ID,"cierreSugerido",sug);
  if(ok){
    MUESTRA.cierreSugerido=sug;
    await fetch("/api/notificar-seguimiento",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({tipo:"cierre_sugerido",muestraId:MUESTRA_ID,token:TOKEN,subtipo:tipo,texto:txt})
    }).catch(function(){});
    cerrarModal();
    alert("✓ Sugerencia enviada. El comercial la verá y se pondrá en contacto.");
    render();
  } else {
    alert("No se pudo enviar. Inténtalo de nuevo.");
  }
}

// Exponer funciones globales para los onClick inline
window.cerrarModal=cerrarModal;
window.enviarSugerencia=enviarSugerencia;

cargar();
</script>
