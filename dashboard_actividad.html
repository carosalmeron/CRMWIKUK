<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard de Actividad — Grupo Consolidado</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#0B1220;color:#0F172A;line-height:1.5;-webkit-font-smoothing:antialiased}
  .phone{max-width:480px;margin:0 auto;background:#F1F5F9;min-height:100vh;padding-bottom:50px}

  .gate{padding:60px 24px;text-align:center}
  .gate h2{color:#fff;font-size:20px;margin-bottom:6px}
  .gate p{color:#94A3B8;font-size:13px;margin-bottom:20px}
  .gate input{width:100%;max-width:280px;padding:12px;border-radius:9px;border:none;font-size:15px}
  .gate button{margin-top:12px;padding:12px 28px;background:#F59E0B;color:#0F172A;
    border:none;border-radius:9px;font-weight:800;font-size:14px;cursor:pointer}

  .loading{padding:60px 24px;text-align:center;color:#94A3B8}
  .loading .spin{font-size:34px;margin-bottom:14px;animation:p 1.4s ease-in-out infinite}
  @keyframes p{0%,100%{opacity:.3}50%{opacity:1}}
  .load-step{font-size:12px;color:#64748B;margin-top:4px}

  .hero{background:linear-gradient(160deg,#1E3A5F 0%,#0F172A 100%);color:#fff;
    padding:18px 20px 22px;position:relative;overflow:hidden}
  .hero::after{content:"";position:absolute;right:-40px;top:-40px;width:150px;height:150px;
    background:radial-gradient(circle,rgba(245,158,11,.16),transparent 70%)}
  .hero h1{font-size:22px;font-weight:900;letter-spacing:-.02em}
  .hero .sub{font-size:12px;color:#CBD5E1;margin-top:2px}
  .back{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.1);
    color:#fff;border:none;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:700;
    cursor:pointer;margin-bottom:10px}

  /* Selector periodo */
  .periodo{display:flex;gap:6px;margin-top:13px}
  .per-btn{flex:1;padding:8px 4px;border-radius:8px;border:1.5px solid rgba(255,255,255,.2);
    background:rgba(255,255,255,.06);color:#CBD5E1;font-size:12px;font-weight:700;cursor:pointer}
  .per-btn.activo{background:#F59E0B;color:#0F172A;border-color:#F59E0B}

  .section{margin:18px 16px 0}
  .s-head{display:flex;align-items:baseline;gap:8px;margin-bottom:9px}
  .s-num{font-size:11px;font-weight:900;color:#F59E0B}
  .s-title{font-size:15px;font-weight:900;color:#0F172A}
  .s-sub{font-size:11px;color:#94A3B8;margin-left:auto;font-weight:600}

  /* KPI strip global */
  .kpis{display:flex;gap:8px;margin:-12px 16px 0;position:relative;z-index:2}
  .kpi{flex:1;background:#fff;border-radius:12px;padding:12px 8px;text-align:center;
    box-shadow:0 4px 16px rgba(15,23,42,.08)}
  .kpi .n{font-size:22px;font-weight:900;letter-spacing:-.02em}
  .kpi .l{font-size:9px;color:#64748B;font-weight:700;text-transform:uppercase;margin-top:2px}

  /* Vendor row */
  .vrow{background:#fff;border-radius:12px;padding:13px 14px;margin-bottom:8px;
    border-left:5px solid #CBD5E1;cursor:pointer}
  .vrow.top{border-left-color:#22C55E}
  .vrow.media{border-left-color:#F59E0B}
  .vrow.baja{border-left-color:#DC2626}
  .vrow-top{display:flex;align-items:center;gap:11px}
  .vrow-body{flex:1;min-width:0}
  .vrow-name{font-size:14px;font-weight:800;color:#0F172A}
  .vrow-eq{font-size:11px;color:#94A3B8;font-weight:600}
  .vrow-score{width:44px;height:44px;border-radius:12px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;flex-shrink:0;color:#fff}
  .vrow-score .sv{font-size:16px;font-weight:900;line-height:1}
  .vrow-score .sl{font-size:7px;font-weight:700;opacity:.85}
  .vrow-chev{color:#CBD5E1;font-size:20px;flex-shrink:0}
  .vrow-stats{display:flex;gap:6px;margin-top:9px}
  .vstat{flex:1;background:#F8FAFC;border-radius:8px;padding:6px 4px;text-align:center}
  .vstat .vn{font-size:14px;font-weight:900}
  .vstat .vl{font-size:8px;color:#64748B;font-weight:700;text-transform:uppercase;margin-top:1px}

  /* Brief */
  .brief{background:#fff;border-radius:14px;padding:15px 17px;border:1px solid #E2E8F0}
  .brief .tag{font-size:10px;font-weight:800;letter-spacing:.08em;color:#64748B;text-transform:uppercase}
  .brief p{font-size:13.5px;color:#1E293B;margin-top:6px}
  .brief b{color:#0F172A;font-weight:800}

  /* Verdict */
  .verdict{display:inline-flex;align-items:center;gap:6px;margin-top:11px;
    padding:6px 13px;border-radius:99px;font-size:12px;font-weight:800}
  .verdict.top{background:#22C55E;color:#06280F}
  .verdict.media{background:#F59E0B;color:#3A2606}
  .verdict.baja{background:#EF4444;color:#fff}

  /* Big metric cards */
  .mcard{background:#fff;border-radius:14px;padding:15px 16px;border:1px solid #E2E8F0;margin-bottom:9px}
  .mcard-top{display:flex;align-items:center;gap:10px}
  .mcard-ico{font-size:22px}
  .mcard-ti{flex:1}
  .mcard-name{font-size:13px;font-weight:800;color:#0F172A}
  .mcard-desc{font-size:11px;color:#94A3B8}
  .mcard-big{font-size:24px;font-weight:900;letter-spacing:-.02em}
  .mcard-bar{height:9px;background:#F1F5F9;border-radius:99px;overflow:hidden;margin:10px 0 5px}
  .mcard-bar div{height:100%;border-radius:99px}
  .mcard-note{font-size:11px;font-weight:700}

  /* Quality breakdown */
  .qrow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #F8FAFC}
  .qrow:last-child{border-bottom:none}
  .qrow-ico{font-size:18px;width:24px;text-align:center}
  .qrow-body{flex:1}
  .qrow-name{font-size:12.5px;font-weight:700;color:#334155}
  .qrow-detail{font-size:10.5px;color:#94A3B8}
  .qrow-val{font-size:15px;font-weight:900}

  /* Constancia chart */
  .const-chart{display:flex;align-items:flex-end;justify-content:space-between;
    height:90px;gap:5px;margin-top:8px}
  .cday{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%}
  .cday-bar-wrap{flex:1;width:100%;display:flex;align-items:flex-end;justify-content:center}
  .cday-bar{width:78%;border-radius:4px 4px 0 0;min-height:2px}
  .cday-n{font-size:9px;font-weight:800;color:#475569}
  .cday-l{font-size:9px;color:#94A3B8;font-weight:700}

  /* Signals */
  .signal{background:#fff;border-radius:12px;padding:12px;margin-bottom:8px;
    border-left:5px solid #CBD5E1;display:flex;gap:11px}
  .signal.alta{border-left-color:#DC2626}
  .signal.media{border-left-color:#F59E0B}
  .signal.buena{border-left-color:#22C55E}
  .sig-ico{font-size:19px;flex-shrink:0}
  .sig-body{flex:1;min-width:0}
  .sig-issue{font-size:13px;font-weight:800;color:#0F172A}
  .sig-detail{font-size:11.5px;color:#475569;margin-top:2px}
  .nada{background:#fff;border-radius:12px;padding:20px;text-align:center;border:1px solid #E2E8F0}

  .footnote{margin:18px 16px 0;font-size:11px;color:#64748B;text-align:center;
    background:#fff;border-radius:12px;padding:13px;border:1px dashed #CBD5E1}
  .legend{font-size:10px;color:#94A3B8;margin-top:7px;text-align:center}
</style>
</head>
<body>
<div class="phone" id="app"></div>

<script>
const FB = "https://firestore.googleapis.com/v1/projects/grupo-consolidado-crm/databases/(default)/documents";
const PWD_OK = "wikuk2026";

const SEED_VEND = [
  {id:"wk1",nombre:"David Mag",equipo:"WIKUK",variantes:["WK1","DAVIDMAG"]},
  {id:"wk2",nombre:"Verónica",equipo:"WIKUK",variantes:["WK2","VERONICA"]},
  {id:"wk3",nombre:"Silvia",equipo:"WIKUK",variantes:["WK3","SILVIA"]},
  {id:"ik1",nombre:"Carlos G.",equipo:"INTERKEY",variantes:["IK1","CARLOSG"]},
  {id:"ik2",nombre:"Ricardo",equipo:"INTERKEY",variantes:["IK2","RICARDO"]},
  {id:"ik4",nombre:"Azarco",equipo:"INTERKEY",variantes:["IK4","AZARCO"]},
  {id:"rpiedra",nombre:"Ramon",equipo:"WIKUK",variantes:["RPIEDRA"]},
  {id:"jl",nombre:"Jose Luis",equipo:"WIKUK",variantes:["JL","JLGARCIA"]},
];

const HOY=new Date();
const DIAS_SEM=["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];

// ── Firebase ──
function fsToObj(doc){
  if(!doc||!doc.fields) return null;
  const o={};
  for(const k in doc.fields){
    const v=doc.fields[k];
    if(v.stringValue!==undefined)o[k]=v.stringValue;
    else if(v.integerValue!==undefined)o[k]=parseInt(v.integerValue);
    else if(v.doubleValue!==undefined)o[k]=parseFloat(v.doubleValue);
    else if(v.booleanValue!==undefined)o[k]=v.booleanValue;
    else if(v.timestampValue!==undefined)o[k]=v.timestampValue;
    else if(v.nullValue!==undefined)o[k]=null;
    else if(v.arrayValue&&v.arrayValue.values){
      o[k]=v.arrayValue.values.map(x=>{
        if(x.stringValue!==undefined)return x.stringValue;
        if(x.integerValue!==undefined)return parseInt(x.integerValue);
        if(x.mapValue)return fsToObj({fields:x.mapValue.fields});
        return x;
      });
    } else if(v.mapValue)o[k]=fsToObj({fields:v.mapValue.fields});
  }
  return o;
}
async function fbList(col){
  let docs=[], pageToken=null, pages=0;
  do{
    const url=`${FB}/${col}?pageSize=300${pageToken?`&pageToken=${pageToken}`:""}`;
    let r;
    try{ r=await fetch(url); }catch(e){ break; }
    if(!r.ok) break;
    const j=await r.json();
    if(j.documents){
      j.documents.forEach(d=>{
        const o=fsToObj(d);
        if(o){ o._docId=d.name.split("/").pop(); docs.push(o); }
      });
    }
    pageToken=j.nextPageToken; pages++;
  }while(pageToken && pages<25);
  return docs;
}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function aFecha(raw){
  if(!raw) return null;
  let s=String(raw);
  if(s.indexOf("/")>=0){
    const p=s.split("/");
    if(p.length===3){ let yy=p[2]; if(yy.length===2)yy="20"+yy;
      return new Date(yy+"-"+p[1].padStart(2,"0")+"-"+p[0].padStart(2,"0")+"T12:00:00"); }
  }
  if(/^\d{10}$/.test(s)) return new Date(parseInt(s)*1000);
  if(/^\d{13}$/.test(s)) return new Date(parseInt(s));
  const d=new Date(s.length>10?s.substring(0,19):s+"T12:00:00");
  return isNaN(d)?null:d;
}
function fechaDe(doc,campos){
  for(const c of campos){ if(doc[c]){ const f=aFecha(doc[c]); if(f)return f; } }
  return null;
}

// ── Estado ──
let DATA={}, VEND=[], vista="global", periodo="mes";

// Límite inferior del periodo
function desdeTS(){
  if(periodo==="semana") return Date.now()-7*86400000;
  if(periodo==="mes") return Date.now()-30*86400000;
  return Date.now()-90*86400000;
}
function periodoLabel(){
  return periodo==="semana"?"últimos 7 días":periodo==="mes"?"últimos 30 días":"últimos 90 días";
}

// ── Carga ──
async function cargar(){
  pintarLoading("Conectando…");
  const cols=["usuarios","portal_users","visitas","muestras","ofertas","oportunidades","incidencias"];
  DATA={};
  for(const c of cols){
    pintarLoading("Cargando "+c+"…");
    DATA[c]=await fbList(c);
  }
  construirVend();
  vista="global";
  render();
}
function construirVend(){
  const todos=(DATA.usuarios||[]).concat(DATA.portal_users||[]);
  const porNombre={};
  todos.forEach(u=>{
    const rol=(u.rol||"").toLowerCase();
    if(rol!=="agente"&&rol!=="crm_agente") return;
    const nom=(u.nombre||u.username||u.catalogoVendedor||"").trim();
    if(!nom) return;
    const key=nom.toUpperCase();
    if(!porNombre[key]) porNombre[key]={nombre:nom,equipo:u.equipo||"",claves:new Set()};
    if(u.equipo&&!porNombre[key].equipo) porNombre[key].equipo=u.equipo;
    ["_docId","id","grupoAgente","username","catalogoVendedor","nombre"].forEach(k=>{
      if(u[k]) porNombre[key].claves.add(String(u[k]).toUpperCase().trim());
    });
  });
  VEND=Object.keys(porNombre).map(key=>{
    const p=porNombre[key];
    const seed=SEED_VEND.find(s=>p.claves.has(s.id.toUpperCase())||s.variantes.some(v=>p.claves.has(v)));
    let id=key.toLowerCase().replace(/\s+/g,"");
    if(seed){ id=seed.id; seed.variantes.forEach(v=>p.claves.add(v));
      p.claves.add(seed.id.toUpperCase()); if(!p.equipo)p.equipo=seed.equipo; }
    return {id:id,nombre:p.nombre,equipo:p.equipo,claves:p.claves};
  });
  if(VEND.length===0){
    VEND=SEED_VEND.map(s=>({id:s.id,nombre:s.nombre,equipo:s.equipo,
      claves:new Set([s.id.toUpperCase()].concat(s.variantes))}));
  }
  VEND.sort((a,b)=>(a.equipo||"").localeCompare(b.equipo||"")||a.nombre.localeCompare(b.nombre));
}

function esDe(doc,ve,campos){
  for(const c of campos){
    const v=doc[c];
    if(v && ve.claves.has(String(v).toUpperCase().trim())) return true;
  }
  return false;
}

// ── MÉTRICAS DE ACTIVIDAD POR VENDEDOR ──
function metricas(ve){
  const m={ve:ve};
  const desde=desdeTS();
  const enRango=f=>f && f.getTime()>=desde;

  // ── VISITAS ──
  const visT=(DATA.visitas||[]).filter(v=>!v.eliminada && esDe(v,ve,["agente","agenteId","grupoAgente","creadoPor"]));
  const vis=visT.filter(v=>enRango(fechaDe(v,["fecha","fechaVisita","ts","fechaCreacion"])));
  m.visitas=vis.length;
  m.pedidos=vis.filter(v=>String(v.resultado||"").toLowerCase()==="pedido").length;
  m.conOferta=vis.filter(v=>v.tieneOferta).length;
  // Clientes distintos
  const cli=new Set();
  vis.forEach(v=>{ const c=v.clienteId||v.clienteNombre; if(c)cli.add(String(c).toUpperCase()); });
  m.clientesDistintos=cli.size;
  // Reparto por día de semana (constancia)
  m.porDia=[0,0,0,0,0,0,0];
  vis.forEach(v=>{
    const f=fechaDe(v,["fecha","fechaVisita","ts","fechaCreacion"]);
    if(f){ let d=f.getDay()-1; if(d<0)d=6; m.porDia[d]++; }
  });
  // Días activos distintos
  const diasAct=new Set();
  vis.forEach(v=>{
    const f=fechaDe(v,["fecha","fechaVisita","ts","fechaCreacion"]);
    if(f) diasAct.add(f.toISOString().substring(0,10));
  });
  m.diasActivos=diasAct.size;

  // ── MUESTRAS ──
  const muesT=(DATA.muestras||[]).filter(x=>!x.eliminada && esDe(x,ve,["agente","agenteId","creadoPor"]));
  const mues=muesT.filter(x=>enRango(fechaDe(x,["fecha","fechaCreacion","fechaEntrega","ts"])));
  m.muestras=mues.length;
  // Con feedback = estado distinto de "pendiente"
  m.muestrasConFb=mues.filter(x=>{
    const e=String(x.estado||"").toLowerCase();
    return e && e!=="pendiente";
  }).length;
  m.muestrasPend=mues.filter(x=>String(x.estado||"").toLowerCase()==="pendiente").length;
  m.pctFeedback=m.muestras>0?Math.round(m.muestrasConFb/m.muestras*100):null;
  // Muestras paradas (pendientes +10 días, de todo el histórico)
  m.muestrasFrias=muesT.filter(x=>{
    if(String(x.estado||"").toLowerCase()!=="pendiente") return false;
    const f=fechaDe(x,["fecha","fechaCreacion","fechaEntrega","ts"]);
    return f && (Date.now()-f.getTime())>=10*86400000;
  }).length;

  // ── OFERTAS ──
  const ofsT=(DATA.ofertas||[]).filter(o=>!o.eliminada && esDe(o,ve,["agente","agenteId","creadoPor"]));
  const ofs=ofsT.filter(o=>enRango(fechaDe(o,["fechaCreacion","fecha","fechaEnvioCliente","ts"])));
  m.ofertas=ofs.length;
  m.ofertasCerradas=ofs.filter(o=>{
    const lineas=o.lineas||[];
    if(lineas.length===0) return false;
    return lineas.every(l=>l.estado && l.estado!=="pendiente");
  }).length;
  m.pctCierre=m.ofertas>0?Math.round(m.ofertasCerradas/m.ofertas*100):null;
  // Ofertas frías (abiertas +10 días, histórico)
  m.ofertasFrias=ofsT.filter(o=>{
    const abierta=(o.lineas||[]).some(l=>!l.estado||l.estado==="pendiente");
    if(!abierta) return false;
    const f=fechaDe(o,["fechaEnvioCliente","fechaCreacion","fecha","ts"]);
    return f && (Date.now()-f.getTime())>=10*86400000;
  }).length;

  // ── OPORTUNIDADES E INCIDENCIAS ──
  const opos=(DATA.oportunidades||[]).filter(o=>!o.eliminada && esDe(o,ve,["agente","agenteId","creadoPor","autor"]));
  m.oportunidades=opos.filter(o=>enRango(fechaDe(o,["fechaCreacion","fecha","ts"]))).length;
  const incs=(DATA.incidencias||[]).filter(i=>!i.eliminada && esDe(i,ve,["autor","agente","creadoPor"]));
  m.incidencias=incs.filter(i=>enRango(fechaDe(i,["fechaCreacion","fecha","ts"]))).length;

  // ── SCORES (0-100) ──
  // Volumen: visitas + muestras + ofertas, normalizado
  const baseVol = periodo==="semana"?12:periodo==="mes"?45:130;
  m.scoreVolumen=Math.min(100,Math.round((m.visitas+m.muestras+m.ofertas)/baseVol*100));
  // Eficacia: media de % feedback y % cierre (lo que tenga dato)
  const efs=[];
  if(m.pctFeedback!==null) efs.push(m.pctFeedback);
  if(m.pctCierre!==null) efs.push(m.pctCierre);
  // Visitas que acaban en pedido también cuenta
  if(m.visitas>0) efs.push(Math.round(m.pedidos/m.visitas*100));
  m.scoreEficacia=efs.length?Math.round(efs.reduce((a,b)=>a+b,0)/efs.length):null;
  // Constancia: ¿reparte las visitas? Días activos vs días laborables del periodo
  const diasLab = periodo==="semana"?5:periodo==="mes"?22:65;
  m.scoreConstancia=m.visitas>0?Math.min(100,Math.round(m.diasActivos/diasLab*100)):0;

  // Score global = 40% volumen + 40% eficacia + 20% constancia
  const ef=m.scoreEficacia!==null?m.scoreEficacia:50;
  m.scoreGlobal=Math.round(m.scoreVolumen*0.4 + ef*0.4 + m.scoreConstancia*0.2);

  // Nivel
  if(m.scoreGlobal>=65) m.nivel="top";
  else if(m.scoreGlobal>=40) m.nivel="media";
  else m.nivel="baja";

  // ── SEÑALES ──
  m.senales=[];
  if(m.visitas===0){
    m.senales.push({sev:"alta",ico:"🚷",issue:"Sin visitas registradas en el periodo",
      detail:"No hay actividad de calle. O no está visitando, o no lo está registrando."});
  } else {
    if(m.scoreConstancia<40 && m.visitas>=3){
      m.senales.push({sev:"media",ico:"📊",issue:"Visitas concentradas en pocos días",
        detail:`${m.visitas} visitas en solo ${m.diasActivos} días. Trabaja a tirones, no de forma constante.`});
    }
    if(m.pctFeedback!==null && m.pctFeedback<50 && m.muestras>=3){
      m.senales.push({sev:"alta",ico:"📦",issue:"Muchas muestras sin feedback",
        detail:`Solo ${m.pctFeedback}% de sus muestras tienen resultado. Entrega pero no remata.`});
    }
    if(m.pctCierre!==null && m.pctCierre<30 && m.ofertas>=2){
      m.senales.push({sev:"media",ico:"💰",issue:"Ofertas sin cerrar",
        detail:`Solo cierra el ${m.pctCierre}% de sus ofertas. Falta seguimiento.`});
    }
    if(m.muestrasFrias>0||m.ofertasFrias>0){
      m.senales.push({sev:"media",ico:"❄️",issue:`${m.muestrasFrias+m.ofertasFrias} cosas enfriándose`,
        detail:`${m.muestrasFrias} muestras y ${m.ofertasFrias} ofertas llevan +10 días sin moverse.`});
    }
    if(m.visitas>=8 && m.scoreEficacia!==null && m.scoreEficacia>=60){
      m.senales.push({sev:"buena",ico:"⭐",issue:"Mucha actividad y bien rematada",
        detail:`${m.visitas} visitas con buena conversión. Es un referente del equipo.`});
    }
  }
  return m;
}

function generarBrief(m){
  if(m.visitas===0 && m.muestras===0 && m.ofertas===0)
    return esc(m.ve.nombre)+" <b>no tiene actividad registrada</b> en el periodo. O no está trabajando este canal, o no lo registra.";
  const partes=[];
  partes.push(`${m.visitas} visita${m.visitas!==1?"s":""}`);
  if(m.muestras>0) partes.push(`${m.muestras} muestra${m.muestras!==1?"s":""}`);
  if(m.ofertas>0) partes.push(`${m.ofertas} oferta${m.ofertas!==1?"s":""}`);
  let txt=esc(m.ve.nombre)+" ha hecho "+partes.join(", ")+" en "+periodoLabel()+". ";
  // Lo característico
  if(m.scoreVolumen>=65 && m.scoreEficacia!==null && m.scoreEficacia<45)
    txt+="<b>Trabaja mucho pero remata poco</b>: hay volumen, falta cierre.";
  else if(m.scoreVolumen<40 && m.scoreEficacia!==null && m.scoreEficacia>=60)
    txt+="<b>Poco volumen pero lo que toca lo cierra bien</b>. Podría hacer más.";
  else if(m.scoreGlobal>=65)
    txt+="<b>Buen equilibrio</b> entre cantidad y calidad de trabajo.";
  else if(m.scoreConstancia<40 && m.visitas>=3)
    txt+="Trabaja <b>a tirones</b> — concentra la actividad en pocos días.";
  else
    txt+="Actividad en niveles medios, sin nada que destaque ni alarme.";
  return txt;
}

// ── RENDER ──
function pintarLoading(step){
  document.getElementById("app").innerHTML=`
    <div class="loading"><div class="spin">📊</div>
      <div>Cargando actividad…</div>
      <div class="load-step">${esc(step||"")}</div></div>`;
}
function periodoSelector(){
  return `<div class="periodo">
    <div class="per-btn ${periodo==="semana"?"activo":""}" onclick="setPeriodo('semana')">Semana</div>
    <div class="per-btn ${periodo==="mes"?"activo":""}" onclick="setPeriodo('mes')">Mes</div>
    <div class="per-btn ${periodo==="trim"?"activo":""}" onclick="setPeriodo('trim')">90 días</div>
  </div>`;
}
function setPeriodo(p){ periodo=p; render(); }
function abrir(id){ vista=id==="__global__"?"global":id; render(); }

function render(){
  if(vista==="global") renderGlobal(); else renderVendedor(vista);
  window.scrollTo(0,0);
}

function renderGlobal(){
  const todas=VEND.map(metricas);
  const totV=todas.reduce((s,m)=>s+m.visitas,0);
  const totM=todas.reduce((s,m)=>s+m.muestras,0);
  const totO=todas.reduce((s,m)=>s+m.ofertas,0);
  const totFrias=todas.reduce((s,m)=>s+m.muestrasFrias+m.ofertasFrias,0);

  // Orden: por score global desc (mejores arriba) — pero los inactivos al final
  todas.sort((a,b)=>b.scoreGlobal-a.scoreGlobal);

  let filas="";
  todas.forEach(m=>{
    const col=m.nivel==="top"?"#22C55E":m.nivel==="media"?"#F59E0B":"#DC2626";
    filas+=`<div class="vrow ${m.nivel}" onclick="abrir('${m.ve.id}')">
      <div class="vrow-top">
        <div class="vrow-body">
          <div class="vrow-name">${esc(m.ve.nombre)}</div>
          <div class="vrow-eq">${esc(m.ve.equipo||"—")}</div>
        </div>
        <div class="vrow-score" style="background:${col}">
          <div class="sv">${m.scoreGlobal}</div><div class="sl">SCORE</div>
        </div>
        <div class="vrow-chev">›</div>
      </div>
      <div class="vrow-stats">
        <div class="vstat"><div class="vn">${m.visitas}</div><div class="vl">Visitas</div></div>
        <div class="vstat"><div class="vn">${m.muestras}</div><div class="vl">Muestras</div></div>
        <div class="vstat"><div class="vn">${m.pctFeedback!==null?m.pctFeedback+"%":"—"}</div><div class="vl">Feedback</div></div>
        <div class="vstat"><div class="vn" style="color:${m.muestrasFrias+m.ofertasFrias>0?'#DC2626':'#0F172A'}">${m.muestrasFrias+m.ofertasFrias}</div><div class="vl">Frías</div></div>
      </div>
    </div>`;
  });

  document.getElementById("app").innerHTML=`
    <div class="hero">
      <h1>📊 Actividad comercial</h1>
      <div class="sub">Grupo Consolidado · ${VEND.length} vendedores</div>
      ${periodoSelector()}
    </div>
    <div class="kpis">
      <div class="kpi"><div class="n">${totV}</div><div class="l">Visitas</div></div>
      <div class="kpi"><div class="n">${totM}</div><div class="l">Muestras</div></div>
      <div class="kpi"><div class="n">${totO}</div><div class="l">Ofertas</div></div>
      <div class="kpi"><div class="n" style="color:${totFrias>0?'#DC2626':'#0F172A'}">${totFrias}</div><div class="l">Frías</div></div>
    </div>
    <div class="section">
      <div class="s-head"><span class="s-num">●</span><span class="s-title">Equipo</span>
        <span class="s-sub">por score de actividad · ${periodoLabel()}</span></div>
      ${filas||'<div class="nada">Sin vendedores</div>'}
    </div>
    <div class="section">
      <div class="brief">
        <div class="tag">Cómo se calcula el score</div>
        <p>El <b>score</b> combina tres cosas: <b>volumen</b> (cuánto trabaja),
        <b>eficacia</b> (si lo remata: feedback de muestras, cierre de ofertas, pedidos)
        y <b>constancia</b> (si reparte el trabajo o va a tirones). No premia solo hacer
        mucho — premia hacer mucho y bien.</p>
      </div>
    </div>
    <div class="footnote">Datos reales de Firebase · toca un vendedor para su análisis</div>
  `;
}

function renderVendedor(id){
  const ve=VEND.find(v=>v.id===id);
  if(!ve){ vista="global"; render(); return; }
  const m=metricas(ve);
  const col=m.nivel==="top"?"#16A34A":m.nivel==="media"?"#D97706":"#DC2626";
  const vLabel=m.nivel==="top"?"⭐ ALTO RENDIMIENTO":m.nivel==="media"?"➤ RENDIMIENTO MEDIO":"⚠️ ACTIVIDAD BAJA";

  // Señales
  let sigHtml="";
  if(m.senales.length===0){
    sigHtml='<div class="nada"><div style="font-size:30px">✓</div><p style="font-size:13px;font-weight:700;color:#22C55E;margin-top:5px">Sin nada destacable</p></div>';
  } else {
    m.senales.forEach(s=>{
      sigHtml+=`<div class="signal ${s.sev}"><div class="sig-ico">${s.ico}</div>
        <div class="sig-body"><div class="sig-issue">${esc(s.issue)}</div>
        <div class="sig-detail">${s.detail}</div></div></div>`;
    });
  }

  // Constancia chart
  const maxDia=Math.max.apply(null,m.porDia)||1;
  let constHtml="";
  m.porDia.forEach((n,i)=>{
    const h=Math.round(n/maxDia*100);
    const esFinde=i>=5;
    constHtml+=`<div class="cday">
      <div class="cday-bar-wrap"><div class="cday-bar" style="height:${h}%;
        background:${n===0?'#E2E8F0':esFinde?'#94A3B8':'#1E3A5F'}"></div></div>
      <div class="cday-n">${n}</div>
      <div class="cday-l">${DIAS_SEM[i]}</div>
    </div>`;
  });

  // Barra helper
  function barColor(pct){ return pct>=65?"#22C55E":pct>=40?"#F59E0B":"#DC2626"; }

  document.getElementById("app").innerHTML=`
    <div class="hero">
      <button class="back" onclick="abrir('__global__')">← Todo el equipo</button>
      <h1>${esc(ve.nombre)}</h1>
      <div class="sub">${esc(ve.equipo||"—")} · ${periodoLabel()}</div>
      <div class="verdict ${m.nivel}">${vLabel}</div>
      ${periodoSelector()}
    </div>

    <div class="kpis">
      <div class="kpi"><div class="n" style="color:${col}">${m.scoreGlobal}</div><div class="l">Score</div></div>
      <div class="kpi"><div class="n">${m.visitas}</div><div class="l">Visitas</div></div>
      <div class="kpi"><div class="n">${m.clientesDistintos}</div><div class="l">Clientes</div></div>
      <div class="kpi"><div class="n" style="color:${m.muestrasFrias+m.ofertasFrias>0?'#DC2626':'#0F172A'}">${m.muestrasFrias+m.ofertasFrias}</div><div class="l">Frías</div></div>
    </div>

    <div class="section">
      <div class="s-head"><span class="s-num">01</span><span class="s-title">Lectura rápida</span></div>
      <div class="brief"><div class="tag">Resumen</div><p>${generarBrief(m)}</p></div>
    </div>

    <div class="section">
      <div class="s-head"><span class="s-num">02</span><span class="s-title">Trabaja mucho · ¿trabaja bien?</span>
        <span class="s-sub">volumen vs eficacia</span></div>
      <div class="mcard">
        <div class="mcard-top"><div class="mcard-ico">💪</div>
          <div class="mcard-ti"><div class="mcard-name">Volumen de trabajo</div>
          <div class="mcard-desc">visitas + muestras + ofertas</div></div>
          <div class="mcard-big" style="color:${barColor(m.scoreVolumen)}">${m.scoreVolumen}</div>
        </div>
        <div class="mcard-bar"><div style="width:${m.scoreVolumen}%;background:${barColor(m.scoreVolumen)}"></div></div>
        <div class="mcard-note" style="color:#64748B">${m.visitas} visitas · ${m.muestras} muestras · ${m.ofertas} ofertas</div>
      </div>
      <div class="mcard">
        <div class="mcard-top"><div class="mcard-ico">🎯</div>
          <div class="mcard-ti"><div class="mcard-name">Eficacia</div>
          <div class="mcard-desc">¿remata lo que empieza?</div></div>
          <div class="mcard-big" style="color:${m.scoreEficacia!==null?barColor(m.scoreEficacia):'#94A3B8'}">${m.scoreEficacia!==null?m.scoreEficacia:"—"}</div>
        </div>
        <div class="mcard-bar"><div style="width:${m.scoreEficacia||0}%;background:${m.scoreEficacia!==null?barColor(m.scoreEficacia):'#CBD5E1'}"></div></div>
        <div class="mcard-note" style="color:#64748B">
          ${m.pctFeedback!==null?m.pctFeedback+"% muestras con feedback":"sin muestras"} ·
          ${m.pctCierre!==null?m.pctCierre+"% ofertas cerradas":"sin ofertas"}</div>
      </div>
      <div class="mcard">
        <div class="mcard-top"><div class="mcard-ico">📆</div>
          <div class="mcard-ti"><div class="mcard-name">Constancia</div>
          <div class="mcard-desc">¿reparte el trabajo?</div></div>
          <div class="mcard-big" style="color:${barColor(m.scoreConstancia)}">${m.scoreConstancia}</div>
        </div>
        <div class="mcard-bar"><div style="width:${m.scoreConstancia}%;background:${barColor(m.scoreConstancia)}"></div></div>
        <div class="mcard-note" style="color:#64748B">activo ${m.diasActivos} días distintos</div>
      </div>
    </div>

    <div class="section">
      <div class="s-head"><span class="s-num">03</span><span class="s-title">Cómo reparte la semana</span>
        <span class="s-sub">visitas por día</span></div>
      <div class="mcard">
        <div class="const-chart">${constHtml}</div>
        <div class="legend">Azul = días laborables · gris = fin de semana</div>
      </div>
    </div>

    <div class="section">
      <div class="s-head"><span class="s-num">04</span><span class="s-title">Desglose de actividad</span></div>
      <div class="mcard" style="padding:8px 16px">
        <div class="qrow"><div class="qrow-ico">🚶</div>
          <div class="qrow-body"><div class="qrow-name">Visitas realizadas</div>
          <div class="qrow-detail">${m.pedidos} acabaron en pedido · ${m.conOferta} generaron oferta</div></div>
          <div class="qrow-val">${m.visitas}</div></div>
        <div class="qrow"><div class="qrow-ico">🏢</div>
          <div class="qrow-body"><div class="qrow-name">Clientes distintos</div>
          <div class="qrow-detail">cobertura de cartera en el periodo</div></div>
          <div class="qrow-val">${m.clientesDistintos}</div></div>
        <div class="qrow"><div class="qrow-ico">📦</div>
          <div class="qrow-body"><div class="qrow-name">Muestras entregadas</div>
          <div class="qrow-detail">${m.muestrasConFb} con feedback · ${m.muestrasPend} pendientes</div></div>
          <div class="qrow-val">${m.muestras}</div></div>
        <div class="qrow"><div class="qrow-ico">💰</div>
          <div class="qrow-body"><div class="qrow-name">Ofertas creadas</div>
          <div class="qrow-detail">${m.ofertasCerradas} cerradas</div></div>
          <div class="qrow-val">${m.ofertas}</div></div>
        <div class="qrow"><div class="qrow-ico">🎯</div>
          <div class="qrow-body"><div class="qrow-name">Oportunidades</div>
          <div class="qrow-detail">nuevas en el periodo</div></div>
          <div class="qrow-val">${m.oportunidades}</div></div>
        <div class="qrow"><div class="qrow-ico">🚨</div>
          <div class="qrow-body"><div class="qrow-name">Incidencias</div>
          <div class="qrow-detail">registradas en el periodo</div></div>
          <div class="qrow-val">${m.incidencias}</div></div>
      </div>
    </div>

    <div class="section">
      <div class="s-head"><span class="s-num">05</span><span class="s-title">Señales</span>
        <span class="s-sub">qué mirar</span></div>
      ${sigHtml}
    </div>

    <div class="footnote">Datos reales de Firebase · ${periodoLabel()}</div>
  `;
}

// ── Arranque ──
function gate(){
  document.getElementById("app").innerHTML=`
    <div class="gate"><h2>📊 Dashboard de actividad</h2>
      <p>Acceso restringido</p>
      <input type="password" id="pwd" placeholder="Contraseña">
      <br><button onclick="comprobar()">Entrar</button></div>`;
  document.getElementById("pwd").addEventListener("keypress",e=>{if(e.key==="Enter")comprobar();});
}
function comprobar(){
  if(document.getElementById("pwd").value===PWD_OK){
    sessionStorage.setItem("dash_ok","1");
    cargar();
  } else alert("Contraseña incorrecta");
}
if(sessionStorage.getItem("dash_ok")==="1") cargar();
else gate();
</script>
</body>
