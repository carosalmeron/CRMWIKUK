<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tu oferta — WIKUK</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#F8FAFC;color:#0F172A;min-height:100vh;line-height:1.5}
  .wrap{max-width:600px;margin:0 auto;padding:0 0 80px}

  /* Cabecera azul con wordmark WIKUK en blanco */
  .header{background:linear-gradient(135deg,#1E3A5F,#0F172A);color:#fff;padding:28px 20px 24px;
    text-align:center}
  .header .brand{font-size:28px;font-weight:900;letter-spacing:.18em;color:#fff;
    margin-bottom:14px;text-shadow:0 1px 2px rgba(0,0,0,.15)}
  .header h1{font-size:13px;font-weight:600;opacity:.75;text-transform:uppercase;letter-spacing:.08em}
  .header h2{font-size:24px;font-weight:800;margin-top:6px;line-height:1.2}
  .header .sub{font-size:13px;opacity:.7;margin-top:8px}

  .card{background:#fff;border-radius:14px;margin:14px;padding:18px;
    box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .card-label{font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
  .card h3{font-size:15px;font-weight:800;margin-bottom:4px}
  .card .price{font-size:22px;font-weight:900;color:#F59E0B;margin-top:6px}
  .card .notes{font-size:12px;color:#64748B;font-style:italic;margin-top:6px}

  .nota-agente{margin:14px;padding:14px 16px;background:#FEF3C7;border-left:4px solid #F59E0B;
    border-radius:8px;font-size:13px;color:#92400E}

  .estado-resp{display:inline-block;padding:3px 9px;border-radius:99px;font-size:11px;
    font-weight:800;margin-top:6px}
  .estado-resp.pendiente{background:#FEF3C7;color:#92400E}
  .estado-resp.pedido{background:#DCFCE7;color:#166534}
  .estado-resp.caro{background:#FEE2E2;color:#991B1B}
  .estado-resp.no-interesa{background:#F1F5F9;color:#475569}

  .botones-linea{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:12px}
  .btn{padding:11px 8px;border:none;border-radius:9px;font-size:12px;font-weight:700;
    cursor:pointer;font-family:inherit;transition:transform .1s}
  .btn:active{transform:scale(.97)}
  .btn-pedido{background:#22C55E;color:#fff}
  .btn-caro{background:#EF4444;color:#fff}
  .btn-no-interesa{background:#64748B;color:#fff}
  .btn-global{display:block;width:calc(100% - 28px);margin:18px 14px;padding:14px;
    background:#1E3A5F;color:#fff;font-size:14px;font-weight:800;border:none;border-radius:11px;cursor:pointer}

  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;
    display:flex;align-items:flex-end;justify-content:center}
  .modal{background:#fff;border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:600px;
    max-height:90vh;overflow-y:auto}
  .modal h3{font-size:18px;font-weight:800;margin-bottom:4px;text-align:center}
  .modal .sub{font-size:12px;color:#64748B;margin-bottom:18px;text-align:center}
  .modal label{display:block;font-size:11px;font-weight:700;color:#64748B;
    text-transform:uppercase;margin-bottom:6px;margin-top:14px}
  .modal input, .modal textarea{width:100%;padding:11px 13px;border:1.5px solid #E2E8F0;
    border-radius:9px;font-size:14px;font-family:inherit;outline:none}
  .modal input:focus, .modal textarea:focus{border-color:#1E3A5F}
  .modal textarea{resize:none;min-height:80px}
  .modal .actions{display:flex;gap:8px;margin-top:18px}
  .modal .btn-cancel{flex:1;background:#fff;color:#475569;border:1.5px solid #E2E8F0}
  .modal .btn-confirm{flex:2;color:#fff;border:none}

  .ok-msg{padding:40px 24px;text-align:center}
  .ok-msg .icon{font-size:54px;margin-bottom:14px}
  .ok-msg h2{font-size:20px;font-weight:800;margin-bottom:8px}
  .ok-msg p{font-size:14px;color:#64748B}

  .footer{text-align:center;padding:30px 20px;color:#94A3B8;font-size:11px}

  .linea-cabecera{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}

  .cantidad-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:380px){.cantidad-row{grid-template-columns:1fr}}

  .respuesta-recibida{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:10px;
    padding:12px 14px;margin-top:10px;font-size:12px;color:#1E40AF}
  .respuesta-recibida strong{font-weight:800}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="ok-msg">
    <div class="icon">⏳</div>
    <h2>Cargando…</h2>
  </div>
</div>

<script>
const FB = "https://firestore.googleapis.com/v1/projects/grupo-consolidado-crm/databases/(default)/documents";

// Util: convertir Firestore -> objeto JS
function fsToObj(doc){
  if(!doc||!doc.fields) return null;
  const o={};
  for(const k in doc.fields){
    const v=doc.fields[k];
    if(v.stringValue!==undefined)o[k]=v.stringValue;
    else if(v.integerValue!==undefined)o[k]=parseInt(v.integerValue);
    else if(v.doubleValue!==undefined)o[k]=parseFloat(v.doubleValue);
    else if(v.booleanValue!==undefined)o[k]=v.booleanValue;
    else if(v.timestampValue!==undefined)o[k]=v.timestampValue;
    else if(v.nullValue!==undefined)o[k]=null;
    else if(v.arrayValue&&v.arrayValue.values){
      o[k]=v.arrayValue.values.map(x=>{
        if(x.stringValue!==undefined)return x.stringValue;
        if(x.integerValue!==undefined)return parseInt(x.integerValue);
        if(x.doubleValue!==undefined)return parseFloat(x.doubleValue);
        if(x.mapValue)return fsToObj({fields:x.mapValue.fields});
        return x;
      });
    } else if(v.mapValue)o[k]=fsToObj({fields:v.mapValue.fields});
  }
  return o;
}

// Leer parámetros de la URL: /of.html?id=XXX&token=YYY  o /of/[id]?token=YYY
function getParams(){
  const url = new URL(window.location.href);
  // Soporta tanto /of.html?id=XXX como /of/XXX
  let id = url.searchParams.get("id");
  const token = url.searchParams.get("token");
  if(!id){
    // Intentar extraer de la ruta
    const m = url.pathname.match(/\/of\/([A-Za-z0-9_-]+)/);
    if(m) id = m[1];
  }
  return {id, token};
}

async function cargarOferta(id){
  const r = await fetch(FB + "/ofertas/" + id);
  if(!r.ok){
    if(r.status===404) return null;
    throw new Error("HTTP "+r.status);
  }
  const j = await r.json();
  return fsToObj(j);
}

function fmtPrecio(p, unit){
  if(p==null||p==="") return "—";
  const n = parseFloat(p);
  if(isNaN(n)) return p;
  return n.toFixed(2).replace(".",",") + " " + (unit||"€/kg");
}

function fmtFecha(iso){
  if(!iso) return "";
  try{
    const d = new Date(iso);
    return d.toLocaleDateString("es-ES",{day:"2-digit",month:"long",year:"numeric"});
  }catch(e){return iso;}
}

function estadoBadge(estado){
  if(estado==="pedido") return '<span class="estado-resp pedido">✅ Pedido confirmado</span>';
  if(estado==="caro") return '<span class="estado-resp caro">💸 Marcado como caro</span>';
  if(estado==="no_interesa") return '<span class="estado-resp no-interesa">🔇 No interesado</span>';
  return '<span class="estado-resp pendiente">⏳ Pendiente</span>';
}

// Render principal
let OFERTA = null;
let TOKEN_OK = false;

async function init(){
  const {id, token} = getParams();
  if(!id){
    document.getElementById("app").innerHTML = errorMsg("Enlace incompleto",
      "El enlace no tiene identificador de oferta. Pide a tu comercial que te lo reenvíe.");
    return;
  }
  try{
    OFERTA = await cargarOferta(id);
  }catch(e){
    document.getElementById("app").innerHTML = errorMsg("Error de conexión",
      "No se pudo cargar la oferta. Comprueba tu conexión e inténtalo de nuevo.");
    return;
  }
  if(!OFERTA){
    document.getElementById("app").innerHTML = errorMsg("Oferta no encontrada",
      "Esta oferta ya no existe o el enlace es incorrecto.");
    return;
  }
  if(OFERTA.eliminada){
    document.getElementById("app").innerHTML = errorMsg("Oferta cancelada",
      "Esta oferta ha sido cancelada. Contacta con tu comercial para más información.");
    return;
  }
  // Validar token
  if(OFERTA.tokenCliente && OFERTA.tokenCliente !== token){
    document.getElementById("app").innerHTML = errorMsg("Enlace no válido",
      "El enlace no es correcto. Pide a tu comercial que te genere uno nuevo.");
    return;
  }
  // (v2) Validar caducidad: 14 días desde fechaEnvioCliente o fechaCreacion
  const fechaRef = OFERTA.fechaEnvioCliente || OFERTA.fechaCreacion;
  if(fechaRef){
    const d = new Date(fechaRef);
    if(!isNaN(d)){
      const diasMax = 7;
      const ahora = new Date();
      const diff = Math.floor((ahora - d) / (1000*60*60*24));
      if(diff > diasMax){
        document.getElementById("app").innerHTML = errorMsg("Enlace caducado",
          "Este enlace tiene más de "+diasMax+" días y ya no es válido. Pide a tu comercial que te genere uno nuevo.");
        return;
      }
    }
  }
  TOKEN_OK = true;
  render();
}

function errorMsg(titulo, msg){
  return '<div class="ok-msg"><div class="icon">⚠️</div><h2>'+titulo+'</h2><p>'+msg+'</p></div>';
}

function render(){
  const lineas = OFERTA.lineas || [];
  const cliente = OFERTA.clienteNombre || "Cliente";
  const agente = OFERTA.agenteNombre || OFERTA.agente || "";
  const fecha = fmtFecha(OFERTA.fechaCreacion);

  let html = `
    <div class="header">
      <div class="brand">WIKUK</div>
      <h1>Oferta para</h1>
      <h2>${escapeHtml(cliente)}</h2>
      <div class="sub">${agente?'De '+escapeHtml(agente)+' · ':''}${fecha}</div>
    </div>
  `;

  if(OFERTA.notaInicial){
    html += `<div class="nota-agente">💬 ${escapeHtml(OFERTA.notaInicial)}</div>`;
  }

  // Sección de líneas
  lineas.forEach((l, idx) => {
    const respCli = (OFERTA.respuestasCliente||{})[l.id];
    const yaResp = respCli && respCli.estado;
    html += `
      <div class="card" data-linea="${l.id}">
        <div class="card-label">Línea ${idx+1}</div>
        <div class="linea-cabecera">
          <div style="flex:1">
            <h3>${escapeHtml(l.producto||"")}${l.calibre?' · '+escapeHtml(l.calibre):''}</h3>
            <div class="price">${fmtPrecio(l.precio, l.unidad)}</div>
            ${l.notas?'<div class="notes">'+escapeHtml(l.notas)+'</div>':''}
          </div>
          <div>${estadoBadge(yaResp?respCli.estado:"pendiente")}</div>
        </div>
        ${yaResp ? renderRespuestaRecibida(respCli) : renderBotonesLinea(l.id)}
      </div>
    `;
  });

  // Botón global - solo si quedan líneas pendientes
  const hayPendientes = lineas.some(l => !((OFERTA.respuestasCliente||{})[l.id]||{}).estado);
  if(hayPendientes && lineas.length > 1){
    html += `
      <button class="btn-global" onclick="abrirRespuestaGlobal()">
        📨 Responder a toda la oferta
      </button>
    `;
  }

  html += `
    <div class="footer">
      Grupo Consolidado · WIKUK + INTERKEY<br>
      ¿Dudas? Contacta directamente con ${escapeHtml(agente||"tu comercial")}.
    </div>
  `;

  document.getElementById("app").innerHTML = html;
}

function renderBotonesLinea(lineaId){
  return `
    <div class="botones-linea" style="grid-template-columns:1fr 1fr">
      <button class="btn btn-pedido" onclick="abrirResp('${lineaId}','pedido')">✅ Hago pedido</button>
      <button class="btn btn-no-interesa" onclick="abrirResp('${lineaId}','no_interesa')">🔇 No me interesa</button>
    </div>
  `;
}

function renderRespuestaRecibida(resp){
  let html = '<div class="respuesta-recibida">';
  html += '<strong>✓ Respuesta registrada el '+fmtFecha(resp.fechaRespuesta)+'</strong>';
  if(resp.contraoferta){
    html += '<br>Contraoferta: <strong>'+escapeHtml(resp.contraoferta)+' €</strong>';
  }
  if(resp.cantidad){
    html += '<br>Cantidad: <strong>'+escapeHtml(resp.cantidad)+'</strong>';
  }
  if(resp.fechaEntrega){
    html += '<br>Entrega deseada: <strong>'+escapeHtml(resp.fechaEntrega)+'</strong>';
  }
  if(resp.comentario){
    html += '<br>Comentario: <em>"'+escapeHtml(resp.comentario)+'"</em>';
  }
  html += '</div>';
  return html;
}

function escapeHtml(s){
  if(s==null) return "";
  return String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// === Modales de respuesta ===
let MODAL_CTX = null; // {tipo:"linea"|"global", lineaId, estado}

function abrirResp(lineaId, estado){
  MODAL_CTX = {tipo:"linea", lineaId, estado};
  if(estado === "no_interesa"){
    mostrarSubmenuNoInteresa();
  } else {
    mostrarModalRespuesta(estado);
  }
}

function mostrarSubmenuNoInteresa(){
  const linea = OFERTA.lineas.find(l=>l.id===MODAL_CTX.lineaId);
  const modalHtml = `
    <div class="modal-bg" onclick="cerrarModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <h3>🔇 No me interesa</h3>
        <div class="sub">${escapeHtml(linea.producto||"")}${linea.calibre?' · '+escapeHtml(linea.calibre):''}</div>
        <p style="font-size:13px;color:#475569;margin:18px 0 14px;text-align:center">¿Cuál es el motivo?</p>
        <div style="display:flex;flex-direction:column;gap:10px">
          <button class="btn" style="background:#EF4444;color:#fff;padding:14px;font-size:14px;text-align:left"
            onclick="seleccionarMotivoNoInteresa('precio')">
            💰 <strong>Precio</strong> — está caro
          </button>
          <button class="btn" style="background:#3B82F6;color:#fff;padding:14px;font-size:14px;text-align:left"
            onclick="seleccionarMotivoNoInteresa('tengo_stock')">
            📦 <strong>Tengo stock</strong>
          </button>
          <button class="btn" style="background:#64748B;color:#fff;padding:14px;font-size:14px;text-align:left"
            onclick="seleccionarMotivoNoInteresa('no_necesito')">
            ⏸️ <strong>Ahora no necesito</strong>
          </button>
        </div>
        <div class="actions" style="margin-top:18px">
          <button class="btn btn-cancel" onclick="cerrarModal()" style="flex:1">Cancelar</button>
        </div>
      </div>
    </div>
  `;
  const div = document.createElement("div");
  div.id = "modal-container";
  div.innerHTML = modalHtml;
  document.body.appendChild(div);
}

function seleccionarMotivoNoInteresa(motivo){
  const c = document.getElementById("modal-container");
  if(c) c.remove();
  MODAL_CTX.motivo = motivo;
  if(motivo === "precio"){
    MODAL_CTX.estado = "caro";
    mostrarModalRespuesta("caro");
  } else {
    mostrarModalNoInteresaSimple(motivo);
  }
}

function mostrarModalNoInteresaSimple(motivo){
  const linea = OFERTA.lineas.find(l=>l.id===MODAL_CTX.lineaId);
  const titulo = motivo === "tengo_stock" ? "📦 Tengo stock" : "⏸️ Ahora no necesito";
  const color = motivo === "tengo_stock" ? "#3B82F6" : "#64748B";
  const placeholder = motivo === "tengo_stock" ? "Ej: tengo para 2 meses…" : "Ej: revisamos en septiembre…";
  const modalHtml = `
    <div class="modal-bg" onclick="cerrarModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <h3>${titulo}</h3>
        <div class="sub">${escapeHtml(linea.producto||"")}${linea.calibre?' · '+escapeHtml(linea.calibre):''}</div>
        <label>Comentario (opcional)</label>
        <textarea id="campoComentario" placeholder="${placeholder}"></textarea>
        <div class="actions">
          <button class="btn btn-cancel" onclick="cerrarModal()">Cancelar</button>
          <button class="btn btn-confirm" style="background:${color}" onclick="enviarRespuesta()">
            Enviar respuesta
          </button>
        </div>
      </div>
    </div>
  `;
  const div = document.createElement("div");
  div.id = "modal-container";
  div.innerHTML = modalHtml;
  document.body.appendChild(div);
}

function abrirRespuestaGlobal(){
  MODAL_CTX = {tipo:"global", estado:null};
  mostrarModalGlobal();
}

function mostrarModalRespuesta(estado){
  const linea = OFERTA.lineas.find(l=>l.id===MODAL_CTX.lineaId);
  const titulo = estado==="pedido"?"✅ Confirmar pedido"
                 :estado==="caro"?"💰 El precio es alto"
                 :"🔇 No me interesa";
  const color  = estado==="pedido"?"#22C55E":estado==="caro"?"#EF4444":"#64748B";

  let extra = "";
  if(estado==="caro"){
    extra = `
      <div style="background:#FEF3C7;border-radius:9px;padding:12px 14px;margin:14px 0 4px;font-size:13px;color:#92400E;line-height:1.4">
        <strong>💡 ¿A qué precio sí harías el pedido?</strong><br>
        Indícanos tu precio objetivo y se lo trasladaremos a tu comercial.
      </div>
      <label>Precio objetivo <span style="color:#EF4444">*</span></label>
      <input type="text" id="campoContraoferta" inputmode="decimal" placeholder="Ej: 0,53" required>
      <p style="font-size:11px;color:#64748B;margin-top:4px">${linea.unidad || "€/kg"}</p>
    `;
  }
  if(estado==="pedido"){
    extra = `
      <div class="cantidad-row">
        <div>
          <label>Cantidad</label>
          <input type="text" id="campoCantidad" placeholder="Ej: 500 kg / 1 palet">
        </div>
        <div>
          <label>Fecha entrega</label>
          <input type="date" id="campoFechaEntrega">
        </div>
      </div>
    `;
  }

  const modalHtml = `
    <div class="modal-bg" onclick="cerrarModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <h3>${titulo}</h3>
        <div class="sub">${escapeHtml(linea.producto||"")}${linea.calibre?' · '+escapeHtml(linea.calibre):''}</div>
        ${extra}
        <label>Comentario (opcional)</label>
        <textarea id="campoComentario" placeholder="Cualquier detalle adicional…"></textarea>
        <div class="actions">
          <button class="btn btn-cancel" onclick="cerrarModal()">Cancelar</button>
          <button class="btn btn-confirm" style="background:${color}" onclick="enviarRespuesta()">
            ${estado==="caro"?"📨 Enviar precio al comercial":estado==="pedido"?"✅ Confirmar pedido":"Enviar respuesta"}
          </button>
        </div>
      </div>
    </div>
  `;
  const div = document.createElement("div");
  div.id = "modal-container";
  div.innerHTML = modalHtml;
  document.body.appendChild(div);
}

function mostrarModalGlobal(){
  const modalHtml = `
    <div class="modal-bg" onclick="cerrarModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <h3>📨 Responder a toda la oferta</h3>
        <div class="sub">Se aplicará a las ${OFERTA.lineas.filter(l=>!((OFERTA.respuestasCliente||{})[l.id]||{}).estado).length} líneas pendientes</div>
        <label>Respuesta</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">
          <button class="btn btn-pedido" onclick="seleccionarGlobal('pedido')">✅ Pedido</button>
          <button class="btn btn-no-interesa" onclick="seleccionarGlobal('no_interesa')">🔇 No me interesa</button>
        </div>
        <div id="globalExtras" style="display:none">
          <div id="globalExtraMotivo" style="display:none;margin-bottom:14px">
            <label>Motivo</label>
            <select id="campoMotivo" style="width:100%;padding:11px 13px;border:1.5px solid #E2E8F0;border-radius:9px;font-size:14px;background:#fff"
              onchange="actualizarGlobalMotivo()">
              <option value="">-- Selecciona --</option>
              <option value="precio">💰 Precio</option>
              <option value="tengo_stock">📦 Tengo stock</option>
              <option value="no_necesito">⏸️ Ahora no necesito</option>
            </select>
          </div>
          <div id="globalExtraContraoferta" style="display:none">
            <label>Contraoferta general (opcional)</label>
            <input type="text" id="campoContraoferta" inputmode="decimal" placeholder="Ej: 0.50">
          </div>
          <div id="globalExtraCantidad" style="display:none">
            <label>Comentario sobre cantidades/entrega</label>
            <input type="text" id="campoCantidad" placeholder="Ej: media semana cada uno">
          </div>
          <label>Comentario adicional</label>
          <textarea id="campoComentario" placeholder="Detalles…"></textarea>
          <div class="actions">
            <button class="btn btn-cancel" onclick="cerrarModal()">Cancelar</button>
            <button class="btn btn-confirm" id="btnConfirmGlobal" style="background:#1E3A5F" onclick="enviarRespuestaGlobal()">Enviar</button>
          </div>
        </div>
      </div>
    </div>
  `;
  const div = document.createElement("div");
  div.id = "modal-container";
  div.innerHTML = modalHtml;
  document.body.appendChild(div);
}

function seleccionarGlobal(estado){
  MODAL_CTX.estado = estado;
  document.getElementById("globalExtras").style.display = "block";
  // (v2) Si no_interesa, mostrar selector de motivo
  document.getElementById("globalExtraMotivo").style.display = estado==="no_interesa"?"block":"none";
  document.getElementById("globalExtraContraoferta").style.display = "none"; // Solo si motivo=precio
  document.getElementById("globalExtraCantidad").style.display = estado==="pedido"?"block":"none";
  document.getElementById("btnConfirmGlobal").style.background =
    estado==="pedido"?"#22C55E":"#64748B";
}

function actualizarGlobalMotivo(){
  const motivo = document.getElementById("campoMotivo").value;
  MODAL_CTX.motivo = motivo;
  document.getElementById("globalExtraContraoferta").style.display = motivo==="precio"?"block":"none";
  document.getElementById("btnConfirmGlobal").style.background =
    motivo==="precio"?"#EF4444":motivo==="tengo_stock"?"#3B82F6":"#64748B";
}

function cerrarModal(e){
  if(e && e.currentTarget !== e.target) return;
  const c = document.getElementById("modal-container");
  if(c) c.remove();
}

async function enviarRespuesta(){
  const ctx = MODAL_CTX;
  const valContraoferta = (document.getElementById("campoContraoferta")||{}).value || "";
  const valCantidad = (document.getElementById("campoCantidad")||{}).value || "";
  const valFechaEntrega = (document.getElementById("campoFechaEntrega")||{}).value || "";
  const valComentario = (document.getElementById("campoComentario")||{}).value || "";

  // (v2) Validar contraoferta si motivo=precio (estado=caro)
  if(ctx.estado === "caro"){
    if(!valContraoferta.trim()){
      alert("Por favor, indica tu precio objetivo para que el comercial pueda valorarlo.");
      return;
    }
    const n = parseFloat(valContraoferta.replace(",","."));
    if(isNaN(n) || n <= 0){
      alert("El precio objetivo no es válido. Introduce un número (ej: 0,53)");
      return;
    }
  }

  const payload = {
    ofertaId: OFERTA.id || getParams().id,
    token: getParams().token,
    tipo: "linea",
    lineaId: ctx.lineaId,
    estado: ctx.estado,
    motivo: ctx.motivo || "",
    contraoferta: valContraoferta.trim(),
    cantidad: valCantidad.trim(),
    fechaEntrega: valFechaEntrega.trim(),
    comentario: valComentario.trim(),
  };

  await enviarPayload(payload);
}

async function enviarRespuestaGlobal(){
  const ctx = MODAL_CTX;
  if(!ctx.estado){ alert("Selecciona una respuesta primero"); return; }
  if(ctx.estado === "no_interesa" && !ctx.motivo){
    alert("Selecciona un motivo primero");
    return;
  }
  const valContraoferta = (document.getElementById("campoContraoferta")||{}).value || "";
  const valCantidad = (document.getElementById("campoCantidad")||{}).value || "";
  const valComentario = (document.getElementById("campoComentario")||{}).value || "";

  // Si motivo=precio dentro de no_interesa, traducir a estado=caro
  let estadoFinal = ctx.estado;
  if(ctx.estado === "no_interesa" && ctx.motivo === "precio") estadoFinal = "caro";

  const payload = {
    ofertaId: OFERTA.id || getParams().id,
    token: getParams().token,
    tipo: "global",
    estado: estadoFinal,
    motivo: ctx.motivo || "",
    contraoferta: valContraoferta.trim(),
    cantidad: valCantidad.trim(),
    comentario: valComentario.trim(),
  };

  await enviarPayload(payload);
}

async function enviarPayload(payload){
  // Mostrar loader
  const c = document.getElementById("modal-container");
  if(c) c.innerHTML = '<div class="ok-msg"><div class="icon">⏳</div><h2>Enviando…</h2></div>';

  try{
    const r = await fetch("/api/oferta-respuesta", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(payload)
    });
    if(!r.ok){
      const t = await r.text();
      throw new Error(t || "HTTP "+r.status);
    }
    // Éxito: recargar oferta
    OFERTA = await cargarOferta(payload.ofertaId);
    cerrarModal({currentTarget:1,target:1}); // forzar cierre
    const c2 = document.getElementById("modal-container");
    if(c2) c2.remove();
    // Mostrar mensaje
    mostrarExito();
  }catch(e){
    alert("Error al enviar: " + e.message + "\n\nInténtalo de nuevo o contacta con tu comercial.");
    cerrarModal({currentTarget:1,target:1});
    const c2 = document.getElementById("modal-container");
    if(c2) c2.remove();
  }
}

function mostrarExito(){
  const overlay = document.createElement("div");
  overlay.className = "modal-bg";
  overlay.innerHTML = `
    <div class="modal" style="text-align:center;padding:40px 24px">
      <div style="font-size:54px;margin-bottom:14px">✓</div>
      <h3 style="font-size:20px">Respuesta enviada</h3>
      <p style="color:#64748B;margin-top:8px;font-size:14px">
        Hemos recibido tu respuesta. ${OFERTA.agenteNombre||OFERTA.agente||"Tu comercial"} se pondrá en contacto contigo a la mayor brevedad.
      </p>
      <button class="btn btn-confirm" style="background:#1E3A5F;width:100%;margin-top:18px;padding:14px"
        onclick="this.closest('.modal-bg').remove();render();">
        Entendido
      </button>
    </div>
  `;
  document.body.appendChild(overlay);
}

init();
</script>
</body>
</html>
